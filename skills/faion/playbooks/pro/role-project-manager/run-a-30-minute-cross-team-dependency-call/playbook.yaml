# =============================================================================
# PLAYBOOK v2 — Run a 30-minute cross-team dependency call
# Group: role-project-manager | Tier: pro | Complexity: medium
# =============================================================================

slug: run-a-30-minute-cross-team-dependency-call
title: "Run a 30-minute cross-team dependency call"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: d004d7e95c0ac21f

tier_min: pro
complexity: medium
context: ['solo', 'team']
persona: role-project-manager
group: role-project-manager

summary: "A weekly call across teams (P4 across vendors / client side; P6 across squads): align on handoffs, surface late commitments, and lock the next-week handoff schedule."

intent: |
  A weekly call across teams (P4 across vendors / client side; P6 across squads): align on handoffs, surface late commitments, and lock the next-week handoff schedule.

scope: |
  A weekly call across teams (P4 across vendors / client side; P6 across squads): align on handoffs, surface late commitments, and lock the next-week handoff schedule.

methodology_refs:
  - pro/pm/pm-agile/value-stream-management
  - pro/pm/pm-traditional/communications-management
  - pro/pm/pm-traditional/risk-register
  - pro/pm/pm-traditional/schedule-development
  - pro/pm/pm-traditional/stakeholder-engagement-advanced
  - pro/pm/project-manager/raci-matrix

success_criteria:
  - "Pre-pulled commitments + aging view on screen"
  - "Every late item has recovery owner + date"
  - "Every next-week handoff double-confirmed"
  - "Every above-threshold dependency has an escalation decision"
  - "Handoff schedule broadcast within 60 minutes"

stages:
  - name: "Pre-pull commitments"
    intent: "Walk in with the data, not the discussion."
    tasks:
      - "Pull every team's commitments from last week and next week"
      - "Flag late or shifted commitments"
      - "Build a dependency-aging view"
    methodologies:
      - slug: schedule-development
        path: pro/pm/pm-traditional/schedule-development
        required: true
        tier_gate: pro
      - slug: value-stream-management
        path: pro/pm/pm-agile/value-stream-management
        required: true
        tier_gate: pro
    outputs:
      - "Pre-pulled commitments + aging view"
    decision_gate: "Advance when the data is on screen before the call starts."
  - name: "Open with the late list"
    intent: "Tackle the worst dependencies first."
    tasks:
      - "Show the late list with team + item + days late"
      - "Ask each team owner for a recovery plan"
      - "Cap the time per item to keep the call moving"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
    outputs:
      - "Late-list recovery plans"
    decision_gate: "Advance when every late item has a recovery owner and date."
  - name: "Lock next-week handoffs"
    intent: "Schedule the handoffs concretely."
    tasks:
      - "Walk next week's planned handoffs by date"
      - "Confirm each handoff with both sides"
      - "Resolve any double-booked dependencies"
    methodologies:
      - slug: schedule-development
        path: pro/pm/pm-traditional/schedule-development
        required: true
        tier_gate: pro
      - slug: value-stream-management
        path: pro/pm/pm-agile/value-stream-management
        required: true
        tier_gate: pro
      - slug: raci-matrix
        path: pro/pm/project-manager/raci-matrix
        required: true
        tier_gate: pro
    outputs:
      - "Next-week handoff schedule"
    decision_gate: "Advance when every next-week handoff is double-confirmed."
  - name: "Risk + escalation"
    intent: "Surface dependencies headed for trouble."
    tasks:
      - "Flag dependencies above the slack threshold"
      - "Decide which need escalation outside the call"
      - "Update the risk register"
    methodologies:
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Escalation list"
    decision_gate: "Advance when every above-threshold dependency has an escalation decision."
  - name: "Broadcast"
    intent: "Send the schedule + recoveries to all involved."
    tasks:
      - "Post the next-week handoff schedule to the program channel"
      - "Notify each recovery owner with their commitment"
      - "Log the escalations into the program risk register"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: raci-matrix
        path: pro/pm/project-manager/raci-matrix
        required: true
        tier_gate: pro
    outputs:
      - "Broadcast + risk register entries"
    decision_gate: "Required: handoff schedule broadcast within 60 minutes of call end."

token_budget_estimate: 14000

cli_invocations:
  human:  "faion get-content run-a-30-minute-cross-team-dependency-call --format md"
