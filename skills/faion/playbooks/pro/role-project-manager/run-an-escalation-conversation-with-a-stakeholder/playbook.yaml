slug: run-an-escalation-conversation-with-a-stakeholder
title: "Run an escalation conversation with a stakeholder"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 7c1476ac3d0cc572

tier: pro
tier_min: pro
group: role-project-manager
persona: PM (project manager) handling P4 outsource and P6 product-team engagements
complexity: deep
context: [solo, team]

summary: |
  Ad-hoc 20-45 minute working session that surfaces a problem before it turns
  red, lays out options, and exits with a stakeholder-owned decision plus a
  next step both sides can repeat.

intent: |
  Open red-flag risk -> joint decision + recorded next step the stakeholder
  will own.

scope: |
  A PM has spotted a slip, scope ambiguity, or commitment risk on a live
  engagement. This playbook runs a single escalation conversation: framing,
  evidence presentation, options, decision capture, and follow-through hook.
  Done when both sides can repeat the next step out loud and the decision is
  logged in the project record.

success_criteria:
  - "Written decision captured by end of meeting with named owner"
  - "Stakeholder restates the agreed next step unprompted"
  - "Risk register updated within 24 hours with new status"
  - "Follow-up checkpoint scheduled before the meeting ends"

methodology_refs:
  - faion/knowledge/pro/pm/pm-traditional/change-control
  - faion/knowledge/pro/pm/pm-traditional/communications-management
  - faion/knowledge/pro/pm/pm-traditional/risk-management
  - faion/knowledge/pro/pm/pm-traditional/risk-register
  - faion/knowledge/pro/pm/pm-traditional/scope-management
  - faion/knowledge/pro/pm/pm-traditional/stakeholder-engagement-advanced

stages:
  - name: "Prep"
    intent: "Walk in with evidence, not feelings."
    tasks:
      - "Pull risk + change-control history for the affected scope"
      - "Draft 2-3 concrete options ranked by trade-off"
      - "Pre-write the decision template (who decides, by when, what)"
    methodologies:
      - slug: risk-management
        path: pro/pm/pm-traditional/risk-management
        required: true
        tier_gate: pro
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
      - slug: change-control
        path: pro/pm/pm-traditional/change-control
        required: true
        tier_gate: pro
    outputs:
      - "1-page brief: situation, evidence, 2-3 options"
      - "Decision template ready to fill"
    decision_gate: |
      Advance only if the brief states the ask in one sentence and the
      options are mutually exclusive. Otherwise rewrite.

  - name: "Frame"
    intent: "Name the problem in the first 60 seconds, no stalling."
    tasks:
      - "Open with the single sentence ask"
      - "Surface the impact tied to a metric the stakeholder cares about"
      - "Avoid blame language; state facts and the missing decision"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
    outputs:
      - "Shared problem statement acknowledged by stakeholder"
    decision_gate: |
      Advance when the stakeholder restates the problem in their own words.
      If they re-frame it as "minor", restart with stronger evidence.

  - name: "Options"
    intent: "Present 2-3 paths with the cost of each."
    tasks:
      - "Walk each option: cost, time, scope impact, residual risk"
      - "State your recommendation and why"
      - "Invite a fourth option from the stakeholder"
    methodologies:
      - slug: scope-management
        path: pro/pm/pm-traditional/scope-management
        required: true
        tier_gate: pro
      - slug: change-control
        path: pro/pm/pm-traditional/change-control
        required: true
        tier_gate: pro
    outputs:
      - "Option matrix with stakeholder reactions noted"
    decision_gate: |
      Advance when one option has clearly emerged or stakeholder commits
      to choose by a stated time. Do not leave with "we will think about it".

  - name: "Decide"
    intent: "Force a decision in the room, with the owner named."
    tasks:
      - "Fill the decision template live on screen"
      - "Name the decision owner, deadline, and rollback condition"
      - "Read it back; ask if anything is wrong"
    methodologies:
      - slug: change-control
        path: pro/pm/pm-traditional/change-control
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
    outputs:
      - "Signed decision (verbal or written) with owner + deadline"
    decision_gate: |
      Advance only if the decision is concrete enough that the next person
      in the chain could act on it without asking you a follow-up question.

  - name: "Close"
    intent: "Lock the follow-up so the decision does not rot."
    tasks:
      - "Schedule the checkpoint before leaving the call"
      - "Capture the action items with owners + due dates"
      - "Confirm escalation path if the decision needs to change"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Action items in tracker"
      - "Calendar invite for follow-up"
    decision_gate: |
      Stage is done when both parties can name the date + time of next
      checkpoint without checking calendars.

  - name: "Log"
    intent: "Make the decision survive turnover and time."
    tasks:
      - "Update risk register entry status + decision link"
      - "Post summary in the project channel within 24h"
      - "Tag stakeholders + decision owner"
    methodologies:
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Risk register updated"
      - "Summary post in project channel"
    decision_gate: |
      Done when register reflects the new status and the post has at least
      one acknowledgment from a senior stakeholder.

common_pitfalls:
  - "Treating the meeting as a status update -> no decision extracted"
  - "Presenting only the recommendation -> stakeholder feels railroaded"
  - "Skipping the post-meeting log -> decision becomes 'he said / she said'"

quality_checklist:
  - "Could the stakeholder explain the decision to their boss without you?"
  - "Is the follow-up checkpoint already on the calendar?"
  - "Is the risk register reflecting the new status?"

