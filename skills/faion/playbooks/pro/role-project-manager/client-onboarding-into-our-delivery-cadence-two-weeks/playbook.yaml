tier_min: pro
complexity: medium
context: ['outsource']
persona: role-project-manager
group: role-project-manager

summary: "Take a newly signed client (or new stakeholder cohort on an existing account) from contract to confident participant in our weekly demo / report / decision loop with no surprises."

intent: |
  Take a newly signed client (or new stakeholder cohort on an existing account) from contract to confident participant in our weekly demo / report / decision loop with no surprises.

scope: |
  Take a newly signed client (or new stakeholder cohort on an existing account) from contract to confident participant in our weekly demo / report / decision loop with no surprises.

methodology_refs:
  - pro/pm/pm-agile/agile-hybrid-approaches
  - pro/pm/pm-agile/reporting-basics
  - pro/pm/pm-agile/scrum-ceremonies
  - pro/pm/pm-traditional/change-control
  - pro/pm/pm-traditional/communications-management
  - pro/pm/pm-traditional/procurement-management
  - pro/pm/pm-traditional/stakeholder-engagement
  - pro/pm/pm-traditional/stakeholder-engagement-advanced
  - pro/pm/pm-traditional/stakeholder-register
  - pro/pm/project-manager/azure-devops-boards
  - pro/pm/project-manager/jira-workflow-management

success_criteria:
  - "Client maturity assessment captured"
  - "Onboarding 1-pager confirmed in writing"
  - "First full delivery cycle attended by client"
  - "Practice change request filed"
  - "Sponsor 'confident' verdict at week 2"

stages:
  - name: "Client maturity read"
    intent: "Assess how the client likes to work."
    tasks:
      - "Interview the client sponsor on tools, cadence, and decision style"
      - "Score the client on PM maturity rubric"
      - "Identify the most likely friction points"
    methodologies:
      - slug: stakeholder-engagement
        path: pro/pm/pm-traditional/stakeholder-engagement
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
    outputs:
      - "Client maturity assessment"
    decision_gate: "Advance when maturity is rated and friction list is on paper."
  - name: "Onboarding 1-pager"
    intent: "Document our delivery cadence in their language."
    tasks:
      - "Draft a one-page 'how we work together' explainer"
      - "Walk it with the client sponsor"
      - "Adjust language for their tooling"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Onboarding one-pager"
    decision_gate: "Advance when the client confirms understanding in writing."
  - name: "Tool + access setup"
    intent: "Give the client real-time visibility."
    tasks:
      - "Provision client access to the board + dashboard"
      - "Configure read-only or contributor permissions"
      - "Test their access end-to-end"
    methodologies:
      - slug: jira-workflow-management
        path: pro/pm/project-manager/jira-workflow-management
        required: true
        tier_gate: pro
      - slug: azure-devops-boards
        path: pro/pm/project-manager/azure-devops-boards
        required: true
        tier_gate: pro
    outputs:
      - "Confirmed tool access"
    decision_gate: "Advance when the client logs in and verifies they see the right data."
  - name: "Run the first cadence"
    intent: "Walk through one full delivery week."
    tasks:
      - "Run a kickoff demo + first weekly report cycle"
      - "Hold one decision-loop meeting with the client"
      - "Collect feedback on the cadence"
    methodologies:
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
      - slug: reporting-basics
        path: pro/pm/pm-agile/reporting-basics
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement
        path: pro/pm/pm-traditional/stakeholder-engagement
        required: true
        tier_gate: pro
    outputs:
      - "First-cycle artifacts (demo, report, decision)"
    decision_gate: "Advance when the client engages with all three rituals."
  - name: "Lock change-control"
    intent: "Set expectations around scope changes."
    tasks:
      - "Explain the change-control process with examples"
      - "Run one practice change request through the loop"
      - "Confirm the procurement/contract path for change orders"
    methodologies:
      - slug: change-control
        path: pro/pm/pm-traditional/change-control
        required: true
        tier_gate: pro
      - slug: procurement-management
        path: pro/pm/pm-traditional/procurement-management
        required: true
        tier_gate: pro
    outputs:
      - "Change-control walkthrough record"
    decision_gate: "Advance when the client has filed at least one mock CR."
  - name: "Two-week confidence check"
    intent: "Confirm the client can self-serve into our cadence."
    tasks:
      - "Survey the sponsor on confidence + clarity"
      - "Note any rituals they want changed"
      - "Lock the second-week cadence as the steady state"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement
        path: pro/pm/pm-traditional/stakeholder-engagement
        required: true
        tier_gate: pro
      - slug: agile-hybrid-approaches
        path: pro/pm/pm-agile/agile-hybrid-approaches
        required: true
        tier_gate: pro
    outputs:
      - "Confidence check note"
    decision_gate: "Required: a written 'confident' verdict from the client sponsor."

