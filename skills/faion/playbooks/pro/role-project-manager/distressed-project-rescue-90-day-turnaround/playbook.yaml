slug: distressed-project-rescue-90-day-turnaround
title: "Distressed-project rescue (90-day turnaround)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 6eaf07b7a05f37ae

tier: pro
tier_min: pro
group: role-project-manager
persona: PM stepping into a flagged-red engagement, P4 outsource or P6 internal
complexity: deep
context: [solo, team]

summary: |
  Defined sequence to diagnose, stabilize, and restore confidence on a red-flagged project before contract loss.

intent: |
  Red status -> three consecutive green weekly reports + signed remediation acceptance from sponsor.

scope: |
  A project has been flagged red by the client or steerco. This playbook is the 90-day sequence the PM runs: diagnose root causes, stabilize the burn, communicate transparently, deliver visible wins, and re-baseline. Done when status is green for 3 consecutive weekly reports and the sponsor signs the remediation acceptance.

success_criteria:
  - "Root-cause diagnostic complete by end of week 1"
  - "Stabilization plan accepted by sponsor by end of week 2"
  - "Three consecutive green status reports during the 90-day window"
  - "Signed remediation acceptance from the sponsor"
  - "Lessons-learned recorded for the portfolio"

methodology_refs:
  - faion/knowledge/geek/pm/pm-agile/ai-in-project-management
  - faion/knowledge/pro/pm/pm-agile/value-stream-management
  - faion/knowledge/pro/pm/pm-traditional/change-control
  - faion/knowledge/pro/pm/pm-traditional/communications-management
  - faion/knowledge/pro/pm/pm-traditional/lessons-learned
  - faion/knowledge/pro/pm/pm-traditional/risk-management
  - faion/knowledge/pro/pm/pm-traditional/risk-register
  - faion/knowledge/pro/pm/pm-traditional/stakeholder-engagement-advanced
  - faion/knowledge/pro/pm/project-manager/benefits-realization
  - faion/knowledge/pro/pm/project-manager/predictive-analytics-pm

stages:
  - name: "Diagnose"
    intent: "Find the real root causes, not the symptoms."
    tasks:
      - "Interview core team + key client stakeholders (5-7 conversations)"
      - "Map current risk register against actuals"
      - "Rank root causes by impact + reversibility"
    methodologies:
      - slug: risk-management
        path: pro/pm/pm-traditional/risk-management
        required: true
        tier_gate: pro
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
      - slug: value-stream-management
        path: pro/pm/pm-agile/value-stream-management
        required: true
        tier_gate: pro
    outputs:
      - "Root-cause diagnostic, 1-2 pages"
    decision_gate: |
      Advance when top 3 root causes are agreed with the delivery lead.
  - name: "Stabilize"
    intent: "Stop the bleeding before re-planning."
    tasks:
      - "Define a 2-week stabilization plan with concrete cut-overs"
      - "Get sponsor agreement on scope freezes"
      - "Stand up rapid-response triage for crit-path issues"
    methodologies:
      - slug: change-control
        path: pro/pm/pm-traditional/change-control
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
    outputs:
      - "Stabilization plan signed by sponsor"
    decision_gate: |
      Advance only when sponsor has signed; do not move on verbal yes.
  - name: "Re-plan"
    intent: "Build a credible 90-day path back to green."
    tasks:
      - "Re-baseline scope, schedule, budget against the new reality"
      - "Apply AI-assisted risk aging to surface near-term threats"
      - "Lock weekly traffic-light criteria"
    methodologies:
      - slug: ai-in-project-management
        path: geek/pm/pm-agile/ai-in-project-management
        required: true
        tier_gate: geek
      - slug: predictive-analytics-pm
        path: pro/pm/project-manager/predictive-analytics-pm
        required: true
        tier_gate: pro
      - slug: change-control
        path: pro/pm/pm-traditional/change-control
        required: true
        tier_gate: pro
    outputs:
      - "Re-baselined plan + traffic-light criteria"
    decision_gate: |
      Advance when steerco accepts the re-baseline.
  - name: "Execute"
    intent: "Ship visible wins each week."
    tasks:
      - "Daily 15-min crit-path standup"
      - "Weekly demos to sponsor (even if partial)"
      - "Track velocity vs plan with public dashboards"
    methodologies:
      - slug: value-stream-management
        path: pro/pm/pm-agile/value-stream-management
        required: true
        tier_gate: pro
      - slug: ai-in-project-management
        path: geek/pm/pm-agile/ai-in-project-management
        required: true
        tier_gate: geek
    outputs:
      - "Public dashboard + weekly demo recordings"
    decision_gate: |
      Stay in Execute until status has been green for 2 weeks.
  - name: "Re-confirm sentiment"
    intent: "Sponsor confidence is the real metric, not velocity."
    tasks:
      - "1:1 sentiment check with sponsor + key stakeholders weekly"
      - "Surface unmet expectations early"
      - "Adjust comms cadence to match anxiety level"
    methodologies:
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Sentiment-tracker entries; weekly"
    decision_gate: |
      Advance only if sentiment trend is upward 3 weeks in a row.
  - name: "Sign-off"
    intent: "Lock the rescue with a written acceptance."
    tasks:
      - "Compile evidence package: diagnostic, plan, results, sentiment"
      - "Schedule remediation-acceptance review with sponsor"
      - "Obtain signed acceptance + reactivate normal cadence"
    methodologies:
      - slug: benefits-realization
        path: pro/pm/project-manager/benefits-realization
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
    outputs:
      - "Signed remediation acceptance"
    decision_gate: |
      Done when signed acceptance is on file.
  - name: "Lessons"
    intent: "Make sure the next project does not repeat this one."
    tasks:
      - "Run a no-blame retro with the full team"
      - "Update portfolio risk patterns library"
      - "Publish lessons-learned to PMO"
    methodologies:
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
    outputs:
      - "Lessons-learned doc in PMO library"
    decision_gate: |
      Done when doc is published and PMO has acknowledged.

common_pitfalls:
  - "Jumping to re-plan before Diagnose finishes -> rescue based on the wrong root cause"
  - "Scope unfreezes during Stabilize -> next week is red again"
  - "Tracking velocity but ignoring sentiment -> sponsor pulls the contract anyway"

quality_checklist:
  - "Could a new PM read the diagnostic and know why we were red?"
  - "Does the sponsor agree the project feels green, not just the dashboard?"
  - "Was lessons-learned published so the portfolio benefits?"

related_playbooks:
