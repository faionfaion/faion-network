stages:
  - name: "Charter + kickoff"
    intent: "Bring the SOW alive in a kickoff that locks scope, roles, and cadence."
    tasks:
      - "Draft the project charter from the SOW"
      - "Run a client kickoff meeting with both sides"
      - "Capture sign-off on scope + roles + cadence"
    methodologies:
      - slug: project-integration
        path: pro/pm/pm-traditional/project-integration
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement
        path: pro/pm/pm-traditional/stakeholder-engagement
        required: true
        tier_gate: pro
      - slug: stakeholder-register
        path: pro/pm/pm-traditional/stakeholder-register
        required: true
        tier_gate: pro
    outputs:
      - "Signed project charter"
      - "Kickoff minutes"
    decision_gate: "Advance when both sides have signed the charter."
  - name: "RACI + stakeholder register"
    intent: "Lock who decides, does, consults, informs."
    tasks:
      - "Build a stakeholder register"
      - "Build a RACI matrix tied to the WBS"
      - "Send to client for sign-off"
    methodologies:
      - slug: stakeholder-register
        path: pro/pm/pm-traditional/stakeholder-register
        required: true
        tier_gate: pro
      - slug: raci-matrix
        path: pro/pm/project-manager/raci-matrix
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement
        path: pro/pm/pm-traditional/stakeholder-engagement
        required: true
        tier_gate: pro
    outputs:
      - "Stakeholder register"
      - "Signed RACI"
    decision_gate: "Advance when every WBS deliverable has a single accountable owner."
  - name: "WBS + baselined plan"
    intent: "Decompose to a baselined schedule + cost plan."
    tasks:
      - "Build the WBS"
      - "Build a baselined schedule with milestones"
      - "Build a baselined cost plan"
    methodologies:
      - slug: wbs-creation
        path: pro/pm/pm-traditional/wbs-creation
        required: true
        tier_gate: pro
      - slug: work-breakdown-structure
        path: pro/pm/pm-traditional/work-breakdown-structure
        required: true
        tier_gate: pro
      - slug: schedule-development
        path: pro/pm/pm-traditional/schedule-development
        required: true
        tier_gate: pro
      - slug: cost-estimation
        path: pro/pm/pm-traditional/cost-estimation
        required: true
        tier_gate: pro
    outputs:
      - "WBS"
      - "Baselined schedule"
      - "Baselined cost plan"
    decision_gate: "Advance when schedule + cost baselines are signed and stored."
  - name: "Risk register"
    intent: "Stand up the live risk register on day one."
    tasks:
      - "Identify top 10 risks from SOW + kickoff"
      - "Score by probability × impact"
      - "Assign owners + next-step actions"
    methodologies:
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
      - slug: risk-management
        path: pro/pm/pm-traditional/risk-management
        required: true
        tier_gate: pro
    outputs:
      - "Top-10 risk register"
    decision_gate: "Advance when every top-10 risk has an owner and a next step."
  - name: "Comms cadence"
    intent: "Lock the meeting + reporting drumbeat."
    tasks:
      - "Schedule weekly client status, internal standup, monthly steerco"
      - "Lock report templates"
      - "Distribute the calendar"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: reporting-basics
        path: pro/pm/pm-agile/reporting-basics
        required: true
        tier_gate: pro
    outputs:
      - "Comms calendar"
      - "Reporting template set"
    decision_gate: "Advance when the calendar is sent and accepted by the client."
  - name: "Agile ceremonies"
    intent: "Stand up the delivery cadence on the team side."
    tasks:
      - "Stand up daily standups, sprint planning, review, retro"
      - "Configure Jira (or equivalent) board"
      - "Run the first ceremony cycle"
    methodologies:
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
      - slug: agile-ceremonies-setup
        path: pro/pm/project-manager/agile-ceremonies-setup
        required: true
        tier_gate: pro
      - slug: jira-workflow-management
        path: pro/pm/project-manager/jira-workflow-management
        required: true
        tier_gate: pro
      - slug: agile-hybrid-approaches
        path: pro/pm/pm-agile/agile-hybrid-approaches
        required: true
        tier_gate: pro
    outputs:
      - "Live Jira board"
      - "First-cycle ceremony notes"
    decision_gate: "Advance when first sprint completes its cycle."
  - name: "First demo + UAT"
    intent: "Land a demo-able increment in client UAT by week 4."
    tasks:
      - "Identify the smallest end-to-end slice"
      - "Build, deploy to UAT, demo to client"
      - "Capture feedback into a change-control queue"
    methodologies:
      - slug: change-control
        path: pro/pm/pm-traditional/change-control
        required: true
        tier_gate: pro
      - slug: earned-value-management
        path: pro/pm/pm-traditional/earned-value-management
        required: true
        tier_gate: pro
      - slug: scope-management
        path: pro/pm/pm-traditional/scope-management
        required: true
        tier_gate: pro
    outputs:
      - "First demo-able increment in UAT"
      - "Client feedback log"
    decision_gate: "Required: a working increment in client UAT by week 4."

