context: ['outsource']
persona: role-project-manager
group: role-project-manager

summary: "Hand over a finished project cleanly: scope verified, contracts closed, handover docs delivered, retrospective captured, benefits-realisation report sent, team released, account warm for next engagement."

intent: |
  Hand over a finished project cleanly: scope verified, contracts closed, handover docs delivered, retrospective captured, benefits-realisation report sent, team released, account warm for next engagement.

scope: |
  Hand over a finished project cleanly: scope verified, contracts closed, handover docs delivered, retrospective captured, benefits-realisation report sent, team released, account warm for next engagement.

methodology_refs:
  - pro/pm/pm-agile/team-development
  - pro/pm/pm-traditional/benefits-realization
  - pro/pm/pm-traditional/communications-management
  - pro/pm/pm-traditional/cost-estimation
  - pro/pm/pm-traditional/earned-value-management
  - pro/pm/pm-traditional/lessons-learned
  - pro/pm/pm-traditional/procurement-management
  - pro/pm/pm-traditional/project-closure
  - pro/pm/pm-traditional/quality-management
  - pro/pm/pm-traditional/resource-management
  - pro/pm/pm-traditional/scope-management
  - pro/pm/pm-traditional/stakeholder-engagement-advanced
  - pro/pm/project-manager/raci-matrix

success_criteria:
  - "Every scope item has written accept/reject"
  - "Final quality + EVM reports signed"
  - "Benefits-realisation report confirmed by client"
  - "Handover pack signed by receiving team"
  - "60-day follow-up call scheduled"

stages:
  - name: "Scope verification"
    intent: "Confirm every deliverable was delivered."
    tasks:
      - "Walk the scope register with the client"
      - "Sign off on each accepted deliverable"
      - "Document any scope variances + their rationale"
    methodologies:
      - slug: scope-management
        path: pro/pm/pm-traditional/scope-management
        required: true
        tier_gate: pro
      - slug: project-closure
        path: pro/pm/pm-traditional/project-closure
        required: true
        tier_gate: pro
    outputs:
      - "Signed scope acceptance log"
    decision_gate: "Advance when every scope item has a written accept/reject."
  - name: "Quality + cost reconciliation"
    intent: "Reconcile what we delivered vs what we baselined."
    tasks:
      - "Run a final quality review"
      - "Reconcile EVM final vs baselined cost"
      - "Note the variance + cause"
    methodologies:
      - slug: quality-management
        path: pro/pm/pm-traditional/quality-management
        required: true
        tier_gate: pro
      - slug: earned-value-management
        path: pro/pm/pm-traditional/earned-value-management
        required: true
        tier_gate: pro
      - slug: cost-estimation
        path: pro/pm/pm-traditional/cost-estimation
        required: true
        tier_gate: pro
    outputs:
      - "Final quality report"
      - "EVM closeout report"
    decision_gate: "Advance when both reports are signed by PM + delivery lead."
  - name: "Benefits realisation"
    intent: "Tell the client what they actually got."
    tasks:
      - "Pull the originally promised benefits"
      - "Measure what was actually realised"
      - "Write a benefits-realisation report"
    methodologies:
      - slug: benefits-realization
        path: pro/pm/pm-traditional/benefits-realization
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
    outputs:
      - "Benefits-realisation report"
    decision_gate: "Advance when the client confirms the benefits picture."
  - name: "Contracts + procurement close"
    intent: "Close every commercial obligation."
    tasks:
      - "Close out subcontractor and vendor commitments"
      - "Confirm final invoice + payment terms"
      - "Archive contracts per retention policy"
    methodologies:
      - slug: procurement-management
        path: pro/pm/pm-traditional/procurement-management
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
    outputs:
      - "Closed contracts log"
    decision_gate: "Advance when every commercial obligation has a close status."
  - name: "Handover docs"
    intent: "Hand the running system to its new owner."
    tasks:
      - "Build the handover pack (architecture, ops, decisions, gotchas)"
      - "Walk the pack with the receiving team"
      - "Get receiving-team sign-off"
    methodologies:
      - slug: raci-matrix
        path: pro/pm/project-manager/raci-matrix
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Signed handover pack"
    decision_gate: "Advance when receiving team signs the handover."
  - name: "Lessons learned"
    intent: "Capture the lessons before the team disperses."
    tasks:
      - "Run a structured retro with the delivery team"
      - "Tag lessons as 'do more', 'do less', 'do differently'"
      - "File lessons into the org knowledge base"
    methodologies:
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
      - slug: team-development
        path: pro/pm/pm-agile/team-development
        required: true
        tier_gate: pro
    outputs:
      - "Lessons-learned doc"
    decision_gate: "Advance when at least 5 actionable lessons are captured."
  - name: "Team release + account warmth"
    intent: "Release the team and keep the door open."
    tasks:
      - "Release team back to bench / next engagement"
      - "Send a closing note to the client sponsor"
      - "Schedule a 60-day follow-up call"
    methodologies:
      - slug: resource-management
        path: pro/pm/pm-traditional/resource-management
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
    outputs:
      - "Team release log"
      - "Closing client note"
    decision_gate: "Required: a 60-day follow-up call on the calendar."

