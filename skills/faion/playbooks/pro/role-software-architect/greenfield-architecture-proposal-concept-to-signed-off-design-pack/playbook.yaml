slug: greenfield-architecture-proposal-concept-to-signed-off-design-pack
title: "Greenfield architecture proposal — concept to signed-off design pack"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: eeae4a01a6e21a2c

tier_min: pro
complexity: deep
context: [solo, team]
persona: "software architect"
group: role-software-architect

intent: |
  Take an software architect from the trigger condition described in this playbook to the documented outcome, with every decision gate met in writing.

scope: |
  From blank slate to a reviewed, signed-off architecture pack: context + container diagrams, ADR set, quality-attribute scenarios, cost model, risk register. Stakeholders (product + eng leads + security) approve before any code is written.

summary: "From blank slate to a reviewed, signed-off architecture pack: context + container diagrams, ADR set, quality-attribute scenarios, cost model, risk register. Stakeholders (product + eng leads + security) approve before any code is written."

success_criteria:
  - "Greenfield architecture proposal — concept to signed-off design pack ships with written success criteria met and evidence attached"
  - "Baseline → post-change metric delta recorded against the relevant quality attribute"
  - "Rollback path rehearsed at least once and documented in the runbook"
  - "Decision doc (continue / iterate / revert) signed off by named owner"

methodology_refs:
  - pro/dev/code-quality/domain-driven-design
  - pro/dev/software-architect/observability-architecture
  - pro/dev/software-architect/quality-attributes-analysis
  - pro/dev/software-architect/reliability-architecture
