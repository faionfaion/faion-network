slug: productized-service-launch-4-week-sprint
title: "Productized service launch (4-week sprint)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 7dcf5ea4dedaaa7c

tier_min: pro
complexity: deep
context: [solo]
persona_hints: [P3]

intent: |
  Convert one repeated client problem into a fixed-price, fixed-scope offer with a landing page, a booking flow, and 3 paid pilots — moving the freelancer from per-hour to per-outcome billing.

scope: |
  Convert one repeated client problem into a fixed-price, fixed-scope offer with a landing page, a booking flow, and 3 paid pilots — moving the freelancer from per-hour to per-outcome billing.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Find the repeated pattern"
    intent: "Pick the one problem you have solved 3+ times."
    tasks:
      - "Audit last 12 months of client work"
      - "Identify problems you have repeated"
      - "Pick the most lucrative + repeatable one"
    methodologies:
      - slug: business-process-analysis
        path: pro/ba/business-analyst/business-process-analysis
        required: true
        tier_gate: pro
      - slug: growth-email-marketing
        path: solo/marketing/content-marketer/growth-email-marketing
        required: true
        tier_gate: pro
    outputs:
      - "Client work audit"
      - "Repeated problem list"
      - "Chosen problem"
    decision_gate: "Advance only when problem has been solved 3+ times."
  - name: "Productize the offer"
    intent: "Fixed scope, fixed price, fixed timeline."
    tasks:
      - "Define the deliverable list (no flex)"
      - "Set a single fixed price"
      - "Lock a fixed delivery window (e.g. 2 weeks)"
    methodologies:
      - slug: funnel-tactics-basics
        path: pro/marketing/conversion-optimizer/funnel-tactics-basics
        required: true
        tier_gate: pro
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: pro
    outputs:
      - "Productized canvas"
      - "Price card"
      - "Delivery window"
    decision_gate: "Advance only when offer fits on one page."
  - name: "Delivery system"
    intent: "Build the SOPs that make it repeatable."
    tasks:
      - "Document every delivery step"
      - "Create templates for common artifacts"
      - "Wire automation for repetitive parts"
    methodologies:
      - slug: growth-gtm-strategy
        path: pro/marketing/gtm-strategist/growth-gtm-strategy
        required: true
        tier_gate: pro
    outputs:
      - "Delivery SOP"
      - "Template library"
      - "Automation tickets"
    decision_gate: "Advance only when SOP can be executed without your custom thinking."
  - name: "Landing page"
    intent: "A landing built around outcomes, not hours."
    tasks:
      - "Write the landing copy from the customers desired outcome"
      - "Add proof: testimonials + case studies"
      - "Wire booking flow with calendar"
    methodologies:
      - slug: ops-financial-basics
        path: pro/marketing/gtm-strategist/ops-financial-basics
        required: true
        tier_gate: pro
    outputs:
      - "Landing live"
      - "Proof section"
      - "Booking flow"
    decision_gate: "Advance only when booking flow completes end-to-end."
  - name: "Pre-sell pilots"
    intent: "Land 3 paid pilots before the public push."
    tasks:
      - "Outreach to warm past clients first"
      - "Offer pilot pricing with a defined scope"
      - "Close 3 paid pilots"
    methodologies:
      - slug: competitive-positioning
        path: pro/product/product-manager/competitive-positioning
        required: true
        tier_gate: pro
    outputs:
      - "Pilot outreach log"
      - "Pilot pricing terms"
      - "3 signed pilots"
    decision_gate: "Advance only with 3 paid pilots in the pipeline."
  - name: "Run the pilots"
    intent: "Deliver flawlessly with the SOP."
    tasks:
      - "Execute the SOP for each pilot"
      - "Capture friction + improvements"
      - "Get written testimonials at the end"
    methodologies:
      - slug: feedback-management
        path: pro/product/product-manager/feedback-management
        required: true
        tier_gate: pro
    outputs:
      - "3 pilot deliveries"
      - "Friction log"
      - "Testimonials"
    decision_gate: "Advance only when all 3 pilots complete with positive testimonial."
  - name: "Refine + public launch"
    intent: "Tighten the offer, then go public."
    tasks:
      - "Tighten SOP based on pilot feedback"
      - "Update landing with new proof"
      - "Push outbound + content to ICP"
    methodologies:
      - slug: product-analytics
        path: pro/product/product-manager/product-analytics
        required: true
        tier_gate: pro
    outputs:
      - "Refined SOP"
      - "Updated landing"
      - "Outbound + content push log"
    decision_gate: "Advance only when public launch shipped to ICP."
  - name: "Switch billing model"
    intent: "Stop selling hours, start selling outcomes."
    tasks:
      - "Wind down hourly client contracts gracefully"
      - "Re-route new inquiries to the productized offer"
      - "Update bio + LinkedIn + Upwork"
    methodologies:
      - slug: frontend-design
        path: solo/dev/frontend-developer/frontend-design
        required: true
        tier_gate: pro
    outputs:
      - "Hourly wind-down plan"
      - "Routing rules"
      - "Profile updates"
    decision_gate: "Cycle closes when new inquiries default to the productized offer."
  - name: "Lessons + iterate"
    intent: "Update the playbook based on real revenue."
    tasks:
      - "Tally revenue per delivery"
      - "Compare to hourly equivalent"
      - "Decide: scale, raise price, or sunset"
    methodologies:
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: pro
    outputs:
      - "Revenue tally"
      - "Hourly comparison"
      - "Next-move decision"
    decision_gate: "Cycle closes when next-move is committed in writing."

token_budget_estimate: 22000

cli_invocations:
