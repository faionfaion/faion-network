slug: cold-lead-to-signed-contract-3-week-acquisition-flow
title: "Cold lead to signed contract (3-week acquisition flow)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 23153f76f9aeeb95

tier_min: pro
complexity: medium
context: [solo]
persona_hints: [P3]

intent: |
  From first outbound touch on Upwork/LinkedIn to a counter-signed SOW with deposit landing in escrow; pipeline of 3-5 qualified leads in parallel, one close per cycle.

scope: |
  From first outbound touch on Upwork/LinkedIn to a counter-signed SOW with deposit landing in escrow; pipeline of 3-5 qualified leads in parallel, one close per cycle.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Niche + positioning"
    intent: "Position as a specialist, not a generalist."
    tasks:
      - "Lock the freelance niche statement"
      - "Build a positioning one-liner"
      - "Update LinkedIn + Upwork profile copy"
    methodologies:
      - slug: acceptance-criteria
        path: pro/ba/business-analyst/acceptance-criteria
        required: true
        tier_gate: pro
      - slug: competitive-positioning
        path: pro/product/product-manager/competitive-positioning
        required: true
        tier_gate: pro
    outputs:
      - "Niche statement"
      - "Positioning one-liner"
      - "Profile updates"
    decision_gate: "Advance only when profile copy passes 3 outside readers."
  - name: "Lead sourcing"
    intent: "Build a fresh pipeline of 20 qualified prospects."
    tasks:
      - "Search Upwork + LinkedIn + niche communities"
      - "Filter by budget, industry, urgency"
      - "Add to a tracked pipeline"
    methodologies:
      - slug: elicitation-techniques
        path: pro/ba/business-analyst/elicitation-techniques
        required: true
        tier_gate: pro
      - slug: active-listening
        path: solo/comms/communicator/active-listening
        required: true
        tier_gate: pro
    outputs:
      - "Pipeline of 20 leads"
      - "Lead-scoring criteria"
      - "Tracker"
    decision_gate: "Advance only when pipeline has >=20 qualified leads."
  - name: "Cold outreach"
    intent: "Send 20 personalised messages."
    tasks:
      - "Write a personalised opener per lead"
      - "Reference a specific pain or signal"
      - "Schedule follow-ups at +3 and +7 days"
    methodologies:
      - slug: requirements-prioritization
        path: pro/ba/business-analyst/requirements-prioritization
        required: true
        tier_gate: pro
      - slug: difficult-conversations
        path: solo/comms/communicator/difficult-conversations
        required: true
        tier_gate: pro
    outputs:
      - "20 personalised messages"
      - "Follow-up schedule"
      - "Open + reply log"
    decision_gate: "Advance only when reply rate >=10%."
  - name: "Discovery calls"
    intent: "Active-listening calls, not pitch calls."
    tasks:
      - "Book 30-minute discovery slots"
      - "Run elicitation interviews to surface scope + budget"
      - "Qualify against ideal-client criteria"
    methodologies:
      - slug: growth-brand-positioning
        path: pro/marketing/gtm-strategist/growth-brand-positioning
        required: true
        tier_gate: pro
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: pro
    outputs:
      - "3-5 discovery calls"
      - "Notes per call"
      - "Qualify/disqualify decisions"
    decision_gate: "Advance only with >=3 qualified leads."
  - name: "Proposal + SOW"
    intent: "Send a proposal that closes itself."
    tasks:
      - "Draft a proposal from the template"
      - "Anchor pricing + scope + deliverables"
      - "Include legal MSA/SOW + payment terms"
    methodologies:
      - slug: growth-gtm-strategy
        path: pro/marketing/gtm-strategist/growth-gtm-strategy
        required: true
        tier_gate: pro
      - slug: negotiation
        path: solo/comms/communicator/negotiation
        required: true
        tier_gate: pro
    outputs:
      - "Proposal doc"
      - "MSA/SOW pack"
      - "Payment + escrow note"
    decision_gate: "Advance only when proposal is sent within 48h of discovery."
  - name: "Negotiate + close"
    intent: "Hold price, push deposit + escrow."
    tasks:
      - "Run negotiation calls with prepared anchors"
      - "Address common objections (price, timeline, team)"
      - "Lock the deposit terms"
    methodologies:
      - slug: ops-legal-basics
        path: pro/marketing/gtm-strategist/ops-legal-basics
        required: true
        tier_gate: pro
      - slug: stakeholder-communication
        path: solo/comms/communicator/stakeholder-communication
        required: true
        tier_gate: pro
    outputs:
      - "Negotiated terms"
      - "Objection-handling notes"
      - "Deposit terms"
    decision_gate: "Advance only when client agrees to deposit in escrow."
  - name: "Sign + escrow"
    intent: "Hand-off to delivery starts only on signed + paid."
    tasks:
      - "Send counter-signed SOW"
      - "Confirm deposit arrives in escrow"
      - "Kick off the project kickoff playbook"
    methodologies:
      - slug: ops-legal-compliance-checklist
        path: pro/marketing/gtm-strategist/ops-legal-compliance-checklist
        required: true
        tier_gate: pro
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: pro
    outputs:
      - "Counter-signed SOW"
      - "Escrow confirmation"
      - "Kickoff scheduled"
    decision_gate: "Cycle closes when signed + funded."

token_budget_estimate: 12000

