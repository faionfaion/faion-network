slug: specialty-niche-pivot-8-12-weeks-generalist-to-specialist
title: "Specialty niche pivot (8-12 weeks generalist to specialist)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 2f9c6f53d57a8236

tier_min: pro
complexity: deep
context: [solo]
persona_hints: [P3]

intent: |
  Move from generic 'full-stack dev' to a paid specialist position (e.

scope: |
  Move from generic 'full-stack dev' to a paid specialist position (e.g. headless-commerce on Shopify Hydrogen, or AI integrations for SMB SaaS) with 2 case studies, a tightened portfolio, and a 30-50% higher day rate.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Pick the niche"
    intent: "Use the niche scorecard, not a hunch."
    tasks:
      - "List candidate niches (e.g. headless commerce, AI integrations)"
      - "Score each on demand + supply + your fit"
      - "Pick one"
    methodologies:
      - slug: decision-analysis
        path: pro/ba/business-analyst/decision-analysis
        required: true
        tier_gate: pro
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: pro
    outputs:
      - "Candidate list"
      - "Score sheet"
      - "Chosen niche"
    decision_gate: "Advance only with one niche named and one scorecard filled."
  - name: "Buyer interviews"
    intent: "10 calls with people who pay specialists."
    tasks:
      - "Find 10 buyers in the niche"
      - "Run buyer-interview scripts"
      - "Capture buying triggers, vendors, budgets"
    methodologies:
      - slug: strategy-analysis-business-need
        path: pro/ba/business-analyst/strategy-analysis-business-need
        required: true
        tier_gate: pro
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: pro
    outputs:
      - "10 buyer interviews"
      - "Triggers + vendors log"
      - "Budget data"
    decision_gate: "Advance only when buying signal is concrete."
  - name: "Skill upgrade plan"
    intent: "Close the gap to a credible specialist."
    tasks:
      - "Map required skills against current ones"
      - "Pick 2-3 gaps to close in 8 weeks"
      - "Build with practice projects"
    methodologies:
      - slug: quality-attributes-analysis
        path: pro/dev/software-architect/quality-attributes-analysis
        required: true
        tier_gate: pro
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: pro
    outputs:
      - "Skill gap map"
      - "Learning plan"
      - "Practice projects"
    decision_gate: "Advance only when practice projects ship publicly."
  - name: "Case study harvest"
    intent: "Convert old work into niche-relevant case studies."
    tasks:
      - "Pick 2 past projects relevant to the niche"
      - "Re-write them as buyer-focused case studies"
      - "Add case-study clause to future contracts"
    methodologies:
      - slug: clean-architecture
        path: pro/dev/software-developer/clean-architecture
        required: true
        tier_gate: pro
      - slug: growth-podcast-strategy
        path: solo/marketing/content-marketer/growth-podcast-strategy
        required: true
        tier_gate: pro
    outputs:
      - "2 case studies"
      - "Updated portfolio"
      - "Case-study clause template"
    decision_gate: "Advance only when 2 case studies are publishable."
  - name: "Positioning overhaul"
    intent: "Re-write everything around the niche."
    tasks:
      - "Re-write LinkedIn, Upwork, website"
      - "Tighten the one-liner"
      - "Publish a niche manifesto post"
    methodologies:
      - slug: growth-brand-positioning
        path: pro/marketing/gtm-strategist/growth-brand-positioning
        required: true
        tier_gate: pro
      - slug: growth-seo-fundamentals
        path: solo/marketing/seo-manager/growth-seo-fundamentals
        required: true
        tier_gate: pro
    outputs:
      - "Updated profiles"
      - "New one-liner"
      - "Manifesto post"
    decision_gate: "Advance only when 3 outsiders can guess the niche from your profile."
  - name: "Content + topical authority"
    intent: "Publish in the niche, weekly."
    tasks:
      - "Pick 6-8 anchor topics"
      - "Publish weekly across X + LinkedIn + blog"
      - "Track keyword rankings + inbound DMs"
    methodologies:
      - slug: growth-press-coverage
        path: pro/marketing/gtm-strategist/growth-press-coverage
        required: true
        tier_gate: pro
      - slug: topical-authority
        path: solo/marketing/seo-manager/topical-authority
        required: true
        tier_gate: pro
    outputs:
      - "Topic plan"
      - "Weekly publish log"
      - "Keyword + DM metrics"
    decision_gate: "Advance only when weekly cadence runs 6+ weeks."
  - name: "Partnership + community"
    intent: "Get inside the niches gravity wells."
    tasks:
      - "Identify 2-3 communities + 1-2 strategic partners"
      - "Show up consistently + offer value"
      - "Pitch a podcast or guest post in the niche"
    methodologies:
      - slug: ops-partnership-strategy
        path: pro/marketing/gtm-strategist/ops-partnership-strategy
        required: true
        tier_gate: pro
      - slug: market-researcher
        path: solo/research/market-researcher
        required: true
        tier_gate: pro
    outputs:
      - "Community presence log"
      - "Partner intros"
      - "Podcast/guest post"
    decision_gate: "Advance only when at least one partner or podcast booking lands."
  - name: "Rate jump + first specialist clients"
    intent: "Land work at the new rate."
    tasks:
      - "Quote new clients at the higher rate"
      - "Hold firm on price during negotiation"
      - "Close 1-2 specialist engagements"
    methodologies:
      - slug: competitive-positioning
        path: pro/product/product-manager/competitive-positioning
        required: true
        tier_gate: pro
    outputs:
      - "New rate cards"
      - "Negotiation notes"
      - "1-2 specialist contracts"
    decision_gate: "Advance only when at least one client books at the new rate."
  - name: "Lock the pivot"
    intent: "Decline non-niche work and audit traction."
    tasks:
      - "Define explicit decline criteria for non-niche work"
      - "Run a quarterly traction audit"
      - "Commit to year-2 plan in the niche"
    methodologies:
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: pro
    outputs:
      - "Decline criteria"
      - "Traction audit"
      - "Year-2 plan"
    decision_gate: "Cycle closes when pivot is committed and non-niche work is being declined."

