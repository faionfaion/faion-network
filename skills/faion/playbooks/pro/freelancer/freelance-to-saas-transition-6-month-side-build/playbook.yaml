      - "Updated decision log entry for the verify step"
    decision_gate: "Advance to the next stage when the verify artefact is approved by the named owner; iterate if any blocker remains."
  - name: "Communicate"
    intent: "Tell every stakeholder what changed, what's next, and what they own."
    tasks:
      - "Restate the communicate outcome for this engagement in one sentence."
      - "Identify who owns the communicate output and who must approve it."
      - "Produce the communicate artefact in the agreed format."
    methodologies:
      - slug: activation-metrics
        path: pro/marketing/growth-marketer/activation-metrics
        required: true
        tier_gate: pro
      - slug: product-analytics
        path: pro/product/product-manager/product-analytics
        required: true
        tier_gate: pro
    outputs:
      - "Communicate artefact (written, signed off)"
      - "Updated decision log entry for the communicate step"
    decision_gate: "Advance to the next stage when the communicate artefact is approved by the named owner; iterate if any blocker remains."
  - name: "Close"
    intent: "Capture lessons, archive the artefacts, and trigger the next-step pipeline."
    tasks:
      - "Restate the close outcome for this engagement in one sentence."
      - "Identify who owns the close output and who must approve it."
      - "Produce the close artefact in the agreed format."
    methodologies:
      - slug: cohort-implementation
        path: pro/marketing/growth-marketer/cohort-implementation
        required: true
        tier_gate: pro
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
    outputs:
      - "Close artefact (written, signed off)"
      - "Updated decision log entry for the close step"
    decision_gate: "Advance to the next stage when the close artefact is approved by the named owner; iterate if any blocker remains."

