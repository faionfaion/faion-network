stages:
  - name: "Pull the Numbers"
    intent: "Cash, AR, AP, utilization — fresh today."
    tasks:
      - "Pull current bank balance and 13-week cash projection"
      - "Pull AR aging and AP aging"
      - "Pull contractor and founder utilization for the week"
    methodologies:
      - slug: "ops-contractor-management"
        path: "pro/marketing/gtm-strategist/ops-contractor-management"
        required: true
        tier_gate: "pro"
    outputs:
      - "bank + cash projection"
      - "AR + AP aging"
      - "utilization snapshot"
    decision_gate: "Advance only when all four numbers are current as of today."
  - name: "Diagnose"
    intent: "Find the one thing to fix this week."
    tasks:
      - "Compare runway to target; flag if <90 days"
      - "Look at AR aging; pick the chase-targets for Monday"
      - "Compare utilization to capacity; spot over- or under-loading"
    methodologies:
      - slug: "ops-financial-basics"
        path: "pro/marketing/gtm-strategist/ops-financial-basics"
        required: true
        tier_gate: "pro"
    outputs:
      - "runway flag"
      - "chase list"
      - "utilization deltas"
    decision_gate: "Advance when at most 3 items are tagged as this-week's focus."
  - name: "Act on the Top Item"
    intent: "One concrete move before Monday."
    tasks:
      - "Send chase emails or invoices owed"
      - "Move contractor / founder allocation if utilization is off"
      - "Log the move in the recurring-actions sheet"
    methodologies:
      - slug: "ops-tax-basics"
        path: "pro/marketing/gtm-strategist/ops-tax-basics"
        required: true
        tier_gate: "pro"
      - slug: "ops-financial-planning"
        path: "solo/marketing/gtm-strategist/ops-financial-planning"
        required: true
        tier_gate: "pro"
    outputs:
      - "chases sent"
      - "allocation changes"
      - "actions logged"
    decision_gate: "Required output: at least one written action sent today."
