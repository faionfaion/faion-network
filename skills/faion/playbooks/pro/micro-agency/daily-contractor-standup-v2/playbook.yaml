stages:
  - name: "Set Async Norms"
    intent: "Define what 'standup' means in Slack."
    tasks:
      - "Pick the channel, the time window, and the template"
      - "Decide what counts as a blocker that needs synchronous escalation"
      - "Tell every contractor in writing"
    methodologies:
      - slug: "scrum-ceremonies"
        path: "pro/pm/pm-agile/scrum-ceremonies"
        required: true
        tier_gate: "pro"
      - slug: "communications-management"
        path: "pro/pm/project-manager/communications-management"
        required: true
        tier_gate: "pro"
    outputs:
      - "written async norms"
      - "blocker rule"
      - "contractor acknowledgements"
    decision_gate: "Advance when every active contractor has acknowledged the norms."
  - name: "Run the Loop Daily"
    intent: "Hit the template every working day."
    tasks:
      - "Each contractor posts: yesterday, today, blockers — in template"
      - "Founder reads within the 2-hour window and unblocks where needed"
      - "Anything that exceeds the async window gets a same-day call"
    methodologies:
      - slug: "risk-management"
        path: "pro/pm/project-manager/risk-management"
        required: true
        tier_gate: "pro"
      - slug: "active-listening"
        path: "solo/comms/communicator/active-listening"
        required: true
        tier_gate: "pro"
    outputs:
      - "daily posts logged"
      - "founder unblocks logged"
      - "synchronous-call log"
    decision_gate: "Advance only when the loop has run 5 consecutive working days."
  - name: "Weekly Review"
    intent: "Use the week's posts as the operating signal."
    tasks:
      - "Aggregate the week's blockers and recurring overruns"
      - "Spot pattern blockers and fix them at the root"
      - "Adjust contractor scope where signal repeats"
    methodologies:
      - slug: "feedback"
        path: "solo/comms/communicator/feedback"
        required: true
        tier_gate: "pro"
      - slug: "stakeholder-communication"
        path: "solo/comms/communicator/stakeholder-communication"
        required: true
        tier_gate: "pro"
    outputs:
      - "blockers digest"
      - "root-fix list"
      - "scope adjustments"
    decision_gate: "Required output: a weekly written adjustment from the standup signal."
