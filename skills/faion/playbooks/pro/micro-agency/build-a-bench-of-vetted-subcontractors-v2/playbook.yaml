stages:
  - name: "Define the Bench Need"
    intent: "Which roles, how often, at what rate."
    tasks:
      - "List the 3-5 roles you most often need at short notice"
      - "Define ICP per role: stack, timezone, rate ceiling, language"
      - "Set the target bench size per role (2-3 vetted each)"
    methodologies:
      - slug: "onboarding"
        path: "pro/comms/hr-recruiter/onboarding"
        required: true
        tier_gate: "pro"
      - slug: "recruiting-process"
        path: "pro/comms/hr-recruiter/recruiting-process"
        required: true
        tier_gate: "pro"
    outputs:
      - "roles list"
      - "ICP-per-role doc"
      - "bench-size target"
    decision_gate: "Advance only when every role has an ICP and a target headcount."
  - name: "Source Candidates"
    intent: "Build the bench without becoming an agency-of-agencies."
    tasks:
      - "Run a small sourcing batch per role (referrals + 1 channel each)"
      - "Screen for stack, timezone, rate, and English fluency before interview"
      - "Send a paid test task to top 3 per role"
    methodologies:
      - slug: "star-interview-framework"
        path: "pro/comms/hr-recruiter/star-interview-framework"
        required: true
        tier_gate: "pro"
      - slug: "structured-interview-design"
        path: "pro/comms/hr-recruiter/structured-interview-design"
        required: true
        tier_gate: "pro"
    outputs:
      - "sourcing log per role"
      - "screening notes"
      - "paid test results"
    decision_gate: "Advance when each role has ≥2 candidates clearing the test bar."
  - name: "Sign & File"
    intent: "Make calls fast in the future."
    tasks:
      - "Sign master service agreements with each accepted bench contractor"
      - "Store rate cards, availability, and references in one place"
      - "Onboard them lightly: comms norms, IP, NDA"
    methodologies:
      - slug: "ops-contractor-basics"
        path: "pro/marketing/gtm-strategist/ops-contractor-basics"
        required: true
        tier_gate: "pro"
      - slug: "ops-contractor-management"
        path: "pro/marketing/gtm-strategist/ops-contractor-management"
        required: true
        tier_gate: "pro"
    outputs:
      - "signed MSAs"
      - "bench directory file"
      - "comms/IP/NDA acknowledgements"
    decision_gate: "Advance only when each role has ≥2 contractors with signed MSAs on file."
  - name: "Rotate & Refresh"
    intent: "Keep the bench warm without faking work."
    tasks:
      - "Run a one-line monthly check-in: still available, still same rate"
      - "Drop contractors who can't be reached or whose rate moved out of band"
      - "Refill any role whose bench drops below target"
    methodologies:
      - slug: "ops-legal-basics"
        path: "pro/marketing/gtm-strategist/ops-legal-basics"
        required: true
        tier_gate: "pro"
      - slug: "resource-management"
        path: "pro/pm/project-manager/resource-management"
        required: true
        tier_gate: "pro"
    outputs:
      - "monthly check-in log"
      - "drop list"
      - "refilled roles"
    decision_gate: "Required output: bench directory is current as of this month."
token_budget_estimate: 18000
