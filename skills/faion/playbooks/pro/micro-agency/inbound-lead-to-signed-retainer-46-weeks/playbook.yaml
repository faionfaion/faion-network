content_id: 4842bf0e2441c8e8

tier_min: pro
complexity: medium
context: [solo]
persona_hints: ["P5"]

intent: |
  From the initial trigger to the closed outcome described in scope, deliver every artefact named in success_criteria without skipping the decision gates between stages.

scope: |
  A cold inbound enquiry leaves the funnel either as a signed Statement-of-Work with deposit
   invoiced, or as a graceful 'not a fit' note that protects the agency's positioning. Bad-f
  it leads are filtered before they consume founder time.

summary: "Inbound lead to signed retainer (4–6 weeks) — A cold inbound enquiry leaves the funnel either as a signed Statement-of-Work with deposit invoiced, or as a graceful 'not a fit' note that protects th..."

success_criteria:
  - "Every stage's decision gate is recorded as passed before the next stage starts."
  - "All artefacts named in the stage outputs are produced and signed off."
  - "A written close-out record exists for archival and post-mortem."

token_budget_estimate: 15000

stages:
