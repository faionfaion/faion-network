summary: |
  Get a 2–3 person agency to a state where it is sellable to a strategic buyer, an acqui-hirer, or transferable to a manager-operator within 6–12 months. Even if not selling, the same prep removes founder from the critical path.
content_id: "f8defdbbc4b16b11"
tier_min: "pro"
context:
  - "team"
intent: |
  Get a 2–3 person agency to a state where it is sellable to a strategic buyer, an acqui-hirer, or transferable to a manager-operator within 6–12 months. Even if not selling, the same prep removes founder from the critical path.
scope: |
  Get a 2–3 person agency to a state where it is sellable to a strategic buyer, an acqui-hirer, or transferable to a manager-operator within 6–12 months. Even if not selling, the same prep removes founder from the critical path.
success_criteria:
  - "All 5 stages have written outputs in the project record"
  - "Each stage's decision gate was answered before advancing (yes / no in writing)"
  - "Final stage produced the required written decision artifact"
  - "Every methodology reference loaded cleanly via `faion get-content`"
methodology_refs:
  - "ops-annual-planning-process"
  - "ops-financial-basics"
  - "ops-legal-basics"
  - "ops-legal-compliance-checklist"
  - "ops-partnership-strategy"
  - "product-operations"
stages:
  - name: "Decide the Path"
    intent: "Acquisition vs graceful walk-away — pick one."
    tasks:
      - "Score: do I want a buyer or do I want to shut down cleanly"
      - "Set the target outcome (sale price, walk-away timeline)"
      - "Tell the founder advisors and start the clock"
    methodologies:
      - slug: "ops-annual-planning-process"
        path: "pro/marketing/gtm-strategist/ops-annual-planning-process"
        required: true
        tier_gate: "pro"
    outputs:
      - "path decision"
      - "target outcome memo"
      - "advisors briefed"
    decision_gate: "Advance when the path is written down with a deadline."
  - name: "Tighten the Books"
    intent: "A buyer (or your own clean exit) needs clean financials."
    tasks:
      - "Reconcile last 24 months of revenue, costs, and ownership"
      - "Separate founder personal expenses from agency books"
      - "Produce a clean P&L + balance sheet review"
    methodologies:
      - slug: "ops-financial-basics"
        path: "pro/marketing/gtm-strategist/ops-financial-basics"
        required: true
        tier_gate: "pro"
    outputs:
      - "reconciled 24-mo books"
      - "clean P&L + BS"
      - "advisor review"
    decision_gate: "Advance only when the books pass an independent advisor review."
  - name: "Document the Operating System"
    intent: "Make the business runnable without you."
    tasks:
      - "Document SOPs, client contracts, vendor list, and IP"
      - "Identify single-points-of-failure (you) and write the bench / replacement plan"
      - "Draft an org-and-systems map"
    methodologies:
      - slug: "ops-legal-basics"
        path: "pro/marketing/gtm-strategist/ops-legal-basics"
        required: true
        tier_gate: "pro"
    outputs:
      - "SOP repository"
      - "SPOF + bench map"
      - "org-and-systems map"
    decision_gate: "Advance when a deputy could run delivery for 30 days using these docs."
  - name: "Build the Pitch or Wind-Down Plan"
    intent: "Outcome-specific package."
    tasks:
      - "If acquisition: build the data room and the seller deck"
      - "If walk-away: write the client handover and contract termination plan"
      - "Get advisor signoff on the pitch or wind-down plan"
    methodologies:
      - slug: "ops-legal-compliance-checklist"
        path: "pro/marketing/gtm-strategist/ops-legal-compliance-checklist"
        required: true
        tier_gate: "pro"
    outputs:
      - "data room + seller deck OR handover plan"
      - "advisor signoff"
    decision_gate: "Advance only when advisor signs off in writing."
  - name: "Execute"
    intent: "Hit the timeline."
    tasks:
      - "Talk to 5-10 qualified buyers OR run the wind-down per plan"
      - "Negotiate or finalize handovers; close any open scope cleanly"
      - "Sign the deal or sign the agency closed"
    methodologies:
      - slug: "ops-partnership-strategy"
        path: "pro/marketing/gtm-strategist/ops-partnership-strategy"
        required: true
        tier_gate: "pro"
      - slug: "product-operations"
        path: "pro/product/product-operations/product-operations"
        required: true
        tier_gate: "pro"
    outputs:
      - "buyer conversations log OR handover log"
      - "signed deal OR closure record"
    decision_gate: "Required output: written closure — sold, signed, or shut down."
token_budget_estimate: 18000
