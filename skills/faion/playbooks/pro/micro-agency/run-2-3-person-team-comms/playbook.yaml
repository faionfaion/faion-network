stages:
  - name: "Set the Operating Cadence"
    intent: "No full-time PM, so cadence does the PM's job."
    tasks:
      - "Pick 1 sync per week + daily async standup"
      - "Pick 1 shared decision log + 1 backlog source-of-truth"
      - "Write the cadence one-pager and pin it"
    methodologies:
      - slug: "ops-contractor-management"
        path: "pro/marketing/gtm-strategist/ops-contractor-management"
        required: true
        tier_gate: "pro"
    outputs:
      - "cadence one-pager"
      - "decision log set up"
      - "single backlog"
    decision_gate: "Advance only when every team member has acknowledged the one-pager."
  - name: "Run It for 2 Weeks"
    intent: "Make the cadence real before tuning it."
    tasks:
      - "Hold the sync; respect the time-box (≤45 minutes)"
      - "Use the async standup template daily"
      - "Log every decision and every blocker, no exceptions"
    methodologies:
      - slug: "communications-management"
        path: "pro/pm/project-manager/communications-management"
        required: true
        tier_gate: "pro"
    outputs:
      - "2-week sync notes"
      - "daily standup logs"
      - "decision + blocker log"
    decision_gate: "Advance when the cadence has held for 2 consecutive weeks."
  - name: "Diagnose & Tune"
    intent: "Cut anything that's not pulling weight."
    tasks:
      - "Ask each team member what they would drop, change, or add"
      - "Cut one meeting or one document if usage is low"
      - "Lock the tuned cadence as the new baseline"
    methodologies:
      - slug: "lessons-learned"
        path: "pro/pm/project-manager/lessons-learned"
        required: true
        tier_gate: "pro"
      - slug: "stakeholder-engagement"
        path: "pro/pm/project-manager/stakeholder-engagement"
        required: true
        tier_gate: "pro"
    outputs:
      - "team feedback notes"
      - "cut list"
      - "tuned cadence one-pager"
    decision_gate: "Required output: a written tuned cadence the team has agreed to."
