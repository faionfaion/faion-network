        required: true
        tier_gate: "pro"
      - slug: "trend-analysis"
        path: "pro/research/market-researcher/trend-analysis"
        required: true
        tier_gate: "pro"
    outputs:
      - "kickoff deck"
      - "client comms log"
      - "quarterly review calendar"
    decision_gate: "Required output: every active client has been told what changed."
