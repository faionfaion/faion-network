stages:
  - name: "Close the Books"
    intent: "Get last-year's numbers final and clean."
    tasks:
      - "Reconcile all invoices, expenses, and contractor payouts"
      - "Run end-of-year tax-and-legal close with your accountant"
      - "Lock the books and snapshot the P&L"
    methodologies:
      - slug: "privacy-compliance"
        path: "pro/marketing/growth-marketer/privacy-compliance"
        required: true
        tier_gate: "pro"
      - slug: "growth-brand-positioning"
        path: "pro/marketing/gtm-strategist/growth-brand-positioning"
        required: true
        tier_gate: "pro"
      - slug: "growth-gtm-strategy"
        path: "pro/marketing/gtm-strategist/growth-gtm-strategy"
        required: true
        tier_gate: "pro"
    outputs:
      - "reconciled ledger"
      - "tax+legal close memo"
      - "locked P&L"
    decision_gate: "Advance only when books are closed and P&L is signed off."
  - name: "Compute Capacity & Margin"
    intent: "Know what you actually have to invest."
    tasks:
      - "Compute capacity in billable hours and ICP-day-rate"
      - "Compute net margin per offering and per client"
      - "Decide which offerings to grow, hold, or drop"
    methodologies:
      - slug: "ops-annual-planning-process"
        path: "pro/marketing/gtm-strategist/ops-annual-planning-process"
        required: true
        tier_gate: "pro"
      - slug: "ops-annual-planning-templates"
        path: "pro/marketing/gtm-strategist/ops-annual-planning-templates"
        required: true
        tier_gate: "pro"
      - slug: "ops-contractor-management"
        path: "pro/marketing/gtm-strategist/ops-contractor-management"
        required: true
        tier_gate: "pro"
    outputs:
      - "capacity model"
      - "margin-by-offering table"
      - "grow/hold/drop list"
    decision_gate: "Advance when every offering has a documented grow/hold/drop call."
  - name: "Set Annual Plan"
    intent: "Outcomes, not vibes."
    tasks:
      - "Set 3-5 annual outcomes with measurable targets"
      - "Cascade outcomes into quarterly milestones"
      - "Pre-commit capacity and budget per outcome"
    methodologies:
      - slug: "ops-financial-basics"
        path: "pro/marketing/gtm-strategist/ops-financial-basics"
        required: true
        tier_gate: "pro"
      - slug: "ops-legal-basics"
        path: "pro/marketing/gtm-strategist/ops-legal-basics"
        required: true
        tier_gate: "pro"
      - slug: "ops-legal-compliance"
        path: "pro/marketing/gtm-strategist/ops-legal-compliance"
        required: true
        tier_gate: "pro"
    outputs:
      - "annual plan doc"
      - "quarterly milestones"
      - "outcome-to-capacity map"
    decision_gate: "Advance when every outcome has a quarterly milestone and budgeted capacity."
  - name: "Re-price & Renew"
    intent: "New year, new pricing."
    tasks:
      - "Decide which clients get a rate adjustment this quarter"
      - "Send adjustment notices with enough notice to be fair"
      - "Sign renewed retainers / scopes at the new rates"
    methodologies:
      - slug: "ops-legal-compliance-checklist"
        path: "pro/marketing/gtm-strategist/ops-legal-compliance-checklist"
        required: true
        tier_gate: "pro"
      - slug: "ops-partnership-strategy"
        path: "pro/marketing/gtm-strategist/ops-partnership-strategy"
        required: true
        tier_gate: "pro"
      - slug: "ops-tax-basics"
        path: "pro/marketing/gtm-strategist/ops-tax-basics"
        required: true
        tier_gate: "pro"
    outputs:
      - "adjustment plan"
      - "sent notices"
      - "signed renewals"
    decision_gate: "Advance only when adjustment notices are out AND renewals start landing."
  - name: "Kickoff & Communicate"
    intent: "Tell the team and clients what changed."
    tasks:
      - "Hold the all-hands annual kickoff covering plan and changes"
      - "Send client newsletter or 1:1s with anything that affects them"
      - "Set the quarterly review cadence on the calendar"
    methodologies:
      - slug: "ops-tax-compliance"
        path: "pro/marketing/gtm-strategist/ops-tax-compliance"
        required: true
        tier_gate: "pro"
      - slug: "predictive-analytics-pm"
