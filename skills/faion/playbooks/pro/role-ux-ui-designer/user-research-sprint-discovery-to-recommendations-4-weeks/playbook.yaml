slug: user-research-sprint-discovery-to-recommendations-4-weeks
title: "User research sprint: discovery to recommendations (4 weeks)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: edb553bc15307d8e

tier: pro
tier_min: pro
group: role-ux-ui-designer
persona: UX researcher / designer-researcher running a 4-week discovery cycle
complexity: medium
context: [solo, team]

summary: |
  Closed-loop 4-week discovery cycle for one product area: signed plan, fieldwork, synthesis, prioritized opportunity tree.

intent: |
  Open product question -> prioritized opportunity tree ready for design/PM to action.

scope: |
  UX research lead runs a 4-week closed-loop discovery on one product area. Includes scoping + plan sign-off, mixed-methods fieldwork (interviews + survey + contextual inquiry), synthesis with affinity diagramming, and a stakeholder readout that hands a prioritized opportunity tree to design and PM. Done when stakeholders accept the opportunity tree and at least one opportunity is queued in the product backlog.

success_criteria:
  - "Research plan signed off by sponsor before week 2"
  - "Mixed-methods fieldwork completed: interviews + survey + at least 1 contextual visit"
  - "Opportunity tree synthesized and presented"
  - "At least one opportunity queued in the product backlog"
  - "Research artifacts filed in the repository"

methodology_refs:
  - faion/knowledge/geek/ux/user-researcher/ai-interview-analysis
  - faion/knowledge/pro/research/researcher/continuous-discovery
  - faion/knowledge/pro/ux/user-researcher/audience-segmentation
  - faion/knowledge/pro/ux/user-researcher/opportunity-solution-trees
  - faion/knowledge/pro/ux/user-researcher/survey-design
  - faion/knowledge/pro/ux/ux-researcher/contextual-inquiry
  - faion/knowledge/pro/ux/ux-researcher/diary-study-basics
  - faion/knowledge/pro/ux/ux-researcher/diary-study-execution
  - faion/knowledge/solo/ux/user-researcher/jobs-to-be-done
  - faion/knowledge/solo/ux/user-researcher/pain-point-research
  - faion/knowledge/solo/ux/user-researcher/success-metrics-definition
  - faion/knowledge/solo/ux/user-researcher/use-case-mapping
  - faion/knowledge/solo/ux/user-researcher/user-interviews-methods
  - faion/knowledge/solo/ux/user-researcher/value-proposition-design

stages:
  - name: "Scope + plan"
    intent: "Lock the research question and method mix before recruiting."
    tasks:
      - "Write a 1-page research brief: question, decisions it informs, audience"
      - "Pick method mix (interviews + survey + contextual)"
      - "Get sponsor sign-off before recruiting"
    methodologies:
      - slug: continuous-discovery
        path: pro/research/researcher/continuous-discovery
        required: true
        tier_gate: pro
      - slug: audience-segmentation
        path: pro/ux/user-researcher/audience-segmentation
        required: true
        tier_gate: pro
      - slug: success-metrics-definition
        path: solo/ux/user-researcher/success-metrics-definition
        required: true
        tier_gate: solo
    outputs:
      - "Signed research plan"
    decision_gate: |
      Advance only after sponsor sign-off.
  - name: "Recruit"
    intent: "The right participants, in time, with consent."
    tasks:
      - "Define screener criteria from audience segments"
      - "Recruit 8-12 interview participants + survey panel"
      - "Confirm consent + compensation"
    methodologies:
      - slug: audience-segmentation
        path: pro/ux/user-researcher/audience-segmentation
        required: true
        tier_gate: pro
      - slug: survey-design
        path: pro/ux/user-researcher/survey-design
        required: true
        tier_gate: pro
    outputs:
      - "Recruited cohort + consent records"
    decision_gate: |
      Advance when target sample is confirmed.
  - name: "Fieldwork"
    intent: "Mixed-methods data collection across the cohort."
    tasks:
      - "Run interviews + contextual inquiry sessions"
      - "Launch survey + open responses"
      - "Optional: short diary study where behaviour over time matters"
    methodologies:
      - slug: user-interviews-methods
        path: solo/ux/user-researcher/user-interviews-methods
        required: true
        tier_gate: solo
      - slug: contextual-inquiry
        path: pro/ux/ux-researcher/contextual-inquiry
        required: true
        tier_gate: pro
      - slug: diary-study-basics
        path: pro/ux/ux-researcher/diary-study-basics
        required: true
        tier_gate: pro
      - slug: diary-study-execution
        path: pro/ux/ux-researcher/diary-study-execution
        required: true
        tier_gate: pro
      - slug: survey-design
        path: pro/ux/user-researcher/survey-design
        required: true
        tier_gate: pro
    outputs:
      - "Raw artifacts + transcripts in the repo"
    decision_gate: |
      Advance only when sample is sufficient (saturation on top themes).
  - name: "AI-assisted analysis"
    intent: "Code the qualitative data fast without losing signal."
    tasks:
      - "Run AI transcript analysis for pattern detection"
      - "Human-review the AI codes; reject false positives"
      - "Cross-reference survey results to confirm patterns"
    methodologies:
      - slug: ai-interview-analysis
        path: geek/ux/user-researcher/ai-interview-analysis
        required: true
        tier_gate: geek
      - slug: pain-point-research
        path: solo/ux/user-researcher/pain-point-research
        required: true
        tier_gate: solo
      - slug: jobs-to-be-done
        path: solo/ux/user-researcher/jobs-to-be-done
        required: true
        tier_gate: solo
    outputs:
      - "Tagged insight bank with evidence per code"
    decision_gate: |
      Advance only when each insight has >=3 evidence points.
  - name: "Opportunity tree"
    intent: "Convert insights into a structured opportunity tree."
    tasks:
      - "Map insights to outcomes, opportunities, solutions"
      - "Rank opportunities by impact + confidence + effort"
      - "Define success metrics per top opportunity"
    methodologies:
      - slug: opportunity-solution-trees
        path: pro/ux/user-researcher/opportunity-solution-trees
        required: true
        tier_gate: pro
      - slug: value-proposition-design
        path: solo/ux/user-researcher/value-proposition-design
        required: true
        tier_gate: solo
      - slug: use-case-mapping
        path: solo/ux/user-researcher/use-case-mapping
        required: true
        tier_gate: solo
      - slug: success-metrics-definition
        path: solo/ux/user-researcher/success-metrics-definition
        required: true
        tier_gate: solo
    outputs:
      - "Prioritized opportunity tree"
    decision_gate: |
      Advance after design + PM can articulate the top 3 opportunities.
  - name: "Readout + handoff"
    intent: "Stakeholders accept and use the findings."
    tasks:
      - "Run a 1h readout with sponsor + design + PM"
      - "File full report + raw artifacts in the repo"
      - "Queue at least one opportunity in the product backlog"
    methodologies:
      - slug: continuous-discovery
        path: pro/research/researcher/continuous-discovery
        required: true
        tier_gate: pro
      - slug: opportunity-solution-trees
        path: pro/ux/user-researcher/opportunity-solution-trees
        required: true
        tier_gate: pro
    outputs:
      - "Report filed + backlog entry created"
    decision_gate: |
      Done when sponsor accepts and a backlog entry exists.

common_pitfalls:
  - "Skipping sponsor sign-off -> readout met with 'we already knew that'"
  - "Over-reliance on AI codes without human review -> false patterns"
  - "No opportunity queued in backlog -> research dies on the shelf"

quality_checklist:
  - "Could design + PM build from the opportunity tree without re-asking?"
  - "Is each insight supported by >=3 evidence points?"
  - "Are artifacts filed so the next researcher can re-use?"

