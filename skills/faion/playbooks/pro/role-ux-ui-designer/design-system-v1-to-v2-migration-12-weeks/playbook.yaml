slug: design-system-v1-to-v2-migration-12-weeks
title: "Design system v1 to v2 migration (12 weeks)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 44c127ad515be9fb

tier: pro
tier_min: pro
group: role-ux-ui-designer
persona: Design-system lead in a P6 product team
complexity: deep
context: [team]

summary: |
  Token + component library evolved to v2: semantic + modes taxonomy, versioned components, consumer apps migrated, drift dashboard live.

intent: |
  v1 token/component library -> v2 with semantic tokens, modes, versioned components, migrated consumers, drift dashboard.

scope: |
  Design-system lead migrates a multi-app system from v1 to v2 over 12 weeks. Includes taxonomy refactor, semantic + mode tokens, component versioning, consumer migration, Storybook + docs refresh, governance, and a drift dashboard. Done when all priority consumer apps are on v2, drift remains under threshold for 4 weeks, and governance ceremony is running.

success_criteria:
  - "Token taxonomy refactored to semantic + modes (W3C-compliant)"
  - "All priority consumer apps migrated to v2"
  - "Storybook + docs updated and current"
  - "Drift dashboard live + under threshold for 4 consecutive weeks"
  - "Governance ceremony running monthly"

methodology_refs:
  - faion/knowledge/geek/ux/ui-designer/ai-enhanced-design-systems
  - faion/knowledge/geek/ux/ui-designer/figma-ai-ecosystem
  - faion/knowledge/pro/ux/accessibility-specialist/accessibility-first-design
  - faion/knowledge/pro/ux/ui-designer/cross-platform-token-distribution
  - faion/knowledge/pro/ux/ui-designer/design-system-success-factors
  - faion/knowledge/pro/ux/ui-designer/semantic-tokens-and-modes
  - faion/knowledge/pro/ux/ui-designer/token-organization
  - faion/knowledge/pro/ux/ui-designer/w3c-design-tokens-standard
  - faion/knowledge/solo/ux/ui-designer/design-tokens-fundamentals
  - faion/knowledge/solo/ux/ui-designer/tailwind-design-tokens
  - faion/knowledge/solo/ux/ux-ui-designer/consistency-standards
  - faion/knowledge/solo/ux/ux-ui-designer/content-audit
  - faion/knowledge/solo/ux/ux-ui-designer/design-critique

stages:
  - name: "Audit v1"
    intent: "Know what you are about to break."
    tasks:
      - "Inventory tokens + components in v1"
      - "Run a content audit across consumer apps"
      - "List apps + their token versions"
    methodologies:
      - slug: token-organization
        path: pro/ux/ui-designer/token-organization
        required: true
        tier_gate: pro
      - slug: content-audit
        path: solo/ux/ux-ui-designer/content-audit
        required: true
        tier_gate: solo
    outputs:
      - "v1 audit report"
    decision_gate: |
      Advance when every consumer app has a documented v1 footprint.
  - name: "v2 taxonomy"
    intent: "Design the semantic + mode token model."
    tasks:
      - "Define semantic token tiers (core / alias / component)"
      - "Add light/dark + density modes"
      - "Pick a W3C-compliant token format"
    methodologies:
      - slug: semantic-tokens-and-modes
        path: pro/ux/ui-designer/semantic-tokens-and-modes
        required: true
        tier_gate: pro
      - slug: w3c-design-tokens-standard
        path: pro/ux/ui-designer/w3c-design-tokens-standard
        required: true
        tier_gate: pro
      - slug: design-tokens-fundamentals
        path: solo/ux/ui-designer/design-tokens-fundamentals
        required: true
        tier_gate: solo
    outputs:
      - "v2 token taxonomy spec"
    decision_gate: |
      Advance only when token tiers + modes are reviewed and signed off.
  - name: "v2 components"
    intent: "Version components against new tokens."
    tasks:
      - "Rebuild base components on v2 tokens"
      - "Version components (semver) with breaking change notes"
      - "Update Storybook + docs as source of truth"
    methodologies:
      - slug: design-system-success-factors
        path: pro/ux/ui-designer/design-system-success-factors
        required: true
        tier_gate: pro
      - slug: consistency-standards
        path: solo/ux/ux-ui-designer/consistency-standards
        required: true
        tier_gate: solo
      - slug: accessibility-first-design
        path: pro/ux/accessibility-specialist/accessibility-first-design
        required: true
        tier_gate: pro
    outputs:
      - "Versioned v2 component library"
    decision_gate: |
      Advance only when each base component has a versioned v2 release.
  - name: "Token distribution"
    intent: "Tokens land cleanly across iOS / Android / Web / Tailwind."
    tasks:
      - "Wire token build to all platforms"
      - "Add Tailwind preset for web teams"
      - "Smoke-test on a sample app per platform"
    methodologies:
      - slug: cross-platform-token-distribution
        path: pro/ux/ui-designer/cross-platform-token-distribution
        required: true
        tier_gate: pro
      - slug: tailwind-design-tokens
        path: solo/ux/ui-designer/tailwind-design-tokens
        required: true
        tier_gate: solo
    outputs:
      - "Multi-platform token build green"
    decision_gate: |
      Advance only when sample apps render correctly on every platform.
  - name: "Consumer migration"
    intent: "Roll consumer apps onto v2."
    tasks:
      - "Migrate flagship app first; document patterns"
      - "Open PRs for remaining apps with codemods"
      - "Pair with each app team for cutover"
    methodologies:
      - slug: design-system-success-factors
        path: pro/ux/ui-designer/design-system-success-factors
        required: true
        tier_gate: pro
      - slug: ai-enhanced-design-systems
        path: geek/ux/ui-designer/ai-enhanced-design-systems
        required: true
        tier_gate: geek
      - slug: figma-ai-ecosystem
        path: geek/ux/ui-designer/figma-ai-ecosystem
        required: true
        tier_gate: geek
    outputs:
      - "All priority apps on v2"
    decision_gate: |
      Advance when migration percentage hits >=90% of priority apps.
  - name: "Drift dashboard"
    intent: "Detect regressions early."
    tasks:
      - "Wire drift scan (visual + token coverage) on PRs"
      - "Publish a live dashboard with drift metrics"
      - "Define drift threshold + alert rules"
    methodologies:
      - slug: design-system-success-factors
        path: pro/ux/ui-designer/design-system-success-factors
        required: true
        tier_gate: pro
      - slug: design-critique
        path: solo/ux/ux-ui-designer/design-critique
        required: true
        tier_gate: solo
    outputs:
      - "Drift dashboard live"
    decision_gate: |
      Advance only when dashboard runs on every PR and produces alerts.
  - name: "Governance"
    intent: "v2 stays healthy without you in the loop daily."
    tasks:
      - "Stand up monthly design-system governance review"
      - "Define proposal -> review -> ship process for changes"
      - "Publish deprecation policy for v1"
    methodologies:
      - slug: design-system-success-factors
        path: pro/ux/ui-designer/design-system-success-factors
        required: true
        tier_gate: pro
    outputs:
      - "Governance running; v1 deprecation timeline published"
    decision_gate: |
      Done when governance cycle has run twice without escalation.

common_pitfalls:
  - "Token tiers chosen ad-hoc -> renaming churn through migration"
  - "Codemods skipped -> consumer app migrations stall"
  - "Governance left informal -> v2 drifts back to v1 patterns"

quality_checklist:
  - "Are tokens the only source of visual decisions?"
  - "Is drift staying under threshold for >=4 weeks?"
  - "Is governance running on cadence?"

related_playbooks:
  - zero-to-one-product-design-brief-to-dev-handoff-8-weeks
  - design-system-as-code-lifecycle-tokens-storybook-figma-library-pr-governance

