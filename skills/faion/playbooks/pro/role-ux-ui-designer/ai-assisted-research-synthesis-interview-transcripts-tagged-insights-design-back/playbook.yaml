slug: ai-assisted-research-synthesis-interview-transcripts-tagged-insights-design-back
title: "AI-assisted research synthesis: transcripts to tagged insights to backlog"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 05752c0cd8b72dc8

tier: pro
tier_min: pro
group: role-ux-ui-designer
persona: Designer/researcher synthesizing N interviews into a tagged insight bank
complexity: medium
context: [solo, team]

summary: |
  Designer comes out of N user interviews with raw audio/transcripts; ends with a tagged insight bank + a prioritized list of design problems queued for the next sprint.

intent: |
  Pile of raw interview audio -> tagged insight bank + prioritized design backlog.

scope: |
  Designer or researcher synthesizes a batch of N interviews using an AI pipeline plus human validation. Includes ingestion, AI tagging, human triage, affinity diagramming, thematic analysis, mixed-methods triangulation, repository update, and backlog tickets. Done when insights are filed and tickets are queued.

success_criteria:
  - "All interviews ingested + transcribed"
  - "AI codes human-validated"
  - "Themes have >=3 evidence points"
  - "Design backlog tickets created for top themes"
  - "Research repository updated with insights"

methodology_refs:
  - faion/knowledge/geek/ux/user-researcher/ai-interview-analysis
  - faion/knowledge/pro/ux/ux-researcher/contextual-inquiry
  - faion/knowledge/solo/ux/ux-researcher/user-interviews

stages:
  - name: "Ingest"
    intent: "Get audio + transcripts into one place."
    tasks:
      - "Upload audio + auto-transcribe"
      - "Apply consistent file naming"
      - "Confirm consent flags + retention"
    methodologies:
      - slug: user-interviews
        path: solo/ux/ux-researcher/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "Ingested batch + transcripts"
    decision_gate: |
      Advance only when all interviews are ingested.
  - name: "AI code"
    intent: "Tag patterns at scale."
    tasks:
      - "Run AI tagging across transcripts"
      - "Capture sentiment + topic markers"
      - "Save AI output to working file"
    methodologies:
      - slug: ai-interview-analysis
        path: geek/ux/user-researcher/ai-interview-analysis
        required: true
        tier_gate: geek
    outputs:
      - "AI code working file"
    decision_gate: |
      Advance only after AI run completes.
  - name: "Human triage"
    intent: "Reject false positives."
    tasks:
      - "Spot-check AI codes vs source"
      - "Reject + correct false positives"
      - "Capture missed themes"
    methodologies:
      - slug: ai-interview-analysis
        path: geek/ux/user-researcher/ai-interview-analysis
        required: true
        tier_gate: geek
      - slug: contextual-inquiry
        path: pro/ux/ux-researcher/contextual-inquiry
        required: true
        tier_gate: pro
    outputs:
      - "Validated code set"
    decision_gate: |
      Advance only when validation rate is >=80%.
  - name: "Affinity + thematic"
    intent: "Group codes into themes with structure."
    tasks:
      - "Affinity-cluster codes"
      - "Apply thematic analysis pass"
      - "Rank themes by frequency + severity"
    methodologies:
      - slug: contextual-inquiry
        path: pro/ux/ux-researcher/contextual-inquiry
        required: true
        tier_gate: pro
      - slug: user-interviews
        path: solo/ux/ux-researcher/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "Ranked themes"
    decision_gate: |
      Advance only when each theme has >=3 evidence points.
  - name: "Triangulate"
    intent: "Cross-check with other data sources."
    tasks:
      - "Cross-reference with survey + analytics"
      - "Strengthen or down-rank themes accordingly"
      - "Document any mixed-signal themes"
    methodologies:
      - slug: ai-interview-analysis
        path: geek/ux/user-researcher/ai-interview-analysis
        required: true
        tier_gate: geek
      - slug: user-interviews
        path: solo/ux/ux-researcher/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "Triangulated themes"
    decision_gate: |
      Advance only when triangulation pass is recorded.
  - name: "Repo + tickets"
    intent: "Make the synthesis usable next sprint."
    tasks:
      - "Update the research repository"
      - "Open design backlog tickets per top theme"
      - "Brief design + PM on top themes"
    methodologies:
      - slug: user-interviews
        path: solo/ux/ux-researcher/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "Repo updated + backlog tickets"
    decision_gate: |
      Done when top themes have tickets.

common_pitfalls:
  - "Accepting AI codes blindly -> phantom themes"
  - "No triangulation -> over-weighting interview noise"
  - "No tickets -> synthesis dies on the shelf"

quality_checklist:
  - "Is validation rate >=80%?"
  - "Are themes backed by >=3 evidence?"
  - "Did top themes become backlog tickets?"

related_playbooks:
  - user-research-sprint-discovery-to-recommendations-4-weeks
  - research-insight-synthesis-2hrweek

token_budget_estimate: 6500
cli_invocations:
  human:  "faion get-content ai-assisted-research-synthesis-interview-transcripts-tagged-insights-design-back --format md"
  agent:  "faion get-content ai-assisted-research-synthesis-interview-transcripts-tagged-insights-design-back --format context"
  json:   "faion get-content ai-assisted-research-synthesis-interview-transcripts-tagged-insights-design-back --format json"

