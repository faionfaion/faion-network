slug: pricing-experiment-hypothesis-to-result
title: "Pricing experiment, hypothesis to result"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: cba18a4cca93842f

tier_min: pro
complexity: deep
context: ['team']
persona: role-product-manager
group: role-product-manager

summary: "Run a controlled pricing or packaging test from hypothesis through experiment design, segment selection, rollout, measurement, and a packaging decision the business can act on."

intent: |
  Run a controlled pricing or packaging test from hypothesis through experiment design, segment selection, rollout, measurement, and a packaging decision the business can act on.

scope: |
  Run a controlled pricing or packaging test from hypothesis through experiment design, segment selection, rollout, measurement, and a packaging decision the business can act on.

methodology_refs:
  - pro/product/product-manager/competitive-positioning
  - pro/product/product-operations/experimentation-at-scale
  - pro/product/product-operations/stakeholder-management
  - pro/research/market-researcher/competitive-intelligence-methods
  - pro/research/researcher/audience-segmentation
  - pro/research/researcher/survey-design
  - solo/marketing/gtm-strategist/ops-pricing-strategy
  - solo/marketing/gtm-strategist/ops-subscription-models
  - solo/product/product-manager/okr-setting
  - solo/product/product-operations/product-analytics
  - solo/product/product-planning/release-planning
  - solo/research/market-researcher/pricing-research
  - solo/research/researcher/success-metrics-definition
  - solo/research/researcher/user-interviews

success_criteria:
  - "Written hypothesis with numeric prediction"
  - "Pre-registered experiment design + stop rule"
  - "Honest read of the result (confirm / refute / inconclusive)"
  - "Packaging decision doc the business can act on"

stages:
  - name: "Hypothesis"
    intent: "Frame the pricing or packaging question the experiment must answer."
    tasks:
      - "Write a one-sentence pricing hypothesis with expected lift"
      - "Identify the segment whose behaviour the experiment will move"
      - "Define the primary metric and a tripwire metric"
    methodologies:
      - slug: competitive-positioning
        path: pro/product/product-manager/competitive-positioning
        required: true
        tier_gate: pro
      - slug: ops-pricing-strategy
        path: solo/marketing/gtm-strategist/ops-pricing-strategy
        required: true
        tier_gate: solo
      - slug: okr-setting
        path: solo/product/product-manager/okr-setting
        required: true
        tier_gate: solo
      - slug: pricing-research
        path: solo/research/market-researcher/pricing-research
        required: true
        tier_gate: solo
      - slug: success-metrics-definition
        path: solo/research/researcher/success-metrics-definition
        required: true
        tier_gate: solo
    outputs:
      - "Hypothesis doc with primary + tripwire metrics"
      - "Named segment + sample-size estimate"
    decision_gate: "Advance when the hypothesis has a numeric prediction and a single primary metric."
  - name: "Design"
    intent: "Convert the hypothesis into a runnable experiment."
    tasks:
      - "Choose experiment type (A/B, holdout, sequential, willingness-to-pay survey)"
      - "Lock variants and exposure rules"
      - "Pre-register stopping criteria"
    methodologies:
      - slug: experimentation-at-scale
        path: pro/product/product-operations/experimentation-at-scale
        required: true
        tier_gate: pro
      - slug: audience-segmentation
        path: pro/research/researcher/audience-segmentation
        required: true
        tier_gate: pro
      - slug: survey-design
        path: pro/research/researcher/survey-design
        required: true
        tier_gate: pro
      - slug: user-interviews
        path: solo/research/researcher/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "Experiment design doc"
      - "Pre-registered stop rule"
    decision_gate: "Advance when design is reviewable by a non-PM stakeholder and the stop rule is unambiguous."
  - name: "Segment selection"
    intent: "Pick the audience cohort that will receive the variant."
    tasks:
      - "Pull cohort definitions from analytics"
      - "Validate the cohort can be reached by billing tooling"
      - "Confirm cohort exclusions for compliance / contracts"
    methodologies:
      - slug: competitive-intelligence-methods
        path: pro/research/market-researcher/competitive-intelligence-methods
        required: true
        tier_gate: pro
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
    outputs:
      - "Cohort ID + size"
      - "Exclusion rationale"
    decision_gate: "Advance when the cohort is reachable in production with the engineering team's confirmation."
  - name: "Rollout"
    intent: "Ship the variant with reversible controls."
    tasks:
      - "Coordinate billing + entitlement changes with engineering"
      - "Wire instrumentation against the primary metric"
      - "Run a smoke test on a tiny exposure first"
    methodologies:
      - slug: stakeholder-management
        path: pro/product/product-operations/stakeholder-management
        required: true
        tier_gate: pro
      - slug: release-planning
        path: solo/product/product-planning/release-planning
        required: true
        tier_gate: solo
    outputs:
      - "Live experiment with reversible plumbing"
      - "Smoke-test report"
    decision_gate: "Advance when smoke test confirms instrumentation fires correctly and rollback was rehearsed."
  - name: "Measurement"
    intent: "Read the experiment honestly."
    tasks:
      - "Wait the pre-registered duration before peeking"
      - "Run the analysis exactly as pre-registered"
      - "Surface practical significance, not only statistical"
    methodologies:
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
      - slug: success-metrics-definition
        path: solo/research/researcher/success-metrics-definition
        required: true
        tier_gate: solo
    outputs:
      - "Analysis doc with confidence interval"
      - "Practical-significance verdict"
    decision_gate: "Advance when the verdict is one of {confirm, refute, inconclusive} backed by the pre-registered analysis."
  - name: "Decision"
    intent: "Convert the result into a packaging decision."
    tasks:
      - "Document the packaging change (or no-change)"
      - "Sequence the rollout schedule for affected accounts"
      - "Brief sales + support before broad rollout"
    methodologies:
      - slug: ops-pricing-strategy
        path: solo/marketing/gtm-strategist/ops-pricing-strategy
        required: true
        tier_gate: solo
      - slug: ops-subscription-models
        path: solo/marketing/gtm-strategist/ops-subscription-models
        required: true
        tier_gate: solo
      - slug: stakeholder-management
        path: pro/product/product-operations/stakeholder-management
        required: true
        tier_gate: pro
    outputs:
      - "Packaging decision doc"
      - "Rollout schedule"
    decision_gate: "Required: a written packaging decision the business can ship."

