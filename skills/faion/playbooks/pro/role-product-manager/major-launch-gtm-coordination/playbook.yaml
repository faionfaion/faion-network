summary: "Coordinate a flagship launch across product, engineering, design, marketing, sales, and support: from a launch tier decision through pre-launch readiness, day-zero execution, and a 30-day post-launch review."

intent: |
  Coordinate a flagship launch across product, engineering, design, marketing, sales, and support: from a launch tier decision through pre-launch readiness, day-zero execution, and a 30-day post-launch review.

scope: |
  Coordinate a flagship launch across product, engineering, design, marketing, sales, and support: from a launch tier decision through pre-launch readiness, day-zero execution, and a 30-day post-launch review.

