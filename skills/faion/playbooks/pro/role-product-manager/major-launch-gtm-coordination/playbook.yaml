  - "Launch tier decision signed off"
  - "Cross-functional readiness checklist green"
  - "Day-zero ran with no unresolved P0 incidents"
  - "30-day post-launch review delivered with decision"

stages:
  - name: "Launch tier decision"
    intent: "Classify the launch into a tier so the org spends proportional energy."
    tasks:
      - "Score the launch on impact, novelty, audience breadth, and risk"
      - "Map the score to a launch tier (T1 flagship vs T2 medium vs T3 minor)"
      - "Write a one-paragraph rationale"
    methodologies:
      - slug: stakeholder-management
        path: pro/product/product-operations/stakeholder-management
        required: true
        tier_gate: pro
      - slug: competitive-positioning
        path: pro/product/product-manager/competitive-positioning
        required: true
        tier_gate: pro
    outputs:
      - "Launch tier decision doc"
    decision_gate: "Advance once tier is named and at least one VP signs off."
  - name: "Readiness"
    intent: "Bring product, eng, design, marketing, sales, support, and ops to a green readiness check."
    tasks:
      - "Stand up a launch RACI"
      - "Run a readiness checklist per function"
      - "Identify and burn down launch blockers daily"
    methodologies:
      - slug: stakeholder-management
        path: pro/product/product-operations/stakeholder-management
        required: true
        tier_gate: pro
      - slug: release-planning
        path: solo/product/product-planning/release-planning
        required: true
        tier_gate: solo
      - slug: product-explainability
        path: pro/product/product-operations/product-explainability
        required: true
        tier_gate: pro
    outputs:
      - "RACI doc"
      - "Readiness checklist with green/red status per function"
    decision_gate: "Advance when every function reports green or has an owner working a red item with a date."
  - name: "Messaging"
    intent: "Lock positioning, differentiators, and the explainer story."
    tasks:
      - "Run a 30-min positioning workshop"
      - "Draft the one-line, one-paragraph, and one-page explainers"
      - "Pressure-test against the top 2 competitors"
    methodologies:
      - slug: competitive-positioning
        path: pro/product/product-manager/competitive-positioning
        required: true
        tier_gate: pro
      - slug: product-explainability
        path: pro/product/product-operations/product-explainability
        required: true
        tier_gate: pro
    outputs:
      - "Positioning doc"
      - "3-tier message hierarchy"
    decision_gate: "Advance when messaging passes a sales-team 'can I sell this in 90 seconds' read."
  - name: "Channel plan"
    intent: "Pick the launch surfaces and sequence them."
    tasks:
      - "Choose channels (PH, HN, IH, ASO, owned email, partner relays)"
      - "Stagger the channel hits across day -7 → +14"
      - "Brief each channel owner on copy and timing"
    methodologies:
      - slug: growth-product-hunt-launch
        path: solo/marketing/gtm-strategist/growth-product-hunt-launch
        required: true
        tier_gate: solo
      - slug: growth-hacker-news-launch
        path: solo/marketing/gtm-strategist/growth-hacker-news-launch
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: growth-app-store-optimization
        path: solo/marketing/gtm-strategist/growth-app-store-optimization
        required: true
        tier_gate: solo
    outputs:
      - "Channel plan with owners and dates"
    decision_gate: "Advance when each channel has a named owner and a draft asset."
  - name: "Pre-launch dry run"
    intent: "Rehearse day-zero end-to-end before the spotlight."
    tasks:
      - "Test the signup → first-value loop with 5 strangers"
      - "Rehearse the day-zero ops timeline"
      - "Verify support has triage scripts ready"
    methodologies:
      - slug: continuous-discovery
        path: solo/product/product-manager/continuous-discovery
        required: true
        tier_gate: solo
      - slug: feedback-management
        path: solo/product/product-operations/feedback-management
        required: true
        tier_gate: solo
      - slug: user-interviews
        path: solo/research/researcher/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "Dry-run report"
      - "Day-zero ops timeline"
    decision_gate: "Advance when the dry-run hits no P0 surprises."
  - name: "Day zero"
    intent: "Run the launch live with a war room."
    tasks:
      - "Open a war room with on-call from product + eng + marketing + support"
      - "Post the launch in scheduled order"
      - "Triage incoming feedback in real time"
    methodologies:
      - slug: feedback-management
        path: solo/product/product-operations/feedback-management
        required: true
        tier_gate: solo
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
    outputs:
      - "War-room log"
      - "Day-zero metrics snapshot"
    decision_gate: "Advance once the launch window closes with no unresolved P0 incidents."
  - name: "30-day review"
    intent: "Read what happened against the launch-tier expectations."
    tasks:
      - "Pull metrics vs pre-launch targets"
      - "Run a structured post-launch retro"
      - "Decide go-deeper, hold, or sunset"
    methodologies:
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
      - slug: experimentation-at-scale
        path: pro/product/product-operations/experimentation-at-scale
        required: true
        tier_gate: pro
      - slug: user-interviews
        path: solo/research/researcher/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "30-day post-launch review doc"
      - "Sunset/hold/double-down decision"
    decision_gate: "Required: a written post-launch verdict at day 30."

