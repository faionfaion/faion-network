tier_min: pro
complexity: medium
context: ['team']
persona: role-product-manager
group: role-product-manager

summary: "PM receives a vague top-level OKR (e.g."

intent: |
  PM receives a vague top-level OKR (e.g. 'improve user activation') and produces a leaf-level metric tree the team can move weekly, with vanity metrics flagged and ejected. Faion has solo OKR-setting but nothing on cascade mechanics, north-star design, or vanity-vs-actionable distinction.

scope: |
  PM receives a vague top-level OKR (e.g. 'improve user activation') and produces a leaf-level metric tree the team can move weekly, with vanity metrics flagged and ejected. Faion has solo OKR-setting but nothing on cascade mechanics, north-star design, or vanity-vs-actionable distinction.

methodology_refs:
  - pro/product/product-manager/product-analytics
  - solo/product/product-manager/okr-setting

success_criteria:
  - "Restated OKR with one verb, population, time window"
  - "North-star metric defined and not vanity"
  - "Driver layer mathematically composes the north-star"
  - "Every leaf has owner + data source"

stages:
  - name: "Restate the fuzzy OKR"
    intent: "Convert the prose objective into a single measurable outcome."
    tasks:
      - "Write the OKR as a single sentence with a verb + outcome"
      - "Identify the population it applies to"
      - "Set the time window for measurement"
    methodologies:
      - slug: okr-setting
        path: solo/product/product-manager/okr-setting
        required: true
        tier_gate: solo
    outputs:
      - "Restated OKR doc"
    decision_gate: "Advance when the OKR has one verb, one population, and one time window."
  - name: "Pick a north-star"
    intent: "Anchor on the one metric that proxies the outcome."
    tasks:
      - "Brainstorm 5 candidate metrics"
      - "Score each on actionability, proxying power, and gameability"
      - "Pick the one north-star metric"
    methodologies:
      - slug: product-analytics
        path: pro/product/product-manager/product-analytics
        required: true
        tier_gate: pro
    outputs:
      - "North-star metric definition"
    decision_gate: "Advance when the chosen metric beats vanity-metric tests (not gameable, moves with effort)."
  - name: "Decompose to drivers"
    intent: "Cascade the north-star into driver metrics."
    tasks:
      - "Decompose the north-star into 3-5 driver metrics"
      - "Tie each driver to a team or owner"
      - "Confirm drivers sum or multiply to the north-star"
    methodologies:
      - slug: product-analytics
        path: pro/product/product-manager/product-analytics
        required: true
        tier_gate: pro
    outputs:
      - "Driver-metric layer"
    decision_gate: "Advance when drivers mathematically compose the north-star."
  - name: "Drop to leaves"
    intent: "Cascade drivers into weekly-actionable leaf metrics."
    tasks:
      - "For each driver, list 2-4 leaf metrics teams can move weekly"
      - "Tag each leaf with the team that owns it"
      - "Confirm each leaf has a data source"
    methodologies:
      - slug: product-analytics
        path: pro/product/product-manager/product-analytics
        required: true
        tier_gate: pro
    outputs:
      - "Leaf-metric layer"
    decision_gate: "Advance when every leaf is weekly-actionable and has a data source."
  - name: "Vanity audit"
    intent: "Eject metrics that look good but do not move the business."
    tasks:
      - "Flag any leaf that moves without business outcome"
      - "Demote vanity metrics to 'monitor-only'"
      - "Document the demotion rationale"
    methodologies:
      - slug: product-analytics
        path: pro/product/product-manager/product-analytics
        required: true
        tier_gate: pro
    outputs:
      - "Vanity audit log"
    decision_gate: "Required: a written vanity audit log with at least one demotion or explicit 'none found' verdict."

