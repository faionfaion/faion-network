# PLAYBOOK — Product Launch Campaign — Product Hunt + Multi-Channel (8 weeks prep + launch week)
# tier=pro group=role-growth-marketing complexity=deep
# =============================================================================

slug: product-launch-campaign-product-hunt-multi-channel-8-weeks-prep-launch-week
title: "Product Launch Campaign — Product Hunt + Multi-Channel (8 weeks prep + launch week)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: bd98d94ca2d669ed

tier_min: pro
complexity: deep
context: [solo, team]
persona: ["solo-founder", "growth-marketer"]

intent: |
  End-to-end launch campaign anchored on Product Hunt, with founder community presence (IH,
  HN, Reddit), email + SMM coordination, paid teaser layer, and post-launch retention
  follow-through. 'Done' = launch day executed without missed cues, top-5 of the day or
  clear documented reason why not, paid signups and activation tracked vs targets, and post-
  launch retention email sequence is live.

scope: |
  End-to-end launch campaign anchored on Product Hunt, with founder community presence (IH,
  HN, Reddit), email + SMM coordination, paid teaser layer, and post-launch retention
  follow-through. 'Done' = launch day executed without missed cues, top-5 of the day or
  clear documented reason why not, paid signups and activation tracked vs targets, and post-
  launch retention email sequence is live.

summary: |
  End-to-end launch campaign anchored on Product Hunt, with founder community presence (IH,
  HN, Reddit), email + SMM coordination, paid teaser layer, and post-launch retention
  follow-through. 'Done' = launch day executed without missed cues, top-5 of the day or
  clear documented reason why not, paid signups and activation tracked vs targets, and post-
  launch retention email sequence is live.

methodology_refs:
  - pro/marketing/conversion-optimizer/onboarding-flows
  - pro/marketing/growth-marketer/activation-framework
  - pro/marketing/growth-marketer/cohort-basics
  - pro/marketing/growth-marketer/retention-basics
  - pro/marketing/growth-marketer/retention-strategies

success_criteria:
  - "Written charter (goal, owner, success metric, time-box) signed off"
  - "All planned core artifacts shipped on schedule with tracking flowing"
  - "Measurement readout produced and peer-reviewed against confounders"
  - "Continue / pivot / kill decision written, with next milestone if continue"

stages:
  - name: "Frame"
    intent: "Lock the goal, owner, success metric, and time-box."
    tasks:
      - "Draft a one-paragraph charter with goal, owner, success metric, time-box"
      - "List explicit non-goals so scope cannot creep"
      - "Identify stakeholders and their decision rights"
    methodologies:
      - slug: onboarding-flows
        path: pro/marketing/conversion-optimizer/onboarding-flows
        required: true
        tier_gate: pro
      - slug: ads-retargeting
        path: pro/marketing/ppc-manager/ads-retargeting
        required: true
        tier_gate: pro
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
    outputs:
      - "Charter doc (1 page)"
    decision_gate: "Advance only with a written charter that all stakeholders read and signed off."
  - name: "Discover"
    intent: "Talk to real users / stakeholders / sales — kill assumptions before they enter the plan."
    tasks:
      - "Run 5-10 short interviews tied to the charter goal"
      - "Capture verbatim quotes, not paraphrases"
      - "Update the charter if discovery contradicts an assumption"
    methodologies:
      - slug: activation-framework
        path: pro/marketing/growth-marketer/activation-framework
        required: true
        tier_gate: pro
      - slug: ads-twitter-ads
        path: pro/marketing/ppc-manager/ads-twitter-ads
        required: true
        tier_gate: pro
      - slug: growth-product-hunt-launch
        path: solo/marketing/gtm-strategist/growth-product-hunt-launch
        required: true
        tier_gate: solo
    outputs:
      - "Discovery notes with quotes"
    decision_gate: "Advance only when discovery either confirms the charter or forces a documented re-charter."
  - name: "Research"
    intent: "Gather the inputs needed to plan: data, prior work, competitors, constraints."
    tasks:
      - "Pull the relevant data extract / dashboards / prior decks"
      - "Scan competitors and prior internal attempts"
      - "Document constraints (legal, tech, brand) up front"
    methodologies:
      - slug: cohort-basics
        path: pro/marketing/growth-marketer/cohort-basics
        required: true
        tier_gate: pro
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: growth-community-building
        path: solo/marketing/smm-manager/growth-community-building
        required: true
        tier_gate: solo
    outputs:
      - "Research brief with sources"
    decision_gate: "Advance once research surfaces no blocker; otherwise loop with stakeholders."
  - name: "Plan"
    intent: "Convert the charter + research into a sequenced plan with owners."
    tasks:
      - "Break the work into 3-7 phases with explicit exit-criteria"
      - "Assign an owner per phase"
      - "Wire metrics + dashboards before execution starts"
    methodologies:
      - slug: retention-basics
        path: pro/marketing/growth-marketer/retention-basics
        required: true
        tier_gate: pro
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: solo
      - slug: growth-social-media-strategy
        path: solo/marketing/smm-manager/growth-social-media-strategy
        required: true
        tier_gate: solo
    outputs:
      - "Plan doc with Gantt or phase table"
    decision_gate: "Advance only when each phase has a named owner and exit-criterion."
  - name: "Produce"
    intent: "Create the core artifacts: assets, content, code, campaigns, configs."
    tasks:
      - "Build the core deliverables per phase plan"
      - "Hold a draft review with the named owner before publish"
      - "Track WIP visibly so blockers surface fast"
    methodologies:
      - slug: retention-strategies
        path: pro/marketing/growth-marketer/retention-strategies
        required: true
        tier_gate: pro
      - slug: growth-email-marketing
        path: solo/marketing/content-marketer/growth-email-marketing
        required: true
        tier_gate: solo
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
    outputs:
      - "Drafts of all core artifacts"
    decision_gate: "Advance when drafts pass internal review against the charter, not personal taste."
  - name: "Ship"
    intent: "Push live: deploy, publish, launch the campaign, flip the switch."
    tasks:
      - "Run the launch checklist (dependencies, tracking, comms)"
      - "Publish on schedule; do not pre-leak"
      - "Confirm tracking is flowing in real-time on a dashboard"
    methodologies:
      - slug: growth-brand-positioning
        path: pro/marketing/gtm-strategist/growth-brand-positioning
        required: true
        tier_gate: pro
      - slug: growth-onboarding-emails
        path: solo/marketing/content-marketer/growth-onboarding-emails
        required: true
        tier_gate: solo
    outputs:
      - "Launch evidence (URLs / receipts)"
    decision_gate: "Advance only with tracking visibly flowing; otherwise hold launch."
  - name: "Stabilize"
    intent: "Make the new thing not collapse the moment attention moves elsewhere."
    tasks:
      - "Document the runbook for whoever inherits this"
      - "Set alarms on the success metric so silent drift surfaces"
      - "Hand off ownership formally if not staying with you"
    methodologies:
      - slug: growth-press-coverage
        path: pro/marketing/gtm-strategist/growth-press-coverage
        required: true
        tier_gate: pro
      - slug: growth-reddit-marketing
        path: solo/marketing/content-marketer/growth-reddit-marketing
        required: true
        tier_gate: solo
    outputs:
      - "Runbook + ownership transfer"
    decision_gate: "Advance only after the next owner can run this from the runbook without you."
  - name: "Measure"
    intent: "Read the metrics against the plan; separate noise from signal."
    tasks:
      - "Compare actuals vs charter success metric"
      - "Split cohort/segment/channel to find what drove the result"
      - "Document confounders before drawing conclusions"
    methodologies:
      - slug: ads-meta-campaign-setup
        path: pro/marketing/ppc-manager/ads-meta-campaign-setup
        required: true
        tier_gate: pro
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
    outputs:
      - "Measurement readout (1 page)"
    decision_gate: "Advance when readout passes a peer sniff-test against confounders."
  - name: "Iterate-or-close"
    intent: "Decide: continue, kill, or hand off to BAU."
    tasks:
      - "Hold the retro on what shipped vs what was planned"
      - "Decide continue / pivot / kill / hand-off in writing"
      - "If continue: define next 30-day milestone with metrics"
    methodologies:
      - slug: ads-meta-targeting
        path: pro/marketing/ppc-manager/ads-meta-targeting
        required: true
        tier_gate: pro
      - slug: growth-hacker-news-launch
        path: solo/marketing/gtm-strategist/growth-hacker-news-launch
        required: true
        tier_gate: solo
    outputs:
      - "Decision doc with next steps"
    decision_gate: "Required output: a written decision; no \"let's see\"."

token_budget_estimate: 12000

