slug: handover-to-client-in-house-team
title: "Handover to client in-house team (3 weeks)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 70654f304038f35f

tier_min: pro
complexity: deep
context: [outsource, team]
persona_hints: [P4]

intent: |
  Engagement ending → client in-house team operates the product alone with code, runbooks, ADRs, on-call rota, training videos, and a 90-day defect SLA; vendor exits with a referenceable signed acceptance letter.

scope: |
  Three-week structured handover from the outsource vendor to a client in-house team. Output: code + runbooks + ADRs in client hands, on-call rota populated, training videos recorded, 90-day defect SLA active, and signed acceptance letter. No Slack call to the outgoing dev for 30 days after the cutover.

non_goals:
  - "Continued maintenance — handled by warranty SLA, not staff augmentation"
  - "Hiring the in-house team — client owns"
  - "New feature delivery during the handover window — frozen"

prerequisites:
  - "Engagement scope is complete or end-date locked"
  - "Client in-house team identified and at least partially staffed"
  - "Lessons-learned register exists for the engagement"

success_criteria:
  - "Architecture decision records up-to-date and in client repo"
  - "Living-documentation refreshed for every active module"
  - "Runbooks for top-10 operations (deploy, rollback, incident, backup)"
  - "On-call rota populated for the first 90 days"
  - "Training videos covering top user-facing flows"
  - "Signed acceptance letter from client sponsor"
  - "Vendor-side support contact decommissioned after 90-day warranty"

stages:
  - name: "Receiving team readiness"
    intent: "Profile the in-house team and shape the handover to their gaps."
    tasks:
      - "Map team skills vs deployed stack"
      - "Run gap-analysis on top operational scenarios"
      - "Sketch onboarding 30-60-90 day plan for the receiving team"
      - "Negotiate hold-back resources from vendor side (escalation contacts)"
    methodologies:
      - slug: onboarding
        path: pro/comms/hr-recruiter/onboarding
        required: true
        tier_gate: pro
      - slug: onboarding-30-day
        path: pro/comms/hr-recruiter/onboarding-30-day
        required: true
        tier_gate: pro
      - slug: onboarding-60-90-day
        path: pro/comms/hr-recruiter/onboarding-60-90-day
        required: true
        tier_gate: pro
      - slug: 30-60-90-day-plan
        path: pro/comms/hr-recruiter/30-60-90-day-plan
        required: true
        tier_gate: pro
      - slug: solution-assessment
        path: pro/ba/ba-core/solution-assessment
        required: true
        tier_gate: pro
    outputs:
      - "Receiving-team skills map"
      - "Gap analysis"
      - "30-60-90 plan for in-house team"
    decision_gate: |
      Advance once the in-house team accepts the 30-60-90 plan AND vendor escalation rota is signed. Otherwise re-scope handover.
  - name: "Documentation deep-clean"
    intent: "Burn down doc debt before knowledge walks out the door."
    tasks:
      - "Audit ADRs; backfill missing decisions"
      - "Refresh design docs to match current state"
      - "Adopt living-documentation conventions (AGENTS.md per module)"
      - "Document scope boundaries explicitly so the in-house team knows what was NOT built"
    methodologies:
      - slug: architecture-decision-records
        path: solo/sdd/sdd/architecture-decision-records
        required: true
        tier_gate: solo
      - slug: design-docs-patterns
        path: solo/sdd/sdd/design-docs-patterns
        required: true
        tier_gate: solo
      - slug: living-documentation
        path: solo/sdd/sdd/living-documentation
        required: true
        tier_gate: solo
      - slug: scope-management
        path: pro/pm/pm-traditional/scope-management
        required: true
        tier_gate: pro
    outputs:
      - "ADR set complete, dated, indexed"
      - "Refreshed design docs"
      - "Living-documentation pattern adopted"
    decision_gate: |
      Advance when a new hire on the receiving team can read the docs and answer top-10 system questions unaided.
  - name: "Ops, monitoring, runbooks"
    intent: "Hand over the production levers, not just the source."
    tasks:
      - "Set up Grafana dashboards aligned to NFRs"
      - "Migrate or share Prometheus alerts"
      - "Document API monitoring, logging, alerting"
      - "Rotate secrets; client team holds the keys"
      - "Verify backup + DR rotation (AWS monitoring DR)"
      - "Renew TLS automation in client CI/CD"
    methodologies:
      - slug: grafana-dashboards
        path: pro/infra/devops-engineer/grafana-dashboards
        required: true
        tier_gate: pro
      - slug: prometheus-monitoring
        path: pro/infra/devops-engineer/prometheus-monitoring
        required: true
        tier_gate: pro
      - slug: devops-aws-monitoring-dr
        path: pro/infra/devops-engineer/devops-aws-monitoring-dr
        required: true
        tier_gate: pro
      - slug: api-monitoring-alerting
        path: pro/dev/software-developer/api-monitoring-alerting
        required: true
        tier_gate: pro
      - slug: api-monitoring-logging
        path: pro/dev/software-developer/api-monitoring-logging
        required: true
        tier_gate: pro
      - slug: secrets-management
        path: pro/infra/cicd-engineer/secrets-management
        required: true
        tier_gate: pro
      - slug: cicd-tls-renewal-automation
        path: pro/infra/cicd-engineer/cicd-tls-renewal-automation
        required: true
        tier_gate: pro
      - slug: post-handover-warranty-runbook
        path: pro/_gap/post-handover-warranty-runbook
        required: true
        tier_gate: pro
    outputs:
      - "Dashboards in client tenancy"
      - "Alerts in client paging tool"
      - "Top-10 runbooks (deploy, rollback, restore, scale, etc.)"
      - "Secrets rotation log"
    decision_gate: |
      Advance when client on-call can complete a full incident drill unaided.
  - name: "Knowledge transfer sessions"
    intent: "Live walkthroughs + recordings the in-house team can rewatch."
    tasks:
      - "Record top user-facing flows as training videos"
      - "Pair an in-house dev with a vendor dev per module"
      - "Run two architecture deep-dives with the receiving lead"
      - "Hand over AI-agent prompts and constraints used during build"
    methodologies:
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
      - slug: solution-assessment
        path: pro/ba/ba-core/solution-assessment
        required: true
        tier_gate: pro
      - slug: ai-agent-prompt-handover
        path: pro/_gap/ai-agent-prompt-handover
        required: true
        tier_gate: pro
    outputs:
      - "Recorded sessions per module"
      - "Paired-shipping log (PRs reviewed jointly)"
      - "AI-agent prompt pack handed over"
    decision_gate: |
      Advance when each module has ≥1 in-house dev who has merged a PR unaided.
  - name: "Cutover & acceptance"
    intent: "Sign the closure paperwork; activate the warranty SLA."
    tasks:
      - "Run benefits-realisation review with client sponsor"
      - "Project closure ceremony (vendor + client)"
      - "Stand up 90-day warranty SLA + intake channel"
      - "Capture testimonial / referenceability"
      - "Decommission vendor access (laptops, accounts, VPN)"
    methodologies:
      - slug: project-closure
        path: pro/pm/pm-traditional/project-closure
        required: true
        tier_gate: pro
      - slug: benefits-realization
        path: pro/pm/pm-traditional/benefits-realization
        required: true
        tier_gate: pro
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
      - slug: client-handover-master-checklist
        path: pro/_gap/client-handover-master-checklist
        required: true
        tier_gate: pro
    outputs:
      - "Signed acceptance letter"
      - "Warranty SLA active"
      - "Closure deck"
      - "Vendor access revoked"
    decision_gate: |
      Engagement closes only with a signed acceptance letter AND zero open critical defects.

common_pitfalls:
  - "Treating handover as a deck — the doc burns in a fortnight, the runbooks live forever"
  - "Holding back tribal knowledge to preserve future work — kills referenceability"
  - "Skipping AI-agent prompt handover; the receiving team will reinvent unsafe defaults"

quality_checklist:
  - "Did the in-house team merge a real PR before cutover?"
  - "Could an on-call rotation answer a 3am page without phoning the vendor?"
  - "Did the sponsor sign the acceptance letter — not just the PM?"

related_playbooks:
