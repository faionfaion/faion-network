slug: productized-service-launch
title: "Productized service launch (4-week sprint)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: d89a28a7f24d9cb2

tier_min: pro
complexity: deep
context: [solo]
persona_hints: [P3]

intent: |
  Convert one repeated client problem into a fixed-price, fixed-scope offer with a landing page, a booking flow, and 3 paid pilots — moving the freelancer from per-hour to per-outcome billing.

scope: |
  Convert one repeated client problem into a fixed-price, fixed-scope offer with a landing page, a booking flow, and 3 paid pilots — moving the freelancer from per-hour to per-outcome billing.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Pick the pattern stage complete: Candidate list with scoring"
  - "Price + landing stage complete: Landing page live"
  - "Pilot run stage complete: 3 paid pilots delivered"
  - "Promote + transition stage complete: 3 case studies live"

stages:
  - name: "Pick the pattern"
    intent: "Identify one repeated engagement worth productizing."
    tasks:
      - "Review last 12 months of invoices for repeated work"
      - "Score candidates by repeat frequency + margin"
      - "Pick one; write a 1-page service brief"
    methodologies:
      - slug: business-process-analysis
        path: pro/ba/business-analyst/business-process-analysis
        required: true
        tier_gate: pro
      - slug: competitive-positioning
        path: pro/product/product-manager/competitive-positioning
        required: true
        tier_gate: pro
      - slug: minimum-product-frameworks
        path: pro/product/product-planning/minimum-product-frameworks
        required: true
        tier_gate: pro
      - slug: mvp-scoping
        path: pro/product/product-planning/mvp-scoping
        required: true
        tier_gate: pro
      - slug: productized-service-canvas
        path: pro/_gap/productized-service-canvas
        required: true
        tier_gate: pro
    outputs:
      - "Candidate list with scoring"
      - "Service brief"
    decision_gate: |
      Advance when one candidate scores 2x above others on repeat + margin. Otherwise iterate.
  - name: "Price + landing"
    intent: "Fixed price + landing page + booking flow live."
    tasks:
      - "Define 3-tier fixed-price offer"
      - "Build landing page with checkout/booking"
      - "Set up analytics + email capture"
    methodologies:
      - slug: funnel-tactics-basics
        path: pro/marketing/conversion-optimizer/funnel-tactics-basics
        required: true
        tier_gate: pro
      - slug: ops-financial-basics
        path: pro/marketing/gtm-strategist/ops-financial-basics
        required: true
        tier_gate: pro
      - slug: plausible-analytics
        path: solo/dev/automation-tooling/plausible-analytics
        required: true
        tier_gate: solo
      - slug: frontend-design
        path: solo/dev/frontend-developer/frontend-design
        required: true
        tier_gate: solo
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
      - slug: ops-pricing-strategy
        path: solo/marketing/growth-marketer/ops-pricing-strategy
        required: true
        tier_gate: solo
      - slug: ops-subscription-models
        path: solo/marketing/growth-marketer/ops-subscription-models
        required: true
        tier_gate: solo
      - slug: freelance-pilot-pricing
        path: pro/_gap/freelance-pilot-pricing
        required: true
        tier_gate: pro
    outputs:
      - "Landing page live"
      - "Booking flow"
      - "Pricing rationale doc"
    decision_gate: |
      Advance once landing is live and ≥3 prospects could complete booking end-to-end.
  - name: "Pilot run"
    intent: "3 paid pilots prove the offer ships in fixed scope without scope creep."
    tasks:
      - "Sell 3 pilots to existing-network prospects"
      - "Deliver against SOP; log time vs estimate"
      - "Harvest testimonials + before/after metrics"
    methodologies:
      - slug: product-analytics
        path: pro/product/product-manager/product-analytics
        required: true
        tier_gate: pro
      - slug: release-planning
        path: pro/product/product-planning/release-planning
        required: true
        tier_gate: pro
      - slug: ops-automation-workflow
        path: solo/dev/automation-tooling/ops-automation-workflow
        required: true
        tier_gate: solo
      - slug: ops-dashboard-setup
        path: solo/dev/automation-tooling/ops-dashboard-setup
        required: true
        tier_gate: solo
      - slug: delivery-system-templates
        path: pro/_gap/delivery-system-templates
        required: true
        tier_gate: pro
    outputs:
      - "3 paid pilots delivered"
      - "Time-vs-estimate log"
      - "3 testimonials"
    decision_gate: |
      Advance when ≥2/3 pilots ship within estimated time. If all over, fix SOP before scaling.
  - name: "Promote + transition"
    intent: "Make the productized offer the default sale; transition hourly clients."
    tasks:
      - "Publish 3 case studies"
      - "Announce to LinkedIn + newsletter"
      - "Stop quoting hourly for this work; defer requests to the offer"
    methodologies:
      - slug: growth-gtm-strategy
        path: pro/marketing/gtm-strategist/growth-gtm-strategy
        required: true
        tier_gate: pro
      - slug: growth-linkedin-strategy
        path: pro/marketing/smm-manager/growth-linkedin-strategy
        required: true
        tier_gate: pro
      - slug: feedback-management
        path: pro/product/product-manager/feedback-management
        required: true
        tier_gate: pro
      - slug: growth-email-marketing
        path: solo/marketing/content-marketer/growth-email-marketing
        required: true
        tier_gate: solo
      - slug: growth-cold-outreach
        path: solo/marketing/growth-marketer/growth-cold-outreach
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/growth-marketer/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: from-hourly-to-fixed-transition
        path: pro/_gap/from-hourly-to-fixed-transition
        required: true
        tier_gate: pro
    outputs:
      - "3 case studies live"
      - "Launch announcement"
      - "Hourly-stop policy"
    decision_gate: |
      Productized offer must become default within 6 weeks of launch. If hourly still dominant, audit pricing.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 19000
