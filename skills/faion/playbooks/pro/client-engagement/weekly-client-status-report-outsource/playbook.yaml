slug: weekly-client-status-report-outsource
title: "Weekly client status report (outsource senior)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: f4ffc0f7f27da9c3

tier_min: pro
complexity: light
context: [outsource, team]
persona_hints: [P4]

intent: |
  End-of-week RAG report that the offshore senior owns → client PM forwards upstream without rewriting, pre-empts Monday interrogation.

scope: |
  Atomic weekly ceremony for an offshore senior who owns the report (not the PM). By Friday cutoff: a six-section RAG status with progress vs sprint goal, risks, asks, ready for upstream forwarding without rewriting. Bridges the gap between vendor-side ground truth and client-side stakeholder expectations.

non_goals:
  - "Daily standup coverage — that's a separate playbook"
  - "Steerco-level reporting — that's a different cadence"
  - "Sprint review demo — separate event"

prerequisites:
  - "Active sprint or milestone with defined goal"
  - "Risk register exists for the engagement"
  - "Asks pipeline (open dependencies) visible"

success_criteria:
  - "Report sent inside the agreed window every Friday"
  - "Six sections present and complete"
  - "RAG self-assessment defended by data, not vibes"
  - "Client PM forwards upstream without editing"
  - "Risk + ask section drives Monday's first decision"

stages:
  - name: "Collect"
    intent: "Pull facts from the sprint board, not your head."
    tasks:
      - "Snapshot sprint progress against goal"
      - "Pull risk register deltas this week"
      - "Identify open asks blocked on client side"
      - "Stakeholder-analysis on who the report needs to land for"
    methodologies:
      - slug: stakeholder-analysis
        path: pro/ba/business-analyst/stakeholder-analysis
        required: true
        tier_gate: pro
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
      - slug: active-listening
        path: solo/comms/communicator/active-listening
        required: true
        tier_gate: solo
    outputs:
      - "Fact pack (sprint metrics, risk deltas, asks list)"
    decision_gate: |
      Advance when every claim in the fact pack can be traced to a board, PR, or doc.
  - name: "Compose"
    intent: "Six sections, plain language, no padding."
    tasks:
      - "Headline RAG with one-line justification"
      - "Progress vs goal (numbers, not adjectives)"
      - "Risks + mitigations + owners"
      - "Asks + decisions needed"
      - "Next-week plan"
      - "Stakeholder narrative (storytelling for the upstream audience)"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/project-manager/communications-management
        required: true
        tier_gate: pro
      - slug: business-storytelling
        path: solo/comms/communicator/business-storytelling
        required: true
        tier_gate: solo
      - slug: selling-ideas
        path: solo/comms/communicator/selling-ideas
        required: true
        tier_gate: solo
      - slug: weekly-status-report-outsource-template
        path: pro/_gap/weekly-status-report-outsource-template
        required: true
        tier_gate: pro
      - slug: rag-translation-for-non-tech-stakeholders
        path: pro/_gap/rag-translation-for-non-tech-stakeholders
        required: true
        tier_gate: pro
    outputs:
      - "Drafted report"
    decision_gate: |
      Advance only if every RAG colour has data behind it.
  - name: "Send + follow-up"
    intent: "Ship inside the window and pre-empt the Monday interrogation."
    tasks:
      - "Send to client PM in the agreed channel by Friday cutoff"
      - "Confirm receipt; offer 10-min call window"
      - "Pin asks at the top of Monday's first comms"
      - "Archive in engagement journal"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Sent report"
      - "Journal entry"
    decision_gate: |
      Done only after client PM has acknowledged. Silence = follow-up Monday morning.

common_pitfalls:
  - "Green RAG every week — kills the signal value"
  - "Asks buried at the bottom — the upstream reader never sees them"
  - "Sending Friday 23:55 your time — the client PM cannot use it"

quality_checklist:
  - "Could the client CEO read it cold and know what's hot?"
  - "Did I name every ask + owner + decision date?"
  - "Did I send in the window the client PM can act on?"

related_playbooks:
