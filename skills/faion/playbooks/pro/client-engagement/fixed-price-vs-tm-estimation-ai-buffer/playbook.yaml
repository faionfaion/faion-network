slug: fixed-price-vs-tm-estimation-ai-buffer
title: "Fixed-price vs T&M estimation with AI risk buffer"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: e372fa51cebe648b

tier_min: pro
complexity: medium
context: [outsource, team]
persona_hints: [P4]

intent: |
  Discovery brief → two defensible quotes (fixed-price and T&M) with explicit AI-leverage adjustment + regulatory-uncertainty buffer; post-mortem can replay assumptions.

scope: |
  Synthesis playbook for pre-sales pricing. Given a discovery brief, produces two defensible quotes — fixed-price and T&M — with explicit AI-leverage adjustment, regulatory-uncertainty buffer, internal margin model documented, and a post-mortem-replayable assumptions log.

non_goals:
  - "Full discovery — assumes the brief exists"
  - "Negotiation — close happens elsewhere"
  - "Cost-plus model — only FP vs T&M"

prerequisites:
  - "Discovery brief exists"
  - "Internal margin floor known"
  - "AI-leverage baseline assumption agreed (sprint velocity uplift)"

success_criteria:
  - "Fixed-price quote with WBS + reserves"
  - "T&M quote with rate card + cap mechanism"
  - "AI-leverage adjustment documented with assumption log"
  - "Regulatory-uncertainty buffer explicit"
  - "Post-mortem-replayable margin model archived"

stages:
  - name: "Brief intake + WBS"
    intent: "Build the work breakdown both quotes will lean on."
    tasks:
      - "Read brief; capture assumptions"
      - "Apply scope-management to bound the work"
      - "Build WBS to leaf level"
      - "Identify deliverables vs activities"
    methodologies:
      - slug: cost-estimation
        path: pro/pm/pm-traditional/cost-estimation
        required: true
        tier_gate: pro
      - slug: cost-estimation
        path: pro/pm/project-manager/cost-estimation
        required: true
        tier_gate: pro
      - slug: work-breakdown-structure
        path: pro/pm/project-manager/work-breakdown-structure
        required: true
        tier_gate: pro
      - slug: scope-management
        path: pro/pm/project-manager/scope-management
        required: true
        tier_gate: pro
    outputs:
      - "WBS to leaf level"
      - "Assumptions log v1"
    decision_gate: |
      Advance only when WBS leaves match deliverable nouns, not activities.
  - name: "Risk + AI buffer"
    intent: "Quantify the variance that distinguishes FP from T&M."
    tasks:
      - "Apply risk-management cycle"
      - "Quantify AI-leverage adjustment per leaf (uplift vs unknown)"
      - "Stack regulatory-uncertainty buffer where regime exposure exists"
      - "Set change-control posture (sensitivity to scope drift)"
    methodologies:
      - slug: risk-management
        path: pro/pm/project-manager/risk-management
        required: true
        tier_gate: pro
      - slug: change-control
        path: pro/pm/project-manager/change-control
        required: true
        tier_gate: pro
      - slug: ai-leverage-estimation-model
        path: pro/_gap/ai-leverage-estimation-model
        required: true
        tier_gate: pro
      - slug: regulatory-uncertainty-buffer
        path: pro/_gap/regulatory-uncertainty-buffer
        required: true
        tier_gate: pro
    outputs:
      - "Risk register"
      - "AI-leverage adjustment table"
      - "Regulatory buffer"
    decision_gate: |
      Advance when each leaf has a quantified buffer.
  - name: "Quote, defend, archive"
    intent: "Issue the two quotes; archive the margin model."
    tasks:
      - "Compute fixed-price quote (with reserves)"
      - "Compute T&M quote (with cap + rate card)"
      - "Apply the FP-vs-T&M decision framework"
      - "Build outsource margin calculator output"
      - "Archive assumptions log + post-mortem replay pack"
    methodologies:
      - slug: fixed-price-vs-tnm-decision-framework
        path: pro/_gap/fixed-price-vs-tnm-decision-framework
        required: true
        tier_gate: pro
      - slug: outsource-margin-calculator
        path: pro/_gap/outsource-margin-calculator
        required: true
        tier_gate: pro
    outputs:
      - "Fixed-price quote"
      - "T&M quote"
      - "Decision recommendation"
      - "Margin model archive"
    decision_gate: |
      Done when both quotes are issuable AND a post-mortem reviewer could replay the math.

common_pitfalls:
  - "Assuming AI uniformly speeds up — it speeds up the obvious, not the unknown"
  - "Treating regulatory uncertainty as 'add 10%' instead of pricing the actual risk"
  - "Burning the assumptions log after sending the quote — kills post-mortem learning"

quality_checklist:
  - "Could a peer replay both quotes from my assumptions log?"
  - "Did I price AI leverage per leaf, not as a blanket?"
  - "Did I document the regulatory buffer separately?"

