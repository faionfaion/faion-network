# =============================================================================
# faion playbook manifest — P3 technical freelancer
# Generated for F-064 from playbook-index.json entry #20
# =============================================================================

slug: inbound-to-signed-retainer
title: "Inbound-to-signed-retainer in one client cycle"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 207e11f3f7ad6100

tier_min: pro
complexity: medium
context: [solo]
persona_hints: [P3]

intent: |
  From a cold inbound DM/email to a countersigned monthly retainer with first invoice paid, run a deterministic pipeline that filters bad-fit clients early, prices the engagement defensively, and locks payment terms before any work starts.

scope: |
  From a cold inbound DM/email to a countersigned monthly retainer with first invoice paid, run a deterministic pipeline that filters bad-fit clients early, prices the engagement defensively, and locks payment terms before any work starts.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Triage stage complete: Triage score"
  - "Discovery stage complete: Call notes"
  - "Propose + price stage complete: Retainer proposal sent"
  - "Negotiate + sign stage complete: Countersigned retainer"

stages:
  - name: "Triage"
    intent: "Score inbound; reject bad-fit fast."
    tasks:
      - "Apply triage scoring rubric to the inbound message"
      - "Disqualify if any red flag hit"
      - "Schedule discovery only with qualified leads"
    methodologies:
      - slug: elicitation-techniques
        path: pro/ba/ba-core/elicitation-techniques
        required: true
        tier_gate: pro
      - slug: persona-building
        path: pro/research/researcher/persona-building
        required: true
        tier_gate: pro
      - slug: inbound-lead-triage-scoring
        path: pro/_gap/inbound-lead-triage-scoring
        required: true
        tier_gate: pro
      - slug: bad-fit-disqualification-script
        path: pro/_gap/bad-fit-disqualification-script
        required: true
        tier_gate: pro
    outputs:
      - "Triage score"
      - "Scheduled call OR polite decline"
    decision_gate: |
      Advance only with explicit score and decision documented.
  - name: "Discovery"
    intent: "Run discovery using Mom Test; emerge with hypothesis."
    tasks:
      - "Run discovery call"
      - "Capture pain + budget + decision-maker access"
      - "Write hypothesis note"
    methodologies:
      - slug: mom-test-customer-interview
        path: playbooks/free/business-discovery/mom-test-customer-interview
        required: true
        tier_gate: playbooks
      - slug: discovery-call-structure
        path: playbooks/pro/client-engagement/discovery-call-structure
        required: true
        tier_gate: playbooks
    outputs:
      - "Call notes"
      - "Hypothesis note"
    decision_gate: |
      Advance only if discovery confirms budget + decision-maker access.
  - name: "Propose + price"
    intent: "Send a retainer proposal with defensive pricing and anchoring."
    tasks:
      - "Pick fixed vs hourly vs retainer"
      - "Compute price using rate floor + risk uplift"
      - "Send 3-option anchored proposal"
    methodologies:
      - slug: statement-of-work
        path: playbooks/pro/client-engagement/statement-of-work
        required: true
        tier_gate: playbooks
      - slug: client-email-templates
        path: playbooks/solo/comms-stakeholder/client-email-templates
        required: true
        tier_gate: playbooks
      - slug: runway-calc
        path: playbooks/solo/solo-ops-finance/runway-calc
        required: true
        tier_gate: playbooks
      - slug: hourly-rate-floor-calculation
        path: pro/_gap/hourly-rate-floor-calculation
        required: true
        tier_gate: pro
      - slug: retainer-pricing-methodology
        path: pro/_gap/retainer-pricing-methodology
        required: true
        tier_gate: pro
      - slug: fixed-vs-hourly-decision-framework
        path: pro/_gap/fixed-vs-hourly-decision-framework
        required: true
        tier_gate: pro
      - slug: proposal-from-discovery-template
        path: pro/_gap/proposal-from-discovery-template
        required: true
        tier_gate: pro
      - slug: three-option-pricing-anchoring
        path: pro/_gap/three-option-pricing-anchoring
        required: true
        tier_gate: pro
    outputs:
      - "Retainer proposal sent"
      - "Pricing rationale"
    decision_gate: |
      Advance only when proposal includes deposit + 3 anchored options.
  - name: "Negotiate + sign"
    intent: "Handle redlines; close with deposit before any work."
    tasks:
      - "Walk through redlines on a call"
      - "Lock contract clauses (IP, termination, payment terms)"
      - "Collect deposit before kickoff"
    methodologies:
      - slug: solo-freelancer-contract-clauses
        path: pro/_gap/solo-freelancer-contract-clauses
        required: true
        tier_gate: pro
      - slug: redline-and-pricing-objection-handling
        path: pro/_gap/redline-and-pricing-objection-handling
        required: true
        tier_gate: pro
      - slug: deposit-before-work-policy
        path: pro/_gap/deposit-before-work-policy
        required: true
        tier_gate: pro
    outputs:
      - "Countersigned retainer"
      - "Deposit landed"
    decision_gate: |
      Cycle closes only when deposit clears. No deposit, no kickoff.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 14000
cli_invocations:
