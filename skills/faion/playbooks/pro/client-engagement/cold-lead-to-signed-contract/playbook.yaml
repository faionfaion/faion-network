slug: cold-lead-to-signed-contract
title: "Cold lead to signed contract (3-week acquisition flow)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 47a6e4a62b456809

tier_min: pro
complexity: medium
context: [solo]
persona_hints: [P3]

intent: |
  From first outbound touch on Upwork/LinkedIn to a counter-signed SOW with deposit landing in escrow; pipeline of 3-5 qualified leads in parallel, one close per cycle.

scope: |
  From first outbound touch on Upwork/LinkedIn to a counter-signed SOW with deposit landing in escrow; pipeline of 3-5 qualified leads in parallel, one close per cycle.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Target & list stage complete: Prospect list (30 rows) in CRM"
  - "Outreach stage complete: First-touch message library"
  - "Discovery + qualify stage complete: Call notes per prospect"
  - "Proposal + close stage complete: Signed SOW"

stages:
  - name: "Target & list"
    intent: "Build a 30-prospect list with niche fit signals before sending anything."
    tasks:
      - "Re-state niche positioning in one sentence"
      - "Generate 30 prospects via Upwork search and LinkedIn"
      - "Score each prospect on fit, budget signal, decision-maker access"
    methodologies:
      - slug: growth-brand-positioning
        path: pro/marketing/gtm-strategist/growth-brand-positioning
        required: true
        tier_gate: pro
      - slug: growth-gtm-strategy
        path: pro/marketing/gtm-strategist/growth-gtm-strategy
        required: true
        tier_gate: pro
      - slug: competitive-positioning
        path: pro/product/product-manager/competitive-positioning
        required: true
        tier_gate: pro
      - slug: growth-linkedin-strategy
        path: pro/marketing/smm-manager/growth-linkedin-strategy
        required: true
        tier_gate: pro
      - slug: freelancer-niche-positioning
        path: pro/_gap/freelancer-niche-positioning
        required: true
        tier_gate: pro
      - slug: upwork-search-targeting
        path: pro/_gap/upwork-search-targeting
        required: true
        tier_gate: pro
    outputs:
      - "Prospect list (30 rows) in CRM"
      - "Niche positioning one-pager"
    decision_gate: |
      Advance once 30 named prospects are scored. Refuse to send if list <20.
  - name: "Outreach"
    intent: "First-touch + follow-up cadence that gets ≥10% reply rate without burning the niche."
    tasks:
      - "Draft first-touch message variant (3 angles, 1 picked)"
      - "Send across 5 days in batches of 6 per day"
      - "Track replies; A/B test subject line midway"
    methodologies:
      - slug: growth-cold-outreach
        path: solo/marketing/growth-marketer/growth-cold-outreach
        required: true
        tier_gate: solo
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: ops-pricing-strategy
        path: solo/marketing/growth-marketer/ops-pricing-strategy
        required: true
        tier_gate: solo
    outputs:
      - "First-touch message library"
      - "Outreach log with reply tracking"
    decision_gate: |
      Advance once ≥3 replies indicate willingness to schedule a call. Re-tune copy if reply rate <5%.
  - name: "Discovery + qualify"
    intent: "30-min calls converting replies into qualified-yes or polite-no."
    tasks:
      - "Prepare hypothesis-led call agenda per prospect"
      - "Run discovery using Mom Test framing"
      - "Score fit; send 24h follow-up email with explicit next step"
    methodologies:
      - slug: elicitation-techniques
        path: pro/ba/business-analyst/elicitation-techniques
        required: true
        tier_gate: pro
      - slug: requirements-prioritization
        path: pro/ba/business-analyst/requirements-prioritization
        required: true
        tier_gate: pro
      - slug: active-listening
        path: solo/comms/communicator/active-listening
        required: true
        tier_gate: solo
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: difficult-conversations
        path: solo/comms/communicator/difficult-conversations
        required: true
        tier_gate: solo
      - slug: stakeholder-communication
        path: solo/comms/communicator/stakeholder-communication
        required: true
        tier_gate: solo
    outputs:
      - "Call notes per prospect"
      - "Fit score column populated"
    decision_gate: |
      Advance only the prospects scoring ≥7/10 on fit + budget. Polite-decline the rest.
  - name: "Proposal + close"
    intent: "Send a 1-3 page proposal, negotiate redlines, get countersigned SOW + deposit."
    tasks:
      - "Draft proposal with 3 pricing options"
      - "Send proposal within 48h of discovery"
      - "Negotiate redlines; close with deposit clause"
    methodologies:
      - slug: acceptance-criteria
        path: pro/ba/business-analyst/acceptance-criteria
        required: true
        tier_gate: pro
      - slug: ops-legal-basics
        path: pro/marketing/gtm-strategist/ops-legal-basics
        required: true
        tier_gate: pro
      - slug: ops-legal-compliance-checklist
        path: pro/marketing/gtm-strategist/ops-legal-compliance-checklist
        required: true
        tier_gate: pro
      - slug: negotiation
        path: solo/comms/communicator/negotiation
        required: true
        tier_gate: solo
      - slug: freelance-proposal-template
        path: pro/_gap/freelance-proposal-template
        required: true
        tier_gate: pro
      - slug: freelance-msa-sow-templates
        path: pro/_gap/freelance-msa-sow-templates
        required: true
        tier_gate: pro
    outputs:
      - "Signed SOW"
      - "Deposit invoice paid"
      - "Project kickoff scheduled"
    decision_gate: |
      Required artifact: countersigned SOW + deposit landed. Without deposit, no work begins.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

