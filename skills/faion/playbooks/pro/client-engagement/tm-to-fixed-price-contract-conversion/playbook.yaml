slug: tm-to-fixed-price-contract-conversion
title: "T&M to fixed-price contract conversion (6 weeks)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 4d41f578d17444e5

tier_min: pro
complexity: deep
context: [outsource, team]
persona_hints: [P4]

intent: |
  Engagement on T&M → client requests fixed-price for next phase → vendor lands a signed amendment without a margin haircut, with frozen requirements baseline, three-point estimate, risk reserves.

scope: |
  Six-week conversion sprint that runs in parallel to delivery. Daria leads the conversion from time-and-materials to fixed-price for phase 2. Output: requirements baseline frozen, three-point estimate with risk reserves, defensible commercial proposal, signed contract amendment. Margin floor protected.

non_goals:
  - "Renegotiation of MSA — amendment only"
  - "Re-baselining the current T&M phase — focused on phase 2"
  - "Replacing the delivery team — same squad continues"

prerequisites:
  - "Current T&M engagement is healthy (no major change-control fights)"
  - "Phase 2 scope draft exists"
  - "Margin floor agreed inside vendor finance"

success_criteria:
  - "Frozen requirements baseline for phase 2"
  - "Three-point estimate + risk reserves"
  - "Defensible commercial proposal (one-pager)"
  - "Signed contract amendment with no margin haircut"
  - "Change-request rate card in place for in-flight changes"

stages:
  - name: "Phase-2 scope freeze"
    intent: "Lock the requirements before pricing them."
    tasks:
      - "Elicitation interviews on phase-2 outcomes"
      - "Prioritise requirements (MoSCoW / RICE)"
      - "Trace each requirement to phase-1 context where applicable"
      - "Validate scope with client PM + sponsor; capture written sign-off"
    methodologies:
      - slug: elicitation-techniques
        path: pro/ba/ba-core/elicitation-techniques
        required: true
        tier_gate: pro
      - slug: requirements-prioritization
        path: pro/ba/ba-core/requirements-prioritization
        required: true
        tier_gate: pro
      - slug: requirements-traceability
        path: pro/ba/ba-core/requirements-traceability
        required: true
        tier_gate: pro
      - slug: acceptance-criteria
        path: pro/ba/ba-modeling/acceptance-criteria
        required: true
        tier_gate: pro
      - slug: strategy-analysis-current-state
        path: pro/ba/business-analyst/strategy-analysis-current-state
        required: true
        tier_gate: pro
    outputs:
      - "Requirements doc v2 with priorities"
      - "Acceptance criteria matrix"
      - "Sign-off record"
    decision_gate: |
      Advance when client PM signs off requirements doc v2 in writing. Verbal nods do not count.
  - name: "Solution + risk"
    intent: "Assess solution options and their risk envelope."
    tasks:
      - "Solution assessment: build vs buy vs hybrid"
      - "Lessons-learned from phase-1 incorporated into phase-2 risk register"
      - "Risk register stacked with named owners"
      - "Procurement exposure mapped (licenses, sub-contractors)"
    methodologies:
      - slug: solution-assessment
        path: pro/ba/ba-core/solution-assessment
        required: true
        tier_gate: pro
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
      - slug: risk-management
        path: pro/pm/pm-traditional/risk-management
        required: true
        tier_gate: pro
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
      - slug: procurement-management
        path: pro/pm/pm-traditional/procurement-management
        required: true
        tier_gate: pro
    outputs:
      - "Solution-assessment memo"
      - "Risk register v2"
      - "Procurement exposure log"
    decision_gate: |
      Advance once risks have named owners + mitigations. Risks without owners stay open and block.
  - name: "Estimate + commercial"
    intent: "Cost the work, defend the margin, draft the commercial pitch."
    tasks:
      - "WBS to leaf level for phase 2"
      - "Three-point estimate (P50/P80/P95)"
      - "Schedule with milestone payment points"
      - "Quality-management plan"
      - "Earned-value tracking points"
      - "Draft commercial proposal (one-pager)"
    methodologies:
      - slug: cost-estimation
        path: pro/pm/pm-traditional/cost-estimation
        required: true
        tier_gate: pro
      - slug: wbs-creation
        path: pro/pm/pm-traditional/wbs-creation
        required: true
        tier_gate: pro
      - slug: schedule-development
        path: pro/pm/pm-traditional/schedule-development
        required: true
        tier_gate: pro
      - slug: quality-management
        path: pro/pm/pm-traditional/quality-management
        required: true
        tier_gate: pro
      - slug: scope-management
        path: pro/pm/pm-traditional/scope-management
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement
        path: pro/pm/pm-traditional/stakeholder-engagement
        required: true
        tier_gate: pro
      - slug: earned-value-management
        path: pro/pm/project-manager/earned-value-management
        required: true
        tier_gate: pro
      - slug: raci-matrix
        path: pro/pm/project-manager/raci-matrix
        required: true
        tier_gate: pro
      - slug: tm-to-fp-conversion-playbook
        path: pro/_gap/tm-to-fp-conversion-playbook
        required: true
        tier_gate: pro
      - slug: vendor-margin-defense-checklist
        path: pro/_gap/vendor-margin-defense-checklist
        required: true
        tier_gate: pro
    outputs:
      - "WBS + estimate sheet"
      - "Schedule with payment points"
      - "Quality-management plan"
      - "Commercial proposal draft"
    decision_gate: |
      Advance when P80 + reserves clears the margin floor. If not, scope-cut first, then re-price.
  - name: "Change-control hardening"
    intent: "Wire up the guard rails BEFORE you sign fixed-price."
    tasks:
      - "Communications-management plan tailored to fixed-price ops"
      - "Change-control workflow with daily SLA"
      - "Change-request rate card (for in-flight requests)"
      - "Stakeholder engagement plan for the next 6 months"
    methodologies:
      - slug: change-control
        path: pro/pm/pm-traditional/change-control
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement
        path: pro/pm/pm-traditional/stakeholder-engagement
        required: true
        tier_gate: pro
      - slug: change-request-rate-card-template
        path: pro/_gap/change-request-rate-card-template
        required: true
        tier_gate: pro
      - slug: scope-creep-management
        path: pro/_existing_playbook/scope-creep-management
        required: false
        tier_gate: pro
    outputs:
      - "Comms plan"
      - "Change-control workflow doc"
      - "Rate card"
    decision_gate: |
      Advance when the change-control workflow is co-signed by client PM.
  - name: "Negotiation + signature"
    intent: "Close the amendment without giving the margin back."
    tasks:
      - "Internal red-team challenge"
      - "Run client negotiation (pricing, payment terms, acceptance criteria)"
      - "Capture lessons-learned for the next conversion"
      - "File signed amendment + run kickoff communication"
    methodologies:
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: statement-of-work
        path: pro/_existing_playbook/statement-of-work
        required: false
        tier_gate: pro
      - slug: scoping-workshop
        path: pro/_existing_playbook/scoping-workshop
        required: false
        tier_gate: pro
    outputs:
      - "Red-team notes"
      - "Signed amendment"
      - "Lessons-learned"
    decision_gate: |
      Sign only with margin floor cleared AND change-control wired up. Walk if the client wants neither.

common_pitfalls:
  - "Converting without freezing the requirements — guaranteed margin loss"
  - "Letting the client treat the amendment as a renegotiation of phase 1"
  - "Skipping the rate card — every change request becomes a fight"

quality_checklist:
  - "Did we lock requirements BEFORE we priced them?"
  - "Could we defend the margin to our CFO without flinching?"
  - "Did we agree the change-control workflow in writing, with rates?"

related_playbooks:
  - statement-of-work
  - scoping-workshop
  - scope-creep-management

