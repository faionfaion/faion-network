slug: client-demo-prep-and-run
title: "Client demo prep + run"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 5a8f205ed295fa3d

tier_min: pro
complexity: medium
context: [outsource, team]
persona_hints: [P4]

intent: |
  End-of-sprint demo to client stakeholders (often non-technical) → explicit acceptance per AC, action items captured, senior dev runs it solo (not the PM).

scope: |
  Atomic ceremony: end-of-sprint demo with the offshore senior leading. Output: per-AC explicit acceptance, captured action items, recording archived, narrative tailored to executive audience where present. Avoids 'great, send a recording' non-decisions.

non_goals:
  - "Sprint retrospective — separate ceremony"
  - "Sales pitch — internal customer"
  - "Live development — the build is done"

prerequisites:
  - "Sprint goal achieved (or partial known)"
  - "AC list per ticket accessible"
  - "Stakeholders confirmed; AV checked"

success_criteria:
  - "AC checked off live with stakeholder confirmation"
  - "Action items captured with owners"
  - "Recording archived in engagement journal"
  - "Narrative tailored to non-technical audience"
  - "No 'send recording, we'll review later' close"

stages:
  - name: "Prep narrative"
    intent: "Build the story arc before opening the IDE."
    tasks:
      - "Identify primary stakeholder + their question"
      - "Stakeholder-engagement pass for executive comms"
      - "Storytelling frame: problem → choice → outcome"
      - "Selling-ideas patterns for non-tech audience"
    methodologies:
      - slug: stakeholder-engagement
        path: pro/pm/pm-traditional/stakeholder-engagement
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement
        path: pro/pm/project-manager/stakeholder-engagement
        required: true
        tier_gate: pro
      - slug: business-storytelling
        path: solo/comms/communicator/business-storytelling
        required: true
        tier_gate: solo
      - slug: selling-ideas
        path: solo/comms/communicator/selling-ideas
        required: true
        tier_gate: solo
      - slug: executive-stakeholder-demo-narrative-frame
        path: pro/_gap/executive-stakeholder-demo-narrative-frame
        required: true
        tier_gate: pro
    outputs:
      - "Demo narrative draft (3-5 beats)"
      - "Stakeholder note"
    decision_gate: |
      Advance only when narrative answers the primary stakeholder's question.
  - name: "Script + dry-run"
    intent: "Make sure the demo runs the same in front of the client as in rehearsal."
    tasks:
      - "Write demo script tied to AC"
      - "Dry-run end-to-end with team"
      - "Verify environment + data look real, not synthetic"
      - "Prepare fallback for any flaky path"
      - "Scrum-ceremonies discipline on time-box"
    methodologies:
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: active-listening
        path: solo/comms/communicator/active-listening
        required: true
        tier_gate: solo
      - slug: sprint-demo-script-template
        path: pro/_gap/sprint-demo-script-template
        required: true
        tier_gate: pro
    outputs:
      - "Demo script"
      - "Dry-run notes"
    decision_gate: |
      Advance only after a clean dry-run.
  - name: "Run + collect acceptance"
    intent: "Drive the demo, surface acceptance per AC, capture actions."
    tasks:
      - "Run demo; call out AC explicitly per ticket"
      - "Use requirements-validation prompts to lock acceptance"
      - "Capture action items with named owners + dates"
      - "Record the session and archive"
    methodologies:
      - slug: requirements-validation
        path: pro/ba/business-analyst/requirements-validation
        required: true
        tier_gate: pro
    outputs:
      - "AC checkmarks per ticket"
      - "Action item list"
      - "Recording archived"
    decision_gate: |
      Done only when acceptance per AC is explicit. 'Looks good' without per-AC sign is incomplete.

common_pitfalls:
  - "Showing features without tying them to the AC"
  - "Letting acceptance default to 'send the recording'"
  - "Demo-driven development — building flashy things instead of valid ones"

quality_checklist:
  - "Did the primary stakeholder get an answer to their question?"
  - "Did I close every AC live?"
  - "Did I leave with named action owners and dates?"

related_playbooks:
  - weekly-client-status-report-outsource
  - story-points-estimation-poker

token_budget_estimate: 9000
