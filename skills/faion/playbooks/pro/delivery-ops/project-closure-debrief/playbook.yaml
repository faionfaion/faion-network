# =============================================================================
# faion playbook manifest — P3 technical freelancer
# Generated for F-064 from playbook-index.json entry #18
# =============================================================================

slug: project-closure-debrief
title: "Project closure debrief + retrospective"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: ec75274c41ea95ee

tier_min: pro
complexity: medium
context: [solo]
persona_hints: [P3]

intent: |
  Project hits final milestone or retainer ends. Done = handover artifacts delivered, final invoice settled, internal retro logged, referral/upsell motion triggered.

scope: |
  Project hits final milestone or retainer ends. Done = handover artifacts delivered, final invoice settled, internal retro logged, referral/upsell motion triggered.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Handover stage complete: Handover bundle"
  - "Retro stage complete: Retro doc"
  - "Reactivate stage complete: Referral ask sent"

stages:
  - name: "Handover"
    intent: "Deliver handover artifacts; settle final invoice."
    tasks:
      - "Package code + docs + credentials"
      - "Run a 30-min walkthrough"
      - "Settle final invoice"
    methodologies:
      - slug: communications-management
        path: pro/pm/project-manager/communications-management
        required: true
        tier_gate: pro
      - slug: procurement-management
        path: pro/pm/project-manager/procurement-management
        required: true
        tier_gate: pro
      - slug: project-closure
        path: pro/pm/project-manager/project-closure
        required: true
        tier_gate: pro
      - slug: freelancer-handover-bundle-template
        path: pro/_gap/freelancer-handover-bundle-template
        required: true
        tier_gate: pro
    outputs:
      - "Handover bundle"
      - "Walkthrough recording"
      - "Final invoice paid"
    decision_gate: |
      Advance only after final invoice is paid.
  - name: "Retro"
    intent: "Internal retro: what to repeat, what to fix."
    tasks:
      - "Write win / loss / surprise notes"
      - "Log lessons in personal patterns doc"
      - "Flag SOPs to update"
    methodologies:
      - slug: benefits-realization
        path: pro/pm/project-manager/benefits-realization
        required: true
        tier_gate: pro
      - slug: lessons-learned
        path: pro/pm/project-manager/lessons-learned
        required: true
        tier_gate: pro
    outputs:
      - "Retro doc"
      - "Updated patterns library"
    decision_gate: |
      Advance only with written retro. Mental-only doesn't count.
  - name: "Reactivate"
    intent: "Trigger referral, upsell, or retainer-restart motion."
    tasks:
      - "Ask for testimonial + referral"
      - "Pitch upsell or retainer-restart if relevant"
      - "Add to 90-day check-in cadence"
    methodologies:
      - slug: ops-customer-success-basics
        path: pro/marketing/gtm-strategist/ops-customer-success-basics
        required: true
        tier_gate: pro
      - slug: ops-upselling-cross-selling
        path: pro/marketing/gtm-strategist/ops-upselling-cross-selling
        required: true
        tier_gate: pro
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: solo
      - slug: solo-retainer-reactivation-cadence
        path: pro/_gap/solo-retainer-reactivation-cadence
        required: true
        tier_gate: pro
    outputs:
      - "Referral ask sent"
      - "Upsell pitch (if relevant)"
      - "Check-in scheduled"
    decision_gate: |
      Cycle closes only when at least one of testimonial/referral/upsell is requested.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 14000
cli_invocations:
  human:  "faion get-content project-closure-debrief --format md"
  agent:  "faion get-content project-closure-debrief --format context"
  json:   "faion get-content project-closure-debrief --format json"

