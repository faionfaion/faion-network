slug: quarterly-rate-adjustment-review
title: "Quarterly rate adjustment review"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 15964fd12cd1e268

tier_min: pro
complexity: medium
context: [solo]
persona_hints: [P3]

intent: |
  Every 90 days, decide whether to raise rates, with whom, and by how much. Done = rate decision matrix updated, raise-letters drafted for eligible clients, new prospect quotes adjusted.

scope: |
  Every 90 days, decide whether to raise rates, with whom, and by how much. Done = rate decision matrix updated, raise-letters drafted for eligible clients, new prospect quotes adjusted.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Data pull stage complete: Utilization report"
  - "Decide raises stage complete: Rate decision matrix"
  - "Draft + send stage complete: Raise-letters sent"

stages:
  - name: "Data pull"
    intent: "Gather utilization, pipeline, market rate, and client scorecard."
    tasks:
      - "Pull billable utilization for the quarter"
      - "Pull pipeline pressure: backlog + waitlist"
      - "Survey market-rate signal for your niche"
    methodologies:
      - slug: competitive-intelligence
        path: pro/research/researcher/competitive-intelligence
        required: true
        tier_gate: pro
      - slug: market-research-tam-sam-som
        path: pro/research/researcher/market-research-tam-sam-som
        required: true
        tier_gate: pro
      - slug: solo-utilization-and-pipeline-dashboard
        path: pro/_gap/solo-utilization-and-pipeline-dashboard
        required: true
        tier_gate: pro
    outputs:
      - "Utilization report"
      - "Pipeline snapshot"
      - "Market-rate notes"
    decision_gate: |
      Advance only with quantitative inputs, not vibes.
  - name: "Decide raises"
    intent: "Pick whom to raise, by how much, and when."
    tasks:
      - "Score each client on raise-eligibility (relationship, contract length, growth)"
      - "Pick raise %"
      - "Set effective dates"
    methodologies:
      - slug: ops-financial-basics
        path: pro/marketing/gtm-strategist/ops-financial-basics
        required: true
        tier_gate: pro
      - slug: cost-estimation
        path: pro/pm/project-manager/cost-estimation
        required: true
        tier_gate: pro
      - slug: risk-management
        path: pro/pm/project-manager/risk-management
        required: true
        tier_gate: pro
    outputs:
      - "Rate decision matrix"
    decision_gate: |
      Advance only when each client has a decision (raise / hold / drop).
  - name: "Draft + send"
    intent: "Send raise-letters; quote new prospects at new rate."
    tasks:
      - "Draft personalised raise-letter per eligible client"
      - "Send with notice period"
      - "Update all proposal templates to new rate"
    methodologies:
      - slug: difficult-conversations
        path: solo/comms/communicator/difficult-conversations
        required: true
        tier_gate: solo
      - slug: negotiation
        path: solo/comms/communicator/negotiation
        required: true
        tier_gate: solo
      - slug: selling-ideas
        path: solo/comms/communicator/selling-ideas
        required: true
        tier_gate: solo
      - slug: freelancer-rate-raise-letter-template
        path: pro/_gap/freelancer-rate-raise-letter-template
        required: true
        tier_gate: pro
    outputs:
      - "Raise-letters sent"
      - "Updated proposal templates"
    decision_gate: |
      Cycle closes only when letters are sent and templates updated.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 14000
cli_invocations:
  human:  "faion get-content quarterly-rate-adjustment-review --format md"
  agent:  "faion get-content quarterly-rate-adjustment-review --format context"
  json:   "faion get-content quarterly-rate-adjustment-review --format json"

