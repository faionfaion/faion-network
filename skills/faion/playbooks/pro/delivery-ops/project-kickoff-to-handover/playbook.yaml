slug: project-kickoff-to-handover
title: "Project kickoff to handover (typical 6-12 week engagement)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: aa6b048d29353668

tier_min: pro
complexity: deep
context: [solo]
persona_hints: [P3]

intent: |
  From signed SOW to client-accepted final deliverable, with the freelancer running solo across discovery, build, and ship — no scope creep, weekly invoices paid on time, written handover + warranty period defined.

scope: |
  From signed SOW to client-accepted final deliverable, with the freelancer running solo across discovery, build, and ship — no scope creep, weekly invoices paid on time, written handover + warranty period defined.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Kickoff & discovery stage complete: Stakeholder register"
  - "Plan & spec stage complete: Milestone plan with invoice points"
  - "Build & ship stage complete: Deployed milestones"
  - "Handover & warranty stage complete: Handover package URL"

stages:
  - name: "Kickoff & discovery"
    intent: "Align stakeholders, lock scope baseline, set communication cadence."
    tasks:
      - "Run kickoff workshop with named stakeholders"
      - "Document elicited requirements + acceptance criteria"
      - "Publish weekly cadence calendar"
    methodologies:
      - slug: elicitation-techniques
        path: pro/ba/business-analyst/elicitation-techniques
        required: true
        tier_gate: pro
      - slug: requirements-documentation
        path: pro/ba/business-analyst/requirements-documentation
        required: true
        tier_gate: pro
      - slug: stakeholder-analysis
        path: pro/ba/business-analyst/stakeholder-analysis
        required: true
        tier_gate: pro
      - slug: acceptance-criteria
        path: pro/ba/business-analyst/acceptance-criteria
        required: true
        tier_gate: pro
      - slug: stakeholder-communication
        path: solo/comms/communicator/stakeholder-communication
        required: true
        tier_gate: solo
    outputs:
      - "Stakeholder register"
      - "Requirements doc v1"
      - "Weekly cadence published"
    decision_gate: |
      Advance once stakeholders sign off on requirements + cadence. No scope ambiguity beyond known unknowns.
  - name: "Plan & spec"
    intent: "Translate requirements into a delivery plan with milestones tied to invoices."
    tasks:
      - "Break work into 1-2 week milestones"
      - "Map acceptance criteria to every milestone"
      - "Lock MVP scope; defer the rest"
    methodologies:
      - slug: requirements-traceability
        path: pro/ba/business-analyst/requirements-traceability
        required: true
        tier_gate: pro
      - slug: requirements-validation
        path: pro/ba/business-analyst/requirements-validation
        required: true
        tier_gate: pro
      - slug: mvp-scoping
        path: pro/product/product-planning/mvp-scoping
        required: true
        tier_gate: pro
      - slug: release-planning
        path: pro/product/product-planning/release-planning
        required: true
        tier_gate: pro
      - slug: quality-attributes-analysis
        path: pro/dev/software-architect/quality-attributes-analysis
        required: true
        tier_gate: pro
    outputs:
      - "Milestone plan with invoice points"
      - "Acceptance criteria matrix"
    decision_gate: |
      Advance once milestones + invoice points are agreed. Push back on any scope adds.
  - name: "Build & ship"
    intent: "Deliver milestones on a weekly cadence; invoice on completion."
    tasks:
      - "Ship one milestone per week"
      - "Send weekly status with shipped/blocked/next"
      - "Invoice on milestone acceptance"
    methodologies:
      - slug: api-monitoring-health-checks
        path: pro/dev/software-developer/api-monitoring-health-checks
        required: true
        tier_gate: pro
      - slug: api-monitoring-logging
        path: pro/dev/software-developer/api-monitoring-logging
        required: true
        tier_gate: pro
      - slug: api-documentation
        path: solo/dev/api-developer/api-documentation
        required: true
        tier_gate: solo
      - slug: ops-automation-workflow
        path: solo/dev/automation-tooling/ops-automation-workflow
        required: true
        tier_gate: solo
      - slug: ops-dashboard-setup
        path: solo/dev/automation-tooling/ops-dashboard-setup
        required: true
        tier_gate: solo
      - slug: framework-decomposition-patterns
        path: solo/dev/code-quality/framework-decomposition-patterns
        required: true
        tier_gate: solo
      - slug: continuous-delivery
        path: solo/dev/software-developer/continuous-delivery
        required: true
        tier_gate: solo
      - slug: testing-developer
        path: solo/dev/testing-developer
        required: true
        tier_gate: solo
      - slug: linear-issue-tracking
        path: solo/pm/pm-agile/linear-issue-tracking
        required: true
        tier_gate: solo
      - slug: notion-pm
        path: solo/pm/pm-agile/notion-pm
        required: true
        tier_gate: solo
      - slug: scope-creep-firewall
        path: pro/_gap/scope-creep-firewall
        required: true
        tier_gate: pro
      - slug: freelance-weekly-invoice-cadence
        path: pro/_gap/freelance-weekly-invoice-cadence
        required: true
        tier_gate: pro
    outputs:
      - "Deployed milestones"
      - "Weekly status notes"
      - "Paid invoices"
    decision_gate: |
      Advance to next milestone only after current is signed-off. If two slipped, escalate.
  - name: "Handover & warranty"
    intent: "Package deliverables, hand off, define warranty window, harvest testimonial."
    tasks:
      - "Publish handover package (code, docs, credentials)"
      - "Walk client through usage; record session"
      - "Define 30-day warranty terms in writing"
    methodologies:
      - slug: ops-customer-success-basics
        path: pro/marketing/gtm-strategist/ops-customer-success-basics
        required: true
        tier_gate: pro
      - slug: ops-legal-compliance-checklist
        path: pro/marketing/gtm-strategist/ops-legal-compliance-checklist
        required: true
        tier_gate: pro
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: solo
      - slug: client-handover-package
        path: pro/_gap/client-handover-package
        required: true
        tier_gate: pro
      - slug: warranty-period-sop
        path: pro/_gap/warranty-period-sop
        required: true
        tier_gate: pro
    outputs:
      - "Handover package URL"
      - "Walkthrough recording"
      - "Warranty doc"
      - "Testimonial captured"
    decision_gate: |
      Engagement closes only after handover doc accepted and final invoice paid.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

