slug: project-from-kickoff-to-client-signoff
title: "Project from kickoff to client signoff (8-12 weeks)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 886574453b6d5fc3

tier_min: pro
complexity: deep
context: [team, outsource]
persona_hints: [P5]

intent: |
  Signed SOW to delivered project with measured margin, NPS, and a retainer-or-referral conversation booked.

scope: |
  A signed SOW becomes a delivered project: kickoff, requirements baseline, delivery in waves, change-controlled scope, final acceptance, retainer-or-referral conversation. Net margin and NPS measured. Exit artifact: closure pack (lessons-learned, NPS, margin row, referral or retainer follow-up scheduled).

non_goals:
  - "Multi-year transformation programs - out of scope"
  - "Fully software-product delivery - separate playbook"

prerequisites:
  - "Signed SOW + deposit cleared"
  - "Identified delivery lead (founder or contractor)"

success_criteria:
  - "Kickoff held within 5 working days of signature"
  - "Baselined requirements with traceability to acceptance criteria"
  - "Scope changes processed via change-control with priced CRs"
  - "Final acceptance signed by client"
  - "Closure pack delivered: lessons-learned + NPS + margin"
  - "Retainer-or-referral conversation booked"

stages:
  - name: "Kickoff"
    intent: "Set rhythm, RACI, escalation; baseline scope and risks."
    tasks:
      - "Run 60-90 min kickoff meeting"
      - "Publish RACI + comms cadence"
      - "Open risk register"
    methodologies:
      - slug: communications-management
        path: pro/pm/project-manager/communications-management
        required: true
        tier_gate: pro
      - slug: raci-matrix
        path: pro/pm/project-manager/raci-matrix
        required: true
        tier_gate: pro
      - slug: risk-management
        path: pro/pm/project-manager/risk-management
        required: true
        tier_gate: pro
      - slug: risk-register
        path: pro/pm/project-manager/risk-register
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement
        path: pro/pm/project-manager/stakeholder-engagement
        required: true
        tier_gate: pro
    outputs:
      - "Kickoff deck"
      - "Published RACI + cadence"
      - "Risk register v1"
    decision_gate: |
      Advance once stakeholders confirmed RACI + cadence in writing.
  - name: "Baseline + plan"
    intent: "Lock requirements + acceptance criteria + schedule."
    tasks:
      - "Elicit + document requirements"
      - "Prioritize + traceability-link to AC"
      - "Develop schedule with milestones"
    methodologies:
      - slug: acceptance-criteria
        path: pro/ba/ba-modeling/acceptance-criteria
        required: true
        tier_gate: pro
      - slug: elicitation-techniques
        path: pro/ba/business-analyst/elicitation-techniques
        required: true
        tier_gate: pro
      - slug: requirements-documentation
        path: pro/ba/business-analyst/requirements-documentation
        required: true
        tier_gate: pro
      - slug: requirements-prioritization
        path: pro/ba/business-analyst/requirements-prioritization
        required: true
        tier_gate: pro
      - slug: requirements-traceability
        path: pro/ba/business-analyst/requirements-traceability
        required: true
        tier_gate: pro
      - slug: schedule-development
        path: pro/pm/project-manager/schedule-development
        required: true
        tier_gate: pro
      - slug: scope-management
        path: pro/pm/project-manager/scope-management
        required: true
        tier_gate: pro
    outputs:
      - "Baselined requirements"
      - "Acceptance-criteria matrix"
      - "Schedule v1"
    decision_gate: |
      Advance only when AC matrix complete and signed by sponsor.
  - name: "Deliver in waves"
    intent: "Wave-based delivery with mid-cycle validation gates."
    tasks:
      - "Run 2-3 week delivery waves"
      - "Hold scrum/kanban ceremony cadence"
      - "Earned-value review weekly"
    methodologies:
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
      - slug: kanban-scaled-agile-ceremonies
        path: pro/pm/pm-agile/kanban-scaled-agile-ceremonies
        required: true
        tier_gate: pro
      - slug: earned-value-management
        path: pro/pm/project-manager/earned-value-management
        required: true
        tier_gate: pro
      - slug: quality-management
        path: pro/pm/project-manager/quality-management
        required: true
        tier_gate: pro
      - slug: team-development
        path: pro/pm/project-manager/team-development
        required: true
        tier_gate: pro
      - slug: requirements-validation
        path: pro/ba/business-analyst/requirements-validation
        required: true
        tier_gate: pro
    outputs:
      - "Wave deliverables"
      - "EVM weekly report"
    decision_gate: |
      Advance wave when AC pass + sponsor signs the wave note.
  - name: "Change control"
    intent: "Every scope change is priced; no quiet drift."
    tasks:
      - "Capture CR with impact analysis"
      - "Price CR + adjust schedule"
      - "Get written approval before exec"
    methodologies:
      - slug: change-control
        path: pro/pm/project-manager/change-control
        required: true
        tier_gate: pro
      - slug: solution-assessment
        path: pro/ba/business-analyst/solution-assessment
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/project-manager/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
    outputs:
      - "CR log"
      - "Updated SOW addenda"
    decision_gate: |
      No work on unpriced CRs. No exceptions for 'small' changes.
  - name: "Acceptance + close"
    intent: "Final acceptance + closure pack + upsell signal."
    tasks:
      - "Run UAT against AC matrix"
      - "Collect NPS + lessons-learned"
      - "Book retainer or referral conversation"
    methodologies:
      - slug: benefits-realization
        path: pro/pm/project-manager/benefits-realization
        required: true
        tier_gate: pro
      - slug: lessons-learned
        path: pro/pm/project-manager/lessons-learned
        required: true
        tier_gate: pro
      - slug: project-closure
        path: pro/pm/project-manager/project-closure
        required: true
        tier_gate: pro
      - slug: ops-customer-success-metrics
        path: pro/marketing/gtm-strategist/ops-customer-success-metrics
        required: true
        tier_gate: pro
      - slug: ops-upselling-cross-selling
        path: pro/marketing/gtm-strategist/ops-upselling-cross-selling
        required: true
        tier_gate: pro
    outputs:
      - "Acceptance certificate"
      - "Closure pack"
      - "Retainer/referral note"
    decision_gate: |
      Required: signed acceptance + closure pack + booked follow-up. Otherwise project is not closed.

common_pitfalls:
  - "Letting scope drift via Slack without CRs - kills margin invisibly"
  - "Skipping NPS because 'the client seemed happy' - kills referral motion"
  - "Closing the project without booking the next conversation"

quality_checklist:
  - "Is every AC mapped to a delivered artifact?"
  - "Did every scope change move through written CR?"
  - "Did I leave the engagement with a planned follow-up?"

related_playbooks:
  - quarter-end-retention-review
  - quarterly-retainer-review-per-client

