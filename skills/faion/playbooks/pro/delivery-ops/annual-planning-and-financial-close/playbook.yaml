slug: annual-planning-and-financial-close
title: "Annual planning and financial close (6-8 weeks, Q4 cycle)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 9653876f9a3fabbc

tier_min: pro
complexity: medium
context: [solo, team]
persona_hints: [P5]

intent: |
  Q4 to books closed, taxes filed, next-year targets locked, service portfolio refreshed, compliance risks logged.

scope: |
  Run an annual planning cycle that closes the books, files taxes, sets next-year revenue / margin / hiring targets, locks the service portfolio, and surfaces compliance risks before they bite. Exit artifact: annual-plan pack + closed books + filed returns + refreshed risk register.

non_goals:
  - "Multi-year strategic planning - separate cadence"
  - "Investor-grade financial audit - out of scope for solo / micro-agency"

prerequisites:
  - "Bookkeeping in place (Xero / QuickBooks / equivalent)"
  - "Last 12 months revenue + expense data accessible"

success_criteria:
  - "Books closed for prior year"
  - "Taxes filed or scheduled with accountant"
  - "Next-year revenue, margin, hiring targets locked"
  - "Service portfolio refreshed (kept / dropped / new)"
  - "Compliance risk register updated"
  - "Annual plan signed off by the founder in writing"

stages:
  - name: "Close books + file taxes"
    intent: "Honest financial picture before planning anything."
    tasks:
      - "Reconcile bank + invoicing data"
      - "Lock prior-year P&L + balance sheet"
      - "File taxes or schedule with accountant"
    methodologies:
      - slug: ops-financial-basics
        path: pro/marketing/gtm-strategist/ops-financial-basics
        required: true
        tier_gate: pro
      - slug: ops-tax-basics
        path: pro/marketing/gtm-strategist/ops-tax-basics
        required: true
        tier_gate: pro
      - slug: ops-tax-compliance
        path: pro/marketing/gtm-strategist/ops-tax-compliance
        required: true
        tier_gate: pro
      - slug: ops-legal-basics
        path: pro/marketing/gtm-strategist/ops-legal-basics
        required: true
        tier_gate: pro
      - slug: ops-legal-compliance
        path: pro/marketing/gtm-strategist/ops-legal-compliance
        required: true
        tier_gate: pro
      - slug: ops-legal-compliance-checklist
        path: pro/marketing/gtm-strategist/ops-legal-compliance-checklist
        required: true
        tier_gate: pro
    outputs:
      - "Closed P&L + BS"
      - "Tax filing confirmation"
    decision_gate: |
      Advance only when books are reconciled and tax filing started.
  - name: "Plan targets"
    intent: "Revenue, margin, hiring targets - defensible numbers."
    tasks:
      - "Forecast revenue lines"
      - "Set margin + hiring targets"
      - "Run sensitivity analysis"
    methodologies:
      - slug: ops-annual-planning-process
        path: pro/marketing/gtm-strategist/ops-annual-planning-process
        required: true
        tier_gate: pro
      - slug: ops-annual-planning-templates
        path: pro/marketing/gtm-strategist/ops-annual-planning-templates
        required: true
        tier_gate: pro
      - slug: growth-gtm-strategy
        path: pro/marketing/gtm-strategist/growth-gtm-strategy
        required: true
        tier_gate: pro
      - slug: growth-brand-positioning
        path: pro/marketing/gtm-strategist/growth-brand-positioning
        required: true
        tier_gate: pro
      - slug: trend-analysis
        path: pro/research/market-researcher/trend-analysis
        required: true
        tier_gate: pro
      - slug: predictive-analytics-pm
        path: pro/pm/project-manager/predictive-analytics-pm
        required: true
        tier_gate: pro
    outputs:
      - "Target spreadsheet"
      - "Sensitivity scenarios"
    decision_gate: |
      Advance when targets pass the gut + math test.
  - name: "Refresh portfolio + ops"
    intent: "Service lines pruned, ops + contractor mix adjusted."
    tasks:
      - "Score each service line"
      - "Drop or refactor weakest"
      - "Adjust contractor + partnership commitments"
    methodologies:
      - slug: portfolio-strategy
        path: pro/product/product-planning/portfolio-strategy
        required: true
        tier_gate: pro
      - slug: ops-contractor-management
        path: pro/marketing/gtm-strategist/ops-contractor-management
        required: true
        tier_gate: pro
      - slug: ops-partnership-strategy
        path: pro/marketing/gtm-strategist/ops-partnership-strategy
        required: true
        tier_gate: pro
    outputs:
      - "Service-line decision doc"
      - "Contractor + partnership plan"
    decision_gate: |
      Advance when each service line is in 'keep', 'refactor', or 'sunset' bucket.
  - name: "Risk + compliance"
    intent: "Surface risks now so they do not blindside next year."
    tasks:
      - "Refresh risk register"
      - "Audit data + privacy compliance"
      - "Plan mitigations + owners"
    methodologies:
      - slug: privacy-compliance
        path: pro/marketing/growth-marketer/privacy-compliance
        required: true
        tier_gate: pro
      - slug: risk-management
        path: pro/pm/project-manager/risk-management
        required: true
        tier_gate: pro
      - slug: risk-register
        path: pro/pm/project-manager/risk-register
        required: true
        tier_gate: pro
      - slug: risk-assessment
        path: pro/research/market-researcher/risk-assessment
        required: true
        tier_gate: pro
    outputs:
      - "Risk register v2"
      - "Compliance gap list"
    decision_gate: |
      Required output: every high-impact risk has an owner + mitigation date.

common_pitfalls:
  - "Setting next-year targets without closed books - fiction in, fiction out"
  - "Skipping the portfolio prune because services 'might come back'"
  - "Treating compliance as a Q1 problem - late filings are expensive"

quality_checklist:
  - "Are the targets defensible to a stranger with the spreadsheet?"
  - "Did I actually drop or refactor a service, or only nudge?"
  - "Is the risk register updated, not just dusted off?"

related_playbooks:
  - quarter-end-retention-review
  - agency-to-recurring-revenue-transition

token_budget_estimate: 16000
