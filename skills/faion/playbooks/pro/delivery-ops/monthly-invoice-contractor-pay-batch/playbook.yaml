slug: monthly-invoice-contractor-pay-batch
title: "Monthly invoice + contractor pay batch"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 4a7758e1f86ebdd2

tier_min: pro
complexity: light
context: [solo, team]
persona_hints: [P5]

intent: |
  One sitting per month to all client invoices sent + all contractors paid + books reconciled.

scope: |
  Founder issues all client invoices and pays all contractors in one batched session monthly. Output: invoices sent, contractors paid, books reconciled. Exit artifact: invoices list + contractor payment confirmations + reconciled books for the month.

non_goals:
  - "Annual financial close - separate playbook"
  - "Tax filing - separate cadence"

prerequisites:
  - "Bookkeeping + invoicing tooling live"
  - "Contractor timesheets / deliverables captured"

success_criteria:
  - "All client invoices sent by first business day of month"
  - "All contractors paid by 5th business day"
  - "Books reconciled with bank"
  - "Late payers flagged with follow-up date"

stages:
  - name: "Invoice clients"
    intent: "Send every invoice on the same day, no excuses."
    tasks:
      - "Pull retainer + project invoiceable lines"
      - "Generate invoices"
      - "Send via accounting tool"
    methodologies:
      - slug: ops-financial-basics
        path: pro/marketing/gtm-strategist/ops-financial-basics
        required: true
        tier_gate: pro
      - slug: ops-legal-compliance-checklist
        path: pro/marketing/gtm-strategist/ops-legal-compliance-checklist
        required: true
        tier_gate: pro
      - slug: ops-tax-compliance
        path: pro/marketing/gtm-strategist/ops-tax-compliance
        required: true
        tier_gate: pro
      - slug: ops-financial-planning
        path: solo/marketing/gtm-strategist/ops-financial-planning
        required: true
        tier_gate: solo
    outputs:
      - "Sent invoices list"
    decision_gate: |
      Advance once 100% of invoices sent.
  - name: "Pay contractors"
    intent: "Approve, batch, send. Days, not weeks."
    tasks:
      - "Verify contractor invoices against deliverables"
      - "Batch payments"
      - "Confirm receipt + log"
    methodologies:
      - slug: ops-contractor-management
        path: pro/marketing/gtm-strategist/ops-contractor-management
        required: true
        tier_gate: pro
      - slug: cost-estimation
        path: pro/pm/project-manager/cost-estimation
        required: true
        tier_gate: pro
    outputs:
      - "Payments sent"
      - "Receipt confirmations"
    decision_gate: |
      Advance once all contractors paid within agreed terms.
  - name: "Reconcile + log"
    intent: "Books match bank; late payers tagged."
    tasks:
      - "Match invoices to deposits"
      - "Tag late payers + schedule follow-ups"
      - "Update KPI sheet"
    methodologies: []
    outputs:
      - "Reconciliation note"
      - "Late-payer log"
    decision_gate: |
      Required: books reconciled within 48h of batch.

common_pitfalls:
  - "Sending invoices the day each project finishes - never batch, always late"
  - "Paying contractors late to 'manage cash' - destroys bench loyalty"
  - "Skipping reconciliation - DSO drifts invisibly"

quality_checklist:
  - "Did I send every invoice on the same day?"
  - "Were contractors paid on agreed terms?"
  - "Did the books match the bank?"

related_playbooks:
  - friday-cash-flow-and-utilization-check
  - annual-planning-and-financial-close

token_budget_estimate: 6000
cli_invocations:
  human:  "faion get-content monthly-invoice-contractor-pay-batch --format md"
  agent:  "faion get-content monthly-invoice-contractor-pay-batch --format context"
  json:   "faion get-content monthly-invoice-contractor-pay-batch --format json"

