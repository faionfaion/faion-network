slug: audit-grade-code-review-compliance
title: "Audit-grade code review for compliance client"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 4425a613b0eb0514

tier_min: pro
complexity: medium
context: [outsource, team]
persona_hints: [P4]

intent: |
  Review a teammate's PR knowing it may land in a SOC 2 / HIPAA / PCI / banking audit binder → comments hold up under regulator scrutiny, not just 'LGTM'.

scope: |
  Atomic PR review for a compliance-relevant change. Output: a review with explicit control-traceability comments, recorded test verification, AI-generated code flagged as such, and a verdict that survives later audit walk-through. Standard PR ceremony amplified, not replaced.

non_goals:
  - "Architecture review — separate ADR ceremony"
  - "Full SOC 2 audit — single PR scope"
  - "Security pentesting — distinct activity"

prerequisites:
  - "Compliance regime active on the engagement"
  - "Control catalogue accessible"
  - "AI-coding-agent guardrails defined"

success_criteria:
  - "Comments reference at least one control ID per finding"
  - "Test verification logged (run, output captured)"
  - "AI-generated portions flagged + human-attested"
  - "Verdict (approve/changes-requested) defended by control evidence"
  - "Review survives a later audit walk-through cold"

stages:
  - name: "Frame the change"
    intent: "Understand what's being reviewed before commenting."
    tasks:
      - "Read the PR description + linked ticket"
      - "Trace requirements: which control(s) does this PR touch?"
      - "Apply code-review basics (scope, intent, side-effects)"
      - "Note the AI-agent involvement marker if present"
    methodologies:
      - slug: code-review-basics
        path: free/dev/code-quality/code-review-basics
        required: true
        tier_gate: free
      - slug: code-review-process
        path: free/dev/code-quality/code-review-process
        required: true
        tier_gate: free
      - slug: requirements-traceability
        path: pro/ba/business-analyst/requirements-traceability
        required: true
        tier_gate: pro
      - slug: code-review-cycle
        path: solo/sdd/sdd/code-review-cycle
        required: true
        tier_gate: solo
    outputs:
      - "PR framing note (controls touched, AI involvement)"
    decision_gate: |
      Advance only after every touched control ID is listed.
  - name: "Review against control + clean-arch"
    intent: "Compare the diff against the control intent, not just code style."
    tasks:
      - "Apply clean-architecture review heuristics"
      - "Comment on TDD / test coverage where AC ties to controls"
      - "Use the compliance-regime matrix to surface regime-specific items"
      - "Code-review pass with control IDs in comments"
    methodologies:
      - slug: code-review
        path: free/dev/software-developer/code-review
        required: true
        tier_gate: free
      - slug: tdd-workflow
        path: free/dev/testing-developer/tdd-workflow
        required: true
        tier_gate: free
      - slug: unit-testing
        path: free/dev/testing-developer/unit-testing
        required: true
        tier_gate: free
      - slug: clean-architecture
        path: pro/dev/code-quality/clean-architecture
        required: true
        tier_gate: pro
      - slug: audit-grade-code-review-checklist
        path: pro/_gap/audit-grade-code-review-checklist
        required: true
        tier_gate: pro
      - slug: compliance-regime-review-matrix-soc2-hipaa-pci
        path: pro/_gap/compliance-regime-review-matrix-soc2-hipaa-pci
        required: true
        tier_gate: pro
    outputs:
      - "Review comments with control IDs"
      - "Test verification log"
    decision_gate: |
      Advance only when every finding cites a control ID.
  - name: "Document + verdict"
    intent: "Leave evidence that holds up at the audit binder level."
    tasks:
      - "Verify AI-generated portions against guardrails"
      - "Update living documentation if the PR changes invariants"
      - "Capture lessons-learned for the next reviewer"
      - "Set verdict with defended rationale"
    methodologies:
      - slug: living-documentation
        path: solo/sdd/sdd/living-documentation
        required: true
        tier_gate: solo
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
      - slug: ai-generated-code-compliance-validation
        path: pro/_gap/ai-generated-code-compliance-validation
        required: true
        tier_gate: pro
    outputs:
      - "Review verdict"
      - "Updated living doc (if any)"
      - "Lessons-learned note"
    decision_gate: |
      Verdict only with defended rationale + AI-attestation if applicable.

common_pitfalls:
  - "Approving on style without checking control intent"
  - "Failing to flag AI-generated code — auditors increasingly insist on provenance"
  - "Comments worded for the author, not the auditor reading 6 months later"

quality_checklist:
  - "Would the auditor understand my comments without me in the room?"
  - "Did I verify the tests run, not just exist?"
  - "Did I flag AI involvement explicitly?"

related_playbooks:
  - compliance-grade-feature-delivery
  - fintech-hipaa-compliance-audit-prep

token_budget_estimate: 10000
