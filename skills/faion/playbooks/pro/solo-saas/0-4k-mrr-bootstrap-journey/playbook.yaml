slug: 0-4k-mrr-bootstrap-journey
title: "$0 → $4K MRR bootstrap journey"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 5fbafac4eb8c0c35

tier_min: pro
complexity: deep
context: [solo]
persona_hints: [P1]

intent: |
  Solo dev with shipped MVP grinds to ramen-profitable ($4K MRR / quit-day-job threshold) without VC.

scope: |
  Solo dev with shipped MVP grinds to ramen-profitable ($4K MRR / quit-day-job threshold) without VC. Combines distribution flywheels, retention defense, and runway accounting until either MRR target hit or honest sunset.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Baseline + runway"
    intent: "Lock in the financial floor and time budget."
    tasks:
      - "Compute personal runway months"
      - "Compute current MRR + burn"
      - "Set the quit-day-job MRR threshold with a written trigger contract"
    methodologies:
      - slug: onboarding-flows
        path: pro/marketing/conversion-optimizer/onboarding-flows
        required: true
        tier_gate: pro
      - slug: growth-newsletter-growth
        path: solo/marketing/content-marketer/growth-newsletter-growth
        required: true
        tier_gate: pro
    outputs:
      - "Runway calc sheet"
      - "Baseline MRR"
      - "Quit-day-job trigger contract"
    decision_gate: "Advance only with >=6 months runway. Less than 6 - find part-time income first."
  - name: "Single channel bet"
    intent: "Pick ONE acquisition channel and bet hard on it."
    tasks:
      - "Audit which channel converted past customers"
      - "Score 3 candidate channels by founder-fit + customer-density"
      - "Commit to one channel for the next 90 days"
    methodologies:
      - slug: activation-framework
        path: pro/marketing/growth-marketer/activation-framework
        required: true
        tier_gate: pro
      - slug: growth-onboarding-emails
        path: solo/marketing/content-marketer/growth-onboarding-emails
        required: true
        tier_gate: pro
    outputs:
      - "Channel audit"
      - "Single channel commitment doc"
      - "Weekly KPI per channel"
    decision_gate: "Advance with one named channel and a weekly target. No let us also try X."
  - name: "Activation lift"
    intent: "Move the activation rate before pouring traffic on a leaky funnel."
    tasks:
      - "Map the current activation steps"
      - "Identify the single biggest drop-off"
      - "Ship one onboarding/email intervention"
    methodologies:
      - slug: growth-loops
        path: pro/marketing/growth-marketer/growth-loops
        required: true
        tier_gate: pro
      - slug: search-everywhere-optimization
        path: solo/marketing/content-marketer/search-everywhere-optimization
        required: true
        tier_gate: pro
    outputs:
      - "Activation funnel diagram"
      - "Intervention spec"
      - "Pre/post activation %"
    decision_gate: "Advance when activation rate lifts >=20% relative."
  - name: "Retention defense"
    intent: "Plug churn before scaling acquisition."
    tasks:
      - "Measure 30/60/90 retention cohorts"
      - "Identify top churn reasons via exit survey"
      - "Ship one churn-save email or feature"
    methodologies:
      - slug: growth-referral-programs
        path: pro/marketing/growth-marketer/growth-referral-programs
        required: true
        tier_gate: pro
      - slug: growth-cold-outreach
        path: solo/marketing/gtm-strategist/growth-cold-outreach
        required: true
        tier_gate: pro
    outputs:
      - "Cohort retention chart"
      - "Churn reason ranking"
      - "Save flow spec"
    decision_gate: "Advance when monthly churn drops below the channel growth rate."
  - name: "Pricing experiment"
    intent: "Test if you are leaving money on the table."
    tasks:
      - "Pull pricing competitor research"
      - "Design a price-tier experiment for new signups"
      - "Run for one billing cycle"
    methodologies:
      - slug: ops-churn-prevention
        path: pro/marketing/growth-marketer/ops-churn-prevention
        required: true
        tier_gate: pro
      - slug: ops-customer-support
        path: solo/marketing/gtm-strategist/ops-customer-support
        required: true
        tier_gate: pro
    outputs:
      - "Pricing experiment readout"
      - "New tier table OR rollback note"
    decision_gate: "Advance when conversion + ARPU combine to lift MRR per signup >=15%."
  - name: "Compounding content/growth loop"
    intent: "Stack a compounding asset on top of the single channel."
    tasks:
      - "Pick one compounding asset (SEO content, newsletter, referral, community)"
      - "Ship the loop in a measurable form"
      - "Wire metrics so impact is attributable"
    methodologies:
      - slug: ops-metrics-basics
        path: pro/marketing/growth-marketer/ops-metrics-basics
        required: true
        tier_gate: pro
      - slug: ops-financial-planning
        path: solo/marketing/gtm-strategist/ops-financial-planning
        required: true
        tier_gate: pro
    outputs:
      - "Loop documentation"
      - "Weekly compounding metric"
      - "First 4 weeks of data"
    decision_gate: "Advance if the loop produces measurable lift after 4 weeks."
  - name: "MRR pulse + dashboard"
    intent: "Weekly visibility so you stop guessing."
    tasks:
      - "Build a single-screen MRR/churn/activation dashboard"
      - "Schedule a weekly 30-minute pulse review"
      - "Wire alerts on anomalies"
    methodologies:
      - slug: retention-strategies
        path: pro/marketing/growth-marketer/retention-strategies
        required: true
        tier_gate: pro
      - slug: ops-pricing-strategy
        path: solo/marketing/gtm-strategist/ops-pricing-strategy
        required: true
        tier_gate: pro
    outputs:
      - "MRR dashboard URL"
      - "Weekly pulse doc template"
      - "Alert rules"
    decision_gate: "Advance when 4 consecutive weekly pulses are done without skipping."
  - name: "Trigger evaluation"
    intent: "Honestly check the quit-day-job trigger."
    tasks:
      - "Compare current MRR to trigger contract"
      - "Stress-test sustainability (3 months of forward MRR)"
      - "Write the quit / keep-job / sunset call"
    methodologies:
      - slug: portfolio-strategy
        path: pro/product/product-planning/portfolio-strategy
        required: true
        tier_gate: pro
      - slug: ops-subscription-models
        path: solo/marketing/gtm-strategist/ops-subscription-models
        required: true
        tier_gate: pro
    outputs:
      - "Trigger evaluation doc"
      - "Sustainability check"
      - "Next-phase commitment"
    decision_gate: "No partial wins. Either trigger met for 3 consecutive months, or restart the loop."
  - name: "Sunset OR scale"
    intent: "Either expand the engine or close cleanly."
    tasks:
      - "If scale: pick the next constraint to attack"
      - "If sunset: refund, notify, archive"
      - "Either way: capture portable lessons"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: pro
      - slug: pricing-research
        path: solo/research/market-researcher/pricing-research
        required: true
        tier_gate: pro
    outputs:
      - "Scale plan OR sunset comms pack"
      - "Portfolio-strategy update"
      - "Lessons doc"
    decision_gate: "Closes only on a written committed action."

token_budget_estimate: 22000

