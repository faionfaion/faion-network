slug: productmarket-fit-hunt-post-mvp-pre-traction
title: "Product/Market Fit hunt (post-MVP, pre-traction)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 371fa3c2b7b7d333

tier_min: pro
complexity: deep
context: [solo]
persona_hints: [P1]

intent: |
  MVP is live but stuck under ~$1K MRR.

scope: |
  MVP is live but stuck under ~$1K MRR. Run a structured discovery+positioning+experiment loop until either a fit signal is reached (retention curve flattens, NPS-style pull, organic referrals) or a documented pivot is triggered.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Diagnose stuck signal"
    intent: "Confirm we are truly stuck and identify the leak."
    tasks:
      - "Pull cohort retention, activation, and growth curves"
      - "Compare current data to PMF rubric thresholds"
      - "Identify the single biggest leak (acquisition / activation / retention / revenue)"
    methodologies:
      - slug: aarrr-pirate-metrics
        path: pro/marketing/growth-marketer/aarrr-pirate-metrics
        required: true
        tier_gate: pro
      - slug: north-star-metric
        path: pro/marketing/growth-marketer/north-star-metric
        required: true
        tier_gate: pro
      - slug: architecture-decision-records
        path: solo/dev/software-architect/architecture-decision-records
        required: true
        tier_gate: pro
    outputs:
      - "Diagnostic report"
      - "AARRR funnel snapshot"
      - "Leak-of-the-quarter call"
    decision_gate: "Advance with a named leak. If retention flat AND no leak found, sunset path opens."
  - name: "Power interviews"
    intent: "Asymmetric churn + power-user interviews to find the missing job."
    tasks:
      - "Interview 5 power users who love the product"
      - "Interview 5 churned/lapsed users on why they left"
      - "Surface the dominant job-to-be-done vs the imagined one"
    methodologies:
      - slug: ab-testing-basics
        path: pro/marketing/growth-marketer/ab-testing-basics
        required: true
        tier_gate: pro
      - slug: retention-metrics
        path: pro/marketing/growth-marketer/retention-metrics
        required: true
        tier_gate: pro
      - slug: trade-off-decision-matrix
        path: solo/dev/software-architect/trade-off-decision-matrix
        required: true
        tier_gate: pro
    outputs:
      - "10 interview transcripts"
      - "JTBD revision"
      - "Churn theme list"
    decision_gate: "Advance if a clear job we are actually hired for emerges, else recruit another 5."
  - name: "Positioning sharpen"
    intent: "Re-write positioning around the real job, not the imagined one."
    tasks:
      - "Update the one-liner, headline, and category claim"
      - "Map differentiators against top-3 competitors"
      - "Re-shoot landing page above the fold"
    methodologies:
      - slug: ab-testing-setup
        path: pro/marketing/growth-marketer/ab-testing-setup
        required: true
        tier_gate: pro
      - slug: competitive-positioning
        path: pro/product/product-planning/competitive-positioning
        required: true
        tier_gate: pro
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: pro
    outputs:
      - "New positioning doc"
      - "Updated landing hero"
      - "Competitor delta map"
    decision_gate: "Advance when 3 outsiders can repeat the positioning back unprompted."
  - name: "Experiment design"
    intent: "Pick 1-3 focused experiments per fortnight, not 10."
    tasks:
      - "List candidate experiments tied to the named leak"
      - "Score by RICE, pick top 1-3"
      - "Pre-register hypothesis + success metric for each"
    methodologies:
      - slug: activation-framework
        path: pro/marketing/growth-marketer/activation-framework
        required: true
        tier_gate: pro
      - slug: continuous-discovery-habits
        path: pro/product/product-planning/continuous-discovery-habits
        required: true
        tier_gate: pro
      - slug: user-interviews
        path: solo/research/researcher/user-interviews
        required: true
        tier_gate: pro
    outputs:
      - "Experiment backlog"
      - "Pre-registered hypotheses"
      - "Sample-size estimate"
    decision_gate: "Advance only with a north-star metric movement target per experiment."
  - name: "Run + measure"
    intent: "Ship experiments and let them cook for one full cohort."
    tasks:
      - "Implement experiment behind a flag"
      - "Hold for at least one cohort cycle"
      - "Read results against pre-registered metric"
    methodologies:
      - slug: activation-tactics
        path: pro/marketing/growth-marketer/activation-tactics
        required: true
        tier_gate: pro
      - slug: competitive-intelligence
        path: pro/research/market-researcher/competitive-intelligence
        required: true
        tier_gate: pro
      - slug: value-proposition-design
        path: solo/research/researcher/value-proposition-design
        required: true
        tier_gate: pro
    outputs:
      - "Experiment readout per test"
      - "Cohort impact chart"
      - "Decision per experiment"
    decision_gate: "Advance when each experiment has a clear keep/kill/iterate call."
  - name: "Re-score against PMF rubric"
    intent: "Honest re-check against the PMF rubric for solos."
    tasks:
      - "Re-run the PMF rubric scoring"
      - "Compare to baseline at start of hunt"
      - "Decide if the curve flattened, lifted, or stayed flat"
    methodologies:
      - slug: cohort-basics
        path: pro/marketing/growth-marketer/cohort-basics
        required: true
        tier_gate: pro
      - slug: competitor-analysis
        path: pro/research/market-researcher/competitor-analysis
        required: true
        tier_gate: pro
    outputs:
      - "Updated rubric score"
      - "Trend chart"
      - "Confidence call"
    decision_gate: "Advance if score moved up >=1 band. If flat for 2 consecutive cycles, escalate to pivot."
  - name: "Decide: continue / pivot / sunset"
    intent: "Written commitment based on the rubric trend."
    tasks:
      - "Write the decision with evidence trail"
      - "If continue, commit to the next 90-day milestone"
      - "If pivot, hand off to the v1-to-v2 playbook"
      - "If sunset, plan a clean shutdown"
    methodologies:
      - slug: cohort-implementation
        path: pro/marketing/growth-marketer/cohort-implementation
        required: true
        tier_gate: pro
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: pro
    outputs:
      - "Decision doc"
      - "90-day commitment OR pivot brief OR sunset plan"
    decision_gate: "No maybe allowed. Document must name a single path forward."

token_budget_estimate: 22000

