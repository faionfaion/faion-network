slug: jira-ticket-scoping-session
title: "JIRA ticket scoping session with client PM"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: bd0af55cd0c26268

tier_min: pro
complexity: medium
context: [outsource, team]
persona_hints: [P4]

intent: |
  30-90 min working session → turns vague 'we need this feature' into a ticket with INVEST user story, AC, dependencies, story-points placeholder, compliance/security owner tagged.

scope: |
  Atomic working session run by the offshore senior with the client PM. Output: a JIRA ticket meeting Definition of Ready — INVEST user story, acceptance criteria, dependencies, story-points placeholder, compliance/security owner tagged if applicable. Live shared-screen drafting, not async ping-pong.

non_goals:
  - "Full requirements elaboration — single ticket"
  - "Sprint planning — separate ceremony"
  - "Architecture deep dive — surfaced but not designed"

prerequisites:
  - "JIRA project access for both parties"
  - "Definition of Ready agreed on the engagement"
  - "Compliance regime known (if any)"

success_criteria:
  - "Ticket meets Definition of Ready before session ends"
  - "AC covers happy path + 2 sad paths"
  - "Dependencies tagged with named owners"
  - "Story points placeholder set (real value at poker)"
  - "Compliance/security owner tagged where applicable"

stages:
  - name: "Frame"
    intent: "Surface the actual business need behind the feature ask."
    tasks:
      - "Active-listening pass: client PM speaks first, you summarise"
      - "Stakeholder-analysis: who benefits, who blocks"
      - "Five-whys until the user-story role is real"
      - "Pull existing requirements traceability if any"
    methodologies:
      - slug: elicitation-techniques
        path: pro/ba/ba-core/elicitation-techniques
        required: true
        tier_gate: pro
      - slug: elicitation-techniques
        path: pro/ba/business-analyst/elicitation-techniques
        required: true
        tier_gate: pro
      - slug: stakeholder-analysis
        path: pro/ba/business-analyst/stakeholder-analysis
        required: true
        tier_gate: pro
      - slug: requirements-traceability
        path: pro/ba/business-analyst/requirements-traceability
        required: true
        tier_gate: pro
    outputs:
      - "Written user-story candidate"
      - "Stakeholder note"
    decision_gate: |
      Advance only when user-story passes INVEST self-check.
  - name: "Draft live"
    intent: "Co-edit the ticket on a shared screen; no async back-and-forth."
    tasks:
      - "Use user-story-mapping to place the ticket in context"
      - "Write AC: happy + 2 sad paths"
      - "Document required vs nice-to-have inside the ticket"
      - "Apply requirements-documentation patterns"
      - "Apply requirements-prioritization"
    methodologies:
      - slug: user-story-mapping
        path: pro/ba/business-analyst/user-story-mapping
        required: true
        tier_gate: pro
      - slug: acceptance-criteria
        path: pro/ba/business-analyst/acceptance-criteria
        required: true
        tier_gate: pro
      - slug: requirements-documentation
        path: pro/ba/business-analyst/requirements-documentation
        required: true
        tier_gate: pro
      - slug: requirements-prioritization
        path: pro/ba/business-analyst/requirements-prioritization
        required: true
        tier_gate: pro
      - slug: live-ticket-drafting-shared-screen-pattern
        path: pro/_gap/live-ticket-drafting-shared-screen-pattern
        required: true
        tier_gate: pro
    outputs:
      - "Draft ticket with AC + scope"
    decision_gate: |
      Advance only when client PM agrees AC live, not after the call.
  - name: "Tag dependencies + DoR"
    intent: "Make the ticket actionable without follow-up."
    tasks:
      - "Tag dependencies with named owners"
      - "Set story-points placeholder for poker"
      - "Tag compliance/security owner if applicable"
      - "Walk JIRA workflow status to 'Ready'"
      - "Check Definition of Ready end-to-end"
    methodologies:
      - slug: jira-workflow-management
        path: pro/pm/pm-agile/jira-workflow-management
        required: true
        tier_gate: pro
      - slug: definition-of-ready-checklist-outsource
        path: pro/_gap/definition-of-ready-checklist-outsource
        required: true
        tier_gate: pro
    outputs:
      - "Ticket at status: Ready"
      - "Dependencies + owners attached"
    decision_gate: |
      Done when the ticket survives a 60-second Definition-of-Ready check.

common_pitfalls:
  - "Writing AC after the session — context evaporates inside 30 minutes"
  - "Skipping the sad paths — every bug here costs a sprint"
  - "Not tagging compliance owner — surprise audit follow-up later"

quality_checklist:
  - "Did client PM agree AC live, on shared screen?"
  - "Could a dev pick this up in a sprint without pinging anyone?"
  - "Did I tag every regulatory owner the ticket touches?"

related_playbooks:
