stages:
  - name: "Score Active Flags"
    intent: "Get the flag inventory current."
    tasks:
      - "List every flag, owner, age, and current rollout %"
      - "Tag each flag: ramping, in-test, stuck, decommission-ready"
      - "Flag any flag older than the kill-threshold"
    methodologies:
      - slug: "release-planning"
        path: "pro/product/product-manager/release-planning"
        required: true
        tier_gate: "pro"
      - slug: "feature-flags-core-implementation"
        path: "solo/dev/automation-tooling/feature-flags-core-implementation"
        required: true
        tier_gate: "pro"
    outputs:
      - "flag inventory table"
      - "tags per flag"
      - "kill-threshold list"
    decision_gate: "Advance only when every active flag has a tag and an owner."
  - name: "Decide per Flag"
    intent: "Ramp, hold, kill — pick one."
    tasks:
      - "For each flag: ramp +X% / hold / roll back / decommission"
      - "Verify the decision against business and ops dashboards"
      - "Communicate the per-flag decision to owners"
    methodologies:
      - slug: "feature-flags-rollout-targeting"
        path: "solo/dev/automation-tooling/feature-flags-rollout-targeting"
        required: true
        tier_gate: "pro"
      - slug: "feature-flags-services-testing"
        path: "solo/dev/automation-tooling/feature-flags-services-testing"
        required: true
        tier_gate: "pro"
    outputs:
      - "per-flag decision"
      - "dashboard checks"
      - "owner comms"
    decision_gate: "Advance only when every flag has a written decision this week."
  - name: "Execute"
    intent: "Touch the flags, not just the doc."
    tasks:
      - "Apply each flag decision in the platform"
      - "Watch dashboards for 1 hour after any ramp ≥10%"
      - "Pause or revert on threshold breach"
    methodologies:
      - slug: "feature-flags-types-lifecycle"
        path: "solo/dev/automation-tooling/feature-flags-types-lifecycle"
        required: true
        tier_gate: "pro"
      - slug: "trunk-based-feature-flags"
        path: "solo/dev/automation-tooling/trunk-based-feature-flags"
        required: true
        tier_gate: "pro"
      - slug: "quality-gates-confidence"
        path: "solo/sdd/sdd/quality-gates-confidence"
        required: true
        tier_gate: "pro"
    outputs:
      - "flag-config diff"
      - "dashboard watch log"
      - "pause/revert log"
    decision_gate: "Required output: a logged execution per decision."
