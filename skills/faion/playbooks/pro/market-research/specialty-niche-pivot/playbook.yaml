slug: specialty-niche-pivot
title: "Specialty niche pivot (8-12 weeks generalist to specialist)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 4af6a0e3a3b6e53c

tier_min: pro
complexity: deep
context: [solo]
persona_hints: [P3]

intent: |
  Move from generic 'full-stack dev' to a paid specialist position (e.g. headless-commerce on Shopify Hydrogen, or AI integrations for SMB SaaS) with 2 case studies, a tightened portfolio, and a 30-50% higher day rate.

scope: |
  Move from generic 'full-stack dev' to a paid specialist position (e.g. headless-commerce on Shopify Hydrogen, or AI integrations for SMB SaaS) with 2 case studies, a tightened portfolio, and a 30-50% higher day rate.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Audit & pick niche stage complete: Niche shortlist with scores"
  - "Re-position + craft proof stage complete: Updated portfolio site"
  - "Deepen technical authority stage complete: 8 technical posts"
  - "Raise the rate stage complete: New rate quotes"

stages:
  - name: "Audit & pick niche"
    intent: "Survey past work + market signals; pick one niche with paid demand."
    tasks:
      - "List 5-7 candidate niches you have past relevant work in"
      - "Score on demand signal + competition + your appetite"
      - "Pick one and commit for 12 weeks"
    methodologies:
      - slug: decision-analysis
        path: pro/ba/business-analyst/decision-analysis
        required: true
        tier_gate: pro
      - slug: strategy-analysis-business-need
        path: pro/ba/business-analyst/strategy-analysis-business-need
        required: true
        tier_gate: pro
      - slug: growth-brand-positioning
        path: pro/marketing/gtm-strategist/growth-brand-positioning
        required: true
        tier_gate: pro
      - slug: market-researcher
        path: solo/research/market-researcher
        required: true
        tier_gate: solo
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: niche-scorecard
        path: pro/_gap/niche-scorecard
        required: true
        tier_gate: pro
      - slug: buyer-interview-script-for-freelancers
        path: pro/_gap/buyer-interview-script-for-freelancers
        required: true
        tier_gate: pro
    outputs:
      - "Niche shortlist with scores"
      - "Commitment doc"
    decision_gate: |
      Advance with a single chosen niche, written commitment, and no parallel niches.
  - name: "Re-position + craft proof"
    intent: "Re-brand portfolio + LinkedIn around the niche."
    tasks:
      - "Rewrite portfolio headline + first-fold copy"
      - "Update LinkedIn headline + featured section"
      - "Ship 2 case studies from past work in this niche"
    methodologies:
      - slug: growth-press-coverage
        path: pro/marketing/gtm-strategist/growth-press-coverage
        required: true
        tier_gate: pro
      - slug: growth-linkedin-strategy
        path: pro/marketing/smm-manager/growth-linkedin-strategy
        required: true
        tier_gate: pro
      - slug: competitive-positioning
        path: pro/product/product-manager/competitive-positioning
        required: true
        tier_gate: pro
      - slug: business-storytelling
        path: solo/marketing/content-marketer/business-storytelling
        required: true
        tier_gate: solo
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: solo
      - slug: case-study-clause-template
        path: pro/_gap/case-study-clause-template
        required: true
        tier_gate: pro
    outputs:
      - "Updated portfolio site"
      - "Updated LinkedIn"
      - "2 case studies"
    decision_gate: |
      Advance when niche is mentioned in every public surface. Audit weekly.
  - name: "Deepen technical authority"
    intent: "Become discoverable as the specialist via durable content."
    tasks:
      - "Publish 1 technical deep-dive per week for 8 weeks"
      - "Run 1 podcast / guest post / talk per month"
      - "Build a small open-source artifact in the niche"
    methodologies:
      - slug: quality-attributes-analysis
        path: pro/dev/software-architect/quality-attributes-analysis
        required: true
        tier_gate: pro
      - slug: clean-architecture
        path: pro/dev/software-developer/clean-architecture
        required: true
        tier_gate: pro
      - slug: ops-partnership-strategy
        path: pro/marketing/gtm-strategist/ops-partnership-strategy
        required: true
        tier_gate: pro
      - slug: best-practices-2026
        path: solo/dev/software-developer/best-practices-2026
        required: true
        tier_gate: solo
      - slug: dev-methodologies-architecture
        path: solo/dev/software-developer/dev-methodologies-architecture
        required: true
        tier_gate: solo
      - slug: growth-podcast-strategy
        path: solo/marketing/content-marketer/growth-podcast-strategy
        required: true
        tier_gate: solo
      - slug: growth-seo-fundamentals
        path: solo/marketing/seo-manager/growth-seo-fundamentals
        required: true
        tier_gate: solo
      - slug: topical-authority
        path: solo/marketing/seo-manager/topical-authority
        required: true
        tier_gate: solo
    outputs:
      - "8 technical posts"
      - "1+ podcast appearance"
      - "Open-source artifact"
    decision_gate: |
      Advance when first inbound lead arrives mentioning the content. Otherwise iterate distribution.
  - name: "Raise the rate"
    intent: "Move day rate +30-50% on new and existing engagements."
    tasks:
      - "Set new rate floor"
      - "Quote new prospects at new rate; track close rate"
      - "Send rate-rise notices to top-half existing clients"
    methodologies:
      - slug: freelance-rate-jump-tactics
        path: pro/_gap/freelance-rate-jump-tactics
        required: true
        tier_gate: pro
    outputs:
      - "New rate quotes"
      - "Rate-rise sent log"
      - "Updated pipeline economics"
    decision_gate: |
      Advance if ≥50% close-rate holds at new rate over 4 new quotes. Otherwise refine offer, not rate.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 19000
