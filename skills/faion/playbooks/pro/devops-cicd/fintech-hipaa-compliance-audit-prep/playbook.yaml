slug: fintech-hipaa-compliance-audit-prep
title: "FinTech / HIPAA compliance audit prep (4 weeks)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 31c9e7ca459280bd

tier_min: pro
complexity: deep
context: [outsource, team]
persona_hints: [P4]

intent: |
  Client triggers a compliance audit (SOC 2, PCI DSS QSA, HIPAA, or banking-core) → vendor delivers gap analysis, remediated controls, evidence pack, owners, and audit-day runbook with zero steerco-escalating findings.

scope: |
  Four-week sprint that runs in parallel to delivery. By end of week 4 the vendor side of the audit passes without any findings that escalate to the client steerco. Covers SOC 2 mid-cycle, PCI DSS QSA, HIPAA, or banking-core regulatory scopes. The vendor delivers gap analysis, remediated controls, evidence pack, named owners, and an audit-day runbook.

non_goals:
  - "Client-side controls — vendor side only"
  - "Greenfield compliance program — assumes the regime is already in place"
  - "Legal interpretation — vendor coordinates with client legal"

prerequisites:
  - "Compliance regime identified (SOC 2 / PCI / HIPAA / banking)"
  - "Vendor scope of involvement signed off by client compliance lead"
  - "Existing monitoring + logging baseline in place"

success_criteria:
  - "Current-state gap analysis covering all in-scope controls"
  - "Remediation plan with named owners and dates"
  - "Evidence pack mapped to control IDs"
  - "Audit-day runbook (who answers what)"
  - "Zero steerco-escalating findings post-audit"

stages:
  - name: "Scope & control mapping"
    intent: "Lock the exact list of in-scope controls; nothing more, nothing less."
    tasks:
      - "Read the regime catalogue with client compliance lead"
      - "Trace each vendor-owned control to its requirement source"
      - "Strategy-analysis: current vs future state per control family"
      - "Open a RACI for audit-day responsibilities"
    methodologies:
      - slug: requirements-traceability
        path: pro/ba/ba-core/requirements-traceability
        required: true
        tier_gate: pro
      - slug: strategy-analysis
        path: pro/ba/ba-core/strategy-analysis
        required: true
        tier_gate: pro
      - slug: strategy-analysis-current-state
        path: pro/ba/business-analyst/strategy-analysis-current-state
        required: true
        tier_gate: pro
      - slug: strategy-analysis-gap-analysis
        path: pro/ba/business-analyst/strategy-analysis-gap-analysis
        required: true
        tier_gate: pro
      - slug: raci-matrix
        path: pro/pm/project-manager/raci-matrix
        required: true
        tier_gate: pro
      - slug: soc2-control-map-vendor-side
        path: pro/_gap/soc2-control-map-vendor-side
        required: true
        tier_gate: pro
    outputs:
      - "Vendor-side control map"
      - "RACI for audit-day"
      - "Out-of-scope list (countersigned)"
    decision_gate: |
      Advance only after client compliance lead signs the vendor-side scope. Else loop back.
  - name: "Gap remediation - infra & secrets"
    intent: "Close the obvious infra gaps before evidence collection starts."
    tasks:
      - "Network segmentation review (NSG rules, private link)"
      - "Backup + DR posture (DB backups, verification, RTO/RPO)"
      - "Rotate secrets; document the rotation"
      - "Pipe certificate lifecycle into CI/CD"
      - "Enforce mTLS where data crosses tenants"
    methodologies:
      - slug: azure-nsg-rules
        path: pro/infra/cicd-engineer/azure-nsg-rules
        required: true
        tier_gate: pro
      - slug: azure-private-link
        path: pro/infra/cicd-engineer/azure-private-link
        required: true
        tier_gate: pro
      - slug: backup-basics
        path: pro/infra/cicd-engineer/backup-basics
        required: true
        tier_gate: pro
      - slug: backup-database-postgres
        path: pro/infra/cicd-engineer/backup-database-postgres
        required: true
        tier_gate: pro
      - slug: backup-verification-dr
        path: pro/infra/cicd-engineer/backup-verification-dr
        required: true
        tier_gate: pro
      - slug: secrets-management
        path: pro/infra/cicd-engineer/secrets-management
        required: true
        tier_gate: pro
      - slug: cicd-cert-rotation-pipeline
        path: pro/infra/cicd-engineer/cicd-cert-rotation-pipeline
        required: true
        tier_gate: pro
      - slug: cicd-mtls-deployment
        path: pro/infra/cicd-engineer/cicd-mtls-deployment
        required: true
        tier_gate: pro
    outputs:
      - "Network diagrams with segmentation evidence"
      - "Backup verification log"
      - "Secrets rotation log"
      - "mTLS deployment evidence"
    decision_gate: |
      Advance when the highest-severity infra gap is closed AND backup verification has at least one successful drill.
  - name: "Gap remediation - SDLC & supply chain"
    intent: "Make the build pipeline auditable end-to-end."
    tasks:
      - "SAST + DAST results integrated into CI"
      - "Container scanning gating production deploys"
      - "Supply-chain attestations (SBOM, signatures)"
      - "Policy-as-code for environment promotion"
      - "Coding-agent compliance guardrails so AI-generated PRs are auditable"
    methodologies:
      - slug: security-sast
        path: pro/infra/cicd-engineer/security-sast
        required: true
        tier_gate: pro
      - slug: security-dast
        path: pro/infra/cicd-engineer/security-dast
        required: true
        tier_gate: pro
      - slug: security-container-scanning
        path: pro/infra/cicd-engineer/security-container-scanning
        required: true
        tier_gate: pro
      - slug: security-supply-chain
        path: pro/infra/cicd-engineer/security-supply-chain
        required: true
        tier_gate: pro
      - slug: security-policy-as-code
        path: pro/infra/cicd-engineer/security-policy-as-code
        required: true
        tier_gate: pro
      - slug: ai-coding-agent-compliance-guardrails
        path: pro/_gap/ai-coding-agent-compliance-guardrails
        required: true
        tier_gate: pro
    outputs:
      - "SAST/DAST + scan reports archived"
      - "SBOM + signing evidence"
      - "Policy-as-code repo"
      - "AI-agent guardrails documented"
    decision_gate: |
      Advance when CI gates production deploys on every required scan AND AI guardrails are merged.
  - name: "Evidence pack assembly"
    intent: "Collect, label, and version every artifact the auditor will ask for."
    tasks:
      - "Map every control to ≥1 piece of evidence"
      - "Centralise API monitoring logging samples"
      - "Quality-management documentation for the in-scope work"
      - "PCI / HIPAA / banking-specific evidence checklist"
      - "Regulator-aware risk register update"
    methodologies:
      - slug: api-monitoring-logging
        path: pro/dev/software-developer/api-monitoring-logging
        required: true
        tier_gate: pro
      - slug: quality-management
        path: pro/pm/pm-traditional/quality-management
        required: true
        tier_gate: pro
      - slug: risk-management
        path: pro/pm/pm-traditional/risk-management
        required: true
        tier_gate: pro
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
      - slug: pci-dss-vendor-evidence-pack
        path: pro/_gap/pci-dss-vendor-evidence-pack
        required: true
        tier_gate: pro
      - slug: hipaa-baa-vendor-checklist
        path: pro/_gap/hipaa-baa-vendor-checklist
        required: true
        tier_gate: pro
      - slug: banking-core-data-residency-rules
        path: pro/_gap/banking-core-data-residency-rules
        required: true
        tier_gate: pro
    outputs:
      - "Evidence index (control ID → file)"
      - "Risk register refreshed"
      - "Regulator-specific checklists complete"
    decision_gate: |
      Advance when every in-scope control has ≥1 piece of evidence pinned, labelled, and accessible to the auditor.
  - name: "Audit-day & retro"
    intent: "Show up, answer cleanly, close findings, log the lessons."
    tasks:
      - "Communications plan: who says what, in what channel"
      - "Run audit-day with RACI in hand"
      - "Capture findings and close them inside the agreed window"
      - "Status report to client steerco (no surprises)"
      - "Lessons-learned retro inside the vendor team"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: weekly-status-report
        path: pro/_existing_playbook/weekly-status-report
        required: false
        tier_gate: pro
    outputs:
      - "Audit-day briefing pack"
      - "Findings register"
      - "Status report to steerco"
      - "Lessons-learned doc"
    decision_gate: |
      Engagement-close criterion: zero findings escalated to steerco AND all minor findings closed inside the agreed window.

common_pitfalls:
  - "Treating SAST/DAST as ticked boxes — auditors read the findings AND the disposition"
  - "Ignoring AI-generated code; auditors increasingly ask about provenance"
  - "Skipping a dry-run audit — the real audit is the worst place to discover gaps"

quality_checklist:
  - "Could the auditor pull any control ID and find evidence in <2 minutes?"
  - "Did we attribute every AI-generated PR to a human reviewer?"
  - "Were findings discussed BEFORE steerco, not at?"

related_playbooks:
