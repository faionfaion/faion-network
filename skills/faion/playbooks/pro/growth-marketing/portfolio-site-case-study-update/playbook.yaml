slug: portfolio-site-case-study-update
title: "Portfolio site update with new case study"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 3dadde2d788d34fb

tier_min: pro
complexity: medium
context: [solo]
persona_hints: [P3]

intent: |
  A project closes successfully → add a case study to portfolio site within 2 weeks while context is fresh. Done = published case study with metrics, client quote (if NDA permits), and shareable link queued into social rotation.

scope: |
  A project closes successfully → add a case study to portfolio site within 2 weeks while context is fresh. Done = published case study with metrics, client quote (if NDA permits), and shareable link queued into social rotation.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Capture context stage complete: Metrics doc"
  - "Write + design stage complete: Case study draft"
  - "Publish + distribute stage complete: Live case study URL"

stages:
  - name: "Capture context"
    intent: "Within 2 weeks of close, capture metrics + quote while fresh."
    tasks:
      - "Pull metrics: before / after / impact"
      - "Schedule 20-min testimonial call with client"
      - "Confirm what's NDA-safe to publish"
    methodologies:
      - slug: ops-legal-basics
        path: pro/marketing/gtm-strategist/ops-legal-basics
        required: true
        tier_gate: pro
      - slug: business-storytelling
        path: solo/comms/communicator/business-storytelling
        required: true
        tier_gate: solo
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: solo
      - slug: solo-testimonial-extraction-script
        path: pro/_gap/solo-testimonial-extraction-script
        required: true
        tier_gate: pro
    outputs:
      - "Metrics doc"
      - "Testimonial recording"
      - "NDA-safe list"
    decision_gate: |
      Advance only with both metrics and a client quote secured.
  - name: "Write + design"
    intent: "Draft a one-page case study with clear hook."
    tasks:
      - "Draft using STAR (Situation Task Action Result) structure"
      - "Add visuals: screenshots, charts, before/after"
      - "Internal review for clarity + NDA compliance"
    methodologies:
      - slug: funnel-tactics-basics
        path: pro/marketing/conversion-optimizer/funnel-tactics-basics
        required: true
        tier_gate: pro
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: freelancer-case-study-template
        path: pro/_gap/freelancer-case-study-template
        required: true
        tier_gate: pro
    outputs:
      - "Case study draft"
      - "Visual assets"
    decision_gate: |
      Advance only after a peer reviewer says hook is clear within 30s.
  - name: "Publish + distribute"
    intent: "Push to portfolio + LinkedIn + Twitter rotation."
    tasks:
      - "Publish to portfolio site"
      - "Schedule LinkedIn long-form post"
      - "Queue Twitter thread + future re-rotation"
    methodologies:
      - slug: growth-linkedin-strategy
        path: solo/marketing/smm-manager/growth-linkedin-strategy
        required: true
        tier_gate: solo
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
    outputs:
      - "Live case study URL"
      - "Social posts scheduled"
    decision_gate: |
      Cycle closes only when case study URL is live + social queue contains it.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 14000
cli_invocations:
  human:  "faion get-content portfolio-site-case-study-update --format md"
  agent:  "faion get-content portfolio-site-case-study-update --format context"
  json:   "faion get-content portfolio-site-case-study-update --format json"

