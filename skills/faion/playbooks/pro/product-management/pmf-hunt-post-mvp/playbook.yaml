slug: pmf-hunt-post-mvp
title: "Product/Market Fit hunt (post-MVP, pre-traction)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 4b6094ddc370b54f

tier_min: pro
complexity: deep
context: [solo]
persona_hints: [P1]

intent: |
  Live MVP stuck under ~$1K MRR → documented PMF signal OR triggered pivot.

scope: |
  MVP is live but stuck under ~$1K MRR. Solo founder runs a structured discovery + positioning + experiment loop until either a fit signal is reached (retention curve flattens, NPS-style pull, organic referrals) or a documented pivot is triggered. Exit artifact is a PMF scorecard with evidence trail.

non_goals:
  - "Scaling distribution before PMF — out of scope"
  - "Hiring or fund-raising — single-operator playbook"

prerequisites:
  - "MVP live with at least 30 days of usage data"
  - "Stripe (or equivalent) recording paid signups"

success_criteria:
  - "PMF scorecard filled (retention, pull, referral, NPS rows)"
  - "10+ recent power-user interviews logged"
  - "Positioning statement rewritten with sharper ICP"
  - "1 fit experiment shipped per stage (≥3 experiments total)"
  - "Written go/pivot decision with evidence references"

stages:
  - name: "Diagnose"
    intent: "Map current state: retention curves, cohort decay, paying-user concentration."
    tasks:
      - "Pull retention + cohort data from analytics"
      - "Identify activation drop-off"
      - "Score against PMF rubric"
    methodologies:
      - slug: aarrr-pirate-metrics
        path: pro/marketing/growth-marketer/aarrr-pirate-metrics
        required: true
        tier_gate: pro
      - slug: cohort-basics
        path: pro/marketing/growth-marketer/cohort-basics
        required: true
        tier_gate: pro
      - slug: cohort-implementation
        path: pro/marketing/growth-marketer/cohort-implementation
        required: true
        tier_gate: pro
      - slug: north-star-metric
        path: pro/marketing/growth-marketer/north-star-metric
        required: true
        tier_gate: pro
      - slug: retention-metrics
        path: pro/marketing/growth-marketer/retention-metrics
        required: true
        tier_gate: pro
    outputs:
      - "PMF baseline scorecard"
      - "Cohort decay chart"
    decision_gate: |
      Advance if signal is unclear (most common). Skip to Decide if PMF is unambiguous.
  - name: "Listen"
    intent: "10 power-user interviews + 5 churned-user post-mortems for asymmetric signal."
    tasks:
      - "Schedule 10 power-user calls"
      - "Run 5 churn post-mortems"
      - "Tag interview themes"
    methodologies:
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: continuous-discovery-habits
        path: pro/product/product-planning/continuous-discovery-habits
        required: true
        tier_gate: pro
      - slug: user-interviews
        path: solo/research/researcher/user-interviews
        required: true
        tier_gate: solo
      - slug: value-proposition-design
        path: solo/research/researcher/value-proposition-design
        required: true
        tier_gate: solo
    outputs:
      - "15 interview notes tagged by theme"
      - "Top-3 pull triggers identified"
    decision_gate: |
      Advance if a single dominant pull theme appears. Loop if signal is fragmented across >5 themes.
  - name: "Position"
    intent: "Rewrite ICP and value-prop against the dominant pull theme."
    tasks:
      - "Draft sharper ICP one-liner"
      - "Rewrite landing-page hero against pull theme"
      - "Diff against current copy"
    methodologies:
      - slug: competitive-positioning
        path: pro/product/product-planning/competitive-positioning
        required: true
        tier_gate: pro
      - slug: competitive-intelligence
        path: pro/research/market-researcher/competitive-intelligence
        required: true
        tier_gate: pro
      - slug: competitor-analysis
        path: pro/research/market-researcher/competitor-analysis
        required: true
        tier_gate: pro
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
    outputs:
      - "New ICP + value-prop doc"
      - "Landing-page variant"
    decision_gate: |
      Advance once new copy is live. If founder cannot write the ICP in one sentence, return to Listen.
  - name: "Experiment"
    intent: "Run 3 fit experiments: activation, retention, acquisition."
    tasks:
      - "Pick one lever per layer (A/R/A)"
      - "Define success metric + decision date"
      - "Ship and measure"
    methodologies:
      - slug: ab-testing-basics
        path: pro/marketing/growth-marketer/ab-testing-basics
        required: true
        tier_gate: pro
      - slug: ab-testing-setup
        path: pro/marketing/growth-marketer/ab-testing-setup
        required: true
        tier_gate: pro
      - slug: activation-framework
        path: pro/marketing/growth-marketer/activation-framework
        required: true
        tier_gate: pro
      - slug: activation-tactics
        path: pro/marketing/growth-marketer/activation-tactics
        required: true
        tier_gate: pro
    outputs:
      - "3 experiment results docs"
      - "Updated PMF scorecard"
    decision_gate: |
      Advance when all 3 experiments report. Re-run if any experiment lacks measurable result.
  - name: "Decide"
    intent: "Written go/pivot decision backed by scorecard + experiment evidence."
    tasks:
      - "Compile evidence packet"
      - "Write decision doc"
      - "If pivot, define new hypothesis"
    methodologies:
      - slug: architecture-decision-records
        path: solo/dev/software-architect/architecture-decision-records
        required: true
        tier_gate: solo
      - slug: trade-off-decision-matrix
        path: solo/dev/software-architect/trade-off-decision-matrix
        required: true
        tier_gate: solo
    outputs:
      - "Decision doc with PMF rubric output"
    decision_gate: |
      Required output is a written decision. No 'maybe'. No 'wait and see'.

common_pitfalls:
  - "Treating noisy weekly numbers as PMF signal — use cohort retention instead"
  - "Pivoting on a single loud customer voice — wait for theme convergence"

quality_checklist:
  - "Can I explain the pull theme in one sentence backed by 5 quotes?"
  - "Did each experiment produce a measurable result, or did I move on early?"

related_playbooks:
  - solo-idea-to-validated-mvp
  - pivot-v1-to-v2

token_budget_estimate: 16000
