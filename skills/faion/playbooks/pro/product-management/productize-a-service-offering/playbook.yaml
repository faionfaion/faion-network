slug: productize-a-service-offering
title: "Productize a service offering (8-10 weeks idea to first paid sale)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 88085c51585b0603

tier_min: pro
complexity: deep
context: [solo, team]
persona_hints: [P5]

intent: |
  Recurring custom engagement to named, fixed-scope, fixed-price productized service with landing page, sales script, delivery SOP, and at least one paying customer.

scope: |
  Take a recurring custom engagement and convert it into a named, fixed-scope, fixed-price productized service with a public landing page, sales script, delivery SOP, and at least one paying customer. Exit artifact: one shipped productized service whose unit-economics, delivery time, and customer satisfaction are documented and repeatable by the next contractor on the bench.

non_goals:
  - "Full SaaS productization - this is a service, not software"
  - "Multi-product portfolio - single productized offer per playbook run"

prerequisites:
  - "Three or more past clients who bought a similar engagement"
  - "A landing page surface (Webflow, Framer, MDX, etc.)"

success_criteria:
  - "Named offer + one-sentence positioning"
  - "Public landing page with pricing visible"
  - "Documented sales script + objection FAQ"
  - "Delivery SOP runnable by a contractor (not the founder)"
  - "At least 1 paying customer at the productized price"
  - "Unit economics measured: gross margin + delivery hours"

stages:
  - name: "Pattern audit"
    intent: "Find the recurring engagement worth productizing."
    tasks:
      - "List last 12 months of paid engagements"
      - "Tag by pattern (deliverable, scope, duration)"
      - "Pick top-1 pattern by frequency x margin"
    methodologies:
      - slug: business-process-analysis
        path: pro/ba/business-analyst/business-process-analysis
        required: true
        tier_gate: pro
      - slug: business-model-research
        path: pro/research/market-researcher/business-model-research
        required: true
        tier_gate: pro
      - slug: market-analysis
        path: pro/research/market-researcher/market-analysis
        required: true
        tier_gate: pro
      - slug: competitive-positioning
        path: pro/product/product-planning/competitive-positioning
        required: true
        tier_gate: pro
    outputs:
      - "Engagement-pattern table"
      - "Productize candidate decision"
    decision_gate: |
      Advance if one pattern recurs at least 3 times with stable margin.
  - name: "Scope + price"
    intent: "Lock fixed scope + fixed price with explicit cuts."
    tasks:
      - "Define MLP (minimum lovable productized) scope"
      - "Price against value not hours"
      - "Write 3 explicit non-goals"
    methodologies:
      - slug: minimum-product-frameworks
        path: pro/product/product-manager/minimum-product-frameworks
        required: true
        tier_gate: pro
      - slug: mlp-planning
        path: pro/product/product-manager/mlp-planning
        required: true
        tier_gate: pro
      - slug: release-planning
        path: pro/product/product-manager/release-planning
        required: true
        tier_gate: pro
      - slug: use-case-modeling
        path: pro/ba/business-analyst/use-case-modeling
        required: true
        tier_gate: pro
    outputs:
      - "Scope-of-work doc"
      - "Price card"
    decision_gate: |
      Advance only if scope fits one page and price defensible to a stranger.
  - name: "Landing + funnel"
    intent: "Public surface: positioning, copy, intake form, social proof."
    tasks:
      - "Write hero + 5 sections"
      - "Add intake form with qualifying questions"
      - "Drop 3 case-study or testimonial blocks"
    methodologies:
      - slug: growth-brand-positioning
        path: pro/marketing/gtm-strategist/growth-brand-positioning
        required: true
        tier_gate: pro
      - slug: growth-conversion-optimization
        path: pro/marketing/conversion-optimizer/growth-conversion-optimization
        required: true
        tier_gate: pro
      - slug: conversion-tracking
        path: pro/marketing/growth-marketer/conversion-tracking
        required: true
        tier_gate: pro
      - slug: growth-loops
        path: pro/marketing/growth-marketer/growth-loops
        required: true
        tier_gate: pro
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: solo
      - slug: growth-seo-fundamentals
        path: solo/marketing/seo-manager/growth-seo-fundamentals
        required: true
        tier_gate: solo
    outputs:
      - "Public landing URL"
      - "Intake form live"
    decision_gate: |
      Advance when landing converts at least 1 qualified discovery in 14 days.
  - name: "Sales script + delivery SOP"
    intent: "Make the sale + delivery repeatable without founder presence."
    tasks:
      - "Write sales call run-of-show (15-30 min)"
      - "Author delivery SOP step-by-step"
      - "Record one demo session for the SOP"
    methodologies:
      - slug: feedback-management
        path: pro/product/product-manager/feedback-management
        required: true
        tier_gate: pro
      - slug: methodologies-summary
        path: pro/product/product-manager/methodologies-summary
        required: true
        tier_gate: pro
      - slug: continuous-discovery-habits
        path: pro/product/product-manager/continuous-discovery-habits
        required: true
        tier_gate: pro
      - slug: growth-email-marketing
        path: solo/marketing/content-marketer/growth-email-marketing
        required: true
        tier_gate: solo
      - slug: growth-newsletter-growth
        path: solo/marketing/content-marketer/growth-newsletter-growth
        required: true
        tier_gate: solo
    outputs:
      - "Sales script"
      - "Delivery SOP doc"
    decision_gate: |
      Advance once a contractor can read the SOP and produce a draft deliverable.
  - name: "Launch + measure"
    intent: "Sell, deliver, measure unit-economics on first paid run."
    tasks:
      - "Pitch to 5 best-fit past clients first"
      - "Sell + deliver one full cycle"
      - "Measure margin + delivery hours + NPS"
    methodologies:
      - slug: growth-press-coverage
        path: pro/marketing/gtm-strategist/growth-press-coverage
        required: true
        tier_gate: pro
      - slug: ops-customer-success-metrics
        path: pro/marketing/gtm-strategist/ops-customer-success-metrics
        required: true
        tier_gate: pro
      - slug: product-analytics
        path: pro/product/product-manager/product-analytics
        required: true
        tier_gate: pro
      - slug: competitive-intelligence
        path: pro/research/market-researcher/competitive-intelligence
        required: true
        tier_gate: pro
      - slug: competitor-analysis
        path: pro/research/market-researcher/competitor-analysis
        required: true
        tier_gate: pro
    outputs:
      - "First paid invoice"
      - "Unit-economics dashboard row"
    decision_gate: |
      Required: 1 paid sale at productized price AND margin at or above baseline custom engagement.

common_pitfalls:
  - "Productizing the pattern the founder enjoys, not the one with the best margin"
  - "Pricing at last-engagement hours - locks you into custom margins"
  - "Treating the landing page as the launch - the SOP is the launch"

quality_checklist:
  - "Could a contractor deliver this without my direct involvement?"
  - "Does the price card embarrass me? If yes, raise it."
  - "Did I measure margin or only revenue on the first run?"

related_playbooks:
