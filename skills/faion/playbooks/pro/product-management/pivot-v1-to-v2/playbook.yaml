# =============================================================================
# faion playbook manifest — P1 solo SaaS builder
# Generated for F-064 from playbook-index.json entry #4
# =============================================================================

slug: pivot-v1-to-v2
title: "Pivot from failed v1 to v2"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 6abbe9e82e826b38

tier_min: pro
complexity: deep
context: [solo]
persona_hints: [P1]

intent: |
  v1 with flat retention and stalled growth → executed pivot (segment / feature / model / sunset) with brand intact.

scope: |
  v1 is not working: retention flat, growth stalled, founder energy bleeding. Solo founder decides and executes a structured pivot (segment / feature / model / sunset) without burning the brand or customer trust. Exit artifact is a v2 brief or a sunset comms plan.

non_goals:
  - "Marketing campaigns for v2 — covered in launch playbook"
  - "Co-founder recruitment — solo operator throughout"

prerequisites:
  - "v1 live for ≥6 months with revenue data"
  - "Honest founder audit: retention < target AND growth flat for 3+ months"

success_criteria:
  - "Pivot dimension chosen (segment / feature / model / sunset)"
  - "v2 brief OR sunset comms plan written"
  - "Existing customer cohort migrated or honestly off-boarded"
  - "Founder energy plan: defined commitment runway for v2"
  - "Lessons-learned doc shipped (mistake-memory updated)"

stages:
  - name: "Diagnose"
    intent: "Cold-eyed look at why v1 stalled."
    tasks:
      - "Pull churn + retention data"
      - "Pull market data: competitors, segment shift"
      - "Score against 4 pivot dimensions"
    methodologies:
      - slug: ops-churn-basics
        path: pro/marketing/growth-marketer/ops-churn-basics
        required: true
        tier_gate: pro
      - slug: retention-metrics
        path: pro/marketing/growth-marketer/retention-metrics
        required: true
        tier_gate: pro
      - slug: competitive-intelligence
        path: pro/research/market-researcher/competitive-intelligence
        required: true
        tier_gate: pro
      - slug: market-analysis
        path: pro/research/market-researcher/market-analysis
        required: true
        tier_gate: pro
      - slug: niche-evaluation
        path: solo/research/market-researcher/niche-evaluation
        required: true
        tier_gate: solo
      - slug: pain-point-research
        path: solo/research/researcher/pain-point-research
        required: true
        tier_gate: solo
    outputs:
      - "Failure diagnosis doc"
      - "Pivot dimension scoring"
    decision_gate: |
      Advance when pivot dimension is chosen. Refuse to skip diagnosis — drift back to v1 patterns otherwise.
  - name: "Choose"
    intent: "Pick the pivot or pick sunset. No 'partial' pivots."
    tasks:
      - "Write pivot hypothesis"
      - "Define v2 scope cuts"
      - "Set commitment runway (months + $)"
    methodologies:
      - slug: jobs-to-be-done
        path: solo/research/researcher/jobs-to-be-done
        required: true
        tier_gate: solo
      - slug: spec-writing
        path: solo/product/product-manager/spec-writing
        required: true
        tier_gate: solo
      - slug: writing-specifications
        path: solo/sdd/sdd/writing-specifications
        required: true
        tier_gate: solo
      - slug: architecture-decision-records
        path: solo/dev/software-architect/architecture-decision-records
        required: true
        tier_gate: solo
      - slug: trade-off-decision-matrix
        path: solo/dev/software-architect/trade-off-decision-matrix
        required: true
        tier_gate: solo
    outputs:
      - "Pivot decision doc"
      - "Commitment runway contract"
    decision_gate: |
      Required output: signed decision doc with runway. No 'see how it goes'.
  - name: "Communicate"
    intent: "Tell existing customers what's changing — honest, early, specific."
    tasks:
      - "Draft customer comms (3 versions: migrate / sunset / continue)"
      - "Send personally to top 10 accounts"
      - "Public announcement post"
    methodologies:
      - slug: difficult-conversations
        path: solo/comms/communicator/difficult-conversations
        required: true
        tier_gate: solo
      - slug: stakeholder-communication
        path: solo/comms/communicator/stakeholder-communication
        required: true
        tier_gate: solo
      - slug: growth-email-marketing
        path: solo/marketing/content-marketer/growth-email-marketing
        required: true
        tier_gate: solo
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
    outputs:
      - "Customer comms sent"
      - "Public announcement post"
    decision_gate: |
      Advance when ≥80% of paying customers acknowledge comms. Stay if silence.
  - name: "Execute"
    intent: "Build v2 OR off-board v1 cleanly."
    tasks:
      - "Cut v2 scope to minimum-viable-pivot"
      - "Ship per pivot brief"
      - "Off-board v1 users with refund policy"
    methodologies:
      - slug: technical-debt
        path: solo/dev/software-developer/technical-debt
        required: true
        tier_gate: solo
      - slug: product-launch
        path: solo/product/product-manager/product-launch
        required: true
        tier_gate: solo
    outputs:
      - "v2 shipped on staging OR v1 sunset complete"
    decision_gate: |
      Advance once v2 lives on staging OR v1 is fully off-boarded with refunds processed.
  - name: "Reflect"
    intent: "Lessons learned. Update memory. Don't repeat this."
    tasks:
      - "Run reflexion on v1 mistakes"
      - "Update mistake-memory"
      - "Write public retro post (optional)"
    methodologies:
      - slug: mistake-memory
        path: solo/sdd/sdd/mistake-memory
        required: true
        tier_gate: solo
      - slug: reflexion-learning
        path: solo/sdd/sdd/reflexion-learning
        required: true
        tier_gate: solo
    outputs:
      - "Mistake-memory entry"
      - "Lessons-learned doc"
    decision_gate: |
      Required output: written retro. Without it, the same mistake recurs.

common_pitfalls:
  - "Building v2 before deciding to pivot — accidental scope drift"
  - "Silent sunset — ghosting customers destroys future trust"

quality_checklist:
  - "Did I write down WHY v1 failed in specific terms, or stay vague?"
  - "Did existing customers hear from me personally before reading a public post?"

related_playbooks:
  - pmf-hunt-post-mvp
  - bootstrap-to-4k-mrr

token_budget_estimate: 17000
