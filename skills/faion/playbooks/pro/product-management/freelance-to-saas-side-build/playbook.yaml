slug: freelance-to-saas-side-build
title: "Freelance-to-SaaS transition (6-month side build)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: ecf8ad44401c2949

tier_min: pro
complexity: deep
context: [solo]
persona_hints: [P3]

intent: |
  Across two quarters, parallel to delivery work: pick one client-pain pattern, validate it as a productized SaaS, ship a paid v1 to 5-10 customers, and decide whether to scale, sunset, or fold into the freelance offer.

scope: |
  Across two quarters, parallel to delivery work: pick one client-pain pattern, validate it as a productized SaaS, ship a paid v1 to 5-10 customers, and decide whether to scale, sunset, or fold into the freelance offer.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Pick the pain pattern stage complete: Idea brief"
  - "Side build stage complete: v1 deployed"
  - "Validate growth stage complete: Activation funnel doc"
  - "Decide: scale / sunset / fold stage complete: Decision doc"

stages:
  - name: "Pick the pain pattern"
    intent: "From client work, isolate one repeating pain that could be a product."
    tasks:
      - "Audit last 12 months of client requests for repeating asks"
      - "Validate with 5 prospect interviews (not current clients)"
      - "Write a 1-page idea brief"
    methodologies:
      - slug: business-process-analysis
        path: pro/ba/business-analyst/business-process-analysis
        required: true
        tier_gate: pro
      - slug: decision-analysis
        path: pro/ba/business-analyst/decision-analysis
        required: true
        tier_gate: pro
      - slug: continuous-discovery-habits
        path: pro/product/product-manager/continuous-discovery-habits
        required: true
        tier_gate: pro
      - slug: spec-writing
        path: pro/product/product-planning/spec-writing
        required: true
        tier_gate: pro
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: market-researcher
        path: solo/research/market-researcher
        required: true
        tier_gate: solo
    outputs:
      - "Idea brief"
      - "5 prospect interview notes"
    decision_gate: |
      Advance once ≥3 of 5 interviewees confirm pain is top-3 and recurring.
  - name: "Side build"
    intent: "Ship a paid v1 in fixed weekly time-box without harming client cadence."
    tasks:
      - "Time-box product work to N hours/week"
      - "Ship a paid v1 to 5-10 design partners"
      - "Run weekly product retro"
    methodologies:
      - slug: quality-attributes-analysis
        path: pro/dev/software-architect/quality-attributes-analysis
        required: true
        tier_gate: pro
      - slug: micro-mvps
        path: pro/product/product-planning/micro-mvps
        required: true
        tier_gate: pro
      - slug: minimum-product-frameworks
        path: pro/product/product-planning/minimum-product-frameworks
        required: true
        tier_gate: pro
      - slug: mvp-scoping
        path: pro/product/product-planning/mvp-scoping
        required: true
        tier_gate: pro
      - slug: ops-automation-workflow
        path: solo/dev/automation-tooling/ops-automation-workflow
        required: true
        tier_gate: solo
      - slug: best-practices-2026
        path: solo/dev/software-developer/best-practices-2026
        required: true
        tier_gate: solo
      - slug: dev-methodologies-architecture
        path: solo/dev/software-developer/dev-methodologies-architecture
        required: true
        tier_gate: solo
      - slug: freelancer-to-saas-time-box
        path: pro/_gap/freelancer-to-saas-time-box
        required: true
        tier_gate: pro
      - slug: design-partner-program-template
        path: pro/_gap/design-partner-program-template
        required: true
        tier_gate: pro
    outputs:
      - "v1 deployed"
      - "5-10 paying design partners"
      - "Weekly retro notes"
    decision_gate: |
      Advance when 5 paying customers + retention >2 months. Otherwise re-scope.
  - name: "Validate growth"
    intent: "Acquire + activate + retain enough users to test scalability."
    tasks:
      - "Set activation + retention metrics"
      - "Run 2 acquisition experiments"
      - "Track cohorts weekly"
    methodologies:
      - slug: onboarding-flows
        path: pro/marketing/conversion-optimizer/onboarding-flows
        required: true
        tier_gate: pro
      - slug: activation-framework
        path: pro/marketing/growth-marketer/activation-framework
        required: true
        tier_gate: pro
      - slug: activation-metrics
        path: pro/marketing/growth-marketer/activation-metrics
        required: true
        tier_gate: pro
      - slug: cohort-implementation
        path: pro/marketing/growth-marketer/cohort-implementation
        required: true
        tier_gate: pro
      - slug: north-star-metric
        path: pro/marketing/growth-marketer/north-star-metric
        required: true
        tier_gate: pro
      - slug: retention-metrics
        path: pro/marketing/growth-marketer/retention-metrics
        required: true
        tier_gate: pro
      - slug: product-analytics
        path: pro/product/product-manager/product-analytics
        required: true
        tier_gate: pro
      - slug: product-launch
        path: pro/product/product-planning/product-launch
        required: true
        tier_gate: pro
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: solo
      - slug: growth-hacker-news-launch
        path: solo/marketing/growth-marketer/growth-hacker-news-launch
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/growth-marketer/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: growth-product-hunt-launch
        path: solo/marketing/growth-marketer/growth-product-hunt-launch
        required: true
        tier_gate: solo
      - slug: ops-subscription-models
        path: solo/marketing/growth-marketer/ops-subscription-models
        required: true
        tier_gate: solo
      - slug: selling-ideas
        path: solo/comms/communicator/selling-ideas
        required: true
        tier_gate: solo
    outputs:
      - "Activation funnel doc"
      - "Cohort dashboard"
      - "2 experiment results"
    decision_gate: |
      Advance when MoM growth ≥20% AND M2 retention ≥40%. Otherwise iterate.
  - name: "Decide: scale / sunset / fold"
    intent: "Written decision: scale, sunset, or fold into freelance offer."
    tasks:
      - "Compile evidence: MRR, churn, founder energy"
      - "Choose scale, sunset, or fold"
      - "Communicate decision to design partners"
    methodologies:
      - slug: ops-annual-planning-process
        path: pro/marketing/gtm-strategist/ops-annual-planning-process
        required: true
        tier_gate: pro
      - slug: portfolio-strategy
        path: pro/product/product-manager/portfolio-strategy
        required: true
        tier_gate: pro
      - slug: freelance-saas-billing-decision
        path: pro/_gap/freelance-saas-billing-decision
        required: true
        tier_gate: pro
      - slug: sunset-vs-fold-framework
        path: pro/_gap/sunset-vs-fold-framework
        required: true
        tier_gate: pro
    outputs:
      - "Decision doc"
      - "Comms to design partners"
    decision_gate: |
      Required artifact: written decision with explicit next steps. No 'maybe'.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

