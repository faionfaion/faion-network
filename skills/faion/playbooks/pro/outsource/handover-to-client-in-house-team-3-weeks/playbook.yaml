tier_min: pro
complexity: deep
context: [solo]
persona_hints: ["P4"]

intent: |
  From the initial trigger to the closed outcome described in scope, deliver every artefact named in success_criteria without skipping the decision gates between stages.

scope: |
  Engagement is ending. By the end of week 3, the client's in-house team is operating the pr
  oduct alone: code, runbooks, ADRs, on-call rota, training videos and a 90-day defect SLA a
  re in their hands. Daria gets a referenceable, signed acceptance letter.

summary: "Handover to client in-house team (3 weeks) — Engagement is ending. By the end of week 3, the client's in-house team is operating the product alone: code, runbooks, ADRs, on-call rota, training vide..."

success_criteria:
  - "Every stage's decision gate is recorded as passed before the next stage starts."
  - "All artefacts named in the stage outputs are produced and signed off."
  - "A written close-out record exists for archival and post-mortem."

token_budget_estimate: 17500

stages:
