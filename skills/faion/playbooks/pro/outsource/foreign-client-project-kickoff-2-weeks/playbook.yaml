tier_min: pro
complexity: deep
context: [solo]
persona_hints: ["P4"]

intent: |
  From the initial trigger to the closed outcome described in scope, deliver every artefact named in success_criteria without skipping the decision gates between stages.

scope: |
  Daria joins a brand-new engagement for a US/EU/UK/AU client. By end of week 2 she has: sig
  ned SoW, validated requirements baseline, ratified architecture skeleton fitting client co
  nventions, RACI + comms cadence, dev environment matching client stack, first sprint backl
  og groomed and an inception report sent. Output is reviewer-ready and survives a senior/le
  ad promotion panel.

summary: "Foreign-client project kickoff (2 weeks) — Daria joins a brand-new engagement for a US/EU/UK/AU client. By end of week 2 she has: signed SoW, validated requirements baseline, ratified architecture ..."

success_criteria:
  - "Every stage's decision gate is recorded as passed before the next stage starts."
  - "All artefacts named in the stage outputs are produced and signed off."
  - "A written close-out record exists for archival and post-mortem."

token_budget_estimate: 17500

stages:
