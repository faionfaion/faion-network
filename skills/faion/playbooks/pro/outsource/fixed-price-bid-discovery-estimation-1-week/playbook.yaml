tier_min: pro
complexity: deep
context: [solo]
persona_hints: ["P4"]

intent: |
  From the initial trigger to the closed outcome described in scope, deliver every artefact named in success_criteria without skipping the decision gates between stages.

scope: |
  Daria leads pre-sales discovery for a fixed-price proposal. By end of week 1 she has: a di
  scovery report, a sized estimate with assumptions + risk reserves, a defensible margin, an
  d a proposal Bid/No-bid recommendation that the delivery manager will not regret six month
  s later.

summary: "Fixed-price bid discovery + estimation (1 week) — Daria leads pre-sales discovery for a fixed-price proposal. By end of week 1 she has: a discovery report, a sized estimate with assumptions + risk ..."

success_criteria:
  - "Every stage's decision gate is recorded as passed before the next stage starts."
  - "All artefacts named in the stage outputs are produced and signed off."
  - "A written close-out record exists for archival and post-mortem."

token_budget_estimate: 17500

