intent: |
  From the initial trigger to the closed outcome described in scope, deliver every artefact named in success_criteria without skipping the decision gates between stages.

scope: |
  Engagement is running on time-and-materials. Client requests conversion to fixed-price for
   the next phase. By end of week 6 Daria has: requirements baseline frozen for phase 2, thr
  ee-point estimate with risk reserves, defensible commercial proposal, and a signed contrac
  t amendment without the team taking a margin haircut.

