slug: new-feature-scoping-session-per-feature-on-demand
title: "New feature scoping session (per-feature, on demand)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 7b8dd637dec31e64

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P1]

intent: |
  From request to ready-to-ship slice: signal validated, MVP cut to bone, spec written, flag plan decided, success metric defined — all before any code is generated.

scope: |
  From request to ready-to-ship slice: signal validated, MVP cut to bone, spec written, flag plan decided, success metric defined — all before any code is generated.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Validate the request"
    intent: "Confirm the signal is real, not vocal-minority."
    tasks:
      - "Count how many users asked for this in the last 30 days"
      - "Run 2 quick Mom-test calls if signal is thin"
      - "Tag the JTBD this feature touches"
    methodologies:
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: spec-writing
        path: solo/product/product-manager/spec-writing
        required: true
        tier_gate: solo
    outputs:
      - "Signal count"
      - "2 call notes (if needed)"
      - "JTBD tag"
    decision_gate: "Advance only when signal >=3 distinct users OR clear JTBD match."
  - name: "Cut to the bone"
    intent: "Find the smallest scope that delivers the JTBD."
    tasks:
      - "List the full feature surface as imagined"
      - "Cut to a micro-MVP that delivers the JTBD"
      - "Capture explicit non-goals"
    methodologies:
      - slug: feature-flags-rollout-targeting
        path: solo/dev/automation-tooling/feature-flags-rollout-targeting
        required: true
        tier_gate: solo
      - slug: minimum-product-frameworks
        path: solo/product/product-planning/minimum-product-frameworks
        required: true
        tier_gate: solo
    outputs:
      - "Full feature surface"
      - "Micro-MVP scope"
      - "Non-goals list"
    decision_gate: "Advance only when scope fits in 1 page AND cuts >=50% of original surface."
  - name: "Write the spec"
    intent: "Write the spec with acceptance criteria."
    tasks:
      - "Use the spec-structure template"
      - "Define acceptance criteria per AC line"
      - "List dependencies and risks"
    methodologies:
      - slug: feature-flags
        path: solo/dev/software-developer/feature-flags
        required: true
        tier_gate: solo
      - slug: market-researcher
        path: solo/research/market-researcher
        required: true
        tier_gate: solo
    outputs:
      - "feature-spec.md"
      - "Acceptance criteria table"
      - "Risk list"
    decision_gate: "Advance only when every AC is testable."
  - name: "Flag plan"
    intent: "Decide the rollout shape before code."
    tasks:
      - "Pick the feature-flag strategy (canary / all-users / off)"
      - "Define the kill-switch trigger"
      - "Document the rollback path"
    methodologies:
      - slug: continuous-discovery
        path: solo/product/product-manager/continuous-discovery
        required: true
        tier_gate: solo
      - slug: spec-structure
        path: solo/sdd/sdd-planning/spec-structure
        required: true
        tier_gate: solo
    outputs:
      - "Flag plan"
      - "Kill-switch trigger"
      - "Rollback runbook"
    decision_gate: "Advance only when there is a documented rollback in <=15 minutes."
  - name: "Success metric"
    intent: "Define how you will know it worked."
    tasks:
      - "Pick one north-star metric that should move"
      - "Set the threshold for this was worth it"
      - "Wire metrics in the spec"
    methodologies:
      - slug: feature-prioritization-rice
        path: solo/product/product-manager/feature-prioritization-rice
        required: true
        tier_gate: solo
      - slug: writing-specifications
        path: solo/sdd/sdd/writing-specifications
        required: true
        tier_gate: solo
    outputs:
      - "Success metric"
      - "Threshold"
      - "Metric wiring note"
    decision_gate: "Advance only with a single north-star metric committed."
  - name: "Build-or-waitlist gate"
    intent: "Confirm we are actually building, not waitlisting."
    tasks:
      - "Compare effort to other top-3 outcomes"
      - "Decide build-now / waitlist / cut"
      - "Write the rationale"
    methodologies:
      - slug: micro-mvps
        path: solo/product/product-manager/micro-mvps
        required: true
        tier_gate: solo
    outputs:
      - "Build/waitlist/cut call"
      - "Rationale doc"
      - "Backlog update"
    decision_gate: "Cycle closes when the call is committed in writing."
  - name: "Schedule + briefing pack"
    intent: "Hand the spec to the executor (you or AI agent)."
    tasks:
      - "Prepare the agent briefing pack (spec + context + tests)"
      - "Schedule the build slot"
      - "Pre-load the first task file"
    methodologies:
      - slug: mvp-scoping
        path: solo/product/product-manager/mvp-scoping
        required: true
        tier_gate: solo
    outputs:
      - "Briefing pack"
      - "Calendar slot"
      - "First task file"
    decision_gate: "Cycle closes when the next slot is on the calendar and pre-loaded."

token_budget_estimate: 12000

cli_invocations:
