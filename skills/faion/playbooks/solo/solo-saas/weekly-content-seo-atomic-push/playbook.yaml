slug: weekly-content-seo-atomic-push
title: "Weekly content & SEO atomic push"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: fa30b168f4082905

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P1]

intent: |
  One indexed asset live each week (blog post, changelog, doc page): topic chosen against keyword + ICP, draft generated with AI then human-edited, on-page SEO complete, shared on 2 channels.

scope: |
  One indexed asset live each week (blog post, changelog, doc page): topic chosen against keyword + ICP, draft generated with AI then human-edited, on-page SEO complete, shared on 2 channels.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Pick the topic"
    intent: "Choose against keyword + ICP, not vibes."
    tasks:
      - "Pull the keyword gap list"
      - "Cross-check ICP pain themes"
      - "Pick the single topic for this week"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: seo-basics
        path: solo/marketing/seo-manager/seo-basics
        required: true
        tier_gate: solo
    outputs:
      - "Chosen topic"
      - "Primary keyword"
      - "ICP angle"
    decision_gate: "Advance only when topic ties to a tracked keyword AND ICP pain."
  - name: "Outline + draft"
    intent: "AI-draft the bones, you sharpen the spine."
    tasks:
      - "AI-generate the outline from research notes"
      - "Draft with the AI tool"
      - "Human-edit for voice and hard truths"
    methodologies:
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: seo-techniques
        path: solo/marketing/seo-manager/seo-techniques
        required: true
        tier_gate: solo
    outputs:
      - "Outline doc"
      - "Draft v1"
      - "Human-edit pass"
    decision_gate: "Advance only when human-edit pass is complete (no AI-default sentences)."
  - name: "On-page SEO"
    intent: "Cover the boring but high-leverage details."
    tasks:
      - "Run the on-page SEO checklist (title, meta, headings, schema)"
      - "Add internal links to the topical cluster"
      - "Optimise images and core web vitals"
    methodologies:
      - slug: growth-hacker-news-launch
        path: solo/marketing/gtm-strategist/growth-hacker-news-launch
        required: true
        tier_gate: solo
      - slug: topical-authority
        path: solo/marketing/seo-manager/topical-authority
        required: true
        tier_gate: solo
    outputs:
      - "On-page checklist done"
      - "Internal link map"
      - "Image/CWV pass"
    decision_gate: "Advance only when checklist is 100% green."
  - name: "Publish + index nudge"
    intent: "Get it live and indexed fast."
    tasks:
      - "Publish to the site"
      - "Submit URL to search indexing tools"
      - "Add to the sitemap and RSS"
    methodologies:
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: zero-click-search-adaptation
        path: solo/marketing/seo-manager/zero-click-search-adaptation
        required: true
        tier_gate: solo
    outputs:
      - "Live URL"
      - "Submission receipts"
      - "Sitemap update"
    decision_gate: "Advance only when URL is live AND indexed."
  - name: "Distribute on 2 channels"
    intent: "Push out where the ICP lives."
    tasks:
      - "Cross-post a short version to X / IH / LinkedIn"
      - "Drop it in the newsletter"
      - "Reply in 2 relevant threads with the link"
    methodologies:
      - slug: growth-seo-fundamentals
        path: solo/marketing/seo-manager/growth-seo-fundamentals
        required: true
        tier_gate: solo
    outputs:
      - "Channel posts"
      - "Newsletter inclusion"
      - "Thread replies"
    decision_gate: "Cycle closes when 2 channels have actually shipped a post."

token_budget_estimate: 6000

cli_invocations:
  human:  "faion get-content weekly-content-seo-atomic-push --format md"
  agent:  "faion get-content weekly-content-seo-atomic-push --format context"
  json:   "faion get-content weekly-content-seo-atomic-push --format json"

changelog:
  - version: "1.0.0"
    date: 2026-05-20
    note: "Initial v2 draft generated from F-059..063 backlog"
