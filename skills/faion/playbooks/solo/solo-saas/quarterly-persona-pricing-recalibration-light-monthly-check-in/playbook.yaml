slug: quarterly-persona-pricing-recalibration-light-monthly-check-in
title: "Quarterly persona & pricing recalibration (light, monthly check-in)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: efde1cb7850e322c

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P1]

intent: |
  Pricing & ICP still match reality: paid-cohort signal reviewed, ICP one-liner adjusted, one price experiment queued or rejected, free-to-paid funnel decision recorded.

scope: |
  Pricing & ICP still match reality: paid-cohort signal reviewed, ICP one-liner adjusted, one price experiment queued or rejected, free-to-paid funnel decision recorded.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Re-read paid-cohort signal"
    intent: "Look at who is actually paying, not who you imagined."
    tasks:
      - "Pull the latest paid-cohort breakdown by use-case"
      - "Note the dominant 2-3 use-cases"
      - "Flag any drift from the imagined ICP"
    methodologies:
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
      - slug: architecture-decision-records
        path: solo/sdd/sdd/architecture-decision-records
        required: true
        tier_gate: solo
    outputs:
      - "Paid-cohort breakdown"
      - "Top use-cases"
      - "ICP drift notes"
    decision_gate: "Advance only with a written drift verdict."
  - name: "Adjust ICP one-liner"
    intent: "Re-write the ICP one-liner to match reality."
    tasks:
      - "Re-write the ICP one-liner"
      - "Run it past 2 paying customers"
      - "Roll into landing + onboarding copy"
    methodologies:
      - slug: ops-pricing-strategy
        path: solo/marketing/gtm-strategist/ops-pricing-strategy
        required: true
        tier_gate: solo
    outputs:
      - "New ICP one-liner"
      - "Customer reactions"
      - "Rollout note"
    decision_gate: "Advance only when 2 customers confirm the new one-liner fits."
  - name: "Queue or reject one price experiment"
    intent: "One disciplined pricing move per cycle."
    tasks:
      - "List pricing levers (anchor, tier, packaging, discount)"
      - "Pick one experiment OR explicitly defer"
      - "Pre-register the metric + sample size"
    methodologies:
      - slug: ops-subscription-models
        path: solo/marketing/gtm-strategist/ops-subscription-models
        required: true
        tier_gate: solo
    outputs:
      - "Experiment spec OR rejection note"
      - "Pre-registered metric"
      - "Schedule slot"
    decision_gate: "Advance only when one decision is committed (queue or reject)."
  - name: "Free-to-paid funnel call"
    intent: "Audit the conversion path quarterly."
    tasks:
      - "Pull free-to-paid conversion rate by cohort"
      - "Inspect onboarding emails and prompts"
      - "Decide: change copy / change product / change pricing"
    methodologies:
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
    outputs:
      - "Conversion-rate snapshot"
      - "Onboarding audit"
      - "Decision note"
    decision_gate: "Advance only when there is a single named change to ship."
  - name: "Document the recalibration"
    intent: "Lock the quarters position in writing."
    tasks:
      - "Write the quarterly recalibration entry"
      - "Update the pricing card if changed"
      - "Set the next quarterly checkpoint"
    methodologies:
      - slug: market-researcher
        path: solo/research/market-researcher
        required: true
        tier_gate: solo
    outputs:
      - "Recalibration doc"
      - "Pricing card update (if any)"
      - "Next checkpoint reminder"
    decision_gate: "Cycle closes when the recalibration doc is committed."

token_budget_estimate: 12000

cli_invocations:
  human:  "faion get-content quarterly-persona-pricing-recalibration-light-monthly-check-in --format md"
  agent:  "faion get-content quarterly-persona-pricing-recalibration-light-monthly-check-in --format context"
  json:   "faion get-content quarterly-persona-pricing-recalibration-light-monthly-check-in --format json"

changelog:
