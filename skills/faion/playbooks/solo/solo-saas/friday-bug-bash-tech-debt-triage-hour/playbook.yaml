slug: friday-bug-bash-tech-debt-triage-hour
title: "Friday bug-bash & tech-debt triage hour"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 92bbf9cbbf1098d4

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P1]

intent: |
  Inbox-zero on bug tracker: Sentry / GitHub issues grouped, severity-tagged, top-3 fixed or queued, debt list updated with one decision per item (fix now / accept / kill).

scope: |
  Inbox-zero on bug tracker: Sentry / GitHub issues grouped, severity-tagged, top-3 fixed or queued, debt list updated with one decision per item (fix now / accept / kill).

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Pull the open list"
    intent: "Get every bug + debt item in one view."
    tasks:
      - "Pull Sentry top-N issues by event count"
      - "Pull GitHub issues tagged bug/debt"
      - "Group duplicates and stale dups"
    methodologies:
      - slug: refactoring-patterns
        path: free/dev/code-quality/refactoring-patterns
        required: true
        tier_gate: solo
      - slug: technical-debt
        path: solo/dev/software-developer/technical-debt
        required: true
        tier_gate: solo
    outputs:
      - "Unified bug+debt list"
      - "Duplicate map"
      - "Stale-cull list"
    decision_gate: "Advance only when the list fits on one screen."
  - name: "Severity + cost tag"
    intent: "Rate each item by user pain and fix cost."
    tasks:
      - "Tag severity (S0..S3) per item"
      - "Estimate fix cost in tokens or hours of focus"
      - "Mark the revenue-relevance per item"
    methodologies:
      - slug: tech-debt-basics
        path: free/dev/code-quality/tech-debt-basics
        required: true
        tier_gate: solo
      - slug: backlog-management
        path: solo/product/product-operations/backlog-management
        required: true
        tier_gate: solo
    outputs:
      - "Severity tags"
      - "Cost estimates"
      - "Revenue-relevance tags"
    decision_gate: "Advance only when every item has all three tags."
  - name: "Top-3 fix or queue"
    intent: "Fix top-3 today OR queue them with a date."
    tasks:
      - "Pick top-3 by severity x revenue"
      - "Fix in-place if <=30 minutes each"
      - "Queue the rest with a date and owner (always you)"
    methodologies:
      - slug: logging-patterns
        path: solo/dev/automation-tooling/logging-patterns
        required: true
        tier_gate: solo
      - slug: feedback-management
        path: solo/product/product-operations/feedback-management
        required: true
        tier_gate: solo
    outputs:
      - "3 fixes shipped OR queued"
      - "Updated tracker"
      - "Todays fix commits"
    decision_gate: "Advance only when each top-3 has a status: fixed / queued / accepted."
  - name: "Debt decision pass"
    intent: "One decision per debt item: fix now, accept, or kill."
    tasks:
      - "Walk the remaining debt list"
      - "Stamp each item: fix-now / accept / kill"
      - "Write a one-line rationale per kill"
    methodologies:
      - slug: tech-debt-management
        path: solo/dev/code-quality/tech-debt-management
        required: true
        tier_gate: solo
      - slug: technical-debt-management
        path: solo/product/product-operations/technical-debt-management
        required: true
        tier_gate: solo
    outputs:
      - "Debt decision log"
      - "Killed-debt rationales"
      - "Accept-debt notes"
    decision_gate: "Advance only when no debt item is left in to-think-about."
  - name: "Update memories + signal"
    intent: "Stop the bug from coming back."
    tasks:
      - "Add the worst pattern to mistake memory"
      - "Wire one new monitor/alert if the bug came from a blind spot"
      - "Close the ritual with a tracker snapshot"
    methodologies:
      - slug: feature-flags
        path: solo/dev/software-developer/feature-flags
        required: true
        tier_gate: solo
      - slug: architecture-decision-records
        path: solo/sdd/sdd/architecture-decision-records
        required: true
        tier_gate: solo
    outputs:
      - "Mistake memory delta"
      - "New alert config"
      - "Closing tracker snapshot"
    decision_gate: "Cycle closes when mistakes are written and snapshot is saved."

token_budget_estimate: 6000

cli_invocations:
  human:  "faion get-content friday-bug-bash-tech-debt-triage-hour --format md"
  agent:  "faion get-content friday-bug-bash-tech-debt-triage-hour --format context"
  json:   "faion get-content friday-bug-bash-tech-debt-triage-hour --format json"

changelog:
  - version: "1.0.0"
    date: 2026-05-20
    note: "Initial v2 draft generated from F-059..063 backlog"
