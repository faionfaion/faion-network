slug: ai-pair-coding-loop-for-solo-saas-claudecursor-spec
title: "AI-pair coding loop for solo SaaS (Claude/Cursor + Spec)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: ba7828a496b3c5e1

tier_min: solo
complexity: deep
context: [solo]
persona_hints: [P1]

intent: |
  Solo founder ships a feature in a clean spec → AI-implement → review → ship cycle that does NOT degrade into vibe-coded breakage.

scope: |
  Solo founder ships a feature in a clean spec → AI-implement → review → ship cycle that does NOT degrade into vibe-coded breakage. Output: a repeatable per-feature workflow Alex runs every day.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Spec the slice"
    intent: "Spec is the brief - no agent runs without it."
    tasks:
      - "Write the spec with concrete AC"
      - "Pin the relevant context paths"
      - "Confirm scope fits the agents context window"
    methodologies:
      - slug: code-review-basics
        path: free/dev/code-quality/code-review-basics
        required: true
        tier_gate: solo
    outputs:
      - "slice-spec.md"
      - "Context path list"
      - "Estimated token budget"
    decision_gate: "Advance only when scope <=100k tokens of context."
  - name: "Context curation"
    intent: "Feed only the files the agent actually needs."
    tasks:
      - "List the files in scope (no folder dumps)"
      - "Strip irrelevant tests, fixtures, deps"
      - "Add the patterns/mistake memory snippet"
    methodologies:
      - slug: tdd-workflow
        path: free/dev/software-developer/tdd-workflow
        required: true
        tier_gate: solo
    outputs:
      - "Curated context manifest"
      - "Token estimate vs budget"
      - "Memory snippets"
    decision_gate: "Advance only when curated context is below the agents safe limit."
  - name: "Diff-size discipline"
    intent: "Cap the agent diff so you can still review it."
    tasks:
      - "Set a max diff size (e.g. <=400 lines)"
      - "Ask for one logical change per pass"
      - "Reject and re-prompt if diff balloons"
    methodologies:
      - slug: feature-flags-rollout-targeting
        path: solo/dev/automation-tooling/feature-flags-rollout-targeting
        required: true
        tier_gate: solo
    outputs:
      - "Diff size rule"
      - "Re-prompt log"
      - "Final diff under cap"
    decision_gate: "Advance only when diff is under cap AND focused on one concern."
  - name: "TDD pass"
    intent: "Tests first, code second - even with the agent."
    tasks:
      - "Ask the agent to generate failing tests first"
      - "Verify tests map to AC"
      - "Have agent generate the implementation against tests"
    methodologies:
      - slug: spec-requirements
        path: solo/sdd/sdd-planning/spec-requirements
        required: true
        tier_gate: solo
    outputs:
      - "Failing test commit"
      - "Implementation commit"
      - "Green test run"
    decision_gate: "Advance only when tests cover every AC and pass."
  - name: "Self-code review"
    intent: "Solo PR review using a written rubric."
    tasks:
      - "Walk the self-code-review rubric"
      - "Flag any agent-ese code (over-abstraction, unused helpers)"
      - "Refactor in place if needed"
    methodologies:
      - slug: writing-specifications
        path: solo/sdd/sdd-planning/writing-specifications
        required: true
        tier_gate: solo
    outputs:
      - "Review checklist"
      - "Refactor notes"
      - "Final commit"
    decision_gate: "Advance only when no rubric item is red."
  - name: "Validate AI-generated tests"
    intent: "Confirm the tests actually test something."
    tasks:
      - "Mutate the implementation to force a failure"
      - "Confirm at least one test catches it"
      - "Strip any tautological tests"
    methodologies:
      - slug: code-review-cycle
        path: solo/sdd/sdd/code-review-cycle
        required: true
        tier_gate: solo
    outputs:
      - "Mutation pass log"
      - "Stripped tautological tests"
      - "Coverage delta"
    decision_gate: "Advance only when mutation catches the regression."
  - name: "Ship + flag"
    intent: "Ship the slice safely with rollback ready."
    tasks:
      - "Merge to main behind a flag"
      - "Deploy to staging then prod"
      - "Verify AC on prod with the flag rolled out"
    methodologies:
      - slug: task-creation-parallelization
        path: solo/sdd/sdd/task-creation-parallelization
        required: true
        tier_gate: solo
    outputs:
      - "Merged PR"
      - "Staging + prod deploys"
      - "AC verification on prod"
    decision_gate: "Advance only when production AC pass for the rollout cohort."
  - name: "Lessons to memory"
    intent: "Lock the agent-loop lessons so they compound."
    tasks:
      - "Update agent-prompt patterns with what worked"
      - "Update mistake memory with traps"
      - "Add a context-curation note for next time"
    methodologies:
      - slug: writing-specifications
        path: solo/sdd/sdd/writing-specifications
        required: true
        tier_gate: solo
    outputs:
      - "Pattern memory delta"
      - "Mistake memory delta"
      - "Context curation note"
    decision_gate: "Cycle closes when memories are committed."
  - name: "Re-prime tomorrow"
    intent: "Set up the next slice while context is hot."
    tasks:
      - "Identify the next slice"
      - "Pre-write the next spec stub"
      - "Stage the context manifest for tomorrow"
    methodologies:
      - slug: code-review-basics
        path: free/dev/code-quality/code-review-basics
        required: true
        tier_gate: solo
    outputs:
      - "Tomorrows slice name"
      - "Spec stub"
      - "Staged manifest"
    decision_gate: "Cycle closes when tomorrows first 20 minutes are pre-loaded."

token_budget_estimate: 22000

cli_invocations:
  human:  "faion get-content ai-pair-coding-loop-for-solo-saas-claudecursor-spec --format md"
  agent:  "faion get-content ai-pair-coding-loop-for-solo-saas-claudecursor-spec --format context"
  json:   "faion get-content ai-pair-coding-loop-for-solo-saas-claudecursor-spec --format json"

