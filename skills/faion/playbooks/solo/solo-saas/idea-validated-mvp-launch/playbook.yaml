slug: idea-validated-mvp-launch
title: "Idea → Validated MVP launch"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 5f17afc6db77e538

tier_min: solo
complexity: deep
context: [solo]
persona_hints: [P1]

intent: |
  Solo founder takes one raw idea from notebook to a paid landing page + working MVP with first 5 paying users; exit when a written go/no-go decision is in hand backed by problem evidence, scoped spec, shipped product, and at least 5 paying customers (or a clean kill).

scope: |
  Solo founder takes one raw idea from notebook to a paid landing page + working MVP with first 5 paying users; exit when a written go/no-go decision is in hand backed by problem evidence, scoped spec, shipped product, and at least 5 paying customers (or a clean kill).

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Discovery"
    intent: "From multiple raw ideas to one chosen problem with documented JTBD."
    tasks:
      - "Generate 5-10 idea variants from your domain pain"
      - "Score each on founder-market fit and pain frequency"
      - "Write a JTBD statement for the top candidate"
    methodologies:
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: growth-reddit-marketing
        path: solo/marketing/content-marketer/growth-reddit-marketing
        required: true
        tier_gate: solo
      - slug: spec-writing
        path: solo/product/product-manager/spec-writing
        required: true
        tier_gate: solo
      - slug: value-proposition-design
        path: solo/research/researcher/value-proposition-design
        required: true
        tier_gate: solo
    outputs:
      - "Idea brief (1 page)"
      - "JTBD statement"
      - "Founder-market fit score"
    decision_gate: "Advance if top idea scores >=7/10 on founder fit AND pain frequency. Else pick the next candidate."
  - name: "Problem validation"
    intent: "Confirm the pain is real and severe before any build commitment."
    tasks:
      - "Recruit 10 prospects from cold + warm channels"
      - "Run Mom-test-style problem interviews (no pitch)"
      - "Tag each transcript with severity and frequency"
    methodologies:
      - slug: decision-tree-tech-stack
        path: solo/dev/software-architect/decision-tree-tech-stack
        required: true
        tier_gate: solo
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
      - slug: writing-implementation-plans
        path: solo/sdd/sdd/writing-implementation-plans
        required: true
        tier_gate: solo
    outputs:
      - "10 interview notes"
      - "Severity/frequency tally"
      - "Top-3 painpoint quotes"
    decision_gate: "Advance if >=7/10 confirm pain is top-3 in their workflow. Pivot variant if 4-6. Kill if <=3."
  - name: "Willingness to pay"
    intent: "Get specific pricing commitments before code."
    tasks:
      - "Run 5 follow-up calls with the top-pain segment"
      - "Ask would you pay $X today with a concrete number"
      - "Capture verbatim pricing reactions"
    methodologies:
      - slug: feature-flags
        path: solo/dev/software-developer/feature-flags
        required: true
        tier_gate: solo
      - slug: growth-hacker-news-launch
        path: solo/marketing/gtm-strategist/growth-hacker-news-launch
        required: true
        tier_gate: solo
      - slug: idea-generation
        path: solo/research/market-researcher/idea-generation
        required: true
        tier_gate: solo
    outputs:
      - "5 willingness-to-pay quotes"
      - "Pricing hypothesis with 3 tiers"
      - "Value-prop canvas"
    decision_gate: "Advance if >=3/5 say yes at $X today with a concrete number. Re-price if vague. Kill if every call softens."
  - name: "Spec"
    intent: "Smallest possible build scope with explicit cuts."
    tasks:
      - "Write a 1-page spec covering only the validated workflow"
      - "List explicit non-goals and cuts"
      - "Define acceptance criteria per feature"
    methodologies:
      - slug: logging-patterns
        path: solo/dev/software-developer/logging-patterns
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: naming-and-domains
        path: solo/research/market-researcher/naming-and-domains
        required: true
        tier_gate: solo
    outputs:
      - "spec.md (1 page)"
      - "Non-goals list"
      - "Acceptance criteria table"
    decision_gate: "Advance if spec fits on one page AND every feature maps to an acceptance criterion."
  - name: "Build"
    intent: "Working MVP that delivers the validated value, nothing more."
    tasks:
      - "Implement spec items in dependency order"
      - "Deploy to a real URL daily, however ugly"
      - "Skip anything not blocking first payment"
    methodologies:
      - slug: trunk-based-development
        path: solo/dev/software-developer/trunk-based-development
        required: true
        tier_gate: solo
      - slug: growth-product-hunt-launch
        path: solo/marketing/gtm-strategist/growth-product-hunt-launch
        required: true
        tier_gate: solo
      - slug: niche-evaluation
        path: solo/research/market-researcher/niche-evaluation
        required: true
        tier_gate: solo
    outputs:
      - "Working URL with end-to-end flow"
      - "Implementation log (shipped vs cut)"
      - "CI green on main"
    decision_gate: "Advance when a stranger can complete the workflow without help."
  - name: "Beta"
    intent: "5 friendly users run the MVP under real conditions."
    tasks:
      - "Invite 5 prospects from Discovery"
      - "Observe usage without pre-explaining"
      - "Log every confusion point and bug"
    methodologies:
      - slug: backup-recovery
        path: solo/infra/server-craft/backup-recovery
        required: true
        tier_gate: solo
      - slug: continuous-discovery
        path: solo/product/product-manager/continuous-discovery
        required: true
        tier_gate: solo
      - slug: jobs-to-be-done
        path: solo/research/researcher/jobs-to-be-done
        required: true
        tier_gate: solo
    outputs:
      - "5 session notes"
      - "Bug + confusion log"
      - "Activation rate"
    decision_gate: "Advance if >=3/5 reach the value moment unaided. Iterate UX if 1-2. Re-spec if 0."
  - name: "Launch"
    intent: "Paid landing page live; first paying users converted."
    tasks:
      - "Build paid landing with Stripe checkout"
      - "Convert beta users to paying customers"
      - "Open public sign-up and ship to 2 channels"
    methodologies:
      - slug: cloudflare-domain-dns
        path: solo/infra/server-craft/cloudflare-domain-dns
        required: true
        tier_gate: solo
      - slug: micro-mvps
        path: solo/product/product-manager/micro-mvps
        required: true
        tier_gate: solo
      - slug: pain-point-research
        path: solo/research/researcher/pain-point-research
        required: true
        tier_gate: solo
    outputs:
      - "Live paid landing URL"
      - "First 5 paid invoices"
      - "Initial traffic source mix"
    decision_gate: "Advance if >=5 paying customers within 14 days post-launch."
  - name: "Decide"
    intent: "Written go/no-go backed by evidence."
    tasks:
      - "Compile evidence trail (interviews + metrics + paying-user feedback)"
      - "Write explicit continue/pivot/kill decision"
      - "If continue, define the next 30-day milestone"
    methodologies:
      - slug: health-checks-autoheal
        path: solo/infra/server-craft/health-checks-autoheal
        required: true
        tier_gate: solo
      - slug: mvp-scoping
        path: solo/product/product-manager/mvp-scoping
        required: true
        tier_gate: solo
      - slug: problem-validation-2026
        path: solo/research/researcher/problem-validation-2026
        required: true
        tier_gate: solo
    outputs:
      - "Decision doc with evidence"
      - "Next-30-days plan OR kill rationale"
    decision_gate: "Required output is a written decision - no maybe, no see how it goes."
  - name: "Reflexion"
    intent: "Capture lessons into pattern + mistake memory."
    tasks:
      - "Write 1-page reflexion on what worked and what did not"
      - "Update pattern memory with reusable assets"
      - "Update mistake memory with traps to avoid next cycle"
    methodologies:
      - slug: ssl-tls-management
        path: solo/infra/server-craft/ssl-tls-management
        required: true
        tier_gate: solo
      - slug: product-launch
        path: solo/product/product-manager/product-launch
        required: true
        tier_gate: solo
      - slug: user-interviews
        path: solo/research/researcher/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "Reflexion doc"
      - "Pattern memory delta"
      - "Mistake memory delta"
    decision_gate: "Cycle closes when reflexion is committed and memories updated."

token_budget_estimate: 22000

