slug: customer-support-inbox-sweep-2x-weekly
title: "Customer support inbox sweep (2x weekly)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 19d656c6c18bfc1a

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P1]

intent: |
  Zero unread customer messages: each ticket resolved or scheduled, top 3 themes pushed into product feedback, churn signals flagged, FAQ updated where the same answer was given twice.

scope: |
  Zero unread customer messages: each ticket resolved or scheduled, top 3 themes pushed into product feedback, churn signals flagged, FAQ updated where the same answer was given twice.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Inbox triage"
    intent: "Zero unread, every ticket categorised."
    tasks:
      - "Open the support inbox"
      - "Tag each ticket: bug / feature / billing / churn-signal"
      - "Set a target response time per category"
    methodologies:
      - slug: active-listening
        path: solo/comms/communicator/active-listening
        required: true
        tier_gate: solo
      - slug: continuous-discovery
        path: solo/product/product-manager/continuous-discovery
        required: true
        tier_gate: solo
    outputs:
      - "Tagged inbox"
      - "Category counts"
      - "Response-time SLA per category"
    decision_gate: "Advance only when inbox count = 0 unread."
  - name: "Resolve or schedule"
    intent: "Every ticket either closed today or has a scheduled reply."
    tasks:
      - "Resolve quick wins (<=5 minutes each)"
      - "Schedule callbacks for deeper issues"
      - "Escalate billing / churn signals immediately"
    methodologies:
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: feedback-management
        path: solo/product/product-operations/feedback-management
        required: true
        tier_gate: solo
    outputs:
      - "Resolved ticket count"
      - "Scheduled callbacks"
      - "Escalation log"
    decision_gate: "Advance only when every ticket has either a resolution or a scheduled action."
  - name: "Verbatim to backlog"
    intent: "Move 3 themes from tickets into product roadmap."
    tasks:
      - "Cluster ticket topics into 3 themes"
      - "Capture verbatim quotes per theme"
      - "Add or up-vote backlog items"
    methodologies:
      - slug: stakeholder-communication
        path: solo/comms/communicator/stakeholder-communication
        required: true
        tier_gate: solo
    outputs:
      - "Top-3 themes"
      - "Verbatim quote bank"
      - "Backlog deltas"
    decision_gate: "Advance only when themes are added to backlog with quotes attached."
  - name: "FAQ + canned reply update"
    intent: "Stop answering the same question twice."
    tasks:
      - "Identify any question answered >=2 times this sweep"
      - "Add an FAQ entry or update the doc page"
      - "Save a canned reply template"
    methodologies:
      - slug: ops-customer-support
        path: solo/marketing/gtm-strategist/ops-customer-support
        required: true
        tier_gate: solo
    outputs:
      - "FAQ updates"
      - "Canned reply additions"
      - "Updated knowledge base link"
    decision_gate: "Advance only when every asked-twice question is now self-serve."
  - name: "Churn signal flag"
    intent: "Catch leaving users before they go silent."
    tasks:
      - "Tag tickets with churn-risk signal"
      - "Trigger a save email or call for each"
      - "Pass churn themes to the next retention review"
    methodologies:
      - slug: backlog-management
        path: solo/product/product-manager/backlog-management
        required: true
        tier_gate: solo
    outputs:
      - "Churn-flag list"
      - "Save actions log"
      - "Themes for retention"
    decision_gate: "Cycle closes when each churn flag has a save action initiated."

token_budget_estimate: 6000

cli_invocations:
  human:  "faion get-content customer-support-inbox-sweep-2x-weekly --format md"
  agent:  "faion get-content customer-support-inbox-sweep-2x-weekly --format context"
  json:   "faion get-content customer-support-inbox-sweep-2x-weekly --format json"

changelog:
