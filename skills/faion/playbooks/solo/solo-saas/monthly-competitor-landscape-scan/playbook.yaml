slug: monthly-competitor-landscape-scan
title: "Monthly competitor & landscape scan"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: a9aa2de4cff91e93

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P1]

intent: |
  Sharper positioning: top 5 competitors re-audited, pricing & feature deltas captured, 1 positioning tweak shipped, kill-list updated for non-differentiating roadmap items.

scope: |
  Sharper positioning: top 5 competitors re-audited, pricing & feature deltas captured, 1 positioning tweak shipped, kill-list updated for non-differentiating roadmap items.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Re-list the field"
    intent: "Refresh the top-5 competitor list."
    tasks:
      - "Pull the current top-5 from search + social + customer mentions"
      - "Drop anyone irrelevant; add new entrants"
      - "Lock the canonical list for this month"
    methodologies:
      - slug: business-storytelling
        path: solo/comms/communicator/business-storytelling
        required: true
        tier_gate: solo
      - slug: researcher
        path: solo/research/researcher
        required: true
        tier_gate: solo
    outputs:
      - "Top-5 competitor list"
      - "Drop/add log"
      - "Canonical list URL"
    decision_gate: "Advance only when exactly 5 competitors are named."
  - name: "Feature + pricing audit"
    intent: "Capture deltas in a single sheet."
    tasks:
      - "Walk each competitors pricing page"
      - "Capture feature deltas vs your product"
      - "Note any new positioning angle"
    methodologies:
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
    outputs:
      - "Feature delta sheet"
      - "Pricing delta sheet"
      - "Positioning notes"
    decision_gate: "Advance only when every competitor row is filled with a date."
  - name: "Positioning tweak"
    intent: "Ship one small positioning change before next month."
    tasks:
      - "Pick one delta worth responding to"
      - "Update headline / pricing card / one section"
      - "Run the change past 3 outsider readers"
    methodologies:
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
    outputs:
      - "Updated landing section"
      - "Outsider feedback notes"
      - "Ship-date stamp"
    decision_gate: "Advance only when one positioning change actually deploys."
  - name: "Kill non-differentiators"
    intent: "Cut roadmap items that everyone already has."
    tasks:
      - "Review backlog for table-stakes items not differentiating"
      - "Mark them kill / accept / defer"
      - "Update the kill log"
    methodologies:
      - slug: ops-pricing-strategy
        path: solo/marketing/gtm-strategist/ops-pricing-strategy
        required: true
        tier_gate: solo
    outputs:
      - "Backlog kill list"
      - "Updated kill log"
      - "Capacity freed-up estimate"
    decision_gate: "Advance only when at least one backlog item is killed."
  - name: "Positioning diff log"
    intent: "Keep a record of how positioning evolves."
    tasks:
      - "Write a one-paragraph diff vs last month"
      - "Tag the strongest competitor and why"
      - "Set reminder for next monthly scan"
    methodologies:
      - slug: topical-authority
        path: solo/marketing/seo-manager/topical-authority
        required: true
        tier_gate: solo
    outputs:
      - "Positioning diff entry"
      - "Strongest-competitor note"
      - "Next-scan reminder"
    decision_gate: "Cycle closes when the diff log entry is dated and committed."
  - name: "Brand-storytelling refresh"
    intent: "Keep the one-liner sharper than competitors."
    tasks:
      - "Re-write your one-liner once per quarter"
      - "Test it against the top competitors claim"
      - "Roll the winner into landing + bios"
    methodologies:
      - slug: backlog-management
        path: solo/product/product-manager/backlog-management
        required: true
        tier_gate: solo
    outputs:
      - "New one-liner"
      - "A/B reasoning"
      - "Rollout note"
    decision_gate: "Advance only when one-liner survives the outsider test."
  - name: "Topical-authority signal"
    intent: "Spot SEO gaps the competitors leave."
    tasks:
      - "Pull the gap keywords competitors rank for that you do not"
      - "Pick one cluster to attack next month"
      - "Queue 1 content brief"
    methodologies:
      - slug: market-researcher
        path: solo/research/market-researcher
        required: true
        tier_gate: solo
    outputs:
      - "Keyword gap list"
      - "Chosen cluster"
      - "Content brief"
    decision_gate: "Cycle closes when one content brief is filed."

token_budget_estimate: 12000

cli_invocations:
  human:  "faion get-content monthly-competitor-landscape-scan --format md"
  agent:  "faion get-content monthly-competitor-landscape-scan --format context"
  json:   "faion get-content monthly-competitor-landscape-scan --format json"

changelog:
  - version: "1.0.0"
    date: 2026-05-20
    note: "Initial v2 draft generated from F-059..063 backlog"
