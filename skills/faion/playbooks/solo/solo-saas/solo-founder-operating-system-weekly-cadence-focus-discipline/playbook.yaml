slug: solo-founder-operating-system-weekly-cadence-focus-discipline
title: "Solo founder operating system (weekly cadence + focus discipline)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 104c0e3ba85c31c2

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P1]

intent: |
  An honest operating rhythm for a one-person SaaS: which day for shipping, which for marketing, which for inbox, plus the kill-switch for context-switching that destroys solo productivity.

scope: |
  An honest operating rhythm for a one-person SaaS: which day for shipping, which for marketing, which for inbox, plus the kill-switch for context-switching that destroys solo productivity.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Pick weekly themes"
    intent: "Assign each weekday a single theme."
    tasks:
      - "Cluster work into themes (ship / market / inbox / admin)"
      - "Assign one theme per weekday"
      - "Reserve at least one deep-work block per ship day"
    methodologies:
    outputs:
      - "Weekly theme grid"
      - "Daily theme labels"
      - "Deep-work calendar blocks"
    decision_gate: "Advance only when every weekday has a single dominant theme."
  - name: "Revenue-relevance filter"
    intent: "Apply the money filter to every new task."
    tasks:
      - "Define the revenue-relevance filter (yes / maybe / no)"
      - "Apply it to your current backlog"
      - "Drop or defer no items"
    methodologies:
    outputs:
      - "Filter definition"
      - "Filtered backlog"
      - "Drop log"
    decision_gate: "Advance only when filter has cut >=20% of backlog."
  - name: "Context-switch protocol"
    intent: "Stop bleeding focus between modes."
    tasks:
      - "Define the rules for switching modes (max once/day)"
      - "Set up rituals for entering/exiting each mode"
      - "Note the cost of unplanned switches"
    methodologies:
    outputs:
      - "Switch rules"
      - "Entry/exit rituals"
      - "Switch-cost log"
    decision_gate: "Advance only when rules are committed and visible."
  - name: "Tripwires + burnout signals"
    intent: "Catch burnout before it costs a month."
    tasks:
      - "Define personal burnout tripwires (sleep, mood, output)"
      - "Set weekly self-check"
      - "Pre-write the response if any tripwire fires"
    methodologies:
    outputs:
      - "Tripwire list"
      - "Self-check schedule"
      - "Response plan"
    decision_gate: "Advance only when self-check fires onto the calendar."
  - name: "Weekly review ritual"
    intent: "Close the week intentionally."
    tasks:
      - "Run the solo weekly review (shipped / cut / next)"
      - "Update runway calc + MRR pulse"
      - "Pick next weeks top-3 outcomes"
    methodologies:
    outputs:
      - "Weekly review doc"
      - "Updated runway/MRR"
      - "Top-3 next week"
    decision_gate: "Cycle closes when review is committed and next-week is primed."

