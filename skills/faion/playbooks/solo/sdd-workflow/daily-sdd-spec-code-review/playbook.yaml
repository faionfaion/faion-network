# Generated for F-064 from playbook-index.json entry #6
# =============================================================================

slug: daily-sdd-spec-code-review
title: "Daily SDD spec to vibe-code to review cycle"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: c09d833430cf8b97

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P1]

intent: |
  Empty editor at 9am → one feature slice merged to staging by EOD.

scope: |
  Solo founder ships one feature slice to staging in a single focused day: spec written, code generated against acceptance criteria, self-review pass complete, PR merged, deploy verified. Exit artifact is staging URL with feature live.

non_goals:
  - "Multi-day epics — split first, then ship daily"
  - "Major refactors — keep day's PR < 500 lines"

prerequisites:
  - "Spec or rough requirement available at start of day"
  - "CI pipeline configured (cd-basics complete)"

success_criteria:
  - "1-page spec written with explicit acceptance criteria"
  - "Tests written or generated against acceptance criteria"
  - "Self-review checklist completed"
  - "PR merged to staging with feature flag"
  - "Staging smoke pass within 1h of merge"

stages:
  - name: "Spec"
    intent: "Write what 'done' looks like before any code is generated."
    tasks:
      - "Write 1-paragraph intent"
      - "List acceptance criteria"
      - "Define non-goals"
    methodologies:
      - slug: spec-requirements
        path: solo/sdd/sdd-planning/spec-requirements
        required: true
        tier_gate: solo
      - slug: writing-specifications
        path: solo/sdd/sdd/writing-specifications
        required: true
        tier_gate: solo
      - slug: impl-plan-100k-rule
        path: solo/sdd/sdd-planning/impl-plan-100k-rule
        required: true
        tier_gate: solo
      - slug: impl-plan-task-format
        path: solo/sdd/sdd-planning/impl-plan-task-format
        required: true
        tier_gate: solo
    outputs:
      - "spec.md ≤1 page"
    decision_gate: |
      Advance when acceptance criteria are atomic + checkable. Refuse to code with fuzzy spec.
  - name: "Generate"
    intent: "AI implements against the spec; founder steers, not types."
    tasks:
      - "Pass spec + repo context to AI"
      - "Generate implementation"
      - "Generate tests against acceptance criteria"
    methodologies:
      - slug: api-first-development
        path: solo/sdd/sdd/api-first-development
        required: true
        tier_gate: solo
      - slug: tdd-workflow
        path: free/dev/software-developer/tdd-workflow
        required: true
        tier_gate: free
      - slug: error-handling
        path: free/dev/software-developer/error-handling
        required: true
        tier_gate: free
    outputs:
      - "Implementation diff"
      - "Test files"
    decision_gate: |
      Advance when tests pass locally. Stay if tests fail or diff > 500 lines.
  - name: "Review"
    intent: "Self-review like a stranger would."
    tasks:
      - "Run self-review checklist"
      - "Read every line once"
      - "Run linter + typecheck"
    methodologies:
      - slug: code-review
        path: free/dev/code-quality/code-review
        required: true
        tier_gate: free
      - slug: code-review-basics
        path: free/dev/code-quality/code-review-basics
        required: true
        tier_gate: free
      - slug: code-review-process
        path: free/dev/code-quality/code-review-process
        required: true
        tier_gate: free
      - slug: code-review-cycle
        path: solo/sdd/sdd/code-review-cycle
        required: true
        tier_gate: solo
      - slug: unit-testing
        path: free/dev/testing-developer/unit-testing
        required: true
        tier_gate: free
    outputs:
      - "Review notes"
    decision_gate: |
      Advance when checklist passes. If 3+ items fail, return to Generate.
  - name: "Ship"
    intent: "Merge with flag, deploy, verify on staging."
    tasks:
      - "Merge PR"
      - "Deploy via cd-basics pipeline"
      - "Smoke-test on staging URL"
    methodologies:
      - slug: cd-basics
        path: solo/dev/automation-tooling/cd-basics
        required: true
        tier_gate: solo
      - slug: quality-gates-confidence
        path: solo/sdd/sdd/quality-gates-confidence
        required: true
        tier_gate: solo
    outputs:
      - "Staging URL with feature live"
    decision_gate: |
      Required output: feature works on staging URL. If smoke fails, hot-rollback flag.

common_pitfalls:
  - "Generating code before the spec is acceptance-criteria-clean — produces 90% of the wrong thing"
  - "Skipping self-review because 'tests pass' — tests don't catch design drift"

quality_checklist:
  - "Is the spec the agent generated tests against the same spec a human would test against?"
  - "Did I read every line of generated code, or did I just trust the diff?"

related_playbooks:
  - ai-pair-coding-loop-solo
  - deploy-day-staging-to-prod

token_budget_estimate: 11000
cli_invocations:
  human:  "faion get-content daily-sdd-spec-code-review --format md"
  agent:  "faion get-content daily-sdd-spec-code-review --format context"
  json:   "faion get-content daily-sdd-spec-code-review --format json"

changelog:
  - version: "0.1.0"
    date: 2026-05-20
    note: "Initial draft for F-064 P1 solo SaaS builder persona"

