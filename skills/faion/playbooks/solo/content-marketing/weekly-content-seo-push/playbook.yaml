slug: weekly-content-seo-push
title: "Weekly content and SEO atomic push"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 38a3350faa3a7940

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P1]

intent: |
  Empty content slot → 1 indexed asset live each week (blog / changelog / doc).

scope: |
  Solo founder ships one indexed asset per week (blog post, changelog, doc page): topic chosen against keyword + ICP, draft generated with AI then human-edited, on-page SEO complete, shared on 2 channels. Exit artifact is indexable URL + 2 shares.

non_goals:
  - "Long-tail SEO campaigns — separate quarterly"
  - "Paid distribution — organic only here"

prerequisites:
  - "Blog/docs infrastructure live (sitemap, indexable)"
  - "Keyword + ICP shortlist exists"

success_criteria:
  - "1 asset published per week with on-page SEO complete"
  - "Asset shared on 2 channels (Reddit / IH / HN / X / LinkedIn)"
  - "Asset indexed within 7 days (Search Console)"
  - "Internal link added from 1 existing page"

stages:
  - name: "Pick topic"
    intent: "Pick a topic that hits keyword + ICP at once."
    tasks:
      - "Scan keyword shortlist"
      - "Pick topic with monthly volume + low difficulty"
      - "Tag ICP segment"
    methodologies:
      - slug: growth-seo-fundamentals
        path: solo/marketing/seo-manager/growth-seo-fundamentals
        required: true
        tier_gate: solo
      - slug: seo-basics
        path: solo/marketing/seo-manager/seo-basics
        required: true
        tier_gate: solo
      - slug: seo-techniques
        path: solo/marketing/seo-manager/seo-techniques
        required: true
        tier_gate: solo
      - slug: topical-authority
        path: solo/marketing/seo-manager/topical-authority
        required: true
        tier_gate: solo
    outputs:
      - "Topic brief"
    decision_gate: |
      Advance when topic has keyword + ICP fit. Refuse generic 'just write something'.
  - name: "Draft"
    intent: "AI draft + human edit. Voice matters more than length."
    tasks:
      - "Generate AI draft from brief"
      - "Human-edit for voice"
      - "Add concrete examples + screenshots"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
    outputs:
      - "Draft v1"
    decision_gate: |
      Advance when voice reads as human + concrete. Stay if it sounds AI-generic.
  - name: "Optimise"
    intent: "On-page SEO + zero-click adaptation."
    tasks:
      - "Title + meta + H1 + URL slug"
      - "Internal links + structured data"
      - "Adapt for zero-click answer extraction"
    methodologies:
      - slug: zero-click-search-adaptation
        path: solo/marketing/seo-manager/zero-click-search-adaptation
        required: true
        tier_gate: solo
      - slug: search-everywhere-optimization
        path: solo/marketing/content-marketer/search-everywhere-optimization
        required: true
        tier_gate: solo
    outputs:
      - "Published asset"
    decision_gate: |
      Advance when on-page checklist complete. Refuse to publish without title/meta.
  - name: "Share"
    intent: "Distribute on 2 channels matching topic."
    tasks:
      - "Pick 2 channels matching ICP"
      - "Post with native angle (not link-drop)"
      - "Engage with first 5 replies"
    methodologies:
      - slug: growth-hacker-news-launch
        path: solo/marketing/gtm-strategist/growth-hacker-news-launch
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
    outputs:
      - "2 channel posts"
    decision_gate: |
      Required output: 2 distribution posts. Without distribution, indexing is the only chance.

common_pitfalls:
  - "Publishing without distribution — indexing alone doesn't move needle solo-scale"
  - "AI-generic drafts — readers detect tone instantly, refuse to share"

quality_checklist:
  - "Could I share this with my ICP without cringing at AI-tells?"
  - "Did the post get indexed within 7 days, or is something broken in the sitemap?"

related_playbooks:
  - monthly-competitor-scan
  - sunday-roadmap-ritual

token_budget_estimate: 9000
cli_invocations:
  human:  "faion get-content weekly-content-seo-push --format md"
  agent:  "faion get-content weekly-content-seo-push --format context"
  json:   "faion get-content weekly-content-seo-push --format json"

changelog:
  - version: "0.1.0"
