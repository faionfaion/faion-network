slug: indie-hackers-build-update-post
title: "Indie Hackers build-update post"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: a3c3b580b0776592

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P2]

intent: |
  Two weeks of work → long-form IH post that drives qualified clicks back.

scope: |
  Bi-weekly long-form post on Indie Hackers: progress, numbers, lessons, and an explicit ask — driving qualified clicks back to the product, newsletter, or audience handle.

non_goals:
  - "Cross-posting without re-write — IH is a unique surface"
  - "Promo-only posts without a story"
  - "Daily IH posting — bi-weekly is the cadence"

prerequisites:
  - "Active IH account with bio aligned to current product"
  - "Two weeks of build progress to talk about"

success_criteria:
  - "Posted on Indie Hackers"
  - "Includes numbers, lessons, and a single ask"
  - "≥10 comments engaged with"
  - "Documented clicks to landing or newsletter"

stages:
  - name: "Mine"
    intent: "Pick the most genuine story from the last 2 weeks."
    tasks:
      - "List the 5 most consequential moments"
      - "Pick the one with a clear lesson"
      - "Note numbers that prove the story"
    methodologies:
      - slug: business-storytelling
        path: solo/comms/communicator/business-storytelling
        required: true
        tier_gate: solo
      - slug: storytelling
        path: solo/comms/communicator/storytelling
        required: true
        tier_gate: solo
    outputs:
      - "Selected story with numbers"
    decision_gate: |
      Advance once the lesson is one sentence.
  - name: "Draft"
    intent: "Long-form post that mixes story, numbers, and ask."
    tasks:
      - "Open with a confession or contrarian hook"
      - "Mid-section: chronological story with numbers"
      - "Close with one specific ask"
    methodologies:
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
    outputs:
      - "Final draft"
    decision_gate: |
      Advance only once another indie hacker would skim and react.
  - name: "Ship"
    intent: "Post and engage to convert comments to clicks."
    tasks:
      - "Post during peak weekday hours"
      - "Reply to every comment in the first 12 hours"
      - "Track click-throughs to landing or newsletter"
    methodologies:
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: growth-community-building
        path: solo/marketing/smm-manager/growth-community-building
        required: true
        tier_gate: solo
    outputs:
      - "Live post"
      - "Click-through log"
    decision_gate: |
      Done once comments are handled and clicks logged.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

