# =============================================================================
# Build-in-public audience growth: 0 to 5K followers over 6 months
# Persona: P2 Indie Hacker — F-064
# =============================================================================

slug: build-in-public-audience-0-to-5k
title: "Build-in-public audience growth: 0 to 5K followers over 6 months"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 510464b66760ee2f

tier_min: solo
complexity: deep
context: [solo]
persona_hints: [P2]

intent: |
  Zero audience → 5K followers on X plus 1K newsletter subscribers in 26 weeks.

scope: |
  Solo indie hacker compounds an owned distribution channel — Twitter/X plus a newsletter — from zero to a launch-ready 5K/1K base over six months by running a weekly build-in-public cadence with measurable feedback loops.

non_goals:
  - "Paid ads, influencer buys, or growth hacking"
  - "Multi-channel breadth (TikTok, YouTube) — owned-text only"
  - "Selling specific products — audience layer, not funnel layer"

prerequisites:
  - "A handle on X that the founder controls full-time"
  - "Newsletter platform account (Substack or Beehiiv) ready"

success_criteria:
  - "Working build-in-public cadence (≥3 posts/week)"
  - "Newsletter list at ≥1000 subscribers with ≥35% open rate"
  - "Twitter/X followers ≥5000 from organic only"
  - "Documented swipe file with ≥30 hooks"
  - "Six monthly retrospectives with quantitative deltas"

stages:
  - name: "Positioning"
    intent: "One-sentence persona-niche-promise that every post will reinforce."
    tasks:
      - "Write a positioning sentence: 'I help <persona> do <job> via <method>'"
      - "Map the 3 core themes the account will own"
      - "Set up bio, pinned tweet, and newsletter homepage to match"
    methodologies:
      - slug: value-proposition-design
        path: solo/research/researcher/value-proposition-design
        required: true
        tier_gate: solo
      - slug: growth-social-media-strategy
        path: solo/marketing/smm-manager/growth-social-media-strategy
        required: true
        tier_gate: solo
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
    outputs:
      - "Positioning statement"
      - "Updated profile + newsletter landing"
    decision_gate: |
      Advance when a stranger can describe what the account is about after one scroll.
  - name: "Cadence"
    intent: "A weekly content engine that survives travel and low energy."
    tasks:
      - "Define daily tweet slots (build / lesson / signal / banter)"
      - "Schedule one weekly newsletter draft + send cadence"
      - "Set up a hook bank fed by replies and DMs"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
      - slug: content-calendar
        path: solo/content-marketing/content-calendar
        required: true
        tier_gate: solo
    outputs:
      - "Weekly content calendar template"
      - "Active hook bank (≥20 entries)"
    decision_gate: |
      Advance if cadence survives 2 consecutive weeks unaided.
  - name: "Newsletter Funnel"
    intent: "Twitter readers convert to newsletter subscribers at a measurable rate."
    tasks:
      - "Build a 1-page newsletter landing with a real promise"
      - "Pin a tweet that pitches the newsletter"
      - "Send issue #1, then every Sunday after"
    methodologies:
      - slug: growth-newsletter-growth
        path: solo/marketing/content-marketer/growth-newsletter-growth
        required: true
        tier_gate: solo
      - slug: growth-email-marketing
        path: solo/marketing/content-marketer/growth-email-marketing
        required: true
        tier_gate: solo
      - slug: newsletter-setup
        path: solo/content-marketing/newsletter-setup
        required: true
        tier_gate: solo
    outputs:
      - "Live newsletter landing"
      - "Issue cadence in flight"
    decision_gate: |
      Advance if signup rate ≥3% of weekly profile visits.
  - name: "Community"
    intent: "From broadcast to conversation: replies and DMs do the compounding."
    tasks:
      - "Set a daily 30-min reply window on 10 in-niche threads"
      - "Run a monthly 'ask me anything' to surface objections"
      - "Activate active-listening on every newsletter reply"
    methodologies:
      - slug: active-listening
        path: solo/comms/communicator/active-listening
        required: true
        tier_gate: solo
      - slug: growth-community-building
        path: solo/marketing/smm-manager/growth-community-building
        required: true
        tier_gate: solo
      - slug: feedback-management
        path: solo/product/product-operations/feedback-management
        required: true
        tier_gate: solo
    outputs:
      - "Reply log"
      - "Objection bank"
    decision_gate: |
      Advance if at least 5 inbound DMs/week are starting from your replies.
  - name: "Iteration"
    intent: "Monthly OKR review tightens the cadence and themes."
    tasks:
      - "Pull follower/subscriber deltas every month"
      - "Cut the 3 lowest-engagement post types"
      - "Reset OKRs for the next 30 days"
    methodologies:
      - slug: okr-setting
        path: solo/product/product-planning/okr-setting
        required: true
        tier_gate: solo
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
      - slug: automation
        path: solo/automation
        required: true
        tier_gate: solo
    outputs:
      - "Monthly retrospective"
      - "Updated cadence rules"
    decision_gate: |
      Advance if monthly deltas trend positive 3 months in a row.
      Re-position if growth flatlines for 2 consecutive months.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

