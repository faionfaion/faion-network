slug: weekly-positioning-post
title: "Weekly positioning post (LinkedIn / Twitter)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 0c32d5470d01d4d3

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P3]

intent: |
  One post per week that reinforces specialization niche. Done = post published, engagement triaged, follow-up DMs handled within 48h.

scope: |
  One post per week that reinforces specialization niche. Done = post published, engagement triaged, follow-up DMs handled within 48h.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Idea stage complete: Idea brief"
  - "Write + publish stage complete: Published post"
  - "Engage stage complete: Engagement log"

stages:
  - name: "Idea"
    intent: "Pull one niche-anchored idea from this week's work."
    tasks:
      - "Skim weekly notes for tension/insight/contrarian take"
      - "Pick one angle tied to your niche"
      - "Draft headline + 3-line hook"
    methodologies:
      - slug: storytelling
        path: solo/comms/communicator/storytelling
        required: true
        tier_gate: solo
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: solo-niche-narrative-framework
        path: solo/_gap/solo-niche-narrative-framework
        required: true
        tier_gate: solo
    outputs:
      - "Idea brief"
    decision_gate: |
      Advance only when angle is niche-aligned and specific.
  - name: "Write + publish"
    intent: "Ship a post by Wed/Thu morning local time."
    tasks:
      - "Write post (≤300 words for LinkedIn / 5-9 tweets for X)"
      - "Add visual or formatted structure"
      - "Publish at peak hour for your audience"
    methodologies:
      - slug: growth-linkedin-strategy
        path: solo/marketing/smm-manager/growth-linkedin-strategy
        required: true
        tier_gate: solo
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
      - slug: freelancer-positioning-content-calendar
        path: solo/_gap/freelancer-positioning-content-calendar
        required: true
        tier_gate: solo
    outputs:
      - "Published post"
    decision_gate: |
      Cycle requires publication, not just drafting.
  - name: "Engage"
    intent: "Triage engagement; convert DMs into discovery calls."
    tasks:
      - "Reply to every meaningful comment within 24h"
      - "Triage DMs: book call / disqualify / refer"
      - "Log noteworthy engagements in CRM"
    methodologies:
      - slug: growth-community-building
        path: solo/marketing/smm-manager/growth-community-building
        required: true
        tier_gate: solo
    outputs:
      - "Engagement log"
      - "Booked calls from DMs"
    decision_gate: |
      Cycle closes only when DMs are triaged.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 9000
cli_invocations:
