# =============================================================================
# Weekly newsletter ideation and draft
# Persona: P2 Indie Hacker — F-064
# =============================================================================

slug: weekly-newsletter-ideation-draft
title: "Weekly newsletter ideation and draft"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 8b66570cfb861a36

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P2]

intent: |
  Empty week → one newsletter issue scheduled in Substack or Beehiiv by Friday.

scope: |
  One newsletter issue drafted by Friday: ideated, outlined, written, and scheduled in Substack or Beehiiv for the Sunday send, keeping the cadence unbroken.

non_goals:
  - "Multi-issue campaigns — single weekly issue"
  - "Newsletter platform migration — pick once, stick"
  - "Cross-platform repurposing — fanout is a separate playbook"

prerequisites:
  - "Active newsletter on Substack or Beehiiv"
  - "A topic backlog with at least 5 candidate ideas"

success_criteria:
  - "Issue drafted, outlined, and queued for Sunday send"
  - "Subject line A/B variants prepared if platform supports"
  - "Backlog rotated — top idea replaced with a fresh one"

stages:
  - name: "Ideate"
    intent: "Pick the issue topic with strongest reader signal."
    tasks:
      - "Review last 7 days of reader replies and DMs"
      - "Cross-reference top tweets and audience asks"
      - "Pick the one topic with the most pull"
    methodologies:
      - slug: business-storytelling
        path: solo/comms/communicator/business-storytelling
        required: true
        tier_gate: solo
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
    outputs:
      - "Selected topic with rationale"
    decision_gate: |
      Advance once a single topic is picked with reader-signal proof.
  - name: "Outline"
    intent: "A 3-section outline ready to fill."
    tasks:
      - "Open with a hook tied to recent audience signal"
      - "Mid-section: insight or case"
      - "Close: clear single CTA"
    methodologies:
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: growth-email-marketing
        path: solo/marketing/content-marketer/growth-email-marketing
        required: true
        tier_gate: solo
    outputs:
      - "3-bullet outline"
    decision_gate: |
      Advance only when outline maps to one CTA, not two.
  - name: "Draft"
    intent: "Full draft written in one sitting."
    tasks:
      - "Fill outline in a single 60-min focus block"
      - "Add screenshots or proof artefacts"
      - "Edit ruthlessly for length and skim-ability"
    methodologies:
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: growth-newsletter-growth
        path: solo/marketing/content-marketer/growth-newsletter-growth
        required: true
        tier_gate: solo
    outputs:
      - "Final draft in ESP"
    decision_gate: |
      Advance when the draft survives a single re-read with no major rewrite.
  - name: "Schedule"
    intent: "Queued for Sunday with subject lines locked."
    tasks:
      - "Pick subject line (A/B if supported)"
      - "Schedule send for Sunday morning local"
      - "Preview on mobile and desktop"
    methodologies:
      - slug: growth-email-marketing
        path: solo/marketing/content-marketer/growth-email-marketing
        required: true
        tier_gate: solo
      - slug: growth-newsletter-growth
        path: solo/marketing/content-marketer/growth-newsletter-growth
        required: true
        tier_gate: solo
    outputs:
      - "Scheduled send confirmation"
    decision_gate: |
      Done when ESP shows the issue queued.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

related_playbooks:
  - solo-idea-to-validated-mvp
token_budget_estimate: 18000
cli_invocations:
  human:  "faion get-content weekly-newsletter-ideation-draft --format md"
  agent:  "faion get-content weekly-newsletter-ideation-draft --format context"
  json:   "faion get-content weekly-newsletter-ideation-draft --format json"

changelog:
