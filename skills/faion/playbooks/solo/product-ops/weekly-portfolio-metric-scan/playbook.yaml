# =============================================================================
# Weekly portfolio metric scan
# Persona: P2 Indie Hacker — F-064
# =============================================================================

slug: weekly-portfolio-metric-scan
title: "Weekly portfolio metric scan"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: dfa1eb68657977f3

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P2]

intent: |
  Multi-product noise → one product that earns the next week's attention.

scope: |
  20-minute check across all live side-projects: which moved on MRR, signups, or traffic — pick the one product that earns next week's attention, and tag the rest for maintenance only.

non_goals:
  - "Deep analytics — quick scan only"
  - "Product death decisions — that lives in portfolio rotation"
  - "Multi-week planning — single-week scope"

prerequisites:
  - "≥2 live products in the portfolio"
  - "Minimal metrics dashboard per product"

success_criteria:
  - "One winner picked for next-week focus"
  - "Other products tagged 'maintenance only'"
  - "Top metric movements documented"

stages:
  - name: "Collect"
    intent: "All product metrics in one place in under 10 minutes."
    tasks:
      - "Pull MRR, signups, and traffic for each product"
      - "Compare against the previous 4-week median"
      - "Flag any anomaly worth investigating"
    methodologies:
      - slug: ops-dashboard-setup
        path: solo/marketing/growth-marketer/ops-dashboard-setup
        required: true
        tier_gate: solo
      - slug: solo-metrics-tracking
        path: solo/product-ops/solo-metrics-tracking
        required: true
        tier_gate: solo
    outputs:
      - "Single comparison table"
    decision_gate: |
      Advance once every product has fresh numbers.
  - name: "Triage"
    intent: "RICE the products and pick a winner."
    tasks:
      - "Score each product against a 4-factor RICE"
      - "Pick the one with the strongest delta"
      - "Tag the rest as 'maintenance only' for the week"
    methodologies:
      - slug: feature-prioritization-rice
        path: solo/product/product-manager/feature-prioritization-rice
        required: true
        tier_gate: solo
      - slug: rice-ice-prioritization
        path: solo/product-ops/rice-ice-prioritization
        required: true
        tier_gate: solo
    outputs:
      - "Weekly RICE scorecard"
      - "Winner + maintenance list"
    decision_gate: |
      Advance only when a single winner is documented.
  - name: "Plan"
    intent: "Set the next week with one product in the foreground."
    tasks:
      - "Define 3 outcomes for the winner"
      - "Schedule maintenance windows for the rest"
      - "Block the calendar accordingly"
    methodologies:
      - slug: weekly-review-solo
        path: solo/product-planning/weekly-review-solo
        required: true
        tier_gate: solo
    outputs:
      - "Next-week plan"
    decision_gate: |
      Done once outcomes are in the calendar.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

related_playbooks:
  - solo-idea-to-validated-mvp
token_budget_estimate: 16500
cli_invocations:
  human:  "faion get-content weekly-portfolio-metric-scan --format md"
  agent:  "faion get-content weekly-portfolio-metric-scan --format context"
  json:   "faion get-content weekly-portfolio-metric-scan --format json"

changelog:
  - version: "0.1.0"
    date: 2026-05-20
    note: "Initial draft from brainstorm-2026-05-17, persona P2 (indie hacker)"

gaps:
  - methodology_slug: portfolio-triage-indie
    expected_tier: solo
    blocks_stage: 2
    note: "Triage stage needs an explicit portfolio rubric"
  - methodology_slug: kill-or-keep-criteria
    expected_tier: solo
    blocks_stage: 3
    note: "Plan stage needs explicit kill-or-keep thresholds"
