slug: friday-bug-bash-triage
title: "Friday bug-bash and tech-debt triage hour"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 004f4490804ab650

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P1]

intent: |
  Open bug tracker + sprawling debt list → grouped, severity-tagged, top-3 resolved or queued.

scope: |
  60-minute Friday ritual: Sentry / GitHub issues grouped, severity-tagged, top-3 fixed or queued, debt list updated with one decision per item (fix now / accept / kill). Exit artifact is clean tracker view + updated debt log.

non_goals:
  - "Major refactors — debt items get queued, not executed"
  - "Customer-facing comms — separate inbox-sweep playbook"

prerequisites:
  - "Issue tracker exists (GitHub, Linear, or similar)"
  - "Sentry/logging in place (monitoring-logging complete)"

success_criteria:
  - "All open issues have severity tag"
  - "Top 3 issues either fixed or scheduled with owner"
  - "Debt log: every item has decision (fix-now / accept / kill)"
  - "Ritual completed in ≤60 minutes"

stages:
  - name: "Group"
    intent: "Cluster bugs by theme; surface duplicates."
    tasks:
      - "Pull open issues + Sentry events"
      - "Tag by theme + severity"
      - "Merge duplicates"
    methodologies:
      - slug: logging-patterns
        path: solo/dev/automation-tooling/logging-patterns
        required: true
        tier_gate: solo
      - slug: feedback-management
        path: solo/product/product-operations/feedback-management
        required: true
        tier_gate: solo
      - slug: backlog-management
        path: solo/product/product-operations/backlog-management
        required: true
        tier_gate: solo
    outputs:
      - "Grouped issue list"
    decision_gate: |
      Advance when every issue has theme + severity. Refuse to skip — solo founders accumulate noise fast.
  - name: "Decide"
    intent: "One decision per item: fix now, accept, or kill."
    tasks:
      - "Score top items against impact + effort"
      - "Write decision per item"
      - "Update debt log"
    methodologies:
      - slug: tech-debt-basics
        path: free/dev/code-quality/tech-debt-basics
        required: true
        tier_gate: free
      - slug: tech-debt-management
        path: solo/dev/code-quality/tech-debt-management
        required: true
        tier_gate: solo
      - slug: technical-debt
        path: solo/dev/software-developer/technical-debt
        required: true
        tier_gate: solo
      - slug: technical-debt-management
        path: solo/product/product-operations/technical-debt-management
        required: true
        tier_gate: solo
      - slug: refactoring-patterns
        path: free/dev/code-quality/refactoring-patterns
        required: true
        tier_gate: free
      - slug: architecture-decision-records
        path: solo/sdd/sdd/architecture-decision-records
        required: true
        tier_gate: solo
    outputs:
      - "Debt log with decisions"
    decision_gate: |
      Advance when every top-10 item has a decision. No 'maybe later'.
  - name: "Ship"
    intent: "Fix the top-3 chosen items inside the hour."
    tasks:
      - "Pick 3 with highest impact-per-effort"
      - "Ship with feature flag if risky"
      - "Push to staging"
    methodologies:
      - slug: feature-flags
        path: solo/dev/software-developer/feature-flags
        required: true
        tier_gate: solo
    outputs:
      - "3 fixes shipped"
    decision_gate: |
      Required output: 3 PRs merged. Defer remainder to next week's bash.

common_pitfalls:
  - "Trying to fix all of them — guarantees nothing ships"
  - "Leaving items without decision — they rot in the backlog"

quality_checklist:
  - "Did every item I touched get a decision, or did I leave some 'open'?"
  - "Are the 3 I fixed actually high-impact, or just easy?"

related_playbooks:
  - sunday-roadmap-ritual
  - deploy-day-staging-to-prod

token_budget_estimate: 8000
cli_invocations:
  human:  "faion get-content friday-bug-bash-triage --format md"
  agent:  "faion get-content friday-bug-bash-triage --format context"
  json:   "faion get-content friday-bug-bash-triage --format json"

changelog:
