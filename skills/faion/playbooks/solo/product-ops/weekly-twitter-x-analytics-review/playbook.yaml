# =============================================================================
# Weekly Twitter / X analytics review
# Persona: P2 Indie Hacker — F-064
# =============================================================================

slug: weekly-twitter-x-analytics-review
title: "Weekly Twitter / X analytics review"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: b96b0bf61373e176

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P2]

intent: |
  Last 7 days of X data → next-week content slate rooted in evidence.

scope: |
  30-minute Sunday review: identify which three posts moved followers, clicks, or replies and feed the insights into next week's content slate so growth compounds.

non_goals:
  - "Cross-platform analytics"
  - "Vanity-metric reporting without action"
  - "Long custom dashboards — built-in tools only"

prerequisites:
  - "Active X account with at least 7 days of posts"
  - "Access to native X analytics OR a connected analytics tool"

success_criteria:
  - "Top-3 posts identified by goal-aligned metric"
  - "Bottom-3 posts flagged for cause analysis"
  - "Concrete content brief for the upcoming week"

stages:
  - name: "Pull"
    intent: "Raw 7-day metrics in one place."
    tasks:
      - "Export native analytics CSV or screenshot"
      - "Capture impressions, clicks, follows by post"
      - "Tag posts by hypothesis bucket (build, lesson, signal)"
    methodologies:
      - slug: ops-dashboard-setup
        path: solo/marketing/growth-marketer/ops-dashboard-setup
        required: true
        tier_gate: solo
      - slug: plausible-analytics
        path: solo/marketing/growth-marketer/plausible-analytics
        required: true
        tier_gate: solo
    outputs:
      - "7-day metrics table"
    decision_gate: |
      Advance once each post has a numeric line entry.
  - name: "Rank"
    intent: "Top-3 and bottom-3 named with cause-of-success hypotheses."
    tasks:
      - "Sort by goal-aligned metric (followers OR clicks OR replies)"
      - "Pick top-3 and bottom-3"
      - "Write a 1-line cause-of-success or failure"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
      - slug: growth-social-media-strategy
        path: solo/marketing/smm-manager/growth-social-media-strategy
        required: true
        tier_gate: solo
    outputs:
      - "Top-3 and bottom-3 list with notes"
    decision_gate: |
      Advance only when each highlighted post has a written hypothesis.
  - name: "Brief"
    intent: "A simple content brief for the next 7 days."
    tasks:
      - "Pick 3 angles to remix top performers"
      - "Cut formats that fall in bottom-3 two weeks in a row"
      - "Add updated hooks to the swipe file"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: growth-social-media-strategy
        path: solo/marketing/smm-manager/growth-social-media-strategy
        required: true
        tier_gate: solo
    outputs:
      - "Content brief for the next 7 days"
    decision_gate: |
      Done when next-week content is scheduled or queued.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

related_playbooks:
  - solo-idea-to-validated-mvp
token_budget_estimate: 16500
cli_invocations:
  human:  "faion get-content weekly-twitter-x-analytics-review --format md"
  agent:  "faion get-content weekly-twitter-x-analytics-review --format context"
  json:   "faion get-content weekly-twitter-x-analytics-review --format json"

changelog:
  - version: "0.1.0"
    date: 2026-05-20
    note: "Initial draft from brainstorm-2026-05-17, persona P2 (indie hacker)"

gaps:
