slug: travel-day-low-energy-work-mode
title: "Travel-day low-energy work mode"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: f7943c2c2a34b8e6

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P2]

intent: |
  Travel-day reality → keep momentum without coding, via content, comms, and planning only.

scope: |
  Digital-nomad reality: on a flight, bus, or unstable-wifi day, keep the indie business moving without coding or shipping — content, comms, planning, and backlog hygiene only, using a pre-defined offline toolkit.

non_goals:
  - "Shipping product code from unstable wifi"
  - "Live customer demos or calls"
  - "Deep architecture work — energy mismatch"

prerequisites:
  - "Laptop with offline tools (notes, drafts, planner)"
  - "Pre-synced backlog and content calendar"

success_criteria:
  - "≥1 productive output (draft, plan, backlog scrub)"
  - "No customer downtime introduced"
  - "End-of-day note captures what shipped vs slipped"

stages:
  - name: "Setup"
    intent: "Offline toolkit ready before travel."
    tasks:
      - "Sync notes, drafts, and roadmap offline"
      - "Drain credentials onto offline manager"
      - "Pre-cache reference docs"
    methodologies:
      - slug: tech-setup
        path: free/tech-setup
        required: true
        tier_gate: free
      - slug: env-management-secrets
        path: solo/automation/env-management-secrets
        required: true
        tier_gate: solo
    outputs:
      - "Offline toolkit ready"
    decision_gate: |
      Advance only when toolkit boots without wifi.
  - name: "Content / Comms"
    intent: "Low-bandwidth, high-yield work during the day."
    tasks:
      - "Draft next-week content offline"
      - "Reply to email and DMs in batches when wifi opens"
      - "Capture customer feedback into local notes"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: feedback
        path: solo/comms/communicator/feedback
        required: true
        tier_gate: solo
    outputs:
      - "Draft content saved"
      - "Comms cleared"
    decision_gate: |
      Advance once one output is shippable when wifi returns.
  - name: "Plan"
    intent: "Use travel time to clean and triage the backlog."
    tasks:
      - "Run backlog hygiene pass"
      - "Re-score top items with RICE / ICE"
      - "Note ideas captured during travel"
    methodologies:
      - slug: backlog-hygiene
        path: solo/product-ops/backlog-hygiene
        required: true
        tier_gate: solo
      - slug: rice-ice-prioritization
        path: solo/product-ops/rice-ice-prioritization
        required: true
        tier_gate: solo
      - slug: ops-automation-workflow
        path: solo/marketing/growth-marketer/ops-automation-workflow
        required: true
        tier_gate: solo
    outputs:
      - "Updated backlog"
      - "Captured idea log"
    decision_gate: |
      Done once backlog is committed and idea log saved.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

related_playbooks:
  - solo-idea-to-validated-mvp
token_budget_estimate: 16500
cli_invocations:
  human:  "faion get-content travel-day-low-energy-work-mode --format md"
  agent:  "faion get-content travel-day-low-energy-work-mode --format context"
  json:   "faion get-content travel-day-low-energy-work-mode --format json"

changelog:
