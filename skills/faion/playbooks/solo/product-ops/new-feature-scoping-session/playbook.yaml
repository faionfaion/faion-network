slug: new-feature-scoping-session
title: "New feature scoping session (per-feature, on demand)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 59488785994ccb04

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P1]

intent: |
  Raw feature request → ready-to-ship slice with validated signal + spec + flag plan + success metric.

scope: |
  Per-feature on-demand session: signal validated, MVP cut to bone, spec written, flag plan decided, success metric defined — all before any code is generated. Exit artifact is build-ready spec.md with rollout + success criteria.

non_goals:
  - "Full discovery — that's done upstream in continuous-discovery"
  - "Implementation — handed off to daily SDD cycle"

prerequisites:
  - "Feature request exists (from inbox, dashboard, or roadmap)"
  - "Existing backlog with priority context"

success_criteria:
  - "Signal validated: ≥3 customer quotes or analytics anomaly"
  - "Micro-MVP defined: smallest slice that delivers value"
  - "Spec written with acceptance criteria"
  - "Feature flag rollout plan documented"
  - "Success metric + decision date set"

stages:
  - name: "Validate signal"
    intent: "Is this real demand or a single loud voice?"
    tasks:
      - "Find ≥3 customer quotes OR analytics signal"
      - "Run mom-test on 2 prospects if unclear"
      - "Decide build/waitlist/kill"
    methodologies:
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: continuous-discovery
        path: solo/product/product-manager/continuous-discovery
        required: true
        tier_gate: solo
      - slug: market-researcher
        path: solo/research/market-researcher
        required: true
        tier_gate: solo
    outputs:
      - "Signal evidence packet"
    decision_gate: |
      Advance if signal is real. Park to waitlist if uncertain. Kill if only 1 loud voice.
  - name: "Prioritise"
    intent: "Does this beat current top-3 backlog item?"
    tasks:
      - "Score with RICE"
      - "Compare to current top-3"
      - "Decide bump/queue"
    methodologies:
      - slug: feature-prioritization-rice
        path: solo/product/product-manager/feature-prioritization-rice
        required: true
        tier_gate: solo
    outputs:
      - "RICE score + priority decision"
    decision_gate: |
      Advance when priority is decided. Refuse to scope below-cutoff items.
  - name: "Cut MVP"
    intent: "Smallest slice that delivers value."
    tasks:
      - "List all candidate sub-features"
      - "Cut to 1-feature minimum-viable slice"
      - "Write non-goals"
    methodologies:
      - slug: mvp-scoping
        path: solo/product/product-manager/mvp-scoping
        required: true
        tier_gate: solo
      - slug: micro-mvps
        path: solo/product/product-manager/micro-mvps
        required: true
        tier_gate: solo
      - slug: minimum-product-frameworks
        path: solo/product/product-planning/minimum-product-frameworks
        required: true
        tier_gate: solo
    outputs:
      - "Micro-MVP scope doc"
    decision_gate: |
      Advance when scope fits 1-3 days of solo work. Cut more if not.
  - name: "Spec"
    intent: "Write acceptance criteria + non-goals."
    tasks:
      - "Write 1-page spec"
      - "List acceptance criteria"
      - "Define non-goals explicitly"
    methodologies:
      - slug: spec-writing
        path: solo/product/product-manager/spec-writing
        required: true
        tier_gate: solo
      - slug: spec-structure
        path: solo/sdd/sdd-planning/spec-structure
        required: true
        tier_gate: solo
      - slug: writing-specifications
        path: solo/sdd/sdd/writing-specifications
        required: true
        tier_gate: solo
    outputs:
      - "spec.md"
    decision_gate: |
      Advance when criteria are atomic + checkable.
  - name: "Flag plan"
    intent: "Decide rollout: behind flag, % rollout, targets."
    tasks:
      - "Decide flag name + scope"
      - "Define rollout percentages"
      - "Set success metric + decision date"
    methodologies:
      - slug: feature-flags-rollout-targeting
        path: solo/dev/automation-tooling/feature-flags-rollout-targeting
        required: true
        tier_gate: solo
      - slug: feature-flags
        path: solo/dev/software-developer/feature-flags
        required: true
        tier_gate: solo
    outputs:
      - "Flag plan in spec"
    decision_gate: |
      Required output: spec with flag + rollout + success metric. Hand off to daily cycle.

common_pitfalls:
  - "Skipping signal validation because the request is from a paying customer — even paying customers ask for noise"
  - "Specifying without cutting first — produces 3x the scope"

quality_checklist:
  - "Could I delete 30% of the spec right now without losing the value?"
  - "Is the success metric measurable inside 2 weeks of rollout?"

related_playbooks:
  - daily-sdd-spec-code-review
  - sunday-roadmap-ritual

token_budget_estimate: 11000
cli_invocations:
  human:  "faion get-content new-feature-scoping-session --format md"
  agent:  "faion get-content new-feature-scoping-session --format context"
  json:   "faion get-content new-feature-scoping-session --format json"

changelog:
