slug: client-deliverable-redesign-for-outsource-engagement-4-weeks
title: "Client deliverable redesign for outsource engagement (4 weeks)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 6619f65e48552326

tier: solo
tier_min: solo
group: role-ux-ui-designer
persona: Outsource designer redesigning a client's existing surface in a P4 engagement
complexity: medium
context: [outsource]

summary: |
  Outsource agency picks up an existing app or marketing surface, runs targeted research, redesigns priority flows, validates, ships a vendor-friendly handoff with measurable KPIs.

intent: |
  Inherited client surface -> redesigned priority flows + validated + handoff with KPIs.

scope: |
  Outsource designer takes an existing client surface across 4 weeks. Includes targeted research, IA + heuristic cleanup, hi-fi redesign on priority flows, validation, and a handoff with KPI scoreboard. Done when client signs off and KPI scoreboard is wired for post-launch measurement.

success_criteria:
  - "Client signs off on the redesign before delivery"
  - "Priority flows validated with users or proxies"
  - "Design KPI scoreboard wired with baseline + targets"
  - "Handoff package accepted by the client's engineering team"

methodology_refs:
  - faion/knowledge/pro/ux/ui-designer/cross-platform-token-distribution
  - faion/knowledge/pro/ux/ux-ui-designer/cognitive-walkthrough
  - faion/knowledge/solo/ux/ui-designer/design-tokens-fundamentals
  - faion/knowledge/solo/ux/ui-designer/prototyping
  - faion/knowledge/solo/ux/ui-designer/tailwind-design-tokens
  - faion/knowledge/solo/ux/ui-designer/wireframing
  - faion/knowledge/solo/ux/user-researcher/feature-discovery
  - faion/knowledge/solo/ux/user-researcher/jobs-to-be-done
  - faion/knowledge/solo/ux/user-researcher/pain-point-research
  - faion/knowledge/solo/ux/user-researcher/success-metrics-definition
  - faion/knowledge/solo/ux/ux-ui-designer/competitive-analysis
  - faion/knowledge/solo/ux/ux-ui-designer/content-audit
  - faion/knowledge/solo/ux/ux-ui-designer/heuristic-evaluation
  - faion/knowledge/solo/ux/ux-ui-designer/information-architecture
  - faion/knowledge/solo/ux/ux-ui-designer/usability-testing

stages:
  - name: "Discovery intake"
    intent: "Understand the client + their constraints."
    tasks:
      - "Run a discovery questionnaire with the client"
      - "Capture brand, tech, and compliance constraints"
      - "Audit current surface for content + IA issues"
    methodologies:
      - slug: feature-discovery
        path: solo/ux/user-researcher/feature-discovery
        required: true
        tier_gate: solo
      - slug: content-audit
        path: solo/ux/ux-ui-designer/content-audit
        required: true
        tier_gate: solo
      - slug: competitive-analysis
        path: solo/ux/ux-ui-designer/competitive-analysis
        required: true
        tier_gate: solo
    outputs:
      - "Discovery brief + competitive snapshot"
    decision_gate: |
      Advance only when constraints are written and acknowledged.
  - name: "Targeted research"
    intent: "Validate the JTBD before redesigning."
    tasks:
      - "Run 5 JTBD interviews (real users or client-side proxies)"
      - "Capture top pain points + behaviors"
      - "Define success metrics for the redesign"
    methodologies:
      - slug: jobs-to-be-done
        path: solo/ux/user-researcher/jobs-to-be-done
        required: true
        tier_gate: solo
      - slug: pain-point-research
        path: solo/ux/user-researcher/pain-point-research
        required: true
        tier_gate: solo
      - slug: success-metrics-definition
        path: solo/ux/user-researcher/success-metrics-definition
        required: true
        tier_gate: solo
    outputs:
      - "JTBD + pain point list + success metrics"
    decision_gate: |
      Advance when client accepts the JTBD framing.
  - name: "Heuristic + cognitive walkthrough"
    intent: "Find the friction worth fixing."
    tasks:
      - "Heuristic evaluation on priority flows"
      - "Cognitive walkthrough for novice scenarios"
      - "Pick priority flows for redesign investment"
    methodologies:
      - slug: heuristic-evaluation
        path: solo/ux/ux-ui-designer/heuristic-evaluation
        required: true
        tier_gate: solo
      - slug: cognitive-walkthrough
        path: pro/ux/ux-ui-designer/cognitive-walkthrough
        required: true
        tier_gate: pro
      - slug: information-architecture
        path: solo/ux/ux-ui-designer/information-architecture
        required: true
        tier_gate: solo
    outputs:
      - "Friction list + priority flow set"
    decision_gate: |
      Advance only when client agrees on priority flows.
  - name: "Redesign"
    intent: "Wireframes -> hi-fi using tokens."
    tasks:
      - "Wireframe priority flows"
      - "Apply design tokens (use client's system or scaffold one)"
      - "Build interactive prototype"
    methodologies:
      - slug: wireframing
        path: solo/ux/ui-designer/wireframing
        required: true
        tier_gate: solo
      - slug: design-tokens-fundamentals
        path: solo/ux/ui-designer/design-tokens-fundamentals
        required: true
        tier_gate: solo
      - slug: tailwind-design-tokens
        path: solo/ux/ui-designer/tailwind-design-tokens
        required: true
        tier_gate: solo
      - slug: prototyping
        path: solo/ux/ui-designer/prototyping
        required: true
        tier_gate: solo
      - slug: cross-platform-token-distribution
        path: pro/ux/ui-designer/cross-platform-token-distribution
        required: true
        tier_gate: pro
    outputs:
      - "Hi-fi interactive prototype"
    decision_gate: |
      Advance when prototype walks priority flows without dead ends.
  - name: "Validate"
    intent: "Test with users before client sign-off."
    tasks:
      - "Run 5 usability sessions on priority flows"
      - "Capture severity-ranked findings"
      - "Iterate on critical issues"
    methodologies:
      - slug: usability-testing
        path: solo/ux/ux-ui-designer/usability-testing
        required: true
        tier_gate: solo
    outputs:
      - "Validation report + iteration log"
    decision_gate: |
      Advance only when critical issues are resolved.
  - name: "Client sign-off"
    intent: "Land the design + the scoreboard."
    tasks:
      - "Run readout with client decision-makers"
      - "Walk through the design KPI scoreboard"
      - "Capture sign-off with success criteria"
    methodologies:
      - slug: success-metrics-definition
        path: solo/ux/user-researcher/success-metrics-definition
        required: true
        tier_gate: solo
    outputs:
      - "Signed sign-off + scoreboard wired"
    decision_gate: |
      Advance only when sign-off is written, not verbal.
  - name: "Handoff"
    intent: "Vendor-friendly handoff to client engineering."
    tasks:
      - "Package spec + tokens + prototype"
      - "Hand off to client engineering with a walkthrough"
      - "Define post-launch measurement check-in"
    methodologies:
      - slug: cross-platform-token-distribution
        path: pro/ux/ui-designer/cross-platform-token-distribution
        required: true
        tier_gate: pro
      - slug: design-tokens-fundamentals
        path: solo/ux/ui-designer/design-tokens-fundamentals
        required: true
        tier_gate: solo
    outputs:
      - "Handoff package + measurement check-in scheduled"
    decision_gate: |
      Done when client engineering accepts the package.

common_pitfalls:
  - "Skipping research because 'client knows their users' -> assumptions, not signal"
  - "Designing without tokens -> client engineering rejects handoff"
  - "No KPI scoreboard -> redesign value cannot be proven"

quality_checklist:
  - "Did the client agree to KPI targets before launch?"
  - "Can the client's engineering build from the handoff without questions?"
  - "Did priority flows test cleanly with users?"

related_playbooks:
  - zero-to-one-product-design-brief-to-dev-handoff-8-weeks
  - usability-test-cycle-end-to-end-3-weeks

