slug: user-interview-prep-run-1-session
title: "User interview prep + run (1 session)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 3235d567b8a838af

tier: solo
tier_min: solo
group: role-ux-ui-designer
persona: Designer/researcher running a single participant interview
complexity: medium
context: [solo, team]

summary: |
  One participant interview end-to-end: pre-flight checks, on-time run, notes captured, raw artifacts filed, follow-up scheduled.

intent: |
  Open interview slot -> ran on time + notes filed + follow-up scheduled.

scope: |
  Researcher runs one participant interview. Includes pre-flight (env, consent, recording), running the interview, hot-take note within an hour, raw artifacts filed in the repo, and a follow-up either scheduled or politely closed. Done when notes are filed and the follow-up state is logged.

success_criteria:
  - "Pre-flight checks completed (consent + recording + battery)"
  - "Hot-take note filed within 1 hour of interview end"
  - "Raw artifacts (recording + transcript) in the repo with consistent naming"
  - "Follow-up scheduled or politely declined"

methodology_refs:
  - faion/knowledge/geek/ux/user-researcher/ai-interview-analysis
  - faion/knowledge/pro/ux/ux-researcher/cog-walk-basics
  - faion/knowledge/solo/ux/user-researcher/jobs-to-be-done
  - faion/knowledge/solo/ux/user-researcher/pain-point-research
  - faion/knowledge/solo/ux/user-researcher/user-interviews-methods
  - faion/knowledge/solo/ux/ux-ui-designer/user-interviews

stages:
  - name: "Pre-flight"
    intent: "Don't lose data to a flat battery."
    tasks:
      - "Confirm consent + compensation"
      - "Test recording + backup recording"
      - "Open script + research repo file"
    methodologies:
      - slug: user-interviews-methods
        path: solo/ux/user-researcher/user-interviews-methods
        required: true
        tier_gate: solo
    outputs:
      - "Pre-flight checklist passed"
    decision_gate: |
      Advance only after recording + consent are confirmed.
  - name: "Open"
    intent: "First 3 minutes set the tone."
    tasks:
      - "Introduce yourself + the purpose"
      - "Restate confidentiality + recording"
      - "Warm-up question"
    methodologies:
      - slug: user-interviews
        path: solo/ux/ux-ui-designer/user-interviews
        required: true
        tier_gate: solo
      - slug: user-interviews-methods
        path: solo/ux/user-researcher/user-interviews-methods
        required: true
        tier_gate: solo
    outputs:
      - "Recorded opening"
    decision_gate: |
      Advance only when the participant looks comfortable.
  - name: "Probe JTBD + pain"
    intent: "Get past surface answers."
    tasks:
      - "Walk current workflow step-by-step"
      - "Probe pain points and workarounds"
      - "Capture critical incidents"
    methodologies:
      - slug: jobs-to-be-done
        path: solo/ux/user-researcher/jobs-to-be-done
        required: true
        tier_gate: solo
      - slug: pain-point-research
        path: solo/ux/user-researcher/pain-point-research
        required: true
        tier_gate: solo
      - slug: cog-walk-basics
        path: pro/ux/ux-researcher/cog-walk-basics
        required: true
        tier_gate: pro
    outputs:
      - "Core interview content captured"
    decision_gate: |
      Advance only when critical incidents are described.
  - name: "Wrap"
    intent: "Close cleanly with consent intact."
    tasks:
      - "Ask the participant if anything was missed"
      - "Confirm compensation + thanks"
      - "Set expectation for follow-up"
    methodologies:
      - slug: user-interviews
        path: solo/ux/ux-ui-designer/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "Wrap captured + participant thanked"
    decision_gate: |
      Advance when participant has consented to follow-up state.
  - name: "Hot take"
    intent: "Fresh notes are best notes."
    tasks:
      - "Write a 5-min hot take while still fresh"
      - "Capture 3-5 key quotes"
      - "Note any surprising signals"
    methodologies:
      - slug: ai-interview-analysis
        path: geek/ux/user-researcher/ai-interview-analysis
        required: true
        tier_gate: geek
      - slug: pain-point-research
        path: solo/ux/user-researcher/pain-point-research
        required: true
        tier_gate: solo
    outputs:
      - "Hot-take note filed"
    decision_gate: |
      Advance only after note is written.
  - name: "File + follow-up"
    intent: "Make data findable next week."
    tasks:
      - "Upload recording + transcript to repo"
      - "Apply consistent file naming"
      - "Schedule follow-up or close politely"
    methodologies:
      - slug: user-interviews-methods
        path: solo/ux/user-researcher/user-interviews-methods
        required: true
        tier_gate: solo
    outputs:
      - "Raw artifacts filed + follow-up state logged"
    decision_gate: |
      Done when repo entry exists with all artifacts.

common_pitfalls:
  - "Skipping pre-flight -> lose recording, lose data"
  - "No hot take -> details fade by next morning"
  - "Inconsistent naming -> repo becomes a junk drawer"

quality_checklist:
  - "Is the recording filed and named correctly?"
  - "Did I capture key quotes while fresh?"
  - "Is the follow-up state explicit?"

related_playbooks:
  - usability-test-moderation-single-session
  - research-insight-synthesis-2hrweek

token_budget_estimate: 2200
cli_invocations:
  human:  "faion get-content user-interview-prep-run-1-session --format md"
  agent:  "faion get-content user-interview-prep-run-1-session --format context"
  json:   "faion get-content user-interview-prep-run-1-session --format json"

