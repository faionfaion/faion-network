slug: usability-test-moderation-single-session
title: "Usability-test moderation (single session)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 1fae2bf60060b54d

tier: solo
tier_min: solo
group: role-ux-ui-designer
persona: Designer/researcher moderating one usability test session on a prototype
complexity: medium
context: [solo, team]

summary: |
  One moderated session on a prototype: task success/failure per task, behavioral observations, critical issues flagged same-day for fix triage.

intent: |
  Untested prototype slot -> moderated session logged + same-day critical-issue triage.

scope: |
  Researcher moderates one usability session on a prototype. Includes brief, task-by-task moderation, observation capture, critical issue triage, and same-day fix-list update. Done when session log is filed and critical issues are flagged with engineering.

success_criteria:
  - "All planned tasks moderated"
  - "Per-task success/fail recorded with rationale"
  - "Critical issues flagged for fix triage same day"
  - "Session log filed with consistent naming"

methodology_refs:
  - faion/knowledge/solo/ux/ux-researcher/usability-testing
  - faion/knowledge/solo/ux/ux-ui-designer/error-prevention
  - faion/knowledge/solo/ux/ux-ui-designer/recognition-over-recall
  - faion/knowledge/solo/ux/ux-ui-designer/usability-testing

stages:
  - name: "Brief participant"
    intent: "Set expectations + record consent."
    tasks:
      - "Explain think-aloud + 'no wrong answers'"
      - "Confirm consent + recording"
      - "Show the prototype starting state"
    methodologies:
      - slug: usability-testing
        path: solo/ux/ux-ui-designer/usability-testing
        required: true
        tier_gate: solo
      - slug: usability-testing
        path: solo/ux/ux-researcher/usability-testing
        required: true
        tier_gate: solo
    outputs:
      - "Briefing recorded + consent on file"
    decision_gate: |
      Advance only when consent is confirmed.
  - name: "Run tasks"
    intent: "Task-by-task moderation without leading."
    tasks:
      - "Read each task verbatim"
      - "Observe without prompting; ask why after"
      - "Record success/fail + observed pain"
    methodologies:
      - slug: usability-testing
        path: solo/ux/ux-ui-designer/usability-testing
        required: true
        tier_gate: solo
      - slug: error-prevention
        path: solo/ux/ux-ui-designer/error-prevention
        required: true
        tier_gate: solo
      - slug: recognition-over-recall
        path: solo/ux/ux-ui-designer/recognition-over-recall
        required: true
        tier_gate: solo
    outputs:
      - "Per-task log with rationale"
    decision_gate: |
      Advance only when all tasks are run.
  - name: "Probe critical incidents"
    intent: "Dig into the worst moments."
    tasks:
      - "Ask follow-up on each fail or hesitation"
      - "Capture verbatim quotes"
      - "Cross-reference with prototype heuristics"
    methodologies:
      - slug: error-prevention
        path: solo/ux/ux-ui-designer/error-prevention
        required: true
        tier_gate: solo
      - slug: recognition-over-recall
        path: solo/ux/ux-ui-designer/recognition-over-recall
        required: true
        tier_gate: solo
    outputs:
      - "Critical-incident notes"
    decision_gate: |
      Advance only after probes are exhausted.
  - name: "Wrap + thank"
    intent: "Close cleanly."
    tasks:
      - "Final reflection question"
      - "Confirm compensation"
      - "Set follow-up expectation"
    methodologies:
      - slug: usability-testing
        path: solo/ux/ux-ui-designer/usability-testing
        required: true
        tier_gate: solo
    outputs:
      - "Session wrap recorded"
    decision_gate: |
      Advance when participant is thanked and dismissed.
  - name: "Same-day triage"
    intent: "Push critical issues into the team's queue today."
    tasks:
      - "Flag critical issues to engineering / design lead"
      - "Open tickets for must-fix items"
      - "File session log + recording in repo"
    methodologies:
      - slug: usability-testing
        path: solo/ux/ux-ui-designer/usability-testing
        required: true
        tier_gate: solo
    outputs:
      - "Triage list + tickets opened"
    decision_gate: |
      Done when critical issues have tickets the same day.

common_pitfalls:
  - "Leading the participant -> contaminated signal"
  - "Waiting until next day to triage -> momentum lost"
  - "No probe on hesitation -> 'they figured it out' becomes the misleading story"

quality_checklist:
  - "Did I avoid leading the participant?"
  - "Did critical issues get tickets today?"
  - "Is the log filed with consistent naming?"

related_playbooks:
  - user-interview-prep-run-1-session
  - usability-test-cycle-end-to-end-3-weeks

token_budget_estimate: 2200
cli_invocations:
  human:  "faion get-content usability-test-moderation-single-session --format md"
  agent:  "faion get-content usability-test-moderation-single-session --format context"
  json:   "faion get-content usability-test-moderation-single-session --format json"

