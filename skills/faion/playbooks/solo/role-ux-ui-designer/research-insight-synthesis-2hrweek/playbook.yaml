slug: research-insight-synthesis-2hrweek
title: "Research insight synthesis (2hr/week)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 4f877c38ac0e2165

tier: solo
tier_min: solo
group: role-ux-ui-designer
persona: Designer/researcher synthesizing the week's research
complexity: medium
context: [solo, team]

summary: |
  Last week's research artifacts condensed into 3-7 actionable insights with evidence; insights linked to design backlog items; top theme picked for next prototype.

intent: |
  Raw weekly research artifacts -> 3-7 actionable insights + linked backlog items + next-prototype theme.

scope: |
  Designer/researcher runs a weekly 2-hour synthesis. Includes review of artifacts, AI-assisted coding, insight write-up with evidence, linkage to design backlog, and a top-theme selection. Done when insights are filed and the next prototype theme is picked.

success_criteria:
  - "3-7 insights written with >=3 evidence points each"
  - "Each insight linked to a design backlog item or opportunity"
  - "Top theme picked for next prototype"
  - "Insights filed in the research repository"

methodology_refs:
  - faion/knowledge/geek/ux/user-researcher/ai-interview-analysis
  - faion/knowledge/pro/ux/user-researcher/opportunity-solution-trees
  - faion/knowledge/pro/ux/ux-researcher/diary-study-basics
  - faion/knowledge/pro/ux/ux-researcher/surveys
  - faion/knowledge/solo/ux/user-researcher/jobs-to-be-done
  - faion/knowledge/solo/ux/user-researcher/pain-point-research
  - faion/knowledge/solo/ux/user-researcher/user-interviews-methods

stages:
  - name: "Inventory"
    intent: "List the week's artifacts."
    tasks:
      - "Pull interviews, surveys, diary entries"
      - "Confirm artifacts are filed + named correctly"
      - "Note any incomplete artifacts"
    methodologies:
      - slug: surveys
        path: pro/ux/ux-researcher/surveys
        required: true
        tier_gate: pro
      - slug: diary-study-basics
        path: pro/ux/ux-researcher/diary-study-basics
        required: true
        tier_gate: pro
      - slug: user-interviews-methods
        path: solo/ux/user-researcher/user-interviews-methods
        required: true
        tier_gate: solo
    outputs:
      - "Weekly artifact inventory"
    decision_gate: |
      Advance only when inventory is complete.
  - name: "AI coding"
    intent: "Tag patterns fast."
    tasks:
      - "Run AI transcript + open-response analysis"
      - "Human-validate the top codes"
      - "Reject false positives"
    methodologies:
      - slug: ai-interview-analysis
        path: geek/ux/user-researcher/ai-interview-analysis
        required: true
        tier_gate: geek
    outputs:
      - "Validated code list"
    decision_gate: |
      Advance only after human validation.
  - name: "Cluster"
    intent: "Group codes into themes."
    tasks:
      - "Affinity-cluster codes into themes"
      - "Tie themes to JTBD + pain points"
      - "Cut weak themes (<3 evidence points)"
    methodologies:
      - slug: jobs-to-be-done
        path: solo/ux/user-researcher/jobs-to-be-done
        required: true
        tier_gate: solo
      - slug: pain-point-research
        path: solo/ux/user-researcher/pain-point-research
        required: true
        tier_gate: solo
    outputs:
      - "Clustered themes"
    decision_gate: |
      Advance only when every theme has >=3 evidence points.
  - name: "Insight write-up"
    intent: "Concrete, evidence-backed insights."
    tasks:
      - "Write 3-7 insight cards (claim, evidence, implication)"
      - "Add representative quotes per insight"
      - "Cross-check against opportunity tree"
    methodologies:
      - slug: opportunity-solution-trees
        path: pro/ux/user-researcher/opportunity-solution-trees
        required: true
        tier_gate: pro
    outputs:
      - "Insight cards"
    decision_gate: |
      Advance only when each card has claim + evidence + implication.
  - name: "Backlog + theme"
    intent: "Tie insights to action."
    tasks:
      - "Link each insight to a design backlog item"
      - "Pick top theme for next prototype"
      - "Schedule the prototype iteration"
    methodologies:
      - slug: opportunity-solution-trees
        path: pro/ux/user-researcher/opportunity-solution-trees
        required: true
        tier_gate: pro
    outputs:
      - "Linked backlog + chosen theme"
    decision_gate: |
      Done when the next prototype theme is picked and scheduled.

common_pitfalls:
  - "Themes with <3 evidence points -> fragile insights"
  - "Insights without backlog links -> research dies"
  - "No top theme -> next prototype lacks focus"

quality_checklist:
  - "Does each insight have claim + evidence + implication?"
  - "Are insights linked to backlog?"
  - "Is the next prototype theme on the calendar?"

related_playbooks:
  - user-research-sprint-discovery-to-recommendations-4-weeks
  - ai-assisted-research-synthesis-interview-transcripts-tagged-insights-design-back

token_budget_estimate: 3500
cli_invocations:
  human:  "faion get-content research-insight-synthesis-2hrweek --format md"
  agent:  "faion get-content research-insight-synthesis-2hrweek --format context"
  json:   "faion get-content research-insight-synthesis-2hrweek --format json"

changelog:
