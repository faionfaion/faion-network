slug: design-debt-remediation-sprint-2-weeks
title: "Design-debt remediation sprint (2 weeks)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 6dba7ae9b2b57ff9

tier: solo
tier_min: solo
group: role-ux-ui-designer
persona: Designer in a P6 product team clearing accumulated design debt
complexity: light
context: [team]

summary: |
  2-week concentrated sprint to clear design drift: inconsistent components retired, microcopy normalized, a11y quick wins shipped.

intent: |
  Accumulated design debt -> clean surface + a11y quick wins + retired inconsistent components.

scope: |
  Designer dedicates 2 weeks to design-debt remediation on a defined product surface. Includes drift audit, debt scoring, microcopy + component normalization, a11y quick wins, and a re-baseline. Done when debt score drops below threshold and a follow-up cadence is in place.

success_criteria:
  - "Debt score reduced below team threshold"
  - "Inconsistent components retired or aligned to design system"
  - "A11y quick wins (contrast, focus, semantics) shipped"
  - "Follow-up cadence (monthly trim) is in place"

methodology_refs:
  - faion/knowledge/pro/ux/accessibility-specialist/wcag-22-compliance
  - faion/knowledge/pro/ux/ui-designer/design-system-success-factors
  - faion/knowledge/solo/ux/accessibility-specialist/recognition-over-recall
  - faion/knowledge/solo/ux/accessibility-specialist/visibility-of-system-status
  - faion/knowledge/solo/ux/ui-designer/design-tokens-fundamentals
  - faion/knowledge/solo/ux/ux-ui-designer/consistency-standards
  - faion/knowledge/solo/ux/ux-ui-designer/content-audit
  - faion/knowledge/solo/ux/ux-ui-designer/design-critique

stages:
  - name: "Audit drift"
    intent: "See what is broken before fixing."
    tasks:
      - "Run a Storybook + production drift scan"
      - "Content audit on microcopy inconsistencies"
      - "Inventory off-token component usages"
    methodologies:
      - slug: content-audit
        path: solo/ux/ux-ui-designer/content-audit
        required: true
        tier_gate: solo
      - slug: consistency-standards
        path: solo/ux/ux-ui-designer/consistency-standards
        required: true
        tier_gate: solo
    outputs:
      - "Drift inventory + microcopy issue list"
    decision_gate: |
      Advance only when inventory covers the surface.
  - name: "Score debt"
    intent: "Rank what to fix this sprint."
    tasks:
      - "Score items by impact + effort + visibility"
      - "Pick a 'must clear' set sized to capacity"
      - "Park the rest with rationale"
    methodologies:
      - slug: design-system-success-factors
        path: pro/ux/ui-designer/design-system-success-factors
        required: true
        tier_gate: pro
      - slug: design-critique
        path: solo/ux/ux-ui-designer/design-critique
        required: true
        tier_gate: solo
    outputs:
      - "Scored debt list + sprint set"
    decision_gate: |
      Advance only when sprint set fits team capacity.
  - name: "Microcopy normalize"
    intent: "Tone + terms aligned across the surface."
    tasks:
      - "Apply microcopy guide to flagged screens"
      - "Reuse error/empty-state patterns from system"
      - "Open PRs in small batches"
    methodologies:
      - slug: content-audit
        path: solo/ux/ux-ui-designer/content-audit
        required: true
        tier_gate: solo
      - slug: consistency-standards
        path: solo/ux/ux-ui-designer/consistency-standards
        required: true
        tier_gate: solo
    outputs:
      - "Microcopy PRs merged"
    decision_gate: |
      Advance when batched PRs are merged.
  - name: "Component normalize"
    intent: "Retire off-system components."
    tasks:
      - "Migrate off-token components to system tokens"
      - "Deprecate components scheduled for retirement"
      - "Update Storybook to reflect the truth"
    methodologies:
      - slug: design-tokens-fundamentals
        path: solo/ux/ui-designer/design-tokens-fundamentals
        required: true
        tier_gate: solo
      - slug: design-system-success-factors
        path: pro/ux/ui-designer/design-system-success-factors
        required: true
        tier_gate: pro
    outputs:
      - "Component migration log"
    decision_gate: |
      Advance once migrations land in the build.
  - name: "A11y quick wins"
    intent: "Ship the low-hanging fruit."
    tasks:
      - "Fix contrast + focus visibility"
      - "Apply visibility-of-system-status patterns"
      - "Improve recognition-over-recall on high-traffic surfaces"
    methodologies:
      - slug: wcag-22-compliance
        path: pro/ux/accessibility-specialist/wcag-22-compliance
        required: true
        tier_gate: pro
      - slug: recognition-over-recall
        path: solo/ux/accessibility-specialist/recognition-over-recall
        required: true
        tier_gate: solo
      - slug: visibility-of-system-status
        path: solo/ux/accessibility-specialist/visibility-of-system-status
        required: true
        tier_gate: solo
    outputs:
      - "A11y fixes shipped"
    decision_gate: |
      Advance only after fixes pass a smoke a11y check.
  - name: "Re-baseline + cadence"
    intent: "Measure the win, lock the cadence."
    tasks:
      - "Re-run drift scan post-sprint"
      - "Confirm score is below threshold"
      - "Schedule monthly trim cadence"
    methodologies:
      - slug: design-system-success-factors
        path: pro/ux/ui-designer/design-system-success-factors
        required: true
        tier_gate: pro
    outputs:
      - "New baseline + monthly cadence on calendar"
    decision_gate: |
      Done when score is below threshold and cadence is scheduled.

common_pitfalls:
  - "Trying to fix all debt at once -> nothing ships"
  - "Skipping the re-scan -> no evidence the sprint paid off"
  - "No monthly trim cadence -> drift returns within a quarter"

quality_checklist:
  - "Is the debt score actually below threshold?"
  - "Did a11y quick wins ship, not just file?"
  - "Is the monthly trim on the calendar?"

related_playbooks:
  - design-system-component-update-single-component
  - a11y-audit-on-one-screen-1hr

token_budget_estimate: 5500
