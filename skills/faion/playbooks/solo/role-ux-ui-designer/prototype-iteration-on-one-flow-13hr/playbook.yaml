slug: prototype-iteration-on-one-flow-13hr
title: "Prototype iteration on one flow (1-3hr)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 49aaaef6d3d87e7a

tier: solo
tier_min: solo
group: role-ux-ui-designer
persona: Designer iterating a prototype after fresh user feedback
complexity: medium
context: [solo, team]

summary: |
  One user flow re-prototyped after fresh feedback; updated interactive prototype ready for the next test session; rationale logged.

intent: |
  Prototype with usability findings -> updated prototype + logged rationale + ready to retest.

scope: |
  Designer takes one user flow that has fresh usability feedback and iterates it in 1-3 hours. Includes change list, wireframe update, hi-fi update, interaction wiring, and a rationale log. Done when the prototype is ready for the next test and the rationale entry is filed.

success_criteria:
  - "Change list documented from prior findings"
  - "Interactive prototype updated end-to-end"
  - "Iteration log entry filed with rationale"
  - "Version tag applied to the flow"

methodology_refs:
  - faion/knowledge/solo/ux/ui-designer/prototyping
  - faion/knowledge/solo/ux/ui-designer/wireframing
  - faion/knowledge/solo/ux/ux-ui-designer/journey-mapping
  - faion/knowledge/solo/ux/ux-ui-designer/prototyping
  - faion/knowledge/solo/ux/ux-ui-designer/usability-testing
  - faion/knowledge/solo/ux/ux-ui-designer/wireframing

stages:
  - name: "List changes"
    intent: "Translate findings into concrete edits."
    tasks:
      - "List each critical finding + proposed change"
      - "Flag changes that affect the journey map"
      - "Park lower-severity changes for next iteration"
    methodologies:
      - slug: usability-testing
        path: solo/ux/ux-ui-designer/usability-testing
        required: true
        tier_gate: solo
      - slug: journey-mapping
        path: solo/ux/ux-ui-designer/journey-mapping
        required: true
        tier_gate: solo
    outputs:
      - "Change list"
    decision_gate: |
      Advance only when changes are concrete (no 'improve UX').
  - name: "Update wireframes"
    intent: "Sketch structural changes first."
    tasks:
      - "Rewireframe affected steps"
      - "Resolve information-architecture impacts"
      - "Mark steps where copy or affordance changes"
    methodologies:
      - slug: wireframing
        path: solo/ux/ui-designer/wireframing
        required: true
        tier_gate: solo
      - slug: wireframing
        path: solo/ux/ux-ui-designer/wireframing
        required: true
        tier_gate: solo
    outputs:
      - "Updated wireframe sequence"
    decision_gate: |
      Advance only when wireframes match the change list.
  - name: "Update hi-fi"
    intent: "Apply tokens + content updates."
    tasks:
      - "Apply hi-fi to updated screens"
      - "Keep all values on tokens"
      - "Update microcopy + affordances"
    methodologies:
      - slug: prototyping
        path: solo/ux/ui-designer/prototyping
        required: true
        tier_gate: solo
      - slug: prototyping
        path: solo/ux/ux-ui-designer/prototyping
        required: true
        tier_gate: solo
    outputs:
      - "Updated hi-fi screens"
    decision_gate: |
      Advance only when hi-fi matches wireframes.
  - name: "Wire interactions"
    intent: "Prototype must run end-to-end."
    tasks:
      - "Wire links + transitions for the flow"
      - "Smoke-test the prototype"
      - "Fix dead-ends"
    methodologies:
      - slug: prototyping
        path: solo/ux/ui-designer/prototyping
        required: true
        tier_gate: solo
      - slug: prototyping
        path: solo/ux/ux-ui-designer/prototyping
        required: true
        tier_gate: solo
    outputs:
      - "Working prototype"
    decision_gate: |
      Advance only when smoke test passes.
  - name: "Log + tag"
    intent: "Future you will thank present you."
    tasks:
      - "File iteration log with rationale per change"
      - "Apply version tag (e.g., v3.2-onboarding)"
      - "Schedule the next test session"
    methodologies:
      - slug: prototyping
        path: solo/ux/ui-designer/prototyping
        required: true
        tier_gate: solo
    outputs:
      - "Iteration log + version tag"
    decision_gate: |
      Done when log is filed and tag is applied.

common_pitfalls:
  - "Iterating without a change list -> drift, hard to test what changed"
  - "Hi-fi without re-wireframing -> structural issues survive"
  - "No version tag -> rollback is impossible"

quality_checklist:
  - "Does the prototype actually walk through cleanly?"
  - "Is the rationale per change written down?"
  - "Is the version tag applied?"

related_playbooks:
  - usability-test-cycle-end-to-end-3-weeks
  - dev-handoff-doc-writing-per-feature

token_budget_estimate: 2500
cli_invocations:
  human:  "faion get-content prototype-iteration-on-one-flow-13hr --format md"
  agent:  "faion get-content prototype-iteration-on-one-flow-13hr --format context"
  json:   "faion get-content prototype-iteration-on-one-flow-13hr --format json"

