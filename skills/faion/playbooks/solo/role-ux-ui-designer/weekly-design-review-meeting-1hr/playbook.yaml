slug: weekly-design-review-meeting-1hr
title: "Weekly design review meeting (1hr)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: a7a2b730fc5b0deb

tier: solo
tier_min: solo
group: role-ux-ui-designer
persona: Designer or design lead facilitating a cross-functional review
complexity: light
context: [solo, team]

summary: |
  Cross-functional review of in-flight designs: decisions captured, action items assigned with owners, design-system impacts surfaced.

intent: |
  In-flight designs scattered across DMs -> 1h review with decisions captured + design-system impacts queued.

scope: |
  Designer facilitates a weekly 1-hour design review. Includes agenda intake, time-boxed walkthroughs, decision capture, action item assignment, and a design-system impact queue. Done when decisions are logged and DS impacts are queued for the system owner.

success_criteria:
  - "Agenda set 24h in advance with owners + asks"
  - "Each item gets a decision or a documented park"
  - "Action items assigned with owner + due date"
  - "Design-system impacts queued with the system owner"

methodology_refs:
  - faion/knowledge/pro/ux/ui-designer/design-system-success-factors
  - faion/knowledge/solo/ux/ux-ui-designer/consistency-standards
  - faion/knowledge/solo/ux/ux-ui-designer/design-critique
  - faion/knowledge/solo/ux/ux-ui-designer/heuristic-evaluation

stages:
  - name: "Set agenda"
    intent: "No surprises in the room."
    tasks:
      - "Collect submissions 24h in advance"
      - "Each item: owner, ask, time-box"
      - "Cap agenda to 4-6 items"
    methodologies:
      - slug: design-critique
        path: solo/ux/ux-ui-designer/design-critique
        required: true
        tier_gate: solo
    outputs:
      - "Agenda published"
    decision_gate: |
      Advance only with agenda locked.
  - name: "Facilitate walkthroughs"
    intent: "Each item gets focus in its time box."
    tasks:
      - "Owner walks through the work for 5 minutes"
      - "Critique grounded in heuristics + system patterns"
      - "Avoid 'I would have done X' detours"
    methodologies:
      - slug: heuristic-evaluation
        path: solo/ux/ux-ui-designer/heuristic-evaluation
        required: true
        tier_gate: solo
      - slug: consistency-standards
        path: solo/ux/ux-ui-designer/consistency-standards
        required: true
        tier_gate: solo
      - slug: design-critique
        path: solo/ux/ux-ui-designer/design-critique
        required: true
        tier_gate: solo
    outputs:
      - "Per-item critique notes"
    decision_gate: |
      Advance through each item within its time box.
  - name: "Force decisions"
    intent: "Decision or park; no third option."
    tasks:
      - "For each item: decide, defer, or park with reason"
      - "Capture decision live on screen"
      - "Name owner + due date for any action"
    methodologies:
      - slug: design-critique
        path: solo/ux/ux-ui-designer/design-critique
        required: true
        tier_gate: solo
    outputs:
      - "Decision log per item"
    decision_gate: |
      Advance only when each item has a written status.
  - name: "Queue DS impacts"
    intent: "Design-system changes do not slip through."
    tasks:
      - "Flag any pattern that touches the system"
      - "Add to DS impact queue with owner"
      - "Notify system owner before end of day"
    methodologies:
      - slug: design-system-success-factors
        path: pro/ux/ui-designer/design-system-success-factors
        required: true
        tier_gate: pro
    outputs:
      - "DS impact queue updated"
    decision_gate: |
      Advance only when DS owner is notified.
  - name: "Wrap + log"
    intent: "Meeting outcomes survive the day."
    tasks:
      - "Post summary in channel within 1h"
      - "Update tracker with action items"
      - "Schedule next review"
    methodologies:
      - slug: design-critique
        path: solo/ux/ux-ui-designer/design-critique
        required: true
        tier_gate: solo
    outputs:
      - "Summary posted + tracker updated"
    decision_gate: |
      Done when summary is in channel and next review is scheduled.

common_pitfalls:
  - "Running over time on item 1 -> later items get shortchanged"
  - "Letting critique become free-form ideas -> no decision lands"
  - "Skipping DS impact queue -> system drift creeps in"

quality_checklist:
  - "Did every item end with a written decision or park?"
  - "Are action items in the tracker with owner + due date?"
  - "Did the DS owner get notified about impacts?"

related_playbooks:
  - daily-figma-sync-comment-triage-30min
  - stakeholder-design-walkthrough-1hr

token_budget_estimate: 2200
cli_invocations:
  human:  "faion get-content weekly-design-review-meeting-1hr --format md"
  agent:  "faion get-content weekly-design-review-meeting-1hr --format context"
  json:   "faion get-content weekly-design-review-meeting-1hr --format json"

