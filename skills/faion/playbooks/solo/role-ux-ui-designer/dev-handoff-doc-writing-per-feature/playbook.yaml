slug: dev-handoff-doc-writing-per-feature
title: "Dev handoff doc writing (per feature)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 83120fca2a930b0a

tier: solo
tier_min: solo
group: role-ux-ui-designer
persona: Designer writing the handoff spec engineering will build from
complexity: medium
context: [solo, team]

summary: |
  Engineering can implement without re-asking; spec covers states, tokens, motion, a11y, edge cases, and Figma <-> code mapping.

intent: |
  Approved design -> handoff doc engineering can build from cold.

scope: |
  Designer writes a handoff doc for one feature. Covers screen states, design tokens, motion, a11y annotations, edge cases, and Figma <-> code mappings. Done when engineering signs off and a build can start without follow-up questions.

success_criteria:
  - "All states covered (default, empty, loading, error, success)"
  - "Tokens explicitly referenced (no off-token values)"
  - "A11y annotations + AT behavior documented"
  - "Edge cases enumerated"
  - "Engineering signs off"

methodology_refs:
  - faion/knowledge/geek/ux/ui-designer/ai-design-assistant-patterns
  - faion/knowledge/geek/ux/ui-designer/figma-ai-ecosystem
  - faion/knowledge/pro/ux/accessibility-specialist/accessibility-first-design
  - faion/knowledge/pro/ux/accessibility-specialist/wcag-22-compliance
  - faion/knowledge/pro/ux/ui-designer/semantic-tokens-and-modes
  - faion/knowledge/solo/ux/ui-designer/design-tokens-fundamentals
  - faion/knowledge/solo/ux/ui-designer/tailwind-design-tokens
  - faion/knowledge/solo/ux/ux-ui-designer/mobile-ux

stages:
  - name: "States + structure"
    intent: "Cover the screen lifecycle."
    tasks:
      - "Document default, empty, loading, error, success states"
      - "Capture responsive + mobile behavior"
      - "Specify keyboard + focus order"
    methodologies:
      - slug: design-tokens-fundamentals
        path: solo/ux/ui-designer/design-tokens-fundamentals
        required: true
        tier_gate: solo
      - slug: mobile-ux
        path: solo/ux/ux-ui-designer/mobile-ux
        required: true
        tier_gate: solo
    outputs:
      - "State + structure section"
    decision_gate: |
      Advance only when all states are documented.
  - name: "Tokens + motion"
    intent: "Visual + interactive system locked."
    tasks:
      - "Map values to semantic tokens"
      - "Document motion durations + easing"
      - "Mark microinteractions explicitly"
    methodologies:
      - slug: semantic-tokens-and-modes
        path: pro/ux/ui-designer/semantic-tokens-and-modes
        required: true
        tier_gate: pro
      - slug: tailwind-design-tokens
        path: solo/ux/ui-designer/tailwind-design-tokens
        required: true
        tier_gate: solo
    outputs:
      - "Tokens + motion section"
    decision_gate: |
      Advance only when off-token values are zero.
  - name: "A11y annotations"
    intent: "AT behavior is not guessed."
    tasks:
      - "Document landmarks + heading order"
      - "Annotate ARIA labels + roles"
      - "Specify focus + announce behavior"
    methodologies:
      - slug: accessibility-first-design
        path: pro/ux/accessibility-specialist/accessibility-first-design
        required: true
        tier_gate: pro
      - slug: wcag-22-compliance
        path: pro/ux/accessibility-specialist/wcag-22-compliance
        required: true
        tier_gate: pro
    outputs:
      - "A11y annotations section"
    decision_gate: |
      Advance only when AT behavior is concrete.
  - name: "Edge cases"
    intent: "Anticipate what production will hit."
    tasks:
      - "List edge content (long text, empty data, rate-limited)"
      - "Specify offline + error recovery"
      - "Cover internationalization concerns"
    methodologies:
      - slug: wcag-22-compliance
        path: pro/ux/accessibility-specialist/wcag-22-compliance
        required: true
        tier_gate: pro
    outputs:
      - "Edge case checklist"
    decision_gate: |
      Advance only when each edge case has a documented response.
  - name: "Code mapping + AI assist"
    intent: "Map design to code so updates flow."
    tasks:
      - "Annotate Figma <-> code (Code Connect or equivalent)"
      - "Use AI design-assist patterns to generate variant tables"
      - "Validate the mapping with engineering"
    methodologies:
      - slug: ai-design-assistant-patterns
        path: geek/ux/ui-designer/ai-design-assistant-patterns
        required: true
        tier_gate: geek
      - slug: figma-ai-ecosystem
        path: geek/ux/ui-designer/figma-ai-ecosystem
        required: true
        tier_gate: geek
    outputs:
      - "Code mapping section"
    decision_gate: |
      Advance only when engineering confirms mapping is usable.
  - name: "Sign-off"
    intent: "Capture acceptance."
    tasks:
      - "Walk engineering through the spec"
      - "Address questions inline; update doc"
      - "Get a written sign-off"
    methodologies:
      - slug: design-tokens-fundamentals
        path: solo/ux/ui-designer/design-tokens-fundamentals
        required: true
        tier_gate: solo
    outputs:
      - "Signed handoff doc"
    decision_gate: |
      Done when engineering signs the doc.

common_pitfalls:
  - "States missed -> engineering invents them inconsistently"
  - "Off-token values -> visual drift on day one"
  - "A11y left vague -> production fails AT"

quality_checklist:
  - "Could a new engineer build from this doc cold?"
  - "Are tokens the only source of visual decisions?"
  - "Is the AT behavior concrete enough to test?"

related_playbooks:
  - zero-to-one-product-design-brief-to-dev-handoff-8-weeks
  - prototype-iteration-on-one-flow-13hr

token_budget_estimate: 3000
cli_invocations:
  human:  "faion get-content dev-handoff-doc-writing-per-feature --format md"
  agent:  "faion get-content dev-handoff-doc-writing-per-feature --format context"
  json:   "faion get-content dev-handoff-doc-writing-per-feature --format json"

changelog:
