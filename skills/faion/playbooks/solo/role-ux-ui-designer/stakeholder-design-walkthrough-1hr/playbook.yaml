slug: stakeholder-design-walkthrough-1hr
title: "Stakeholder design walkthrough (1hr)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: d341d6531db811e8

tier: solo
tier_min: solo
group: role-ux-ui-designer
persona: Designer walking non-designer stakeholders through in-flight work
complexity: light
context: [solo, team]

summary: |
  Non-designer stakeholders aligned on what's being built and why; decisions extracted, scope creep contained, follow-ups assigned.

intent: |
  Misaligned stakeholders -> aligned + decisions extracted + scope creep parked.

scope: |
  Designer runs a 1-hour walkthrough with non-designer stakeholders. Covers context, journey, prototype demo, decision extraction, and scope creep parking. Done when decisions are captured and follow-ups assigned.

success_criteria:
  - "Stakeholders restate the journey in their own words"
  - "Decisions captured in writing during the session"
  - "Scope creep items parked with rationale"
  - "Follow-ups assigned with owners + due dates"

methodology_refs:
  - faion/knowledge/solo/ux/user-researcher/success-metrics-definition
  - faion/knowledge/solo/ux/ux-ui-designer/journey-mapping
  - faion/knowledge/solo/ux/ux-ui-designer/usability-testing

stages:
  - name: "Open with context"
    intent: "Stakeholders need the why before the what."
    tasks:
      - "Restate user problem + success metrics"
      - "Show the journey at a high level"
      - "Set expectations for the walkthrough"
    methodologies:
      - slug: success-metrics-definition
        path: solo/ux/user-researcher/success-metrics-definition
        required: true
        tier_gate: solo
      - slug: journey-mapping
        path: solo/ux/ux-ui-designer/journey-mapping
        required: true
        tier_gate: solo
    outputs:
      - "Shared context"
    decision_gate: |
      Advance only when stakeholders can restate the user problem.
  - name: "Walkthrough"
    intent: "Walk the prototype, not the pixels."
    tasks:
      - "Demo prototype on flagship flows"
      - "Surface the trade-offs made"
      - "Invite questions at decision points"
    methodologies:
      - slug: usability-testing
        path: solo/ux/ux-ui-designer/usability-testing
        required: true
        tier_gate: solo
      - slug: journey-mapping
        path: solo/ux/ux-ui-designer/journey-mapping
        required: true
        tier_gate: solo
    outputs:
      - "Walkthrough completed"
    decision_gate: |
      Advance only when stakeholders followed the walkthrough.
  - name: "Extract decisions"
    intent: "Force decisions on open questions."
    tasks:
      - "List open questions live"
      - "For each: decide, defer, or park"
      - "Capture each with owner + deadline"
    methodologies:
      - slug: journey-mapping
        path: solo/ux/ux-ui-designer/journey-mapping
        required: true
        tier_gate: solo
    outputs:
      - "Decision log"
    decision_gate: |
      Advance only when every open question has a status.
  - name: "Park scope creep"
    intent: "Big new ideas go to the park, not the sprint."
    tasks:
      - "Park new asks with rationale"
      - "Tie parks to roadmap or next research cycle"
      - "Confirm parks with the suggester"
    methodologies:
      - slug: journey-mapping
        path: solo/ux/ux-ui-designer/journey-mapping
        required: true
        tier_gate: solo
    outputs:
      - "Park list"
    decision_gate: |
      Advance when parks are agreed.
  - name: "Close + follow-up"
    intent: "Land the meeting with action."
    tasks:
      - "Recap decisions + parks + follow-ups"
      - "Assign follow-ups with owners + due dates"
      - "Send written summary same day"
    methodologies:
      - slug: success-metrics-definition
        path: solo/ux/user-researcher/success-metrics-definition
        required: true
        tier_gate: solo
    outputs:
      - "Summary sent + follow-ups assigned"
    decision_gate: |
      Done when summary is sent.

common_pitfalls:
  - "Walking pixels not the journey -> stakeholders lose context"
  - "No park list -> scope creep enters the sprint"
  - "No written summary -> decisions evaporate"

quality_checklist:
  - "Did stakeholders restate the journey?"
  - "Are parks tied to the roadmap?"
  - "Was the summary sent same day?"

related_playbooks:
  - weekly-design-review-meeting-1hr

token_budget_estimate: 2200
cli_invocations:
  human:  "faion get-content stakeholder-design-walkthrough-1hr --format md"
  agent:  "faion get-content stakeholder-design-walkthrough-1hr --format context"
  json:   "faion get-content stakeholder-design-walkthrough-1hr --format json"

