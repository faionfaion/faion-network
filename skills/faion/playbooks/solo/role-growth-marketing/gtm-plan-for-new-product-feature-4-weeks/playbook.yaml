title: "GTM Plan for New Product Feature (4 weeks)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 4dec15b4085692b5

tier_min: solo
complexity: medium
context: [solo, team]
persona: ["solo-founder", "growth-marketer"]

intent: |
  From feature-freeze to multi-channel launch: positioning, target ICP segments, launch
  assets, channel mix, success metrics, and post-launch iteration loop. 'Done' = feature is
  live, all assigned channels have shipped launch content, baseline metrics (signups,
  activation, paid-vs-organic split) are flowing into a dashboard, and a week-2 retro has
  fed three optimizations back into the plan.

scope: |
  From feature-freeze to multi-channel launch: positioning, target ICP segments, launch
  assets, channel mix, success metrics, and post-launch iteration loop. 'Done' = feature is
  live, all assigned channels have shipped launch content, baseline metrics (signups,
  activation, paid-vs-organic split) are flowing into a dashboard, and a week-2 retro has
  fed three optimizations back into the plan.

summary: |
  From feature-freeze to multi-channel launch: positioning, target ICP segments, launch
  assets, channel mix, success metrics, and post-launch iteration loop. 'Done' = feature is
  live, all assigned channels have shipped launch content, baseline metrics (signups,
  activation, paid-vs-organic split) are flowing into a dashboard, and a week-2 retro has
  fed three optimizations back into the plan.

methodology_refs:
  - pro/marketing/growth-marketer/aarrr-pirate-metrics
  - pro/marketing/growth-marketer/conversion-tracking
  - pro/marketing/growth-marketer/google-analytics
  - pro/marketing/growth-marketer/north-star-metric
  - pro/marketing/gtm-strategist/growth-brand-positioning

success_criteria:
  - "Written charter (goal, owner, success metric, time-box) signed off"
  - "All planned core artifacts shipped on schedule with tracking flowing"
  - "Measurement readout produced and peer-reviewed against confounders"
  - "Continue / pivot / kill decision written, with next milestone if continue"

stages:
  - name: "Frame"
    intent: "Lock the goal, owner, success metric, and time-box."
    tasks:
      - "Draft a one-paragraph charter with goal, owner, success metric, time-box"
      - "List explicit non-goals so scope cannot creep"
      - "Identify stakeholders and their decision rights"
    methodologies:
      - slug: aarrr-pirate-metrics
        path: pro/marketing/growth-marketer/aarrr-pirate-metrics
        required: true
        tier_gate: pro
      - slug: ads-attribution-models
        path: pro/marketing/ppc-manager/ads-attribution-models
        required: true
        tier_gate: pro
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
    outputs:
      - "Charter doc (1 page)"
    decision_gate: "Advance only with a written charter that all stakeholders read and signed off."
  - name: "Research"
    intent: "Gather the inputs needed to plan: data, prior work, competitors, constraints."
    tasks:
      - "Pull the relevant data extract / dashboards / prior decks"
      - "Scan competitors and prior internal attempts"
      - "Document constraints (legal, tech, brand) up front"
    methodologies:
      - slug: conversion-tracking
        path: pro/marketing/growth-marketer/conversion-tracking
        required: true
        tier_gate: pro
      - slug: ads-meta-campaign-setup
        path: pro/marketing/ppc-manager/ads-meta-campaign-setup
        required: true
        tier_gate: pro
      - slug: ops-dashboard-setup
        path: solo/marketing/growth-marketer/ops-dashboard-setup
        required: true
        tier_gate: solo
    outputs:
      - "Research brief with sources"
    decision_gate: "Advance once research surfaces no blocker; otherwise loop with stakeholders."
  - name: "Plan"
    intent: "Convert the charter + research into a sequenced plan with owners."
    tasks:
      - "Break the work into 3-7 phases with explicit exit-criteria"
      - "Assign an owner per phase"
      - "Wire metrics + dashboards before execution starts"
    methodologies:
      - slug: google-analytics
        path: pro/marketing/growth-marketer/google-analytics
        required: true
        tier_gate: pro
      - slug: ads-retargeting
        path: pro/marketing/ppc-manager/ads-retargeting
        required: true
        tier_gate: pro
      - slug: plausible-analytics
        path: solo/marketing/growth-marketer/plausible-analytics
        required: true
        tier_gate: solo
    outputs:
      - "Plan doc with Gantt or phase table"
    decision_gate: "Advance only when each phase has a named owner and exit-criterion."
  - name: "Produce"
    intent: "Create the core artifacts: assets, content, code, campaigns, configs."
    tasks:
      - "Build the core deliverables per phase plan"
      - "Hold a draft review with the named owner before publish"
      - "Track WIP visibly so blockers surface fast"
    methodologies:
      - slug: north-star-metric
        path: pro/marketing/growth-marketer/north-star-metric
        required: true
        tier_gate: pro
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: growth-hacker-news-launch
        path: solo/marketing/gtm-strategist/growth-hacker-news-launch
        required: true
        tier_gate: solo
    outputs:
      - "Drafts of all core artifacts"
    decision_gate: "Advance when drafts pass internal review against the charter, not personal taste."
  - name: "Ship"
    intent: "Push live: deploy, publish, launch the campaign, flip the switch."
    tasks:
      - "Run the launch checklist (dependencies, tracking, comms)"
      - "Publish on schedule; do not pre-leak"
      - "Confirm tracking is flowing in real-time on a dashboard"
    methodologies:
      - slug: growth-brand-positioning
        path: pro/marketing/gtm-strategist/growth-brand-positioning
        required: true
        tier_gate: pro
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
    outputs:
      - "Launch evidence (URLs / receipts)"
    decision_gate: "Advance only with tracking visibly flowing; otherwise hold launch."
  - name: "Measure"
    intent: "Read the metrics against the plan; separate noise from signal."
    tasks:
      - "Compare actuals vs charter success metric"
      - "Split cohort/segment/channel to find what drove the result"
      - "Document confounders before drawing conclusions"
    methodologies:
      - slug: growth-gtm-strategy
        path: pro/marketing/gtm-strategist/growth-gtm-strategy
        required: true
        tier_gate: pro
      - slug: growth-email-marketing
        path: solo/marketing/content-marketer/growth-email-marketing
        required: true
        tier_gate: solo
      - slug: growth-product-hunt-launch
        path: solo/marketing/gtm-strategist/growth-product-hunt-launch
        required: true
        tier_gate: solo
    outputs:
      - "Measurement readout (1 page)"
    decision_gate: "Advance when readout passes a peer sniff-test against confounders."
  - name: "Iterate-or-close"
    intent: "Decide: continue, kill, or hand off to BAU."
    tasks:
      - "Hold the retro on what shipped vs what was planned"
      - "Decide continue / pivot / kill / hand-off in writing"
      - "If continue: define next 30-day milestone with metrics"
    methodologies:
      - slug: growth-influencer-marketing
        path: pro/marketing/gtm-strategist/growth-influencer-marketing
        required: true
        tier_gate: pro
      - slug: growth-reddit-marketing
        path: solo/marketing/content-marketer/growth-reddit-marketing
        required: true
        tier_gate: solo
      - slug: growth-social-media-strategy
        path: solo/marketing/smm-manager/growth-social-media-strategy
        required: true
        tier_gate: solo
    outputs:
      - "Decision doc with next steps"
    decision_gate: "Required output: a written decision; no \"let's see\"."

