# =============================================================================
# PLAYBOOK v2 — Customer demo / sneak-peek session
# Group: role-product-manager | Tier: solo | Complexity: medium
# =============================================================================

slug: customer-demo-sneak-peek-session
title: "Customer demo / sneak-peek session"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: d8b62cafb5102573

tier_min: solo
complexity: medium
context: ['solo', 'team']
persona: role-product-manager
group: role-product-manager

summary: "A 30-minute demo for 3-10 design partners runs cleanly; structured feedback is captured against 3 hypotheses; follow-ups are filed within 48 hours."

intent: |
  A 30-minute demo for 3-10 design partners runs cleanly; structured feedback is captured against 3 hypotheses; follow-ups are filed within 48 hours.

scope: |
  A 30-minute demo for 3-10 design partners runs cleanly; structured feedback is captured against 3 hypotheses; follow-ups are filed within 48 hours.

methodology_refs:
  - pro/product/product-manager/feedback-management
  - pro/research/researcher/user-research-at-scale
  - solo/product/product-manager/continuous-discovery
  - solo/research/researcher/feature-discovery
  - solo/research/researcher/problem-validation

success_criteria:
  - "3 sharp hypotheses with confirm/refute criteria"
  - "3+ design partners attended"
  - "Hypothesis × partner feedback grid completed"
  - "Follow-ups filed and partners thanked within 48h"

stages:
  - name: "Pick hypotheses"
    intent: "Walk in with 3 explicit hypotheses to test."
    tasks:
      - "Write 3 sharp hypotheses the demo will pressure-test"
      - "Map each hypothesis to a moment in the demo flow"
      - "Define what 'confirm' and 'refute' look like for each"
    methodologies:
      - slug: problem-validation
        path: solo/research/researcher/problem-validation
        required: true
        tier_gate: solo
    outputs:
      - "3-hypothesis demo plan"
    decision_gate: "Advance when each hypothesis has explicit confirm/refute signals."
  - name: "Recruit partners"
    intent: "Pick 3-10 partners that span the target use cases."
    tasks:
      - "Invite design partners matching the target segments"
      - "Confirm attendance + role + use case"
      - "Send the recording-consent note"
    methodologies:
      - slug: user-research-at-scale
        path: pro/research/researcher/user-research-at-scale
        required: true
        tier_gate: pro
    outputs:
      - "Confirmed attendee list"
    decision_gate: "Advance when 3+ partners are confirmed."
  - name: "Run demo"
    intent: "Run the demo as a probe, not a pitch."
    tasks:
      - "Demo the flow tied to the hypotheses, not the full product"
      - "Pause after each hypothesis-moment for reactions"
      - "Avoid 'leading' questions"
    methodologies:
      - slug: feature-discovery
        path: solo/research/researcher/feature-discovery
        required: true
        tier_gate: solo
      - slug: continuous-discovery
        path: solo/product/product-manager/continuous-discovery
        required: true
        tier_gate: solo
    outputs:
      - "Session recording"
    decision_gate: "Advance when each hypothesis-moment has a clear partner reaction logged."
  - name: "Capture feedback"
    intent: "Tag feedback per hypothesis live."
    tasks:
      - "Use a feedback grid (hypothesis × partner)"
      - "Mark each cell as confirm / refute / neutral"
      - "Capture verbatim quotes"
    methodologies:
      - slug: feedback-management
        path: pro/product/product-manager/feedback-management
        required: true
        tier_gate: pro
    outputs:
      - "Hypothesis × partner feedback grid"
    decision_gate: "Advance when every hypothesis has a row of partner reactions."
  - name: "File follow-ups"
    intent: "Convert reactions into product actions within 48 hours."
    tasks:
      - "Decide per hypothesis: confirmed, refuted, iterate"
      - "File backlog items per decision"
      - "Send partners a 'thanks + here's what we heard' note"
    methodologies:
      - slug: feedback-management
        path: pro/product/product-manager/feedback-management
        required: true
        tier_gate: pro
      - slug: continuous-discovery
        path: solo/product/product-manager/continuous-discovery
        required: true
        tier_gate: solo
    outputs:
      - "Follow-up actions + partner thank-you"
    decision_gate: "Required: every hypothesis exits with a confirmed/refuted/iterate verdict."

token_budget_estimate: 14000

cli_invocations:
  human:  "faion get-content customer-demo-sneak-peek-session --format md"
  agent:  "faion get-content customer-demo-sneak-peek-session --format context"
  json:   "faion get-content customer-demo-sneak-peek-session --format json"

