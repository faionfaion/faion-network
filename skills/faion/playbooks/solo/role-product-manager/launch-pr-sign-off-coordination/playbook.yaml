# =============================================================================
# PLAYBOOK v2 — Launch PR sign-off + coordination
# Group: role-product-manager | Tier: solo | Complexity: deep
# =============================================================================

slug: launch-pr-sign-off-coordination
title: "Launch PR sign-off + coordination"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 028a9de24f56643a

tier_min: solo
complexity: deep
context: ['solo', 'team']
persona: role-product-manager
group: role-product-manager

summary: "Feature or release ships with the launch-readiness checklist green, comms drafted, metrics instrumented, and a rollback path documented."

intent: |
  Feature or release ships with the launch-readiness checklist green, comms drafted, metrics instrumented, and a rollback path documented.

scope: |
  Feature or release ships with the launch-readiness checklist green, comms drafted, metrics instrumented, and a rollback path documented.

methodology_refs:
  - pro/product/product-manager/competitive-positioning
  - pro/product/product-manager/experimentation-at-scale
  - pro/product/product-manager/feedback-management
  - pro/product/product-manager/release-planning
  - pro/product/product-manager/stakeholder-management
  - solo/product/product-manager/product-launch
  - solo/product/product-operations/product-analytics

success_criteria:
  - "Readiness checklist green across functions"
  - "Comms kit reviewed and signed off"
  - "Launch dashboard receiving live events"
  - "Rollback rehearsed end-to-end"
  - "72h checkpoint note delivered"

stages:
  - name: "Readiness checklist"
    intent: "Walk every function to green before the launch window."
    tasks:
      - "Confirm engineering ship-readiness (tests, feature flag, rollback path)"
      - "Confirm support has FAQ + triage scripts"
      - "Confirm marketing has the launch comms drafted"
    methodologies:
      - slug: release-planning
        path: pro/product/product-manager/release-planning
        required: true
        tier_gate: pro
      - slug: stakeholder-management
        path: pro/product/product-manager/stakeholder-management
        required: true
        tier_gate: pro
    outputs:
      - "Readiness checklist with green/red per function"
    decision_gate: "Advance when every function is green or has a named owner working a red item."
  - name: "Comms draft"
    intent: "Draft the launch comms across channels."
    tasks:
      - "Draft the blog post + email + in-app message"
      - "Pressure-test against positioning"
      - "Get one reviewer per channel"
    methodologies:
      - slug: competitive-positioning
        path: pro/product/product-manager/competitive-positioning
        required: true
        tier_gate: pro
      - slug: stakeholder-management
        path: pro/product/product-manager/stakeholder-management
        required: true
        tier_gate: pro
    outputs:
      - "Comms kit (blog + email + in-app)"
    decision_gate: "Advance when each comm has a reviewer sign-off."
  - name: "Instrument metrics"
    intent: "Confirm the launch is measurable."
    tasks:
      - "Wire instrumentation for the primary metric"
      - "Stage a test event end-to-end"
      - "Build a launch dashboard"
    methodologies:
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
      - slug: experimentation-at-scale
        path: pro/product/product-manager/experimentation-at-scale
        required: true
        tier_gate: pro
    outputs:
      - "Live launch dashboard"
    decision_gate: "Advance when the dashboard receives test events."
  - name: "Rollback path"
    intent: "Document and rehearse the rollback."
    tasks:
      - "Document the rollback steps"
      - "Rehearse the rollback on staging"
      - "Name the on-call who will pull the trigger"
    methodologies:
      - slug: release-planning
        path: pro/product/product-manager/release-planning
        required: true
        tier_gate: pro
    outputs:
      - "Rollback runbook + named on-call"
    decision_gate: "Advance when rollback was rehearsed end-to-end."
  - name: "Sign-off + ship"
    intent: "Final sign-offs and ship."
    tasks:
      - "Collect sign-off from product, eng, marketing, support"
      - "Open a launch chat room"
      - "Ship at the scheduled launch window"
    methodologies:
      - slug: stakeholder-management
        path: pro/product/product-manager/stakeholder-management
        required: true
        tier_gate: pro
      - slug: product-launch
        path: solo/product/product-manager/product-launch
        required: true
        tier_gate: solo
    outputs:
      - "Sign-off log + launch chat room"
    decision_gate: "Advance when every stakeholder signed off in writing."
  - name: "72h watch"
    intent: "Watch the launch closely for the first 72 hours."
    tasks:
      - "Watch the launch dashboard hourly for the first 24h"
      - "Triage incoming feedback in the launch chat room"
      - "Convene a 72h post-launch checkpoint"
    methodologies:
      - slug: feedback-management
        path: pro/product/product-manager/feedback-management
        required: true
        tier_gate: pro
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
    outputs:
      - "72h watch log + checkpoint notes"
    decision_gate: "Required: a written 72h checkpoint note."

token_budget_estimate: 14000

cli_invocations:
  human:  "faion get-content launch-pr-sign-off-coordination --format md"
  agent:  "faion get-content launch-pr-sign-off-coordination --format context"
  json:   "faion get-content launch-pr-sign-off-coordination --format json"

