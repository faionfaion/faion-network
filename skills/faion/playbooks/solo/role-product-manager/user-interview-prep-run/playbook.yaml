# =============================================================================
# PLAYBOOK v2 — User interview prep and run
# Group: role-product-manager | Tier: solo | Complexity: medium
# =============================================================================

slug: user-interview-prep-run
title: "User interview prep and run"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: a50092972020a13d

tier_min: solo
complexity: medium
context: ['solo', 'team']
persona: role-product-manager
group: role-product-manager

summary: "One interview executed with a structured guide, recording and transcript stored, 5-10 atomic insights tagged into a JTBD or opportunity tree within 24 hours."

intent: |
  One interview executed with a structured guide, recording and transcript stored, 5-10 atomic insights tagged into a JTBD or opportunity tree within 24 hours.

scope: |
  One interview executed with a structured guide, recording and transcript stored, 5-10 atomic insights tagged into a JTBD or opportunity tree within 24 hours.

methodology_refs:
  - pro/product/product-manager/continuous-discovery-habits
  - pro/research/researcher/opportunity-solution-trees
  - solo/product/product-manager/continuous-discovery
  - solo/research/researcher/jobs-to-be-done
  - solo/research/researcher/pain-point-research
  - solo/research/researcher/problem-validation
  - solo/research/researcher/user-interviews

success_criteria:
  - "Single-line research goal + structured guide"
  - "Session recorded with consent"
  - "5-10 atomic insights tagged within 24h"
  - "Explicit next-cohort decision"

stages:
  - name: "Prep"
    intent: "Walk into the interview with a single focused goal."
    tasks:
      - "Write one research question the session must answer"
      - "Draft a 5-question guide with follow-up probes"
      - "Confirm recording and consent paperwork"
    methodologies:
      - slug: continuous-discovery-habits
        path: pro/product/product-manager/continuous-discovery-habits
        required: true
        tier_gate: pro
      - slug: user-interviews
        path: solo/research/researcher/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "1-question goal + interview guide"
    decision_gate: "Advance when goal fits on a single line and the guide has follow-up probes."
  - name: "Recruit + confirm"
    intent: "Make sure the participant matches the segment and shows up."
    tasks:
      - "Verify the participant matches the target segment"
      - "Send the consent + recording note 24h ahead"
      - "Send a reminder 1h ahead"
    methodologies:
      - slug: user-interviews
        path: solo/research/researcher/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "Confirmed participant + consent record"
    decision_gate: "Advance when the participant has confirmed and consented in writing."
  - name: "Run"
    intent: "Run the session as discovery, not sales."
    tasks:
      - "Open with the participant's recent past, not your product"
      - "Probe with 'tell me about the last time…'"
      - "Resist demoing or pitching"
    methodologies:
      - slug: user-interviews
        path: solo/research/researcher/user-interviews
        required: true
        tier_gate: solo
      - slug: continuous-discovery
        path: solo/product/product-manager/continuous-discovery
        required: true
        tier_gate: solo
      - slug: pain-point-research
        path: solo/research/researcher/pain-point-research
        required: true
        tier_gate: solo
    outputs:
      - "Session recording + transcript"
    decision_gate: "Advance when the session ends with the participant having spoken more than the PM."
  - name: "Tag insights"
    intent: "Convert raw transcript into atomic, taggable insights."
    tasks:
      - "Extract 5-10 atomic insights (one fact per line)"
      - "Tag each insight against JTBD and the opportunity tree"
      - "File any product-affecting insight into the backlog"
    methodologies:
      - slug: jobs-to-be-done
        path: solo/research/researcher/jobs-to-be-done
        required: true
        tier_gate: solo
      - slug: opportunity-solution-trees
        path: pro/research/researcher/opportunity-solution-trees
        required: true
        tier_gate: pro
    outputs:
      - "5-10 tagged insights"
    decision_gate: "Advance when every insight is one fact (no compound claims)."
  - name: "Decide next cohort"
    intent: "Use the insight pattern to pick who you talk to next."
    tasks:
      - "Compare insights against prior 4 interviews"
      - "Pick one segment to recruit next"
      - "Adjust the guide if a saturation pattern is emerging"
    methodologies:
      - slug: problem-validation
        path: solo/research/researcher/problem-validation
        required: true
        tier_gate: solo
      - slug: opportunity-solution-trees
        path: pro/research/researcher/opportunity-solution-trees
        required: true
        tier_gate: pro
    outputs:
      - "Next-cohort decision + guide update"
    decision_gate: "Required: an explicit next-cohort decision (continue, switch, saturate)."

token_budget_estimate: 14000

cli_invocations:
  human:  "faion get-content user-interview-prep-run --format md"
  agent:  "faion get-content user-interview-prep-run --format context"
  json:   "faion get-content user-interview-prep-run --format json"

