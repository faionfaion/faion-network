slug: sprint-planning-prep-with-engineering
title: "Sprint planning prep with engineering"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 28d55887c41bbb19

tier_min: solo
complexity: medium
context: ['solo', 'team']
persona: role-product-manager
group: role-product-manager

summary: "Sprint top-N ranked, each item is acceptance-criteria + story-pointed-ready, dependencies surfaced; the planning meeting runs in 45 minutes instead of 2 hours."

intent: |
  Sprint top-N ranked, each item is acceptance-criteria + story-pointed-ready, dependencies surfaced; the planning meeting runs in 45 minutes instead of 2 hours.

scope: |
  Sprint top-N ranked, each item is acceptance-criteria + story-pointed-ready, dependencies surfaced; the planning meeting runs in 45 minutes instead of 2 hours.

methodology_refs:
  - pro/pm/pm-agile/kanban-scaled-agile-ceremonies
  - pro/pm/pm-agile/scrum-ceremonies
  - pro/product/product-manager/stakeholder-management
  - solo/pm/pm-agile/linear-issue-tracking
  - solo/product/product-manager/backlog-management
  - solo/product/product-manager/feature-prioritization-rice
  - solo/product/product-operations/backlog-management

success_criteria:
  - "Draft top-N fits realistic capacity"
  - "Every shortlisted item has acceptance criteria"
  - "Every dependency has an owner"
  - "Walk-in 1-pager sent 24h ahead"

stages:
  - name: "Pre-rank"
    intent: "Bring a draft top-N before planning."
    tasks:
      - "Pull RICE-scored backlog top 15"
      - "Trim to top N that fits realistic capacity"
      - "Note carry-over items from last sprint"
    methodologies:
      - slug: feature-prioritization-rice
        path: solo/product/product-manager/feature-prioritization-rice
        required: true
        tier_gate: solo
      - slug: backlog-management
        path: solo/product/product-manager/backlog-management
        required: true
        tier_gate: solo
    outputs:
      - "Draft top-N list"
    decision_gate: "Advance when the draft list fits a realistic capacity estimate."
  - name: "Sharpen acceptance criteria"
    intent: "Every item must be AC-ready before the meeting."
    tasks:
      - "For each item, write AC in given/when/then form"
      - "Flag items that fail an AC quality check"
      - "Send the flagged items back to refinement"
    methodologies:
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
      - slug: backlog-management
        path: solo/product/product-operations/backlog-management
        required: true
        tier_gate: solo
    outputs:
      - "AC-ready item list"
    decision_gate: "Advance when every shortlisted item has AC."
  - name: "Surface dependencies"
    intent: "Cross-team or cross-item dependencies should not surprise planning."
    tasks:
      - "Mark cross-team dependencies on each item"
      - "Reach out to each dependency owner ahead of planning"
      - "Note any item blocked by an external dependency"
    methodologies:
      - slug: kanban-scaled-agile-ceremonies
        path: pro/pm/pm-agile/kanban-scaled-agile-ceremonies
        required: true
        tier_gate: pro
      - slug: stakeholder-management
        path: pro/product/product-manager/stakeholder-management
        required: true
        tier_gate: pro
    outputs:
      - "Dependency annotations"
    decision_gate: "Advance when every dependency has an owner and an expected resolution date."
  - name: "Pre-size"
    intent: "Get a rough story point read before the room."
    tasks:
      - "Walk top 5 items with the tech lead pre-meeting"
      - "Capture initial estimates as a sanity check"
      - "Re-trim the top-N if estimates blow capacity"
    methodologies:
      - slug: linear-issue-tracking
        path: solo/pm/pm-agile/linear-issue-tracking
        required: true
        tier_gate: solo
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
    outputs:
      - "Pre-sized top-N"
    decision_gate: "Advance when capacity vs estimate has a realistic margin."
  - name: "Walk-in deck"
    intent: "Show up to planning with a 1-pager."
    tasks:
      - "Build a 1-page walk-in: goal, top-N, dependencies, risks"
      - "Send the 1-pager 24h ahead of the meeting"
      - "Open the meeting by reading the 1-pager"
    methodologies:
      - slug: stakeholder-management
        path: pro/product/product-manager/stakeholder-management
        required: true
        tier_gate: pro
      - slug: linear-issue-tracking
        path: solo/pm/pm-agile/linear-issue-tracking
        required: true
        tier_gate: solo
    outputs:
      - "Sprint walk-in 1-pager"
    decision_gate: "Required: the planning meeting opens with the 1-pager on screen."

token_budget_estimate: 14000

