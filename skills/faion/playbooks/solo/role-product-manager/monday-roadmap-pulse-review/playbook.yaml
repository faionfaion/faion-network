slug: monday-roadmap-pulse-review
title: "Monday roadmap pulse review"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 981662c2db4a89d4

tier_min: solo
complexity: light
context: ['solo', 'team']
persona: role-product-manager
group: role-product-manager

summary: "Roadmap re-aligned with last week's signals; 2-3 swimlane bets reconfirmed or flagged; deltas posted to Linear/Productboard; async note shipped to founders + EM by end of day."

intent: |
  Roadmap re-aligned with last week's signals; 2-3 swimlane bets reconfirmed or flagged; deltas posted to Linear/Productboard; async note shipped to founders + EM by end of day.

scope: |
  Roadmap re-aligned with last week's signals; 2-3 swimlane bets reconfirmed or flagged; deltas posted to Linear/Productboard; async note shipped to founders + EM by end of day.

methodology_refs:
  - pro/product/product-manager/stakeholder-management
  - solo/product/product-manager/feature-prioritization-rice
  - solo/product/product-manager/okr-setting
  - solo/product/product-manager/outcome-based-roadmaps
  - solo/product/product-manager/roadmap-design
  - solo/product/product-operations/product-analytics

success_criteria:
  - "Half-page weekly signals digest produced"
  - "Every active bet has a confirm/refute/wait status"
  - "Async broadcast sent by end of day Monday"
  - "Drift result recorded for the quarter"

stages:
  - name: "Signal scan"
    intent: "Pull last week's signals before touching the roadmap."
    tasks:
      - "Skim metrics dashboard for deltas vs target"
      - "Skim support and sales notes for emerging themes"
      - "Note any external news (competitor, regulation)"
    methodologies:
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
    outputs:
      - "Signals digest (max half a page)"
    decision_gate: "Advance when the digest fits on half a page."
  - name: "Bet review"
    intent: "Re-confirm each swimlane bet against the signals."
    tasks:
      - "For each active bet, ask: do this week's signals confirm or refute it?"
      - "Flag bets with refute-signals; reconfirm bets with confirm-signals"
      - "Tag bets that need more data"
    methodologies:
      - slug: feature-prioritization-rice
        path: solo/product/product-manager/feature-prioritization-rice
        required: true
        tier_gate: solo
      - slug: outcome-based-roadmaps
        path: solo/product/product-manager/outcome-based-roadmaps
        required: true
        tier_gate: solo
      - slug: roadmap-design
        path: solo/product/product-manager/roadmap-design
        required: true
        tier_gate: solo
    outputs:
      - "Bet status table (confirm / refute / wait)"
    decision_gate: "Advance when every active bet has a one-word status."
  - name: "Delta application"
    intent: "Apply roadmap deltas in the tracker."
    tasks:
      - "Move refuted bets to parking lot with reason"
      - "Promote any confirm-signals item from later to next"
      - "Re-rank Next by RICE if any new info changed inputs"
    methodologies:
      - slug: feature-prioritization-rice
        path: solo/product/product-manager/feature-prioritization-rice
        required: true
        tier_gate: solo
      - slug: roadmap-design
        path: solo/product/product-manager/roadmap-design
        required: true
        tier_gate: solo
    outputs:
      - "Updated roadmap snapshot"
    decision_gate: "Advance when tracker matches the bet status table."
  - name: "Async broadcast"
    intent: "Send the weekly PM note."
    tasks:
      - "Draft a 5-bullet broadcast: deltas, asks, blockers, decisions needed, next-week focus"
      - "Address it to founders + EM + design lead"
      - "Send by end of day Monday"
    methodologies:
      - slug: stakeholder-management
        path: pro/product/product-manager/stakeholder-management
        required: true
        tier_gate: pro
      - slug: okr-setting
        path: solo/product/product-manager/okr-setting
        required: true
        tier_gate: solo
    outputs:
      - "Weekly PM async broadcast (5 bullets)"
    decision_gate: "Advance when broadcast is sent and acknowledged."
  - name: "Drift sanity check"
    intent: "Run a quick drift detector against OKRs."
    tasks:
      - "Compare top-3 in-flight items against the quarter's OKRs"
      - "Flag any item not tied to an OKR for kill or re-justify"
      - "Log the drift result for the quarterly retro"
    methodologies:
      - slug: okr-setting
        path: solo/product/product-manager/okr-setting
        required: true
        tier_gate: solo
      - slug: roadmap-design
        path: solo/product/product-manager/roadmap-design
        required: true
        tier_gate: solo
    outputs:
      - "Drift flag list"
    decision_gate: "Required: a written drift result (even if zero items flagged)."

token_budget_estimate: 14000

cli_invocations:
  human:  "faion get-content monday-roadmap-pulse-review --format md"
  agent:  "faion get-content monday-roadmap-pulse-review --format context"
  json:   "faion get-content monday-roadmap-pulse-review --format json"

