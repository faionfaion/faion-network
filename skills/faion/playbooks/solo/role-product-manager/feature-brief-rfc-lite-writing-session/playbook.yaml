# =============================================================================
# PLAYBOOK v2 — Feature brief / RFC-lite writing session
# Group: role-product-manager | Tier: solo | Complexity: medium
# =============================================================================

slug: feature-brief-rfc-lite-writing-session
title: "Feature brief / RFC-lite writing session"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: aa0ee212dec1d60e

tier_min: solo
complexity: medium
context: ['solo', 'team']
persona: role-product-manager
group: role-product-manager

summary: "One feature spec written end-to-end: problem, users, success metric, scope, out-of-scope, open questions; ready for engineering and design review."

intent: |
  One feature spec written end-to-end: problem, users, success metric, scope, out-of-scope, open questions; ready for engineering and design review.

scope: |
  One feature spec written end-to-end: problem, users, success metric, scope, out-of-scope, open questions; ready for engineering and design review.

methodology_refs:
  - pro/product/product-manager/stakeholder-management
  - pro/research/researcher/opportunity-solution-trees
  - solo/product/product-manager/mvp-scoping
  - solo/product/product-manager/product-discovery
  - solo/product/product-manager/product-launch
  - solo/product/product-manager/spec-writing
  - solo/product/product-manager/user-story-mapping
  - solo/research/researcher/success-metrics-definition

success_criteria:
  - "Problem framed in user terms with evidence"
  - "One primary metric with target band"
  - "Explicit non-goals list"
  - "Acceptance criteria per scope item"

stages:
  - name: "Problem"
    intent: "Frame the problem in user terms, not solution terms."
    tasks:
      - "Write a one-paragraph problem statement"
      - "Name the user segment that owns the pain"
      - "Cite at least 2 evidence sources (interview, ticket, data)"
    methodologies:
      - slug: product-discovery
        path: solo/product/product-manager/product-discovery
        required: true
        tier_gate: solo
      - slug: opportunity-solution-trees
        path: pro/research/researcher/opportunity-solution-trees
        required: true
        tier_gate: pro
    outputs:
      - "Problem section"
    decision_gate: "Advance when the problem is user-framed and evidenced."
  - name: "Success metric"
    intent: "Lock the metric the feature must move."
    tasks:
      - "Pick one primary metric tied to the problem"
      - "Define the target band and read window"
      - "Identify a guardrail metric"
    methodologies:
      - slug: success-metrics-definition
        path: solo/research/researcher/success-metrics-definition
        required: true
        tier_gate: solo
    outputs:
      - "Success-metric section"
    decision_gate: "Advance when the metric is one number with a target band."
  - name: "Scope cuts"
    intent: "Define what is in and out explicitly."
    tasks:
      - "List the must-have user flows"
      - "List the explicit non-goals"
      - "Cut to the smallest scope that moves the metric"
    methodologies:
      - slug: mvp-scoping
        path: solo/product/product-manager/mvp-scoping
        required: true
        tier_gate: solo
      - slug: user-story-mapping
        path: solo/product/product-manager/user-story-mapping
        required: true
        tier_gate: solo
    outputs:
      - "Scope + non-goals sections"
    decision_gate: "Advance when the non-goals list is non-empty and concrete."
  - name: "Open questions"
    intent: "Surface the unknowns before review, not during."
    tasks:
      - "List engineering unknowns"
      - "List design unknowns"
      - "Assign an owner to each open question"
    methodologies:
      - slug: stakeholder-management
        path: pro/product/product-manager/stakeholder-management
        required: true
        tier_gate: pro
      - slug: opportunity-solution-trees
        path: pro/research/researcher/opportunity-solution-trees
        required: true
        tier_gate: pro
    outputs:
      - "Open-questions section"
    decision_gate: "Advance when each open question has an owner and a check-back date."
  - name: "Acceptance + handoff"
    intent: "Make the spec engineering-ready."
    tasks:
      - "Write acceptance criteria per scope item"
      - "Walk the spec with engineering + design"
      - "Update based on feedback in one revision pass"
    methodologies:
      - slug: spec-writing
        path: solo/product/product-manager/spec-writing
        required: true
        tier_gate: solo
      - slug: product-launch
        path: solo/product/product-manager/product-launch
        required: true
        tier_gate: solo
    outputs:
      - "Accepted spec (RFC-lite)"
    decision_gate: "Required: a written 'accepted' note from at least one engineer and one designer."

token_budget_estimate: 14000

cli_invocations:
  human:  "faion get-content feature-brief-rfc-lite-writing-session --format md"
  agent:  "faion get-content feature-brief-rfc-lite-writing-session --format context"
  json:   "faion get-content feature-brief-rfc-lite-writing-session --format json"

