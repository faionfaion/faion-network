title: "Update the burndown / burnup and decide one corrective action"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 89ecf3ec997f09c2

tier_min: solo
complexity: light
context: ['solo', 'team']
persona: role-project-manager
group: role-project-manager

summary: "A daily ~15-minute ritual: refresh the chart, read the slope, choose exactly one corrective lever (re-scope, re-assign, raise risk, or do nothing on purpose)."

intent: |
  A daily ~15-minute ritual: refresh the chart, read the slope, choose exactly one corrective lever (re-scope, re-assign, raise risk, or do nothing on purpose).

scope: |
  A daily ~15-minute ritual: refresh the chart, read the slope, choose exactly one corrective lever (re-scope, re-assign, raise risk, or do nothing on purpose).

methodology_refs:
  - pro/pm/project-manager/predictive-analytics-pm
  - pro/pm/pm-agile/reporting-basics
  - pro/pm/pm-traditional/change-control
  - pro/pm/pm-traditional/communications-management
  - pro/pm/pm-traditional/risk-register
  - pro/pm/project-manager/jira-workflow-management
  - solo/pm/pm-agile/dashboard-setup

success_criteria:
  - "Chart refreshed daily and current"
  - "Slope direction named with evidence"
  - "Exactly one corrective lever chosen"
  - "Lever communicated within 1 hour"

stages:
  - name: "Refresh the chart"
    intent: "Ensure the chart reflects today, not yesterday."
    tasks:
      - "Pull current status from Jira / tracker"
      - "Verify scope baseline has not drifted"
      - "Refresh the chart"
    methodologies:
      - slug: jira-workflow-management
        path: pro/pm/project-manager/jira-workflow-management
        required: true
        tier_gate: pro
      - slug: dashboard-setup
        path: solo/pm/pm-agile/dashboard-setup
        required: true
        tier_gate: solo
    outputs:
      - "Refreshed burndown/burnup chart"
    decision_gate: "Advance when the chart is current."
  - name: "Read the slope"
    intent: "Read the line, not the headline."
    tasks:
      - "Compare actual slope vs ideal line"
      - "Identify whether the gap is widening, stable, or closing"
      - "Note any inflection in the last 3 data points"
    methodologies:
      - slug: predictive-analytics-pm
        path: pro/pm/project-manager/predictive-analytics-pm
        required: true
        tier_gate: pro
      - slug: reporting-basics
        path: pro/pm/pm-agile/reporting-basics
        required: true
        tier_gate: pro
    outputs:
      - "Slope read (widening / stable / closing)"
    decision_gate: "Advance when slope direction is named with evidence."
  - name: "Pick one lever"
    intent: "Choose exactly one corrective action."
    tasks:
      - "List candidate levers: re-scope, re-assign, raise risk, do-nothing"
      - "Pick exactly one based on the slope read"
      - "Document the rationale"
    methodologies:
      - slug: change-control
        path: pro/pm/pm-traditional/change-control
        required: true
        tier_gate: pro
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
    outputs:
      - "One-lever decision note"
    decision_gate: "Advance when exactly one lever is chosen (not zero, not two)."
  - name: "Communicate the lever"
    intent: "Surface the call where it matters."
    tasks:
      - "Tell the team what is changing"
      - "Tell the client / leadership if scope or schedule moved"
      - "Update the risk register if 'raise risk' was the lever"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
    outputs:
      - "Lever-broadcast record"
    decision_gate: "Required: the chosen lever is communicated within 1 hour."

