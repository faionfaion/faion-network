slug: async-cross-timezone-delivery-cadence-p4-outsource
title: "Async cross-timezone delivery cadence (P4 outsource)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 24345646819600cf

tier: solo
tier_min: solo
group: role-project-manager
persona: PM on a P4 outsource engagement with <2h overlap between dev team and client
complexity: medium
context: [outsource]

summary: |
  Sustainable ceremony rhythm when PM, dev, and client overlap <2h/day: standups, planning, demos, retros, status all running async-first.

intent: |
  Sync-first ceremony chaos -> async-first rhythm with sync events only when blocking.

scope: |
  PM is running a P4 outsource engagement where the dev team and client share <2h overlap. This playbook sets up the recurring cadence: async standups, async sprint planning, recorded demos, async retros, and an AI-assisted client status digest. Sync events are scheduled only when a decision is blocked. Done when one full sprint has completed without a missed deliverable and the client opted into the async cadence.

success_criteria:
  - "All five ceremonies running async-first for one full sprint"
  - "Sync events restricted to blocking decisions (<2 per sprint)"
  - "Client confirms async cadence is acceptable in writing"
  - "No deliverable missed during the first async sprint"

methodology_refs:
  - faion/knowledge/geek/pm/pm-agile/ai-in-project-management
  - faion/knowledge/geek/pm/pm-agile/ai-powered-pm-tools
  - faion/knowledge/pro/pm/pm-agile/kanban-scaled-agile-ceremonies
  - faion/knowledge/pro/pm/pm-agile/scrum-ceremonies
  - faion/knowledge/pro/pm/pm-traditional/communications-management
  - faion/knowledge/pro/pm/project-manager/agile-ceremonies-setup

stages:
  - name: "Map overlap"
    intent: "Know exactly when sync is even possible."
    tasks:
      - "Plot working hours per person across all timezones"
      - "Identify the realistic overlap window"
      - "Mark non-overlap blocks as async-only territory"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Timezone-overlap chart"
    decision_gate: |
      Advance only after the team agrees on the overlap window.
  - name: "Convert standups"
    intent: "Daily standup as written thread, not a meeting."
    tasks:
      - "Stand up a daily async-standup thread in Slack/Teams"
      - "Template: yesterday / today / blockers"
      - "Require posts before each contributor's local 11:00"
    methodologies:
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
      - slug: agile-ceremonies-setup
        path: pro/pm/project-manager/agile-ceremonies-setup
        required: true
        tier_gate: pro
    outputs:
      - "Async-standup thread running daily"
    decision_gate: |
      Advance when 5 consecutive days have full participation.
  - name: "Convert planning + retros"
    intent: "Sprint planning and retro across timezones without a 2h meeting."
    tasks:
      - "Pre-fill sprint plan template; team comments + votes async over 24h"
      - "Run async retro with structured prompts collected over 48h"
      - "Reserve 30 min sync only for unresolved planning conflicts"
    methodologies:
      - slug: kanban-scaled-agile-ceremonies
        path: pro/pm/pm-agile/kanban-scaled-agile-ceremonies
        required: true
        tier_gate: pro
      - slug: agile-ceremonies-setup
        path: pro/pm/project-manager/agile-ceremonies-setup
        required: true
        tier_gate: pro
    outputs:
      - "Sprint plan + retro completed async"
    decision_gate: |
      Advance only when first cycle of async planning + retro completes inside SLA.
  - name: "Recorded demos"
    intent: "Client sees progress on their own time."
    tasks:
      - "Record 5-10 min Loom-style demo at end of sprint"
      - "Post in client channel with embedded next-step questions"
      - "Schedule sync demo only if client requests decisions"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
    outputs:
      - "Recorded demo + question prompts"
    decision_gate: |
      Advance when client responds to demo without requesting a sync call.
  - name: "AI status digest"
    intent: "Weekly client status assembled by AI from artifacts."
    tasks:
      - "Configure AI pipeline to pull standup threads + Jira deltas"
      - "Auto-draft weekly status; PM reviews + signs"
      - "Deliver to client on a fixed day/time"
    methodologies:
      - slug: ai-in-project-management
        path: geek/pm/pm-agile/ai-in-project-management
        required: true
        tier_gate: geek
      - slug: ai-powered-pm-tools
        path: geek/pm/pm-agile/ai-powered-pm-tools
        required: true
        tier_gate: geek
    outputs:
      - "Weekly AI-assisted status report"
    decision_gate: |
      Advance when client accepts the digest as the primary status channel.
  - name: "Lock cadence"
    intent: "Get explicit client opt-in so the cadence sticks."
    tasks:
      - "Document the async cadence in the engagement charter"
      - "Get written client acceptance"
      - "Schedule a 30-day check-in to recalibrate"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: agile-ceremonies-setup
        path: pro/pm/project-manager/agile-ceremonies-setup
        required: true
        tier_gate: pro
    outputs:
      - "Updated charter with client acceptance"
    decision_gate: |
      Done when charter is signed and 30-day check-in is on the calendar.

common_pitfalls:
  - "Treating async as 'whenever' -> threads stall, decisions slip"
  - "Hidden sync calls between PM + one timezone -> other timezone feels excluded"
  - "Skipping the AI status digest -> client demands more meetings"

quality_checklist:
  - "Did the team complete one sprint without missing a deliverable?"
  - "Did the client agree in writing that async is working?"
  - "Are sync calls limited to genuinely blocking decisions?"

related_playbooks:
  - run-an-escalation-conversation-with-a-stakeholder
  - ai-assisted-sprint-planning-with-capacity-reality-check

