# PLAYBOOK v2 — Run a 15-minute daily standup that surfaces blockers, not status
# Group: role-project-manager | Tier: solo | Complexity: light
# =============================================================================

slug: run-a-15-minute-daily-standup-that-surfaces-blockers-not-status
title: "Run a 15-minute daily standup that surfaces blockers, not status"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: e1f970b871d22bc2

tier_min: solo
complexity: light
context: ['solo', 'team']
persona: role-project-manager
group: role-project-manager

summary: "A tight 15-minute ceremony where each contributor names yesterday's done, today's plan, and a real blocker; the PM exits with a refreshed blocker list and at most one parking-lot follow-up scheduled."

intent: |
  A tight 15-minute ceremony where each contributor names yesterday's done, today's plan, and a real blocker; the PM exits with a refreshed blocker list and at most one parking-lot follow-up scheduled.

scope: |
  A tight 15-minute ceremony where each contributor names yesterday's done, today's plan, and a real blocker; the PM exits with a refreshed blocker list and at most one parking-lot follow-up scheduled.

methodology_refs:
  - pro/pm/pm-agile/kanban-scaled-agile-ceremonies
  - pro/pm/pm-agile/scrum-ceremonies
  - pro/pm/pm-traditional/communications-management
  - pro/pm/project-manager/agile-ceremonies-setup
  - solo/pm/pm-agile/dashboard-setup
  - solo/pm/project-manager/clickup-setup

success_criteria:
  - "Pre-walk note exists before the standup"
  - "Round finishes inside 12 minutes"
  - "Zero solutioning happens in the standup itself"
  - "Refreshed blocker list published within 30 minutes"

stages:
  - name: "Pre-walk the board"
    intent: "Walk the board before the standup so the meeting is fast."
    tasks:
      - "Skim the board for items not moved in 2 days"
      - "Note any obvious blockers"
      - "Pre-draft a parking-lot list"
    methodologies:
      - slug: dashboard-setup
        path: solo/pm/pm-agile/dashboard-setup
        required: true
        tier_gate: solo
      - slug: clickup-setup
        path: solo/pm/project-manager/clickup-setup
        required: true
        tier_gate: solo
    outputs:
      - "Pre-walk note"
    decision_gate: "Advance when the pre-walk took under 5 minutes."
  - name: "Run the round"
    intent: "Each contributor: yesterday, today, blocker."
    tasks:
      - "Enforce strict 60-90 seconds per person"
      - "Cut status-only updates with a polite redirect"
      - "Capture blockers in real time"
    methodologies:
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
      - slug: kanban-scaled-agile-ceremonies
        path: pro/pm/pm-agile/kanban-scaled-agile-ceremonies
        required: true
        tier_gate: pro
    outputs:
      - "Per-person update log"
    decision_gate: "Advance when the round finishes inside 12 minutes."
  - name: "Park, don't solve"
    intent: "Hold problem-solving out of the standup."
    tasks:
      - "Drop solution discussions into the parking lot"
      - "Cap parking lot at the most urgent 1-2 items"
      - "Schedule parking-lot follow-up immediately after"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: agile-ceremonies-setup
        path: pro/pm/project-manager/agile-ceremonies-setup
        required: true
        tier_gate: pro
    outputs:
      - "Parking-lot list"
    decision_gate: "Advance when zero solutioning happened in the standup itself."
  - name: "Refresh blocker board"
    intent: "Update the public blocker list."
    tasks:
      - "Post the refreshed blocker list to the team channel"
      - "Tag owners and ETAs"
      - "Surface aging blockers (>2 days) to leadership"
    methodologies:
      - slug: dashboard-setup
        path: solo/pm/pm-agile/dashboard-setup
        required: true
        tier_gate: solo
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Updated blocker list"
    decision_gate: "Required: blocker list is published within 30 minutes of standup end."

