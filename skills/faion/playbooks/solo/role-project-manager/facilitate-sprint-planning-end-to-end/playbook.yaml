# PLAYBOOK v2 — Facilitate sprint planning end-to-end
# Group: role-project-manager | Tier: solo | Complexity: medium
# =============================================================================

slug: facilitate-sprint-planning-end-to-end
title: "Facilitate sprint planning end-to-end"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 19000ef921e5f3b1

tier_min: solo
complexity: medium
context: ['solo', 'team']
persona: role-project-manager
group: role-project-manager

summary: "A 1-hour ceremony at sprint start: confirm the goal, pull capacity-fit work, leave with a committed backlog, owner per item, and a sprint goal everyone can repeat."

intent: |
  A 1-hour ceremony at sprint start: confirm the goal, pull capacity-fit work, leave with a committed backlog, owner per item, and a sprint goal everyone can repeat.

scope: |
  A 1-hour ceremony at sprint start: confirm the goal, pull capacity-fit work, leave with a committed backlog, owner per item, and a sprint goal everyone can repeat.

methodology_refs:
  - pro/pm/pm-agile/scrum-ceremonies
  - pro/pm/pm-traditional/communications-management
  - pro/pm/pm-traditional/resource-management
  - pro/pm/pm-traditional/scope-management
  - pro/pm/project-manager/jira-workflow-management
  - pro/pm/project-manager/raci-matrix

success_criteria:
  - "Sprint goal is a one-line outcome tied to roadmap"
  - "Capacity calc has documented deductions"
  - "Every pulled item has an owner"
  - "100% of contributors can restate the goal"
  - "Sprint plan broadcast within 30 minutes"

stages:
  - name: "Lock the goal"
    intent: "Sprint goal in one sentence."
    tasks:
      - "Draft the sprint goal as a single sentence the team can repeat"
      - "Tie the goal to a roadmap outcome"
      - "Confirm with PM + tech lead"
    methodologies:
      - slug: scope-management
        path: pro/pm/pm-traditional/scope-management
        required: true
        tier_gate: pro
    outputs:
      - "Sprint goal one-liner"
    decision_gate: "Advance when the goal is one sentence and tied to an outcome."
  - name: "Capacity check"
    intent: "Lock realistic capacity for this sprint."
    tasks:
      - "Pull team capacity adjusted for PTO + meetings"
      - "Subtract sustained ops load"
      - "Lock the working capacity number"
    methodologies:
      - slug: resource-management
        path: pro/pm/pm-traditional/resource-management
        required: true
        tier_gate: pro
    outputs:
      - "Capacity calc"
    decision_gate: "Advance when capacity has explicit deductions documented."
  - name: "Pull-fit work"
    intent: "Pull from the ready queue against capacity."
    tasks:
      - "Walk the top of the AC-ready queue"
      - "Pull items until capacity is reached"
      - "Stop pulling when uncertainty rises above threshold"
    methodologies:
      - slug: jira-workflow-management
        path: pro/pm/project-manager/jira-workflow-management
        required: true
        tier_gate: pro
      - slug: scope-management
        path: pro/pm/pm-traditional/scope-management
        required: true
        tier_gate: pro
    outputs:
      - "Pulled sprint backlog"
    decision_gate: "Advance when pulled backlog fits capacity with a small buffer."
  - name: "Owners + dependencies"
    intent: "Lock who does what + what blocks what."
    tasks:
      - "Assign an owner per item"
      - "Confirm any cross-team dependencies are already commited by the other side"
      - "Flag any unassigned items as 'team-pool'"
    methodologies:
      - slug: raci-matrix
        path: pro/pm/project-manager/raci-matrix
        required: true
        tier_gate: pro
      - slug: jira-workflow-management
        path: pro/pm/project-manager/jira-workflow-management
        required: true
        tier_gate: pro
    outputs:
      - "Owner + dependency annotations"
    decision_gate: "Advance when every pulled item has an owner."
  - name: "Repeat-back ritual"
    intent: "Confirm the team can repeat the sprint goal."
    tasks:
      - "Ask each contributor to restate the sprint goal in their own words"
      - "Capture any divergence as a misalignment risk"
      - "Adjust the goal language if 2+ people diverge"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
    outputs:
      - "Goal-repeat-back log"
    decision_gate: "Advance when 100% of contributors can restate the goal."
  - name: "Broadcast + log"
    intent: "Publish the sprint plan."
    tasks:
      - "Post the sprint goal + pulled backlog to the team channel"
      - "File the plan in the canonical location"
      - "Update stakeholders on the sprint goal"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
    outputs:
      - "Sprint plan broadcast"
    decision_gate: "Required: broadcast sent within 30 minutes of planning end."

token_budget_estimate: 14000

