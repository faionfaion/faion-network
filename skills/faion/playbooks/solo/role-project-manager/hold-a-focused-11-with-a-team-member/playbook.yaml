# =============================================================================
# PLAYBOOK v2 — Hold a focused 1:1 with a team member
# Group: role-project-manager | Tier: solo | Complexity: light
# =============================================================================

slug: hold-a-focused-11-with-a-team-member
title: "Hold a focused 1:1 with a team member"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 7ad2a416a62d9a68

tier_min: solo
complexity: light
context: ['solo', 'team']
persona: role-project-manager
group: role-project-manager

summary: "A 30-min recurring 1:1 that produces (a) one growth or blocker insight, (b) one decision or commitment from the PM, (c) updated team-development notes. Not a status update — explicitly not."

intent: |
  A 30-min recurring 1:1 that produces (a) one growth or blocker insight, (b) one decision or commitment from the PM, (c) updated team-development notes. Not a status update — explicitly not.

scope: |
  A 30-min recurring 1:1 that produces (a) one growth or blocker insight, (b) one decision or commitment from the PM, (c) updated team-development notes. Not a status update — explicitly not.

methodology_refs:
  - pro/pm/pm-traditional/resource-management
  - pro/pm/pm-traditional/risk-register
  - pro/pm/pm-traditional/stakeholder-engagement
  - pro/pm/project-manager/team-development
  - solo/pm/project-manager/notion-pm

success_criteria:
  - "First 5 minutes have zero status content"
  - "One growth or blocker topic owned by them"
  - "One PM commitment written down"
  - "Per-person growth tracker updated within 24h"

stages:
  - name: "Refuse status mode"
    intent: "Set the conversation tone before the meeting starts."
    tasks:
      - "Open with a non-work question"
      - "Ban status updates explicitly ('we have the standup for that')"
      - "Frame the time as theirs to spend"
    methodologies:
      - slug: team-development
        path: pro/pm/project-manager/team-development
        required: true
        tier_gate: pro
    outputs:
      - "Tone-setting opener"
    decision_gate: "Advance when the first 5 minutes have zero status content."
  - name: "Pick one growth thread"
    intent: "One growth or blocker topic, not five."
    tasks:
      - "Surface the topic that matters most to them this week"
      - "Use a question-bank cue if needed (tenure-appropriate)"
      - "Probe with 'what would make that easier?'"
    methodologies:
      - slug: team-development
        path: pro/pm/project-manager/team-development
        required: true
        tier_gate: pro
      - slug: resource-management
        path: pro/pm/pm-traditional/resource-management
        required: true
        tier_gate: pro
    outputs:
      - "Growth/blocker topic"
    decision_gate: "Advance when the topic is named and they own framing it."
  - name: "Decide one thing"
    intent: "PM exits with one decision or commitment."
    tasks:
      - "Convert their need into one PM action"
      - "Make the commitment explicit ('I will do X by date')"
      - "Write it down on the spot"
    methodologies:
      - slug: resource-management
        path: pro/pm/pm-traditional/resource-management
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement
        path: pro/pm/pm-traditional/stakeholder-engagement
        required: true
        tier_gate: pro
    outputs:
      - "PM commitment"
    decision_gate: "Advance when the commitment is written down in their view."
  - name: "Risk + signal note"
    intent: "Capture anything risk-relevant."
    tasks:
      - "Note any retention or burnout signal"
      - "Note any project risk surfaced"
      - "File to the appropriate register"
    methodologies:
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
      - slug: resource-management
        path: pro/pm/pm-traditional/resource-management
        required: true
        tier_gate: pro
    outputs:
      - "Risk/signal note"
    decision_gate: "Advance when notes are filed in the right register (not lost in the 1:1 doc)."
  - name: "Update team-development log"
    intent: "Track patterns across 1:1s."
    tasks:
      - "Update the per-person growth tracker"
      - "Note recurring themes for quarterly review"
      - "Schedule any cross-1:1 follow-up"
    methodologies:
      - slug: team-development
        path: pro/pm/project-manager/team-development
        required: true
        tier_gate: pro
      - slug: notion-pm
        path: solo/pm/project-manager/notion-pm
        required: true
        tier_gate: solo
    outputs:
      - "Team-development log entry"
    decision_gate: "Required: per-person growth tracker updated within 24 hours."

token_budget_estimate: 14000

