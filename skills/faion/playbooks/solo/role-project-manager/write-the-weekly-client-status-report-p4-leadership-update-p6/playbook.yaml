# =============================================================================
# PLAYBOOK v2 — Write the weekly client status report / leadership update
# Group: role-project-manager | Tier: solo | Complexity: medium
# =============================================================================

slug: write-the-weekly-client-status-report-p4-leadership-update-p6
title: "Write the weekly client status report / leadership update"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 4d723b16c2cd223f

tier_min: solo
complexity: medium
context: ['solo', 'team']
persona: role-project-manager
group: role-project-manager

summary: "A single 1-page report: RAG status, delivered/planned, top 3 risks, decisions needed, EVM headline (if pro tier). Generated once a week, scannable in 60 seconds by the reader."

intent: |
  A single 1-page report: RAG status, delivered/planned, top 3 risks, decisions needed, EVM headline (if pro tier). Generated once a week, scannable in 60 seconds by the reader.

scope: |
  A single 1-page report: RAG status, delivered/planned, top 3 risks, decisions needed, EVM headline (if pro tier). Generated once a week, scannable in 60 seconds by the reader.

methodology_refs:
  - pro/pm/pm-agile/reporting-basics
  - pro/pm/pm-traditional/communications-management
  - pro/pm/pm-traditional/earned-value-management
  - pro/pm/pm-traditional/stakeholder-engagement-advanced
  - pro/pm/project-manager/raci-matrix
  - solo/pm/pm-agile/notion-pm
  - solo/pm/project-manager/reporting-dashboards

success_criteria:
  - "Report fits on one page"
  - "Every domain has a defensible RAG score"
  - "Decisions section has 1-3 explicit choices with owners"
  - "Report sent + archived same day"

stages:
  - name: "Pull the inputs"
    intent: "Gather all the source data before writing."
    tasks:
      - "Pull last week's delivered + planned items"
      - "Pull the risk register top 3"
      - "Pull EVM headline numbers if applicable"
    methodologies:
      - slug: reporting-dashboards
        path: solo/pm/project-manager/reporting-dashboards
        required: true
        tier_gate: solo
      - slug: earned-value-management
        path: pro/pm/pm-traditional/earned-value-management
        required: true
        tier_gate: pro
    outputs:
      - "Source data pack"
    decision_gate: "Advance when the pack covers all required sections."
  - name: "Score RAG"
    intent: "Score the project honestly."
    tasks:
      - "Apply the RAG policy thresholds"
      - "Set overall RAG plus per-domain (scope / schedule / cost / quality)"
      - "Document why if RAG changed from last week"
    methodologies:
      - slug: reporting-basics
        path: pro/pm/pm-agile/reporting-basics
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
    outputs:
      - "RAG scores"
    decision_gate: "Advance when every domain has a defensible RAG score."
  - name: "Draft the one-pager"
    intent: "Hit the standard report structure."
    tasks:
      - "Use the audience-appropriate template (client-friendly vs leadership-direct)"
      - "Lead with RAG + decisions needed (not 'work done')"
      - "Keep to one page"
    methodologies:
      - slug: reporting-basics
        path: pro/pm/pm-agile/reporting-basics
        required: true
        tier_gate: pro
      - slug: notion-pm
        path: solo/pm/pm-agile/notion-pm
        required: true
        tier_gate: solo
    outputs:
      - "Draft 1-pager"
    decision_gate: "Advance when the draft fits one page."
  - name: "Decisions section"
    intent: "Make 'decisions needed' explicit."
    tasks:
      - "List 1-3 decisions the reader must make"
      - "Frame each as 'decide between X and Y by date Z'"
      - "Tag the decision owner"
    methodologies:
      - slug: raci-matrix
        path: pro/pm/project-manager/raci-matrix
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Decisions section"
    decision_gate: "Advance when each decision has a binary or trinary choice and an owner."
  - name: "Send + log"
    intent: "Ship the report and store it for audit."
    tasks:
      - "Send via the canonical channel (email / Slack / portal)"
      - "File the report in the client + internal archive"
      - "Tag any decisions into the decision log"
    methodologies:
      - slug: stakeholder-engagement-advanced
        path: pro/pm/pm-traditional/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Sent report + archive entry"
    decision_gate: "Required: report sent same day, archived same day."

token_budget_estimate: 14000

cli_invocations:
  human:  "faion get-content write-the-weekly-client-status-report-p4-leadership-update-p6 --format md"
