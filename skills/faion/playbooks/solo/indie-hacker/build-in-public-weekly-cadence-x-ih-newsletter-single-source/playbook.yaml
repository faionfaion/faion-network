slug: build-in-public-weekly-cadence-x-ih-newsletter-single-source
title: "Build-in-Public Weekly Cadence (X + IH + newsletter, single source)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: f8a12835ea19daa7

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P2]

intent: |
  Run a sustainable single-source content cadence — one weekly action that fans out to X, IH, newsletter — without burning out on a nomad schedule.

scope: |
  Run a sustainable single-source content cadence — one weekly action that fans out to X, IH, newsletter — without burning out on a nomad schedule.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Pick the weekly anchor"
    intent: "One main piece per week, fan out from there."
    tasks:
      - "Choose an anchor format (essay, build log, teardown)"
      - "Block a weekly writing slot"
      - "Set the topic for the next 4 weeks"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
    outputs:
      - "Anchor format"
      - "Writing slot"
      - "4-week topic plan"
    decision_gate: "Advance only when slot + topics are on the calendar."
  - name: "Single-source draft"
    intent: "Write once, slice many."
    tasks:
      - "Draft the anchor piece"
      - "Slice into: tweet thread, IH post, newsletter, X repost"
      - "Schedule each slice"
    methodologies:
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
    outputs:
      - "Anchor draft"
      - "Slice variants"
      - "Schedule grid"
    decision_gate: "Advance only when all slices are scheduled."
  - name: "Low-energy fallback mode"
    intent: "Stay alive on nomad / bad weeks."
    tasks:
      - "Pre-write 2 evergreen fallback pieces"
      - "Set a rule: ship fallback if low energy hits"
      - "Track when fallback fires"
    methodologies:
      - slug: growth-newsletter-growth
        path: solo/marketing/content-marketer/growth-newsletter-growth
        required: true
        tier_gate: solo
    outputs:
      - "Fallback pieces"
      - "Trigger rule"
      - "Fallback fire log"
    decision_gate: "Advance only when fallbacks exist before they are needed."
  - name: "Engagement loop"
    intent: "30 minutes of replies before each post."
    tasks:
      - "List 5-10 accounts to reply to before publishing"
      - "Time-box the engagement to 30 minutes"
      - "Track which replies convert"
    methodologies:
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
    outputs:
      - "Engage list"
      - "Reply log"
      - "Convert delta"
    decision_gate: "Advance only when engagement ritual runs each week."
  - name: "Weekly retro + adjust"
    intent: "Compound by reviewing what worked."
    tasks:
      - "Tally reach, replies, subscribers"
      - "Note which slice format won"
      - "Adjust the next weeks format mix"
    methodologies:
      - slug: growth-community-building
        path: solo/marketing/smm-manager/growth-community-building
        required: true
        tier_gate: solo
    outputs:
      - "Weekly retro doc"
      - "Winning format note"
      - "Next-week adjustments"
    decision_gate: "Cycle closes when retro is committed."

token_budget_estimate: 6000

