tier_min: solo
complexity: light
context: [solo]
persona_hints: [P2]

intent: |
  Monthly 1-hour ritual: pull affiliate and referral stats, approve commissions, pay out, message top referrers.

scope: |
  Monthly 1-hour ritual: pull affiliate and referral stats, approve commissions, pay out, message top referrers.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Pull the ledger"
    intent: "60-minute monthly ritual: open the numbers."
    tasks:
      - "Pull affiliate platform stats"
      - "Pull referral records"
      - "Reconcile against the dashboard"
    methodologies:
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: solo
    outputs:
      - "Affiliate stats"
      - "Referral list"
      - "Reconciliation note"
    decision_gate: "Advance only when reconciled."
  - name: "Approve / reject"
    intent: "Tag every commission honestly."
    tasks:
      - "Mark commissions: approved / rejected / pending"
      - "Note the reason for any rejection"
      - "Flag any suspicious activity"
    methodologies:
      - slug: ops-dashboard-setup
        path: solo/marketing/growth-marketer/ops-dashboard-setup
        required: true
        tier_gate: solo
    outputs:
      - "Approval log"
      - "Reject reasons"
      - "Suspicious flag list"
    decision_gate: "Advance only when each row has a status."
  - name: "Run the payout"
    intent: "Send the money on the same day."
    tasks:
      - "Trigger payouts (Wise / Stripe / PayPal)"
      - "Send the payout receipt to each affiliate"
      - "Update the ledger"
    methodologies:
      - slug: ops-financial-planning
        path: solo/marketing/gtm-strategist/ops-financial-planning
        required: true
        tier_gate: solo
    outputs:
      - "Payouts sent"
      - "Receipts emailed"
      - "Ledger updated"
    decision_gate: "Advance only when every payout shows sent."
  - name: "Thank top referrers"
    intent: "Treat your distribution channel like family."
    tasks:
      - "Identify top 3-5 referrers this month"
      - "Send personal thank-you DMs"
      - "Offer a perk (early access, bonus, shoutout)"
    methodologies:
      - slug: growth-community-building
        path: solo/marketing/smm-manager/growth-community-building
        required: true
        tier_gate: solo
    outputs:
      - "Top referrers list"
      - "Thank-you DM log"
      - "Perk delivered"
    decision_gate: "Cycle closes when every top referrer is thanked."
  - name: "Tune the program"
    intent: "One small adjustment per month."
    tasks:
      - "Review conversion + commission ratios"
      - "Decide one tweak (rate, cookie window, copy)"
      - "Schedule for next month"
    methodologies:
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: solo
    outputs:
      - "Program metrics"
      - "Tweak decision"
      - "Schedule slot"
    decision_gate: "Cycle closes when next-month tweak is queued."

