slug: multi-product-portfolio-rotation-ship-n-small-bets-per-year
title: "Multi-product portfolio rotation: ship N small bets per year"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: 6b6b158b45858370

tier_min: solo
complexity: deep
context: [solo]
persona_hints: [P2]

intent: |
  Run a recurring rotation that ships 4–6 small products per year, keeps 2–3 alive based on traction, sunsets the rest, and compounds the surviving ones into a portfolio that reaches ramen profitability.

scope: |
  Run a recurring rotation that ships 4–6 small products per year, keeps 2–3 alive based on traction, sunsets the rest, and compounds the surviving ones into a portfolio that reaches ramen profitability.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Portfolio scorecard"
    intent: "See every bet on one page."
    tasks:
      - "List every shipped product with revenue + load"
      - "Score each on traction, founder energy, and growth potential"
      - "Tag each: grow / maintain / sunset / new"
    methodologies:
      - slug: automation-tooling
        path: solo/dev/automation-tooling
        required: true
        tier_gate: solo
      - slug: idea-generation
        path: solo/research/market-researcher/idea-generation
        required: true
        tier_gate: solo
    outputs:
      - "Scorecard"
      - "Per-product tags"
      - "Quarterly summary"
    decision_gate: "Advance only when every product has a tag."
  - name: "Maintain-mode SOPs"
    intent: "Make survivors run themselves."
    tasks:
      - "Define maintain-mode (uptime, support SLA, no new features)"
      - "Automate or hand-off recurring tasks"
      - "Set monthly maintenance checkpoints"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: idea-generation-methods
        path: solo/research/market-researcher/idea-generation-methods
        required: true
        tier_gate: solo
    outputs:
      - "Maintain SOP per product"
      - "Automation tickets"
      - "Maintenance calendar"
    decision_gate: "Advance only when each survivor has <=1 hour/week of human load."
  - name: "Idea pipeline refill"
    intent: "Always have 5-10 candidate bets queued."
    tasks:
      - "Run idea-generation against current themes"
      - "Score candidates by founder-fit + market signal"
      - "Pick the next bet"
    methodologies:
      - slug: ops-customer-support
        path: solo/marketing/gtm-strategist/ops-customer-support
        required: true
        tier_gate: solo
      - slug: feature-discovery
        path: solo/research/researcher/feature-discovery
        required: true
        tier_gate: solo
    outputs:
      - "Candidate idea list"
      - "Scored pipeline"
      - "Next-bet pick"
    decision_gate: "Advance only when pipeline has >=5 named candidates."
  - name: "Tiny-bet ship cadence"
    intent: "Ship a new MVP every 6-8 weeks."
    tasks:
      - "Cut scope ruthlessly to micro-MVP"
      - "Ship within the cadence window"
      - "Set an early kill date"
    methodologies:
      - slug: feature-prioritization-moscow
        path: solo/product/product-manager/feature-prioritization-moscow
        required: true
        tier_gate: solo
    outputs:
      - "Micro-MVP shipped"
      - "Ship-date stamp"
      - "Kill-date stamp"
    decision_gate: "Advance only when shipped within cadence window."
  - name: "Traction read at kill date"
    intent: "Honest cull at the predetermined date."
    tasks:
      - "Read traction metrics at the kill date"
      - "Compare to pre-set survive threshold"
      - "Tag: grow / maintain / sunset"
    methodologies:
      - slug: feature-prioritization-rice
        path: solo/product/product-manager/feature-prioritization-rice
        required: true
        tier_gate: solo
    outputs:
      - "Kill-date readout"
      - "Survive/sunset call"
      - "Updated portfolio scorecard"
    decision_gate: "Advance only when call is made on schedule (no extensions)."
  - name: "Sunset clean"
    intent: "Close down losers without lingering cost."
    tasks:
      - "Run the refund/migrate/notify pack"
      - "Archive code + docs"
      - "Cancel underlying paid services"
    methodologies:
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
    outputs:
      - "Sunset comms"
      - "Archive log"
      - "Cancelled-services log"
    decision_gate: "Advance only when zero recurring cost remains for the killed product."
  - name: "Reinvest in survivors"
    intent: "Compound winners with the freed capacity."
    tasks:
      - "Pick the strongest survivor"
      - "Pour 1 cycle into its growth lever"
      - "Measure lift"
    methodologies:
      - slug: product-lifecycle
        path: solo/product/product-operations/product-lifecycle
        required: true
        tier_gate: solo
    outputs:
      - "Survivor growth experiment"
      - "Lift measurement"
      - "Updated scorecard"
    decision_gate: "Advance only when survivor lift is measurable."
  - name: "Quarterly portfolio review"
    intent: "Re-balance like an investor."
    tasks:
      - "Walk the scorecard with an outsider mindset"
      - "Re-tag every product"
      - "Commit the next-quarter rotation"
    methodologies:
      - slug: micro-mvps
        path: solo/product/product-planning/micro-mvps
        required: true
        tier_gate: solo
    outputs:
      - "Quarterly review doc"
      - "Updated tags"
      - "Next-quarter plan"
    decision_gate: "Cycle closes when next-quarter plan is committed."
  - name: "Annual portfolio reset"
    intent: "Once a year, ask the brutal questions."
    tasks:
      - "Audit profitability vs personal goals"
      - "Decide which products to keep into next year"
      - "Write the annual portfolio thesis"
    methodologies:
      - slug: outcome-based-roadmaps
        path: solo/product/product-planning/outcome-based-roadmaps
        required: true
        tier_gate: solo
    outputs:
      - "Annual audit"
      - "Keep-list"
      - "Portfolio thesis"
    decision_gate: "Cycle closes when thesis is committed for the new year."

