intent: |
  From a one-line tweeted hypothesis to a Gumroad/Stripe-collected first paying customer, with all build/marketing/ship steps audience-driven and lean.

scope: |
  From a one-line tweeted hypothesis to a Gumroad/Stripe-collected first paying customer, with all build/marketing/ship steps audience-driven and lean.

success_criteria:
  - "Final stage decision-gate is met and committed in writing"
  - "Every stage produces its named outputs"
  - "Cycle closes only when a written commitment exists for the next step"

stages:
  - name: "Tweet the hypothesis"
    intent: "Float the one-line problem statement publicly."
    tasks:
      - "Write a single-tweet problem statement"
      - "Post and tag the audience explicitly"
      - "Track replies + DMs for signal"
    methodologies:
      - slug: software-developer
        path: free/dev/software-developer
        required: true
        tier_gate: solo
      - slug: mvp-scoping
        path: solo/product/product-planning/mvp-scoping
        required: true
        tier_gate: solo
    outputs:
      - "Hypothesis tweet"
      - "Audience tag list"
      - "Reply signal log"
    decision_gate: "Advance only with >=10 engagement signals from the target audience."
  - name: "Quick Mom-test calls"
    intent: "5 calls before any build."
    tasks:
      - "DM 5 strong-signal repliers"
      - "Run Mom-test problem interviews"
      - "Capture severity + willingness-to-pay"
    methodologies:
      - slug: growth-reddit-marketing
        path: solo/marketing/content-marketer/growth-reddit-marketing
        required: true
        tier_gate: solo
      - slug: outcome-based-roadmaps
        path: solo/product/product-planning/outcome-based-roadmaps
        required: true
        tier_gate: solo
    outputs:
      - "5 call notes"
      - "Severity tally"
      - "Pricing reactions"
    decision_gate: "Advance only with >=3/5 painful + payment signals."
  - name: "Ugly first version"
    intent: "Build the smallest demoable thing."
    tasks:
      - "Cut the scope to the smallest demo-able workflow"
      - "Build with the simplest stack you know"
      - "Deploy to a real URL within days"
    methodologies:
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: product-launch
        path: solo/product/product-planning/product-launch
        required: true
        tier_gate: solo
    outputs:
      - "Demo URL"
      - "Scope cut log"
      - "First commit history"
    decision_gate: "Advance only when one user can complete the workflow."
  - name: "Pre-sell + Gumroad/Stripe"
    intent: "Take money before polish."
    tasks:
      - "Wire Gumroad or Stripe checkout"
      - "Publish a landing with one button"
      - "Send the link to all warm leads"
    methodologies:
      - slug: ops-pricing-strategy
        path: solo/marketing/gtm-strategist/ops-pricing-strategy
        required: true
        tier_gate: solo
      - slug: jobs-to-be-done
        path: solo/research/researcher/jobs-to-be-done
        required: true
        tier_gate: solo
    outputs:
      - "Checkout live"
      - "Landing URL"
      - "Outreach log"
    decision_gate: "Advance only when checkout is testable and live."
  - name: "Build-in-public ship day"
    intent: "Use the audience to amplify the launch."
    tasks:
      - "Ship a thread with the journey + link"
      - "Reply to every engagement quickly"
      - "Cross-post a short version to IH"
    methodologies:
      - slug: ops-subscription-models
        path: solo/marketing/gtm-strategist/ops-subscription-models
        required: true
        tier_gate: solo
      - slug: problem-validation-2026
        path: solo/research/researcher/problem-validation-2026
        required: true
        tier_gate: solo
    outputs:
      - "Launch thread"
      - "Reply log"
      - "IH cross-post"
    decision_gate: "Advance only when ship day is actually shipped."
  - name: "First paying user"
    intent: "Close the loop with one real receipt."
    tasks:
      - "DM warm leads with a personal close"
      - "Take the payment and onboard live"
      - "Capture verbatim feedback"
    methodologies:
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
      - slug: success-metrics-definition
        path: solo/research/researcher/success-metrics-definition
        required: true
        tier_gate: solo
    outputs:
      - "First paid invoice"
      - "Onboarding notes"
      - "Verbatim feedback"
    decision_gate: "Advance only when at least one paid invoice lands."
  - name: "Kill criteria check"
    intent: "Apply the indie kill criteria before sinking more time."
    tasks:
      - "Score the launch against the kill criteria"
      - "Write the continue / pivot / kill call"
      - "Schedule the next sprint OR sunset"
    methodologies:
      - slug: micro-mvps
        path: solo/product/product-planning/micro-mvps
        required: true
        tier_gate: solo
      - slug: sdd
        path: solo/sdd/sdd
        required: true
        tier_gate: solo
    outputs:
      - "Kill criteria score"
      - "Decision doc"
      - "Next-sprint or sunset plan"
    decision_gate: "Cycle closes only with a written committed call."

