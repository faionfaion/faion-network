# =============================================================================
# Product Hunt launch campaign: 4-week prep to #1-of-day
# Persona: P2 Indie Hacker — F-064
# =============================================================================

slug: product-hunt-4-week-launch-campaign
title: "Product Hunt launch campaign: 4-week prep to #1-of-day"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: df47a9a3b3603cb5

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P2]

intent: |
  Shipping product → top-3 Product Hunt launch with measurable signup and revenue lift.

scope: |
  Run a structured 4-week campaign that takes a shipping indie product to a top-3 Product Hunt launch, with a measurable signup and revenue lift, then converts the spike into retained subscribers and audience.

non_goals:
  - "Paid traffic strategies — pure organic launch"
  - "Multi-product Product Hunt strategy — single launch"
  - "Influencer / agency outreach — solo execution"

prerequisites:
  - "A live product with at least 5 happy users"
  - "An owned audience or community where hunters can find you"

success_criteria:
  - "Product Hunt launch day in top-3"
  - "Documented hunter list (≥50 makers tagged)"
  - "Launch-day signups ≥3x baseline"
  - "Conversion drip live for new signups"
  - "Post-launch retention measured at day-7 and day-30"

stages:
  - name: "Asset Prep"
    intent: "Page, copy, and screenshots ready 14 days before launch."
    tasks:
      - "Write Product Hunt copy aligned to positioning"
      - "Generate gallery: hero, demo, problem-solved"
      - "Stage the landing page for PH-referred traffic"
    methodologies:
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
      - slug: value-proposition-design
        path: solo/research/researcher/value-proposition-design
        required: true
        tier_gate: solo
    outputs:
      - "Draft PH listing copy"
      - "Approved gallery set"
    decision_gate: |
      Advance when 3 outside readers say the listing makes them want to sign up.
  - name: "Audience Warm-up"
    intent: "Audience knows the launch date and committed to support."
    tasks:
      - "Drip teaser content over X and the newsletter for 14 days"
      - "DM 50 hunters and makers with personal asks"
      - "Schedule a launch-eve nudge"
    methodologies:
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
      - slug: growth-newsletter-growth
        path: solo/marketing/content-marketer/growth-newsletter-growth
        required: true
        tier_gate: solo
      - slug: growth-cold-outreach
        path: solo/marketing/gtm-strategist/growth-cold-outreach
        required: true
        tier_gate: solo
    outputs:
      - "Outreach log"
      - "Newsletter teaser sequence"
    decision_gate: |
      Advance when ≥30 makers confirm they will support on launch day.
  - name: "Launch Day"
    intent: "Top-3 by EOD via a tight runbook."
    tasks:
      - "Publish at 00:01 PT; pin tweet; queue first 5 comments"
      - "Reply to every comment within 30 minutes"
      - "Push hourly progress updates in primary channel"
    methodologies:
      - slug: growth-product-hunt-launch
        path: solo/marketing/gtm-strategist/growth-product-hunt-launch
        required: true
        tier_gate: solo
      - slug: growth-reddit-marketing
        path: solo/marketing/content-marketer/growth-reddit-marketing
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
    outputs:
      - "Launch-day runbook executed"
      - "Comment + signup logs"
    decision_gate: |
      Stay in launch mode until midnight; advance when day-1 rank is locked.
  - name: "Conversion"
    intent: "Spike traffic converts to paid or trial users."
    tasks:
      - "Activate onboarding email sequence for new signups"
      - "Route hot leads to a personal welcome DM"
      - "Run a 24-hour PH-day promo for paid plans"
    methodologies:
      - slug: growth-onboarding-emails
        path: solo/marketing/content-marketer/growth-onboarding-emails
        required: true
        tier_gate: solo
      - slug: growth-email-marketing
        path: solo/marketing/content-marketer/growth-email-marketing
        required: true
        tier_gate: solo
      - slug: customer-onboarding-email
        path: solo/launch-operations/customer-onboarding-email
        required: true
        tier_gate: solo
    outputs:
      - "Live onboarding sequence"
      - "Promo conversion tally"
    decision_gate: |
      Advance if day-7 paid conversion is ≥2% of new signups.
  - name: "Compounding"
    intent: "Launch spike feeds long-term audience growth."
    tasks:
      - "Migrate visible new followers to newsletter via pinned tweet"
      - "Publish a post-launch retro with numbers"
      - "Add launch-week customers to a testimonial pipeline"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: solo
    outputs:
      - "Post-launch retro"
      - "Testimonial pipeline entries"
    decision_gate: |
      Advance only after numbers and testimonials are public.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

