# =============================================================================
# Product Hunt comment-back day
# Persona: P2 Indie Hacker — F-064
# =============================================================================

slug: product-hunt-comment-back-day
title: "Product Hunt comment-back day"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: e3b02d716b256aee

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P2]

intent: |
  PH launch noise → every comment and DM answered within 24h, lurkers converted to signups.

scope: |
  Launch-day or post-launch maintenance: respond to every Product Hunt comment and DM within the day, convert lurkers to signups, gather objections, and turn the comment thread into long-term social proof.

non_goals:
  - "Acquiring new comments via aggressive promotion — engage existing ones"
  - "Multi-platform comment work — Product Hunt only"
  - "Negative-comment fights — defuse, not escalate"

prerequisites:
  - "An active Product Hunt page"
  - "Calendar block of at least 4 focused hours on launch day"

success_criteria:
  - "Every comment answered within 24h"
  - "Every DM acknowledged within 24h"
  - "Lurkers identified and DM'd with offer"
  - "Objection bank refreshed with at least 5 new entries"

stages:
  - name: "Triage"
    intent: "All inbound sorted by intent and urgency."
    tasks:
      - "Filter comments by question / praise / objection"
      - "Tag DMs by stage (curious / evaluating / blocking)"
      - "Pin the open question or feature ask to the top of the thread"
    methodologies:
      - slug: active-listening
        path: solo/comms/communicator/active-listening
        required: true
        tier_gate: solo
      - slug: growth-product-hunt-launch
        path: solo/marketing/gtm-strategist/growth-product-hunt-launch
        required: true
        tier_gate: solo
    outputs:
      - "Triage list (questions / objections / praise)"
    decision_gate: |
      Advance only when every comment has a tag.
  - name: "Respond"
    intent: "Personal, on-brand replies to every comment."
    tasks:
      - "Write personal replies in batches, not template blasts"
      - "Address each objection with concrete proof or roadmap link"
      - "Escalate hot leads into DMs with offer"
    methodologies:
      - slug: feedback
        path: solo/comms/communicator/feedback
        required: true
        tier_gate: solo
      - slug: ops-customer-support
        path: solo/marketing/gtm-strategist/ops-customer-support
        required: true
        tier_gate: solo
      - slug: customer-onboarding-email
        path: solo/launch-operations/customer-onboarding-email
        required: true
        tier_gate: solo
    outputs:
      - "Posted comment replies"
      - "DM conversions to signup"
    decision_gate: |
      Advance once 100% of comments have a response and ≥30% of replies push to signup.
  - name: "Archive"
    intent: "Comment day becomes lasting product intelligence."
    tasks:
      - "Update the objection bank"
      - "Add lurker DMs to nurture sequence"
      - "Log new feature requests into the backlog"
    methodologies:
      - slug: backlog-hygiene
        path: solo/product-ops/backlog-hygiene
        required: true
        tier_gate: solo
    outputs:
      - "Updated objection bank"
      - "Refreshed backlog"
    decision_gate: |
      Done once objections and backlog are committed.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

related_playbooks:
  - solo-idea-to-validated-mvp
token_budget_estimate: 16500
