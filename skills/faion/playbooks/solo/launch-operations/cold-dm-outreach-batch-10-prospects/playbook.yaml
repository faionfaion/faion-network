slug: cold-dm-outreach-batch-10-prospects
title: "Cold DM outreach batch (10 prospects)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: a6664b4f448973c0

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P2]

intent: |
  Empty inbox → 10 personalised cold DMs sent and logged with status by EOD.

scope: |
  One sitting per week: 10 personalised cold DMs sent on X or LinkedIn to ICP-fit accounts, all logged with status in a minimal CRM so the next batch can compound on prior outcomes.

non_goals:
  - "Mass-send tooling or scraped lists"
  - "Auto-DM bots — every message is personal"
  - "Long sales cycles — short feedback loops only"

prerequisites:
  - "An ICP definition with 50 candidate accounts"
  - "A working X or LinkedIn account in good standing"

success_criteria:
  - "10 personalised DMs sent"
  - "Each DM logged with status (sent / replied / booked)"
  - "≥3 replies in 48h"
  - "≥1 conversation moved to call or offer"

stages:
  - name: "Build List"
    intent: "10 ICP-fit accounts with a personal hook on each."
    tasks:
      - "Pull from saved ICP source"
      - "Note one personal hook per account (recent post, mutual interest)"
      - "Confirm contact channel is open"
    methodologies:
      - slug: pain-point-research
        path: solo/research/researcher/pain-point-research
        required: true
        tier_gate: solo
      - slug: growth-cold-outreach
        path: solo/marketing/gtm-strategist/growth-cold-outreach
        required: true
        tier_gate: solo
    outputs:
      - "List of 10 accounts with hooks"
    decision_gate: |
      Advance only once each row has a personal hook.
  - name: "Draft"
    intent: "10 DMs that pass the mom-test."
    tasks:
      - "Open with the personal hook, not your pitch"
      - "State a clear ask within 3 lines"
      - "Pass the 'would they reply?' bar before sending"
    methodologies:
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: selling-ideas
        path: solo/comms/communicator/selling-ideas
        required: true
        tier_gate: solo
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
    outputs:
      - "10 draft DMs"
    decision_gate: |
      Advance only after a peer or fresh eye signs off.
  - name: "Send"
    intent: "All 10 DMs sent inside a focus block."
    tasks:
      - "Send in batches of 5 across two channels max"
      - "Log each in the mini-CRM with timestamp"
      - "Trigger a 48-hour reminder for follow-up"
    methodologies:
      - slug: ops-automation-workflow
        path: solo/marketing/growth-marketer/ops-automation-workflow
        required: true
        tier_gate: solo
      - slug: growth-cold-outreach
        path: solo/marketing/gtm-strategist/growth-cold-outreach
        required: true
        tier_gate: solo
    outputs:
      - "Sent DMs logged"
      - "Follow-up reminders scheduled"
    decision_gate: |
      Done once all 10 are sent and logged.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

