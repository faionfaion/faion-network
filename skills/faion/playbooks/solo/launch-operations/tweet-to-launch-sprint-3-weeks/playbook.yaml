# =============================================================================
# Tweet-to-launch sprint: idea to paying user in 3 weeks
# Persona: P2 Indie Hacker — F-064
# =============================================================================

slug: tweet-to-launch-sprint-3-weeks
title: "Tweet-to-launch sprint: idea to paying user in 3 weeks"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: bd993d6bbd7f6b95

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P2]

intent: |
  One-line tweeted hypothesis → Gumroad/Stripe-collected first paying customer in 21 days.

scope: |
  Solo indie hacker takes a single tweeted hypothesis through a 3-week audience-driven build sprint: validate via DMs, ship an ugly first version, open paid checkout, and convert at least one tweet reader into a paying user.

non_goals:
  - "Multi-product portfolio strategy — single-bet playbook"
  - "Hiring or contractor delegation — pure solo loop"
  - "Enterprise compliance, SOC2, or legal review"

prerequisites:
  - "Active X/Twitter account with >100 followers (otherwise run audience growth first)"
  - "Stripe or Gumroad account verified for payouts"

success_criteria:
  - "Tweeted hypothesis with measurable engagement signal (≥20 likes, ≥3 DMs)"
  - "10 problem-validation DMs logged"
  - "Working ugly-first-version deployed at a public URL"
  - "Paid checkout live (Stripe Payment Link or Gumroad)"
  - "At least one paid invoice from a Twitter-referred buyer"

stages:
  - name: "Hypothesis"
    intent: "Public one-line hypothesis tweeted; signal collected."
    tasks:
      - "Draft three single-tweet hypotheses framed as 'X for Y'"
      - "Pick the one that aligns with current audience interests"
      - "Post and pin; reply to every signal within 12 hours"
    methodologies:
      - slug: jobs-to-be-done
        path: solo/research/researcher/jobs-to-be-done
        required: true
        tier_gate: solo
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
      - slug: storytelling
        path: solo/comms/communicator/storytelling
        required: true
        tier_gate: solo
    outputs:
      - "One pinned tweet capturing the hypothesis"
      - "Engagement log (likes, replies, DMs)"
    decision_gate: |
      Advance if ≥20 likes OR ≥3 qualified DMs within 48h.
      Re-frame and retweet variant if signal is below threshold.
      Kill the bet if 0 signal after 2 variants.
  - name: "Validate"
    intent: "Confirm 5+ prospects describe the pain and accept a paid concept."
    tasks:
      - "Run mom-test style DMs with the 10 most-engaged repliers"
      - "Pitch a price (≥$20) inside the conversation"
      - "Capture verbatim quotes that justify the build"
    methodologies:
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: problem-validation-2026
        path: solo/research/researcher/problem-validation-2026
        required: true
        tier_gate: solo
      - slug: ops-pricing-strategy
        path: solo/marketing/gtm-strategist/ops-pricing-strategy
        required: true
        tier_gate: solo
    outputs:
      - "10 DM transcripts with pain-quote markup"
      - "Pricing hypothesis (one-line)"
    decision_gate: |
      Advance if ≥5 DMs confirm the pain and ≥3 verbally commit to paying.
      Pivot scope or price if signal is mixed.
      Kill if no one mentions paying after explicit price.
  - name: "Scope"
    intent: "Cut to a one-screen build that ships in 7 days."
    tasks:
      - "Write a one-screen micro-MVP spec — one job, one input, one output"
      - "Write the kill list — every feature explicitly NOT shipping"
      - "Define the 'paid' moment — what triggers Stripe checkout"
    methodologies:
      - slug: micro-mvps
        path: solo/product/product-planning/micro-mvps
        required: true
        tier_gate: solo
      - slug: mvp-scoping
        path: solo/product/product-planning/mvp-scoping
        required: true
        tier_gate: solo
      - slug: ops-subscription-models
        path: solo/marketing/gtm-strategist/ops-subscription-models
        required: true
        tier_gate: solo
    outputs:
      - "Single-page spec (.md)"
      - "Cut list (≥10 items)"
    decision_gate: |
      Advance if scope fits on one page AND build is realistic in ≤7 days.
      Re-cut if estimate exceeds a week.
  - name: "Build"
    intent: "Ugly-first-version live, paid checkout wired in."
    tasks:
      - "Implement only the validated job; skip auth if not needed"
      - "Wire Stripe Payment Link or Gumroad as the checkout"
      - "Push to a public URL by Day 14"
    methodologies:
      - slug: software-developer
        path: free/dev/software-developer
        required: true
        tier_gate: free
      - slug: sdd
        path: solo/sdd/sdd
        required: true
        tier_gate: solo
      - slug: product-launch
        path: solo/product/product-planning/product-launch
        required: true
        tier_gate: solo
    outputs:
      - "Live URL"
      - "Working checkout that issues a real invoice"
    decision_gate: |
      Advance when one stranger completes the flow end-to-end and pays.
      Iterate UI ugliness only when paid flow blocks itself.
  - name: "Launch"
    intent: "Convert hypothesis tweet readers into paying customers."
    tasks:
      - "Drop a launch tweet thread linking to the live product"
      - "DM the 5 strongest Validate stage signals personally"
      - "Cross-post to IndieHackers and Reddit niche subs"
    methodologies:
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: growth-reddit-marketing
        path: solo/marketing/content-marketer/growth-reddit-marketing
        required: true
        tier_gate: solo
      - slug: first-10-customers
        path: free/marketing-fundamentals/first-10-customers
        required: true
        tier_gate: free
      - slug: stripe-integration-basics
        path: solo/launch-operations/stripe-integration-basics
        required: true
        tier_gate: solo
    outputs:
      - "Launch thread URL"
      - "First paying customer logged"
    decision_gate: |
      Advance to Review if ≥1 paid invoice in 7 days post-launch.
      Re-pitch on a different surface if 0 conversion despite traffic.
  - name: "Review"
    intent: "Decide continue / iterate / kill with a written rationale."
    tasks:
      - "Run a weekly review with the Discovery and Launch evidence"
      - "Compute first-week unit economics (revenue, refund risk)"
      - "Write a one-paragraph continue/kill decision"
    methodologies:
      - slug: success-metrics-definition
        path: solo/research/researcher/success-metrics-definition
        required: true
        tier_gate: solo
      - slug: outcome-based-roadmaps
        path: solo/product/product-planning/outcome-based-roadmaps
        required: true
        tier_gate: solo
      - slug: weekly-review-solo
        path: solo/product-planning/weekly-review-solo
        required: true
        tier_gate: solo
    outputs:
      - "Decision doc (continue / iterate / kill)"
      - "Next-30-day milestone OR kill rationale"
    decision_gate: |
      Required output: a written verdict. No 'we'll see'.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

