# =============================================================================
# Micro-launch stack (PH + HN + IH + X same week)
# Persona: P2 Indie Hacker — F-064
# =============================================================================

slug: micro-launch-stack-ph-hn-ih-x-same-week
title: "Micro-launch stack (PH + HN + IH + X same week)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 0ec4d2e94c3600a9

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P2]

intent: |
  Multi-platform launch chaos → sequenced PH + HN + IH + X + Reddit + Gumroad wave in one week.

scope: |
  Coordinate a single product launch across Product Hunt, Hacker News, IndieHackers, X, Reddit, and Gumroad / Lemon Squeezy as a sequenced wave — not parallel spam — turning a one-day spike into a multi-day reinforcing campaign.

non_goals:
  - "Paid acquisition layers"
  - "Cross-product launches in the same week"
  - "Parallel spam across surfaces"

prerequisites:
  - "A shipping product with a live paid path"
  - "Accounts in good standing across PH, HN, IH, X, and Reddit"

success_criteria:
  - "Day-by-day wave sequence documented"
  - "Each surface receives a tailored launch post"
  - "Paid product live on Gumroad or Lemon Squeezy"
  - "Cross-channel signups and revenue measured"

stages:
  - name: "Sequence"
    intent: "Define the wave: which surface fires which day."
    tasks:
      - "Map each surface to a day in the launch week"
      - "Note dependencies between surfaces"
      - "Lock pricing across all surfaces"
    methodologies:
      - slug: ops-pricing-strategy
        path: solo/marketing/gtm-strategist/ops-pricing-strategy
        required: true
        tier_gate: solo
      - slug: ops-subscription-models
        path: solo/marketing/gtm-strategist/ops-subscription-models
        required: true
        tier_gate: solo
      - slug: product-launch
        path: solo/product/product-planning/product-launch
        required: true
        tier_gate: solo
    outputs:
      - "Wave sequence calendar"
    decision_gate: |
      Advance once each surface has an owner-day and dependency.
  - name: "Tailor"
    intent: "Each surface gets a native-format post."
    tasks:
      - "Write PH listing, HN post title, IH long-form, X thread, Reddit comment"
      - "Stage Gumroad / LS pages with launch pricing"
      - "Cross-link surfaces correctly to avoid duplicate-flag risk"
    methodologies:
      - slug: growth-reddit-marketing
        path: solo/marketing/content-marketer/growth-reddit-marketing
        required: true
        tier_gate: solo
      - slug: growth-hacker-news-launch
        path: solo/marketing/gtm-strategist/growth-hacker-news-launch
        required: true
        tier_gate: solo
      - slug: growth-product-hunt-launch
        path: solo/marketing/gtm-strategist/growth-product-hunt-launch
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
    outputs:
      - "Tailored posts per surface"
      - "Live checkout pages"
    decision_gate: |
      Advance only when each surface post passes its native-format bar.
  - name: "Fire"
    intent: "Execute the sequence and respond live."
    tasks:
      - "Trigger each surface on its scheduled day"
      - "Respond to every comment within 12 hours"
      - "Pull metrics nightly and adjust next day's surface"
    methodologies:
      - slug: growth-product-hunt-launch
        path: solo/marketing/gtm-strategist/growth-product-hunt-launch
        required: true
        tier_gate: solo
      - slug: growth-hacker-news-launch
        path: solo/marketing/gtm-strategist/growth-hacker-news-launch
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
    outputs:
      - "Live posts across all surfaces"
      - "Daily engagement logs"
    decision_gate: |
      Advance once the entire week ships.
  - name: "Compound"
    intent: "Spike converts to long-term audience and revenue."
    tasks:
      - "Migrate spike followers to newsletter"
      - "Publish a week-in-review long-form"
      - "Lock-in lifetime-deal customers if used"
    methodologies:
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
    outputs:
      - "Week-in-review long-form"
      - "Lifetime-deal log"
    decision_gate: |
      Done once spike has been captured in newsletter and revenue logged.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

related_playbooks:
