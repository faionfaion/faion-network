slug: deploy-day-staging-to-prod
title: "Deploy-day staging-to-prod gate"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 7a2cb4009bfc5c46

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P1]

intent: |
  Feature lives on staging → safe push to prod with rollback ready and post-deploy verified.

scope: |
  Solo founder pushes to prod safely: CI green, smoke pass on staging, feature-flagged where risky, deploy script run, post-deploy health verified, rollback path proven. Exit artifact is healthy prod + verified rollback path.

non_goals:
  - "Multi-region deployments — single-region only here"
  - "Blue-green orchestration — flag-based rollouts only"

prerequisites:
  - "CI pipeline configured (cd-basics complete)"
  - "Staging environment live"
  - "Monitoring + logging configured"

success_criteria:
  - "CI green on PR + main"
  - "Staging smoke test passed"
  - "Feature behind flag if risky"
  - "Deploy executed via script (not manual)"
  - "Post-deploy health checks pass within 5 minutes"
  - "Rollback path tested in staging"

stages:
  - name: "Pre-flight"
    intent: "CI green + staging smoke + flag plan confirmed."
    tasks:
      - "Verify CI green on main"
      - "Run staging smoke test"
      - "Confirm feature flag plan"
    methodologies:
      - slug: e2e-testing
        path: free/dev/testing-developer/e2e-testing
        required: true
        tier_gate: free
      - slug: cd-basics
        path: solo/dev/automation-tooling/cd-basics
        required: true
        tier_gate: solo
      - slug: cd-pipelines
        path: solo/dev/automation-tooling/cd-pipelines
        required: true
        tier_gate: solo
      - slug: quality-gates-confidence
        path: solo/sdd/sdd/quality-gates-confidence
        required: true
        tier_gate: solo
    outputs:
      - "Pre-flight checklist complete"
    decision_gate: |
      Advance when all 3 checks pass. Refuse to deploy with red CI or untested staging.
  - name: "Deploy"
    intent: "Run deploy script. Never manual."
    tasks:
      - "Execute deploy script"
      - "Watch deploy logs"
      - "Verify deploy version on prod"
    methodologies:
      - slug: feature-flags-rollout-targeting
        path: solo/dev/automation-tooling/feature-flags-rollout-targeting
        required: true
        tier_gate: solo
      - slug: feature-flags
        path: solo/dev/software-developer/feature-flags
        required: true
        tier_gate: solo
      - slug: deploy-scripts
        path: solo/infra/server-craft/deploy-scripts
        required: true
        tier_gate: solo
      - slug: release-planning
        path: solo/product/product-planning/release-planning
        required: true
        tier_gate: solo
    outputs:
      - "Deploy log"
      - "Prod version confirmed"
    decision_gate: |
      Advance when prod runs new version. Stay if deploy errors.
  - name: "Verify"
    intent: "Health checks + key flows + flag rollout."
    tasks:
      - "Run health checks"
      - "Walk through 3 critical user flows"
      - "Roll flag 5% → 25% → 50% → 100%"
    methodologies:
      - slug: health-checks-autoheal
        path: solo/infra/server-craft/health-checks-autoheal
        required: true
        tier_gate: solo
      - slug: monitoring-logging
        path: solo/infra/server-craft/monitoring-logging
        required: true
        tier_gate: solo
      - slug: logging-patterns
        path: solo/dev/automation-tooling/logging-patterns
        required: true
        tier_gate: solo
    outputs:
      - "Health-check pass log"
      - "Flag rollout log"
    decision_gate: |
      Advance when health green + flows work. Hot-rollback flag if any flow breaks.
  - name: "Rollback drill"
    intent: "Prove the rollback path works (test in staging post-deploy)."
    tasks:
      - "Trigger rollback in staging"
      - "Verify rollback completes <5min"
      - "Document rollback command"
    methodologies:
      []
    outputs:
      - "Rollback runbook entry"
    decision_gate: |
      Required output: rollback proven in staging this deploy. Without it, next incident is fatal.

common_pitfalls:
  - "Deploying without flag because 'it's a small change' — small changes break prod most often"
  - "Skipping rollback drill — first time you need it is the worst time to discover it doesn't work"

quality_checklist:
  - "Can I roll this back in under 5 minutes if I'm on a phone at 3am?"
  - "Did I actually walk the critical flows, or just check that the homepage loads?"

related_playbooks:
  - daily-sdd-spec-code-review
  - solo-prod-incident-response

token_budget_estimate: 10000
cli_invocations:
  human:  "faion get-content deploy-day-staging-to-prod --format md"
  agent:  "faion get-content deploy-day-staging-to-prod --format context"
  json:   "faion get-content deploy-day-staging-to-prod --format json"

