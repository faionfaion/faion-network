slug: pre-launch-beta-program
title: "Pre-launch beta program"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: ef9a15aa7c62f441

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P1]

intent: |
  Working MVP → public-ready v1 with testimonials and waitlist after a closed beta.

scope: |
  Solo founder runs a closed beta of 10–30 hand-picked users that produces a buyable v1, testimonials, and a launch-day waitlist. End state is a rehearsed public launch, not improvised. Exit artifact is a launch-day runbook with confirmed waitlist count.

non_goals:
  - "Public open beta — closed, hand-picked only"
  - "Pricing experiments — done after launch"

prerequisites:
  - "MVP completes end-to-end workflow on staging"
  - "List of 50+ prospects to invite from prior discovery"

success_criteria:
  - "10-30 beta users active for at least 2 weeks"
  - "≥5 written testimonials with permission to publish"
  - "≥3 high-severity issues found and resolved before launch"
  - "Launch-day runbook with hour-by-hour plan"
  - "Waitlist with ≥100 confirmed signups"

stages:
  - name: "Charter"
    intent: "Define what the beta is FOR, who's in, what's measured."
    tasks:
      - "Write beta charter (purpose + success criteria)"
      - "Pick 10-30 invitees by ICP fit"
      - "Set beta exit date"
    methodologies:
      - slug: feature-prioritization-moscow
        path: solo/product/product-manager/feature-prioritization-moscow
        required: true
        tier_gate: solo
      - slug: success-metrics-definition
        path: solo/research/researcher/success-metrics-definition
        required: true
        tier_gate: solo
      - slug: use-case-mapping
        path: solo/research/researcher/use-case-mapping
        required: true
        tier_gate: solo
    outputs:
      - "Beta charter doc"
      - "Invitee list"
    decision_gate: |
      Advance once charter is signed off. Refuse to run beta without explicit success criteria.
  - name: "Onboard"
    intent: "Hand-hold each beta user through first value moment."
    tasks:
      - "Personal welcome email per invitee"
      - "Schedule kick-off calls"
      - "Document onboarding gaps"
    methodologies:
      - slug: active-listening
        path: solo/comms/communicator/active-listening
        required: true
        tier_gate: solo
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
    outputs:
      - "Welcome sequence"
      - "Per-user kickoff notes"
    decision_gate: |
      Advance when ≥80% of invitees complete first value moment. Stay if <50%.
  - name: "Observe"
    intent: "Watch how they use it under real conditions without explaining."
    tasks:
      - "Set up session replays / logs"
      - "Run 5 follow-up interviews"
      - "Tag confusion + bug events"
    methodologies:
      - slug: heuristic-evaluation
        path: solo/ux/ux-ui-designer/heuristic-evaluation
        required: true
        tier_gate: solo
      - slug: usability-testing
        path: solo/ux/ux-ui-designer/usability-testing
        required: true
        tier_gate: solo
      - slug: user-interviews
        path: solo/research/researcher/user-interviews
        required: true
        tier_gate: solo
      - slug: feedback-management
        path: solo/product/product-operations/feedback-management
        required: true
        tier_gate: solo
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
    outputs:
      - "Confusion + bug log"
      - "Usage analytics snapshot"
    decision_gate: |
      Advance when ≥3 themes emerge. Loop if signal is too noisy.
  - name: "Iterate"
    intent: "Ship fixes for blocking issues only — resist scope creep."
    tasks:
      - "Cut iteration list to launch-blockers"
      - "Ship fixes"
      - "Re-test with beta cohort"
    methodologies:
      - slug: technical-debt
        path: solo/dev/software-developer/technical-debt
        required: true
        tier_gate: solo
      - slug: technical-debt-management
        path: solo/product/product-operations/technical-debt-management
        required: true
        tier_gate: solo
    outputs:
      - "Iteration changelog"
      - "Tech debt log for post-launch"
    decision_gate: |
      Advance when zero launch-blockers remain. If new blockers appear, repeat Observe.
  - name: "Harvest"
    intent: "Collect testimonials, build the waitlist, lock the launch date."
    tasks:
      - "Request testimonials with permission"
      - "Open public waitlist"
      - "Pick launch date + channels"
    methodologies:
      - slug: growth-customer-testimonials
        path: solo/marketing/content-marketer/growth-customer-testimonials
        required: true
        tier_gate: solo
      - slug: growth-reddit-marketing
        path: solo/marketing/content-marketer/growth-reddit-marketing
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: product-launch
        path: solo/product/product-manager/product-launch
        required: true
        tier_gate: solo
    outputs:
      - "≥5 testimonials"
      - "Waitlist page live"
      - "Launch date"
    decision_gate: |
      Required output: launch-day runbook + waitlist count. Move to public launch.

common_pitfalls:
  - "Inviting friends who won't churn-test the product — pick real prospects"
  - "Treating beta as private demo — must run unattended for real signal"

quality_checklist:
  - "Did the beta surface bugs I didn't know about, or just confirm what I built?"
  - "Are the testimonials specific (named outcomes) or generic ('great tool')?"

related_playbooks:
  - solo-idea-to-validated-mvp
  - pmf-hunt-post-mvp

token_budget_estimate: 13000
