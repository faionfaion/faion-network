slug: cold-lead-inbound-reply
title: "Cold lead reply (LinkedIn / email inbound)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: f2e4917d90d42ad2

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P3]

intent: |
  An inbound or warm-intro lead message arrives. Done = within 24h, either a qualifying reply with a calendar link, or a polite decline-and-refer.

scope: |
  An inbound or warm-intro lead message arrives. Done = within 24h, either a qualifying reply with a calendar link, or a polite decline-and-refer.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Read & qualify stage complete: Triage decision"
  - "Reply stage complete: Reply sent"

stages:
  - name: "Read & qualify"
    intent: "Within 30 min: decide reply / refer / decline."
    tasks:
      - "Scan signal: company, role, ask, urgency"
      - "Score against niche disqualifiers"
      - "Pick: qualify / refer / decline"
    methodologies:
      - slug: stakeholder-analysis
        path: pro/ba/business-analyst/stakeholder-analysis
        required: true
        tier_gate: pro
      - slug: audience-segmentation
        path: pro/research/researcher/audience-segmentation
        required: true
        tier_gate: pro
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: solo-niche-disqualifier-checklist
        path: solo/_gap/solo-niche-disqualifier-checklist
        required: true
        tier_gate: solo
    outputs:
      - "Triage decision"
    decision_gate: |
      Advance only with triage outcome in writing.
  - name: "Reply"
    intent: "Within 24h: send reply that either books a call or politely declines + refers."
    tasks:
      - "Draft personalised reply (3-7 sentences)"
      - "Attach calendar link if qualifying"
      - "If declining, include 1-2 referral options"
    methodologies:
      - slug: selling-ideas
        path: solo/comms/communicator/selling-ideas
        required: true
        tier_gate: solo
      - slug: growth-copywriting-fundamentals
        path: solo/marketing/content-marketer/growth-copywriting-fundamentals
        required: true
        tier_gate: solo
      - slug: freelancer-inbound-reply-template
        path: solo/_gap/freelancer-inbound-reply-template
        required: true
        tier_gate: solo
    outputs:
      - "Reply sent"
    decision_gate: |
      Cycle closes only when reply is sent within 24h of inbound.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 9000
cli_invocations:
  human:  "faion get-content cold-lead-inbound-reply --format md"
  agent:  "faion get-content cold-lead-inbound-reply --format context"
  json:   "faion get-content cold-lead-inbound-reply --format json"

changelog:
