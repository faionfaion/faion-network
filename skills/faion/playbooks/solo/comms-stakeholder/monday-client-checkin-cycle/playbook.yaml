slug: monday-client-checkin-cycle
title: "Monday client check-in cycle (one per active client)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 6482aff3490134af

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P3]

intent: |
  Each active client receives a 5-10 min status note before noon Monday: what shipped last week, what's next, blockers, expected hours. Done = all active clients pinged, replies tracked, week's plan adjusted.

scope: |
  Each active client receives a 5-10 min status note before noon Monday: what shipped last week, what's next, blockers, expected hours. Done = all active clients pinged, replies tracked, week's plan adjusted.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Prepare stage complete: Draft updates per client (4-line max)"
  - "Send stage complete: Updates sent log"
  - "Adapt stage complete: Updated weekly plan"

stages:
  - name: "Prepare"
    intent: "By Sunday evening, draft Monday updates per active client."
    tasks:
      - "List active clients"
      - "Per client: collect last-week shipped + this-week plan + blockers"
      - "Draft 5-10 min status note per client"
    methodologies:
      - slug: communications-management
        path: pro/pm/project-manager/communications-management
        required: true
        tier_gate: pro
      - slug: raci-matrix
        path: pro/pm/project-manager/raci-matrix
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement
        path: pro/pm/project-manager/stakeholder-engagement
        required: true
        tier_gate: pro
      - slug: stakeholder-communication
        path: solo/comms/communicator/stakeholder-communication
        required: true
        tier_gate: solo
      - slug: solo-monday-update-template
        path: solo/_gap/solo-monday-update-template
        required: true
        tier_gate: solo
    outputs:
      - "Draft updates per client (4-line max)"
    decision_gate: |
      Advance once every active client has a draft. No blanks.
  - name: "Send"
    intent: "All updates out before noon Monday."
    tasks:
      - "Send updates via each client's preferred channel"
      - "Set reply tracking"
    methodologies:
      - slug: change-control
        path: pro/pm/project-manager/change-control
        required: true
        tier_gate: pro
      - slug: business-storytelling
        path: solo/comms/communicator/business-storytelling
        required: true
        tier_gate: solo
    outputs:
      - "Updates sent log"
    decision_gate: |
      Advance once 100% of active clients pinged before noon.
  - name: "Adapt"
    intent: "Use replies to adjust this week's plan."
    tasks:
      - "Triage replies by urgency"
      - "Re-order this week's task list"
      - "Log new blockers in personal CRM"
    methodologies:
      - slug: freelancer-personal-crm-minimal
        path: solo/_gap/freelancer-personal-crm-minimal
        required: true
        tier_gate: solo
    outputs:
      - "Updated weekly plan"
      - "CRM entry per client"
    decision_gate: |
      Cycle closes only after every reply is acknowledged within 24h.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 9000
