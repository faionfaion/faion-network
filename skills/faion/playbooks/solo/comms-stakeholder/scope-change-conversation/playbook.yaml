slug: scope-change-conversation
title: "Scope-change conversation when client says 'just one more thing'"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: b8dbf1fcbb29b382

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P3]

intent: |
  Inbound request outside agreed scope. Done = either a written change order with new price/timeline, or a polite deferral to next sprint, with no silent absorption.

scope: |
  Inbound request outside agreed scope. Done = either a written change order with new price/timeline, or a polite deferral to next sprint, with no silent absorption.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Triage stage complete: Triage decision note"
  - "Talk stage complete: Conversation outcome note"
  - "Document stage complete: Countersigned change-order"

stages:
  - name: "Triage"
    intent: "Decide whether ask is in-scope, change-order, or defer."
    tasks:
      - "Re-read SOW"
      - "Estimate effort delta"
      - "Pick triage outcome"
    methodologies:
      - slug: requirements-validation
        path: pro/ba/business-analyst/requirements-validation
        required: true
        tier_gate: pro
      - slug: change-control
        path: pro/pm/project-manager/change-control
        required: true
        tier_gate: pro
      - slug: scope-management
        path: pro/pm/project-manager/scope-management
        required: true
        tier_gate: pro
    outputs:
      - "Triage decision note"
    decision_gate: |
      Refuse to start work until triage outcome is written.
  - name: "Talk"
    intent: "Have the conversation: change-order or graceful defer."
    tasks:
      - "Open with what you heard them ask"
      - "Present effort delta + price + timeline impact"
      - "Land on change-order, defer, or no-thanks"
    methodologies:
      - slug: communications-management
        path: pro/pm/project-manager/communications-management
        required: true
        tier_gate: pro
      - slug: difficult-conversations
        path: solo/comms/communicator/difficult-conversations
        required: true
        tier_gate: solo
      - slug: negotiation
        path: solo/comms/communicator/negotiation
        required: true
        tier_gate: solo
      - slug: freelancer-scope-change-script-library
        path: solo/_gap/freelancer-scope-change-script-library
        required: true
        tier_gate: solo
    outputs:
      - "Conversation outcome note"
    decision_gate: |
      Required: a written outcome. No silent absorption.
  - name: "Document"
    intent: "Get the change-order in writing."
    tasks:
      - "Draft mini-contract or amendment"
      - "Get countersignature before work starts"
      - "Update project plan + invoice schedule"
    methodologies:
      - slug: solo-change-order-mini-contract
        path: solo/_gap/solo-change-order-mini-contract
        required: true
        tier_gate: solo
    outputs:
      - "Countersigned change-order"
      - "Updated plan"
    decision_gate: |
      Work does not start until amendment is countersigned.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 9000
cli_invocations:
  human:  "faion get-content scope-change-conversation --format md"
  agent:  "faion get-content scope-change-conversation --format context"
  json:   "faion get-content scope-change-conversation --format json"

