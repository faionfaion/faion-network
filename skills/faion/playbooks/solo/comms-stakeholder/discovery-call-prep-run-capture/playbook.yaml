slug: discovery-call-prep-run-capture
title: "Discovery call prep + run + capture"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: b12b62498f99810f

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P3]

intent: |
  30-min prospect call: walk in with a hypothesis, walk out with enough signal to draft a proposal OR a clean disqualify. Done = call notes saved, fit score recorded, next-step email sent within 24h.

scope: |
  30-min prospect call: walk in with a hypothesis, walk out with enough signal to draft a proposal OR a clean disqualify. Done = call notes saved, fit score recorded, next-step email sent within 24h.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Prep stage complete: Pre-call note"
  - "Run stage complete: Live call recording / notes"
  - "Capture stage complete: Call notes file"

stages:
  - name: "Prep"
    intent: "Walk into the call with hypothesis, agenda, and disqualifiers."
    tasks:
      - "Research prospect (company, role, public artefacts)"
      - "Write 3 hypotheses about their pain"
      - "Draft an agenda with explicit disqualifiers"
    methodologies:
      - slug: elicitation-techniques
        path: pro/ba/business-analyst/elicitation-techniques
        required: true
        tier_gate: pro
      - slug: stakeholder-analysis
        path: pro/ba/business-analyst/stakeholder-analysis
        required: true
        tier_gate: pro
      - slug: competitor-analysis
        path: pro/research/researcher/competitor-analysis
        required: true
        tier_gate: pro
    outputs:
      - "Pre-call note"
      - "Hypotheses doc"
      - "Agenda + disqualifiers"
    decision_gate: |
      Advance only with prep notes in writing. Winging it bias kills signal.
  - name: "Run"
    intent: "Run a 30-min call: listen, capture signal, avoid pitching."
    tasks:
      - "Open with prospect's context, not yours"
      - "Use Mom Test questions; avoid yes/no leading"
      - "End with explicit next step"
    methodologies:
      - slug: requirements-prioritization
        path: pro/ba/business-analyst/requirements-prioritization
        required: true
        tier_gate: pro
      - slug: active-listening
        path: solo/comms/communicator/active-listening
        required: true
        tier_gate: solo
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: storytelling
        path: solo/comms/communicator/storytelling
        required: true
        tier_gate: solo
      - slug: freelancer-discovery-call-template
        path: solo/_gap/freelancer-discovery-call-template
        required: true
        tier_gate: solo
    outputs:
      - "Live call recording / notes"
    decision_gate: |
      Call closes only when next step is verbally agreed.
  - name: "Capture"
    intent: "Save notes, score fit, send next-step within 24h."
    tasks:
      - "Transcribe key quotes within 4h"
      - "Score fit on rubric"
      - "Send next-step email with proposal/decline within 24h"
    methodologies:
      - slug: solo-lead-qualification-rubric
        path: solo/_gap/solo-lead-qualification-rubric
        required: true
        tier_gate: solo
    outputs:
      - "Call notes file"
      - "Fit score"
      - "Next-step email sent"
    decision_gate: |
      Cycle closes only when fit score recorded + next-step sent.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 14000
