slug: friday-weekly-client-report
title: "Friday weekly client report"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: ae184748a9fbdaa5

tier_min: solo
complexity: light
context: [solo]
persona_hints: [P3]

intent: |
  End-of-week recap to each active client: shipped / blocked / next, plus hours logged. Done = report sent, invoice draft updated, retainer-cap watch list refreshed.

scope: |
  End-of-week recap to each active client: shipped / blocked / next, plus hours logged. Done = report sent, invoice draft updated, retainer-cap watch list refreshed.

non_goals:
  - "Hiring employees or building a team — solo operator throughout"
  - "Enterprise procurement processes — SMB / startup buyers only"

prerequisites:
  - "Active freelance practice with at least one paying client"
  - "A bookkeeping / time-tracking baseline in place"

success_criteria:
  - "Compile stage complete: Raw weekly compile per client"
  - "Write report stage complete: Weekly report per client"
  - "Send + invoice stage complete: Reports sent log"

stages:
  - name: "Compile"
    intent: "Pull together shipped, blocked, next, hours."
    tasks:
      - "Pull commits / tickets / time tracker"
      - "Categorise into shipped / blocked / next"
      - "Sum hours vs retainer cap"
    methodologies:
      - slug: earned-value-management
        path: pro/pm/project-manager/earned-value-management
        required: true
        tier_gate: pro
      - slug: performance-domains-overview
        path: pro/pm/project-manager/performance-domains-overview
        required: true
        tier_gate: pro
      - slug: solo-time-tracking-discipline
        path: solo/_gap/solo-time-tracking-discipline
        required: true
        tier_gate: solo
    outputs:
      - "Raw weekly compile per client"
    decision_gate: |
      Advance only when every active client has data ready.
  - name: "Write report"
    intent: "Crisp shipped/blocked/next note with retainer-cap awareness."
    tasks:
      - "Write 4-section report per client"
      - "Highlight any retainer-cap risks"
      - "Attach week-on-week metric trend if applicable"
    methodologies:
      - slug: business-storytelling
        path: solo/comms/communicator/business-storytelling
        required: true
        tier_gate: solo
      - slug: stakeholder-communication
        path: solo/comms/communicator/stakeholder-communication
        required: true
        tier_gate: solo
      - slug: freelancer-weekly-report-template
        path: solo/_gap/freelancer-weekly-report-template
        required: true
        tier_gate: solo
    outputs:
      - "Weekly report per client"
    decision_gate: |
      Report must include retainer-cap line. No exceptions.
  - name: "Send + invoice"
    intent: "Send Friday before EOD; update invoice draft for month-end."
    tasks:
      - "Send report through preferred channel"
      - "Update draft invoice with this-week's hours"
      - "Update watch list for caps near limit"
    methodologies:
      - slug: ops-financial-basics
        path: pro/marketing/gtm-strategist/ops-financial-basics
        required: true
        tier_gate: pro
    outputs:
      - "Reports sent log"
      - "Updated invoices"
      - "Cap watch list"
    decision_gate: |
      Cycle closes only when invoice drafts are current.

common_pitfalls:
  - "Treating decision_gate as a suggestion — playbook collapses to a checklist if gates are not enforced"
  - "Skipping written artifacts because 'it's in my head' — kills traceability and future re-use"

quality_checklist:
  - "Did every stage produce a written artifact a stranger could read?"
  - "Did I actually advance only when the decision_gate criterion was met?"

related_playbooks: []

token_budget_estimate: 9000
cli_invocations:
  human:  "faion get-content friday-weekly-client-report --format md"
  agent:  "faion get-content friday-weekly-client-report --format context"
  json:   "faion get-content friday-weekly-client-report --format json"

