# =============================================================================
# Multi-product portfolio rotation: ship N small bets per year
# Persona: P2 Indie Hacker — F-064
# =============================================================================

slug: multi-product-portfolio-rotation
title: "Multi-product portfolio rotation: ship N small bets per year"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 945431edc3056222

tier_min: solo
complexity: deep
context: [solo]
persona_hints: [P2]

intent: |
  Random side-projects → a yearly rotation of 4–6 small bets compounding into ramen profitability.

scope: |
  Solo indie hacker runs a documented quarterly rotation that ships 4 to 6 small products per year, keeps the 2 to 3 with traction, sunsets the rest, and compounds the survivors into a portfolio that hits ramen profitability.

non_goals:
  - "Single-bet maximalism — this is portfolio strategy"
  - "Hiring or outsourcing — pure solo throughput"
  - "Building one large product — explicit 'tiny bets' frame"

prerequisites:
  - "At least one shipped product (alive or sunsetted) as baseline"
  - "A simple metrics dashboard across all live products"

success_criteria:
  - "Quarterly cadence calendar in place"
  - "Documented portfolio scorecard with kill/keep thresholds"
  - "≥4 shipped bets per year"
  - "Maintain-mode SOPs for surviving products"
  - "Annual P&L reconciles ≥80% of revenue to ≤2 winners"

stages:
  - name: "Backlog"
    intent: "A live idea-pool feeds the rotation faster than ideas die."
    tasks:
      - "Maintain an idea inbox tagged by JTBD and audience-fit"
      - "Score new entries weekly using a lightweight RICE"
      - "Cull the bottom quartile every month"
    methodologies:
      - slug: idea-generation
        path: solo/research/market-researcher/idea-generation
        required: true
        tier_gate: solo
      - slug: idea-generation-methods
        path: solo/research/market-researcher/idea-generation-methods
        required: true
        tier_gate: solo
      - slug: feature-prioritization-rice
        path: solo/product/product-manager/feature-prioritization-rice
        required: true
        tier_gate: solo
    outputs:
      - "Tagged idea inbox"
      - "Top-of-stack 'next 3 bets' shortlist"
    decision_gate: |
      Advance when ≥10 ideas sit in the inbox with scores.
  - name: "Rotation"
    intent: "One bet per quarter enters build; one exits to keep / kill."
    tasks:
      - "Lock the bet for the quarter — no scope-swap mid-cycle"
      - "Define the kill criteria up front"
      - "Schedule a 7-day spike to confirm feasibility"
    methodologies:
      - slug: micro-mvps
        path: solo/product/product-planning/micro-mvps
        required: true
        tier_gate: solo
      - slug: outcome-based-roadmaps
        path: solo/product/product-planning/outcome-based-roadmaps
        required: true
        tier_gate: solo
      - slug: feature-prioritization-moscow
        path: solo/product/product-manager/feature-prioritization-moscow
        required: true
        tier_gate: solo
    outputs:
      - "Quarterly bet brief"
      - "Kill criteria attached to the brief"
    decision_gate: |
      Advance if spike confirms feasibility within the quarter's effort budget.
  - name: "Ship"
    intent: "Bet reaches MVP launch within the quarter."
    tasks:
      - "Run the MVP launch checklist (positioning, pricing, payment)"
      - "Open a Stripe path even for free-tier products"
      - "Capture day-1 telemetry from launch"
    methodologies:
      - slug: feature-discovery
        path: solo/research/researcher/feature-discovery
        required: true
        tier_gate: solo
      - slug: product-lifecycle
        path: solo/product/product-operations/product-lifecycle
        required: true
        tier_gate: solo
      - slug: stripe-integration-basics
        path: solo/launch-operations/stripe-integration-basics
        required: true
        tier_gate: solo
    outputs:
      - "Live product"
      - "Day-1 metrics snapshot"
    decision_gate: |
      Advance if MVP launches within the quarter; else move bet to 'aborted' with notes.
  - name: "Triage"
    intent: "Each quarter, survivors get sustained; losers get sunsetted."
    tasks:
      - "Run portfolio scorecard at quarter-end"
      - "Move survivors to maintain mode; sunset the rest"
      - "Schedule sunset comms and asset harvest"
    methodologies:
      - slug: product-analytics
        path: solo/product/product-operations/product-analytics
        required: true
        tier_gate: solo
      - slug: ops-customer-support
        path: solo/marketing/gtm-strategist/ops-customer-support
        required: true
        tier_gate: solo
      - slug: product-ops
        path: solo/product-ops
        required: true
        tier_gate: solo
    outputs:
      - "Updated portfolio scorecard"
      - "Sunset list + comms plan"
    decision_gate: |
      Each product: keep if revenue OR active-user metric trends up; sunset if neither.
  - name: "Compound"
    intent: "Surviving products share content, audience, and automation."
    tasks:
      - "Cross-link audiences between survivors"
      - "Consolidate content engine across products"
      - "Automate operational toil with shared scripts"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: automation-tooling
        path: solo/dev/automation-tooling
        required: true
        tier_gate: solo
      - slug: weekly-review-solo
        path: solo/product-planning/weekly-review-solo
        required: true
        tier_gate: solo
    outputs:
      - "Shared content calendar"
      - "Automation backlog"
    decision_gate: |
      Advance into the next rotation when surviving products run on <1 day/wk of toil.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

related_playbooks:
  - solo-idea-to-validated-mvp
token_budget_estimate: 19500
cli_invocations:
