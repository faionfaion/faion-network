# =============================================================================
# Distribution-first idea validation (audience before product)
# Persona: P2 Indie Hacker — F-064
# =============================================================================

slug: distribution-first-idea-validation
title: "Distribution-first idea validation (audience before product)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: dd1a91339c12dc49

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P2]

intent: |
  Owned audience → next product chosen by audience signal plus paid pre-orders before code.

scope: |
  Pick the next product by mining an audience you already own (or are growing), not by guessing market need. Done = a signed waitlist plus paying pre-orders before line 1 of code, validated through audience-first conversations.

non_goals:
  - "Surveying random non-audience people"
  - "Picking based on TAM math alone"
  - "Building before pre-orders land"

prerequisites:
  - "An owned audience of ≥500 (X, newsletter, IH)"
  - "Ability to collect waitlist signups and Stripe pre-orders"

success_criteria:
  - "Audience-mined demand signal documented"
  - "Waitlist landing live"
  - "≥10 pre-orders collected before any build starts"
  - "Pre-sell validation report written"

stages:
  - name: "Mine"
    intent: "Audience tells you what they actually pay for."
    tasks:
      - "Pull 30 days of DMs, replies, and comments"
      - "Cluster pain points by frequency and intensity"
      - "Mom-test the top 3 pains over DM"
    methodologies:
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: growth-newsletter-growth
        path: solo/marketing/content-marketer/growth-newsletter-growth
        required: true
        tier_gate: solo
      - slug: growth-reddit-marketing
        path: solo/marketing/content-marketer/growth-reddit-marketing
        required: true
        tier_gate: solo
    outputs:
      - "Top-3 pain pool with quotes"
    decision_gate: |
      Advance only once each pain has at least 3 unprompted mentions.
  - name: "Frame"
    intent: "Turn the strongest pain into a product hypothesis."
    tasks:
      - "Write a 1-sentence product framing"
      - "Define pricing range from prior monetisation data"
      - "Sketch a micro-MVP scope"
    methodologies:
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: micro-mvps
        path: solo/product/product-planning/micro-mvps
        required: true
        tier_gate: solo
    outputs:
      - "Product hypothesis brief"
    decision_gate: |
      Advance only if 3 audience members react positively to the framing.
  - name: "Pre-sell"
    intent: "Waitlist plus paid pre-orders before any code."
    tasks:
      - "Ship a 1-page waitlist landing with explicit pre-order CTA"
      - "Open Stripe pre-order at a real price"
      - "Run a 7-day audience-only push"
    methodologies:
      - slug: growth-landing-page-design
        path: solo/marketing/conversion-optimizer/growth-landing-page-design
        required: true
        tier_gate: solo
    outputs:
      - "Live waitlist landing"
      - "≥10 paid pre-orders"
    decision_gate: |
      Advance only with ≥10 pre-orders or kill the bet.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

related_playbooks:
  - solo-idea-to-validated-mvp
token_budget_estimate: 16500
cli_invocations:
  human:  "faion get-content distribution-first-idea-validation --format md"
  agent:  "faion get-content distribution-first-idea-validation --format context"
  json:   "faion get-content distribution-first-idea-validation --format json"

changelog:
