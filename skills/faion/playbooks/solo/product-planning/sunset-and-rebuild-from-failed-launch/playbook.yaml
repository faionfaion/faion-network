# =============================================================================
# Sunset and rebuild from a failed launch
# Persona: P2 Indie Hacker — F-064
# =============================================================================

slug: sunset-and-rebuild-from-failed-launch
title: "Sunset and rebuild from a failed launch"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: d800c5257bb76f90

tier_min: solo
complexity: medium
context: [solo]
persona_hints: [P2]

intent: |
  Failed launch → clean shutdown plus a sharper next-bet plan in 30 days.

scope: |
  Turn a missed launch into a clean shutdown plus a sharper next-bet plan: refund/migrate users, harvest learnings publicly, recycle assets, and decide on rebuild vs pivot vs walk away with an explicit rationale.

non_goals:
  - "Reviving the failed product for vanity reasons"
  - "Long-form sunk-cost rescue attempts"
  - "Hiring help to keep the product alive — explicit kill option"

prerequisites:
  - "A launched but underperforming product"
  - "A baseline metric showing the launch fell short"

success_criteria:
  - "Documented postmortem with evidence and 3 lessons"
  - "All paying users either refunded or migrated"
  - "Assets harvested into a reusable library"
  - "Written decision: rebuild / pivot / walk away"
  - "Next-bet brief or final retirement note"

stages:
  - name: "Assess"
    intent: "Make the failure crisp with numbers and quotes."
    tasks:
      - "Re-run the success metrics against the actual launch"
      - "Collect 5 user quotes on why the product missed"
      - "Distinguish problem-fit failure vs distribution failure"
    methodologies:
      - slug: jobs-to-be-done
        path: solo/research/researcher/jobs-to-be-done
        required: true
        tier_gate: solo
      - slug: problem-validation-2026
        path: solo/research/researcher/problem-validation-2026
        required: true
        tier_gate: solo
      - slug: user-interviews
        path: solo/research/researcher/user-interviews
        required: true
        tier_gate: solo
    outputs:
      - "Failure metrics summary"
      - "5 user-quote postmortem inputs"
    decision_gate: |
      Advance when failure mode is named in one sentence.
  - name: "Sunset Comms"
    intent: "Users hear it from you first, with a clear path."
    tasks:
      - "Send a sunset email with refund or migration path"
      - "Publish a public retro on IH and X"
      - "Process refunds within 14 days"
    methodologies:
      - slug: mom-test
        path: solo/comms/communicator/mom-test
        required: true
        tier_gate: solo
      - slug: storytelling
        path: solo/comms/communicator/storytelling
        required: true
        tier_gate: solo
      - slug: ops-customer-support
        path: solo/marketing/gtm-strategist/ops-customer-support
        required: true
        tier_gate: solo
      - slug: refund-handling
        path: solo/launch-operations/refund-handling
        required: true
        tier_gate: solo
    outputs:
      - "Public sunset post"
      - "Refund log"
    decision_gate: |
      Advance only after all paying users have a confirmed status.
  - name: "Asset Harvest"
    intent: "Code, copy, audience, and infra survive even if the product does not."
    tasks:
      - "Tag reusable components, prompts, and copy"
      - "Migrate audience to an umbrella newsletter or handle"
      - "Cut infra costs — pull the plug on unused services"
    methodologies:
      - slug: growth-content-marketing
        path: solo/marketing/content-marketer/growth-content-marketing
        required: true
        tier_gate: solo
      - slug: growth-twitter-x-growth
        path: solo/marketing/smm-manager/growth-twitter-x-growth
        required: true
        tier_gate: solo
      - slug: cost-free-stack
        path: free/cost-free-stack
        required: true
        tier_gate: free
      - slug: product-lifecycle
        path: solo/product/product-operations/product-lifecycle
        required: true
        tier_gate: solo
    outputs:
      - "Asset library updated"
      - "Infra cost diff (before vs after)"
    decision_gate: |
      Advance once monthly infra costs are documented at the new baseline.
  - name: "Lessons"
    intent: "A public retro that builds trust and refines the next bet."
    tasks:
      - "Write a 3-lesson postmortem ranked by stakes"
      - "Frame the lessons in MoM-test language (no bragging)"
      - "Invite reader replies — feed the next-bet idea pool"
    methodologies:
      - slug: growth-indiehackers-strategy
        path: solo/marketing/gtm-strategist/growth-indiehackers-strategy
        required: true
        tier_gate: solo
      - slug: feedback-management
        path: solo/product/product-operations/feedback-management
        required: true
        tier_gate: solo
      - slug: idea-generation
        path: solo/research/market-researcher/idea-generation
        required: true
        tier_gate: solo
    outputs:
      - "Postmortem post"
      - "Updated idea pool"
    decision_gate: |
      Advance only once the retro is public and triaged.
  - name: "Next Bet"
    intent: "Choose rebuild, pivot, or retire with a documented rationale."
    tasks:
      - "Score 3 candidate next bets using a quick RICE"
      - "Run niche-evaluation on the top score"
      - "Write the decision: rebuild / pivot / walk away"
    methodologies:
      - slug: feature-prioritization-rice
        path: solo/product/product-manager/feature-prioritization-rice
        required: true
        tier_gate: solo
      - slug: niche-evaluation
        path: solo/research/market-researcher/niche-evaluation
        required: true
        tier_gate: solo
      - slug: ops-financial-planning
        path: solo/marketing/gtm-strategist/ops-financial-planning
        required: true
        tier_gate: solo
      - slug: roadmap-for-one-person
        path: solo/product-planning/roadmap-for-one-person
        required: true
        tier_gate: solo
      - slug: weekly-review-solo
        path: solo/product-planning/weekly-review-solo
        required: true
        tier_gate: solo
    outputs:
      - "Decision doc"
      - "Next-bet brief OR retirement note"
    decision_gate: |
      Required output: explicit verdict. Pivot only with a fresh JTBD; walking away is valid.

common_pitfalls:
  - "Treating the playbook as a checklist instead of a decision tree"
  - "Skipping decision gates when intermediate progress feels good"
  - "Letting tools or platforms replace the founder's own judgement"

quality_checklist:
  - "Did each stage produce its named output or get explicitly skipped with a note?"
  - "Were decision gates respected or quietly bypassed?"
  - "Is the evidence trail strong enough to defend the verdict externally?"

