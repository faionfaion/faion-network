slug: pr-review-with-junior-mentoring
title: "PR review with junior present (mentoring loop)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 2310c60bf79d9614

tier_min: geek
complexity: medium
context: [team]
persona_hints: [P6]

intent: |
  Routine PR review → paired senior+junior session where AI handles the mechanical floor and human time goes to design + judgment.

scope: |
  Senior + junior pair on a single PR review. AI bot pre-runs lint / security / test-coverage on the diff so the human time is freed for design, naming, boundaries, and judgment. Senior narrates *why* on each comment. Junior leaves with a written next-PR checklist captured from the session. Mistakes go to mistake-memory; patterns to pattern-memory.

non_goals:
  - "Speeding up reviews — this is intentionally slower than a normal review"
  - "Hiring screen reviews — see hiring-screen-take-home-review"
  - "Architectural review — see weekly-architectural-review"

prerequisites:
  - "Junior has read the team's code-review-basics methodology"
  - "AI bot pre-runs lint + security + coverage on PRs"
  - "Pre-commit + autofix wired so trivial issues never reach review"

success_criteria:
  - "PR reviewed end-to-end with senior narrating reasoning"
  - "Junior next-PR checklist written down (≥5 concrete items)"
  - "Pattern-memory updated with reusable insights"
  - "Mistake-memory updated where junior's first instincts were wrong"
  - "Pair-programming retro logged"

stages:
  - name: "Pre-review — AI floor"
    intent: "AI clears the mechanical noise; humans review what's left."
    tasks:
      - "Run lint pre-commit floor"
      - "Auto-fix vs flag decision-rule applied"
      - "Lint staged-only (not whole tree)"
      - "Run CodeQL autofix on PR"
      - "Run secrets defense-in-depth scan"
    methodologies:
      - slug: lint-precommit-floor
        path: geek/sdlc-ai/lint-precommit-floor
        required: true
        tier_gate: geek
      - slug: lint-autofix-vs-flag-decision-rule
        path: geek/sdlc-ai/lint-autofix-vs-flag-decision-rule
        required: true
        tier_gate: geek
      - slug: lint-staged-only-not-whole-tree
        path: geek/sdlc-ai/lint-staged-only-not-whole-tree
        required: true
        tier_gate: geek
      - slug: sec-codeql-autofix-on-pr
        path: geek/sdlc-ai/sec-codeql-autofix-on-pr
        required: true
        tier_gate: geek
      - slug: sec-secrets-defense-in-depth
        path: geek/sdlc-ai/sec-secrets-defense-in-depth
        required: true
        tier_gate: geek
    outputs:
      - "Cleaned diff with auto-fixed items resolved"
      - "Open AI findings list"
    decision_gate: |
      Advance only after pre-commit + CodeQL autofix have run. Senior should not be reading whitespace.

  - name: "Paired review session"
    intent: "Senior narrates; junior asks; reviewer-graph-vs-diff perspective applied."
    tasks:
      - "Walk the diff vs graph-context (callers/callees) together"
      - "Senior narrates the why behind each comment"
      - "Junior states their first instinct out loud, then re-evaluates"
      - "Pair on at least one concrete refactor live"
      - "Reference team code-review + code-review-process methodologies"
    methodologies:
      - slug: code-review
        path: free/dev/code-quality/code-review
        required: true
        tier_gate: free
      - slug: code-review-process
        path: free/dev/code-quality/code-review-process
        required: true
        tier_gate: free
      - slug: code-review-basics
        path: free/dev/code-quality/code-review-basics
        required: true
        tier_gate: free
      - slug: pair-programming
        path: free/dev/code-quality/pair-programming
        required: true
        tier_gate: free
      - slug: mr-graph-vs-diff-reviewer
        path: geek/sdlc-ai/mr-graph-vs-diff-reviewer
        required: true
        tier_gate: geek
      - slug: code-review-cycle
        path: solo/sdd/sdd/code-review-cycle
        required: true
        tier_gate: solo
      - slug: quality-gates-confidence
        path: solo/sdd/sdd/quality-gates-confidence
        required: true
        tier_gate: solo
    outputs:
      - "Reviewed PR with narrated comments"
      - "Live-refactor commit"
    decision_gate: |
      Advance once junior can summarise the senior's reasoning back unaided. If not, slow down — the session failed its primary goal.

  - name: "Capture + close"
    intent: "Convert the session into durable assets: junior's checklist + team memory."
    tasks:
      - "Write junior's next-PR checklist (≥5 items)"
      - "Update pattern-memory with reusable insights"
      - "Update mistake-memory where junior's first instincts were wrong"
      - "Reflexion-learning entry for senior on their own mentoring"
    methodologies:
      - slug: pattern-memory
        path: solo/sdd/sdd/pattern-memory
        required: true
        tier_gate: solo
      - slug: mistake-memory
        path: solo/sdd/sdd/mistake-memory
        required: true
        tier_gate: solo
      - slug: reflexion-learning
        path: solo/sdd/sdd/reflexion-learning
        required: true
        tier_gate: solo
    outputs:
      - "Next-PR checklist for the junior"
      - "Updated team memory entries"
    decision_gate: |
      Required output: written checklist. Verbal mentoring without artefact = lesson lost by next PR.

common_pitfalls:
  - "Senior overrides without explanation — junior learns compliance, not judgment"
  - "AI noise not pre-cleared — human time burned on whitespace"
  - "No artefact at the end — junior's next PR repeats the same misses"
  - "Treating the session as a normal-speed review — defeats the mentoring goal"

quality_checklist:
  - "Can the junior write down what the senior taught them?"
  - "Did at least one comment include 'because X, not Y' reasoning?"
  - "Did anything from the session end up in pattern-memory?"

related_playbooks:
