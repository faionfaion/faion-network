slug: incident-postmortem-preventive-backlog
title: "Incident → postmortem → preventive backlog"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: e006a47d5fe28451

tier_min: geek
complexity: medium
context: [team]
persona_hints: [P6]

intent: |
  Paging alert → contained impact → human-published postmortem → merged preventive PRs in backlog.

scope: |
  An alert pages. On-call contains customer impact, documents root cause, lets the AI auto-draft a postmortem (no auto-publish), and converts action items into costed preventive PRs slotted into the backlog with named owners. No naming-and-shaming. Every incident raises a guardrail.

non_goals:
  - "Routine alert triage — covered by sentry-datadog-alert-triage"
  - "Annual audit prep — see soc2-gdpr-audit-prep"
  - "Incident comms templating beyond what runbook prescribes"

prerequisites:
  - "On-call rotation with documented escalation path"
  - "Runbook system (markdown tagged steps)"
  - "AI postmortem drafter wired (no auto-publish)"

success_criteria:
  - "Customer impact contained and verifiable"
  - "Root cause documented (technical + organisational layers)"
  - "Postmortem published (human-edited, not auto)"
  - "Action items costed (token + complexity)"
  - "Action items slotted into backlog with named owners"
  - "Risk register updated with new entry or modified existing"
  - "Stakeholder comms loop closed"

stages:
  - name: "Contain + investigate"
    intent: "Stop the bleeding under read-only-investigation default and approval-gate boundaries."
    tasks:
      - "Page on-call, enter read-only-investigation default"
      - "Use AI triage to classify + route incoming signals"
      - "Apply tool-tier approval gate for any write action"
      - "Open circuit breakers / fall back if applicable"
    methodologies:
      - slug: inc-read-only-investigation-default
        path: geek/sdlc-ai/inc-read-only-investigation-default
        required: true
        tier_gate: geek
      - slug: inc-tool-tier-approval-gate
        path: geek/sdlc-ai/inc-tool-tier-approval-gate
        required: true
        tier_gate: geek
      - slug: inc-runbook-as-markdown-tagged-steps
        path: geek/sdlc-ai/inc-runbook-as-markdown-tagged-steps
        required: true
        tier_gate: geek
      - slug: tracker-ai-triage-classify-route
        path: geek/sdlc-ai/tracker-ai-triage-classify-route
        required: true
        tier_gate: geek
      - slug: microservices-circuit-breaker
        path: pro/dev/software-developer/microservices-circuit-breaker
        required: true
        tier_gate: pro
      - slug: lb-high-availability
        path: pro/infra/cicd-engineer/lb-high-availability
        required: true
        tier_gate: pro
    outputs:
      - "Containment record"
      - "Tagged runbook step trail"
    decision_gate: |
      Advance once user-facing impact is contained AND a senior engineer has confirmed read-only default was respected.

  - name: "Root cause"
    intent: "Walk logs, metrics, traces; chaos-eval evidence; reconstruct causal chain."
    tasks:
      - "Walk ELK queries + alerting trail"
      - "Cross-reference Grafana dashboards + Prometheus alerts"
      - "Apply chaos-eval fault-injection learnings if relevant"
      - "Write causal chain (5 whys at minimum)"
    methodologies:
      - slug: devops-elk-queries-alerting
        path: pro/infra/devops-engineer/devops-elk-queries-alerting
        required: true
        tier_gate: pro
      - slug: elk-stack-logging
        path: pro/infra/cicd-engineer/elk-stack-logging
        required: true
        tier_gate: pro
      - slug: grafana-basics
        path: pro/infra/cicd-engineer/grafana-basics
        required: true
        tier_gate: pro
      - slug: prometheus-monitoring
        path: pro/infra/cicd-engineer/prometheus-monitoring
        required: true
        tier_gate: pro
      - slug: aiops
        path: pro/infra/cicd-engineer/aiops
        required: false
        tier_gate: pro
      - slug: chaos-eval-fault-injection
        path: geek/ai/ai-agents/chaos-eval-fault-injection
        required: false
        tier_gate: geek
    outputs:
      - "Causal chain doc"
      - "Linked dashboards + queries"
    decision_gate: |
      Advance when the causal chain spans technical + organisational layers (not just 'a config was wrong').

  - name: "Postmortem — drafted, human-published"
    intent: "AI drafts; humans edit + publish. Blameless tone enforced."
    tasks:
      - "Run inc-postmortem-auto-draft-no-publish"
      - "Edit for accuracy + tone (no naming-and-shaming)"
      - "Publish with explicit timeline + impact + RC + actions"
      - "Notify stakeholders per comms plan"
    methodologies:
      - slug: inc-postmortem-auto-draft-no-publish
        path: geek/sdlc-ai/inc-postmortem-auto-draft-no-publish
        required: true
        tier_gate: geek
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: stakeholder-engagement-advanced
        path: pro/pm/project-manager/stakeholder-engagement-advanced
        required: true
        tier_gate: pro
      - slug: mistake-memory
        path: solo/sdd/sdd/mistake-memory
        required: true
        tier_gate: solo
    outputs:
      - "Published postmortem"
      - "Updated mistake-memory entry"
    decision_gate: |
      Required output: published postmortem with timeline + actions. No 'we'll publish later'.

  - name: "Preventive backlog"
    intent: "Action items become costed PRs slotted into the backlog with owners."
    tasks:
      - "Cost each action by complexity + token estimate"
      - "Decide auto-applied vs human-reviewed (CodeQL autofix where safe)"
      - "Slot into backlog with named owners + risk register link"
      - "Schedule follow-up review at 30 days"
    methodologies:
      - slug: sec-codeql-autofix-on-pr
        path: geek/sdlc-ai/sec-codeql-autofix-on-pr
        required: true
        tier_gate: geek
      - slug: risk-register
        path: pro/pm/pm-traditional/risk-register
        required: true
        tier_gate: pro
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
      - slug: security-sast
        path: pro/infra/cicd-engineer/security-sast
        required: false
        tier_gate: pro
      - slug: security-dast
        path: pro/infra/cicd-engineer/security-dast
        required: false
        tier_gate: pro
      - slug: gitops-progressive-delivery
        path: pro/infra/cicd-engineer/gitops-progressive-delivery
        required: false
        tier_gate: pro
    outputs:
      - "Costed action items in backlog"
      - "Owner + due date per item"
    decision_gate: |
      Required: every action has an owner. Orphaned actions guarantee the next incident repeats.

common_pitfalls:
  - "AI auto-publishes the postmortem — destroys trust if it includes wrong facts"
  - "Action items without owners — the repeat is just a matter of time"
  - "Naming-and-shaming language — kills future psychological safety"
  - "Skipping stakeholder comms — they hear about it from customers"

quality_checklist:
  - "Does the postmortem read as blameless and specific?"
  - "Can I point to each action item's owner and due date?"
  - "Did the risk register actually change as a result?"

related_playbooks:
  - sentry-datadog-alert-triage
  - rfc-to-production-feature-delivery
  - biweekly-retro-mistake-memory

token_budget_estimate: 18000
