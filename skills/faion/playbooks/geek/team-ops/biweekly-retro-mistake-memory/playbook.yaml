slug: biweekly-retro-mistake-memory
title: "Bi-weekly retro with mistake-memory feedback"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 94e8554bd8acc9bb

tier_min: geek
complexity: light
context: [team]
persona_hints: [P6]

intent: |
  Opinion-only retro → data-driven 45-min retro that exits with 2-3 owned experiments.

scope: |
  Team runs a 45-minute retro at sprint close. Inputs are not opinions only — also: AI-aggregated mistake-memory entries since last retro, DORA + alert-volume + on-call load + PR-cycle-time signals, value-stream-management lens. Outputs are 2-3 concrete experiments for the next sprint, each with an owner and a success criterion.

non_goals:
  - "Daily standups — see daily-standup-ai-prebrief"
  - "Quarter retros — see quarter-planning-okr-reset"
  - "Performance reviews — out of scope"

prerequisites:
  - "mistake-memory + pattern-memory updated through the sprint"
  - "DORA metrics available"
  - "Scrum/Kanban cadence in place"

success_criteria:
  - "Data inputs reviewed (mistake-memory + DORA + on-call)"
  - "2-3 experiments defined with owners"
  - "Each experiment has a written success criterion"
  - "Retro doc appended to history"

stages:
  - name: "Pre-read"
    intent: "AI summarises mistakes + DORA + value-stream signals before the room sits."
    tasks:
      - "AI synthesises mistake-memory since last retro"
      - "Pull DORA metrics"
      - "Pull on-call load + alert volume"
      - "Publish a pre-read in the channel"
    methodologies:
      - slug: mistake-memory
        path: solo/sdd/sdd/mistake-memory
        required: true
        tier_gate: solo
      - slug: dora-metrics
        path: pro/infra/devops-engineer/dora-metrics
        required: true
        tier_gate: pro
      - slug: value-stream-management
        path: pro/pm/pm-agile/value-stream-management
        required: true
        tier_gate: pro
    outputs:
      - "Pre-read post"
    decision_gate: |
      Advance when the pre-read is published. Retros that start without pre-read default to opinion-only.

  - name: "Run the 45-min retro"
    intent: "Look at signals + opinions; converge on 2-3 experiments."
    tasks:
      - "Read pre-read together"
      - "Add lived experience"
      - "Diverge on candidate experiments"
      - "Converge on 2-3 with owners + success criteria"
    methodologies:
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
      - slug: team-development
        path: pro/pm/pm-agile/team-development
        required: true
        tier_gate: pro
      - slug: quality-gates-confidence
        path: solo/sdd/sdd/quality-gates-confidence
        required: true
        tier_gate: solo
      - slug: reflexion-learning
        path: solo/sdd/sdd/reflexion-learning
        required: true
        tier_gate: solo
    outputs:
      - "Retro doc"
      - "2-3 experiments with owners"
    decision_gate: |
      End at 45 min. Spill is a sign of unfocused facilitation — schedule a follow-up if needed.

  - name: "Wire experiments into sprint"
    intent: "Experiments become real tickets in the next sprint with success criteria."
    tasks:
      - "File experiment tickets"
      - "Tag with retro-experiment label"
      - "Confirm owner ack"
    methodologies:
      - slug: pattern-memory
        path: solo/sdd/sdd/pattern-memory
        required: true
        tier_gate: solo
    outputs:
      - "Experiment tickets in tracker"
    decision_gate: |
      Required: tickets filed. Verbal experiments are next retro's complaints.

common_pitfalls:
  - "No pre-read — retro becomes opinions-only"
  - "More than 3 experiments — none ship"
  - "Experiments without success criteria — can't tell if they worked"
  - "Retro turns into theater for management — kills honesty"

quality_checklist:
  - "Did each experiment have a written success criterion?"
  - "Did we use the data, or just talk over it?"
  - "Will I know in 2 weeks whether this experiment succeeded?"

related_playbooks:
  - quarter-planning-okr-reset
  - incident-postmortem-preventive-backlog
  - daily-standup-ai-prebrief

token_budget_estimate: 9000
cli_invocations:
  human:  "faion get-content biweekly-retro-mistake-memory --format md"
  agent:  "faion get-content biweekly-retro-mistake-memory --format context"
  json:   "faion get-content biweekly-retro-mistake-memory --format json"

