slug: hiring-screen-take-home-review
title: "Hiring screen / take-home review"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 45c6fc1bc9d17e62

tier_min: geek
complexity: medium
context: [team]
persona_hints: [P6]

intent: |
  Candidate take-home / live coding → apples-to-apples rubric score (lint + sec + tests floor identical to team standard).

scope: |
  A candidate submits a take-home or completes a live coding loop. Reviewer scores against a fixed structured-interview rubric. AI bot runs the candidate's code through the same lint / security / test floors the team uses on its own PRs to make signal apples-to-apples. Bias check is run on rubric scoring before any decision is committed.

non_goals:
  - "Sourcing + posting — separate funnel"
  - "Offer + negotiation — out of scope"
  - "Onboarding — see hire-onboard-product-dev-2-weeks"

prerequisites:
  - "Structured interview rubric agreed by team"
  - "Lint / sec / test floor identical to team standard"
  - "Bias-check protocol in place"

success_criteria:
  - "Candidate code run through identical CI floor as internal PRs"
  - "Rubric score with line-item evidence"
  - "Bias-check completed on scoring"
  - "STAR-method interview notes captured"
  - "Hire / no-hire / next-round decision with reasoning"

stages:
  - name: "Run candidate code through team floor"
    intent: "AI bot lints + scans + runs tests at the same bar as team PRs."
    tasks:
      - "Run MegaLinter polyglot lint"
      - "Run pre-commit floor"
      - "Run CodeQL autofix on the submission"
      - "Capture findings count, not personality judgements"
    methodologies:
      - slug: lint-megalinter-polyglot
        path: geek/sdlc-ai/lint-megalinter-polyglot
        required: true
        tier_gate: geek
      - slug: lint-precommit-floor
        path: geek/sdlc-ai/lint-precommit-floor
        required: true
        tier_gate: geek
      - slug: sec-codeql-autofix-on-pr
        path: geek/sdlc-ai/sec-codeql-autofix-on-pr
        required: true
        tier_gate: geek
      - slug: code-review-basics
        path: free/dev/code-quality/code-review-basics
        required: true
        tier_gate: free
    outputs:
      - "Findings report"
    decision_gate: |
      Advance to human review only after the floor has run. Don't read whitespace.

  - name: "Structured interview + rubric scoring"
    intent: "Score with a structured interview rubric; capture STAR evidence."
    tasks:
      - "Apply structured-interview-design"
      - "Walk STAR-framework on past work"
      - "Use STAR-method on the take-home / live session"
      - "Score per-criterion with evidence quotes"
    methodologies:
      - slug: structured-interview-design
        path: pro/comms/hr-recruiter/structured-interview-design
        required: true
        tier_gate: pro
      - slug: star-interview-framework
        path: pro/comms/hr-recruiter/star-interview-framework
        required: true
        tier_gate: pro
      - slug: star-interview-method
        path: pro/comms/hr-recruiter/star-interview-method
        required: true
        tier_gate: pro
      - slug: interview-methods
        path: pro/comms/hr-recruiter/interview-methods
        required: true
        tier_gate: pro
    outputs:
      - "Rubric scorecard"
      - "STAR notes"
    decision_gate: |
      Advance only when every rubric line has an evidence quote. Vibes-only entries get rewritten.

  - name: "Bias check + decision"
    intent: "Bias-check the scoring before committing the verdict."
    tasks:
      - "Compare scoring vs identical-bar internal PR results"
      - "Flag any scoring delta that correlates with name / accent / school"
      - "Commit hire / no-hire / next-round decision with reasoning"
    methodologies:
      - slug: interview-methods
        path: pro/comms/hr-recruiter/interview-methods
        required: true
        tier_gate: pro
    outputs:
      - "Bias-check report"
      - "Final decision doc"
    decision_gate: |
      Required: written decision + bias check. Skipping bias check defaults to status-quo team shape.

common_pitfalls:
  - "Reading the submission before the AI floor has run — surfaces personal preferences before objective signal"
  - "Rubric scoring without evidence quotes — bias creeps in"
  - "Skipping bias check on 'obvious' decisions — these are the riskiest"
  - "Different bar for candidates vs internal PRs — invalidates the comparison"

quality_checklist:
  - "Did the floor run identically to a team PR?"
  - "Can each rubric score be traced to a quote / artifact?"
  - "Did the bias check actually look for patterns, not check a box?"

related_playbooks:
  - hire-onboard-product-dev-2-weeks
  - hire-to-productive-60-days-in-house

token_budget_estimate: 12000
cli_invocations:
  human:  "faion get-content hiring-screen-take-home-review --format md"
  agent:  "faion get-content hiring-screen-take-home-review --format context"
  json:   "faion get-content hiring-screen-take-home-review --format json"

