slug: weekly-architectural-review
title: "Weekly architectural review (45 min)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: dc002af7e4870be2

tier_min: geek
complexity: medium
context: [team]
persona_hints: [P6]

intent: |
  Risk of architectural drift → 45-min weekly review with explicit pattern-promotion + ADR queue + design-doc updates.

scope: |
  Architect + 2-3 senior engineers walk the week's significant PRs and open RFCs. Goal: spot drift early (cross-service coupling, layering violations, missed reuse), promote good patterns to team `patterns.md`, queue ADRs for decisions worth memorialising. 45-minute hard stop. Output is a written set of queued ADRs + pattern-promotions + design-doc deltas.

non_goals:
  - "PR-level review — see pr-review-with-junior-mentoring"
  - "Cross-quarter strategy — see quarter-planning-okr-reset"
  - "Incident postmortems — see incident-postmortem-preventive-backlog"

prerequisites:
  - "Graph-vs-diff reviewer tooling in place"
  - "patterns.md + mistakes.md in repo"
  - "ADR convention adopted by team"

success_criteria:
  - "Significant PRs walked with architectural lens"
  - "Drift signals flagged with owner"
  - "Pattern-promotions appended to patterns.md"
  - "ADR queue updated"
  - "design-docs-patterns updates queued where needed"

stages:
  - name: "Rank + walk"
    intent: "Rank the week's PRs by architectural impact; walk the top of the list."
    tasks:
      - "Pull merged + open PRs"
      - "Rank by architectural-impact score (cross-service, new dep, new pattern, etc.)"
      - "Walk top-N with graph-vs-diff perspective"
    methodologies:
      - slug: mr-graph-vs-diff-reviewer
        path: geek/sdlc-ai/mr-graph-vs-diff-reviewer
        required: true
        tier_gate: geek
      - slug: cloud-architecture
        path: pro/dev/software-architect/cloud-architecture
        required: false
        tier_gate: pro
      - slug: distributed-patterns
        path: pro/dev/software-architect/distributed-patterns
        required: true
        tier_gate: pro
      - slug: observability-architecture
        path: pro/dev/software-architect/observability-architecture
        required: true
        tier_gate: pro
      - slug: quality-attributes-analysis
        path: pro/dev/software-architect/quality-attributes-analysis
        required: true
        tier_gate: pro
    outputs:
      - "Ranked PR list with impact scores"
    decision_gate: |
      Advance once the top 5-10 are walked. Don't extend the session to cover bottom-of-list items.

  - name: "Spot drift + promote patterns"
    intent: "Flag drift; promote what we want repeated; queue ADRs for decisions."
    tasks:
      - "Flag layering violations / cross-service coupling"
      - "Promote good patterns to patterns.md"
      - "Update mistake-memory with anti-patterns"
      - "Apply tech-debt-management decisions where relevant"
    methodologies:
      - slug: pattern-memory
        path: solo/sdd/sdd/pattern-memory
        required: true
        tier_gate: solo
      - slug: mistake-memory
        path: solo/sdd/sdd/mistake-memory
        required: true
        tier_gate: solo
      - slug: tech-debt-management
        path: solo/dev/code-quality/tech-debt-management
        required: true
        tier_gate: solo
      - slug: design-docs-patterns
        path: solo/sdd/sdd/design-docs-patterns
        required: true
        tier_gate: solo
    outputs:
      - "Updated patterns.md / mistakes.md"
      - "Drift-flag list with owners"
    decision_gate: |
      Advance when each drift signal has an owner. Unassigned drift evaporates by next review.

  - name: "Queue ADRs"
    intent: "Decisions worth memorialising land in the ADR queue."
    tasks:
      - "Identify decisions made implicitly in PRs"
      - "Queue ADRs to be written by named owners"
      - "Schedule design-docs-patterns updates"
    methodologies:
      - slug: architecture-decision-records
        path: solo/dev/software-architect/architecture-decision-records
        required: true
        tier_gate: solo
      - slug: architecture-decision-records-sdd
        path: solo/sdd/sdd/architecture-decision-records
        required: true
        tier_gate: solo
    outputs:
      - "ADR queue with owners + due dates"
    decision_gate: |
      Required output: queued ADRs with owners. Verbal agreement = drift in 2 weeks.

common_pitfalls:
  - "Review drifts into PR-level critique — wrong altitude"
  - "Patterns promoted without writing them down — repeat next week"
  - "ADRs noted in chat — lost by next sprint"
  - "Session extends to 90 min — kills attendance"

quality_checklist:
  - "Did we update patterns.md or mistakes.md this week?"
  - "Did we hold the 45-minute stop?"
  - "Does every queued ADR have an owner?"

related_playbooks:
  - pr-review-with-junior-mentoring
  - rfc-to-production-feature-delivery
  - biweekly-retro-mistake-memory

token_budget_estimate: 11000
cli_invocations:
  human:  "faion get-content weekly-architectural-review --format md"
  agent:  "faion get-content weekly-architectural-review --format context"
  json:   "faion get-content weekly-architectural-review --format json"

