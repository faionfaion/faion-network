slug: hire-to-productive-60-days-in-house
title: "Hire-to-productive in 60 days for in-house product roles"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: ce340f371d5ff98d

tier_min: geek
complexity: deep
context: [team]
persona_hints: [P6]

intent: |
  Open req → first owned feature shipped by day 45 in an in-house product team (not agency client engagement).

scope: |
  Funnel from job posting → sourcing → structured interview → offer → 30/60-day onboarding tuned for in-house product context. Output: new hire shipping their first owned feature by day 45, fully ramped on the codebase orientation tour, role-specific interview rubric used during hiring, and in-house take-home design (not agency-style "build me a thing").

non_goals:
  - "Agency client engagement onboarding — different problem"
  - "Compensation / negotiation — separate workstream"
  - "Performance reviews past day 60 — out of scope"

prerequisites:
  - "Open req tied to a quarter OKR"
  - "Hiring funnel + technical-interview-process playbooks available"
  - "Codebase has CLAUDE.md + AGENTS.md context pyramid"

success_criteria:
  - "Structured interview run with role-specific rubric"
  - "In-house-style take-home administered (not agency-style)"
  - "30-day plan executed (orient + ramp)"
  - "60-day plan executed (own feature)"
  - "First owned feature shipped by day 45"
  - "Day-60 retro between hire + manager + buddy"

stages:
  - name: "Open req + structured interview"
    intent: "Funnel → structured interview with role-specific rubric → offer."
    tasks:
      - "Define role + leveling"
      - "Apply hiring-funnel + technical-interview-process"
      - "Run structured-interview-design"
      - "Use STAR-method for past-work signal"
    methodologies:
      - slug: structured-interview-design
        path: pro/comms/hr-recruiter/structured-interview-design
        required: true
        tier_gate: pro
      - slug: interview-methods
        path: pro/comms/hr-recruiter/interview-methods
        required: true
        tier_gate: pro
      - slug: star-interview-framework
        path: pro/comms/hr-recruiter/star-interview-framework
        required: true
        tier_gate: pro
      - slug: star-interview-method
        path: pro/comms/hr-recruiter/star-interview-method
        required: true
        tier_gate: pro
      - slug: employee-value-proposition
        path: pro/comms/hr-recruiter/employee-value-proposition
        required: true
        tier_gate: pro
    outputs:
      - "Funnel decisions + offer doc"
    decision_gate: |
      Advance only with a hire decision backed by rubric evidence + bias check.

  - name: "Day 1-14: orient + first PR"
    intent: "Hire is incident-literate, has run the dev loop locally, has merged a small PR."
    tasks:
      - "Run hire-onboard-product-dev-2-weeks chain"
      - "30-day plan signed off"
      - "First PR merged"
    methodologies:
      - slug: onboarding-30-day
        path: pro/comms/hr-recruiter/onboarding-30-day
        required: true
        tier_gate: pro
      - slug: onboarding
        path: pro/comms/hr-recruiter/onboarding
        required: true
        tier_gate: pro
      - slug: 30-60-90-day-plan
        path: pro/comms/hr-recruiter/30-60-90-day-plan
        required: true
        tier_gate: pro
    outputs:
      - "First PR merged"
      - "30-day plan checkpoint"
    decision_gate: |
      Advance when 14-day retro passes. Repeating week-1 problems = block.

  - name: "Day 15-45: own a feature"
    intent: "Hire scopes, designs, ships their first owned feature."
    tasks:
      - "Hire takes a small RFC + scopes spec"
      - "Architect review of design"
      - "Dev → QA → DevOps → ship"
      - "Reuse rfc-to-production-feature-delivery chain"
    methodologies:
      - slug: onboarding-60-90-day
        path: pro/comms/hr-recruiter/onboarding-60-90-day
        required: true
        tier_gate: pro
    outputs:
      - "Shipped first owned feature"
    decision_gate: |
      Required: shipped feature behind a flag. Half-shipped doesn't count.

  - name: "Day 60: retro + retention"
    intent: "60-day retro; retention checkpoint; promotion-eligibility decision (later)."
    tasks:
      - "60-day retro with manager + buddy"
      - "Update mistake-memory + pattern-memory with onboarding lessons"
      - "Confirm retention checkpoint"
    methodologies:
      - slug: retention-compliance
        path: pro/comms/hr-recruiter/retention-compliance
        required: true
        tier_gate: pro
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
    outputs:
      - "60-day retro doc"
    decision_gate: |
      Required: written retro. If retention signals are weak, escalate now, not at day 90.

common_pitfalls:
  - "Agency-style take-home for an in-house role — wrong signal"
  - "30/60 plan filed but never reviewed — guarantees drift"
  - "Skipping the day-60 retro 'because things look fine' — misses early retention signals"
  - "No first owned feature by day 45 — hire learns the team isn't serious about ramp"

quality_checklist:
  - "Can the hire describe the team's spec→ship chain end-to-end?"
  - "Did the first owned feature ship through the same gates as everyone else?"
  - "Is the 60-day retro written and shared?"

related_playbooks:
  - hire-onboard-product-dev-2-weeks
  - hiring-screen-take-home-review
  - adopt-faion-org-wide-overrides
  - rfc-to-production-feature-delivery

token_budget_estimate: 17000
