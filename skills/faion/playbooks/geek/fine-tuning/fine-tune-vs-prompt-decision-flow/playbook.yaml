slug: fine-tune-vs-prompt-decision-flow
title: "Fine-tune vs prompt-engineer decision flow (4 weeks worst case)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: f12bdacebccac4e3

tier_min: geek
complexity: deep
context: [team]
persona_hints: [P7]

intent: |
  Stuck on prompt iteration → clear go/no-go on fine-tuning with LoRA SFT/DPO data prep, training, eval, or documented stay on prompt+retrieval.

scope: |
  Structured decision and execution path: from baseline scorecard to a clear go/no-go on fine-tuning, including LoRA SFT/DPO data prep, training, eval, and deployment — or staying with prompt+retrieval if economics don't beat the floor.

non_goals:
  - "Full RLHF pipeline from scratch — out of scope"
  - "Pretraining new base models — out of scope"

prerequisites:
  - "Baseline prompt agent in production with logs"
  - "Sandbox account with fine-tuning quota"

success_criteria:
  - "Written decision (tune / stay) with cost+quality table"
  - "If tune: SFT/DPO dataset prepared, trained, evaluated, shadow-deployed"
  - "Regression eval gate held throughout"
  - "Cost-per-success better OR documented why we accepted parity"

stages:
  - name: "Baseline"
    intent: "Record current cost+quality baseline on golden set."
    tasks:
      - "Run cost+quality baseline"
      - "Score against decision framework"
      - "Mine production traces for candidate training data"
    methodologies:
      - slug: llm-decision-framework
        path: geek/ai/ml-engineer/llm-decision-framework
        required: true
        tier_gate: geek
      - slug: decision-framework
        path: geek/ai/ml-engineer/decision-framework
        required: true
        tier_gate: geek
      - slug: cost-optimization
        path: geek/ai/ml-engineer/cost-optimization
        required: true
        tier_gate: geek
      - slug: cost-reduction-strategies
        path: geek/ai/ml-ops/cost-reduction-strategies
        required: true
        tier_gate: geek
      - slug: prompt-engineering-evaluation
        path: geek/ai/ml-engineer/prompt-engineering-evaluation
        required: true
        tier_gate: geek
      - slug: record-replay-debugging
        path: geek/ai/ai-agents/record-replay-debugging
        required: true
        tier_gate: geek
    outputs:
      - "Baseline scorecard"
      - "Training-candidate trace set"
    decision_gate: |
      Advance to Decide if a tune candidate beats the floor in projection.
  - name: "Decide Tune-Or-Not"
    intent: "Apply tune-vs-prompt rubric on projected ROI."
    tasks:
      - "Estimate fine-tune cost"
      - "Estimate quality lift on eval"
      - "Write decision doc with rubric"
    methodologies:
      - slug: finetuning
        path: geek/ai/ml-engineer/finetuning
        required: true
        tier_gate: geek
      - slug: fine-tuning-openai-basics
        path: geek/ai/ml-ops/fine-tuning-openai-basics
        required: true
        tier_gate: geek
      - slug: finetuning-basics
        path: geek/ai/ml-ops/finetuning-basics
        required: true
        tier_gate: geek
      - slug: role-specialized-models
        path: geek/ai/ai-agents/role-specialized-models
        required: true
        tier_gate: geek
      - slug: confidence-thresholded-cascade
        path: geek/ai/ai-agents/confidence-thresholded-cascade
        required: true
        tier_gate: geek
    outputs:
      - "Tune-vs-prompt decision doc"
    decision_gate: |
      If tune doesn't beat floor by ≥X% projected, exit playbook with decision logged.
  - name: "Data Prep"
    intent: "SFT and DPO dataset hygiene."
    tasks:
      - "Build SFT dataset from traces"
      - "Add DPO pairs for preference signal"
      - "Document dataset provenance"
    methodologies:
      - slug: fine-tuning-openai-data-prep
        path: geek/ai/ml-engineer/fine-tuning-openai-data-prep
        required: true
        tier_gate: geek
      - slug: fine-tuning-openai-sft
        path: geek/ai/ml-engineer/fine-tuning-openai-sft
        required: true
        tier_gate: geek
      - slug: fine-tuning-openai-dpo
        path: geek/ai/ml-engineer/fine-tuning-openai-dpo
        required: true
        tier_gate: geek
      - slug: finetuning-datasets
        path: geek/ai/ml-ops/finetuning-datasets
        required: true
        tier_gate: geek
    outputs:
      - "SFT corpus"
      - "DPO pair file"
      - "Provenance log"
    decision_gate: |
      Advance only after data audit and dedup pass.
  - name: "Train"
    intent: "LoRA or full SFT/DPO training run with eval gating."
    tasks:
      - "Pick LoRA vs full tune"
      - "Train + checkpoint"
      - "Score against held-out eval"
    methodologies:
      - slug: fine-tuning-lora
        path: geek/ai/ml-engineer/fine-tuning-lora
        required: true
        tier_gate: geek
      - slug: lora-qlora
        path: geek/ai/ml-ops/lora-qlora
        required: true
        tier_gate: geek
      - slug: fine-tuning-openai-production
        path: geek/ai/ml-ops/fine-tuning-openai-production
        required: true
        tier_gate: geek
    outputs:
      - "Trained checkpoint"
      - "Eval report"
    decision_gate: |
      Promote only checkpoints beating baseline on golden + adversarial.
  - name: "Deploy"
    intent: "Shadow-deploy, then promote if eval-in-prod holds."
    tasks:
      - "Shadow-deploy tuned model"
      - "Compare on live traffic in-shadow"
      - "Promote and pin schema"
    methodologies:
      - slug: fine-tuning-openai-eval
        path: geek/ai/ml-engineer/fine-tuning-openai-eval
        required: true
        tier_gate: geek
      - slug: fine-tuning-openai-deployment
        path: geek/ai/ml-engineer/fine-tuning-openai-deployment
        required: true
        tier_gate: geek
      - slug: schema-version-pinning
        path: geek/ai/ai-agents/schema-version-pinning
        required: true
        tier_gate: geek
    outputs:
      - "Shadow report"
      - "Promotion decision"
    decision_gate: |
      Promote only after shadow holds for ≥1 release cycle.

common_pitfalls:
  - "Treating eval scores as ground truth without judge calibration"
  - "Shipping prompt or model changes without a regression gate"

quality_checklist:
  - "Can I roll back this change in one step?"
  - "Is the regression eval committed BEFORE the fix?"

related_playbooks:
