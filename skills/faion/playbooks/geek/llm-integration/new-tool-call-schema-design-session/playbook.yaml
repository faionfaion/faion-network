tier_min: geek
complexity: medium
context: [team]
persona_hints: [P7]

intent: |
  Add or change a tool the agent can invoke → ship versioned schema + structured error contract + eval entries, no breaking change in prod.

scope: |
  Add or change one tool the agent can invoke; ship a versioned schema + structured error contract + eval entries; no breaking change in prod. Single-session focused work, ~half-day.

non_goals:
  - "Multi-tool refactors — split into separate sessions"
  - "Tool-deprecation lifecycle — see future playbook"

prerequisites:
  - "Tool spec written"
  - "Eval harness reachable"

success_criteria:
  - "Versioned schema landed"
  - "Structured error contract documented"
  - "Eval rows covering happy + failure paths"
  - "Backward-compat confirmed in shadow"

stages:
  - name: "Design"
    intent: "Name, scope, and describe the tool as a prompt."
    tasks:
      - "Verb-object name"
      - "Description-as-prompt"
      - "Decide bundle vs split"
    methodologies:
      - slug: verb-object-tool-naming
        path: geek/ai/ai-agents/verb-object-tool-naming
        required: true
        tier_gate: geek
      - slug: tool-description-as-prompt
        path: geek/ai/ai-agents/tool-description-as-prompt
        required: true
        tier_gate: geek
      - slug: bundle-vs-split-tools
        path: geek/ai/ai-agents/bundle-vs-split-tools
        required: true
        tier_gate: geek
      - slug: field-descriptions-as-prompts
        path: geek/ai/ai-agents/field-descriptions-as-prompts
        required: true
        tier_gate: geek
    outputs:
      - "Tool card draft"
    decision_gate: |
      Advance once description passes 'an LLM should know when to call this' read.
  - name: "Schema"
    intent: "Strict required fields + structured errors."
    tasks:
      - "Strict-mode required fields"
      - "Structured error contract"
      - "Idempotent write semantics"
      - "Cheap guardrail tripwires on inputs"
    methodologies:
      - slug: strict-mode-required-fields
        path: geek/ai/ai-agents/strict-mode-required-fields
        required: true
        tier_gate: geek
      - slug: structured-tool-errors
        path: geek/ai/ai-agents/structured-tool-errors
        required: true
        tier_gate: geek
      - slug: idempotent-write-tools
        path: geek/ai/ai-agents/idempotent-write-tools
        required: true
        tier_gate: geek
      - slug: cheap-guardrail-tripwire
        path: geek/ai/ai-agents/cheap-guardrail-tripwire
        required: true
        tier_gate: geek
      - slug: schema-version-pinning
        path: geek/ai/ai-agents/schema-version-pinning
        required: true
        tier_gate: geek
      - slug: tool-use-function-calling
        path: geek/ai/ml-engineer/tool-use-function-calling
        required: true
        tier_gate: geek
      - slug: guardrails-custom-pipeline
        path: geek/ai/ml-engineer/guardrails-custom-pipeline
        required: true
        tier_gate: geek
    outputs:
      - "Schema v.x.y.z"
      - "Error code table"
    decision_gate: |
      Advance only when schema passes contract tests.
  - name: "Eval & Ship"
    intent: "Eval rows + shadow rollout."
    tasks:
      - "Add happy + failure rows to golden set"
      - "Shadow-call in production"
      - "Promote on green"
    methodologies:
      []
    outputs:
      - "Eval rows added"
      - "Tool live behind flag"
    decision_gate: |
      Promote only when shadow is green and no regressions.

common_pitfalls:
  - "Treating eval scores as ground truth without judge calibration"
  - "Shipping prompt or model changes without a regression gate"

quality_checklist:
