stages:
  - name: "Audit"
    intent: "Get an honest map of where things stand today for: Fine-tune vs prompt-engineer decision flow."
    tasks:
      - "Inventory current state, owners, and recent incidents"
      - "Identify the top 3 risks that block the desired outcome"
