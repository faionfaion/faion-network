# =============================================================================
# PLAYBOOK — Prompt change PR review
# tier=geek group=role-ml-engineer complexity=light
# =============================================================================

slug: prompt-change-pr-review
title: "Prompt change PR review"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: c73ea705f183f015

tier_min: geek
complexity: light
context: [solo, team]
persona: ["geek-ai-engineer"]

intent: |
  Reviewer opens a PR that edits a production prompt template; runs the eval delta, checks
  regressions, requests changes or approves with rollout plan.

scope: |
  Reviewer opens a PR that edits a production prompt template; runs the eval delta, checks
  regressions, requests changes or approves with rollout plan.

summary: |
  Reviewer opens a PR that edits a production prompt template; runs the eval delta, checks
  regressions, requests changes or approves with rollout plan.

methodology_refs:
  - geek/ai/ai-agents/field-descriptions-as-prompts
  - geek/ai/ai-agents/prompt-cache-prefix-order
  - geek/ai/ai-agents/schema-version-pinning
  - geek/ai/ml-engineer/model-evaluation
  - geek/ai/ml-engineer/prompt-engineering-evaluation

success_criteria:
  - "One-line verdict posted to team channel/dashboard for this cycle"
  - "Act-now items either executed and verified, or explicitly handed off"
  - "Cadence ledger updated so the next run starts in under 5 minutes"
  - "No silent-drop: every anomaly resolved or queued with an owner"

stages:
  - name: "Pre-flight"
    intent: "Confirm inputs, dashboards, access, and yesterday's open items."
    tasks:
      - "Verify required dashboards/logs are reachable and current"
      - "Re-open yesterday's deferred items list"
      - "Set a hard time-box for this run"
    methodologies:
      - slug: field-descriptions-as-prompts
        path: geek/ai/ai-agents/field-descriptions-as-prompts
        required: true
        tier_gate: geek
      - slug: prompt-engineering-fundamentals
        path: geek/ai/ml-engineer/prompt-engineering-fundamentals
        required: true
        tier_gate: geek
    outputs:
      - "Pre-flight checklist signed off"
    decision_gate: "Advance once every required surface is green; otherwise resolve the access/data gap first."
  - name: "Scan"
    intent: "Read the surface in one pass; capture anomalies without acting."
    tasks:
      - "Walk through every required panel/chart/feed once"
      - "Log anomalies and outliers in a single scratchpad"
      - "Do not act on anything yet"
    methodologies:
      - slug: prompt-cache-prefix-order
        path: geek/ai/ai-agents/prompt-cache-prefix-order
        required: true
        tier_gate: geek
      - slug: prompt-engineering-production
        path: geek/ai/ml-engineer/prompt-engineering-production
        required: true
        tier_gate: geek
    outputs:
      - "Anomaly scratchpad with timestamps"
    decision_gate: "Advance once the scan is complete; if scan reveals an incident, branch to incident response."
  - name: "Triage"
    intent: "Score and bucket anomalies into act-now / investigate / ignore."
    tasks:
      - "Score each anomaly by severity and reversibility"
      - "Bucket into act-now / investigate / ignore"
      - "Pick at most 1-3 act-now items for this cycle"
    methodologies:
      - slug: schema-version-pinning
        path: geek/ai/ai-agents/schema-version-pinning
        required: true
        tier_gate: geek
      - slug: prompt-engineering-security
        path: geek/ai/ml-engineer/prompt-engineering-security
        required: true
        tier_gate: geek
    outputs:
      - "Triage table with verdicts"
    decision_gate: "Advance with no more than 1-3 act-now items; if more, raise the bar."
  - name: "Act"
    intent: "Execute the chosen act-now items end-to-end."
    tasks:
      - "Execute each act-now item with an explicit owner and rollback plan"
      - "Capture before/after evidence"
      - "Hand off anything that exceeds the time-box"
    methodologies:
      - slug: model-evaluation
        path: geek/ai/ml-engineer/model-evaluation
        required: true
        tier_gate: geek
      - slug: rag-eval-ab-testing
        path: geek/ai/rag-engineer/rag-eval-ab-testing
        required: true
        tier_gate: geek
    outputs:
      - "Action log with before/after evidence"
    decision_gate: "Advance once every act-now item is either done or explicitly handed off; never silent-drop."
  - name: "Close"
    intent: "Post the one-line verdict, queue follow-ups, and end the loop."
    tasks:
      - "Post a one-line verdict to the team channel/dashboard"
      - "Queue follow-ups in the appropriate backlog"
      - "Update the cadence ledger so future runs see the trend"
    methodologies:
      - slug: prompt-engineering-evaluation
        path: geek/ai/ml-engineer/prompt-engineering-evaluation
        required: true
        tier_gate: geek
    outputs:
      - "One-line verdict posted"
      - "Follow-ups queued"
    decision_gate: "Required output: a written verdict; no \"see how it goes\"."

token_budget_estimate: 12000

cli_invocations:
  human: "faion get-content prompt-change-pr-review --format md"
  agent: "faion get-content prompt-change-pr-review --format context"
  json:  "faion get-content prompt-change-pr-review --format json"

changelog:
  - version: "1.0.0"
    date: 2026-05-20
    note: "Initial v2 playbook from F-059-063 chunk-09."

