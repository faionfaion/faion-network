stages:
  - name: "Collect Signal"
    intent: "Make the bad signal visible."
    tasks:
      - "Pull mistake-memory entries since last retro"
      - "Pull incident postmortems and missed AC"
      - "Pull anonymous team-feedback entries"
    methodologies:
      - slug: "dora-metrics"
        path: "pro/infra/devops-engineer/dora-metrics"
        required: true
        tier_gate: "geek"
      - slug: "scrum-ceremonies"
        path: "pro/pm/pm-agile/scrum-ceremonies"
        required: true
        tier_gate: "geek"
    outputs:
      - "mistake-memory digest"
      - "postmortem digest"
      - "feedback digest"
    decision_gate: "Advance only when all three sources are gathered."
  - name: "Run the Retro"
    intent: "Honest > polite, but always blameless."
    tasks:
      - "Walk through what worked, what didn't, surprises"
      - "Pick top-3 patterns to act on next 2 weeks"
      - "Assign owners for each pattern"
    methodologies:
      - slug: "team-development"
        path: "pro/pm/pm-agile/team-development"
        required: true
        tier_gate: "geek"
      - slug: "value-stream-management"
        path: "pro/pm/pm-agile/value-stream-management"
        required: true
        tier_gate: "geek"
    outputs:
      - "what-worked / what-didn't / surprises notes"
      - "top-3 patterns"
      - "pattern owners"
    decision_gate: "Advance when each pattern has an owner and a measurable signal."
  - name: "Update the System, Not Just the Doc"
    intent: "Memory is only useful if it changes behaviour."
    tasks:
      - "Update SOPs, checklists, or tooling per the patterns"
      - "Add or modify ruff/ESLint rules where pattern is mechanical"
      - "Communicate the changes to the team"
    methodologies:
      - slug: "mistake-memory"
        path: "solo/sdd/sdd/mistake-memory"
        required: true
        tier_gate: "geek"
      - slug: "quality-gates-confidence"
        path: "solo/sdd/sdd/quality-gates-confidence"
        required: true
        tier_gate: "geek"
      - slug: "reflexion-learning"
        path: "solo/sdd/sdd/reflexion-learning"
        required: true
        tier_gate: "geek"
    outputs:
      - "updated docs/checklists/tools"
      - "rule diffs"
      - "team comms"
    decision_gate: "Required output: at least one written behaviour change deployed."
