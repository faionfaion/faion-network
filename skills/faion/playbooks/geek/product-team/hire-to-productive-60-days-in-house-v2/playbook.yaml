stages:
  - name: "Hire Right"
    intent: "60 days starts at offer, not start date."
    tasks:
      - "Run the hiring loop to a calibrated yes/no"
      - "Sign offer with start date and first-30 plan attached"
      - "Pre-stage access and dev env before day 1"
    methodologies:
      - slug: "onboarding-30-day"
        path: "pro/comms/hr-recruiter/onboarding-30-day"
        required: true
        tier_gate: "geek"
    outputs:
      - "scored loop"
      - "signed offer + 30-day plan"
      - "day-1 access ready"
    decision_gate: "Advance only when day-1 access and plan are pre-staged."
  - name: "Days 1-15 — Land"
    intent: "Belonging, orientation, first shipped work."
    tasks:
      - "Day 1-3: intros, comms norms, mission, dev env"
      - "Day 4-10: pair on one real piece of work, ship first PR"
      - "Day 11-15: own first small ticket end-to-end"
    methodologies:
      - slug: "onboarding-60-90-day"
        path: "pro/comms/hr-recruiter/onboarding-60-90-day"
        required: true
        tier_gate: "geek"
    outputs:
      - "onboarding checklist done"
      - "first PR merged"
      - "first small ticket shipped"
    decision_gate: "Advance only when first ticket has shipped to prod."
  - name: "Days 16-45 — Expand"
    intent: "Own scope; meet most of the surface area."
    tasks:
      - "Take on 3-4 tickets of growing complexity"
      - "Lead 1 small initiative end-to-end"
      - "Embed in standups, retros, and reviews"
    methodologies:
      - slug: "structured-interview-design"
        path: "pro/comms/hr-recruiter/structured-interview-design"
        required: true
        tier_gate: "geek"
    outputs:
      - "tickets shipped"
      - "owned initiative"
      - "ceremony participation"
    decision_gate: "Advance only when initiative ships and feedback signal is positive."
  - name: "Days 46-60 — Productive"
    intent: "On the bar; review and commit."
    tasks:
      - "Run the 60-day check with manager + peer feedback"
      - "Score against the role rubric on day 60"
      - "Decide: keep on bar / extend ramp / part ways"
    methodologies:
      - slug: "onboarding-30-day"
        path: "pro/comms/hr-recruiter/onboarding-30-day"
        required: true
        tier_gate: "geek"
    outputs:
      - "60-day check notes"
      - "scored rubric"
      - "keep/extend/part decision"
    decision_gate: "Required output: a written 60-day decision in HR records."
