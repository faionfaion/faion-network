summary: |
  A feature moves through 5 roles with a single living artifact (spec + design + test-plan + runbook). Each role inherits prior context and emits a delta. Handoffs blocked if Definition-of-Ready not met
content_id: "c2e5282950cea577"
tier_min: "geek"
context:
  - "team"
intent: |
  A feature moves through 5 roles with a single living artifact (spec + design + test-plan + runbook). Each role inherits prior context and emits a delta. Handoffs blocked if Definition-of-Ready not met
scope: |
  A feature moves through 5 roles with a single living artifact (spec + design + test-plan + runbook). Each role inherits prior context and emits a delta. Handoffs blocked if Definition-of-Ready not met
success_criteria:
  - "All 5 stages have written outputs in the project record"
  - "Each stage's decision gate was answered before advancing (yes / no in writing)"
  - "Final stage produced the required written decision artifact"
  - "Every methodology reference loaded cleanly via `faion get-content`"
methodology_refs:
  - "code-review"
  - "inc-runbook-as-markdown-tagged-steps"
  - "task-spec-kit-three-step"
  - "test-tdd-red-green-split-agents"
  - "architecture-decision-records"
  - "backlog-grooming-roadmapping"
  - "writing-design-documents"
stages:
  - name: "PM Handoff"
    intent: "Outcome doc, not a Jira link dump."
    tasks:
      - "PM writes the problem, audience, success signal, non-goals"
      - "Architect reviews and signs off on the doc"
      - "Anything ambiguous goes back to PM until clear"
    methodologies:
      - slug: "code-review"
        path: "free/dev/code-quality/code-review"
        required: true
        tier_gate: "geek"
    outputs:
      - "PM outcome doc"
      - "architect signoff"
      - "ambiguity-resolution log"
    decision_gate: "Advance only when architect signs the doc."
  - name: "Architect Handoff"
    intent: "Design doc the dev can build from."
    tasks:
      - "Architect writes the design: API, data, components, tradeoffs"
      - "Dev reviews; flags anything they can't build"
      - "Address every blocking comment in writing"
    methodologies:
      - slug: "inc-runbook-as-markdown-tagged-steps"
        path: "geek/sdlc-ai/inc-runbook-as-markdown-tagged-steps"
        required: true
        tier_gate: "geek"
    outputs:
      - "design doc"
      - "dev review notes"
      - "blocker resolutions"
    decision_gate: "Advance only when dev confirms they can build it as designed."
  - name: "Dev → QA Handoff"
    intent: "Spec + acceptance + how to test."
    tasks:
      - "Dev hands QA the spec, AC, and test entry-points"
      - "QA writes the test plan from the AC"
      - "Dev unblocks anything that prevents the test plan"
    methodologies:
      - slug: "task-spec-kit-three-step"
        path: "geek/sdlc-ai/task-spec-kit-three-step"
        required: true
        tier_gate: "geek"
    outputs:
      - "spec + AC delivered"
      - "test plan"
      - "blocker resolutions"
    decision_gate: "Advance only when QA confirms test plan covers every AC."
  - name: "QA → DevOps Handoff"
    intent: "Deploy + observe + rollback agreed."
    tasks:
      - "QA hands DevOps the deploy plan and the rollback drill"
      - "DevOps reviews capacity, monitoring, alerts"
      - "Rollback drill is run before any prod deploy"
    methodologies:
      - slug: "test-tdd-red-green-split-agents"
        path: "geek/sdlc-ai/test-tdd-red-green-split-agents"
        required: true
        tier_gate: "geek"
    outputs:
      - "deploy + rollback plan"
      - "DevOps review notes"
      - "rollback drill log"
    decision_gate: "Advance only when rollback drill ran clean."
  - name: "Close the Loop"
    intent: "Every role signed at every gate."
    tasks:
      - "After launch, retro the handoff at each gate"
      - "Patch the playbook template with any gap found"
      - "Lock the new template version"
    methodologies:
      - slug: "architecture-decision-records"
        path: "solo/sdd/sdd/architecture-decision-records"
        required: true
        tier_gate: "geek"
      - slug: "backlog-grooming-roadmapping"
        path: "solo/sdd/sdd/backlog-grooming-roadmapping"
        required: true
        tier_gate: "geek"
      - slug: "writing-design-documents"
        path: "solo/sdd/sdd/writing-design-documents"
        required: true
        tier_gate: "geek"
    outputs:
      - "per-gate retro notes"
      - "playbook diff"
      - "new template version"
    decision_gate: "Required output: a written updated handoff playbook."
token_budget_estimate: 18000
