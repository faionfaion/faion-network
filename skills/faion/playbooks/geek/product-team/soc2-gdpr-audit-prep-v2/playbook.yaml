stages:
  - name: "Define Scope"
    intent: "Which standard, which controls, which systems."
    tasks:
      - "List the standard(s) in scope (SOC2 type, GDPR articles)"
      - "Identify the systems, vendors, and data flows in scope"
      - "Pick the auditor and the audit window"
