      - "rationale log"
      - "follow-ups list"
    decision_gate: "Advance when every topic has a written outcome."
  - name: "Publish Decisions"
    intent: "Decisions belong in ADRs, not chat."
    tasks:
      - "Convert every decision into an ADR or RFC update"
      - "Share with engineering at large"
      - "Schedule any implementation kickoffs"
    methodologies:
