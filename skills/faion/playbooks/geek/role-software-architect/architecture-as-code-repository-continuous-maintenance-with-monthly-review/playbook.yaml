slug: architecture-as-code-repository-continuous-maintenance-with-monthly-review
title: "Architecture-as-code repository — continuous maintenance with monthly review"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: f3593d95341d414e

tier_min: geek
complexity: medium
context: [solo, team]
persona: "software architect"
group: role-software-architect

intent: |
  Take an software architect from the trigger condition described in this playbook to the documented outcome, with every decision gate met in writing.

scope: |
  Treat the architecture itself as a versioned artifact. Done = the architecture repo is the single source of truth for ADRs, C4 models, fitness functions, and runbooks, kept current via monthly cadence and AI-assisted reviewers; design drift is caught before it lands.

summary: "Treat the architecture itself as a versioned artifact. Done = the architecture repo is the single source of truth for ADRs, C4 models, fitness functions, and runbooks, kept current via monthly cadence and AI-assisted reviewers; design drift is caught before it lands."

success_criteria:
  - "Architecture-as-code repository — continuous maintenance with monthly review ships with written success criteria met and evidence attached"
  - "Baseline → post-change metric delta recorded against the relevant quality attribute"
  - "Rollback path rehearsed at least once and documented in the runbook"
  - "Decision doc (continue / iterate / revert) signed off by named owner"

methodology_refs:
  - geek/sdd/sdd-planning/ai-assisted-specification-writing
  - geek/sdd/sdd/ai-assisted-specification-writing
  - geek/sdlc-ai/gov-conventional-commits-enforced
  - geek/sdlc-ai/kb-agents-md-context-pyramid
  - geek/sdlc-ai/kb-codebase-rag-symbol-chunked
  - geek/sdlc-ai/kb-versioned-agent-memory-files
  - geek/sdlc-ai/lint-megalinter-polyglot
  - geek/sdlc-ai/lint-precommit-floor
  - geek/sdlc-ai/mr-codemod-refactor-agent
  - geek/sdlc-ai/mr-graph-vs-diff-reviewer
  - geek/sdlc-ai/task-spec-kit-three-step
  - solo/dev/software-architect/architecture-decision-records
  - solo/dev/software-architect/c4-model
  - solo/sdd/sdd/living-documentation
  - solo/sdd/sdd/mistake-memory
  - solo/sdd/sdd/pattern-memory
  - solo/sdd/sdd/reflexion-learning
  - solo/sdd/sdd/sdd-workflow-overview
  - solo/sdd/sdd/writing-design-documents
  - solo/sdd/sdd/writing-specifications
  - solo/sdd/sdd/yaml-frontmatter

stages:
  - name: "Frame"
    intent: "Name the problem in writing and set explicit success criteria."
    tasks:
      - "Write a one-paragraph problem statement tied to a quality attribute or user outcome"
      - "List concrete success criteria (measurable, observable, time-bounded)"
      - "Identify the smallest credible scope that still moves the needle"
    methodologies:
      - slug: ai-assisted-specification-writing
        path: geek/sdd/sdd-planning/ai-assisted-specification-writing
        required: true
        tier_gate: geek
      - slug: lint-megalinter-polyglot
        path: geek/sdlc-ai/lint-megalinter-polyglot
        required: true
        tier_gate: geek
      - slug: c4-model
        path: solo/dev/software-architect/c4-model
        required: true
        tier_gate: solo
      - slug: writing-design-documents
        path: solo/sdd/sdd/writing-design-documents
        required: true
        tier_gate: solo
    outputs:
      - "Problem brief"
      - "Success-criteria list"
      - "Scope boundary"
    decision_gate: |
      Advance only after a peer can restate the problem in their own words and agree the criteria are testable.
  - name: "Assess"
    intent: "Inventory current state vs target with evidence, not opinion."
    tasks:
      - "Run a structured assessment of the affected system (code, tests, docs, ops surface)"
      - "Capture baseline metrics that the work will need to beat"
      - "List the top 5 risks and one mitigation per risk"
    methodologies:
      - slug: ai-assisted-specification-writing
        path: geek/sdd/sdd/ai-assisted-specification-writing
        required: true
        tier_gate: geek
      - slug: lint-precommit-floor
        path: geek/sdlc-ai/lint-precommit-floor
        required: true
        tier_gate: geek
      - slug: living-documentation
        path: solo/sdd/sdd/living-documentation
        required: true
        tier_gate: solo
      - slug: writing-specifications
        path: solo/sdd/sdd/writing-specifications
        required: true
        tier_gate: solo
    outputs:
      - "Current-state inventory"
      - "Baseline metrics"
      - "Risk register"
    decision_gate: |
      Advance only when baselines are recorded and risks have owners.
  - name: "Plan"
    intent: "Decompose into a sequenced backlog with explicit decision points."
    tasks:
      - "Break the work into tasks of ≤1 day each, with dependencies named"
      - "Mark reversible vs irreversible (one-way-door) decisions"
      - "Define rollback / kill conditions for each major step"
    methodologies:
      - slug: gov-conventional-commits-enforced
        path: geek/sdlc-ai/gov-conventional-commits-enforced
        required: true
        tier_gate: geek
      - slug: mr-codemod-refactor-agent
        path: geek/sdlc-ai/mr-codemod-refactor-agent
        required: true
        tier_gate: geek
      - slug: mistake-memory
        path: solo/sdd/sdd/mistake-memory
        required: true
        tier_gate: solo
      - slug: yaml-frontmatter
        path: solo/sdd/sdd/yaml-frontmatter
        required: true
        tier_gate: solo
    outputs:
      - "Task plan"
      - "Decision log skeleton"
      - "Rollback playbook"
    decision_gate: |
      Advance only when every task has a definition-of-done and the plan fits on one page.
  - name: "Execute"
    intent: "Ship the change behind safe deployment controls."
    tasks:
      - "Implement the plan in small, individually shippable steps"
      - "Keep all changes behind feature flags or branch-by-abstraction where reversible"
      - "Update tests + docs in the same change set, never as a follow-up"
    methodologies:
      - slug: kb-agents-md-context-pyramid
        path: geek/sdlc-ai/kb-agents-md-context-pyramid
        required: true
        tier_gate: geek
      - slug: mr-graph-vs-diff-reviewer
        path: geek/sdlc-ai/mr-graph-vs-diff-reviewer
        required: true
        tier_gate: geek
      - slug: pattern-memory
        path: solo/sdd/sdd/pattern-memory
        required: true
        tier_gate: solo
    outputs:
      - "Shipped change set"
      - "Updated tests + docs"
    decision_gate: |
      Advance only when CI is green, the change is observable in staging, and rollback was rehearsed at least once.
  - name: "Verify"
    intent: "Prove the change cleared the success criteria with evidence."
    tasks:
      - "Run targeted tests + smoke on the most-trafficked surfaces"
      - "Compare post-change metrics against the baseline captured earlier"
      - "Capture user / operator feedback within the first 48 hours"
    methodologies:
      - slug: kb-codebase-rag-symbol-chunked
        path: geek/sdlc-ai/kb-codebase-rag-symbol-chunked
        required: true
        tier_gate: geek
      - slug: task-spec-kit-three-step
        path: geek/sdlc-ai/task-spec-kit-three-step
        required: true
        tier_gate: geek
      - slug: reflexion-learning
        path: solo/sdd/sdd/reflexion-learning
        required: true
        tier_gate: solo
    outputs:
      - "Verification report"
      - "Metric delta vs baseline"
    decision_gate: |
      Advance only when metrics meet the criteria and no regression alerts are open.
  - name: "Close"
    intent: "Lock in the gain: documentation, learnings, and a single decision artifact."
    tasks:
      - "Write the decision / outcome doc (continue / iterate / revert) with evidence trail"
      - "Update ADRs, runbooks, and pattern memory with what changed"
      - "Schedule the next review checkpoint or archive the workstream"
    methodologies:
      - slug: kb-versioned-agent-memory-files
        path: geek/sdlc-ai/kb-versioned-agent-memory-files
        required: true
        tier_gate: geek
      - slug: architecture-decision-records
        path: solo/dev/software-architect/architecture-decision-records
        required: true
        tier_gate: solo
      - slug: sdd-workflow-overview
        path: solo/sdd/sdd/sdd-workflow-overview
        required: true
        tier_gate: solo
    outputs:
      - "Decision doc"
      - "Updated ADR / runbook / memory entry"
    decision_gate: |
      Done when the decision doc is single-link shareable and the team can name the next checkpoint.

common_pitfalls:
  - "Skipping the Frame stage and starting work without written success criteria"
  - "Treating the rollback as a doc, not a rehearsed action"
  - "Cutting the Close / decision-doc stage when the work feels obvious — that is when memory rots fastest"

quality_checklist:
  - "Can a peer restate the problem, criteria, and decision rule without me in the room?"
  - "Are the baseline metrics recorded somewhere I can grep, not just in chat?"
  - "Did we actually rehearse the rollback, or did we just talk about it?"

