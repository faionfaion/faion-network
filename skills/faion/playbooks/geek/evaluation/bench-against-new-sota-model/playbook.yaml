slug: bench-against-new-sota-model
title: "Bench against new SOTA model"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 1042ad5f26417f3d

tier_min: geek
complexity: medium
context: [team]
persona_hints: [P7]

intent: |
  New frontier or open-weight model dropped → decide within a day whether it enters cascade, replaces a tier, or is shelved.

scope: |
  A new frontier or open-weight model dropped. Decide within a day whether it enters the cascade, replaces a tier, or is shelved. Goal: ship the decision same day with cost+quality table.

non_goals:
  - "Re-architecting the agent — out of scope"
  - "Long-term capability research"

prerequisites:
  - "Eval harness with golden + adversarial sets"
  - "Gateway adapter for the new model"

success_criteria:
  - "Bench results on golden + adversarial"
  - "Cost+quality pareto plotted"
  - "Decision: enter cascade / replace tier / shelve"
  - "Decision logged with evidence"

stages:
  - name: "Onboard"
    intent: "Wire the model behind adapter; pin schema."
    tasks:
      - "Wire endpoint"
      - "Pin response schema version"
    methodologies:
      - slug: schema-version-pinning
        path: geek/ai/ai-agents/schema-version-pinning
        required: true
        tier_gate: geek
      - slug: previous-response-id-reasoning-reuse
        path: geek/ai/ai-agents/previous-response-id-reasoning-reuse
        required: true
        tier_gate: geek
    outputs:
      - "New adapter live"
    decision_gate: |
      Advance only when adapter calls succeed.
  - name: "Bench"
    intent: "Run golden + adversarial sets."
    tasks:
      - "Run golden eval"
      - "Run adversarial eval"
      - "Inspect refusal field behaviour"
    methodologies:
      - slug: evaluation-benchmarks
        path: geek/ai/ml-ops/evaluation-benchmarks
        required: true
        tier_gate: geek
      - slug: llm-decision-framework
        path: geek/ai/ml-engineer/llm-decision-framework
        required: true
        tier_gate: geek
      - slug: refusal-field-strict-schema
        path: geek/ai/ai-agents/refusal-field-strict-schema
        required: true
        tier_gate: geek
    outputs:
      - "Bench table"
    decision_gate: |
      Advance only when both sets ran end-to-end.
  - name: "Decide"
    intent: "Cascade / replace / shelve."
    tasks:
      - "Plot cost-quality pareto"
      - "Pick router placement"
      - "Decide on confidence cascade"
      - "Pick role assignment if specialized"
      - "Confirm reasoning-first architecture if applicable"
    methodologies:
      - slug: preference-trained-router
        path: geek/ai/ai-agents/preference-trained-router
        required: true
        tier_gate: geek
      - slug: confidence-thresholded-cascade
        path: geek/ai/ai-agents/confidence-thresholded-cascade
        required: true
        tier_gate: geek
      - slug: role-specialized-models
        path: geek/ai/ai-agents/role-specialized-models
        required: true
        tier_gate: geek
      - slug: reasoning-first-architectures
        path: geek/ai/ai-agents/reasoning-first-architectures
        required: true
        tier_gate: geek
    outputs:
      - "Decision doc"
    decision_gate: |
      Ship only when decision is one of: cascade / replace / shelve.

common_pitfalls:
  - "Treating eval scores as ground truth without judge calibration"
  - "Shipping prompt or model changes without a regression gate"

quality_checklist:
  - "Can I roll back this change in one step?"
  - "Is the regression eval committed BEFORE the fix?"

related_playbooks:
  - eval-harness-continuous-benchmark-suite
  - agent-observability-drift-detection-rollout

token_budget_estimate: 9000
