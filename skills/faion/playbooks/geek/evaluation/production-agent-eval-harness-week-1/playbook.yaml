slug: production-agent-eval-harness-week-1
title: "Stand up a production agent eval harness in week 1"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: 123f35c5bac39d25

tier_min: geek
complexity: deep
context: [team]
persona_hints: [P7]

intent: |
  New agent builder → CI-runnable eval harness with golden trajectories, behavioral evals, judge rubrics, drift signal in week 1.

scope: |
  New agent builder has a CI-runnable eval harness with golden trajectories, behavioral evals, judge rubrics, and a drift signal that fires before users see regressions. Bootstrap shape, not deep.

non_goals:
  - "Long-term eval-set authoring — covered by playbook 1"
  - "Productizing the harness"

prerequisites:
  - "A working agent loop"
  - "CI runner available"

success_criteria:
  - "≥10 golden trajectories committed"
  - "≥1 behavioral adversarial set wired"
  - "Judges committed with rubrics"
  - "Drift signal firing on a known regression"
  - "CI gates the PR"

stages:
  - name: "Golden Set"
    intent: "Seed ≥10 trajectories."
    tasks:
      - "Sample first traces"
      - "Replay-record them"
      - "Tag expected behaviour"
    methodologies:
      - slug: record-replay-debugging
        path: geek/ai/ai-agents/record-replay-debugging
        required: true
        tier_gate: geek
      - slug: trajectory-eval-otel
        path: geek/ai/ai-agents/trajectory-eval-otel
        required: true
        tier_gate: geek
    outputs:
      - "golden.jsonl"
    decision_gate: |
      Advance only when ≥10 reliable trajectories exist.
  - name: "Behaviorals"
    intent: "Add chaos pack and judge."
    tasks:
      - "Chaos-eval fault injection"
      - "Author rubric judge"
    methodologies:
      - slug: chaos-eval-fault-injection
        path: geek/ai/ai-agents/chaos-eval-fault-injection
        required: true
        tier_gate: geek
      - slug: llm-judge-rubric-evidence-first
        path: geek/ai/ai-agents/llm-judge-rubric-evidence-first
        required: true
        tier_gate: geek
    outputs:
      - "Behavioural set + judges"
    decision_gate: |
      Advance only when judges score on the golden set.
  - name: "CI Gate"
    intent: "Wire CI to fail on regression."
    tasks:
      - "Hook CI on PR"
      - "Wire observability stack"
    methodologies:
      - slug: llm-observability-stack
        path: geek/ai/ml-engineer/llm-observability-stack
        required: true
        tier_gate: geek
      - slug: llm-observability-stack-2026
        path: geek/ai/ml-ops/llm-observability-stack-2026
        required: true
        tier_gate: geek
    outputs:
      - "CI workflow YAML"
    decision_gate: |
      Ship only when a known-bad PR is blocked.

common_pitfalls:
  - "Treating eval scores as ground truth without judge calibration"
  - "Shipping prompt or model changes without a regression gate"

quality_checklist:
  - "Can I roll back this change in one step?"
  - "Is the regression eval committed BEFORE the fix?"

