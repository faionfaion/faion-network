tier_min: geek
complexity: deep
context: ['solo', 'team']
persona: role-project-manager
group: role-project-manager

summary: "Once a year (or semi-annually for high-growth orgs), audit our delivery practice across all active projects, identify top systemic friction, and ship a concrete improvement program for the next cycle."

intent: |
  Once a year (or semi-annually for high-growth orgs), audit our delivery practice across all active projects, identify top systemic friction, and ship a concrete improvement program for the next cycle.

scope: |
  Once a year (or semi-annually for high-growth orgs), audit our delivery practice across all active projects, identify top systemic friction, and ship a concrete improvement program for the next cycle.

methodology_refs:
  - geek/pm/pm-agile/ai-in-project-management
  - geek/pm/pm-agile/ai-powered-pm-tools
  - pro/pm/pm-agile/performance-domains-overview
  - pro/pm/pm-agile/pm-framework-focus-areas
  - pro/pm/pm-agile/predictive-analytics-pm
  - pro/pm/pm-agile/reporting-basics
  - pro/pm/pm-agile/seven-performance-domains
  - pro/pm/pm-agile/six-core-principles
  - pro/pm/pm-agile/team-development
  - pro/pm/pm-agile/value-stream-management
  - pro/pm/pm-traditional/benefits-realization
  - pro/pm/pm-traditional/change-control
  - pro/pm/pm-traditional/communications-management
  - pro/pm/pm-traditional/earned-value-management
  - pro/pm/pm-traditional/lessons-learned
  - pro/pm/pm-traditional/risk-management
  - pro/pm/project-manager/pm-tool-selection

success_criteria:
  - "Portfolio rollup covers 100% of active projects"
  - "Top-5 systemic friction list with cost"
  - "Maturity self-assessment challenged by reviewer"
  - "Improvement program with owners + budget"
  - "Mid-cycle review delivered at month 6"

stages:
  - name: "Portfolio rollup"
    intent: "See the whole delivery picture before judging."
    tasks:
      - "Roll up EVM across all active projects"
      - "Pull velocity + risk + lessons aggregates"
      - "Map active projects on a complexity × maturity grid"
    methodologies:
      - slug: earned-value-management
        path: pro/pm/pm-traditional/earned-value-management
        required: true
        tier_gate: pro
      - slug: reporting-basics
        path: pro/pm/pm-agile/reporting-basics
        required: true
        tier_gate: pro
      - slug: predictive-analytics-pm
        path: pro/pm/pm-agile/predictive-analytics-pm
        required: true
        tier_gate: pro
    outputs:
      - "Portfolio rollup deck"
    decision_gate: "Advance when the rollup covers 100% of active projects."
  - name: "Friction inventory"
    intent: "List the friction that recurs across projects."
    tasks:
      - "Cluster lessons-learned across the year"
      - "Identify top 5 systemic friction patterns"
      - "Tag each as people / process / tooling"
    methodologies:
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Top-5 systemic friction list"
    decision_gate: "Advance when each friction pattern is named with frequency + cost."
  - name: "Maturity rating"
    intent: "Rate ourselves against a delivery maturity rubric."
    tasks:
      - "Apply the PMI performance-domains lens"
      - "Self-rate each domain on a 1-5 maturity scale"
      - "Get one independent reviewer to challenge the ratings"
    methodologies:
      - slug: performance-domains-overview
        path: pro/pm/pm-agile/performance-domains-overview
        required: true
        tier_gate: pro
      - slug: seven-performance-domains
        path: pro/pm/pm-agile/seven-performance-domains
        required: true
        tier_gate: pro
      - slug: six-core-principles
        path: pro/pm/pm-agile/six-core-principles
        required: true
        tier_gate: pro
      - slug: pm-framework-focus-areas
        path: pro/pm/pm-agile/pm-framework-focus-areas
        required: true
        tier_gate: pro
    outputs:
      - "Maturity self-assessment"
    decision_gate: "Advance when ratings are challenged and revised."
  - name: "AI-leverage scan"
    intent: "Audit where AI tooling could shift the curve."
    tasks:
      - "List PM tasks currently consuming the most time"
      - "Score each for AI augmentation potential"
      - "Identify the top 3 candidate workflows"
    methodologies:
      - slug: ai-in-project-management
        path: geek/pm/pm-agile/ai-in-project-management
        required: true
        tier_gate: geek
      - slug: ai-powered-pm-tools
        path: geek/pm/pm-agile/ai-powered-pm-tools
        required: true
        tier_gate: geek
      - slug: pm-tool-selection
        path: pro/pm/project-manager/pm-tool-selection
        required: true
        tier_gate: pro
    outputs:
      - "AI-leverage opportunity list"
    decision_gate: "Advance when 3 candidate workflows are named with effort × payoff."
  - name: "Improvement program"
    intent: "Convert friction + AI opportunities into a 6-12 month plan."
    tasks:
      - "Pick the top 3 friction items to attack"
      - "Pick the top 1-2 AI experiments"
      - "Sequence them with named owners + budget"
    methodologies:
      - slug: change-control
        path: pro/pm/pm-traditional/change-control
        required: true
        tier_gate: pro
      - slug: team-development
        path: pro/pm/pm-agile/team-development
        required: true
        tier_gate: pro
      - slug: risk-management
        path: pro/pm/pm-traditional/risk-management
        required: true
        tier_gate: pro
    outputs:
      - "Improvement program plan"
    decision_gate: "Advance when the plan has owners + budget + start dates."
  - name: "Communicate + commit"
    intent: "Ship the plan publicly inside the org."
    tasks:
      - "Present the maturity review to leadership"
      - "Publish a one-page summary to the delivery org"
      - "Schedule a mid-cycle progress checkpoint"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: value-stream-management
        path: pro/pm/pm-agile/value-stream-management
        required: true
        tier_gate: pro
    outputs:
      - "Published maturity review summary"
    decision_gate: "Advance when leadership signs off on the program."
  - name: "Mid-cycle checkpoint"
    intent: "Watch the improvement program execute."
    tasks:
      - "Hold a mid-cycle review against named milestones"
      - "Adjust the program based on what is and is not working"
      - "Document interim wins + setbacks"
    methodologies:
      - slug: benefits-realization
        path: pro/pm/pm-traditional/benefits-realization
        required: true
        tier_gate: pro
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
    outputs:
      - "Mid-cycle review note"
    decision_gate: "Required: a written mid-cycle check at month 6."

