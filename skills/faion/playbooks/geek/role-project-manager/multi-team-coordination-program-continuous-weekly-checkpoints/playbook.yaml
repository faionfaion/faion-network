success_criteria:
  - "Program operating model doc with team missions"
  - "Dependency map with named chokepoint owners"
  - "Weekly program checkpoint running for 3+ weeks"
  - "2-sprint forecast convergence within tolerance"
  - "Quarterly program retro held"

stages:
  - name: "Program structure"
    intent: "Lock the operating model before the first checkpoint."
    tasks:
      - "Define the team-of-teams structure + each team's mission"
      - "Build the program RACI for cross-team decisions"
      - "Lock the cadence (daily team, weekly program, monthly client)"
    methodologies:
      - slug: raci-matrix
        path: pro/pm/project-manager/raci-matrix
        required: true
        tier_gate: pro
      - slug: project-integration
        path: pro/pm/pm-traditional/project-integration
        required: true
        tier_gate: pro
      - slug: agile-hybrid-approaches
        path: pro/pm/pm-agile/agile-hybrid-approaches
        required: true
        tier_gate: pro
    outputs:
      - "Program operating model doc"
    decision_gate: "Advance when every team knows its mission and decision rights."
  - name: "Dependency map"
    intent: "Visualise inter-team dependencies up front."
    tasks:
      - "Pull each team's planned work for the next 4 sprints"
      - "Map cross-team dependencies as a network"
      - "Identify chokepoints"
    methodologies:
      - slug: value-stream-management
        path: pro/pm/pm-agile/value-stream-management
        required: true
        tier_gate: pro
      - slug: jira-workflow-management
        path: pro/pm/project-manager/jira-workflow-management
        required: true
        tier_gate: pro
    outputs:
      - "Dependency map + chokepoint list"
    decision_gate: "Advance when chokepoints have a named owner."
  - name: "Weekly program checkpoint"
    intent: "Stand up the cross-team alignment ritual."
    tasks:
      - "Run a 30-min cross-team checkpoint weekly"
      - "Track dependency aging in the program board"
      - "Escalate dependencies older than threshold"
    methodologies:
      - slug: scrum-ceremonies
        path: pro/pm/pm-agile/scrum-ceremonies
        required: true
        tier_gate: pro
      - slug: kanban-scaled-agile-ceremonies
        path: pro/pm/pm-agile/kanban-scaled-agile-ceremonies
        required: true
        tier_gate: pro
      - slug: jira-workflow-management
        path: pro/pm/project-manager/jira-workflow-management
        required: true
        tier_gate: pro
    outputs:
      - "Weekly checkpoint cadence"
      - "Dependency aging report"
    decision_gate: "Advance after 3 weeks of clean checkpoint runs."
  - name: "Predictive read"
    intent: "Use leading indicators, not lagging."
    tasks:
      - "Track velocity + dependency aging + risk-cost trend"
      - "Forecast 2-sprint outlook weekly"
      - "Flag deviations early"
    methodologies:
      - slug: predictive-analytics-pm
        path: pro/pm/pm-agile/predictive-analytics-pm
        required: true
        tier_gate: pro
      - slug: reporting-basics
        path: pro/pm/pm-agile/reporting-basics
        required: true
        tier_gate: pro
      - slug: risk-management
        path: pro/pm/pm-traditional/risk-management
        required: true
        tier_gate: pro
    outputs:
      - "2-sprint forecast"
    decision_gate: "Advance when forecasts converge with actuals within tolerance."
  - name: "Cross-team team-development"
    intent: "Build the meta-team chemistry."
    tasks:
      - "Run a monthly all-program ritual (demo + retro)"
      - "Rotate team leads through the program checkpoint"
      - "Capture cross-team lessons quarterly"
    methodologies:
      - slug: team-development
        path: pro/pm/pm-agile/team-development
        required: true
        tier_gate: pro
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
    outputs:
      - "Program-level retro notes"
    decision_gate: "Advance after one full all-program cycle."
  - name: "Client / leadership view"
    intent: "Stitch the team-of-teams into one coherent view."
    tasks:
      - "Build a single program dashboard"
      - "Send weekly program note to client + leadership"
      - "Hold a monthly steerco"
    methodologies:
      - slug: reporting-basics
        path: pro/pm/pm-agile/reporting-basics
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: benefits-realization
        path: pro/pm/pm-traditional/benefits-realization
        required: true
        tier_gate: pro
    outputs:
      - "Program dashboard"
      - "Weekly program note"
    decision_gate: "Required: weekly program note continues uninterrupted."
  - name: "Continuous improvement"
    intent: "Avoid drift across quarters."
    tasks:
      - "Quarterly program-level retro"
      - "Rotate cross-team handoff scripts based on lessons"
      - "Sunset rituals that no longer earn their cost"
    methodologies:
      - slug: lessons-learned
        path: pro/pm/pm-traditional/lessons-learned
        required: true
        tier_gate: pro
      - slug: scope-management
        path: pro/pm/pm-traditional/scope-management
        required: true
        tier_gate: pro
    outputs:
      - "Quarterly retro + ritual sunset log"
    decision_gate: "Required: a quarterly retro is held; no skipping."

