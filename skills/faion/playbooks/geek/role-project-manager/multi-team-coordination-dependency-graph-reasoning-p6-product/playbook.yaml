slug: multi-team-coordination-dependency-graph-reasoning-p6-product
title: "Multi-team coordination & dependency-graph reasoning (P6 product)"
version: "1.0.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion-network"]
content_id: b3c2b00840e8f9a0

tier: geek
tier_min: geek
group: role-project-manager
persona: PM coordinating 3+ feature teams in a P6 product context
complexity: deep
context: [team]

summary: |
  PM coordinating 3+ feature teams ships cross-team work without weekly fire drills, surfaces blockers within 24h, no surprise integration breaks.

intent: |
  Cross-team coordination chaos -> live dependency graph + 24h blocker-surface SLA + no surprise releases.

scope: |
  PM owns coordination across 3+ feature teams shipping into a shared product. This playbook sets up a maintained dependency graph, a scrum-of-scrums async cadence, integration-readiness gates, and release-readiness reviews. Done when two consecutive releases ship with zero surprise integration breaks and blockers surface within 24h of forming.

success_criteria:
  - "Dependency graph maintained and accurate within 1 day of any change"
  - "Cross-team blockers surface within 24h of forming"
  - "Two consecutive releases with zero surprise integration breaks"
  - "Scrum-of-scrums async ceremony running weekly"

methodology_refs:
  - faion/knowledge/pro/pm/pm-agile/kanban-scaled-agile-ceremonies
  - faion/knowledge/pro/pm/pm-agile/value-stream-management
  - faion/knowledge/pro/pm/pm-traditional/communications-management
  - faion/knowledge/pro/pm/pm-traditional/project-integration
  - faion/knowledge/pro/pm/pm-traditional/quality-management
  - faion/knowledge/pro/pm/project-manager/predictive-analytics-pm

stages:
  - name: "Build dependency graph"
    intent: "Make all cross-team dependencies visible."
    tasks:
      - "Interview each team lead about upstream + downstream needs"
      - "Construct a directed dependency graph (issues + epics + services)"
      - "Publish to a shared, queryable surface"
    methodologies:
      - slug: project-integration
        path: pro/pm/pm-traditional/project-integration
        required: true
        tier_gate: pro
      - slug: value-stream-management
        path: pro/pm/pm-agile/value-stream-management
        required: true
        tier_gate: pro
    outputs:
      - "Dependency graph v1 in shared tool"
    decision_gate: |
      Advance when each team confirms their slice is accurate.
  - name: "Scrum-of-scrums async"
    intent: "Weekly cross-team sync without a meeting."
    tasks:
      - "Stand up a weekly async thread for cross-team blockers"
      - "Standard prompts: blockers raised / blockers resolved / risks"
      - "Require team-lead participation within 24h"
    methodologies:
      - slug: kanban-scaled-agile-ceremonies
        path: pro/pm/pm-agile/kanban-scaled-agile-ceremonies
        required: true
        tier_gate: pro
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
    outputs:
      - "Async scrum-of-scrums running weekly"
    decision_gate: |
      Advance after 2 consecutive weeks of full participation.
  - name: "Blocker SLA"
    intent: "24h surface time, no exceptions."
    tasks:
      - "Define cross-team blocker status taxonomy"
      - "Auto-escalate blockers >24h to PM"
      - "Track blocker time-to-surface as a KPI"
    methodologies:
      - slug: communications-management
        path: pro/pm/pm-traditional/communications-management
        required: true
        tier_gate: pro
      - slug: predictive-analytics-pm
        path: pro/pm/project-manager/predictive-analytics-pm
        required: true
        tier_gate: pro
    outputs:
      - "Blocker SLA dashboard"
    decision_gate: |
      Advance when median time-to-surface is <24h for 2 weeks.
  - name: "Integration-readiness gate"
    intent: "Nothing ships across teams without an integration check."
    tasks:
      - "Define gate criteria: contract tests, schema check, feature flag"
      - "Require gate sign-off in PR template"
      - "Block merges on red gate state"
    methodologies:
      - slug: project-integration
        path: pro/pm/pm-traditional/project-integration
        required: true
        tier_gate: pro
      - slug: quality-management
        path: pro/pm/pm-traditional/quality-management
        required: true
        tier_gate: pro
    outputs:
      - "Integration gate enforced in CI"
    decision_gate: |
      Advance after one full release cycle uses the gate.
  - name: "Release-readiness review"
    intent: "Pre-release review catches what the gate missed."
    tasks:
      - "Async release-readiness checklist 48h pre-release"
      - "Each team lead signs their slice"
      - "PM signs the aggregate"
    methodologies:
      - slug: quality-management
        path: pro/pm/pm-traditional/quality-management
        required: true
        tier_gate: pro
      - slug: project-integration
        path: pro/pm/pm-traditional/project-integration
        required: true
        tier_gate: pro
    outputs:
      - "Signed release-readiness doc per release"
    decision_gate: |
      Advance after 2 consecutive clean releases.
  - name: "Refine the graph"
    intent: "Keep the graph live, not stale."
    tasks:
      - "Weekly graph diff vs reality"
      - "Pull dependencies out as new epics arrive"
      - "Archive resolved nodes"
    methodologies:
      - slug: value-stream-management
        path: pro/pm/pm-agile/value-stream-management
        required: true
        tier_gate: pro
      - slug: predictive-analytics-pm
        path: pro/pm/project-manager/predictive-analytics-pm
        required: true
        tier_gate: pro
    outputs:
      - "Graph diff log"
    decision_gate: |
      Done when graph age never exceeds 1 day post-change.

common_pitfalls:
  - "Building the dependency graph once and never updating -> stale + ignored"
  - "Letting scrum-of-scrums become a status meeting -> participation drops"
  - "Skipping integration gate when timeline is tight -> surprise breaks"

quality_checklist:
  - "Can any team lead query the graph and trust the answer?"
  - "Are cross-team blockers visible within 24h?"
  - "Did the last 2 releases ship with zero surprise integration breaks?"

related_playbooks:
  - ai-assisted-sprint-planning-with-capacity-reality-check
  - distressed-project-rescue-90-day-turnaround

