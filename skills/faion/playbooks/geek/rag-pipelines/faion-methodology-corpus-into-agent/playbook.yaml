slug: faion-methodology-corpus-into-agent
title: "Methodology corpus integration: faion-into-our-agent (2 weeks)"
version: "0.1.0"
status: draft
last_reviewed: 2026-05-20
maintainers: ["faion"]
content_id: de0986df5b8c1714

tier_min: geek
complexity: medium
context: [team]
persona_hints: [P7]

intent: |
  No internal RAG → faion methodology corpus embedded as reasoning prior for an in-house vertical agent with ingestion, retrieval, eval, governance.

scope: |
  Embed the faion knowledge base as a reasoning prior for an in-house vertical agent: ingestion, chunking, retrieval, reranking, eval, plus governance / licence / drift hygiene. Output: agent answers cite faion methodologies with traceable IDs.

non_goals:
  - "End-user-facing search UI — not the goal"
  - "Multi-tenant corpus isolation — out of scope"

prerequisites:
  - "Existing vertical agent with at least one tool slot"
  - "Vector DB or readiness to deploy one"

success_criteria:
  - "Chunked + indexed faion corpus reachable from agent"
  - "Reranker raising P@5 over baseline"
  - "Eval pipeline scoring retrieval and generation"
  - "Licence + governance audit passed"
  - "Drift alert wired on retrieval distribution"

stages:
  - name: "Ingest & Chunk"
    intent: "Chunk faion methodologies by document structure and semantics."
    tasks:
      - "Walk knowledge/ tree and extract semantic units"
      - "Choose chunking strategy: structure + semantic"
      - "Stand up production chunking service"
    methodologies:
      - slug: chunking-document-structure
        path: geek/ai/rag-engineer/chunking-document-structure
        required: true
        tier_gate: geek
      - slug: chunking-semantic
        path: geek/ai/rag-engineer/chunking-semantic
        required: true
        tier_gate: geek
      - slug: chunking-production-service
        path: geek/ai/rag-engineer/chunking-production-service
        required: true
        tier_gate: geek
      - slug: kb-codebase-rag-symbol-chunked
        path: geek/sdlc-ai/kb-codebase-rag-symbol-chunked
        required: true
        tier_gate: geek
    outputs:
      - "chunks.jsonl"
      - "Chunking service deployed"
    decision_gate: |
      Advance when chunk count and avg-token length are stable.
  - name: "Embed & Retrieve"
    intent: "Pick embedding model, cache aggressively, wire hybrid search."
    tasks:
      - "Pick embedding model with eval"
      - "Batch + cache embeddings"
      - "Wire BM25 + vector hybrid search"
    methodologies:
      - slug: embedding-model-selection
        path: geek/ai/rag-engineer/embedding-model-selection
        required: true
        tier_gate: geek
      - slug: embeddings-evaluation
        path: geek/ai/ml-engineer/embeddings-evaluation
        required: true
        tier_gate: geek
      - slug: embeddings-batch-and-cache
        path: geek/ai/ml-engineer/embeddings-batch-and-cache
        required: true
        tier_gate: geek
      - slug: embedding-caching
        path: geek/ai/rag-engineer/embedding-caching
        required: true
        tier_gate: geek
      - slug: hybrid-search-implementation
        path: geek/ai/rag-engineer/hybrid-search-implementation
        required: true
        tier_gate: geek
      - slug: rag-architecture
        path: geek/ai/rag-engineer/rag-architecture
        required: true
        tier_gate: geek
    outputs:
      - "Embedding cache"
      - "Hybrid search endpoint"
    decision_gate: |
      Advance when P@5 ≥ baseline + 10%.
  - name: "Rerank & Compose"
    intent: "Two-stage rerank with diversity; wire into agent context."
    tasks:
      - "Add two-stage reranker"
      - "Add MMR diversity"
      - "Integrate into context pipeline"
    methodologies:
      - slug: reranking-two-stage
        path: geek/ai/rag-engineer/reranking-two-stage
        required: true
        tier_gate: geek
      - slug: reranking-diversity-mmr
        path: geek/ai/rag-engineer/reranking-diversity-mmr
        required: true
        tier_gate: geek
      - slug: reranking-pipeline-integration
        path: geek/ai/rag-engineer/reranking-pipeline-integration
        required: true
        tier_gate: geek
      - slug: rerank-before-reasoning
        path: geek/ai/ai-agents/rerank-before-reasoning
        required: true
        tier_gate: geek
      - slug: manifest-then-fetch
        path: geek/ai/ai-agents/manifest-then-fetch
        required: true
        tier_gate: geek
      - slug: progressive-disclosure-skills
        path: geek/ai/ai-agents/progressive-disclosure-skills
        required: true
        tier_gate: geek
      - slug: file-reference-passing
        path: geek/ai/ai-agents/file-reference-passing
        required: true
        tier_gate: geek
      - slug: auto-evict-tool-results
        path: geek/ai/ai-agents/auto-evict-tool-results
        required: true
        tier_gate: geek
      - slug: terse-default-tool-output
        path: geek/ai/ai-agents/terse-default-tool-output
        required: true
        tier_gate: geek
      - slug: compaction-preserve-refs
        path: geek/ai/ai-agents/compaction-preserve-refs
        required: true
        tier_gate: geek
    outputs:
      - "Reranker service"
      - "Context composition rules"
    decision_gate: |
      Advance when NDCG and answer-grounding both improve.
  - name: "Eval & Monitor"
    intent: "End-to-end RAG eval + production monitoring + drift signal."
    tasks:
      - "Wire RAG eval pipeline"
      - "Monitor retrieval distribution in prod"
      - "Pin schemas + memory snapshots"
    methodologies:
      - slug: rag-eval-pipeline
        path: geek/ai/rag-engineer/rag-eval-pipeline
        required: true
        tier_gate: geek
      - slug: rag-eval-production-monitoring
        path: geek/ai/rag-engineer/rag-eval-production-monitoring
        required: true
        tier_gate: geek
      - slug: rag-eval-retrieval-metrics
        path: geek/ai/rag-engineer/rag-eval-retrieval-metrics
        required: true
        tier_gate: geek
      - slug: kb-versioned-agent-memory-files
        path: geek/sdlc-ai/kb-versioned-agent-memory-files
        required: true
        tier_gate: geek
    outputs:
      - "Eval CI job"
      - "Drift dashboard"
    decision_gate: |
      Advance when drift signal correctly fires on a planted shift.
  - name: "Governance"
    intent: "Licence audit and AI Act / governance hygiene."
    tasks:
      - "Run licence-compliance scan on corpus"
      - "Map governance obligations"
      - "Sign off on deployment"
    methodologies:
      - slug: gov-license-compliance-scan
        path: geek/sdlc-ai/gov-license-compliance-scan
        required: true
        tier_gate: geek
      - slug: eu-ai-act-compliance
        path: geek/ai/ml-engineer/eu-ai-act-compliance
        required: true
        tier_gate: geek
    outputs:
      - "Licence report"
      - "Governance sign-off"
    decision_gate: |
      Ship only when licence + governance both pass.

common_pitfalls:
  - "Treating eval scores as ground truth without judge calibration"
  - "Shipping prompt or model changes without a regression gate"

quality_checklist:
  - "Can I roll back this change in one step?"
  - "Is the regression eval committed BEFORE the fix?"

