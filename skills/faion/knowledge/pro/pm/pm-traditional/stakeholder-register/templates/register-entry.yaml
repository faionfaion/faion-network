# Stakeholder register entry template.
# Add to stakeholders/register.yaml under the "stakeholders:" key.
# Run scripts/register_audit.py to validate completeness.

- id: "S-NN"                          # Unique stable ID; never reuse after deprecation
  name: "Full Name"                   # Must match authoritative directory (Entra ID / Workday / CRM)
  role: "Job Title / Function"
  organization: "Department or Company"
  category: "Sponsor"                 # Sponsor | User | Customer | Team | Regulator | Supplier | Influencer
  power: "H"                          # H | M | L
  interest: "H"                       # H | M | L
  impact: "M"                         # H | M | L — how strongly project affects them
  attitude: "unknown"                 # + | 0 | - | unknown; must have evidence for + or -
  quadrant: "Manage Closely"          # Manage Closely | Keep Satisfied | Keep Informed | Monitor
  cadence: "weekly"                   # Required for power=H; optional otherwise
  owner: "PM Name"                    # Team member responsible for this relationship
  contact_ref: "op://vault/item"      # 1Password reference; never inline contact data
  evidence:
    - "Kickoff transcript line 42: raised concern about timeline"
    - "Attended all 3 steering committee sessions"
  last_engaged: "2024-03-15"
  hidden_flag: false                  # true if discovered via hidden-stakeholder checklist
