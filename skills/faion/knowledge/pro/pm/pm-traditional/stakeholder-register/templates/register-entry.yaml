# purpose: Stakeholder register entry template (YAML)
# consumes: kickoff interviews + org chart
# produces: one row of the stakeholder register
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~200-400 tokens per row

id: S-001
name: <full name>
role: <title + org>
power: <low|high>
interest: <low|high>
attitude: <champion|supporter|neutral|critic|blocker>
strategy: <one-paragraph differentiated approach>
evidence: <path to minutes / decision log / sign-off>
last_reviewed: YYYY-MM-DD
