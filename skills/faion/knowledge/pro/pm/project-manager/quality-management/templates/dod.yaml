# quality/dod.yaml — machine-readable Definition of Done.
# Version this file; agents and CI read it, not human prose.
# must items block merge; should items open a follow-up issue automatically.
# Source: quality-management methodology.

version: "1.0"
scope: "all-features"  # override per repo as needed

items:
  code_quality:
    - id: dod-001
      description: "Code compiles without warnings"
      priority: must
      gate: pre-merge
    - id: dod-002
      description: "All unit tests pass"
      priority: must
      gate: pre-merge
    - id: dod-003
      description: "Test coverage >= 80% (90% for agent-generated code)"
      priority: must
      gate: pre-merge
    - id: dod-004
      description: "No critical or high severity security issues (gitleaks, semgrep)"
      priority: must
      gate: pre-merge
    - id: dod-005
      description: "Code reviewed and approved by at least one maintainer"
      priority: must
      gate: pre-merge
    - id: dod-006
      description: "No lint errors (ruff / eslint)"
      priority: must
      gate: pre-commit

  documentation:
    - id: dod-007
      description: "README updated if public interface changed"
      priority: should
      gate: pre-merge
    - id: dod-008
      description: "API documentation complete for new endpoints"
      priority: must
      gate: pre-merge
    - id: dod-009
      description: "User-facing changes documented in CHANGELOG"
      priority: should
      gate: pre-merge

  deployment:
    - id: dod-010
      description: "Deployed to staging and QA-verified"
      priority: must
      gate: pre-release
    - id: dod-011
      description: "Performance acceptable (p95 API response < 500ms)"
      priority: should
      gate: pre-release
    - id: dod-012
      description: "Rollback plan documented"
      priority: should
      gate: pre-release

  acceptance:
    - id: dod-013
      description: "Product Owner approved (acceptance criteria met)"
      priority: must
      gate: pre-release
    - id: dod-014
      description: "No blocking bugs open"
      priority: must
      gate: pre-release
