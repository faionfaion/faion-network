# stakeholders.yaml — single source of truth for stakeholder register
# Generate Markdown view from this; do not store PII (email, phone) here — use separate access-controlled file
- id: S-01
  name: "[Full Name or Group Name]"
  role: "[Job title or function]"
  dept: "[Department]"
  interests:
    - "[Concrete interest — e.g. delivery cadence, not 'project success']"
    - "[Second interest]"
  influence: H        # H | M | L (based on org chart, budget authority, RACI)
  impact: H           # H | M | L (how much project affects them)
  attitude: unknown   # supportive | neutral | resistant | unknown (never infer — verify directly)
  attitude_evidence: ""  # quoted evidence from conversation; required before overriding 'unknown'
  quadrant: manage-closely  # manage-closely | keep-satisfied | keep-informed | monitor
  comms:
    cadence: weekly
    channel: "[1:1 / Slack DM / email / review meeting]"
  last_touch: "YYYY-MM-DD"
  notes: "[Context, history, key concerns]"

- id: S-02
  name: "[Second Stakeholder]"
  role: "[Role]"
  dept: "[Dept]"
  interests: ["[interest]"]
  influence: M
  impact: H
  attitude: unknown
  attitude_evidence: ""
  quadrant: keep-informed
  comms:
    cadence: bi-weekly
    channel: "[channel]"
  last_touch: "YYYY-MM-DD"
  notes: ""
