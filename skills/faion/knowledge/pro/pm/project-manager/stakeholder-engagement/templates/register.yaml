# stakeholders/register.yaml — stakeholder register schema.
# Source of truth for engagement planning. Store in a private repo.
# Diffs = engagement history. CODEOWNERS gate attitude changes.
# Run password-scrubber-agent before any commit.

stakeholders:
  - id: S-01
    name: "Jane Smith"
    category: "Sponsor"        # Sponsor|User|Customer|Team|Regulator|Supplier|Influencer
    power: "H"                 # H|M|L
    interest: "H"              # H|M|L
    attitude: "unknown"        # +|0|-|unknown (requires evidence)
    quadrant: "Manage Closely" # Manage Closely|Keep Satisfied|Keep Informed|Monitor
    evidence: []               # quotes or org-chart lines supporting attitude
    cadence: "weekly"          # daily|weekly|biweekly|monthly|quarterly|release
    channel: "1:1"             # 1:1|email|digest|meeting|portal
    owner: "PM"                # role responsible for this relationship
    last_engaged: null         # ISO date of last engagement action
    notes: ""

  - id: S-02
    name: "IT Security Team"
    category: "Regulator"
    power: "H"
    interest: "L"
    attitude: "unknown"
    quadrant: "Keep Satisfied"
    evidence: []
    cadence: "monthly"
    channel: "email"
    owner: "Tech Lead"
    last_engaged: null
    notes: "Include in architecture review; fast response to security queries."
