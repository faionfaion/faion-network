# __faion_header__:
#   purpose: ADO Boards configuration skeleton (process, area/iteration, board, PAT scope)
#   consumes: org chart + sprint cadence + governance constraints
#   produces: YAML conforming to content/02-output-contract.xml
#   depends-on: content/01-core-rules.xml rules template-inheritance + area-vs-iteration
#   token-budget-impact: ~300 tokens when loaded
organization: REPLACE-org-slug
project: REPLACE-project-name
process_template: Agile   # Basic | Agile | Scrum | CMMI
area_tree:
  root: REPLACE-platform-root
  children:
    - REPLACE-team-a
    - REPLACE-team-b
iteration_tree:
  cadence: biweekly   # weekly | biweekly | monthly
  iterations:
    - REPLACE-2026-Q2-S1
    - REPLACE-2026-Q2-S2
board:
  columns:
    - name: New
      state_mapping: [New]
      wip_limit: null
    - name: Active
      state_mapping: [Active]
      wip_limit: 5
    - name: Resolved
      state_mapping: [Resolved]
      wip_limit: 3
    - name: Closed
      state_mapping: [Closed]
      wip_limit: null
  swimlanes:
    - Expedite
    - Default
    - Tech Debt
pat_scope_manifest:
  work_items_read_write: true
  full_access_forbidden: true
ab_linking_required: true
