# __faion_header__:
#   purpose: Jira workflow definition (states + transitions + conditions)
#   consumes: issue-type scheme + role permissions
#   produces: workflow applied via Jira REST
#   depends-on: content/01-core-rules.xml rule workflow-as-yaml-versioned
#   token-budget-impact: ~400 tokens

name: REPLACE-workflow-name
statuses:
  - name: To Do
    category: New
  - name: In Progress
    category: Indeterminate
  - name: Code Review
    category: Indeterminate
  - name: Done
    category: Done
transitions:
  - name: Start
    from: To Do
    to: In Progress
    conditions:
      - type: role
        role: Developers
  - name: Submit for review
    from: In Progress
    to: Code Review
    validators:
      - type: field-required
        field: pull_request
  - name: Approve
    from: Code Review
    to: Done
    conditions:
      - type: role
        role: Reviewers
