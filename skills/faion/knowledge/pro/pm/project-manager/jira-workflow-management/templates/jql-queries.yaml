# __faion_header__:
#   purpose: Day-1 saved JQL queries
#   consumes: team workflow
#   produces: filters applied to project
#   depends-on: content/01-core-rules.xml rule jql-saved-not-ad-hoc
#   token-budget-impact: ~200 tokens

filters:
  - name: My Active
    jql: assignee = currentUser() AND statusCategory != Done
  - name: Sprint Burn
    jql: sprint in openSprints() AND project = REPLACE
  - name: Stale In-Progress
    jql: status = "In Progress" AND updated < -7d
  - name: Code Review Backlog
    jql: status = "Code Review" AND assignee in membersOf("Reviewers")
