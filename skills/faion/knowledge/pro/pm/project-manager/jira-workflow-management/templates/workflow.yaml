# Jira workflow definition skeleton
# Use as input to /rest/api/3/workflows/create
name: "Development Workflow"
description: "Standard Scrum/Kanban development workflow"

statuses:
  - name: "To Do"
    category: "To Do"
  - name: "In Progress"
    category: "In Progress"
  - name: "Code Review"
    category: "In Progress"
  - name: "QA Testing"
    category: "In Progress"
  - name: "Done"
    category: "Done"

transitions:
  - name: "Start Work"
    from: ["To Do"]
    to: "In Progress"
  - name: "Submit for Review"
    from: ["In Progress"]
    to: "Code Review"
    validators:
      - type: "field_required"
        field: "code_reviewer"
  - name: "Approve"
    from: ["Code Review"]
    to: "QA Testing"
  - name: "Pass QA"
    from: ["QA Testing"]
    to: "Done"
  - name: "Reopen"
    from: ["Code Review", "QA Testing", "Done"]
    to: "In Progress"
