# tco.yaml — 3-year Total Cost of Ownership model for PM tool selection.
# Fill in actuals from vendor quotes and internal estimates.
# Source: pm-tool-selection methodology.

scenario:
  tool: "[Tool Name]"
  users: 50
  license_per_user_month: 10

year_1:
  direct:
    annual_license: 6000        # users * license_per_user_month * 12
    add_ons:
      premium_support: 1000
      additional_storage: 500
    subtotal_direct: 7500

  indirect:
    implementation:
      setup_hours: 40
      hourly_rate: 100
      total: 4000
    migration:
      consultant_days: 5
      daily_rate: 1500
      total: 7500
    training:
      sessions: 4
      cost_per_session: 500
      total: 2000
    ongoing_admin:
      hours_per_month: 10
      hourly_rate: 75
      annual: 9000
    subtotal_indirect: 22500

  hidden:
    productivity_loss_transition: 5000
    integration_development: 3000
    custom_reporting: 2000
    subtotal_hidden: 10000

  total_year_1: 40000  # direct + indirect + hidden

year_2:
  direct: 7500
  ongoing_admin: 9000
  total_year_2: 16500

year_3:
  direct: 7500
  ongoing_admin: 9000
  total_year_3: 16500

summary:
  three_year_tco: 73000
  notes: "Excludes potential 20-40% discount from annual negotiation."
