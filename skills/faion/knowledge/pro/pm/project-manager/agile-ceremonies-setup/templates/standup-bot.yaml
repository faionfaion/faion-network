# Geekbot async standup configuration
standup:
  name: "Daily Standup"
  channel: "#team-standups"
  time: "09:00"
  timezone: "Europe/Kyiv"  # Use tz-aware name, not UTC offset
  days: [monday, tuesday, wednesday, thursday, friday]

  questions:
    - text: "What did you accomplish toward the sprint goal yesterday?"
      required: true
    - text: "What are you working on today toward the sprint goal?"
      required: true
    - text: "Any blockers or help needed?"
      required: true
    - text: "How are you feeling? (optional)"
      required: false

  settings:
    send_to_channel: true
    allow_edits: true
    remind_after: 30  # minutes
    skip_on_absence: true
    # DST note: re-verify time after DST transition in March and November
