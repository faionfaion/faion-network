product: faion-checkout
persona: returning_shopper
outcome:
  metric: completed_checkout_rate
  baseline: 0.62
  target: 0.78
backbone_frozen: true  # set to false to allow activity reordering this cycle
backbone:
  - id: act_browse
    verb: "Browse what's available"
    tasks:
      - id: tsk_search
        title: "Search by keyword"
        stories:
          - id: STR-101
            user: returning_shopper
            want: "search by keyword"
            so_that: "I find a product fast"
            release: R1
            size: M
            ac_ref: AC-SEARCH-01
            status: ready
            depends_on: []
            enabler: false
            source: interview/STR-091/q42  # provenance required
      - id: tsk_filter
        title: "Filter results"
        stories:
          - id: STR-104
            release: R2
            size: M
  - id: act_pay
    verb: "Pay for the order"
    tasks:
      - id: tsk_card
        stories:
          - id: STR-201
            release: R1
            size: L
            depends_on: [STR-090]  # auth enabler — STR-090 has enabler: true
            enabler: false
releases:
  R1:
    name: walking_skeleton
    sprints: 3
    capacity_points: 90
    walking_skeleton: true
    outcome_rationale: "Validates checkout conversion from 62% toward 78% with end-to-end journey"
  R2:
    name: enhanced_checkout
    sprints: 4
    capacity_points: 120
