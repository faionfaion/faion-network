# purpose: canonical YAML story-map skeleton conforming to 02-output-contract.xml
# consumes: persona inventory + journey synthesis
# produces: spec artefact (the map itself)
# depends-on: content/01-core-rules.xml, content/02-output-contract.xml
# token-budget-impact: ~300 tokens loaded as template context

map_id: REPLACE-map-id
version_tag: v1.0.0
personas:
  - {id: shopper, name: "Returning shopper"}
activities:
  - id: act-discover
    name: Discover catalogue
    tasks:
      - id: task-browse
        stories:
          - {id: s-1, title: "Browse top categories", persona_id: shopper, release: R1}
          - {id: s-2, title: "Filter by brand",       persona_id: shopper, release: R2}
  - id: act-purchase
    name: Purchase
    tasks:
      - id: task-checkout
        stories:
          - {id: s-3, title: "Pay with card",  persona_id: shopper, release: R1}
          - {id: s-4, title: "Save payment for next time", persona_id: shopper, release: R3}
