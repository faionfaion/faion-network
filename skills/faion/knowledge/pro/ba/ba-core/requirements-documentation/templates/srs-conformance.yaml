# srs-conformance.yaml — IEEE 830-1998 conformance schema for CI validation.
# Used by srs_conform.py to fail CI when mandatory sections or phrasing rules are violated.
doc_type: SRS
standard: IEEE-830-1998
mandatory_sections:
  - "1. Introduction"
  - "1.1 Purpose"
  - "1.2 Scope"
  - "1.3 Definitions, Acronyms, Abbreviations"
  - "1.4 References"
  - "1.5 Overview"
  - "2. Overall Description"
  - "3. Specific Requirements"
  - "3.1 External Interfaces"
  - "3.2 Functional Requirements"
  - "3.3 Performance Requirements"
  - "3.4 Logical Database Requirements"
  - "3.5 Design Constraints"
  - "3.6 Software System Attributes"
  - "Appendix A. Traceability Matrix"
mandatory_frontmatter:
  - doc_id
  - version
  - status         # Draft | InReview | Approved | Superseded
  - approval_date
  - owner
  - glossary_ref
requirement_rules:
  id_pattern: "^(BR|UR|FR|NFR)-[0-9]{3}$"
  required_fields: [id, type, priority, source, ac]
  forbidden_words:
    - fast
    - slow
    - easy
    - user-friendly
    - intuitive
    - robust
    - seamless
    - flexible
  shall_only: true   # reject "should" / "may" / "might" in FRs
