# purpose: AI Incident Triage Matrix rubric skeleton
# consumes: Prerequisites bundle (see AGENTS.md)
# produces: artefact conforming to content/02-output-contract.xml (rubric)
# depends-on: content/01-core-rules.xml + content/02-output-contract.xml
# token-budget-impact: ~200-1000 tokens when loaded as context


incident_id: <STR>
dimensions:
  - name: user_impact
    anchors:
      1: "0 users affected"
      3: "<100 users"
      5: ">10k users"
  - name: regression_magnitude
    anchors:
      1: "<2%"
      3: "5-15%"
      5: ">20%"
  - name: blast_radius
    anchors:
      1: "single endpoint"
      3: "single feature"
      5: "all AI flows"
weights:        # pre-registered; lock before scoring
  user_impact: 0.4
  regression_magnitude: 0.4
  blast_radius: 0.2
raters: []
