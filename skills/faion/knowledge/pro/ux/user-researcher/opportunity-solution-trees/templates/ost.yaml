# ost.yaml — agent-editable Opportunity Solution Tree schema
# One outcome per file. Agents edit data; humans review the visual (Miro/FigJam render).
# Required fields: id, statement, metric (outcome); id, statement, evidence, last_validated (opportunities).
# Every opportunity needs >=2 evidence refs or mark status: unvalidated.

outcome:
  id: O0
  statement: "Increase weekly active editors by 20% in Q3"
  metric: "WAU_editors"

opportunities:
  - id: O1
    statement: "Editors lose work after browser crashes before downloading"
    evidence: [INT-031, INT-044, SUPP-118]
    last_validated: 2026-04-01
    status: validated
    solutions:
      - id: S1
        statement: "Local-first autosave with conflict resolution"
        experiments:
          - id: E1
            hypothesis: "Autosave reduces lost-work tickets by 50%"
            method: "Cohort A/B, 4 weeks"
            success: ">=30% reduction, p<0.05"
            kill_criterion: "No significant reduction after 4 weeks at p<0.1"
            owner: "@alice"
            status: running
            results: TBD

  - id: O2
    statement: "New users cannot find the export function within the first session"
    evidence: [INT-019, INT-027]
    last_validated: 2026-03-15
    status: validated
    solutions:
      - id: S2
        statement: "Add export shortcut to the primary toolbar"
        experiments:
          - id: E2
            hypothesis: "Toolbar shortcut reduces time-to-first-export by 40%"
            method: "Usability test, n=30 new users"
            success: "Median time-to-first-export drops from 4min to <2.5min"
            kill_criterion: "No measurable improvement after 30 sessions"
            owner: "@bob"
            status: planned
            results: TBD

  - id: O3
    statement: "Placeholder — needs evidence before Q2 planning"
    evidence: []
    last_validated: null
    status: unvalidated
    solutions: []
