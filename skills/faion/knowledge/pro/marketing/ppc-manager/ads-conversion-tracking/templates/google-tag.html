<!-- Google Ads Global Site Tag — place in <head> on every page -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'AW-XXXXXXXXXX');
</script>

<!-- Google Ads Conversion Event — place on thank-you/confirmation page -->
<script>
  gtag('event', 'conversion', {
    'send_to': 'AW-XXXXXXXXXX/YYYYYYYYY',
    'value': DYNAMIC_VALUE,       // replace with actual transaction value
    'currency': 'USD',
    'transaction_id': TRANSACTION_ID  // unique ID for deduplication
  });
</script>
