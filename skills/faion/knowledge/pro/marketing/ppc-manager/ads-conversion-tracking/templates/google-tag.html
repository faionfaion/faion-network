<!-- purpose: legacy template for ads-conversion-tracking — google-tag -->
<!-- consumes: per AGENTS.md Prerequisites -->
<!-- produces: artefact per content/02-output-contract.xml -->
<!-- depends-on: content/01-core-rules.xml, content/06-decision-tree.xml -->
<!-- token-budget-impact: ~400-1200 tokens when loaded as context -->

<!-- Google Ads Global Site Tag — place in <head> on every page -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'AW-XXXXXXXXXX');
</script>

<!-- Google Ads Conversion Event — place on thank-you/confirmation page -->
<script>
  gtag('event', 'conversion', {
    'send_to': 'AW-XXXXXXXXXX/YYYYYYYYY',
    'value': DYNAMIC_VALUE,       // replace with actual transaction value
    'currency': 'USD',
    'transaction_id': TRANSACTION_ID  // unique ID for deduplication
  });
</script>
