# Activation checklist config — drop into your onboarding service
checklist:
  title: "Get started with [Product]"
  items:
    - id: profile
      label: "Complete your profile"
      action: "/settings/profile"
      required: false

    - id: first_project
      label: "Create your first project"
      action: "/projects/new"
      required: true

    - id: invite
      label: "Invite a team member"
      action: "/team/invite"
      required: false

    - id: first_task
      label: "Complete a task"
      action: null           # Triggered by event, not navigation
      required: true
      activation_event: true # When this item is checked = user is activated

  completion_reward:
    type: "confetti"
    message: "You're all set!"
