# purpose: Sidekiq Background Jobs template (sidekiq.yml)
# consumes: Prerequisites bundle (see AGENTS.md)
# produces: artefact conforming to content/02-output-contract.xml (code)
# depends-on: content/01-core-rules.xml + content/02-output-contract.xml
# token-budget-impact: ~200-1000 tokens when loaded as context

# config/sidekiq.yml
# Queue weights control priority: higher weight = more polling slots.
# All queues here must be registered or jobs sit silently in Redis.

:concurrency: 10
:max_retries: 5
:queues:
  - [critical, 4]
  - [default, 2]
  - [notifications, 2]
  - [exports, 1]

production:
  :concurrency: 25
