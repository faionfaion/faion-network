# purpose: event-catalog seed for an ES aggregate
# consumes: event names + minimal schema info
# produces: machine-readable catalog used by upcasters + projections
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~120 tokens when loaded as reference
aggregate: Order
stream_strategy: one_per_aggregate_instance
events:
  - name: OrderPlaced
    version: 1
    fields: [order_id, customer_id]
  - name: ItemAdded
    version: 1
    fields: [order_id, sku, price, quantity]
  - name: OrderShipped
    version: 1
    fields: [order_id, carrier, shipped_at]
  - name: OrderCancelled
    version: 1
    fields: [order_id, reason]
