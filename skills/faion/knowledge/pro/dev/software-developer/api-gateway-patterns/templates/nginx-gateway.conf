# Nginx API gateway template
# Replace service names, server names, and cert paths.
upstream user_service {
    server user-service-1:8080 weight=3;
    server user-service-2:8080 weight=2;
    keepalive 32;
}

# Rate limit by consumer ID header, not source IP
limit_req_zone $http_x_consumer_id zone=api_limit:10m rate=10r/s;

server {
    listen 443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/ssl/certs/api.crt;
    ssl_certificate_key /etc/ssl/private/api.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /api/users {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://user_service;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Request-ID    $request_id;
        proxy_connect_timeout 5s;
        proxy_read_timeout    5s;
        proxy_send_timeout    5s;
    }

    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
