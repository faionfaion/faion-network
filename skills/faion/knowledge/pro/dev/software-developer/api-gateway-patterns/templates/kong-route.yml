# Kong declarative route template (deck sync compatible)
# Replace <service-name>, <url>, <path>, and rate limits per environment.
_format_version: "3.0"

services:
  - name: <service-name>
    url: http://<service-host>:<port>
    connect_timeout: 5000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: <route-name>
        paths:
          - /api/<path>
        strip_path: false
        preserve_host: true
    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
      - name: rate-limiting
        config:
          minute: 60
          policy: redis
          limit_by: consumer
          redis_host: redis
          redis_port: 6379
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true
