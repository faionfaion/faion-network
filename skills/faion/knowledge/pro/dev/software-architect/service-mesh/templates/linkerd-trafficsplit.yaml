# Linkerd SMI TrafficSplit for weighted canary deployment.
#
# Requires:
# - Linkerd installed in the cluster
# - SMI CRDs installed (kubectl apply -f https://raw.githubusercontent.com/servicemeshinterface/smi-spec/...)
# - Two Kubernetes Services: <SERVICE_NAME> (root) and <SERVICE_NAME>-canary
#
# Workflow:
# 1. Deploy new version alongside old version
# 2. Create <SERVICE_NAME>-canary Service pointing to v2 pods
# 3. Apply this TrafficSplit: start at 5% canary
# 4. Monitor error rate and latency in Linkerd dashboard / Prometheus
# 5. Increment weight: 5 → 25 → 50 → 75 → 100
# 6. Delete TrafficSplit and old deployment when canary is 100%
#
# Replace: <SERVICE_NAME>, <NAMESPACE>

apiVersion: split.smi-spec.io/v1alpha2
kind: TrafficSplit
metadata:
  name: <SERVICE_NAME>-canary
  namespace: <NAMESPACE>
spec:
  # The root service: this is what clients call
  service: <SERVICE_NAME>
  backends:
    - service: <SERVICE_NAME>        # stable (v1)
      weight: 950m                   # 95% — weights in milliunits (1000m = 100%)
    - service: <SERVICE_NAME>-canary # canary (v2)
      weight: 50m                    # 5%

---
# The canary Service (add this alongside your root Service)
# It selects only v2 pods via the version label.
apiVersion: v1
kind: Service
metadata:
  name: <SERVICE_NAME>-canary
  namespace: <NAMESPACE>
spec:
  selector:
    app: <SERVICE_NAME>
    version: v2              # only routes to v2 pods
  ports:
    - name: http
      port: 80
      targetPort: http

---
