# openapi/problem.yaml
# Reusable components for RFC 7807 ProblemDetail.
# Include via $ref: '#/components/schemas/ProblemDetail' in 4xx/5xx responses.
components:
  schemas:
    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          example: https://api.example.com/errors/v1/validation-error
        title:
          type: string
          example: Validation Error
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: The request body contains invalid fields
        instance:
          type: string
          format: uri-reference
          example: /users/create
        traceId:
          type: string
          example: 4bf92f3577b34da6a3ce929d0e0e4736
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      required: [field, code, message]
      properties:
        field:
          type: string
          example: email
        code:
          type: string
          example: invalid_format
        message:
          type: string
          example: Must be a valid email address

  responses:
    ProblemResponse400:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ProblemResponse422:
      description: Validation Error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ProblemResponse500:
      description: Internal Server Error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
