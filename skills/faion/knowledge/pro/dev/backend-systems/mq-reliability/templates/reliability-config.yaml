# purpose: smoke skeleton for mq-reliability
# consumes: spec from AGENTS.md
# produces: artefact validated by scripts/validate-mq-reliability.py
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~200 tokens
publisher_confirms: true
dlq:
  queue: orders.v1.dlq
  alert_threshold: 1
retry_policy:
  max_retries: 5
  backoff: exponential
  jitter_pct: 30
prefetch_count: 10
queue_length_limit: 100000
schema_registry: https://schema.acme.net
