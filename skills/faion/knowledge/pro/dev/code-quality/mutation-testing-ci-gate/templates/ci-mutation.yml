# purpose: GitHub Actions snippet for non-blocking → blocking mutation gate.
# consumes: see content/02-output-contract.xml inputs
# produces: artefact conforming to content/02-output-contract.xml (mutation-testing-ci-gate)
# depends-on: content/01-core-rules.xml
# token-budget-impact: small (template is loaded only when an artefact is being authored)
name: mutation
on:
  pull_request:
jobs:
  mutation:
    runs-on: ubuntu-latest
    continue-on-error: true   # FLIP TO false AFTER 14-DAY SHADOW PERIOD
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: incremental mutation
        run: scripts/incremental-mutator.sh
      - name: triage survivors
        run: python scripts/triage-survivors.py
