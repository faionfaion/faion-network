[importlinter]
root_package = src

[importlinter:contract:domain-independence]
name = Domain layer must not import application or infrastructure
type = forbidden
source_modules = src.domain
forbidden_modules =
    src.application
    src.infrastructure
    src.presentation
    sqlalchemy
    fastapi
    django
    flask
    requests
    httpx

[importlinter:contract:application-independence]
name = Application layer must not import infrastructure or presentation
type = forbidden
source_modules = src.application
forbidden_modules =
    src.infrastructure
    src.presentation
    sqlalchemy
    fastapi
    django
    flask

[importlinter:contract:no-presentation-to-domain]
name = Presentation must not import domain entities (only DTOs via application)
type = forbidden
source_modules = src.presentation
forbidden_modules =
    src.domain.entities
    src.domain.value_objects
