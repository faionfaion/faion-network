# purpose: Import-linter contract that enforces inward-only layer dependencies.
# consumes: see content/02-output-contract.xml inputs
# produces: artefact conforming to content/02-output-contract.xml (clean-architecture)
# depends-on: content/01-core-rules.xml
# token-budget-impact: small (template is loaded only when an artefact is being authored)
[importlinter]
root_packages = myapp

[importlinter:contract:layers]
name = Clean architecture layers must point inward
type = layers
layers =
    myapp.presentation
    myapp.application
    myapp.domain
containers =
    myapp.infrastructure
ignore_imports =
