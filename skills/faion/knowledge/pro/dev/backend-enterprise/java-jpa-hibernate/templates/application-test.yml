# purpose: @DataJpaTest profile with OSIV off + Hibernate query stats enabled
# consumes: test profile classpath for Testcontainers JDBC URL
# produces: Spring test config conforming to datajpatest-for-repositories rule
# depends-on: content/01-core-rules.xml rule datajpatest-for-repositories
# token-budget-impact: ~200 tokens when loaded as context
spring:
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true   # log query count per test
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.stat: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
