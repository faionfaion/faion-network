# ArgoCD Application — production deployment
# Sync policy: automated with selfHeal + prune
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-production
  namespace: argocd
  labels:
    app.kubernetes.io/name: myapp
    environment: production
  finalizers:
    - resources-finalizer.argocd.argoproj.io  # cascade-delete managed resources on app deletion
spec:
  project: production                          # ArgoCD AppProject (RBAC boundary)

  source:
    repoURL: https://github.com/org/gitops-repo.git
    targetRevision: HEAD                       # always track HEAD; use tags for release promotion
    path: apps/myapp/overlays/production      # Kustomize overlay for production

    # If using Helm instead of Kustomize:
    # chart: myapp
    # helm:
    #   releaseName: myapp
    #   valueFiles:
    #     - values.yaml
    #     - values-production.yaml
    #   parameters:
    #     - name: image.tag
    #       value: "1.2.3"

  destination:
    server: https://kubernetes.default.svc    # in-cluster; use external URL for remote cluster
    namespace: production

  syncPolicy:
    automated:
      prune: true        # delete resources no longer in Git
      selfHeal: true     # revert manual kubectl changes
      allowEmpty: false  # fail sync if result is empty (prevents accidental wipe)
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true           # prune after other resources sync
      - ApplyOutOfSyncOnly=true  # only apply resources that differ (faster)
      - ServerSideApply=true     # use SSA to avoid field ownership conflicts
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5  # keep last 5 revisions for rollback

  ignoreDifferences:
    # Ignore fields managed by controllers outside ArgoCD
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # managed by HPA
    - group: ""
      kind: ConfigMap
      name: kube-root-ca.crt
      jsonPointers:
        - /data
