# purpose: PagerDuty schedule skeleton
# consumes: charter.participants + shift_length
# produces: PagerDuty schedule via API import
# depends-on: content/01-core-rules.xml r3
# token-budget-impact: ~300 tokens

name: <team> primary
time_zone: UTC
schedule_layers:
  - name: weekly-primary
    rotation_virtual_start: 2026-06-01T00:00:00Z
    rotation_turn_length_seconds: 604800
    users:
      - <user1>
      - <user2>
      - <user3>
