# Rate limit zone definitions — place in http {} block in nginx.conf
# 10m zone holds ~160,000 unique IPs

limit_req_zone  $binary_remote_addr zone=login:10m  rate=5r/m;
limit_req_zone  $binary_remote_addr zone=api:10m    rate=100r/s;
limit_req_zone  $binary_remote_addr zone=global:10m rate=200r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Usage in server {} location blocks:

# Login endpoint: 5 requests/min, burst 3
# location /api/auth/login {
#     limit_req   zone=login burst=3 nodelay;
#     limit_req_status 429;
#     proxy_pass  http://backend;
# }

# API endpoints: 100 req/s, burst 50
# location /api/ {
#     limit_req  zone=api burst=50 nodelay;
#     limit_conn addr 20;
#     proxy_pass http://backend;
# }

# Return 429 with Retry-After header
# limit_req_status 429;
# add_header Retry-After 60 always;
