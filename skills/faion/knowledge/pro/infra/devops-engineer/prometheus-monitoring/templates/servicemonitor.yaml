# purpose: Template fixture for prometheus-monitoring: servicemonitor.yaml
# consumes: content/01-core-rules.xml
# produces: config
# depends-on: content/02-output-contract.xml
# token-budget-impact: small
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: myapp
  namespace: monitoring
  labels:
    prometheus: main     # Must match the Prometheus CR's serviceMonitorSelector
spec:
  selector:
    matchLabels:
      app: myapp         # Must match the Service labels
  namespaceSelector:
    matchNames:
      - production
      - staging
  endpoints:
    - port: metrics      # Must match the Service port name
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: false
