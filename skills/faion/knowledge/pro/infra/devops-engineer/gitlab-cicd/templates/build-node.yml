# GitLab CI Node.js build job template
.build-node:
  stage: build
  image: node:${NODE_VERSION:-22}-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
    policy: pull-push
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

# Usage:
# build:
#   extends: .build-node
#   variables:
#     NODE_VERSION: "22"
