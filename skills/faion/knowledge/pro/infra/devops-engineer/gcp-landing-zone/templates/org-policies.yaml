# org-policies/security.yaml
# Organization-level security policies for GCP landing zone.
# Apply at org node: gcloud org-policies set-policy <file> --organization=ORG_ID

# Disable service account key creation
- constraint: constraints/iam.disableServiceAccountKeyCreation
  enforcement: true

# Disable service account key upload
- constraint: constraints/iam.disableServiceAccountKeyUpload
  enforcement: true

# Require OS Login
- constraint: constraints/compute.requireOsLogin
  enforcement: true

# Restrict external IPs on VMs
- constraint: constraints/compute.vmExternalIpAccess
  listPolicy:
    deniedValues:
      - all

# Restrict resource locations
- constraint: constraints/gcp.resourceLocations
  listPolicy:
    allowedValues:
      - in:us-locations
      - in:europe-locations

# Skip default network creation
- constraint: constraints/compute.skipDefaultNetworkCreation
  enforcement: true

# Uniform bucket-level access
- constraint: constraints/storage.uniformBucketLevelAccess
  enforcement: true

# Disable public IP for Cloud SQL
- constraint: constraints/sql.restrictPublicIp
  enforcement: true
