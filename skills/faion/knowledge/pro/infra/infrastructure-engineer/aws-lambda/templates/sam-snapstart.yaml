# purpose: SAM template: Lambda SnapStart for Java/Python with AutoPublishAlias
# consumes: see ../AGENTS.md ## Prerequisites + content/02-output-contract.xml
# produces: provisioned AWS resources conforming to the methodology spec
# depends-on: content/01-core-rules.xml, content/02-output-contract.xml
# token-budget-impact: ~600-1500 tokens when loaded as context
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Lambda SnapStart for Java and Python with AutoPublishAlias

Resources:
  JavaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-java-function'
      Handler: com.example.Handler::handleRequest
      Runtime: java21
      Architectures: [arm64]
      MemorySize: 1024
      Timeout: 30
      CodeUri: target/function.jar
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
      DeploymentPreference:
        Type: AllAtOnce

  PythonFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-python-function'
      Handler: app.handler
      Runtime: python3.12
      Architectures: [arm64]
      MemorySize: 512
      Timeout: 30
      CodeUri: src/
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
