AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Lambda with DynamoDB Streams, bisect-on-error, parallelization

Resources:
  StreamProcessor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-stream-processor'
      Handler: app.handler
      Runtime: python3.12
      Architectures: [arm64]
      MemorySize: 512
      Timeout: 60
      CodeUri: src/
      Events:
        DynamoDBEvent:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt Table.StreamArn
            StartingPosition: LATEST
            BatchSize: 100
            MaximumBatchingWindowInSeconds: 5
            BisectBatchOnFunctionError: true
            MaximumRetryAttempts: 3
            MaximumRecordAgeInSeconds: 3600
            ParallelizationFactor: 2
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt FailureQueue.Arn
            FunctionResponseTypes:
              - ReportBatchItemFailures
      Policies:
        - DynamoDBStreamReadPolicy:
            TableName: !Ref Table
            StreamName: !Select [3, !Split ['/', !GetAtt Table.StreamArn]]
        - SQSSendMessagePolicy:
            QueueName: !GetAtt FailureQueue.QueueName

  Table:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-table'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  FailureQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-failures'
