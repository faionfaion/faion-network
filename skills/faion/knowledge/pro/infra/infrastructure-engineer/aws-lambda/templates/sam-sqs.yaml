# purpose: SAM template: Lambda + SQS trigger + DLQ + ReportBatchItemFailures + event filter
# consumes: see ../AGENTS.md ## Prerequisites + content/02-output-contract.xml
# produces: provisioned AWS resources conforming to the methodology spec
# depends-on: content/01-core-rules.xml, content/02-output-contract.xml
# token-budget-impact: ~600-1500 tokens when loaded as context
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Lambda with SQS trigger, DLQ, ReportBatchItemFailures, event filter

Resources:
  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-processor'
      Handler: app.handler
      Runtime: python3.12
      Architectures: [arm64]
      MemorySize: 512
      Timeout: 60
      CodeUri: src/
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt Queue.Arn
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 5
            FunctionResponseTypes:
              - ReportBatchItemFailures
            FilterCriteria:
              Filters:
                - Pattern: '{"body": {"type": ["ORDER"]}}'
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt Queue.QueueName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt DeadLetterQueue.QueueName

  Queue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-queue'
      VisibilityTimeout: 360       # >= 6x function timeout
      MessageRetentionPeriod: 1209600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600

Outputs:
  QueueUrl:
    Value: !Ref Queue
