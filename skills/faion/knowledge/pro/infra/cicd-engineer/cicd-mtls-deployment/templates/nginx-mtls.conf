# purpose: nginx server block with ssl_verify_client on + DN forwarding
# consumes: cert + key paths from secrets manager
# produces: nginx config
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~150 tokens when loaded as context

server {
    listen 443 ssl;
    ssl_protocols TLSv1.3;
    ssl_verify_client on;
}
