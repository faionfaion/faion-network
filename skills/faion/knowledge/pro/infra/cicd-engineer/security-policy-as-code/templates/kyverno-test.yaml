# purpose: Kyverno test harness — runs in CI alongside app tests
# consumes: inputs declared in AGENTS.md `## Prerequisites`
# produces: artefact conforming to content/02-output-contract.xml (config)
# depends-on: content/01-core-rules.xml + content/02-output-contract.xml
# token-budget-impact: ~400 tokens when loaded

apiVersion: cli.kyverno.io/v1alpha1
kind: Test
name: baseline-security-test
policies:
  - ../baseline-cluster-policy.yaml
resources:
  - resources/pod-good.yaml
  - resources/pod-privileged-bad.yaml
  - resources/pod-root-bad.yaml
results:
  - policy: baseline-security
    rule: deny-privileged
    resource: pod-privileged-bad
    kind: Pod
    result: fail
  - policy: baseline-security
    rule: require-run-as-non-root
    resource: pod-root-bad
    kind: Pod
    result: fail
  - policy: baseline-security
    rule: deny-privileged
    resource: pod-good
    kind: Pod
    result: pass
