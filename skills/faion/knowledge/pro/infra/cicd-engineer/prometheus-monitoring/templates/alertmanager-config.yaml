# alertmanager-config.yaml
# Alertmanager routing: critical to PagerDuty + Slack, warning to Slack, team routing.
# Replace SLACK_WEBHOOK_URL, PAGERDUTY_SERVICE_KEY, channel names.

global:
  resolve_timeout: 5m

route:
  group_by: [alertname, namespace, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default-receiver

  routes:
    - match:
        severity: critical
      receiver: critical-pagerduty
      continue: true
    - match:
        severity: critical
      receiver: critical-slack
    - match:
        severity: warning
      receiver: warning-slack

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, namespace]

receivers:
  - name: default-receiver
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'
        actions:
          - type: button
            text: Runbook
            url: '{{ (index .Alerts 0).Annotations.runbook_url }}'

  - name: critical-slack
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true

  - name: critical-pagerduty
    pagerduty_configs:
      - service_key: PAGERDUTY_SERVICE_KEY
        send_resolved: true
        severity: critical

  - name: warning-slack
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
