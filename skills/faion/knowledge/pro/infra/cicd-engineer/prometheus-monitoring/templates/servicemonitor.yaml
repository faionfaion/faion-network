# servicemonitor.yaml
# Kubernetes ServiceMonitor CRD for Prometheus Operator.
# Replace placeholder values (ALL_CAPS) with actual service names.

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: SERVICE_NAME
  namespace: NAMESPACE
  labels:
    prometheus: main
    app.kubernetes.io/name: SERVICE_NAME
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: SERVICE_NAME
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
      metricRelabelings:
        # Drop high-cardinality or unneeded metrics
        - sourceLabels: [__name__]
          regex: 'go_gc_.*'
          action: drop
  namespaceSelector:
    matchNames:
      - NAMESPACE
