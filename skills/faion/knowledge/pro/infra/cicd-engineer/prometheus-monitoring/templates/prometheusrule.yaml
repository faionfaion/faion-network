# prometheusrule.yaml
# PrometheusRule with recording rules (RED method) and alert rules.
# Replace SERVICE_NAME, NAMESPACE, TEAM, RUNBOOK_BASE_URL.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: SERVICE_NAME-rules
  namespace: NAMESPACE
  labels:
    prometheus: main
spec:
  groups:
    - name: SERVICE_NAME.recording
      interval: 30s
      rules:
        - record: "SERVICE_NAME:request_rate:5m"
          expr: sum(rate(http_requests_total{app="SERVICE_NAME"}[5m])) by (method, status)

        - record: "SERVICE_NAME:error_rate:5m"
          expr: |
            sum(rate(http_requests_total{app="SERVICE_NAME",status=~"5.."}[5m]))
            / sum(rate(http_requests_total{app="SERVICE_NAME"}[5m]))

        - record: "SERVICE_NAME:latency_p99:5m"
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{app="SERVICE_NAME"}[5m])) by (le))

    - name: SERVICE_NAME.alerts
      rules:
        - alert: SERVICE_NAMEHighErrorRate
          expr: "SERVICE_NAME:error_rate:5m > 0.05"
          for: 5m
          labels:
            severity: critical
            team: TEAM
          annotations:
            summary: "High error rate for SERVICE_NAME"
            description: "Error rate is {{ $value | humanizePercentage }} (>5%)"
            runbook_url: "RUNBOOK_BASE_URL/SERVICE_NAME-high-error-rate"

        - alert: SERVICE_NAMEHighLatency
          expr: "SERVICE_NAME:latency_p99:5m > 1"
          for: 10m
          labels:
            severity: warning
            team: TEAM
          annotations:
            summary: "High P99 latency for SERVICE_NAME"
            description: "P99 latency is {{ $value | humanizeDuration }}"
            runbook_url: "RUNBOOK_BASE_URL/SERVICE_NAME-high-latency"

        - alert: SERVICE_NAMEPodRestarts
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="NAMESPACE",container="SERVICE_NAME"}[1h]) > 3
          for: 5m
          labels:
            severity: warning
            team: TEAM
          annotations:
            summary: "SERVICE_NAME pod restarting frequently"
            description: "Pod {{ $labels.pod }} restarted {{ $value }} times in the last hour"
            runbook_url: "RUNBOOK_BASE_URL/SERVICE_NAME-pod-restarts"

        - alert: SERVICE_NAMEHighMemory
          expr: |
            container_memory_working_set_bytes{namespace="NAMESPACE",container="SERVICE_NAME"}
            / container_spec_memory_limit_bytes{namespace="NAMESPACE",container="SERVICE_NAME"} > 0.85
          for: 15m
          labels:
            severity: warning
            team: TEAM
          annotations:
            summary: "SERVICE_NAME memory usage high"
            description: "Memory usage is {{ $value | humanizePercentage }} of limit"
            runbook_url: "RUNBOOK_BASE_URL/SERVICE_NAME-high-memory"
