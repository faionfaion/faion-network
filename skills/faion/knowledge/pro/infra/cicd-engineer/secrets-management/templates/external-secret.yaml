# external-secret.yaml
# ESO ExternalSecret: syncs secrets from Vault or AWS Secrets Manager to a K8s Secret.
# Replace: NAMESPACE, APP_NAME, SECRET_STORE_NAME, ENVIRONMENT, remote key paths.

---
# Option A: Vault-backed SecretStore (namespace-scoped, preferred)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: NAMESPACE
spec:
  provider:
    vault:
      server: https://vault.example.com:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: APP_NAME
          serviceAccountRef:
            name: APP_NAME

---
# Option B: AWS Secrets Manager SecretStore (IRSA for EKS)
# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: aws-secrets-manager
#   namespace: NAMESPACE
# spec:
#   provider:
#     aws:
#       service: SecretsManager
#       region: us-east-1
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: APP_NAME

---
# ExternalSecret: refreshes every hour, creates a K8s Secret owned by ESO
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: APP_NAME-secrets
  namespace: NAMESPACE
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend   # or aws-secrets-manager
    kind: SecretStore

  target:
    name: APP_NAME-secrets
    creationPolicy: Owner      # ESO owns the Secret lifecycle
    deletionPolicy: Retain     # Keep Secret if ExternalSecret is deleted

  data:
    # Map remote secret fields to local K8s Secret keys
    - secretKey: DB_PASSWORD
      remoteRef:
        key: ENVIRONMENT/APP_NAME/database
        property: password

    - secretKey: DB_USERNAME
      remoteRef:
        key: ENVIRONMENT/APP_NAME/database
        property: username

    - secretKey: API_KEY
      remoteRef:
        key: ENVIRONMENT/APP_NAME/api-keys
        property: stripe_key

  # Optional: fetch entire secret as JSON and template individual keys
  # dataFrom:
  #   - extract:
  #       key: ENVIRONMENT/APP_NAME/all
