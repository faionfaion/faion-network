# purpose: keepalived VRRP config — active-passive VIP for HAProxy
# consumes: VIP CIDR, interface, master/backup role, virtual_router_id
# produces: ha_mode=keepalived-vrrp segment of content/02-output-contract.xml artefact
# depends-on: content/01-core-rules.xml (keepalived-vrrp)
# token-budget-impact: ~250 tokens when loaded as context

vrrp_script chk_haproxy {
    script   "/usr/bin/killall -0 haproxy"
    interval 2
    weight   -20
    fall     2
    rise     2
}

vrrp_instance VI_1 {
    state            MASTER          # change to BACKUP on the secondary node
    interface        eth0
    virtual_router_id 51             # same on master + backup; unique per VRRP group
    priority         150             # 100 on backup
    advert_int       1
    unicast_src_ip   10.0.0.10       # this node's IP
    unicast_peer { 10.0.0.11 }       # other node's IP

    authentication {
        auth_type    PASS
        auth_pass    "REPLACE_ME"    # must match on master + backup
    }

    virtual_ipaddress {
        10.0.0.100/24                # VIP — clients point here
    }

    track_script {
        chk_haproxy
    }

    notify_master  "/etc/keepalived/notify.sh MASTER"
    notify_backup  "/etc/keepalived/notify.sh BACKUP"
    notify_fault   "/etc/keepalived/notify.sh FAULT"
}
