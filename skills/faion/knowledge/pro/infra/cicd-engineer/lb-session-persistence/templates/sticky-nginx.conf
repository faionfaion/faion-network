# purpose: Nginx Plus / OSS sticky-session upstream snippet
# consumes: see content/02-output-contract.xml inputs (method, sticky_ttl_seconds)
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml (cookie-over-iphash, no-iphash-asg-nat, sticky-time-bounded)
# token-budget-impact: ~200 tokens when loaded as context

upstream app_backend {
    zone app_backend 64k;

    # Nginx Plus (commercial): real sticky-cookie support
    # sticky cookie SRVID expires=1h path=/;

    # OSS Nginx workaround: hash on Set-Cookie or app-managed cookie
    # hash $cookie_session_id consistent;

    server 10.0.1.1:8080;
    server 10.0.1.2:8080;
    server 10.0.1.3:8080;

    keepalive 32;
}

# NEVER `ip_hash;` with autoscaling or NAT — see lb-session-persistence rule no-iphash-asg-nat.
