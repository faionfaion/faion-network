# purpose: GitHub Actions workflow: ZAP baseline scan against staging post-deploy + nightly
# consumes: inputs declared in AGENTS.md `## Prerequisites`
# produces: artefact conforming to content/02-output-contract.xml (config)
# depends-on: content/01-core-rules.xml + content/02-output-contract.xml
# token-budget-impact: ~350 tokens when loaded

name: zap-baseline
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # nightly 02:00 UTC
  workflow_run:
    workflows: ["deploy-staging"]
    types: [completed]

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  zap:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Baseline
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: https://staging.example.com
          rules_file_name: .zap/rules.tsv
          cmd_options: "-a"
          fail_action: false
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: report_json.json }
