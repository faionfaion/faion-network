# purpose: pgBackRest stanza config with retention + encryption + WAL archiving
# consumes: PG cluster path + S3 repo URI + repo passphrase (from secrets manager)
# produces: stanza ready for `pgbackrest --stanza=main backup` + WAL archive_command
# depends-on: content/01-core-rules.xml (wal-archive-monitoring, custom-format-required)
# token-budget-impact: ~150 tokens when loaded as context

[global]
repo1-type=s3
repo1-s3-bucket=backups-prod
repo1-s3-endpoint=s3.amazonaws.com
repo1-s3-region=eu-central-1
repo1-path=/pgbackrest
repo1-retention-full=7
repo1-retention-diff=14
repo1-cipher-type=aes-256-cbc
# repo1-cipher-pass loaded from secrets manager at runtime; never inline
process-max=4
log-level-console=info
log-level-file=detail
start-fast=y

[main]
pg1-path=/var/lib/postgresql/16/main
pg1-port=5432
pg1-user=postgres
