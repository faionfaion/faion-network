# purpose: skill frontmatter scaffold demonstrating progressive-disclosure layout
# consumes: skill name + description + activation triggers
# produces: SKILL.md/AGENTS.md frontmatter block under 150 tokens
# depends-on: r1-frontmatter-bounded
# token-budget-impact: ~120 tokens
---
# Progressive-disclosure skill frontmatter — minimal working shape.
#
# Required:
#   name           — short, hyphenated, unique on the surface
#   description    — first sentence "Use when ..." + concrete trigger nouns/verbs
#
# Recommended for faion-network:
#   tier           — free | solo | pro | geek
#   user-invocable — true if /<name> is allowed; false otherwise
#
# Length cap: stay under 30 non-blank lines. Procedure goes into SKILL.md body,
# detailed runbooks go into references/, code goes into scripts/.

name: faion-deploy
description: |
  Use when user asks to deploy a faion-net project — faion.net, dev.faion.net,
  api.faion.net (api-dev), neromedia, pashtelka, longlife, ender, mediamanager,
  storybook, roadmap. Handles op_unlock, deploy-gh.sh selection, post-deploy
  verification, and Telegram notification. Trigger phrases: "deploy",
  "ship", "publish to server", "rollout", "rsync to faion-net".
tier: solo
user-invocable: true
---
