# purpose: agent RBAC manifest pinning read-only default
# consumes: cluster + cloud RBAC
# produces: agent role binding
# depends-on: scripts/validate-inc-read-only-investigation-default.py
# token-budget-impact: ~200 tokens
agent_id: sre-agent-prod-01
default_policy: deny
read_allowlist:
  - logs:search
  - dashboards:read
  - code:search
  - runbooks:read
  - pagerduty:read
  - alerts:read
write_allowlist:
  - rollback:payments-service
  - flag-toggle:checkout-feature
token_verifier: https://approvals.internal/verify
revert_after_incident: true
