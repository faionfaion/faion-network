# purpose: approval verifier config consumed by privileged-action gateways
# consumes: KMS public key + scope catalog + nonce store
# produces: verifier policy
# depends-on: scripts/validate-gov-approval-token-signed-jwt.py
# token-budget-impact: ~200 tokens
issuer_key_id: kms://arn:aws:kms:eu-west-1:123:key/abc
audience: prod-cluster-us-east-1
scope_pattern: "^[a-z]+:[a-z0-9-]+$"
exp_seconds_max: 900
nonce_store: redis://nonce.svc:6379/0
hsm_rooted: true
crl_url: https://approvals.internal/crl
