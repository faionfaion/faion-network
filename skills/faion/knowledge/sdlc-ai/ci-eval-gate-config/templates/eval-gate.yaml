# purpose: CI eval gate config consumed by eval runner
# consumes: fixtures, metric defs, baseline
# produces: eval gate verdict
# depends-on: scripts/validate-ci-eval-gate-config.py
# token-budget-impact: ~250 tokens
fixture_corpus_sha: 0000000000000000000000000000000000000000
baseline_commit: abc1234
metrics:
  faithfulness:
    threshold: 0.88
    tolerance: 0.02
    gated: true
  safety_pii:
    threshold: 0.99
    tolerance: 0.0
    gated: true
    absolute_floor: true
  latency_p95_ms:
    threshold: 2000
    tolerance: 200
    gated: true
publish:
  artifact: ci/eval/report.json
  comment: ci/eval/summary.md
