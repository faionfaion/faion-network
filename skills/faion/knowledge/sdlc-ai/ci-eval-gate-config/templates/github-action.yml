# purpose: GitHub Actions wiring for the eval gate
# consumes: eval-gate.yaml + repo head
# produces: PR status + artifact
# depends-on: templates/eval-gate.yaml
# token-budget-impact: ~150 tokens
name: llm-eval-gate
on: [pull_request]
jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/run-eval.py --config evals/eval-gate.yaml --out report.json
      - run: python scripts/validate-ci-eval-gate-config.py --file report.json
      - uses: actions/upload-artifact@v4
        with: {name: eval-report, path: report.json}
