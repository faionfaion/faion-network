# purpose: CI gate wiring the redflag validator into PR check
# consumes: terraform plan JSON
# produces: PR status (pass/fail)
# depends-on: scripts/validate-ai-generated-iac-review-redflags.py
# token-budget-impact: ~150 tokens
name: iac-redflags
on: [pull_request]
jobs:
  redflags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init && terraform plan -out plan.out && terraform show -json plan.out > plan.json
      - run: python scripts/validate-ai-generated-iac-review-redflags.py --file report.json
