# purpose: gitleaks config extending the bundled default ruleset with org allowlist
# consumes: repo file scan
# produces: config (gitleaks.toml at repo root)
# depends-on: content/01-core-rules.xml (allowlist-explicit, ci-mirrors-precommit-allowlist)
# token-budget-impact: low — ~150 tokens when loaded as context
# Keep allowlist tight; broad regexes mask real findings.
[extend]
useDefault = true

[allowlist]
description = "Test fixtures and documentation samples"
paths = [
  '''(?i)(^|/)tests?(/|$)''',
  '''(?i)(^|/)fixtures(/|$)''',
  '''(?i)(^|/)docs(/|$)''',
  '''(?i)\.example$''',
]
regexes = [
  # Known-invalidated demo tokens used in API docs
  '''sk-(test|demo)-[A-Za-z0-9]{20,}''',
  '''AKIAIOSFODNN7EXAMPLE''',
]

[[rules]]
id = "ai-provider-tokens"
description = "OpenAI, Anthropic, Google AI keys"
regex = '''(?i)\b(sk-(ant|proj|svcacct|test)-[A-Za-z0-9_-]{20,}|AIza[0-9A-Za-z_-]{30,})\b'''
tags = ["key", "ai"]
