# purpose: GitHub Actions workflow running MegaLinter as the umbrella polyglot lint job with SARIF upload.
# consumes: .mega-linter.yml + repo source tree.
# produces: config (CI workflow yaml).
# depends-on: content/02-output-contract.xml; templates/megalinter-workflow.yml.
# token-budget-impact: low — ~200 tokens.
# .github/workflows/megalinter.yml
name: MegaLinter

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: megalinter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: MegaLinter
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: MegaLinter
        id: ml
        uses: oxsecurity/megalinter/flavors/cupcake@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: megalinter-reports/megalinter-report.sarifv1.sarif

      - name: Archive reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: megalinter-reports
          path: megalinter-reports
