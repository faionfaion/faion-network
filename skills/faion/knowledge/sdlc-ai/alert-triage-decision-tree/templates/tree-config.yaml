# purpose: declarative triage tree wiring signal -> route
# consumes: alert signal vector
# produces: route + owner + sla
# depends-on: content/06-decision-tree.xml
# token-budget-impact: ~150 tokens
tree:
  - when: "severity == p0 || blast_radius == global"
    route: page
    sla_minutes: 5
  - when: "severity == p1 && blast_radius in [cohort, single-tenant]"
    route: page
    sla_minutes: 15
  - when: "severity == p2"
    route: async-ticket
    sla_minutes: 240
  - when: "severity == p3 && signal_normalized == true"
    route: auto-suppress
    sla_minutes: 0
