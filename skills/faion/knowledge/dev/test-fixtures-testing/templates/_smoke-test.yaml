# purpose: minimum-viable model inventory for the test-fixtures methodology
# consumes: nothing — runnable as-is
# produces: deterministic factory+mother decision-record
# depends-on: model-inventory.yaml shape
# token-budget-impact: ~80 tokens

models:
  - model: User
    reuse_count: 12
    has_unique_fields: true
    has_subobjects: false
    has_many_optional_fields: false
    domain_scenarios_named: true

drivers:
  has_subobjects: false
  has_many_optional_fields: false
  domain_scenarios_named: true
  xdist_workers: 4

framework: django
conftest_path: tests/conftest.py
