# purpose: ruff config tuned for Django (DJ + B + E + F + I + UP rules).
# consumes: project repo; see the methodology AGENTS.md for input contract.
# produces: the working artifact described above; placement: Merge into pyproject.toml [tool.ruff].
# depends-on: the tooling pinned in the methodology's AGENTS.md.
# token-budget-impact: zero — local-only template; build/CI time is the only cost.
[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "DJ", "T20", "RUF", "PT"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "core", "config"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.ruff.lint.per-file-ignores]
"**/migrations/*.py" = ["E", "F", "UP"]
"**/tests/*.py" = ["S101"]
