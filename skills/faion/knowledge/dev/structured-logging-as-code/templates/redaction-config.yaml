# purpose: YAML denylist + regex rules for the redaction layer.
# consumes: see content/02-output-contract.xml inputs for structured-logging-as-code
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml + content/04-procedure.xml
# token-budget-impact: ~200-700 tokens when loaded as context

rules:
  - field: user.email
    policy: hash
    algorithm: sha256
  - field: card_number
    policy: drop
  - regex: "(?i)password|secret|token"
    policy: drop
  - regex: "\\b\\d{16}\\b"
    policy: mask
    mask_value: "****-****-****-XXXX"
