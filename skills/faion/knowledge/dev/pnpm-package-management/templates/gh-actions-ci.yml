# purpose: GHA workflow with corepack + pnpm cache + frozen-lockfile install.
# consumes: repo with package.json packageManager pin + pnpm-lock.yaml.
# produces: pass/fail on pnpm install + test.
# depends-on: actions/checkout@v4, actions/setup-node@v4.
# token-budget-impact: 0 — CI YAML.
name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
