# purpose: minimum-viable journey list for the e2e-testing methodology
# consumes: nothing — runnable as-is through the methodology
# produces: deterministic default-branch decision-record (r-greenfield)
# depends-on: journey shape
# token-budget-impact: ~80 tokens

journeys:
  - journey_name: login-then-dashboard
    steps:
      - {action: visit, url: /login}
      - {action: fill, label: Email, value: $env.TEST_USER_EMAIL}
      - {action: fill, label: Password, value: $env.TEST_USER_PASSWORD}
      - {action: click, role: button, name: Sign in}
    expected_outcome:
      route: /dashboard
      visible: navigation

drivers:
  framework_preference: greenfield
  visual_regression_needed: false
  ci_machine_budget: 4
  journey_count: 1
