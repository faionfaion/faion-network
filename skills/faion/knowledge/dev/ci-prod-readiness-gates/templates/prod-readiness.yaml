# purpose: Budget config consumed by the gates.
# consumes: see content/02-output-contract.xml inputs
# produces: artefact conforming to content/02-output-contract.xml (ci-prod-readiness-gates)
# depends-on: content/01-core-rules.xml
# token-budget-impact: small (template is loaded only when an artefact is being authored)
version: 1
perf_budget:
  bundle_kb_max: 220
  lcp_p95_ms: 2500
  inp_p95_ms: 200
a11y:
  wcag_level: AA
dep_vuln:
  block_severity: [HIGH, CRITICAL]
licenses:
  allowed: [MIT, Apache-2.0, BSD-3-Clause]
  denied: [AGPL-3.0]
slo:
  required_metrics: [http_requests_total, http_request_duration_seconds]
shadow_mode_days: 14
