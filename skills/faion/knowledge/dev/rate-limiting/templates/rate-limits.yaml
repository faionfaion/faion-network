# purpose: Rate-limit policy YAML with per-class limits and bypass.
# consumes: see content/02-output-contract.xml inputs for rate-limiting
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml + content/04-procedure.xml
# token-budget-impact: ~200-700 tokens when loaded as context
version: 1
classes:
  - name: auth
    algorithm: token_bucket
    rps: 5
    burst: 10
  - name: read
    algorithm: sliding_window_counter
    rps: 100
    burst: 0
  - name: write
    algorithm: sliding_window_counter
    rps: 20
    burst: 0
key_strategy: user_id
storage:
  backend: redis
  ttl_seconds: 120
headers:
  retry_after: true
  ratelimit_remaining: true
fail_mode: open
bypass_paths:
  - /healthz
  - /metrics
