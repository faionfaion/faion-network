# purpose: OpenAPI 3.1 skeleton with version-policy stub + additionalProperties=false defaults
# consumes: Endpoint inventory
# produces: openapi.yaml starting point
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~250 tokens when loaded
openapi: "3.1.0"
info:
  title: Payment API
  version: "1.0.0"

paths:
  /payments:
    post:
      operationId: createPayment
      summary: Create a new payment
      description: Initiates a payment for the given customer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        "201":
          description: Payment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        "400":
          $ref: '#/components/responses/ValidationError'
        "422":
          $ref: '#/components/responses/BusinessError'

components:
  schemas:
    CreatePaymentRequest:
      type: object
      required: [amount, currency, customer_id]
      properties:
        amount:
          type: integer
          minimum: 1
          description: Amount in cents
        currency:
          type: string
          enum: [USD, EUR, GBP]
        customer_id:
          type: string
          format: uuid

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: integer
        currency:
          type: string
        status:
          type: string
          enum: [pending, completed, failed]

    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        traceId:
          type: string

  responses:
    ValidationError:
      description: Request body validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    BusinessError:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
