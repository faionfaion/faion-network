# purpose: Spectral ruleset enforcing the rules in 01-core-rules.xml
# consumes: openapi.yaml
# produces: Lint verdict
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~250 tokens when loaded
extends: ["spectral:oas"]
rules:
  operation-operationId: error
  operation-description: warn
  operation-tag-defined: error
  no-$ref-siblings: error
  oas3-server-trailing-slash: warn
  contact-properties: warn
  info-contact: warn
