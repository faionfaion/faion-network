# purpose: Bandit config: skip rules with project rationale + severity gate.
# consumes: see content/02-output-contract.xml inputs for security-testing
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml + content/04-procedure.xml
# token-budget-impact: ~200-700 tokens when loaded as context
skips: []

exclude_dirs:
  - tests
  - venv
  - .venv
  - migrations

# Core rules — do not blanket-skip without justification comment
tests:
  - B101  # assert_used
  - B102  # exec_used
  - B105  # hardcoded_password_string
  - B106  # hardcoded_password_funcarg
  - B107  # hardcoded_password_default
  - B110  # try_except_pass
  - B201  # flask_debug_true
  - B301  # pickle
  - B303  # md5
  - B307  # eval
  - B324  # hashlib_insecure_functions
  - B501  # request_with_no_cert_validation
  - B505  # weak_cryptographic_key
  - B506  # yaml_load
  - B602  # subprocess_popen_with_shell_equals_true
  - B608  # hardcoded_sql_expressions
  - B701  # jinja2_autoescape_false
  - B703  # django_mark_safe
