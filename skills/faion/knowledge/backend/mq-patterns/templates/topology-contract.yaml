# purpose: smoke skeleton for mq-patterns
# consumes: spec from AGENTS.md
# produces: artefact validated by scripts/validate-mq-patterns.py
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~200 tokens
topology: work-queue
queue_name: orders.fulfill.v1
schema_ref: schemas/orders/fulfill/v1.avsc
retry_policy:
  max_retries: 5
  backoff: exponential+jitter
dlq_target: orders.fulfill.v1.dlq
idempotency_strategy: payload-key
