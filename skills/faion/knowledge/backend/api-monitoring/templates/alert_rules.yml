# purpose: Template helper for API Monitoring (alert_rules.yml).
# consumes: see content/02-output-contract.xml inputs for api-monitoring
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml + content/04-procedure.xml
# token-budget-impact: ~200-1000 tokens when loaded as context
# Prometheus alert rules for API SLO monitoring.
# Adjust thresholds to match your SLO error budget.
# Run: promtool check rules alert_rules.yml

groups:
  - name: api_alerts
    rules:
      # 5xx error rate > 1% for 5 minutes
      - alert: HighErrorRate
        expr: >
          rate(http_requests_total{status=~"5.."}[5m])
          / rate(http_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate (>1% 5xx)"
          description: "Error rate is {{ $value | humanizePercentage }} over 5m"

      # P95 latency > 1s for 10 minutes
      - alert: SlowResponses
        expr: >
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency above 1s"
          description: "P95 = {{ $value | humanizeDuration }} for 10m"

      # Rate limit hits spiking
      - alert: HighRateLimitHits
        expr: rate(rate_limit_exceeded_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate of rate limit hits (>100/min)"
