# /etc/sysctl.d/60-security.conf
# Kernel security hardening baseline for Ubuntu 24.04 production VPS
# Apply: sudo sysctl --system

# Hide kernel symbol addresses from non-root (prevents KASLR bypass)
kernel.kptr_restrict = 1

# Restrict ptrace to direct parent/child (prevents process injection)
kernel.yama.ptrace_scope = 1

# Restrict dmesg to root (hides kernel internals from user space)
kernel.dmesg_restrict = 1

# Full ASLR (randomize stack, heap, VDSO, mmap)
kernel.randomize_va_space = 2

# Restrict SysRq to: 0x80 (reboot) + 0x40 (SAK) + 0x20 (raw kbd) + 0x10 (sync) + 0x04 (unmount) + 0x02 (remount-ro)
kernel.sysrq = 176

# SYN flood protection
net.ipv4.tcp_syncookies = 1

# Ignore ICMP redirects (routing injection prevention)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Do not send ICMP redirects (server is not a router)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Loose reverse path filtering (compatible with asymmetric routing)
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# Log packets with impossible source/destination addresses
net.ipv4.conf.all.log_martians = 1

# Disable IP source routing
net.ipv4.conf.all.accept_source_route = 0
