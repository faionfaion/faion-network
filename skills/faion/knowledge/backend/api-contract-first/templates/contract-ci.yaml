# purpose: Template helper for API Contract-First Workflow (contract-ci.yaml).
# consumes: see content/02-output-contract.xml inputs for api-contract-first
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml + content/04-procedure.xml
# token-budget-impact: ~200-1000 tokens when loaded as context
name: API Contract CI

on:
  pull_request:
    paths:
      - 'openapi.yaml'
      - 'server/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint OpenAPI spec
        run: npx @stoplight/spectral-cli lint openapi.yaml

      - name: Generate server stubs
        run: |
          npx @openapitools/openapi-generator-cli generate \
            -i openapi.yaml \
            -g python-fastapi \
            -o ./generated \
            --additional-properties=packageName=api

      - name: Diff generated models vs implementation
        run: diff -r ./generated/models ./server/models || (echo "Models out of sync with spec" && exit 1)

      - name: Install Python deps
        run: pip install -r requirements-test.txt

      - name: Run contract tests
        run: pytest tests/contract/ -v
