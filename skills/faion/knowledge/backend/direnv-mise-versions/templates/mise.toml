# mise.toml — mise-native config with tools, env vars, and task definitions
# Alternative to .tool-versions; supports tasks and more configuration.

[tools]
python = "3.12.8"
node   = "22.12.0"

[env]
PROJECT_NAME = "my-project"

[tasks.lint]
run = "ruff check ."

[tasks.test]
run = "pytest"

[tasks.fmt]
run = "ruff format ."
