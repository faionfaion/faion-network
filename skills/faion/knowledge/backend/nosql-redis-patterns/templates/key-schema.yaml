# purpose: smoke skeleton for nosql-redis-patterns
# consumes: spec from AGENTS.md
# produces: artefact validated by scripts/validate-nosql-redis-patterns.py
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~200 tokens
keys:
  - pattern: "session:{user_id}"
    type: hash
    ttl_seconds: 1800
  - pattern: "ratelimit:{ip}"
    type: zset
    ttl_seconds: 60
ttl_policy: per-key
