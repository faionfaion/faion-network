# purpose: pyproject.toml snippet for Ruff + mypy + django-stubs in a Django 5.x project.
# consumes: a Django project with config/settings/test.py.
# produces: ruff + mypy + django-stubs config blocks.
# depends-on: ruff, mypy, django-stubs, djangorestframework-stubs (optional).
# token-budget-impact: ~280 tokens.

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    "migrations",
    ".venv",
    "build",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "SIM", "DJ", "T20"]

[tool.ruff.lint.per-file-ignores]
"apps/*/management/commands/*.py" = ["T20"]  # self.stdout.write is the canonical alternative
"tests/**/*.py" = ["S101"]                   # assert is normal in tests

[tool.ruff.lint.isort]
known-first-party = ["apps", "config", "core"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
warn_unused_ignores = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
plugins = ["mypy_django_plugin.main"]

[[tool.mypy.overrides]]
module = ["apps.billing.services", "apps.billing.selectors", "apps.accounts.services"]
strict = true

[tool.django-stubs]
django_settings_module = "config.settings.test"
