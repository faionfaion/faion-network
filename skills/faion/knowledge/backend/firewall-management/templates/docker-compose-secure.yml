# docker-compose-secure.yml
# Docker Compose with all services bound to 127.0.0.1
# This prevents Docker from bypassing UFW (Docker publishes 0.0.0.0 by default)
# Access internal services via SSH tunnel: ssh -L LOCAL:127.0.0.1:REMOTE server

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER:-app}"
      POSTGRES_DB: "${POSTGRES_DB:-app}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "127.0.0.1:5672:5672"    # AMQP
      - "127.0.0.1:15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS:-guest}"
    restart: unless-stopped

volumes:
  postgres_data:
