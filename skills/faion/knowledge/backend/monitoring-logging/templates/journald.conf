# /etc/systemd/journald.conf
# journald configuration for solo-developer VPS
# After changes: sudo systemctl restart systemd-journald
# Verify: journalctl --disk-usage

[Journal]
# Persistent storage — survives reboots (required for post-incident analysis)
Storage=persistent

# Maximum total journal size on disk
SystemMaxUse=2G

# Maximum individual journal file size
SystemMaxFileSize=100M

# Maximum in-memory (volatile) journal size before flush
RuntimeMaxUse=500M

# Log retention period
MaxRetentionSec=30d

# Compress archived journal files
Compress=yes

# Rate limiting — prevent a single chatty service from flooding the journal
RateLimitIntervalSec=30s
RateLimitBurst=10000

# Do not forward to syslog (reduces double-storage if rsyslog is installed)
ForwardToSyslog=no
