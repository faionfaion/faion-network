# /etc/logrotate.d/nero-platform
# logrotate config for application log files written outside journald
#
# Test: sudo logrotate -d /etc/logrotate.d/nero-platform

/var/log/nero-*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 nero nero
    sharedscripts
    postrotate
        # Signal applications to reopen log files if needed
        systemctl --user -M nero@ reload nero-core 2>/dev/null || true
    endscript
}

/var/log/nero-backup.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0640 nero nero
}

/var/log/nero-flow.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0640 nero nero
}
