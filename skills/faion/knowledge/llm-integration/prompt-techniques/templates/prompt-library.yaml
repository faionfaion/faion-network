# purpose: Versioned PromptLibrary entry schema — pin prompts as YAML committed to repo.
# consumes: human-authored prompt + A/B record id + golden set score.
# produces: one library entry that PromptLibrary.load() returns.
# depends-on: pyyaml + the PromptLibrary loader in prompt-chain.py.
# token-budget-impact: zero at runtime; library is read once at process start.

entries:
  - slug: summary-3-bullet
    version: v2
    model: gpt-4o-mini
    prompt: |
      You are a precise summariser.

      <document>
      {document}
      </document>

      Output:
      - Exactly 3 bullet points
      - Each bullet <= 15 words
      - Factual tone, no opinion
    eval_score: 0.92
    golden_set_id: summary-bench-2026q2
    created_at: "2026-05-22T12:00:00Z"
    owner: ml-eng:alice
    ab_record_id: ab_2026_05_21_summary_v1_v2

  - slug: sentiment-classifier
    version: v1
    model: gpt-4o-mini
    prompt: |
      You classify sentiment. Respond with ONLY one word from {positive, negative, neutral}.

      <text>{text}</text>
    eval_score: 0.95
    golden_set_id: sentiment-3way-2026
    created_at: "2026-04-10T09:00:00Z"
    owner: ml-eng:bob
