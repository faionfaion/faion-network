# Content Audit Scoring Rubric — version 1
# Lock this file in version control. Pin model + temperature to match.
# Any rubric change → new version tag + full re-score of affected URLs.

version: "1"
dimensions:
  accuracy:
    description: "Is the content factually correct and up-to-date?"
    scores:
      5: "Completely accurate, verified recently"
      4: "Accurate, minor updates needed"
      3: "Some outdated information present"
      2: "Significant inaccuracies"
      1: "Largely incorrect or obsolete"

  relevance:
    description: "Do users need this content? Is there demand?"
    scores:
      5: "Core to user needs, high search/in-product demand"
      4: "Useful to many users"
      3: "Useful to some users, niche"
      2: "Limited audience, low demand"
      1: "No longer relevant to users or product"

  quality:
    description: "Is the writing clear, complete, and readable?"
    scores:
      5: "Excellent writing, clear, complete, well-structured"
      4: "Good quality, minor issues"
      3: "Acceptable, could improve"
      2: "Poor writing or significantly incomplete"
      1: "Very poor quality, confusing, or near-empty"

action_matrix:
  ">=4.0": "keep"
  ">=3.0": "update"
  ">=2.0": "consolidate"
  "<2.0": "remove"

guards:
  - "If has_images=true AND word_count < 200: route to human_review (visual content)"
  - "If age_days < 90: exclude from traffic-based scoring; use quality+accuracy only"
  - "If content_type=legal: always route to human_review"
