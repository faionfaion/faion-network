# purpose: Dark-launch ramp schedule template
# consumes: input artefacts described in AGENTS.md ## Prerequisites
# produces: artefact conforming to content/02-output-contract.xml for trunk-based-dev-patterns
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~200-1200 tokens when loaded as context

flag: billing.use_stripe_v2
ramp:
  - pct: 0.5
    hold_for: 24h
    metric: match_rate
    pass_threshold: 99.95
  - pct: 5
    hold_for: 2h
  - pct: 25
    hold_for: 1h
  - pct: 100
rollback_threshold:
  match_rate_lt: 99.5
  error_rate_gt: 0.5
