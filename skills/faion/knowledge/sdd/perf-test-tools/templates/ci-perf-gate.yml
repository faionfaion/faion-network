name: perf-gate
on:
  pull_request:
jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - run: k6 run --quiet ./perf/k6-load.js
        env:
          BASE_URL: https://staging.example.com
