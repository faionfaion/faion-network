# .github/workflows/docs-ci.yml
# Complete documentation CI: lint, link check, API spec validation, build, deploy.
name: docs-ci

on:
  push:
    branches: [main]
    paths: ['docs/**', 'openapi.yaml', 'mkdocs.yml', '.vale.ini']
  pull_request:
    paths: ['docs/**', 'openapi.yaml', 'mkdocs.yml', '.vale.ini']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: 'docs/**/*.md'
      - name: Lint prose (Vale)
        uses: errata-ai/vale-action@v2
        with:
          files: docs/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint OpenAPI (Spectral)
        uses: stoplightio/spectral-action@v0.8
        with:
          file_glob: 'openapi.yaml'

  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'

  build:
    runs-on: ubuntu-latest
    needs: [lint, validate-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs-material
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
