# mkdocs.yml — MkDocs Material theme configuration
# Replace placeholders in {BRACES}.
site_name: {Project} Documentation
site_url: https://docs.{domain}.com
repo_name: {org}/{project}
repo_url: https://github.com/{org}/{project}
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
  - Reference:
    - reference/index.md
  - Decisions: decisions/
