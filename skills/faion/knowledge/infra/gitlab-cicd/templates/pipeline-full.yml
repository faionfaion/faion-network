# Complete GitLab CI/CD production pipeline (Node.js + Docker + K8s)
variables:
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  NODE_VERSION: "22"

default:
  image: node:${NODE_VERSION}-alpine
  tags: [docker]
  retry:
    max: 2
    when: [runner_system_failure, stuck_or_timeout_failure]
  interruptible: true

stages: [build, test, security, package, deploy, cleanup]

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_TAG

cache:
  key:
    files: [package-lock.json]
  paths: [node_modules/, .npm/]
  policy: pull-push

# --- BUILD ---
build:
  stage: build
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths: [dist/]
    expire_in: 1 day

docker-build:
  stage: build
  image: docker:26
  services: [docker:26-dind]
  variables:
    DOCKER_BUILDKIT: "1"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --cache-from $IMAGE_LATEST --build-arg BUILDKIT_INLINE_CACHE=1
        --tag $IMAGE_TAG --tag $IMAGE_LATEST .
    - docker push $IMAGE_TAG && docker push $IMAGE_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# --- TEST ---
unit-test:
  stage: test
  needs: [build]
  script: [npm run test:unit -- --coverage]
  artifacts:
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

lint:
  stage: test
  needs: [build]
  script: [npm run lint, npm run format:check]

# --- SECURITY ---
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# --- DEPLOY ---
deploy-staging:
  stage: deploy
  image: bitnami/kubectl:1.29
  needs: [docker-build, unit-test, lint]
  variables:
    KUBE_URL: $STAGING_KUBE_URL
    KUBE_TOKEN: $STAGING_KUBE_TOKEN
    KUBE_NAMESPACE: staging
  before_script:
    - kubectl config set-cluster k8s --server="$KUBE_URL" --certificate-authority="$KUBE_CA_PEM_FILE"
    - kubectl config set-credentials gitlab --token="$KUBE_TOKEN"
    - kubectl config set-context default --cluster=k8s --user=gitlab --namespace=$KUBE_NAMESPACE
    - kubectl config use-context default
  environment:
    name: staging
    url: https://staging.example.com
    on_stop: stop-staging
  script:
    - kubectl set image deployment/app app=$IMAGE_TAG -n $KUBE_NAMESPACE
    - kubectl rollout status deployment/app -n $KUBE_NAMESPACE --timeout=5m
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stop-staging:
  stage: deploy
  image: bitnami/kubectl:1.29
  variables:
    GIT_STRATEGY: none
    KUBE_NAMESPACE: staging
  environment:
    name: staging
    action: stop
  script: [kubectl scale deployment/app --replicas=0 -n $KUBE_NAMESPACE]
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-production:
  stage: deploy
  image: bitnami/kubectl:1.29
  needs: [deploy-staging]
  variables:
    KUBE_NAMESPACE: production
  environment:
    name: production
    url: https://example.com
  script:
    - kubectl set image deployment/app app=$IMAGE_TAG -n $KUBE_NAMESPACE
    - kubectl rollout status deployment/app -n $KUBE_NAMESPACE --timeout=10m
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_COMMIT_TAG
