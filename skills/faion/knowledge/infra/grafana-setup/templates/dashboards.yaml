# provisioning/dashboards/dashboards.yaml
# Dashboard provider config: filesystem-based with folder organization.
# foldersFromFilesStructure derives Grafana folder names from subdirectory names.

apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/default
      foldersFromFilesStructure: true

  - name: infrastructure
    orgId: 1
    folder: Infrastructure
    folderUid: infrastructure
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/infrastructure

  - name: applications
    orgId: 1
    folder: Applications
    folderUid: applications
    type: file
    disableDeletion: true
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/applications

  - name: slo
    orgId: 1
    folder: SLO Dashboards
    folderUid: slo
    type: file
    disableDeletion: true
    options:
      path: /var/lib/grafana/dashboards/slo
