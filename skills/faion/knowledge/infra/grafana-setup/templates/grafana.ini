# grafana.ini - Production configuration template
# Credentials injected via environment variables (GF_* overrides)

[server]
protocol = http
http_port = 3000
domain = grafana.example.com
root_url = %(protocol)s://%(domain)s/

[database]
type = postgres
host = ${DB_HOST}:${DB_PORT}
name = ${DB_NAME}
user = ${DB_USER}
password = ${DB_PASSWORD}
ssl_mode = require

[security]
admin_user = admin
admin_password = ${ADMIN_PASSWORD}
cookie_secure = true
strict_transport_security = true
x_content_type_options = true

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = false

[auth.generic_oauth]
enabled = false
# Set enabled=true and configure OIDC for SSO

[unified_alerting]
enabled = true
ha_listen_address = ${POD_IP:0.0.0.0}:9094
ha_peers = ${HA_PEERS}
ha_peer_timeout = 15s

[alerting]
enabled = false

[log]
mode = console
level = info

[log.console]
format = json

[metrics]
enabled = true
basic_auth_username = metrics
basic_auth_password = ${METRICS_PASSWORD}
