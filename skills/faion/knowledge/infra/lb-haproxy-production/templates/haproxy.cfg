# purpose: Production HAProxy config: TLS + rate-limit stick-table + ACL routing + tuned threads + maxconn + health checks
# consumes: see content/02-output-contract.xml inputs (tls_version_min, stick_table_rate_limit, nbthread, maxconn)
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml (tls12-min-cipher-suites, stick-table-rate-limit, nbthread-cpu-map, maxconn-sized, http-check-expect)
# token-budget-impact: ~700 tokens when loaded as context

global
    log         /dev/log local0
    chroot      /var/lib/haproxy
    user        haproxy
    group       haproxy
    daemon
    nbthread    8
    cpu-map     auto:1/1-8 0-7
    maxconn     200000
    tune.ssl.default-dh-param 2048
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11 prefer-client-ciphers
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384

defaults
    log         global
    mode        http
    option      httplog
    option      dontlognull
    option      forwardfor
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    maxconn     50000

frontend https_front
    bind *:443 ssl crt /etc/haproxy/certs/site.pem alpn h2,http/1.1
    http-response set-header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    # rate limit: 100 req/10s per IP
    stick-table type ip size 100k expire 10m store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    acl is_api path_beg /api
    use_backend api_servers if is_api
    default_backend web_servers

frontend http_redirect
    bind *:80
    http-request redirect scheme https code 301

backend web_servers
    balance leastconn
    option httpchk GET /health
    http-check expect status 200
    default-server inter 10s fall 3 rise 2 weight 100

    server web1 10.0.1.1:8080 check
    server web2 10.0.1.2:8080 check

backend api_servers
    balance leastconn
    option httpchk GET /api/health
    http-check expect status 200
    default-server inter 10s fall 3 rise 2 weight 100

    server api1 10.0.2.1:8000 check
    server api2 10.0.2.2:8000 check
