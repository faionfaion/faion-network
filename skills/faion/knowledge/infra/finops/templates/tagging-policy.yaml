# Mandatory tag schema for cloud resource governance
# Apply via AWS Organizations SCP to block resource creation without these tags
tagging_policy:
  required_tags:
    - key: Environment
      allowed_values: [dev, staging, prod]
      description: Deployment environment

    - key: Owner
      allowed_values: []  # Free-form email or team name
      description: Team or individual responsible for the resource

    - key: Project
      allowed_values: []  # Free-form project identifier
      description: Project or product this resource belongs to

    - key: CostCenter
      allowed_values: []  # Free-form cost center code
      description: Billing cost center for chargeback

  enforcement:
    method: AWS Organizations SCP
    action: Deny ec2:RunInstances and rds:CreateDBInstance when required tags are null
    exemptions:
      - role: arn:aws:iam::*:role/BreakGlassRole
      - ou: sandbox
