version: 3
automerge: false
parallel_plan: true
parallel_apply: false

projects:
  - name: prod-networking
    dir: environments/prod/networking
    workspace: default
    autoplan:
      enabled: true
      when_modified: ["*.tf", "../../../modules/networking/**/*.tf"]
    apply_requirements: [approved, mergeable]
    delete_source_branch_on_merge: false

  - name: prod-compute
    dir: environments/prod/compute
    workspace: default
    autoplan:
      enabled: true
      when_modified: ["*.tf", "../../../modules/compute/**/*.tf"]
    apply_requirements: [approved, mergeable]

  - name: dev-networking
    dir: environments/dev/networking
    workspace: default
    autoplan:
      enabled: true
      when_modified: ["*.tf"]
    apply_requirements: [mergeable]
