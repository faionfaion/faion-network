# purpose: Production nginx LB config — worker tuning + upstream + TLS + rate limit + security headers
# consumes: see content/02-output-contract.xml inputs (worker_processes, upstream_keepalive, tls_min, limit_req_zone, security_headers)
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml (worker-auto, upstream-zone, keepalive-upstream, tls-1-2-min, limit-req-zone, security-headers)
# token-budget-impact: ~700 tokens when loaded as context

user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept       on;
    use                epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # rate-limit zones (shared across workers)
    limit_req_zone  $binary_remote_addr zone=req_per_ip:10m  rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # TLS defaults
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache       shared:SSL:10m;
    ssl_session_timeout     10m;
    ssl_stapling            on;
    ssl_stapling_verify     on;

    log_format main_ext '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';
    access_log  /var/log/nginx/access.log  main_ext;
    error_log   /var/log/nginx/error.log warn;

    upstream app_backend {
        zone app_backend 64k;
        least_conn;
        server 10.0.1.1:8080 max_fails=3 fail_timeout=30s;
        server 10.0.1.2:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name app.example.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name app.example.com;

        ssl_certificate     /etc/nginx/certs/app.example.com.crt;
        ssl_certificate_key /etc/nginx/certs/app.example.com.key;

        # security headers (apply on errors too)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        limit_req  zone=req_per_ip  burst=20 nodelay;
        limit_conn conn_per_ip 30;

        location / {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_next_upstream   error timeout http_502 http_503 http_504;
        }
    }
}
