# develop.watch block for docker compose watch (Compose v2.22+)
# Attach under the service that needs live reload.
services:
  app:
    develop:
      watch:
        # Sync source without restart
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
            - __pycache__/
            - "*.pyc"
        # Rebuild image on dependency changes
        - action: rebuild
          path: package.json
        - action: rebuild
          path: requirements.txt
        # Sync config and restart container
        - action: sync+restart
          path: ./config
          target: /app/config
