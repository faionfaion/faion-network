# Generic service block with healthcheck, resource limits, and log rotation
# Copy and adapt per service; replace ALL_CAPS placeholders.
services:
  SERVICE_NAME:
    image: ${IMAGE_NAME}:${VERSION:-latest}
    container_name: ${PROJECT_NAME}-SERVICE_NAME
    restart: unless-stopped
    env_file: [.env]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${CONTAINER_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks: [default]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
