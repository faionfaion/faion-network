# GitLab managed security scanning templates.
# Include this file (or individual templates) in your .gitlab-ci.yml.
# Templates receive automatic updates from GitLab — do NOT install scanners manually.

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# Optional: override SAST variables
variables:
  SAST_EXCLUDED_PATHS: "spec, test, tests, tmp"
  SCAN_KUBERNETES_MANIFESTS: "true"

# Optional: fail MR pipeline on new CRITICAL/HIGH vulnerabilities
# Requires GitLab Ultimate with Security Approvals policy configured.
# sast:
#   variables:
#     SAST_EXIT_CODE_SEVERITY_THRESHOLD: HIGH
