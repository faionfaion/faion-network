# Node.js CI/CD pipeline with DAG, caching, coverage, and staged deployment.
# Customize: IMAGE_TAG, NPM_TOKEN (if private registry), deploy scripts.

default:
  image: node:20-alpine

cache:
  key:
    files: [package-lock.json]
  paths:
    - node_modules/
    - .npm/

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_TAG

stages: [install, test, build, deploy]

install:
  stage: install
  script: npm ci --cache .npm --prefer-offline
  cache:
    key:
      files: [package-lock.json]
    paths:
      - node_modules/
      - .npm/
    policy: pull-push
  artifacts:
    paths: [node_modules/]
    expire_in: 1 hour

lint:
  stage: test
  needs: [install]
  cache:
    policy: pull
  script: npm run lint
  interruptible: true

test:
  stage: test
  needs: [install]
  cache:
    policy: pull
  script: npm test -- --coverage
  interruptible: true
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths: [coverage/]
    expire_in: 1 week
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'

build:
  stage: build
  needs: [test, lint]
  cache:
    policy: pull
  script: npm run build
  artifacts:
    paths: [dist/]
    expire_in: 1 week

deploy-staging:
  stage: deploy
  needs: [build]
  script:
    - echo "Deploying to staging..."
    - ./scripts/deploy.sh staging
  environment:
    name: staging
    url: https://staging.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-production:
  stage: deploy
  needs: [deploy-staging]
  script:
    - echo "Deploying to production..."
    - ./scripts/deploy.sh production
  environment:
    name: production
    url: https://example.com
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
