# DORA metrics collection configuration
dora:
  services:
    - name: api
      repo: myorg/myapp-api
      deployment_source: github_actions
      incident_source: pagerduty
      slo:
        availability: 99.9
        error_rate: 1.0
        latency_p99_ms: 500

    - name: web
      repo: myorg/myapp-web
      deployment_source: github_actions
      incident_source: pagerduty
      slo:
        availability: 99.5
        latency_p99_ms: 1000

  data_sources:
    github:
      token_secret: GITHUB_TOKEN
    pagerduty:
      token_secret: PAGERDUTY_TOKEN
    prometheus:
      url: http://prometheus:9090

  targets:
    deployment_frequency: weekly    # elite=multiple_daily, high=weekly, medium=monthly
    lead_time_hours: 24             # elite=1, high=168 (1 week)
    change_failure_rate: 15         # elite=15%, high=30%
    mttr_minutes: 60                # elite=60, high=1440 (1 day)

  reporting:
    cadence: weekly
    channel: "#engineering-metrics"
    baseline_days: 30
