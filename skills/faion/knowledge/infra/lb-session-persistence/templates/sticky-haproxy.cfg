# purpose: HAProxy cookie-based sticky-session backend snippet
# consumes: see content/02-output-contract.xml inputs (method, sticky_ttl_seconds, invalidate_on_removal)
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml (cookie-over-iphash, sticky-time-bounded)
# token-budget-impact: ~200 tokens when loaded as context

backend app_servers
    balance leastconn
    option httpchk GET /health
    http-check expect status 200

    # LB-inserted sticky cookie with bounded lifetime + invalidate on backend removal
    cookie SRVID insert indirect nocache maxidle 1h maxlife 24h

    server srv1 10.0.1.1:8080 cookie srv1 check
    server srv2 10.0.1.2:8080 cookie srv2 check
    server srv3 10.0.1.3:8080 cookie srv3 check
