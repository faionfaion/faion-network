# compose.yaml — Production Stack Template
# No version: field (obsolete in Compose v2)

services:
  app:
    image: ghcr.io/org/myapp:1.0.0
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgres://db:5432/app
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks: [frontend, backend]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
          pids: 100
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    user: "1000:1000"
    read_only: true
    tmpfs: [/tmp:size=100M, /var/run:size=10M]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5
    networks: [backend, db-network]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  db-network:
    driver: bridge
    internal: true

volumes:
  postgres-data:
    driver: local
