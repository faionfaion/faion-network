# compose.ci.yaml — CI override for integration tests
# Usage: docker compose -f compose.yaml -f compose.ci.yaml up -d --wait

services:
  app:
    # No ports: mapping — use expose: only to avoid host port conflicts between concurrent CI jobs
    expose: ["8000"]
    # Secrets from CI environment variables, not .env file
    environment:
      - DATABASE_URL=postgres://db:5432/app
      - REDIS_URL=redis://redis:6379/0
      # Secrets injected from GitHub Secrets / GitLab CI Variables:
      # - SECRET_KEY=${SECRET_KEY}
    # No resource limits in CI — runner manages this

  db:
    expose: ["5432"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      # Generous start_period for slow CI runners
      start_period: 120s
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    expose: ["6379"]
