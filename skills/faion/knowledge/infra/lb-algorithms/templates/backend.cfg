# purpose: HAProxy backend block skeleton with balance algorithm + per-server weight
# consumes: see content/02-output-contract.xml inputs (algorithm, weights)
# produces: ingestable HAProxy backend block matching algorithm-decision.json
# depends-on: content/01-core-rules.xml (leastconn-default-variable-cost, weighted-by-capacity)
# token-budget-impact: ~200 tokens when loaded as context

backend app_servers
    # balance roundrobin               # uniform workloads only
    balance leastconn                  # default for variable-cost
    # balance source                   # NEVER with autoscaling or NAT

    option httpchk GET /health
    http-check expect status 200
    default-server inter 10s fall 3 rise 2

    # weights proportional to per-server capacity
    server large1 10.0.1.1:8080 check weight 100
    server large2 10.0.1.2:8080 check weight 100
    server small1 10.0.1.3:8080 check weight 50

    # cookie-based stickiness (replace ip-hash on autoscaling/NAT)
    cookie SRVID insert indirect nocache
