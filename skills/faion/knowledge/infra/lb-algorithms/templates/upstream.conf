# purpose: Nginx upstream block skeleton with algorithm + per-server weight
# consumes: see content/02-output-contract.xml inputs (algorithm, weights)
# produces: ingestable Nginx upstream config matching algorithm-decision.json
# depends-on: content/01-core-rules.xml (leastconn-default-variable-cost, weighted-by-capacity)
# token-budget-impact: ~200 tokens when loaded as context

upstream app_backend {
    # Algorithm directive: omit for round-robin; least_conn for least-connections.
    # least_conn;
    # ip_hash;     # only on stable, NAT-free fleet — see lb-session-persistence
    # hash $cookie_SRVID consistent;  # cookie-based persistence (Nginx Plus)

    server 10.0.1.1:8080 weight=100 max_fails=3 fail_timeout=30s;
    server 10.0.1.2:8080 weight=100 max_fails=3 fail_timeout=30s;
    server 10.0.1.3:8080 weight=50  max_fails=3 fail_timeout=30s;

    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name app.example.com;

    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
