# purpose: Pipeline: Beats input → grok + JSON + PII mask → Elasticsearch output
# consumes: inputs declared in AGENTS.md `## Prerequisites`
# produces: artefact conforming to content/02-output-contract.xml (config)
# depends-on: content/01-core-rules.xml + content/02-output-contract.xml
# token-budget-impact: ~350 tokens when loaded

input {
  beats {
    port => 5044
    ssl => true
    ssl_certificate => "/etc/logstash/certs/logstash.crt"
    ssl_key         => "/etc/logstash/certs/logstash.key"
  }
}

filter {
  if [log_type] == "nginx-access" {
    grok {
      match => { "message" => "%{COMBINEDAPACHELOG}" }
      tag_on_failure => ["_grokparsefailure"]
    }
    date { match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"] }
    geoip { source => "clientip" }
  }

  if [log_type] == "app-json" {
    json {
      source => "message"
      tag_on_failure => ["_jsonparsefailure"]
    }
  }

  # PII masking — credit card numbers + bearer tokens
  mutate {
    gsub => [
      "message", "\b(?:\d[ -]*?){13,16}\b", "[REDACTED-CC]",
      "message", "Bearer\s+[A-Za-z0-9._\-]+", "Bearer [REDACTED-TOKEN]"
    ]
  }
}

output {
  if "_grokparsefailure" in [tags] or "_jsonparsefailure" in [tags] {
    # DLQ
    file { path => "/var/log/logstash/dlq/%{+yyyy-MM-dd}.log" }
  } else {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      ssl => true
      cacert => "/etc/logstash/certs/ca.crt"
      user => "${ES_USER}"
      password => "${ES_PASS}"
      index => "logs-write"
      action => "create"
    }
  }
}
