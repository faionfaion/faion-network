# purpose: Multi-pipeline config: heavy / routing / pii
# consumes: inputs declared in AGENTS.md `## Prerequisites`
# produces: artefact conforming to content/02-output-contract.xml (config)
# depends-on: content/01-core-rules.xml + content/02-output-contract.xml
# token-budget-impact: ~350 tokens when loaded

- pipeline.id: heavy
  path.config: "/etc/logstash/conf.d/heavy.conf"
  pipeline.workers: 4
  pipeline.batch.size: 250
  dead_letter_queue.enable: true

- pipeline.id: routing
  path.config: "/etc/logstash/conf.d/routing.conf"
  pipeline.workers: 2
  pipeline.batch.size: 500
  dead_letter_queue.enable: true
