# purpose: Custom Semgrep rule: hardcoded passwords + API keys
# consumes: inputs declared in AGENTS.md `## Prerequisites`
# produces: artefact conforming to content/02-output-contract.xml (config)
# depends-on: content/01-core-rules.xml + content/02-output-contract.xml
# token-budget-impact: ~350 tokens when loaded

rules:
  - id: hardcoded-password
    patterns:
      - pattern-either:
          - pattern: password = "..."
          - pattern: PASSWORD = "..."
          - pattern: passwd = "..."
    message: "Hardcoded password — move to a secret manager."
    languages: [python, javascript, typescript]
    severity: ERROR
  - id: hardcoded-api-key
    pattern-regex: '(?i)(api[_-]?key|apikey)\s*[=:]\s*["\'][a-zA-Z0-9]{20,}["\']'
    message: "Possible hardcoded API key — move to a secret manager."
    languages: [generic]
    severity: WARNING
