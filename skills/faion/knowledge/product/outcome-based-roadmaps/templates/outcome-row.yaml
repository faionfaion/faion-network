# Single outcome row schema — all fields required
# Drop any row that cannot fill in problem, outcome_metric, baseline, target, horizon
# candidate_solutions requires minimum 2 items

id: "unique-row-id"  # used for traceability across audience views
problem: "one sentence describing the user or business problem being addressed"
outcome_metric: "the specific KPI being moved (e.g. support_tickets_per_mau)"
baseline: 0.18  # current measured value — never invented; use "TBI: owner=X" if not yet instrumented
target: 0.12    # goal value for this horizon
horizon: "Q2 2026"  # quarter or month — never unbounded
candidate_solutions:
  - "option 1: brief description"  # minimum 2 required
  - "option 2: brief description"
  # - "option 3: optional third candidate"
kill_criterion: "drop this outcome if [leading_indicator] does not move by week 6"
confidence: medium  # high | medium | low — updated weekly
owner: "team or person"
