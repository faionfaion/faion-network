# Jira custom field definitions
# All fields use Global context to avoid per-project proliferation
custom_fields:
  - name: "Story Points"
    type: number
    context: global
    screen: ["Create Issue", "Edit Issue"]

  - name: "Acceptance Criteria"
    type: text_area
    context: global
    screen: ["Create Issue", "Edit Issue"]

  - name: "Code Reviewer"
    type: user_picker
    context: global
    screen: ["Edit Issue"]

  - name: "Sprint Goal"
    type: text_field
    context: global
    screen: ["Edit Issue"]

  - name: "Environment"
    type: select
    context: global
    options: ["Dev", "Staging", "Production"]
    screen: ["Edit Issue"]

  - name: "Automation Label"
    type: labels
    context: global
    # Applied automatically by all automation rules for audit
    screen: []
