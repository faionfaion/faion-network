# __faion_header__:
#   purpose: Automation rule set with throttling
#   consumes: team policy
#   produces: rules applied via Automation REST
#   depends-on: content/01-core-rules.xml rule automation-throttled
#   token-budget-impact: ~250 tokens

rules:
  - name: auto-assign-bug
    scope: project
    rate_limit_per_min: 60
    trigger:
      type: issue-created
      jql: type = Bug
    action:
      type: assign
      to: lead-of(component)
  - name: stale-warn
    scope: project
    rate_limit_per_min: 30
    trigger:
      type: scheduled
      cron: "0 9 * * MON"
    action:
      type: comment
      body: "Stale > 7 days — please update or close."
