# requirements.yaml — PM tool MoSCoW requirements matrix.
# Fill in before any evaluation begins; sign off with stakeholders before POC.
# Source: pm-tool-selection methodology.

meta:
  team_size: 30
  growth_target_users: 50        # expected in 2 years
  budget_per_user_month_max: 20
  timeline: "Q1 2025 implementation"
  compliance: ["SOC2", "GDPR"]
  deployment: ["cloud", "self_hosted"]

must_have:
  - id: R1
    requirement: "Issue tracking with custom fields (story points, sprint fields)"
    priority: Must
  - id: R2
    requirement: "Kanban and list views"
    priority: Must
  - id: R3
    requirement: "Sprint/iteration planning (2-week cadence)"
    priority: Must
  - id: R4
    requirement: "GitHub or GitLab integration (PR linking, auto-close)"
    priority: Must
  - id: R5
    requirement: "REST or GraphQL API access for automation"
    priority: Must
  - id: R6
    requirement: "Mobile app (iOS and Android)"
    priority: Must
  - id: R7
    requirement: "SAML 2.0 SSO"
    priority: Must  # deal-breaker: no SAML = eliminated
  - id: R8
    requirement: "Full data export (CSV or JSON)"
    priority: Must  # deal-breaker: test on day 3 of POC

should_have:
  - id: R9
    requirement: "Time tracking"
    priority: Should
  - id: R10
    requirement: "Automation rules (auto-assign, status changes)"
    priority: Should
  - id: R11
    requirement: "Roadmap view for stakeholder visibility"
    priority: Should
  - id: R12
    requirement: "Slack integration (notifications)"
    priority: Should

nice_to_have:
  - id: R13
    requirement: "Gantt charts"
    priority: Nice
  - id: R14
    requirement: "Resource management view"
    priority: Nice
  - id: R15
    requirement: "Portfolio / cross-project view"
    priority: Nice

constraints:
  data_residency: ["US", "EU"]
  max_price_per_user_month: 20
