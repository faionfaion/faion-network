# purpose: Canonical Scrum + Kanban workflow states + transitions in YAML.
# consumes: see content/02-output-contract.xml inputs for jira-workflow-management
# produces: config
# depends-on: content/01-core-rules.xml + content/02-output-contract.xml
# token-budget-impact: ~200-1000 tokens when loaded as context

# Standard development workflow states and transitions for Jira.
# Use as input to workflow-author agent or import via Jira admin API.
# Maximum 7 statuses; every transition has a screen; no global transition to Done.

statuses:
  - name: "To Do"
    category: "To Do"
  - name: "In Progress"
    category: "In Progress"
  - name: "Code Review"
    category: "In Progress"
  - name: "QA Testing"
    category: "In Progress"
  - name: "Done"
    category: "Done"

transitions:
  - name: "Start Work"
    from: ["To Do"]
    to: "In Progress"
    screen: "Transition Screen"
    validators:
      - type: "FieldRequired"
        field: "Assignee"

  - name: "Submit for Review"
    from: ["In Progress"]
    to: "Code Review"
    screen: "Review Screen"
    validators:
      - type: "FieldRequired"
        field: "Story Points"

  - name: "Request Changes"
    from: ["Code Review"]
    to: "In Progress"
    screen: "Transition Screen"

  - name: "Approve"
    from: ["Code Review"]
    to: "QA Testing"
    screen: "Transition Screen"

  - name: "Fail QA"
    from: ["QA Testing"]
    to: "In Progress"
    screen: "QA Feedback Screen"

  - name: "Pass QA"
    from: ["QA Testing"]
    to: "Done"
    screen: "Done Screen"
    validators:
      - type: "FieldRequired"
        field: "Resolution"
