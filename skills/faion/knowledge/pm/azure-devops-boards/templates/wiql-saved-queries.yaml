# __faion_header__:
#   purpose: Day-1 WIQL saved queries every ADO Boards team should ship
#   consumes: process_template + area_tree
#   produces: WIQL query definitions
#   depends-on: content/01-core-rules.xml rule wip-limit-enforced
#   token-budget-impact: ~200 tokens when loaded
queries:
  - name: My Active Work
    wiql: |
      SELECT [System.Id], [System.Title], [System.State]
      FROM WorkItems
      WHERE [System.AssignedTo] = @Me
        AND [System.State] IN ('Active', 'Resolved')
  - name: Over-WIP Active Cards
    wiql: |
      SELECT [System.Id], [System.Title], [System.AssignedTo]
      FROM WorkItems
      WHERE [System.State] = 'Active'
        AND [System.AreaPath] UNDER 'REPLACE-area-root'
  - name: Blocked Items (Tag-based)
    wiql: |
      SELECT [System.Id], [System.Title]
      FROM WorkItems
      WHERE [System.Tags] CONTAINS 'Blocked'
        AND [System.State] != 'Closed'
  - name: Missing AB-Link in Last 30d Commits
    description: |
      Use az repos pr list --status all | jq to find PRs without AB#<id> ref.
