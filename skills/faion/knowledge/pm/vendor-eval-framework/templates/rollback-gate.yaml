# purpose: Rollback-gate schema for a SaaS vendor trial.
# consumes: chosen candidate + trial protocol.
# produces: An explicit criteria + responsible-owner block invoked at day 60.
# depends-on: ../scripts/validate-vendor-eval-framework.py.
# token-budget-impact: zero — pure schema.

version: "1.0.0"
candidate: "<vendor>"
criteria:
  - axis: "fit"
    threshold: 3        # minimum acceptable axis score on 1-5
  - axis: "pricing"
    threshold: 3
  - axis: "security"
    threshold: 4
day_60_check_date: "<ISO date>"
responsible_owner: "tech-lead:<person>"
switch_back_path:
  - "Re-enable previous vendor at <link>"
  - "Restore data from snapshot <id>"
  - "Communicate to team via #eng-ops"
