# purpose: 4-6 axis vendor scoring rubric scaffold.
# consumes: candidate vendor list + stakeholder assignments.
# produces: A multi-stakeholder scored matrix per candidate.
# depends-on: ../scripts/validate-vendor-eval-framework.py.
# token-budget-impact: ~200 tokens.

version: "1.0.0"
category: "<saas-category>"      # e.g. apm, ticketing, ci-cd, hosting
candidates:
  - "<vendor-a>"
  - "<vendor-b>"
axes:
  - id: fit
    weight: 0.25
    scored_by: "eng-lead:<person>"
  - id: integrations
    weight: 0.15
    scored_by: "ops-lead:<person>"
  - id: pricing
    weight: 0.20
    scored_by: "finance:<person>"
  - id: support
    weight: 0.10
    scored_by: "ops-lead:<person>"
  - id: security
    weight: 0.15
    scored_by: "security:<person>"
  - id: exit_cost
    weight: 0.15
    scored_by: "eng-lead:<person>"
scoring_scale: "1-5 (1 worst, 5 best)"
