# purpose: Standup bot config (consumed by chat-bot runtime)
# consumes: team-list + holiday calendar
# produces: daily standup prompts in chat
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~100 tokens per day

team: <team-slug>
channel: <slack/#stand-up>
schedule: 0 9 * * MON-FRI
questions:
  - "Yesterday I shipped (link/PR/ticket):"
  - "Today I focus on (one priority):"
  - "I am blocked by (named blocker or 'none'):"
skip_on_holiday: true
