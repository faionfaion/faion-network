# __faion_header__:
#   purpose: GitLab board configuration
#   consumes: workflow design + cadence preference
#   produces: config conforming to content/02-output-contract.xml
#   depends-on: content/01-core-rules.xml rule scoped-labels-required
#   token-budget-impact: ~350 tokens

group: REPLACE
project: REPLACE
scoped_labels:
  status:
    - status::todo
    - status::doing
    - status::review
    - status::done
  type:
    - type::bug
    - type::feature
    - type::chore
  priority:
    - priority::high
    - priority::medium
    - priority::low
milestones:
  cadence: biweekly   # weekly | biweekly | monthly
  active:
    - REPLACE-2026-Q2-S1
board_lists:
  - name: Todo
    scoped_label_value: status::todo
  - name: Doing
    scoped_label_value: status::doing
  - name: Review
    scoped_label_value: status::review
  - name: Done
    scoped_label_value: status::done
token_scope:
  scope:
    - api
    - read_repository
  expiry_days: 90
