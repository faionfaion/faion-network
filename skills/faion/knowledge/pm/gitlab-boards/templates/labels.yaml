# labels.yaml — scoped label taxonomy for GitLab Issue Boards.
# Apply via gitlabform or the glab / python-gitlab CLI.
# Mutual exclusivity is enforced per namespace (:: separator).

labels:
  workflow:
    - name: "workflow::backlog"
      color: "#808080"
      description: "Not yet scheduled"
    - name: "workflow::ready"
      color: "#0075ca"
      description: "Refined, accepted for next iteration"
    - name: "workflow::in-progress"
      color: "#e4e669"
      description: "Actively being worked"
    - name: "workflow::review"
      color: "#d93f0b"
      description: "MR open, awaiting review"
    - name: "workflow::done"
      color: "#0e8a16"
      description: "Merged and deployed"

  priority:
    - name: "priority::critical"
      color: "#b60205"
      description: "Blocks release or production; immediate action"
    - name: "priority::high"
      color: "#d93f0b"
      description: "This sprint; must not slip"
    - name: "priority::medium"
      color: "#e4e669"
      description: "Next sprint if capacity allows"
    - name: "priority::low"
      color: "#0075ca"
      description: "Backlog candidate; nice to have"

  type:
    - name: "type::feature"
      color: "#0075ca"
      description: "New capability"
    - name: "type::bug"
      color: "#b60205"
      description: "Defect in existing behaviour"
    - name: "type::tech-debt"
      color: "#e4e669"
      description: "Refactor or internal improvement"
    - name: "type::docs"
      color: "#cfd3d7"
      description: "Documentation only"

  source:
    - name: "source::service-desk"
      color: "#5319e7"
      description: "Originated from external Service Desk email"
