# purpose: Daily block schedule skeleton (Builder/Operator/Inbox order)
# consumes: operator's calendar + override list
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~150-300 tokens when loaded as context
date: 2026-05-20
blocks:
  - mode: builder
    window: 09:00-12:00
    notifications: silenced
    handoff_note: |
      Open:
      Next decision:
      Operator must remember:
  - mode: operator
    window: 13:00-15:00
    notifications: open
    handoff_note: |
      Open:
      Next decision:
      Builder must remember:
  - mode: inbox
    window: 15:00-16:00
    notifications: open
    handoff_note: |
      Open:
      Next decision:
      Tomorrow Builder agenda:
first_block_mode: builder
violations_today: 0
urgency_overrides_today: 0
