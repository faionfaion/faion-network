# __faion_header__:
#   purpose: Source-to-target field map with type coercions
#   consumes: discovery report
#   produces: reviewable mapping artefact
#   depends-on: content/01-core-rules.xml rule field-map-explicit
#   token-budget-impact: ~300 tokens

source: REPLACE-source-tool
target: REPLACE-target-tool

fields:
  - source: summary
    target: title
    coerce: string
  - source: description
    target: description
    coerce: markdown_from_adf
  - source: priority
    target: priority
    coerce: enum_map
    mapping:
      Highest: urgent
      High: high
      Medium: medium
      Low: low
      Lowest: low

unmapped:
  policy: fail-loud   # never silent-drop
