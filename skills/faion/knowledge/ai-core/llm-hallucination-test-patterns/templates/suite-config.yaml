# purpose: LLM Hallucination Test Patterns code skeleton
# consumes: Prerequisites bundle (see AGENTS.md)
# produces: artefact conforming to content/02-output-contract.xml (code)
# depends-on: content/01-core-rules.xml + content/02-output-contract.xml
# token-budget-impact: ~200-1000 tokens when loaded as context


suite_version: "1.0.0"
owner: "<email-or-handle>"
last_reviewed: "2026-05-23"
patterns:
  - fact_probes
  - grounding_required
  - refusal_correctness
  - citation_verification
  - contradiction_tests
  - off_topic_rejection


# Per-class coverage threshold; CI rejects suite with fewer cases per class.
per_class_min_n: 10

# Significance gate
significance:
  test: "two-sided-z"
  threshold: 0.05
