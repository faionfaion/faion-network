<!-- purpose: Comparison-intent HTML template skeleton with schema.org markup. -->
<!-- consumes: see content/02-output-contract.xml inputs -->
<!-- produces: artefact conforming to content/02-output-contract.xml -->
<!-- depends-on: content/01-core-rules.xml -->
<!-- token-budget-impact: ~300-1200 tokens when loaded as context -->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>{{a}} vs {{b}} — Comparison</title>
  <meta name="description" content="Side-by-side comparison of {{a}} and {{b}}.">
  <link rel="canonical" href="https://example.com/compare/{{a-slug}}-vs-{{b-slug}}">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ComparisonReview",
    "name": "{{a}} vs {{b}}"
  }
  </script>
</head>
<body>
  <h1>{{a}} vs {{b}}</h1>
  <table>...</table>
</body>
</html>
