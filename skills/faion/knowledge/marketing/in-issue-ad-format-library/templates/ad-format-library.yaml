# purpose: 4-format library skeleton with cadence caps
# consumes: founder's promo strategy + baseline
# produces: artefact conforming to content/02-output-contract.xml library section
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~150 tokens when loaded as context
library:
  top_banner:
    max_per_issue: 1
    placement: above_the_fold_tile
    typical_chars: 80-160
  soft_ps:
    max_per_4_issues: 3
    placement: footer_two_sentences
    typical_chars: 80-220
  mid_issue_case:
    max_per_2_issues: 1
    placement: tied_to_issue_topic_one_paragraph
    typical_chars: 250-500
  dedicated_send:
    max_per_6_issues: 1
    placement: full_issue_promo
    typical_chars: 600-1200
