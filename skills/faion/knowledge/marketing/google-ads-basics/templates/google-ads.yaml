# google-ads.yaml — Google Ads API credentials template
# Store this file outside version control (add to .gitignore).
# All values can also be set as environment variables.

developer_token: "DEVELOPER_TOKEN"
client_id: "CLIENT_ID.apps.googleusercontent.com"
client_secret: "CLIENT_SECRET"
refresh_token: "REFRESH_TOKEN"
login_customer_id: "MANAGER_ACCOUNT_ID"  # MCC account ID without dashes; omit if no MCC
use_proto_plus: True
