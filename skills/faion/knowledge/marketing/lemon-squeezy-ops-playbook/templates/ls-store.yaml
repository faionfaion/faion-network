# purpose: Lemon Squeezy store + variants skeleton ready to fill
# consumes: product brief + pricing decisions
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~280 tokens when loaded as context
store:
  store_id: REPLACE-store-id
  store_name: REPLACE store name
  currency: usd       # usd | eur
  refund_policy: 14_day  # no_refunds | 14_day | 30_day
  uses_mor: true

variants:
  - variant_id: v-REPLACE-solo
    name: Solo
    amount: 19
    interval: monthly    # one_time | monthly | yearly
    license_api_enabled: true
  - variant_id: v-REPLACE-pro
    name: Pro
    amount: 39
    interval: monthly
    license_api_enabled: true

dunning:
  sequence_days: [1, 4, 8]

affiliate:
  enabled: true
  commission_pct: 40

review:
  reviewed_at: 2026-05-23
  conversion_rate: 0.0
  refund_rate: 0.0
