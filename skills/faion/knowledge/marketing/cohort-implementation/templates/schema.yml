version: 2
models:
  - name: cohort_retention_weekly
    description: >
      Weekly acquisition cohort retention. Retention metric: login (event_type = 'login').
      Long-format: one row per (cohort_week, user_id, day_offset).
      Change the retention metric only after backfilling all historical cohorts.
    columns:
      - name: cohort_week
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: day_offset
        tests:
          - not_null
          - accepted_values:
              values: [1, 7, 14, 30, 60, 90]
