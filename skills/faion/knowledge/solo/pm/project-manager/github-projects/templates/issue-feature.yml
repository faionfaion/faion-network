name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
projects: ["myorg/1"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should we solve this?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: |
        What conditions must be met for this to be considered done?
        Use Given-When-Then format if possible.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
    validations:
      required: true

  - type: dropdown
    id: team
    attributes:
      label: Team
      options:
        - Frontend
        - Backend
        - DevOps
        - Design
