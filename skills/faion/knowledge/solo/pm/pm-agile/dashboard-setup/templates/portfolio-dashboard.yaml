# Portfolio dashboard widget layout configuration
portfolio_dashboard:
  title: "Engineering Portfolio"
  refresh: 15_minutes

  row_1:
    - widget: status_overview
      width: 4
      config:
        projects: all
        show: health_status

    - widget: delivery_confidence
      width: 4
      config:
        metric: on_time_percentage
        target: 90

    - widget: resource_utilization
      width: 4
      config:
        show: percentage

  row_2:
    - widget: burnup_chart
      width: 8
      config:
        scope: quarterly_roadmap
        show_scope_changes: true

    - widget: risk_summary
      width: 4
      config:
        show: top_5_risks
        sort_by: impact

  row_3:
    - widget: project_table
      width: 12
      columns:
        - name
        - status
        - progress
        - owner
        - due_date
        - risk_level
