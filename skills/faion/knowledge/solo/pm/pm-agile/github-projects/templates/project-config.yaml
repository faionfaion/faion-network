# GitHub Projects v2 — standard configuration reference
project:
  name: "Product Roadmap Q1 2024"
  visibility: private  # or public for open source

  custom_fields:
    - name: "Status"
      type: single_select
      options: ["Backlog", "Todo", "In Progress", "In Review", "Done"]

    - name: "Priority"
      type: single_select
      options: ["P0", "P1", "P2", "P3"]

    - name: "Estimate"
      type: number

    - name: "Sprint"
      type: iteration
      duration: 2_weeks
      naming: "Sprint-{N}"  # e.g. Sprint-24

    - name: "Team"
      type: single_select
      options: ["Frontend", "Backend", "DevOps"]

    - name: "Release"
      type: single_select
      options: ["v1.0", "v1.1", "v2.0"]

  views:
    - name: "All Issues"
      type: table
      sort_by: Priority
      fields: [Title, Status, Priority, Assignee, Estimate, Sprint, Repository]

    - name: "Sprint Board"
      type: board
      column_field: Status
      filter: "sprint:@current"
      card_fields: [Assignee, Priority, Estimate]

    - name: "Release Roadmap"
      type: roadmap
      date_field: iteration
      group_by: Release
      zoom_level: month
