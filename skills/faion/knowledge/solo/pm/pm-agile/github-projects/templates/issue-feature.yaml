# .github/ISSUE_TEMPLATE/feature.yml
name: Feature Request
description: Suggest a new feature
labels: ["enhancement"]
projects: ["myorg/1"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should we solve this?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true for this to be considered done?
      placeholder: "- [ ] Criterion 1\n- [ ] Criterion 2"
    validations:
      required: true
