# purpose: Gateway observability config: metrics, logs, traces.
# consumes: inputs declared in AGENTS.md Prerequisites; schema in content/02-output-contract.xml
# produces: a api-gateway-observability artefact validating against scripts/validate-api-gateway-observability.py
# depends-on: content/01-core-rules.xml, content/02-output-contract.xml
# token-budget-impact: ~400-1500 tokens once filled
artefact_id: api-gateway-observability-<client>-2026-05-23
owner: <Full Name> <email>
version: 1.0.0
last_reviewed: 2026-05-23

gateway:
  product: kong
  version: 3.6

metrics:
  prometheus:
    enabled: true
    listen: 0.0.0.0:9090
    histogram_buckets_seconds: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]

logging:
  format: json
  fields:
    - timestamp
    - correlation_id
    - consumer_id
    - method
    - path
    - status
    - upstream_latency_ms
    - gateway_latency_ms

tracing:
  otlp:
    endpoint: http://tempo:4317
    propagator: tracecontext
    sample_ratio: 0.1
