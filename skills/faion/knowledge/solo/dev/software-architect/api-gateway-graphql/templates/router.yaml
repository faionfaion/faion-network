# purpose: Apollo Router federation v2 config with limits, auth, and persisted queries.
# consumes: inputs declared in AGENTS.md Prerequisites; schema in content/02-output-contract.xml
# produces: a api-gateway-graphql artefact validating against scripts/validate-api-gateway-graphql.py
# depends-on: content/01-core-rules.xml, content/02-output-contract.xml
# token-budget-impact: ~400-1500 tokens once filled
artefact_id: api-gateway-graphql-<client>-2026-05-23
owner: <Full Name> <email>
version: 1.0.0
last_reviewed: 2026-05-23

supergraph:
  introspection: false
  listen: 0.0.0.0:4000

limits:
  max_depth: 15
  max_aliases: 30
  max_root_fields: 20
  max_height: 200
  max_age_seconds: 60

authentication:
  router:
    jwt:
      jwks:
        - url: https://example.com/.well-known/jwks.json
      header_name: authorization
      header_value_prefix: Bearer

persisted_queries:
  enabled: true
  safelist:
    enabled: true
    require_id: true

telemetry:
  metrics:
    prometheus:
      enabled: true
      listen: 0.0.0.0:9090
