# __faion_header_v1__
# purpose: SAM template skeleton parameterised by Environment.
# consumes: see content/02-output-contract.xml
# produces: config; depends-on: content/01-core-rules.xml#r1-pick-tool-with-care
# faion_header_json: {"__faion_header__":{"purpose":"SAM template skeleton parameterised by Environment.","consumes":"see content/02-output-contract.xml","produces":"config","depends_on":"content/01-core-rules.xml#r1-pick-tool-with-care","token_budget_impact":"~150 tokens when loaded"}}
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: my-service ${Environment}
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        LOG_LEVEL: !If [IsProd, INFO, DEBUG]
Conditions:
  IsProd: !Equals [!Ref Environment, prod]
Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/api/
      Handler: app.lambda_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /items
            Method: GET
