[importlinter]
root_package = src
include_external_packages = False

# Module independence: modules cannot import each other's internals
[importlinter:contract:module-independence]
name = Modules must not import each other
type = independence
modules =
    src.users
    src.orders
    src.payments
    src.inventory
    src.notifications

# Shared package is available to all modules
[importlinter:contract:shared-allowed]
name = Shared package available to all
type = layers
layers =
    src.users
    src.orders
    src.payments
    src.inventory
    src.notifications
    src.shared

# Clean architecture layers within each module
# api -> services -> repository -> models (top to bottom)
[importlinter:contract:clean-layers]
name = Clean Architecture layers within modules
type = layers
layers =
    src.*.api
    src.*.services
    src.*.repository
    src.*.models
containers =
    src.users
    src.orders
    src.payments
