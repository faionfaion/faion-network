# purpose: Template helper for API Contract-First Workflow (spectral-rules.yaml).
# consumes: see content/02-output-contract.xml inputs for api-contract-first
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml + content/04-procedure.xml
# token-budget-impact: ~200-1000 tokens when loaded as context
# Spectral OpenAPI linting rules.
# Install: npm install -g @stoplight/spectral-cli
# Run: spectral lint openapi.yaml
extends: spectral:oas
rules:
  operation-operationId: error
  operation-description: warn
  info-contact: warn
  oas3-schema: error
  no-$ref-siblings: error
