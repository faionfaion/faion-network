# GraphQL SDL skeleton — schema-first template.
# Copy and adapt; replace example types with your domain.

scalar DateTime
scalar UUID
scalar Email

# Interfaces
interface Node {
  id: ID!
}

interface Timestamped {
  createdAt: DateTime!
  updatedAt: DateTime!
}

# Enums — SCREAMING_SNAKE
enum UserRole {
  ADMIN
  MODERATOR
  MEMBER
}

# Types — PascalCase, fields camelCase
type User implements Node & Timestamped {
  id: ID!
  email: Email!
  name: String!
  role: UserRole!
  isActive: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  orders(first: Int = 20, after: String): OrderConnection!
}

# Relay-style Connection/Edge/PageInfo
type UserConnection {
  edges: [UserEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type UserEdge {
  cursor: String!
  node: User!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# Input types for mutations
input CreateUserInput {
  email: Email!
  name: String!
  role: UserRole = MEMBER
}

# Payload with typed errors — not naked nulls
type CreateUserPayload {
  user: User
  errors: [UserError!]
}

type UserError {
  field: String
  message: String!
  code: String!  # stable enum: VALIDATION_ERROR, EMAIL_TAKEN, NOT_AUTHORIZED
}

# Root types
type Query {
  user(id: ID!): User
  users(first: Int = 20, after: String): UserConnection!
  me: User
}

type Mutation {
  createUser(input: CreateUserInput!): CreateUserPayload!
}

type Subscription {
  orderStatusChanged(orderId: ID!): Order!
}
