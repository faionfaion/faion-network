_format_version: "3.0"
# Kong declarative config — version-control this file; apply via: deck sync

services:
  - name: user-service
    url: http://user-service:8080
    connect_timeout: 3000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: users-route
        paths:
          - /api/users
        strip_path: false
        tags: [public]

  - name: order-service
    url: http://order-service:8080
    connect_timeout: 3000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: orders-route
        paths:
          - /api/orders
        strip_path: false
        tags: [public]

plugins:
  # JWT validation — coarse auth at gateway, fine-grained in service
  - name: jwt
    config:
      secret_is_base64: false
      claims_to_verify:
        - exp
        - iss

  # Rate limiting — Redis-backed for multi-replica correctness
  - name: rate-limiting
    config:
      minute: 100
      policy: redis
      redis_host: redis
      redis_port: 6379

  # CORS
  - name: cors
    config:
      origins:
        - https://app.example.com
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID

  # Inject request ID and propagate traceparent
  - name: request-transformer
    config:
      add:
        headers:
          - X-Request-ID:$(uuid)

  # Prometheus metrics
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
