# purpose: Template helper for API Gateway Patterns (nginx-gateway.conf).
# consumes: see content/02-output-contract.xml inputs for api-gateway-patterns
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml + content/04-procedure.xml
# token-budget-impact: ~200-1000 tokens when loaded as context
# Nginx API Gateway config
# Place in /etc/nginx/sites-enabled/api.example.com.conf

upstream user_service {
    server user-service-1:8080 weight=3;
    server user-service-2:8080 weight=2;
    keepalive 32;
}

upstream order_service {
    server order-service:8080;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/ssl/certs/api.crt;
    ssl_certificate_key /etc/ssl/private/api.key;

    # CORS
    add_header 'Access-Control-Allow-Origin'  'https://app.example.com' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;

    # Rate limiting
    limit_req zone=api_limit burst=20 nodelay;

    location /api/users {
        proxy_pass         http://user_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Request-ID $request_id;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
    }

    location /api/orders {
        proxy_pass         http://order_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Request-ID $request_id;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
    }

    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
