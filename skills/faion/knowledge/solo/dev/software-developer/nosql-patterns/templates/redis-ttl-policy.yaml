# purpose: Redis prefix -> TTL policy template for nosql-patterns
# consumes: see content/02-output-contract.xml inputs for nosql-patterns
# produces: ttl_policy section of artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml (ttl-on-every-cache-key, namespaced-redis-keys)
# token-budget-impact: ~150-400 tokens when loaded as context
version: 1
ttl_policy:
  - prefix: auth:session
    ttl_seconds: 3600
  - prefix: cache:user-profile
    ttl_seconds: 600
  - prefix: ratelimit:ip
    ttl_seconds: 60
