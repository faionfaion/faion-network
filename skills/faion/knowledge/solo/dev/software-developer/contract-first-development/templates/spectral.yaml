# purpose: Spectral ruleset for contract-first OpenAPI specs
# consumes: openapi.yaml
# produces: lint diagnostics (errors block merge)
# depends-on: @stoplight/spectral-cli, spectral:oas base
# token-budget-impact: ~150 tokens when loaded as context
extends: ["spectral:oas"]
rules:
  operation-operationId: error
  operation-description: warn
  operation-tag-defined: error
  no-$ref-siblings: error
  oas3-server-trailing-slash: warn
  contact-properties: warn
  info-contact: warn
