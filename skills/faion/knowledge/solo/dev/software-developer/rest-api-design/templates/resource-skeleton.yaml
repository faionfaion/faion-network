# purpose: REST resource skeleton with cursor pagination + problem+json errors.
# consumes: see content/02-output-contract.xml inputs for rest-api-design
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml + content/04-procedure.xml
# token-budget-impact: ~200-700 tokens when loaded as context
version: 1
resources:
  users:
    base_url: /v1/users
    list:
      method: GET
      query: [status, cursor, limit]
      status: [200, 401, 403]
    create:
      method: POST
      body: UserCreate
      status: [201, 400, 401, 409, 422]
    get:
      method: GET
      path: /{id}
      status: [200, 401, 403, 404]
    update:
      method: PATCH
      path: /{id}
      body: UserUpdate
      status: [200, 400, 401, 403, 404, 409, 422]
    delete:
      method: DELETE
      path: /{id}
      status: [204, 401, 403, 404, 409]
error_format: problem_json
version_strategy: path
pagination: cursor
