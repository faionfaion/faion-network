# purpose: Spectral ruleset enforcing required arrays, named examples, security on operations.
# consumes: see content/02-output-contract.xml inputs for openapi-specification
# produces: artefact conforming to content/02-output-contract.xml
# depends-on: content/01-core-rules.xml + content/04-procedure.xml
# token-budget-impact: ~200-700 tokens when loaded as context
extends: ['spectral:oas']
rules:
  operation-operationId: error
  operation-description: warn
  oas3-schema-required: error
  no-additionalProperties-true-on-response: error
  named-examples-required: error
  operation-security-defined: error
