# .importlinter — Enforce four-layer architecture in Django apps
# Run: lint-imports (pip install import-linter)
# Add to CI: lint-imports --config .importlinter

[importlinter]
root_packages = apps

[importlinter:contract:services-no-views]
name = Services cannot import views or serializers
type = forbidden
source_modules =
    apps.users.services
    apps.orders.services
    apps.products.services
forbidden_modules =
    apps.users.views
    apps.orders.views
    apps.products.views
    apps.users.serializers
    apps.orders.serializers
    apps.products.serializers
    django.http
    rest_framework.response

[importlinter:contract:models-no-services]
name = Models cannot import services
type = forbidden
source_modules =
    apps.users.models
    apps.orders.models
    apps.products.models
forbidden_modules =
    apps.users.services
    apps.orders.services
    apps.products.services

[importlinter:contract:layered-order]
name = Layer import order (views → serializers → services → selectors → models)
type = layers
layers =
    apps.users.views
    apps.users.serializers
    apps.users.services
    apps.users.selectors
    apps.users.models
