# .aidocs/cd-readiness.yaml — fill once per service to assess CD adoption phase.
# Update when phase gates are met. Used as input to CD maturity assessment agents.
service: <name>
ci:
  build_on_every_commit: false
  unit_test_coverage_pct: 0
  pipeline_p95_minutes: 0
tests:
  integration_automated: false
  e2e_on_staging: false
  flake_rate_pct: 0
infra:
  iac_for_app: false
  iac_for_db: false
  ephemeral_envs: false
release:
  feature_flags_in_use: false
  backward_compat_migrations: false
  rollback_rehearsed: false
  one_click_prod_deploy: false
metrics:
  deploy_frequency_per_week: 0
  lead_time_hours: 0
  change_failure_rate_pct: 0
  mttr_minutes: 0
gaps: []
# next_phase: one of: foundation | automated-testing | staging | production | continuous-deploy
next_phase: foundation
