- uses: actions/cache@v4
  with:
    path: |
      node_modules/.cache
      .turbo
      apps/*/.next/cache
      packages/*/dist
    key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
    restore-keys: |
      ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
      ${{ runner.os }}-turbo-
