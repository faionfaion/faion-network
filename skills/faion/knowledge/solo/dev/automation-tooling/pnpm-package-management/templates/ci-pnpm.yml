# purpose: GitHub Actions workflow with pnpm store cache + frozen lockfile install
# consumes: input artefacts described in AGENTS.md ## Prerequisites
# produces: artefact conforming to content/02-output-contract.xml for pnpm-package-management
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~200-1200 tokens when loaded as context

name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js with pnpm store cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build changed packages only
        run: pnpm --filter '...[origin/main]' build
      - name: Test changed packages only
        run: pnpm --filter '...[origin/main]' test
      - name: Lint all packages
        run: pnpm -r lint
