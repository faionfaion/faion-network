# Commit this file BEFORE launching the micro-MVP
# All fields required. "TO BE DETERMINED" is not allowed for success_criterion.

hypothesis: "describe the assumption being tested in one sentence"
type: landing  # landing | video | fake_door | wizard_of_oz | concierge | smoke_test

duration_days: 7  # hard cap; one extension of 7 days max allowed
traffic_source: "describe the specific channel and how traffic will be driven"

success_criterion:
  metric: "the specific metric being measured (e.g. checkout_clicks / unique_visitors)"
  threshold: 0.05  # numeric value, set before any traffic touches the asset
  min_visitors: 500  # minimum sample size before the criterion is evaluated

ethical_unwind:
  # What happens to users who signed up if the product is not built?
  if_fail: "redirect signups to a 'product not built yet' page; send email explaining outcome"

decision_rule:
  pass: "describe what happens if criterion clears (e.g. build behind feature flag, ship to 10 users)"
  fail: "describe what happens if criterion fails (e.g. drop hypothesis, move to assumption #2)"
  inconclusive: "extend by 7 days if min_visitors not reached; otherwise treat as fail"

asset_constraints:
  # Cap to prevent validation theatre
  headline_max_words: 12
  copy_elements: [headline, sub_headline, value_prop_bullets_x3, cta]
  forbidden: [case_studies, logos, testimonials, pricing_tiers]
