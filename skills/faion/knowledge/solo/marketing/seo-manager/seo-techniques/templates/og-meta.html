<!-- Open Graph meta tags (Facebook, LinkedIn, general) -->
<meta property="og:type" content="article" />
<meta property="og:title" content="[Page title — max 60 chars]" />
<meta property="og:description" content="[Compelling summary — 155-160 chars]" />
<meta property="og:image" content="https://yourdomain.com/images/[page-og-image].jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="[Image description]" />
<meta property="og:url" content="https://yourdomain.com/path/to/page/" />
<meta property="og:site_name" content="[Company Name]" />
<meta property="og:locale" content="en_US" />

<!-- Twitter Card meta tags -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:site" content="@[brand-handle]" />
<meta name="twitter:creator" content="@[author-handle]" />
<meta name="twitter:title" content="[Page title — max 70 chars]" />
<meta name="twitter:description" content="[Summary — max 200 chars]" />
<meta name="twitter:image" content="https://yourdomain.com/images/[page-og-image].jpg" />
