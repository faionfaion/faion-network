  license_api_enabled: false

affiliate:
  enabled: true
  commission_pct: 40
  payout_cadence: monthly

review:
  reviewed_at: 2026-05-23
  conversion_rate: 0.0
  refund_rate: 0.0
  rank_30d_revenue: 1
