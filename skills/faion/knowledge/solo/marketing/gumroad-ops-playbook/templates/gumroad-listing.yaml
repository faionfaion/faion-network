# purpose: Gumroad listing field skeleton ready to fill
# consumes: product brief
# produces: artefact conforming to content/02-output-contract.xml listing section
# depends-on: content/01-core-rules.xml
# token-budget-impact: ~250 tokens when loaded as context
listing:
  product_id: REPLACE-slug
  cover_url: https://gumroad.com/REPLACE/cover.png
  cover_width_px: 1600
  cover_height_px: 900
  subtitle: "REPLACE — value prop in ≤280 chars"
  price:
    mode: fixed   # fixed | pwyw | tiers
    amount_usd: 19
  product_type: file   # file | license | link
  refund_policy: 14_day  # no_refunds | 7_day | 14_day | 30_day
