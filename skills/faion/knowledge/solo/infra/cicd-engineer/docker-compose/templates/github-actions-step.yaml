# GitHub Actions integration test job using Docker Compose
# Include in .github/workflows/ci.yml

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
      POSTGRES_DB: testdb

    steps:
      - uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose -f compose.yaml -f compose.ci.yaml config --quiet

      - name: Start test stack (wait for healthy)
        run: docker compose -f compose.yaml -f compose.ci.yaml up -d --wait
        timeout-minutes: 5

      - name: Run integration tests
        run: pytest tests/integration/ -v

      - name: Tear down stack (always runs)
        if: always()
        run: docker compose -f compose.yaml -f compose.ci.yaml down -v --remove-orphans
