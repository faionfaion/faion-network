# /etc/nginx/sites-available/DOMAIN.COM
# Generic nginx server block — HTTP redirect + SSL + proxy + WebSocket
#
# Customize: replace DOMAIN.COM, PORT_API, PORT_FRONTEND
# Enable: sudo ln -s /etc/nginx/sites-available/DOMAIN.COM /etc/nginx/sites-enabled/
# Test:   sudo nginx -t
# Reload: sudo systemctl reload nginx

server {
    listen 80;
    server_name DOMAIN.COM www.DOMAIN.COM;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name DOMAIN.COM www.DOMAIN.COM;

    # Cloudflare Origin Certificate (15-year, no auto-renewal needed)
    ssl_certificate     /etc/ssl/DOMAIN.COM/cert.pem;
    ssl_certificate_key /etc/ssl/DOMAIN.COM/key.pem;

    include snippets/security-headers.conf;

    access_log /var/log/nginx/DOMAIN.COM.access.log;
    error_log  /var/log/nginx/DOMAIN.COM.error.log;

    # Backend API
    location /api/ {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:PORT_API;
    }

    # WebSocket endpoint
    location /ws {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:PORT_API;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Frontend SPA or SSR
    location / {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:PORT_FRONTEND;
    }
}
