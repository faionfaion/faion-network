# purpose: Template fixture for server-init-bootstrap: sshd-hardened.conf
# consumes: content/01-core-rules.xml
# produces: config
# depends-on: content/02-output-contract.xml
# token-budget-impact: small
# /etc/ssh/sshd_config — Production hardened SSH configuration
# Test before applying: sudo sshd -t
# Apply: sudo systemctl reload sshd
# CRITICAL: Test SSH in a new terminal before closing existing session

Port                     22022
AddressFamily            inet
ListenAddress            0.0.0.0

# Authentication
PermitRootLogin          no
PasswordAuthentication   no
PubkeyAuthentication     yes
AuthorizedKeysFile       .ssh/authorized_keys
ChallengeResponseAuthentication no
UsePAM                   yes

# Restrict access
AllowUsers               nero
MaxAuthTries             3
MaxSessions              10

# Timeouts
ClientAliveInterval      300
ClientAliveCountMax      2
LoginGraceTime           30

# Security
X11Forwarding            no
PrintMotd                no
AcceptEnv                LANG LC_*
Subsystem                sftp /usr/lib/openssh/sftp-server
