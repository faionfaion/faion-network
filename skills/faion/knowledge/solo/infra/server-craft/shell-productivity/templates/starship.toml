# purpose: Template fixture for shell-productivity: starship.toml
# consumes: content/01-core-rules.xml
# produces: config
# depends-on: content/02-output-contract.xml
# token-budget-impact: small
# ~/.config/starship.toml
# Minimal server-optimized starship prompt
# Install: mkdir -p ~/.config && cp starship.toml ~/.config/starship.toml
# Activate: add `eval "$(starship init bash)"` to ~/.bashrc

format = """
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$character"""

add_newline = false
scan_timeout = 30
command_timeout = 500

[hostname]
ssh_only = true
format = "[$hostname](bold blue):"
disabled = false

[directory]
truncation_length = 3
truncation_symbol = ".../"
style = "bold cyan"

[git_branch]
format = " [$branch]($style)"
style = "bold purple"
truncation_length = 20

[git_status]
format = '([$all_status$ahead_behind]($style))'
style = "bold red"
ahead = " +"
behind = " -"
modified = " ~"
untracked = " ?"
staged = " +"
conflicted = " !"

[python]
format = ' [py$version]($style)'
style = "yellow"
detect_files = ["pyproject.toml", "setup.py", "Pipfile", "requirements.txt"]

[nodejs]
format = ' [node$version]($style)'
style = "green"
detect_files = ["package.json"]

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

# Disable unused modules for faster prompt
[aws]
disabled = true

[docker_context]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[package]
disabled = true

[terraform]
disabled = true
