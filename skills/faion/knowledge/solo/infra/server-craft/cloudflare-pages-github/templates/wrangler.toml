## Minimal Cloudflare Pages config — connect-from-GitHub project.
## Pages projects DO NOT require wrangler.toml for plain static deploys; this
## file is mandatory only when you use Pages Functions (`functions/` dir),
## bindings (KV / D1 / R2 / Queues), or want to override defaults.
##
## Reference: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "my-static-site"                 # MUST match the Pages project name in dashboard
compatibility_date = "2026-05-01"       # Pin Workers runtime; bump when adopting new features
pages_build_output_dir = "./dist"       # MUST equal the framework build directory (Astro=dist, Gatsby=public, Next-static=out, Vite=dist, Hugo=public)

# ---- Production environment -------------------------------------------------
[env.production]
name = "my-static-site"

[env.production.vars]
NODE_VERSION = "20"
PUBLIC_API_URL = "https://api.example.com"
PUBLIC_SITE_URL = "https://example.com"

# Secrets (DO NOT commit). Set via dashboard or:
#   wrangler pages secret put CF_API_TOKEN --project-name my-static-site
# [env.production.secrets]   <-- not a real section; declared via CLI only
#   CF_API_TOKEN, SENTRY_AUTH_TOKEN, ...

# ---- Preview environment (PR / branch deploys) ------------------------------
[env.preview]
name = "my-static-site"

[env.preview.vars]
NODE_VERSION = "20"
PUBLIC_API_URL = "https://api-staging.example.com"
PUBLIC_SITE_URL = "https://preview.example.com"

# ---- Optional: KV namespace binding (Pages Functions) -----------------------
# [[env.production.kv_namespaces]]
# binding = "SESSIONS"
# id = "<production-kv-id>"
#
# [[env.preview.kv_namespaces]]
# binding = "SESSIONS"
# id = "<preview-kv-id>"

# ---- Optional: D1 database binding ------------------------------------------
# [[env.production.d1_databases]]
# binding = "DB"
# database_name = "my-app-prod"
# database_id = "<uuid>"
