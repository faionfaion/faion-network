# /etc/sysctl.d/60-agent-tuning.conf
# inotify + file descriptor tuning for AI agent workloads (Claude Code, VS Code)
# Apply: sudo sysctl --system

# inotify watches: default 65536 is exhausted by Claude Code on large codebases
# 524288 supports ~5 concurrent large workspace instances
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024
fs.inotify.max_queued_events = 32768

# System-wide file descriptor maximum
fs.file-max = 2097152

# Process and thread limits for parallel agent workloads
kernel.pid_max = 4194304
kernel.threads-max = 4194304
