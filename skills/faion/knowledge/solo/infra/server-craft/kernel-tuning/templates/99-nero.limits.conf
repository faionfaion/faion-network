# /etc/security/limits.d/99-nero.conf
# Per-user PAM limits for the nero service account
# Applied to all processes started in nero's login sessions (including systemd --user)

# File descriptor limits (RabbitMQ, asyncio, many open sockets)
nero  soft  nofile  65535
nero  hard  nofile  65535

# Process/thread limits (Celery workers spawn many threads)
nero  soft  nproc   65535
nero  hard  nproc   65535

# Stack size (default 8MB is fine; increase only if stack overflows occur)
# nero  soft  stack   unlimited
# nero  hard  stack   unlimited
