# /etc/sysctl.d/60-network-perf.conf
# TCP BBR + buffer tuning for web/API/WebSocket workloads
# Apply: sudo sysctl --system

# BBR congestion control (use fq, not fq_codel, for BBR pacing)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# TCP buffer sizes (tuned for 30GB RAM; scale down for smaller servers)
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Connection backlog
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 5000
net.ipv4.tcp_max_syn_backlog = 8192

# Faster time-wait cleanup (safe for server-side)
net.ipv4.tcp_fin_timeout = 30
net.ipv4.tcp_tw_reuse = 1

# Keepalive tuning (detect dead connections sooner)
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 5

# Connection tracking for many concurrent WebSocket/AMQP connections
net.netfilter.nf_conntrack_max = 262144
net.netfilter.nf_conntrack_tcp_timeout_established = 86400
