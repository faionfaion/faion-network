# /etc/sysctl.d/60-memory.conf
# Memory management for servers with 8GB+ RAM running AI/web workloads
# Apply: sudo sysctl --system

# Low swappiness: prefer RAM, only swap under real pressure (never use 0)
vm.swappiness = 10

# Dirty page writeback: reduce I/O spikes while keeping data safe
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5

# Cache pressure: keep inode/dentry caches longer (reduces filesystem overhead)
vm.vfs_cache_pressure = 50

# Max memory map areas: needed by JVM, Elasticsearch, some ML frameworks
vm.max_map_count = 1048576

# Overcommit: 0 = heuristic (safe default); do not set to 1 on production
vm.overcommit_memory = 0
