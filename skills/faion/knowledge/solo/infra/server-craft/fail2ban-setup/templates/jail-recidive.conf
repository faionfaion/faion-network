# /etc/fail2ban/jail.d/recidive.conf
# Escalate bans for repeat offenders
# 3 bans in 24h on any jail -> 1 week ban on ALL ports

[recidive]
enabled  = true
filter   = recidive
logpath  = /var/log/fail2ban.log
bantime  = 604800
findtime = 86400
maxretry = 3
banaction = nftables[type=allports]
backend  = auto
