# /etc/sysctl.d/60-agent-dev.conf
# sysctl tuning for AI agent workloads (Claude Code, VS Code, file watchers)
# Apply: sudo sysctl --system

# inotify: default 65536 is exhausted by Claude Code on large repos
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024
fs.inotify.max_queued_events = 65536

# System file descriptor maximum
fs.file-max = 2097152

# Memory: prefer RAM, only swap under real pressure
vm.swappiness = 10
vm.vfs_cache_pressure = 50
vm.max_map_count = 1048576

# Process limits for parallel agent workloads
kernel.pid_max = 4194304
