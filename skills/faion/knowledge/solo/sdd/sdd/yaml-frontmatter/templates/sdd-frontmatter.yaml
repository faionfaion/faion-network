# SDD Document Frontmatter Templates
# Replace {PLACEHOLDER} values. Keep quotes on version and feature_id.

# --- constitution.md ---
# ---
# type: constitution
# version: "1.0.0"
# status: active
# created: {YYYY-MM-DD}
# updated: {YYYY-MM-DD}
# author: {Author Name}
# domain: {project-domain.com}
# ---

# --- roadmap.md ---
# ---
# type: roadmap
# version: "1.0.0"
# status: active
# created: {YYYY-MM-DD}
# updated: {YYYY-MM-DD}
# ---

# --- spec.md ---
# ---
# type: spec
# feature_id: "{NNN}-{feature-name}"
# version: "1.0.0"
# status: draft
# priority: P1
# created: {YYYY-MM-DD}
# updated: {YYYY-MM-DD}
# depends_on: []
# ---

# --- design.md ---
# ---
# type: design
# feature_id: "{NNN}-{feature-name}"
# version: "1.0.0"
# status: draft
# created: {YYYY-MM-DD}
# updated: {YYYY-MM-DD}
# spec_version: "1.0.0"
# ---

# --- implementation-plan.md ---
# ---
# type: implementation-plan
# feature_id: "{NNN}-{feature-name}"
# version: "1.0.0"
# status: draft
# created: {YYYY-MM-DD}
# updated: {YYYY-MM-DD}
# design_version: "1.0.0"
# total_tasks: {N}
# ---

# --- TASK_NNN_slug.md ---
# ---
# type: task
# task_id: "TASK_{NNN}"
# feature_id: "{NNN}-{feature-name}"
# status: todo
# priority: P1
# created: {YYYY-MM-DD}
# depends_on: []
# blocks: []
# complexity: medium
# estimated_tokens: 50000
# ---
