packages:
  - path: github.com/me/api/dto
    output_path: web/src/types/api.ts
    indent: "  "
    include_files:
      - "*.go"
    exclude_files:
      - "*_test.go"
    frontmatter: |
      // Code generated by tygo. DO NOT EDIT.
      /* eslint-disable */
    type_mappings:
      time.Time: "string"
      time.Duration: "number"
      uuid.UUID: "string"
      decimal.Decimal: "string"
      json.RawMessage: "unknown"
