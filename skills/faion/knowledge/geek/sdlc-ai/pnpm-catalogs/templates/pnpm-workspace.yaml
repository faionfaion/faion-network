# purpose: pnpm-workspace.yaml skeleton with default catalog + named catalogs
# consumes: shared-dep list from per-package package.json audit
# produces: config (workspace catalog file)
# depends-on: content/01-core-rules.xml (shared-dep-catalog-only, named-catalog-for-prerelease)
# token-budget-impact: low — ~200 tokens when loaded as context
packages:
  - 'packages/*'
  - 'apps/*'

catalog:
  # framework
  react: ^19.0.0
  react-dom: ^19.0.0
  # types
  typescript: ^5.7.0
  '@types/node': ^22.10.0
  # test
  vitest: ^3.0.0
  '@playwright/test': ^1.50.0
  # lint / format
  '@biomejs/biome': ^2.0.0
  # build
  tsx: ^4.20.0

catalogs:
  next:
    react: 19.1.0-canary
    react-dom: 19.1.0-canary
