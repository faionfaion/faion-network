# .mega-linter.yml — repo root
# Cupcake flavor: JS/TS + Python + Markdown + YAML + JSON + Bash + Dockerfile.
APPLY_FIXES: none
DEFAULT_BRANCH: main
DISABLE_LINTERS:
  - SPELL_CSPELL          # noisy on technical content
  - COPYPASTE_JSCPD       # opt-in only

DISABLE_ERRORS_LINTERS: []

VALIDATE_ALL_CODEBASE: false   # PR-only by default; set true for nightly cron

PRINT_ALL_FILES: false

SARIF_REPORTER: true
JSON_REPORTER: true
TEXT_REPORTER: true
GITHUB_STATUS_REPORTER: true

FILTER_REGEX_EXCLUDE: '(node_modules|\.venv|dist|build|coverage|\.next)'

PYTHON_RUFF_ARGUMENTS: "--config pyproject.toml"
JAVASCRIPT_DEFAULT_STYLE: biome
TYPESCRIPT_DEFAULT_STYLE: biome
