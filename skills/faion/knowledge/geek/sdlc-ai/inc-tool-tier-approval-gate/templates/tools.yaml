# purpose: tool tier catalog consumed by agent runtime
# consumes: tool inventory
# produces: per-tool tier assignment
# depends-on: scripts/validate-inc-tool-tier-approval-gate.py
# token-budget-impact: ~200 tokens
default_tier: T3
gates:
  T0: audit
  T1: audit
  T2: signed-token
  T3: two-person-cooling
tools:
  - name: grep
    tier: T0
  - name: kubectl-logs
    tier: T0
  - name: dashboard-fetch
    tier: T0
  - name: agent-self-restart
    tier: T1
  - name: rollback-service
    tier: T2
    action_class: rollback:payments-service
  - name: cluster-drain
    tier: T3
    action_class: drain:prod-cluster
