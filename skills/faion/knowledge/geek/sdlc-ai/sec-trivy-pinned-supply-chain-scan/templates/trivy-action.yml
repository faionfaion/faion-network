# purpose: Trivy fs + image workflow with SHA-pinned action + explicit binary version
# consumes: repo file tree + built container images
# produces: config (workflow at .github/workflows/trivy.yml)
# depends-on: content/01-core-rules.xml (trivy-fs-and-image, action-pinned-by-sha, trivy-binary-pinned)
# token-budget-impact: low — ~250 tokens when loaded as context
# Replace SHA with the latest verified commit; cosign-verify against aquasecurity keys before bumping.
name: Trivy

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  fs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs
        # SHA pin (placeholder — bump deliberately, verify cosign sig).
        uses: aquasecurity/trivy-action@b1f3df9b1bf1ec2c0e3d12345abcdef0123456789
        with:
          scan-type: fs
          scan-ref: '.'
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: 'true'
          version: v0.70.2
          format: sarif
          output: trivy-fs.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  image:
    needs: fs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t local/$GITHUB_REPOSITORY:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@b1f3df9b1bf1ec2c0e3d12345abcdef0123456789
        with:
          scan-type: image
          image-ref: local/${{ github.repository }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          version: v0.70.2
