# purpose: Tapioca config for committed Gemfile/Rails-DSL RBI generation.
# consumes: Gemfile.lock + Rails dsl plugins.
# produces: config (sorbet/rbi/ tree of RBIs).
# depends-on: content/02-output-contract.xml; templates/sorbet-config.
# token-budget-impact: low — ~150 tokens.
gem:
  exclude:
    - sorbet
    - sorbet-runtime
    - sorbet-static
    - tapioca
  exclude_default_compiler:
    - ActiveRecordTypedScope
  doc: true
  loc: true
  rbi_max_line_length: 120

dsl:
  exclude:
    - tmp/
    - test/dummy/
  app_root: .
  halt_upon_load_error: true

annotations:
  sources:
    - https://github.com/Shopify/rbi-central
