# purpose: sonar-project.properties wiring AI-aware gate selection
# consumes: PR metadata + Sonar server
# produces: scan + gate evaluation
# depends-on: templates/ai-quality-gate.json
# token-budget-impact: ~150 tokens
sonar.projectKey=payments-service
sonar.host.url=https://sonar.faion.net
sonar.newCode.referenceBranch=main
sonar.qualitygate.wait=true
# CI sets sonar.qualitygate.name=ai-strict-v1 when AI author detected
