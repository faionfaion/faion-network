# sonar-project.properties — committed to repo root.
# Bind project to an AI-tuned quality gate and make the PR check blocking.

sonar.projectKey=ORG_PROJECT
sonar.organization=ORG

# AI gate (clone of "Sonar way for AI Code", tightened locally).
sonar.qualitygate=AI Code Assurance - Strict
sonar.qualitygate.wait=true

# Sources / tests.
sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/migrations/**,**/generated/**

# Coverage.
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/migrations/**,**/__init__.py

# AI assurance — only the explicit list of suppressions.
sonar.issue.ignore.multicriteria=
