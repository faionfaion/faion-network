# Two-role RBAC for SRE agent.
# - sre-agent-readonly: bound at boot, persistent.
# - sre-agent-remediate: bound only by /agent escalate-trust; TTL-bounded; auto-revoked.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-agent
  namespace: ops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-agent-readonly
rules:
- apiGroups: [""]
  resources: ["pods", "services", "events", "endpoints", "namespaces", "nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-agent-default
subjects:
- kind: ServiceAccount
  name: sre-agent
  namespace: ops
roleRef:
  kind: ClusterRole
  name: sre-agent-readonly
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-agent-remediate
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["delete", "patch"]      # restart-only; never PVC, never namespace
- apiGroups: ["apps"]
  resources: ["deployments/scale", "statefulsets/scale"]
  verbs: ["patch"]
# NO ClusterRoleBinding here — the escalation handler creates it with TTL.
