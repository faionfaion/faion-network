project:
  name: mylib
  description: Example JVM library
  longDescription: Released via JReleaser using a single git tag.
  authors: [Acme Engineering]
  license: Apache-2.0
  inceptionYear: "2026"
  links:
    homepage: https://github.com/acme/mylib
  java:
    groupId: com.acme
    version: "21"

signing:
  active: ALWAYS
  armored: true
  mode: MEMORY

release:
  github:
    overwrite: true
    draft: false
    changelog:
      formatted: ALWAYS
      preset: conventional-commits

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        applyMavenCentralRules: true
        stagingRepositories:
          - target/staging-deploy

distributions:
  mylib:
    type: SINGLE_JAR
    artifacts:
      - path: target/mylib-{{projectVersion}}.jar
