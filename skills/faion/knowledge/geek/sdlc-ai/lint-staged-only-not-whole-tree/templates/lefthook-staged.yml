# lefthook.yml — staged-files-only pre-commit.
# Install: lefthook install. Each command runs in parallel; {staged_files}
# expands to the matching subset.

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,css}"
      run: npx biome check --write {staged_files}
      stage_fixed: true

    ruff-fix:
      glob: "*.py"
      run: ruff check --fix {staged_files} && ruff format {staged_files}
      stage_fixed: true

    yamllint:
      glob: "*.{yml,yaml}"
      run: yamllint -c .yamllint.yml {staged_files}

    shellcheck:
      glob: "*.sh"
      run: shellcheck --severity=style {staged_files}

    # Graph-aware tool: per-project, NOT per-file.
    tsc-api:
      glob: "packages/api/**/*.{ts,tsx}"
      run: cd packages/api && npx tsc --noEmit -p tsconfig.json
      # No {staged_files} — tsc reads tsconfig project graph.

    tsc-web:
      glob: "packages/web/**/*.{ts,tsx}"
      run: cd packages/web && npx tsc --noEmit -p tsconfig.json
