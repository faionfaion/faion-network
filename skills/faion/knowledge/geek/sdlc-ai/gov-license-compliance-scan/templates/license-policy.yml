# license-policy.yml — committed at repo root.
# Consumed by FOSSA / Black Duck / scancode-toolkit / pip-licenses / license-checker.

target: saas        # one of: saas, distributed-binary, embedded, oss-shipped
maintainer: legal@example.com

allow:
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - MPL-2.0
  - Unlicense
  - CC0-1.0

flag:                  # build continues, opens a tracker issue tagged legal-review
  - LGPL-2.1-only
  - LGPL-3.0-only
  - EPL-2.0
  - CC-BY-4.0

deny:                  # build fails
  - GPL-2.0-only
  - GPL-3.0-only
  - AGPL-3.0-only
  - SSPL-1.0
  - BUSL-1.1
  - "LicenseRef-*"     # custom / non-SPDX licenses

unknown: deny          # missing license metadata = deny + escalate
