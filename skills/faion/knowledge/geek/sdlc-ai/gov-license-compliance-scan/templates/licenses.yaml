# purpose: SPDX allow/deny catalog
# consumes: scanner output
# produces: classification per dep
# depends-on: scripts/validate-gov-license-compliance-scan.py
# token-budget-impact: ~150 tokens
allowed:
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - MPL-2.0
  - LGPL-3.0-or-later
  - Unlicense
  - CC0-1.0
denied:
  - AGPL-1.0-or-later
  - AGPL-3.0-or-later
  - GPL-2.0-only
  - GPL-3.0-or-later
  - SSPL-1.0
  - Commons-Clause
unknown_action: deny
