# purpose: GitHub Actions license scan gate
# consumes: lockfile + licenses.yaml
# produces: PR status + SBOM
# depends-on: scripts/validate-gov-license-compliance-scan.py
# token-budget-impact: ~120 tokens
name: license-scan
on:
  pull_request:
  schedule:
    - cron: "0 5 * * *"
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker run --rm -v $PWD:/src anchore/syft:v1.18.0 dir:/src -o cyclonedx-json > sbom.json
      - run: python scripts/validate-gov-license-compliance-scan.py --file report.json
