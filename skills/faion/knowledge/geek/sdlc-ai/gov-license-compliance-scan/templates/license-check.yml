# .github/workflows/license-check.yml
# Runs on every PR; emits CycloneDX SBOM + licensee report.

name: license-check
on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect repo license (licensee)
        run: |
          gem install licensee
          licensee detect --json > licensee.json

      - name: Generate CycloneDX SBOM
        run: |
          pipx install cyclonedx-bom
          cyclonedx-py --format json --output sbom.cdx.json

      - name: Enforce license-policy.yml
        run: |
          python scripts/license-gate.py \
            --policy license-policy.yml \
            --sbom sbom.cdx.json
