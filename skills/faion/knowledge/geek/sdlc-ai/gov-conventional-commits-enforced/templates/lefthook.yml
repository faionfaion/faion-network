# lefthook.yml — fast Go-based hook runner.
# `lefthook install` wires this up.

commit-msg:
  commands:
    commitlint:
      run: npx --no-install commitlint --edit "{1}"
      stage_fixed: false

pre-push:
  commands:
    commitlint-range:
      # Re-validate the whole push range so amends / rebases don't sneak through.
      run: npx --no-install commitlint --from origin/HEAD --to HEAD
