# purpose: TruffleHog --results=verified workflow that actively calls providers to confirm live tokens
# consumes: pull_request + push events; CI egress to providers
# produces: config (workflow at .github/workflows/secrets-verify.yml)
# depends-on: content/01-core-rules.xml (trufflehog-verified-in-ci, verified-treated-as-p0)
# token-budget-impact: low — ~150 tokens when loaded as context
name: Secrets Verify
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog (verified only)
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified --fail
