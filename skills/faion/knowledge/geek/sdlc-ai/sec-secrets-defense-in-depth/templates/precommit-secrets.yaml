# purpose: pre-commit-config secrets block (gitleaks hook insertion)
# consumes: pre-commit framework + repo files
# produces: config (added to .pre-commit-config.yaml)
# depends-on: content/01-core-rules.xml (gitleaks-pre-commit)
# token-budget-impact: low — ~100 tokens when loaded as context
# Pin every hook by tag and review release notes before bumps.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.0
    hooks:
      - id: gitleaks
        name: gitleaks (staged-only secret scan)
        args: ['protect', '--staged', '--redact', '--config', '.gitleaks.toml']
