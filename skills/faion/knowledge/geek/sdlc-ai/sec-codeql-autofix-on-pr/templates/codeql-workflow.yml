# purpose: CodeQL Code Scanning workflow with language matrix + push/PR triggers
# consumes: repo language detection + Copilot Autofix permissions
# produces: config (workflow file at .github/workflows/codeql.yml)
# depends-on: content/01-core-rules.xml (codeql-on-push-and-pr, language-matrix-explicit)
# token-budget-impact: low — ~200 tokens when loaded as context
# Pin codeql-action by major and review release notes for any compromised tags before bumping.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * 1'  # weekly baseline scan

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v4
      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
