# purpose: pre-commit hook that regenerates the ctags symbol index on staged code edits.
# consumes: .ctags.d/default.ctags config + repo source tree.
# produces: config (`tags` file committed in repo root).
# depends-on: content/02-output-contract.xml; templates/ctags-config.ctags.
# token-budget-impact: low — ~150 tokens when loaded.
# Append to .pre-commit-config.yaml
repos:
  - repo: local
    hooks:
      - id: regen-tags
        name: regenerate ctags symbol index
        entry: bash -c 'ctags --options=.ctags.d/default.ctags -R . && git add tags'
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
        description: "Rebuild and re-stage the universal-ctags symbol index."

      - id: tags-no-orphans
        name: ensure tags lists no deleted files
        entry: bash -c 'awk "/^!_/ {next} {print \$2}" tags | sort -u | while read f; do test -e "$f" || { echo "stale entry: $f"; exit 1; }; done'
        language: system
        pass_filenames: false
        stages: [pre-commit]
