# lefthook.yml
# Parallel monorepo hooks. Runs only on staged files via {staged_files}.
pre-commit:
  parallel: true
  commands:
    ruff:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files} && uv run ruff format {staged_files}
      stage_fixed: true

    biome:
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    gitleaks:
      run: gitleaks protect --staged --redact --no-banner

    typecheck-ts:
      glob: "*.{ts,tsx}"
      run: pnpm exec tsc --noEmit

    terraform-fmt:
      glob: "*.tf"
      run: terraform fmt -check {staged_files}

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
