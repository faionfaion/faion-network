# Repo-property checklist that resolves to a reviewer architecture.
# Place at .github/reviewer-decision.yml; consume in onboarding script.

repo:
  loc: 0                       # cloc src tests | wc
  languages: []                # ISO list, e.g. [typescript, python, go]
  module_boundaries: strong    # strong | weak
  pr_feedback_target_s: 60     # max acceptable seconds to first comment
  bug_class_dominant: ""       # rename-ripple | local-typo | flaky | perf

# Decision logic (see content/01):
#   graph_indexed when ANY:
#     loc > 500_000
#     len(languages) > 2
#     module_boundaries == weak
#     bug_class_dominant == "rename-ripple"
#   diff_only when ALL:
#     loc < 100_000
#     module_boundaries == strong
#     pr_feedback_target_s < 60
#   else:
#     diff_only baseline + on-demand /review from graph_indexed

choice: ""                     # graph_indexed | diff_only | hybrid
vendor: ""                     # greptile | coderabbit | qodo | sourcery | copilot | codeball
auto_describe: true
auto_review: true
auto_improve: false            # always false — too noisy as default
