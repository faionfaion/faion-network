# purpose: Default safety thresholds for general-purpose Gemini integration.
# consumes: imported into gemini-config.json safety_settings array
# produces: 4-category settings list
# depends-on: content/01-core-rules.xml r4
# token-budget-impact: not loaded by agent; config only

safety_settings:
  - category: HARM_CATEGORY_HARASSMENT
    threshold: BLOCK_MEDIUM_AND_ABOVE
  - category: HARM_CATEGORY_HATE_SPEECH
    threshold: BLOCK_MEDIUM_AND_ABOVE
  - category: HARM_CATEGORY_SEXUALLY_EXPLICIT
    threshold: BLOCK_MEDIUM_AND_ABOVE
  - category: HARM_CATEGORY_DANGEROUS_CONTENT
    threshold: BLOCK_MEDIUM_AND_ABOVE
