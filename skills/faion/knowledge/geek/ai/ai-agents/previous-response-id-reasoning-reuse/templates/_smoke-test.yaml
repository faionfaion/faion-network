# purpose: minimum-viable continuity spec
# consumes: nothing
# produces: deterministic previous-response-id decision-record
# depends-on: nothing
# token-budget-impact: ~70 tokens

api_flavor: responses
turn_count_distribution: [1, 3, 5, 10]
retention_ttl_hours: 24

drivers:
  api_flavor: responses
  multi_turn: true
  reasoning_model_used: true
