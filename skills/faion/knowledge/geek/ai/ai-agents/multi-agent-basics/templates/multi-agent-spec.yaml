# purpose: Canonical multi-agent spec skeleton; fill the placeholders, then validate with scripts/validate-multi-agent-basics.py.
# consumes: task statement, model cost matrix, budget envelope, decision-authority preference.
# produces: validated MultiAgentSpec consumed by downstream impl methodologies (hierarchical/conversational/collaborative/production-bus).
# depends-on: schemas/multi-agent-spec.v1.json from output-contract.
# token-budget-impact: spec is design-time only; runtime token cost = sum(agents[].token_budget) + ~10% orchestrator overhead.

task: "<one-line task statement with acceptance criteria>"
pattern: sequential   # one of: sequential | parallel | hierarchical | debate | collaborative | conversational
decision_authority: orchestrator   # one of: orchestrator | judge | majority_vote | human_in_loop

budget:
  total_tokens: 25000
  wallclock_s: 360

message_schema:
  schema_version: v1
  fields: [schema_version, from, to, payload, ts]

termination:
  kind: predicate            # one of: max_turns | phrase | shape_check | predicate
  predicate: "<expression that returns true when the run is done>"

agents:
  - name: <slug>
    role: "<single-cognitive-verb responsibility>"
    model: sonnet            # opus | sonnet | haiku | gpt-4o | gpt-4o-mini | o3 | o4-mini | gpt-5
    system_prompt: |
      You are <role>. Output strict JSON.
      Forbidden: <list>.
      Schema: {<fields>}
    token_budget: 6000
    timeout_s: 90
  - name: <slug>
    role: "<another single-cognitive-verb responsibility>"
    model: sonnet
    system_prompt: |
      You are <role>. Output strict JSON.
      Forbidden: <list>.
      Schema: {<fields>}
    token_budget: 8000
    timeout_s: 120
