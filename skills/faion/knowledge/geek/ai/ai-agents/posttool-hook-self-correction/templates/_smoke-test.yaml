# purpose: minimum-viable hook spec for posttool-hook-self-correction
# consumes: nothing
# produces: deterministic ruff-python decision-record
# depends-on: file-patterns.yaml shape
# token-budget-impact: ~70 tokens

file_patterns:
  - {glob: "**/*.py", validator_cmd: "ruff check --quiet $CLAUDE_FILE_PATH", timeout_seconds: 5}

drivers:
  language: python
  runtime_per_file: 1
  validators_available: [ruff]

settings_json_path: .claude/settings.json
