# purpose: reranker model + warmup + fallback config
# consumes: chosen reranker + bench evidence
# produces: YAML config consumed by retrieval pipeline
# depends-on: content/01-core-rules.xml r1-r5
# token-budget-impact: zero at runtime; declarative

choice: cross-encoder-local        # cross-encoder-local | cohere | mixedbread | llm-as-judge
model: BAAI/bge-reranker-v2-m3
version: revision:abc123           # pin exact hash
warmup_on_start: true
fallback: ann-top-k                # ann-top-k | none
bench:
  latency_p95_ms: 120
  ndcg_at_10: 0.78
  cost_per_query_usd: 0.0002
