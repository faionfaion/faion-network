# purpose: minimum viable filled hybrid-search config for technical-docs RAG
# consumes: a Qdrant docs collection with text-embedding-3-large dense + BM25 sparse
# produces: the actual production config the team would ship
# depends-on: templates/hybrid-config.yaml
# token-budget-impact: zero at runtime

fusion: rrf
rrf_k: 60
dense:
  index: qdrant://docs-prod-2026Q2
  model: text-embedding-3-large
sparse:
  backend: bm25
k: 10
tie_break: dense_rank
eval:
  dataset: docs-labeled-queries-v3
  metric: ndcg@10
  score: 0.78
