# purpose: production RAG pipeline config skeleton (Chroma-backed)
# consumes: corpus + API keys
# produces: YAML config consumed by RAG implementation
# depends-on: content/01-core-rules.xml r1-r5
# token-budget-impact: zero at runtime; declarative

loaders: [md, pdf]
chunker:
  strategy: md-header        # fixed | sentence | paragraph | semantic | md-header
  size: 1024
  overlap: 200
embedding:
  model: text-embedding-3-large
store:
  backend: chroma
  path: ./chroma-docs
retrieval:
  top_k: 10
  query_enhancement: hyde    # none | expansion | hyde | rewrite
generation:
  model: claude-sonnet-4-6
  answer_only_from_context: true
incremental: true
