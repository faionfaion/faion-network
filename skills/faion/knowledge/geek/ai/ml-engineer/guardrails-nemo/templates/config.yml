# purpose: NeMo Guardrails config.yml skeleton
# consumes: guardrail-plan.json
# produces: config (YAML loaded via RailsConfig.from_path)
# depends-on: nemoguardrails >= 0.10
# token-budget-impact: +250t when imported as content/05-examples expansion

artefact_id: gn-<slug>-<yyyy-mm>
version: 1.0.0
last_reviewed: YYYY-MM-DD

models:
  - type: main
    engine: openai
    model: gpt-4o

rails:
  input:
    flows:
      - self check input
      - check jailbreak
      - check topic
  output:
    flows:
      - self check output
      - check facts

prompts:
  - task: self_check_input
    content: |
      Your task is to check if the user message below complies with the policy.
      Policy:
        - No harmful content
        - No requests for illegal activities
        - No personal attacks
      User message: {{ user_input }}
      Response (allowed/not_allowed):

knowledge_base:
  - type: local
    path: ./knowledge
