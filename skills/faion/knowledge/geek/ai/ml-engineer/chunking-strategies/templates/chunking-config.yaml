# chunking_config.yaml — Copy and customize per document type
chunking:
  # Strategy: fixed | recursive | semantic | code | agentic | auto
  strategy: recursive

  # Size parameters
  chunk_size: 512         # Target chunk size in tokens
  chunk_overlap: 77       # 15% of 512 (empirically optimal default)
  min_chunk_size: 100
  max_chunk_size: 2000

  # Token counting
  encoding: cl100k_base   # OpenAI cl100k_base or o200k_base

  # Separator hierarchy (recursive strategy)
  separators:
    - "\n\n"   # Paragraphs
    - "\n"     # Lines
    - ". "     # Sentences
    - " "      # Words

  # Semantic chunking parameters
  semantic:
    similarity_threshold: 0.80
    min_chunk_size: 100
    max_chunk_size: 800
    breakpoint_method: threshold  # threshold | percentile | gradient

  # Code chunking
  code:
    language: python       # python | javascript | typescript | go | rust
    include_imports: false
    preserve_docstrings: true

# Per-document-type overrides
document_types:
  legal:
    strategy: semantic
    similarity_threshold: 0.82
    chunk_size: 1024
    chunk_overlap: 200

  code:
    strategy: code
    chunk_overlap: 0

  markdown:
    strategy: recursive
    separators: ["\n## ", "\n### ", "\n\n", "\n", " "]

  general:
    strategy: recursive
    chunk_size: 512
    chunk_overlap: 77
