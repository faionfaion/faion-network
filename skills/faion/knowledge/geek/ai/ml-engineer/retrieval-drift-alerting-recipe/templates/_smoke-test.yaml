# purpose: minimum-viable drift-alerts.yaml that validates clean
# consumes: nothing (fixture)
# produces: config instance for --self-test
# depends-on: drift-alerts.schema.yaml
# token-budget-impact: 0 at runtime
baseline:
  path: "s3://rag-baselines/2026-05-01.parquet"
  window_days: 14
  captured_at: "2026-05-01"

metrics:
  - name: query-embedding-kl
    kind: distribution
    threshold_sigma: 1.0
  - name: retrieval-set-jaccard
    kind: set
    threshold_sigma: 1.0
  - name: score-histogram-ks
    kind: histogram
    threshold_sigma: 1.0
  - name: neighbour-recency
    kind: recency
    threshold_sigma: 1.0

routing:
  p1_dual_metric: 2
  p3_single_metric_sustained_min: 60

gate:
  enabled: true
  mode: citations-only
  flag_name: rag.safer_mode
