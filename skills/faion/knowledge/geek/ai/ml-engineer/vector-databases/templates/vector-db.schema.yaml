# purpose: schema for vector-db.yaml
# consumes: db-author intent
# produces: validation schema for validate-vector-databases.py
# depends-on: pyyaml + jsonschema
# token-budget-impact: 0
$schema: "http://json-schema.org/draft-07/schema#"
type: object
required: [kind, connection, collection, multi_tenant, hybrid_search]
properties:
  kind: {type: string, enum: [qdrant, weaviate, milvus, pgvector, pinecone, chroma]}
  connection:
    type: object
    required: [host]
  collection:
    type: object
    required: [name, dim, metric, embedding_model]
    properties:
      name: {type: string}
      dim: {type: integer, minimum: 32, maximum: 4096}
      metric: {type: string, enum: [cosine, dot, euclidean]}
      embedding_model:
        type: object
        required: [name, version]
        properties:
          name: {type: string}
          version: {type: string}
  multi_tenant:
    type: object
    required: [enabled, filter_field]
    properties:
      enabled: {type: boolean}
      filter_field: {type: string}
  hybrid_search:
    type: object
    required: [enabled]
    properties:
      enabled: {type: boolean}
      fusion: {type: string, enum: [rrf, distribution-based, weighted-sum]}
