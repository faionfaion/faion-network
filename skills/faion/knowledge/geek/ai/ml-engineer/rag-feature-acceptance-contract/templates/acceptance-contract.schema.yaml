# purpose: JSON-Schema (YAML form) for RAG acceptance-contract.yaml
# consumes: nothing (declarative)
# produces: validation schema referenced by scripts/validate-rag-feature-acceptance-contract.py
# depends-on: pyyaml + pydantic-or-jsonschema at validation time
# token-budget-impact: 0 at runtime (schema not loaded into LLM context)
$schema: "http://json-schema.org/draft-07/schema#"
type: object
required: [feature, version, intents, signatures, recontract_triggers]
properties:
  feature:
    type: string
    pattern: "^[a-z][a-z0-9-]+$"
  version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
  intents:
    type: object
    minProperties: 2
    additionalProperties:
      type: object
      required: [pm_outcome, acceptable_failure, sme_rubric, offline, online]
      properties:
        pm_outcome: { type: string, minLength: 20 }
        acceptable_failure: { type: string, minLength: 20 }
        sme_rubric:
          type: object
          required: [pass, fail]
          properties:
            pass: { type: string, minLength: 10 }
            borderline: { type: string }
            fail: { type: string, minLength: 10 }
        offline:
          type: object
          minProperties: 2
          additionalProperties:
            type: object
            required: [threshold, baseline]
            properties:
              threshold: { type: string }
              baseline: { type: string, minLength: 5 }
        online:
          type: object
          minProperties: 1
          additionalProperties:
            type: object
            required: [threshold, baseline]
            properties:
              threshold: { type: string }
              baseline: { type: string, minLength: 5 }
  signatures:
    type: object
    required: [pm, sme, ml_engineer]
    properties:
      pm: { type: string, pattern: ".+@.+ \\d{4}-\\d{2}-\\d{2} .+" }
      sme: { type: string, pattern: ".+@.+ \\d{4}-\\d{2}-\\d{2} .+" }
      ml_engineer: { type: string, pattern: ".+@.+ \\d{4}-\\d{2}-\\d{2} .+" }
  recontract_triggers:
    type: array
    minItems: 2
    items: { type: string, minLength: 10 }
