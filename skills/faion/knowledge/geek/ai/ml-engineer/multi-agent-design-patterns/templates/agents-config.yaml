# purpose: YAML configuration describing supervisor + worker roster + tool wiring
# consumes: task brief + per-role prompt id
# produces: loadable config for orchestrator boot
# depends-on: content/02-output-contract.xml
# token-budget-impact: small

# Multi-agent system configuration
# Used with load_tools_from_config or custom YAML loader

supervisor:
  name: coordinator
  role: Project Coordinator
  goal: Route requests to appropriate specialists and aggregate results
  model: gpt-4o
  temperature: 0.3
  max_iterations: 5
  routing_strategy: llm  # or "rules"

workers:
  researcher:
    name: researcher
    role: Research Specialist
    goal: Gather accurate information from various sources
    model: gpt-4o
    temperature: 0.7
    tools: [web_search, document_reader]

  coder:
    name: coder
    role: Software Developer
    goal: Write clean, efficient, well-documented code
    model: gpt-4o
    temperature: 0.5
    tools: [code_executor, file_manager, test_runner]

  writer:
    name: writer
    role: Content Writer
    goal: Create engaging, well-structured content
    model: gpt-4o
    temperature: 0.8
    tools: [grammar_checker]

routing_rules:
  - pattern: "search|find|research|look up"
    route_to: researcher
    priority: 1
  - pattern: "code|implement|debug|fix|program"
    route_to: coder
    priority: 1
  - pattern: "write|draft|edit|summarize"
    route_to: writer
    priority: 1

default_route: researcher

limits:
  max_iterations: 10
  timeout_per_agent_s: 60
  max_concurrent_workers: 3
