# purpose: Frontmatter contract for the artefact produced by this methodology.
# consumes: nothing — this is the schema.
# produces: a YAML header block ready to drop in front of any filled artefact.
# depends-on: AGENTS.md frontmatter (14 keys) for the source-of-truth shape.
# token-budget-impact: <50 tokens per artefact.

version: 0.1.0           # bump on every refresh; semver
owner: <role>:<person>   # named person, never a team
last_reviewed: YYYY-MM-DD
evidence_root: <link>    # URL or file path that anchors body claims
