# purpose: Pre-registered kill-criteria for AI-feature de-risking.
# consumes: product spec target thresholds.
# produces: A YAML record committed BEFORE the first eval run.
# depends-on: ../scripts/validate-ai-feature-de-risking.py.
# token-budget-impact: zero — pure schema.

version: "1.0.0"
committed_at: "2026-04-10"
owner: "ai-pm:<person>"
feature: "<feature-slug>"
thresholds:
  pass: ">= 0.80"
  freeze: ">= 0.70 AND < 0.80"
  fail: "< 0.70"
metric: "pass-rate (LLM-as-judge)"
set_version: "golden-v3-frozen-2026-05-15"
cost_ceiling_per_run_usd: 80
