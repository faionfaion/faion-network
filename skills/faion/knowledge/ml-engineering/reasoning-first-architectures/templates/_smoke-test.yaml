# purpose: minimum-viable reasoning-routing.yaml fixture
# consumes: nothing
# produces: spec instance for --self-test
# depends-on: reasoning-routing.schema.yaml
# token-budget-impact: 0 at runtime
version: 1.0.0
classifier:
  model: claude-haiku
  prompt_version: cr-classifier-v3
  confidence_field: difficulty_score
task_types:
  code_review_simple:
    route: standard
    thinking_budget: 0
    standard_fallback: {model: claude-sonnet-4-5, trigger: always}
  code_review_hard:
    route: extended-thinking
    thinking_budget: 8192
    standard_fallback: {model: claude-sonnet-4-5, trigger: provider_unhealthy}
eval_evidence:
  set_path: evals/cr-routing-2026-05.jsonl
  sample_size: 78
  reasoning_lift: {code_review_hard: 0.18}
budget_cap:
  monthly_usd: 3500
  on_cap_hit: fall-through
human_gate:
  enabled: true
  actions: [deploy, db-migration]
  confidence_floor: 0.65
