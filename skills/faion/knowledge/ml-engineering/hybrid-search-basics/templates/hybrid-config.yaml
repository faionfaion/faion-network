# purpose: hybrid-search config skeleton (dense + sparse + fusion)
# consumes: labeled query set + chosen vector DB
# produces: YAML config consumed by HybridSearchService
# depends-on: content/02-output-contract.xml schema
# token-budget-impact: zero at runtime; declarative config only

fusion: rrf            # rrf | linear
rrf_k: 60              # only when fusion=rrf
# alpha: 0.5           # only when fusion=linear (must be set then)
dense:
  index: qdrant://docs
  model: text-embedding-3-large
sparse:
  backend: bm25        # bm25 | splade | tantivy
k: 10
tie_break: dense_rank  # dense_rank | sparse_rank | doc_id
eval:
  dataset: labeled-queries-v2
  metric: ndcg@10
  score: 0.74
