# purpose: schema for tts-config.yaml
# consumes: tts-config author intent
# produces: validation schema for validate-text-to-speech.py
# depends-on: pyyaml + jsonschema
# token-budget-impact: 0
$schema: "http://json-schema.org/draft-07/schema#"
type: object
required: [provider, model, voice, cache, fallback]
properties:
  provider: {type: string, enum: [openai, elevenlabs, google, azure, deepgram, local-coqui]}
  model: {type: string}
  voice:
    type: object
    required: [id, clone_consent]
    properties:
      id: {type: string}
      clone_consent: {type: boolean}
  cache:
    type: object
    required: [enabled]
    properties:
      enabled: {type: boolean}
      ttl_days: {type: integer, minimum: 1}
  fallback:
    type: object
    required: [provider]
    properties:
      provider: {type: string}
      model: {type: string}
