# purpose: dev docker-compose for Qdrant with persistent volume + pinned tag
# consumes: nothing (declarative)
# produces: config (docker-compose for local dev)
# depends-on: docker compose v2+
# token-budget-impact: 0
services:
  qdrant:
    image: qdrant/qdrant:v1.10.0   # pinned per r1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage   # persistent per r2
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
