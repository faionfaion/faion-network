# purpose: minimum-viable stt-config.yaml fixture
# consumes: nothing
# produces: spec instance for --self-test
# depends-on: stt-config.schema.yaml
# token-budget-impact: 0 at runtime
provider: deepgram
model: nova-2
mode: streaming
max_chunk_seconds: 300
overlap_seconds: 5
diarization: true
custom_vocab: [ibuprofen, GERD]
fallback:
  provider: faster-whisper-local
  model: large-v3-turbo
  trigger: {consecutive_5xx: 3, timeout_seconds: 10}
