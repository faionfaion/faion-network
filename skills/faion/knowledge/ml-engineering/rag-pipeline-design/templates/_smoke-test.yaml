# purpose: minimum-viable rag-pipeline.yaml that validates clean
# consumes: nothing (fixture)
# produces: spec instance for --self-test
# depends-on: rag-pipeline.schema.yaml
# token-budget-impact: 0 at runtime
tier: advanced

embedding:
  model: voyage-3-large
  dim: 1024

vector_db:
  kind: qdrant
  connection:
    host: qdrant.local
    port: 6333

chunking:
  strategy: recursive
  size: 512
  overlap: 50

retrieval:
  mode: hybrid
  top_k_first_stage: 20

reranker:
  kind: cohere
  model: rerank-multilingual-v3.0
  top_n: 5

prompt:
  citation_required: true
  fallback_phrase: "I don't have enough information."

eval_gate:
  framework: ragas
  thresholds:
    faithfulness: ">= 0.90"
    context_recall: ">= 0.85"

telemetry:
  log_query_embedding: true
  log_retrieved_ids: true
  log_scores: true
