# purpose: schema for security-config.yaml
# consumes: security-author intent
# produces: validation schema for validate-vector-db-security.py
# depends-on: pyyaml + jsonschema
# token-budget-impact: 0
$schema: "http://json-schema.org/draft-07/schema#"
type: object
required: [auth, tls, network, encryption_at_rest, audit, pii]
properties:
  auth:
    type: object
    required: [enabled, method]
    properties:
      enabled: {type: boolean}
      method: {type: string, enum: [api-key, oidc, mtls]}
  tls:
    type: object
    required: [enabled, min_version]
    properties:
      enabled: {type: boolean}
      min_version: {type: string, enum: ["1.2", "1.3"]}
  network:
    type: object
    required: [binding, public_internet_exposed]
    properties:
      binding: {type: string}
      public_internet_exposed: {type: boolean}
  encryption_at_rest:
    type: object
    required: [enabled]
    properties:
      enabled: {type: boolean}
  audit:
    type: object
    required: [enabled, sink]
    properties:
      enabled: {type: boolean}
      sink: {type: string}
  pii:
    type: object
    required: [detection, redaction, retention_days, erasure_sla_hours]
    properties:
      retention_days: {type: integer, minimum: 1}
      erasure_sla_hours: {type: integer, minimum: 1, maximum: 720}
