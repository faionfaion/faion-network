# purpose: production RAG monitor config
# consumes: log stream + calibration baseline
# produces: rolling summary matching 02-output-contract
# depends-on: content/01-core-rules.xml r1-r4
# token-budget-impact: zero at runtime; declarative config

window: 24h
signals:
  - latency_ms
  - source_count
  - thumbs_up
  - thumbs_down
thresholds:
  latency_p95_ms: 2000
  hit_rate_min: 0.88
  thumbs_down_ratio_max: 0.1
sampled_llm_judge:
  fraction: 0.05
  judge_model: gpt-4o
  seed: 42
