# purpose: Frontmatter schema for the QA edge-case spec — keys must match this file exactly.
# consumes: The header block at the top of templates/skeleton.md.
# produces: A consistent, validator-friendly frontmatter.
# depends-on: scripts/validate-qa-edge-case-spec-template.py.
# token-budget-impact: zero — pure schema.

version: "1.0.0"            # semver
owner: "qa-eng:<person>"     # person + role; team-level ownership is forbidden
last_reviewed: "2026-05-22"  # ISO date; staleness window = 6 months
incident_url: "https://..."  # MUST be a real URL to the originating incident
evidence_root: "tests/regression/"   # where the pinned test will live
