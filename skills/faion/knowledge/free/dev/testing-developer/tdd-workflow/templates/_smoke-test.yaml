# purpose: minimum-viable behavior list for the tdd-workflow methodology
# consumes: nothing — runnable as-is
# produces: deterministic strict-tdd decision-record
# depends-on: behavior-list shape
# token-budget-impact: ~80 tokens

behaviors:
  - behavior: register-issues-token
    signature: "register(email: str) -> str"
    happy_path: "returns 32-hex-char token"
    edge_cases: []

drivers:
  behavior_known: true
  visual_feedback_drives: false
  performance_dominant: false

test_command: "pytest tests -x --tb=short"
claude_md_path: CLAUDE.md
settings_json_path: .claude/settings.json
