# purpose: minimum-viable service graph for the integration-testing methodology
# consumes: nothing — runnable as-is through the methodology
# produces: deterministic default-branch decision-record (r-respx-pick)
# depends-on: service-graph.yaml shape
# token-budget-impact: ~80 tokens

services:
  - service: api
    framework: fastapi
    db_engine: postgres
    external_apis:
      - {name: billing, url: https://billing.example.com}

drivers:
  db_engine_required: true
  commit_time_behavior_under_test: false
  parallel_target: 4
  external_http_calls: few
