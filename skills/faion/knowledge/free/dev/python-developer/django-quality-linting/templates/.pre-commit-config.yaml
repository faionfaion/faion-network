# purpose: pre-commit hooks for a Django 5.x repo, total commit budget < 10s.
# consumes: pyproject.toml ruff + mypy config.
# produces: pre-commit-installable hook list.
# depends-on: pre-commit, ruff, mypy, django-stubs.
# token-budget-impact: ~220 tokens.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - django-stubs[compatible-mypy]
          - djangorestframework-stubs[compatible-mypy]
        # Only run on changed files at commit time — keeps the gate < 1s.
        files: ^apps/

  - repo: local
    hooks:
      - id: django-system-checks
        name: django-system-checks
        entry: python manage.py check
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest
        entry: pytest -n auto
        language: system
        pass_filenames: false
        stages: [pre-push]
