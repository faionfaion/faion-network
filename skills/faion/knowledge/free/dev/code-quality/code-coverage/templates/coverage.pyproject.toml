# purpose: template for code-coverage (coverage.pyproject.toml)
# consumes: code-coverage methodology inputs (see AGENTS.md Prerequisites)
# produces: filled-in artefact conforming to content/02-output-contract.xml
# depends-on: 01-core-rules.xml + tool-runtime in same dir
# token-budget-impact: ~200-400 tokens when loaded as context

# Coverage configuration for pyproject.toml
# Copy the [tool.coverage.*] sections into your project's pyproject.toml

[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/migrations/*",
    "*/conftest.py",
    "*/manage.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "@abstractmethod",
    "\\.\\.\\.",
]
fail_under = 80
show_missing = true

[tool.coverage.html]
directory = "htmlcov"

# pytest integration — add to [tool.pytest.ini_options]
# addopts = "--cov=src --cov-branch --cov-report=term-missing --cov-report=html --cov-fail-under=80"
