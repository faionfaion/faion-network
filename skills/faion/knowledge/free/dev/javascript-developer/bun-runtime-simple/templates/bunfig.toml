# purpose: template for bun-runtime-simple (bunfig.toml)
# consumes: bun-runtime-simple methodology inputs (see AGENTS.md Prerequisites)
# produces: filled-in artefact conforming to content/02-output-contract.xml
# depends-on: 01-core-rules.xml + tool-runtime in same dir
# token-budget-impact: ~200-400 tokens when loaded as context

[install]
frozen-lockfile = true
registry = "https://registry.npmjs.org/"

[test]
coverage = true
coverageDir = "./coverage"
timeout = 5000

[build]
minify = true
sourcemap = "external"
target = "bun"
outdir = "./dist"
