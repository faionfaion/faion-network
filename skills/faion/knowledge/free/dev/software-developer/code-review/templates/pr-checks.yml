# purpose: Required GitHub Actions checks (lint/types/tests/coverage/oasdiff/security).
# consumes: project repo; see the methodology AGENTS.md for input contract.
# produces: the working artifact described above; placement: Place under .github/workflows/.
# depends-on: the tooling pinned in the methodology's AGENTS.md.
# token-budget-impact: zero — local-only template; build/CI time is the only cost.
name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run linters
        run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: make test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check coverage threshold
        run: pytest --cov=src --cov-fail-under=80

  pr-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Warn on large PR
        run: |
          CHANGED=$(git diff --stat origin/${{ github.base_ref }} | tail -1 | awk '{print $4}')
          if [ "${CHANGED:-0}" -gt 400 ]; then
            echo "::warning::PR has ${CHANGED} changed lines (>400). Consider splitting."
          fi
