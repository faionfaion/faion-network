# purpose: Bun runtime config with frozen lockfile + coverage enabled.
# consumes: project repo; see the methodology AGENTS.md for input contract.
# produces: the working artifact described above; placement: Copy to repo root.
# depends-on: the tooling pinned in the methodology's AGENTS.md.
# token-budget-impact: zero — local-only template; build/CI time is the only cost.
[install]
# Frozen lockfile in CI — equivalent to npm ci
frozen-lockfile = true

[test]
coverage = true
coverageDir = "./coverage"
timeout = 5000

[build]
minify = true
sourcemap = "external"
