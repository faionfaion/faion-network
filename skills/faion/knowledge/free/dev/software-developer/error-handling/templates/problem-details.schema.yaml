# problem-details.schema.yaml — JSON Schema 2020-12 for RFC 7807 Problem Details.
# Use with jsonschema, ajv, or schemathesis to validate API error responses in CI.
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://api.example.com/schemas/problem-details"
type: object
required: [type, title, status]
properties:
  type:
    type: string
    format: uri
  title:
    type: string
  status:
    type: integer
    minimum: 100
    maximum: 599
  detail:
    type: string
  instance:
    type: string
  traceId:
    type: string
  errors:
    type: array
    items:
      type: object
      required: [field, code, message]
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string
additionalProperties: true
