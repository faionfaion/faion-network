# purpose: JSON Schema 2020-12 for RFC 7807 Problem Details envelope.
# consumes: API error response body (JSON).
# produces: validation pass/fail when used with jsonschema/ajv/schemathesis.
# depends-on: JSON Schema 2020-12 validator; standalone otherwise.
# token-budget-impact: ~30 lines; loaded once per contract test run.
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://api.example.com/schemas/problem-details"
type: object
required: [type, title, status]
properties:
  type:
    type: string
    format: uri
  title:
    type: string
  status:
    type: integer
    minimum: 100
    maximum: 599
  detail:
    type: string
  instance:
    type: string
  traceId:
    type: string
  errors:
    type: array
    items:
      type: object
      required: [field, code, message]
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string
additionalProperties: true
