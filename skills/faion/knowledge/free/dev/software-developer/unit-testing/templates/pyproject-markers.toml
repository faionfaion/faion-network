# pyproject.toml snippet — pytest markers config.
# Add this under [tool.pytest.ini_options] in your pyproject.toml.
[tool.pytest.ini_options]
markers = [
  "slow: tests taking > 1s; excluded from fast suite with -m 'not slow'",
  "integration: spans multiple units or hits real dependencies",
  "e2e: full stack end-to-end",
]
addopts = "--strict-markers"
