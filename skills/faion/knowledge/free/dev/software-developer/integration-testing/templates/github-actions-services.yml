# purpose: GitHub Actions `services:` block for CI-native Postgres (no Testcontainers in CI).
# consumes: GHA workflow file.
# produces: a Postgres 16.2 service reachable at host=localhost:5432 in the job.
# depends-on: GitHub Actions ubuntu-latest runner.
# token-budget-impact: ~25 lines; loaded by CI only, not LLM.
# GitHub Actions services block for CI-native Postgres.
# Faster than Testcontainers for small suites — no Docker-in-Docker overhead.
#
# Add this to .github/workflows/ci.yml under jobs.<job-name>:

services:
  postgres:
    image: postgres:16.2
    env:
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: app_test
      POSTGRES_USER: ci
    ports:
      - 5432:5432
    options: >-
      --health-cmd pg_isready
      --health-interval 5s
      --health-timeout 5s
      --health-retries 12

# Then set DATABASE_URL in the test step:
# env:
#   DATABASE_URL: postgresql://ci:ci@localhost:5432/app_test
