# purpose:   Forbid .unwrap() and .expect() in non-test code
# consumes:  cargo clippy --all-targets
# produces:  CI failure if any unwrap_used / expect_used in src/
# depends-on: clippy ≥1.50
# token-budget-impact: 0 at runtime — pre-commit / CI gate only

# Place at crate root. Override per-file with #[allow(clippy::unwrap_used)] in tests.

avoid-breaking-exported-api = false
