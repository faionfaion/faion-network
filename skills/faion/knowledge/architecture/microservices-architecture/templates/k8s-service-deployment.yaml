# Kubernetes Deployment + Service + HPA for a microservice.
# Replace: <SERVICE_NAME>, <IMAGE>, <PORT>, <TEAM_NAME>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <SERVICE_NAME>
  labels:
    app: <SERVICE_NAME>
    team: <TEAM_NAME>
spec:
  replicas: 2           # minimum; HPA will scale up from here
  selector:
    matchLabels:
      app: <SERVICE_NAME>
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1           # allow 1 extra pod during update
      maxUnavailable: 0     # zero downtime: never remove pod before new one is ready
  template:
    metadata:
      labels:
        app: <SERVICE_NAME>
        team: <TEAM_NAME>
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "<PORT>"
        prometheus.io/path: "/metrics"
    spec:
      # Dedicated service account per workload (least privilege)
      serviceAccountName: <SERVICE_NAME>-sa
      automountServiceAccountToken: false

      # Security context: non-root, read-only root filesystem
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: <SERVICE_NAME>
          image: <IMAGE>:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: <PORT>
              name: http
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          # Resource requests (scheduling) and limits (enforcement)
          # Set requests close to p95 actual usage for efficient scheduling.
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Startup probe: disable liveness until app has finished starting.
          # failureThreshold * periodSeconds = max startup time allowed (24 * 5s = 2min)
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 3

          # Liveness probe: restart container if it deadlocks or gets stuck.
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3

          # Readiness probe: remove from Service LB if not ready to handle traffic.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3

          env:
            - name: PORT
              value: "<PORT>"
            - name: OTEL_SERVICE_NAME
              value: "<SERVICE_NAME>"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"

          # Writable tmp dir for non-read-only-root-filesystem-compatible apps
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      # Graceful shutdown: allow 30s for in-flight requests to complete
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: <SERVICE_NAME>
  labels:
    app: <SERVICE_NAME>
spec:
  selector:
    app: <SERVICE_NAME>
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: <SERVICE_NAME>
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: <SERVICE_NAME>
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # wait 5min before scaling down (prevent flapping)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0    # scale up immediately
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
